<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>3D 分子结构编辑器</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #0B0E1A 0%, #1A1F3A 100%);
      color: #ffffff;
    }

    #app {
      width: 100%;
      height: 100%;
      position: relative;
    }

    #canvas-container {
      width: 100%;
      height: 100%;
      position: absolute;
      top: 0;
      left: 0;
    }

    .toolbar {
      position: absolute;
      left: 20px;
      top: 50%;
      transform: translateY(-50%);
      display: flex;
      flex-direction: column;
      gap: 10px;
      z-index: 100;
      padding: 15px;
      background: rgba(255, 255, 255, 0.1);
      backdrop-filter: blur(10px);
      border-radius: 12px;
      border: 1px solid rgba(255, 255, 255, 0.15);
    }

    .toolbar button {
      width: 48px;
      height: 48px;
      border: none;
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.1);
      color: #ffffff;
      font-size: 20px;
      cursor: pointer;
      transition: all 0.2s ease;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .toolbar button:hover {
      background: #66D9EF;
      color: #0B0E1A;
      transform: scale(1.05);
    }

    .toolbar button.active {
      background: #66D9EF;
      color: #0B0E1A;
    }

    .toolbar button .tooltip {
      position: absolute;
      left: 70px;
      background: rgba(0, 0, 0, 0.8);
      color: #fff;
      padding: 6px 10px;
      border-radius: 4px;
      font-size: 12px;
      white-space: nowrap;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.2s;
    }

    .toolbar button:hover .tooltip {
      opacity: 1;
    }

    .control-bar {
      position: absolute;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      align-items: center;
      gap: 20px;
      padding: 15px 30px;
      background: rgba(255, 255, 255, 0.1);
      backdrop-filter: blur(10px);
      border-radius: 16px;
      border: 1px solid rgba(255, 255, 255, 0.15);
      z-index: 100;
      max-width: 90vw;
      flex-wrap: wrap;
      justify-content: center;
    }

    .control-group {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .control-group label {
      font-size: 13px;
      color: rgba(255, 255, 255, 0.85);
      white-space: nowrap;
    }

    .control-group input[type="range"] {
      width: 120px;
      height: 4px;
      -webkit-appearance: none;
      appearance: none;
      background: rgba(255, 255, 255, 0.2);
      border-radius: 2px;
      outline: none;
      cursor: pointer;
    }

    .control-group input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none;
      appearance: none;
      width: 14px;
      height: 14px;
      background: #66D9EF;
      border-radius: 50%;
      cursor: pointer;
      transition: transform 0.2s;
    }

    .control-group input[type="range"]::-webkit-slider-thumb:hover {
      transform: scale(1.2);
    }

    .control-group input[type="range"]::-moz-range-thumb {
      width: 14px;
      height: 14px;
      background: #66D9EF;
      border-radius: 50%;
      cursor: pointer;
      border: none;
    }

    .btn {
      padding: 8px 16px;
      border: none;
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.15);
      color: #ffffff;
      font-size: 13px;
      cursor: pointer;
      transition: all 0.2s ease;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .btn:hover {
      background: #66D9EF;
      color: #0B0E1A;
      transform: translateY(-1px);
    }

    .btn-primary {
      background: linear-gradient(135deg, #66D9EF, #A78BFA);
      color: #0B0E1A;
      font-weight: 600;
    }

    .btn-primary:hover {
      background: linear-gradient(135deg, #8BE5F5, #BEA6FC);
    }

    .speed-value {
      min-width: 40px;
      text-align: center;
      font-size: 13px;
      color: #66D9EF;
      font-family: 'SF Mono', 'Monaco', monospace;
    }

    .atom-label {
      position: absolute;
      pointer-events: none;
      font-size: 12px;
      font-weight: 600;
      color: #ffffff;
      text-shadow: -1px -1px 0 #000, 1px -1px 0 #000, -1px 1px 0 #000, 1px 1px 0 #000;
      white-space: nowrap;
      transform: translate(-50%, -50%);
      z-index: 10;
    }

    .bond-label {
      position: absolute;
      pointer-events: none;
      font-size: 10px;
      color: #66D9EF;
      text-shadow: -1px -1px 0 #000, 1px -1px 0 #000, -1px 1px 0 #000, 1px 1px 0 #000;
      white-space: nowrap;
      transform: translate(-50%, -50%);
      z-index: 10;
      background: rgba(11, 14, 26, 0.7);
      padding: 2px 6px;
      border-radius: 4px;
    }

    .angle-label {
      position: absolute;
      pointer-events: none;
      font-size: 10px;
      color: #FFCC00;
      text-shadow: -1px -1px 0 #000, 1px -1px 0 #000, -1px 1px 0 #000, 1px 1px 0 #000;
      white-space: nowrap;
      transform: translate(-50%, -50%);
      z-index: 10;
      background: rgba(11, 14, 26, 0.7);
      padding: 2px 6px;
      border-radius: 4px;
    }

    .coords-display {
      position: absolute;
      top: 20px;
      right: 20px;
      padding: 12px 16px;
      background: rgba(255, 255, 255, 0.1);
      backdrop-filter: blur(10px);
      border-radius: 8px;
      border: 1px solid rgba(255, 255, 255, 0.15);
      font-family: 'SF Mono', 'Monaco', monospace;
      font-size: 12px;
      color: rgba(255, 255, 255, 0.85);
      z-index: 100;
      display: none;
    }

    .coords-display.visible {
      display: block;
    }

    .coords-display .label {
      color: #66D9EF;
      margin-right: 8px;
    }

    .modal-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.6);
      backdrop-filter: blur(5px);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 1000;
      display: none;
    }

    .modal-overlay.visible {
      display: flex;
    }

    .modal {
      background: linear-gradient(135deg, #1A1F3A, #0B0E1A);
      border: 1px solid rgba(255, 255, 255, 0.15);
      border-radius: 16px;
      padding: 24px;
      min-width: 320px;
      max-width: 90vw;
    }

    .modal h3 {
      margin-bottom: 20px;
      font-size: 18px;
      color: #66D9EF;
    }

    .color-picker-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 10px;
      margin-bottom: 20px;
    }

    .color-swatch {
      width: 48px;
      height: 48px;
      border-radius: 8px;
      cursor: pointer;
      border: 2px solid transparent;
      transition: all 0.2s;
    }

    .color-swatch:hover {
      transform: scale(1.1);
    }

    .color-swatch.selected {
      border-color: #66D9EF;
      box-shadow: 0 0 15px rgba(102, 217, 239, 0.5);
    }

    .slider-container {
      margin-bottom: 20px;
    }

    .slider-container label {
      display: block;
      margin-bottom: 8px;
      font-size: 13px;
      color: rgba(255, 255, 255, 0.85);
    }

    .slider-container input[type="range"] {
      width: 100%;
      height: 4px;
      -webkit-appearance: none;
      appearance: none;
      background: rgba(255, 255, 255, 0.2);
      border-radius: 2px;
      outline: none;
      cursor: pointer;
    }

    .slider-container input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none;
      appearance: none;
      width: 14px;
      height: 14px;
      background: #66D9EF;
      border-radius: 50%;
      cursor: pointer;
    }

    .slider-value {
      text-align: right;
      font-size: 12px;
      color: #66D9EF;
      font-family: 'SF Mono', 'Monaco', monospace;
      margin-top: 4px;
    }

    .modal-actions {
      display: flex;
      gap: 10px;
      justify-content: flex-end;
    }

    .hint {
      position: absolute;
      top: 20px;
      left: 50%;
      transform: translateX(-50%);
      padding: 10px 20px;
      background: rgba(102, 217, 239, 0.15);
      border: 1px solid rgba(102, 217, 239, 0.3);
      border-radius: 8px;
      font-size: 13px;
      color: #66D9EF;
      z-index: 100;
      display: none;
    }

    .hint.visible {
      display: block;
    }

    #file-input {
      display: none;
    }
  </style>
</head>
<body>
  <div id="app">
    <div id="canvas-container"></div>

    <div class="toolbar">
      <button id="btn-add-atom" title="添加原子">
        <span>⚛</span>
        <span class="tooltip">添加原子</span>
      </button>
      <button id="btn-delete" title="删除">
        <span>🗑</span>
        <span class="tooltip">删除选中</span>
      </button>
      <button id="btn-clear" title="清空">
        <span>✕</span>
        <span class="tooltip">清空所有</span>
      </button>
    </div>

    <div class="hint" id="hint"></div>

    <div class="coords-display" id="coords-display">
      <span class="label">X:</span><span id="coord-x">0.00</span>
      <span class="label" style="margin-left:12px">Y:</span><span id="coord-y">0.00</span>
      <span class="label" style="margin-left:12px">Z:</span><span id="coord-z">0.00</span>
    </div>

    <div class="control-bar">
      <div class="control-group">
        <label>自转速度:</label>
        <input type="range" id="rotation-speed" min="0" max="2" step="0.1" value="0.5" />
        <span class="speed-value" id="speed-value">0.5</span>
      </div>

      <button class="btn" id="btn-reset-view">
        <span>🎯</span> 重置视角
      </button>

      <button class="btn" id="btn-auto-rotate">
        <span>🔄</span> 开启自转
      </button>

      <button class="btn" id="btn-export">
        <span>📤</span> 导出JSON
      </button>

      <button class="btn btn-primary" id="btn-import">
        <span>📥</span> 导入JSON
      </button>
    </div>

    <input type="file" id="file-input" accept=".json" />

    <div class="modal-overlay" id="atom-modal">
      <div class="modal">
        <h3>添加原子</h3>
        <div style="margin-bottom:12px; font-size:13px; color:rgba(255,255,255,0.7)">选择颜色:</div>
        <div class="color-picker-grid" id="color-picker"></div>
        <div class="slider-container">
          <label>原子半径: <span class="slider-value" id="radius-value">0.60</span></label>
          <input type="range" id="atom-radius" min="0.3" max="1.0" step="0.05" value="0.6" />
        </div>
        <div class="modal-actions">
          <button class="btn" id="btn-cancel-atom">取消</button>
          <button class="btn btn-primary" id="btn-confirm-atom">确认</button>
        </div>
      </div>
    </div>
  </div>

  <script type="module" src="/src/main.ts"></script>
</body>
</html>
