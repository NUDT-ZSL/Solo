<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>星轨棋盘 - Stellar Orbit Chessboard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Noto+Serif+SC:wght@700;900&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: linear-gradient(135deg, #0F1630 0%, #1A3A2A 100%);
      font-family: 'Noto Serif SC', 'Playfair Display', serif;
      touch-action: none;
    }

    #gameCanvas {
      display: block;
      width: 100%;
      height: 100%;
      cursor: pointer;
    }

    .log-drawer {
      position: fixed;
      top: 0;
      right: -300px;
      width: 300px;
      height: 100%;
      background: rgba(15, 22, 48, 0.95);
      backdrop-filter: blur(10px);
      border-left: 1px solid rgba(255, 255, 255, 0.1);
      transition: right 0.3s cubic-bezier(0.25, 0.46, 0.45, 0.94);
      z-index: 100;
      padding: 20px;
      overflow-y: auto;
    }

    .log-drawer.open {
      right: 0;
    }

    .log-drawer h3 {
      color: #FFFFFF;
      font-size: 18px;
      margin-bottom: 15px;
      text-shadow: 0 0 10px rgba(167, 139, 250, 0.5);
    }

    .log-item {
      padding: 8px 12px;
      margin-bottom: 8px;
      border-radius: 6px;
      font-size: 13px;
      line-height: 1.5;
      background: rgba(255, 255, 255, 0.05);
      border-left: 3px solid;
    }

    .log-item.move { border-color: #00D4FF; color: #00D4FF; }
    .log-item.cross { border-color: #FFD700; color: #FFD700; }
    .log-item.explosion { border-color: #FF3333; color: #FF3333; }

    .drawer-toggle {
      position: fixed;
      top: 50%;
      right: 0;
      transform: translateY(-50%);
      width: 30px;
      height: 60px;
      background: rgba(15, 22, 48, 0.9);
      border: 1px solid rgba(255, 255, 255, 0.2);
      border-right: none;
      border-radius: 8px 0 0 8px;
      color: #FFFFFF;
      cursor: pointer;
      display: none;
      align-items: center;
      justify-content: center;
      transition: all 0.3s cubic-bezier(0.25, 0.46, 0.45, 0.94);
      z-index: 101;
    }

    .drawer-toggle:hover {
      transform: translateY(-50%) scale(1.05);
      filter: brightness(1.1);
    }

    .drawer-toggle.visible {
      display: flex;
    }

    .drawer-toggle.open {
      right: 300px;
    }

    @media (max-width: 768px) and (orientation: portrait) {
      .log-panel-desktop {
        display: none;
      }
    }

    @media (min-width: 769px), (orientation: landscape) {
      .log-drawer,
      .drawer-toggle {
        display: none !important;
      }
    }
  </style>
</head>
<body>
  <canvas id="gameCanvas"></canvas>
  
  <button class="drawer-toggle" id="drawerToggle">
    <svg width="12" height="20" viewBox="0 0 12 20" fill="none">
      <path d="M10 5L5 10L10 15" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    </svg>
  </button>
  
  <div class="log-drawer" id="logDrawer">
    <h3>游戏日志</h3>
    <div id="logList"></div>
  </div>

  <script type="module" src="/src/main.ts"></script>
</body>
</html>
