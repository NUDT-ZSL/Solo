<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>星尘拓印 · Stardust Imprint</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
    }

    #loading-screen {
      position: fixed;
      inset: 0;
      background: radial-gradient(ellipse at center, #1A0033 0%, #000000 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      z-index: 1000;
      transition: opacity 0.8s ease;
    }

    #loading-screen.hidden {
      opacity: 0;
      pointer-events: none;
    }

    #loading-svg {
      width: 120px;
      height: 120px;
      animation: nebula-rotate 4s linear infinite;
    }

    @keyframes nebula-rotate {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }

    #loading-text {
      margin-top: 28px;
      color: #C8A0FF;
      font-size: 14px;
      letter-spacing: 4px;
      opacity: 0.8;
    }

    #app {
      width: 100%;
      height: 100%;
      display: flex;
      background: radial-gradient(ellipse at center, #1A0033 0%, #000000 100%);
    }

    #canvas-container {
      flex: 1;
      min-width: 0;
      position: relative;
    }

    #three-canvas {
      display: block;
      width: 100%;
      height: 100%;
    }

    #panel-container {
      width: 280px;
      min-width: 280px;
      position: relative;
    }

    #hover-label {
      position: fixed;
      pointer-events: none;
      background: rgba(26, 0, 51, 0.9);
      border: 1px solid rgba(136, 34, 170, 0.6);
      border-radius: 8px;
      padding: 8px 14px;
      color: #FFFFFF;
      font-size: 13px;
      line-height: 1.6;
      z-index: 100;
      opacity: 0;
      transition: opacity 0.15s ease, transform 0.1s ease;
      transform: translate(-50%, -100%);
      white-space: nowrap;
      box-shadow: 0 4px 16px rgba(0, 0, 0, 0.5);
    }

    #hover-label.visible {
      opacity: 1;
    }

    .param-panel {
      position: absolute;
      top: 0;
      right: 0;
      height: 100%;
      background: rgba(10, 0, 30, 0.6);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border-left: 1px solid #8822AA;
      display: flex;
      transition: width 0.4s cubic-bezier(0.22, 1, 0.36, 1), padding 0.4s cubic-bezier(0.22, 1, 0.36, 1);
      overflow: hidden;
    }

    .param-panel.collapsed {
      width: 40px;
      padding: 12px 0;
    }

    .param-panel.expanded {
      width: 280px;
      padding: 20px 18px;
    }

    .panel-toggle {
      position: absolute;
      left: -1px;
      top: 50%;
      transform: translateY(-50%);
      width: 20px;
      height: 56px;
      background: rgba(136, 34, 170, 0.5);
      border: 1px solid #8822AA;
      border-right: none;
      border-radius: 8px 0 0 8px;
      color: #E0C0FF;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 12px;
      transition: background 0.2s;
      z-index: 10;
    }

    .panel-toggle:hover {
      background: rgba(136, 34, 170, 0.8);
    }

    .panel-content {
      width: 100%;
      opacity: 0;
      transition: opacity 0.3s ease 0.1s;
      overflow-y: auto;
      padding-right: 6px;
    }

    .param-panel.expanded .panel-content {
      opacity: 1;
    }

    .panel-content::-webkit-scrollbar {
      width: 4px;
    }

    .panel-content::-webkit-scrollbar-track {
      background: rgba(255, 255, 255, 0.05);
      border-radius: 2px;
    }

    .panel-content::-webkit-scrollbar-thumb {
      background: rgba(136, 34, 170, 0.5);
      border-radius: 2px;
    }

    .panel-title {
      color: #E0C0FF;
      font-size: 16px;
      font-weight: 600;
      margin-bottom: 6px;
      letter-spacing: 2px;
    }

    .panel-subtitle {
      color: rgba(200, 160, 255, 0.5);
      font-size: 11px;
      margin-bottom: 24px;
      letter-spacing: 1px;
    }

    .slider-group {
      margin-bottom: 18px;
    }

    .slider-label-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 8px;
    }

    .slider-label {
      color: #C8A0FF;
      font-size: 12px;
      letter-spacing: 0.5px;
    }

    .slider-value {
      color: #FFB0E0;
      font-size: 12px;
      font-family: 'Consolas', 'Monaco', monospace;
      min-width: 40px;
      text-align: right;
    }

    .slider-track {
      position: relative;
      width: 100%;
      height: 6px;
      border-radius: 3px;
      background: linear-gradient(90deg, #6622AA 0%, #FF66AA 100%);
      cursor: pointer;
    }

    .slider-thumb {
      position: absolute;
      top: 50%;
      transform: translate(-50%, -50%);
      width: 14px;
      height: 14px;
      border-radius: 50%;
      background: #FFFFFF;
      box-shadow: 0 0 8px rgba(255, 255, 255, 0.8), 0 0 16px rgba(200, 160, 255, 0.5);
      cursor: grab;
      transition: box-shadow 0.2s;
    }

    .slider-thumb:hover,
    .slider-thumb.dragging {
      box-shadow: 0 0 12px rgba(255, 255, 255, 1), 0 0 24px rgba(255, 102, 170, 0.7);
    }

    .slider-thumb.dragging {
      cursor: grabbing;
    }

    .section-divider {
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(136, 34, 170, 0.5), transparent);
      margin: 22px 0;
    }

    .preset-section-title {
      color: #C8A0FF;
      font-size: 13px;
      margin-bottom: 12px;
      letter-spacing: 1px;
    }

    .preset-select {
      width: 100%;
      padding: 8px 12px;
      background: rgba(102, 34, 170, 0.2);
      border: 1px solid rgba(136, 34, 170, 0.5);
      border-radius: 6px;
      color: #E0C0FF;
      font-size: 12px;
      margin-bottom: 10px;
      cursor: pointer;
      outline: none;
    }

    .preset-select:hover {
      border-color: #FF66AA;
    }

    .btn-row {
      display: flex;
      gap: 8px;
    }

    .action-btn {
      flex: 1;
      padding: 8px 10px;
      background: rgba(102, 34, 170, 0.3);
      border: 1px solid rgba(136, 34, 170, 0.6);
      border-radius: 6px;
      color: #E0C0FF;
      font-size: 11px;
      cursor: pointer;
      transition: all 0.2s;
      letter-spacing: 0.5px;
    }

    .action-btn:hover {
      background: rgba(255, 102, 170, 0.2);
      border-color: #FF66AA;
      color: #FFFFFF;
    }

    .toggle-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 18px;
    }

    .toggle-label {
      color: #C8A0FF;
      font-size: 12px;
      letter-spacing: 0.5px;
    }

    .toggle-switch {
      position: relative;
      width: 44px;
      height: 22px;
      background: rgba(102, 34, 170, 0.3);
      border: 1px solid rgba(136, 34, 170, 0.6);
      border-radius: 11px;
      cursor: pointer;
      transition: background 0.2s, border-color 0.2s;
    }

    .toggle-switch.active {
      background: rgba(255, 102, 170, 0.3);
      border-color: #FF66AA;
    }

    .toggle-knob {
      position: absolute;
      top: 2px;
      left: 2px;
      width: 16px;
      height: 16px;
      border-radius: 50%;
      background: #C8A0FF;
      transition: left 0.25s cubic-bezier(0.22, 1, 0.36, 1), background 0.2s;
    }

    .toggle-switch.active .toggle-knob {
      left: 24px;
      background: #FFB0E0;
      box-shadow: 0 0 8px rgba(255, 176, 224, 0.6);
    }

    #hidden-file-input {
      display: none;
    }
  </style>
</head>
<body>
  <div id="loading-screen">
    <svg id="loading-svg" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <radialGradient id="nebula-grad" cx="50%" cy="50%" r="50%">
          <stop offset="0%" stop-color="#FFB0E0" stop-opacity="1"/>
          <stop offset="40%" stop-color="#8822AA" stop-opacity="0.8"/>
          <stop offset="75%" stop-color="#4A0066" stop-opacity="0.5"/>
          <stop offset="100%" stop-color="#1A0033" stop-opacity="0"/>
        </radialGradient>
      </defs>
      <circle cx="50" cy="50" r="46" fill="url(#nebula-grad)"/>
      <ellipse cx="50" cy="50" rx="42" ry="14" fill="none" stroke="#FF66AA" stroke-width="0.8" opacity="0.6" transform="rotate(-20 50 50)"/>
      <ellipse cx="50" cy="50" rx="34" ry="10" fill="none" stroke="#C8A0FF" stroke-width="0.6" opacity="0.5" transform="rotate(-20 50 50)"/>
      <ellipse cx="50" cy="50" rx="26" ry="7" fill="none" stroke="#E0F0FF" stroke-width="0.5" opacity="0.4" transform="rotate(-20 50 50)"/>
      <circle cx="38" cy="44" r="1.5" fill="#FFFFFF" opacity="0.9"/>
      <circle cx="62" cy="54" r="1.2" fill="#E0F0FF" opacity="0.8"/>
      <circle cx="48" cy="36" r="1" fill="#FFB0E0" opacity="0.9"/>
      <circle cx="56" cy="64" r="1.3" fill="#C8A0FF" opacity="0.85"/>
      <circle cx="30" cy="58" r="0.8" fill="#FFFFFF" opacity="0.7"/>
    </svg>
    <div id="loading-text">正 在 拓 印 星 尘</div>
  </div>

  <div id="app">
    <div id="canvas-container">
      <canvas id="three-canvas"></canvas>
    </div>
    <div id="panel-container"></div>
  </div>

  <div id="hover-label"></div>
  <input type="file" id="hidden-file-input" accept=".json,application/json"/>

  <script type="module" src="/src/main.ts"></script>
</body>
</html>
