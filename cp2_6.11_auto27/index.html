<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🌸</text></svg>" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>气味日记</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        background: #1A1A2E;
        color: #E0D8C8;
        min-height: 100vh;
        overflow-x: hidden;
      }
      #root {
        min-height: 100vh;
      }
      .loader {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: #1A1A2E;
        display: flex;
        align-items: center;
        justify-content: center;
        z-index: 9999;
        transition: opacity 0.5s ease;
      }
      .loader.hidden {
        opacity: 0;
        pointer-events: none;
      }
      .loader-petal {
        width: 20px;
        height: 40px;
        background: linear-gradient(to top, #FFB6C1, #FFDAB9);
        border-radius: 50% 50% 50% 50% / 60% 60% 40% 40%;
        position: absolute;
        transform-origin: bottom center;
        animation: bloom 1.5s ease-in-out infinite;
      }
      @keyframes bloom {
        0%, 100% { transform: rotate(0deg) scale(0.8); opacity: 0.5; }
        50% { transform: rotate(30deg) scale(1.1); opacity: 1; }
      }
    </style>
  </head>
  <body>
    <div class="loader" id="loader">
      <div style="position: relative; width: 100px; height: 100px;">
        <div class="loader-petal" style="animation-delay: 0s; left: 40px; top: 10px;"></div>
        <div class="loader-petal" style="animation-delay: 0.1s; left: 55px; top: 20px; transform: rotate(45deg);"></div>
        <div class="loader-petal" style="animation-delay: 0.2s; left: 65px; top: 35px; transform: rotate(90deg);"></div>
        <div class="loader-petal" style="animation-delay: 0.3s; left: 60px; top: 55px; transform: rotate(135deg);"></div>
        <div class="loader-petal" style="animation-delay: 0.4s; left: 45px; top: 65px; transform: rotate(180deg);"></div>
        <div class="loader-petal" style="animation-delay: 0.5s; left: 25px; top: 60px; transform: rotate(225deg);"></div>
        <div class="loader-petal" style="animation-delay: 0.6s; left: 15px; top: 45px; transform: rotate(270deg);"></div>
        <div class="loader-petal" style="animation-delay: 0.7s; left: 20px; top: 25px; transform: rotate(315deg);"></div>
      </div>
    </div>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <script>
      window.addEventListener('load', () => {
        setTimeout(() => {
          document.getElementById('loader')?.classList.add('hidden');
        }, 800);
      });
    </script>
  </body>
</html>
