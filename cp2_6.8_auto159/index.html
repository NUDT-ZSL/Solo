<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>星云画廊</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #000000;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    }

    #app {
      width: 100%;
      height: 100%;
      position: relative;
    }

    canvas {
      display: block;
    }

    #loading {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: #000000;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 9999;
      transition: opacity 0.5s ease;
    }

    #loading.hidden {
      opacity: 0;
      pointer-events: none;
    }

    .loader-ring {
      width: 60px;
      height: 60px;
      border-radius: 50%;
      border: 4px solid transparent;
      background: conic-gradient(from 0deg, #9B59B6, #3498DB, #9B59B6);
      -webkit-mask: radial-gradient(farthest-side, transparent calc(100% - 4px), #000 calc(100% - 4px));
      mask: radial-gradient(farthest-side, transparent calc(100% - 4px), #000 calc(100% - 4px));
      animation: spin 3s linear infinite;
    }

    @keyframes spin {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }

    #title {
      position: fixed;
      top: 24px;
      left: 24px;
      font-size: 18px;
      font-weight: 300;
      color: #ECF0F1;
      text-shadow: 2px 2px 4px #000000;
      z-index: 100;
      opacity: 0;
      animation: fadeIn 1s ease forwards;
      animation-delay: 0.3s;
      user-select: none;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(-10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    #stats-panel {
      position: fixed;
      top: 24px;
      right: 24px;
      background: rgba(10, 10, 20, 0.6);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      border-radius: 12px;
      padding: 16px;
      color: #ECF0F1;
      font-size: 13px;
      line-height: 1.8;
      z-index: 100;
      min-width: 160px;
      user-select: none;
    }

    #stats-panel .stat-item {
      display: flex;
      justify-content: space-between;
      gap: 16px;
    }

    #stats-panel .stat-label {
      color: #95A5A6;
    }

    #stats-panel .stat-value {
      color: #ECF0F1;
      font-weight: 500;
    }

    #control-panel {
      position: fixed;
      bottom: 24px;
      left: 24px;
      background: rgba(20, 20, 40, 0.7);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      border-radius: 12px;
      padding: 16px;
      z-index: 100;
      min-width: 260px;
      color: #ECF0F1;
      transition: all 0.3s ease;
    }

    #control-panel.hidden {
      display: none;
    }

    .control-group {
      margin-bottom: 14px;
    }

    .control-group:last-child {
      margin-bottom: 0;
    }

    .control-label {
      display: flex;
      justify-content: space-between;
      font-size: 13px;
      margin-bottom: 8px;
      color: #BDC3C7;
    }

    .control-value {
      color: #ECF0F1;
      font-weight: 500;
    }

    input[type="range"] {
      -webkit-appearance: none;
      appearance: none;
      width: 100%;
      height: 4px;
      border-radius: 2px;
      background: linear-gradient(to right, #9B59B6, #3498DB);
      outline: none;
      cursor: pointer;
    }

    input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none;
      appearance: none;
      width: 16px;
      height: 16px;
      border-radius: 50%;
      background: #9B59B6;
      cursor: pointer;
      transition: background 0.3s ease, transform 0.2s ease;
      border: 2px solid rgba(255, 255, 255, 0.3);
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.4);
    }

    input[type="range"]::-webkit-slider-thumb:hover {
      background: #3498DB;
      transform: scale(1.15);
    }

    input[type="range"]::-moz-range-thumb {
      width: 16px;
      height: 16px;
      border-radius: 50%;
      background: #9B59B6;
      cursor: pointer;
      transition: background 0.3s ease, transform 0.2s ease;
      border: 2px solid rgba(255, 255, 255, 0.3);
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.4);
    }

    input[type="range"]::-moz-range-thumb:hover {
      background: #3498DB;
      transform: scale(1.15);
    }

    #mobile-toggle {
      display: none;
      position: fixed;
      bottom: 24px;
      right: 24px;
      width: 48px;
      height: 48px;
      border-radius: 50%;
      background: #9B59B6;
      color: #FFFFFF;
      border: none;
      cursor: pointer;
      z-index: 100;
      align-items: center;
      justify-content: center;
      font-size: 22px;
      box-shadow: 0 4px 16px rgba(155, 89, 182, 0.5);
      transition: background 0.3s ease, transform 0.2s ease;
    }

    #mobile-toggle:hover {
      background: #3498DB;
      transform: scale(1.05);
    }

    @media (max-width: 768px) {
      #control-panel {
        bottom: 88px;
        left: 16px;
        right: 16px;
        min-width: auto;
      }

      #control-panel.hidden-mobile {
        display: none;
      }

      #mobile-toggle {
        display: flex;
      }

      #stats-panel {
        top: 16px;
        right: 16px;
        padding: 12px;
        min-width: 140px;
        font-size: 12px;
      }

      #title {
        top: 16px;
        left: 16px;
        font-size: 16px;
      }
    }
  </style>
</head>
<body>
  <div id="loading">
    <div class="loader-ring"></div>
  </div>
  <div id="app">
    <div id="title">星云画廊</div>
    <div id="stats-panel">
      <div class="stat-item">
        <span class="stat-label">FPS</span>
        <span class="stat-value" id="stat-fps">--</span>
      </div>
      <div class="stat-item">
        <span class="stat-label">粒子数</span>
        <span class="stat-value" id="stat-particles">--</span>
      </div>
      <div class="stat-item">
        <span class="stat-label">旋转角度</span>
        <span class="stat-value" id="stat-rotation">--°</span>
      </div>
    </div>
    <div id="control-panel">
      <div class="control-group">
        <div class="control-label">
          <span>旋转速度</span>
          <span class="control-value" id="val-rotation">0.002</span>
        </div>
        <input type="range" id="slider-rotation" min="0" max="0.01" step="0.001" value="0.002" />
      </div>
      <div class="control-group">
        <div class="control-label">
          <span>漂移幅度</span>
          <span class="control-value" id="val-drift">0.30</span>
        </div>
        <input type="range" id="slider-drift" min="0" max="0.5" step="0.01" value="0.3" />
      </div>
      <div class="control-group">
        <div class="control-label">
          <span>粒子大小</span>
          <span class="control-value" id="val-size">1.0</span>
        </div>
        <input type="range" id="slider-size" min="0.5" max="2.0" step="0.1" value="1.0" />
      </div>
    </div>
    <button id="mobile-toggle" title="控制面板">⚙</button>
  </div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
