<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>延迟补偿卡牌对战</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      user-select: none;
    }
    body {
      background: #0d1117;
      color: #fff;
      font-family: 'Segoe UI', Tahoma, sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }
    #game-container {
      position: relative;
      width: 1280px;
      height: 720px;
      background: #0d1117;
      border-radius: 16px;
      box-shadow: 0 0 30px rgba(0, 0, 0, 0.8);
      overflow: hidden;
    }
    #table-area {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 900px;
      height: 400px;
      background: #1a1a2e;
      border-radius: 16px;
      box-shadow: 0 0 20px rgba(0, 0, 0, 0.5), inset 0 0 40px rgba(0, 0, 0, 0.3);
    }
    #play-zone {
      position: absolute;
      bottom: 30px;
      left: 50%;
      transform: translateX(-50%);
      width: 240px;
      height: 120px;
      background: rgba(255, 255, 255, 0.05);
      border: 2px dashed rgba(255, 255, 255, 0.2);
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.15s, border-color 0.15s;
    }
    #play-zone.drag-over {
      background: rgba(68, 138, 255, 0.15);
      border-color: #448aff;
    }
    #play-zone.flash-blue {
      animation: flashBlue 0.15s;
    }
    #play-zone.flash-red {
      animation: flashRed 0.3s;
    }
    @keyframes flashBlue {
      0%, 100% { box-shadow: 0 0 0 rgba(68, 138, 255, 0); }
      50% { box-shadow: 0 0 30px rgba(68, 138, 255, 0.8); }
    }
    @keyframes flashRed {
      0%, 100% { box-shadow: 0 0 0 rgba(255, 82, 82, 0); }
      50% { box-shadow: 0 0 40px rgba(255, 82, 82, 0.9); }
    }
    #player-hand {
      position: absolute;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      gap: 10px;
      z-index: 10;
    }
    #ai-hand {
      position: absolute;
      top: 20px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      gap: 10px;
      z-index: 10;
    }
    .card {
      width: 60px;
      height: 90px;
      background: #1a237e;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #fff;
      font-weight: bold;
      font-size: 14px;
      cursor: grab;
      transition: transform 0.15s ease-out, box-shadow 0.15s ease-out, border 0.15s ease-out;
      border: 2px solid transparent;
      position: relative;
    }
    .card:hover {
      transform: scale(1.1) translateY(-8px);
      border-color: #ffd700;
      box-shadow: 0 0 15px rgba(255, 215, 0, 0.5);
      z-index: 20;
    }
    .card.dragging {
      cursor: grabbing;
      z-index: 100;
      transform: scale(1.05);
      opacity: 0.9;
    }
    .card.face-down {
      background: linear-gradient(135deg, #2c3e50 0%, #1a237e 100%);
      font-size: 20px;
    }
    .card.face-down::before {
      content: '?';
      color: rgba(255, 255, 255, 0.6);
    }
    .card.flying {
      pointer-events: none;
      z-index: 50;
    }
    #left-panel {
      position: absolute;
      left: 20px;
      top: 50%;
      transform: translateY(-50%);
      width: 200px;
      background: rgba(255, 255, 255, 0.03);
      border-radius: 12px;
      padding: 16px;
      border: 1px solid rgba(255, 255, 255, 0.08);
    }
    #right-panel {
      position: absolute;
      right: 20px;
      top: 50%;
      transform: translateY(-50%);
      width: 200px;
      background: rgba(255, 255, 255, 0.03);
      border-radius: 12px;
      padding: 16px;
      border: 1px solid rgba(255, 255, 255, 0.08);
    }
    .panel-title {
      font-size: 14px;
      color: rgba(255, 255, 255, 0.6);
      margin-bottom: 8px;
    }
    .player-name {
      font-size: 18px;
      font-weight: bold;
      margin-bottom: 12px;
    }
    .hp-bar-container {
      width: 160px;
      height: 16px;
      background: rgba(0, 0, 0, 0.4);
      border-radius: 8px;
      overflow: hidden;
      margin-bottom: 8px;
    }
    .hp-bar {
      height: 100%;
      transition: width 0.3s ease-out, background-color 0.3s;
      border-radius: 8px;
    }
    .hp-text {
      font-size: 12px;
      color: rgba(255, 255, 255, 0.7);
    }
    .hand-count {
      margin-top: 12px;
      font-size: 14px;
    }
    .avatar-offline {
      width: 48px;
      height: 48px;
      border-radius: 50%;
      background: #555;
      margin: 0 auto 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
    }
    .status-text {
      text-align: center;
      font-size: 12px;
      color: rgba(255, 255, 255, 0.5);
    }
    #turn-indicator {
      position: absolute;
      bottom: 180px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 18px;
      font-weight: bold;
      padding: 8px 24px;
      background: rgba(68, 138, 255, 0.2);
      border-radius: 20px;
      border: 1px solid rgba(68, 138, 255, 0.5);
      animation: pulse 0.3s infinite alternate;
    }
    @keyframes pulse {
      from { transform: translateX(-50%) scale(1); }
      to { transform: translateX(-50%) scale(1.05); }
    }
    #latency-panel {
      position: absolute;
      top: 16px;
      right: 16px;
      background: rgba(0, 0, 0, 0.6);
      border-radius: 8px;
      padding: 10px 14px;
      font-size: 12px;
      z-index: 100;
    }
    .latency-value {
      font-weight: bold;
      margin-left: 6px;
    }
    .latency-green { color: #66bb6a; }
    .latency-yellow { color: #ffa726; }
    .latency-red { color: #ef5350; }
    #stats-panel {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      background: rgba(13, 17, 23, 0.95);
      border: 2px solid rgba(255, 255, 255, 0.1);
      border-radius: 16px;
      padding: 32px 48px;
      display: none;
      z-index: 200;
      text-align: center;
    }
    #stats-panel h2 {
      margin-bottom: 20px;
      color: #ffd700;
    }
    .stat-item {
      margin: 10px 0;
      font-size: 16px;
    }
    .stat-item span {
      color: #448aff;
      font-weight: bold;
      margin-left: 8px;
    }
    #restart-btn {
      margin-top: 20px;
      padding: 10px 32px;
      background: #448aff;
      border: none;
      border-radius: 8px;
      color: #fff;
      font-size: 16px;
      cursor: pointer;
      transition: background 0.2s;
    }
    #restart-btn:hover {
      background: #2979ff;
    }
    #discard-pile {
      position: absolute;
      right: 40px;
      top: 50%;
      transform: translateY(-50%);
      width: 60px;
      height: 90px;
      background: rgba(255, 255, 255, 0.05);
      border-radius: 8px;
      border: 1px dashed rgba(255, 255, 255, 0.2);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 12px;
      color: rgba(255, 255, 255, 0.5);
    }
    #game-status {
      position: absolute;
      top: 16px;
      left: 16px;
      font-size: 14px;
      color: rgba(255, 255, 255, 0.6);
    }
  </style>
</head>
<body>
  <div id="game-container">
    <div id="game-status">连接中...</div>
    <div id="latency-panel">
      <div>延迟: <span id="latency-value" class="latency-value latency-green">0ms</span></div>
      <div>队列: <span id="queue-count" class="latency-value">0</span></div>
    </div>

    <div id="table-area">
      <div id="ai-hand"></div>
      <div id="turn-indicator">准备中...</div>
      <div id="discard-pile">弃牌<br/>0</div>
      <div id="play-zone">出牌区</div>
    </div>

    <div id="left-panel">
      <div class="panel-title">本地玩家</div>
      <div class="player-name" id="player-name">玩家1</div>
      <div class="hp-bar-container">
        <div class="hp-bar" id="player-hp-bar" style="width: 100%; background: #66bb6a;"></div>
      </div>
      <div class="hp-text" id="player-hp-text">30 / 30</div>
      <div class="hand-count">手牌: <span id="player-hand-count">7</span></div>
    </div>

    <div id="right-panel">
      <div class="panel-title">远端玩家</div>
      <div class="avatar-offline">🤖</div>
      <div class="status-text" id="ai-status">等待中</div>
      <div class="hp-bar-container" style="margin-top: 12px;">
        <div class="hp-bar" id="ai-hp-bar" style="width: 100%; background: #66bb6a;"></div>
      </div>
      <div class="hp-text" id="ai-hp-text">30 / 30</div>
      <div class="hand-count">手牌: <span id="ai-hand-count">7</span></div>
    </div>

    <div id="player-hand"></div>

    <div id="stats-panel">
      <h2 id="game-result">游戏结束</h2>
      <div class="stat-item">平均延迟: <span id="avg-latency">0ms</span></div>
      <div class="stat-item">回滚次数: <span id="rollback-count">0</span></div>
      <div class="stat-item">有效出牌率: <span id="valid-rate">0%</span></div>
      <button id="restart-btn">重新开始</button>
    </div>
  </div>

  <canvas id="game-canvas" width="320" height="480" style="display: none;"></canvas>

  <script type="module" src="/src/client/cardGame.ts"></script>
</body>
</html>
