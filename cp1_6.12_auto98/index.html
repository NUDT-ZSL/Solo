<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GPS轨迹3D路径重建</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      font-family: 'Segoe UI', 'Helvetica Neue', sans-serif;
      background: #1a1a2e;
      color: #e0e0e0;
    }

    #app-container {
      display: flex;
      width: 100%;
      height: 100%;
    }

    #sidebar {
      width: 20%;
      min-width: 260px;
      height: 100%;
      background: #16213e;
      display: flex;
      flex-direction: column;
      padding: 16px;
      overflow-y: auto;
      border-right: 1px solid #0f3460;
    }

    #canvas-container {
      width: 80%;
      height: 100%;
      position: relative;
    }

    canvas {
      display: block;
    }

    .sidebar-title {
      font-size: 18px;
      font-weight: 700;
      color: #e2b714;
      margin-bottom: 16px;
      letter-spacing: 1px;
    }

    .upload-zone {
      border: 2px dashed #0f3460;
      border-radius: 6px;
      padding: 20px;
      text-align: center;
      cursor: pointer;
      transition: all 0.3s ease;
      margin-bottom: 12px;
      position: relative;
    }

    .upload-zone:hover {
      border-color: #e2b714;
      background: rgba(226, 183, 20, 0.05);
    }

    .upload-zone.dragover {
      border-style: solid;
      border-color: #e2b714;
      background: rgba(226, 183, 20, 0.1);
    }

    .upload-zone.dragover .upload-arrow {
      transform: rotate(-10deg);
    }

    .upload-arrow {
      font-size: 28px;
      display: block;
      margin-bottom: 8px;
      transition: transform 0.3s ease;
    }

    .upload-zone-label {
      font-size: 13px;
      color: #8899aa;
    }

    .section-label {
      font-size: 12px;
      color: #8899aa;
      margin-bottom: 6px;
      margin-top: 12px;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .manual-input {
      width: 100%;
      min-height: 120px;
      background: #0f3460;
      border: 1px solid #0f3460;
      border-radius: 6px;
      color: #e0e0e0;
      font-family: 'Consolas', 'Courier New', monospace;
      font-size: 12px;
      padding: 10px;
      resize: vertical;
      transition: border-color 0.3s;
    }

    .manual-input:focus {
      outline: none;
      border-color: #e2b714;
    }

    .btn {
      width: 100%;
      padding: 10px;
      border: 1px solid #0f3460;
      border-radius: 6px;
      background: transparent;
      color: #e0e0e0;
      font-size: 14px;
      cursor: pointer;
      transition: all 0.3s ease;
      margin-top: 12px;
    }

    .btn:hover {
      background: #0f3460;
      border-width: 2px;
      font-weight: 700;
    }

    .btn-primary {
      background: #0f3460;
      border-color: #e2b714;
      color: #e2b714;
    }

    .btn-primary:hover {
      background: #0f3460;
      border-color: #e2b714;
      border-width: 2px;
    }

    .stats-container {
      margin-top: 16px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .stat-item {
      background: rgba(15, 52, 96, 0.5);
      border-radius: 6px;
      padding: 10px 12px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .stat-label {
      font-size: 12px;
      color: #8899aa;
    }

    .stat-value {
      font-size: 16px;
      font-weight: 700;
      color: #e2b714;
    }

    .chart-container {
      margin-top: auto;
      padding-top: 12px;
      flex-shrink: 0;
    }

    #elevation-chart {
      width: 100% !important;
      max-height: 160px;
    }

    .hidden-input {
      display: none;
    }
  </style>
</head>
<body>
  <div id="app-container">
    <div id="sidebar"></div>
    <div id="canvas-container"></div>
  </div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
