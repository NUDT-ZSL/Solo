<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>赛博朋克黑客入侵</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body, #root {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #0A0A1A;
            font-family: 'Courier New', monospace;
        }

        #cyberpunk-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            pointer-events: none;
        }
    </style>
</head>
<body>
    <canvas id="cyberpunk-canvas"></canvas>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <script>
        (function() {
            const canvas = document.getElementById('cyberpunk-canvas');
            const ctx = canvas.getContext('2d');
            let width, height;
            const particles = [];
            const particleCount = 100;

            function resize() {
                width = canvas.width = window.innerWidth;
                height = canvas.height = window.innerHeight;
            }

            function createParticles() {
                for (let i = 0; i < particleCount; i++) {
                    particles.push({
                        x: Math.random() * width,
                        y: Math.random() * height,
                        vx: (Math.random() - 0.5) * 0.5,
                        vy: (Math.random() - 0.5) * 0.5,
                        size: Math.random() * 2 + 0.5,
                        alpha: Math.random() * 0.5 + 0.2,
                        trail: []
                    });
                }
            }

            function drawGrid() {
                ctx.strokeStyle = 'rgba(0, 220, 255, 0.05)';
                ctx.lineWidth = 1;
                const gridSize = 50;

                for (let x = 0; x < width; x += gridSize) {
                    ctx.beginPath();
                    ctx.moveTo(x, 0);
                    ctx.lineTo(x, height);
                    ctx.stroke();
                }

                for (let y = 0; y < height; y += gridSize) {
                    ctx.beginPath();
                    ctx.moveTo(0, y);
                    ctx.lineTo(width, y);
                    ctx.stroke();
                }
            }

            function updateParticles() {
                for (let i = 0; i < particles.length; i++) {
                    const p = particles[i];
                    
                    p.trail.push({ x: p.x, y: p.y });
                    if (p.trail.length > 10) {
                        p.trail.shift();
                    }

                    p.x += p.vx;
                    p.y += p.vy;

                    if (p.x < 0) p.x = width;
                    if (p.x > width) p.x = 0;
                    if (p.y < 0) p.y = height;
                    if (p.y > height) p.y = 0;
                }
            }

            function drawParticles() {
                for (let i = 0; i < particles.length; i++) {
                    const p = particles[i];

                    for (let j = 0; j < p.trail.length; j++) {
                        const t = p.trail[j];
                        const alpha = (j / p.trail.length) * p.alpha * 0.5;
                        ctx.fillStyle = `rgba(0, 220, 255, ${alpha})`;
                        ctx.beginPath();
                        ctx.arc(t.x, t.y, p.size * (j / p.trail.length), 0, Math.PI * 2);
                        ctx.fill();
                    }

                    ctx.fillStyle = `rgba(0, 255, 136, ${p.alpha})`;
                    ctx.shadowBlur = 10;
                    ctx.shadowColor = '#00FF88';
                    ctx.beginPath();
                    ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
                    ctx.fill();
                    ctx.shadowBlur = 0;
                }
            }

            function drawConnections() {
                ctx.strokeStyle = 'rgba(0, 220, 255, 0.08)';
                ctx.lineWidth = 0.5;

                for (let i = 0; i < particles.length; i++) {
                    for (let j = i + 1; j < particles.length; j++) {
                        const dx = particles[i].x - particles[j].x;
                        const dy = particles[i].y - particles[j].y;
                        const dist = Math.sqrt(dx * dx + dy * dy);

                        if (dist < 100) {
                            ctx.globalAlpha = 1 - dist / 100;
                            ctx.beginPath();
                            ctx.moveTo(particles[i].x, particles[i].y);
                            ctx.lineTo(particles[j].x, particles[j].y);
                            ctx.stroke();
                        }
                    }
                }
                ctx.globalAlpha = 1;
            }

            function animate() {
                ctx.fillStyle = 'rgba(10, 10, 26, 0.3)';
                ctx.fillRect(0, 0, width, height);

                drawGrid();
                updateParticles();
                drawConnections();
                drawParticles();

                requestAnimationFrame(animate);
            }

            window.addEventListener('resize', resize);
            resize();
            createParticles();
            animate();
        })();
    </script>
</body>
</html>
