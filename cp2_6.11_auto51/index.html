<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>幻音涂鸦 | Phantom Sound Doodle</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #0D0D1A;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
      color: #ffffff;
      user-select: none;
    }

    #app {
      width: 100vw;
      height: 100vh;
      display: flex;
      flex-direction: column;
      position: relative;
    }

    #loading {
      position: fixed;
      inset: 0;
      background: #0D0D1A;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 9999;
      transition: opacity 0.6s ease;
    }

    #loading.fade-out {
      opacity: 0;
      pointer-events: none;
    }

    .loader {
      display: flex;
      gap: 12px;
    }

    .loader-dot {
      width: 16px;
      height: 16px;
      border-radius: 50%;
      animation: bounce 1.2s ease-in-out infinite;
    }

    .loader-dot:nth-child(1) { background: #FF3366; animation-delay: 0s; }
    .loader-dot:nth-child(2) { background: #00BFFF; animation-delay: 0.15s; }
    .loader-dot:nth-child(3) { background: #39FF14; animation-delay: 0.3s; }
    .loader-dot:nth-child(4) { background: #9932CC; animation-delay: 0.45s; }

    @keyframes bounce {
      0%, 80%, 100% { transform: scale(0.4); opacity: 0.5; }
      40% { transform: scale(1.2); opacity: 1; }
    }

    .loader-text {
      position: absolute;
      bottom: 35%;
      font-size: 14px;
      letter-spacing: 4px;
      color: rgba(255,255,255,0.6);
    }

    #main-container {
      display: flex;
      flex: 1;
      min-height: 0;
      width: 100%;
    }

    #toolbar {
      width: 60px;
      background: rgba(255,255,255,0.03);
      border-right: 1px solid rgba(255,255,255,0.06);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 24px;
      padding: 20px 0;
      flex-shrink: 0;
    }

    .tool-note {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      cursor: grab;
      transition: transform 0.15s ease, box-shadow 0.15s ease;
      position: relative;
    }

    .tool-note:hover {
      transform: scale(1.12);
    }

    .tool-note:active {
      cursor: grabbing;
      transform: scale(0.95);
    }

    .tool-note.red {
      background: #FF3366;
      box-shadow: 0 0 18px rgba(255, 51, 102, 0.6), 0 0 36px rgba(255, 51, 102, 0.3);
    }

    .tool-note.blue {
      background: #00BFFF;
      box-shadow: 0 0 18px rgba(0, 191, 255, 0.6), 0 0 36px rgba(0, 191, 255, 0.3);
    }

    .tool-note.green {
      background: #39FF14;
      box-shadow: 0 0 18px rgba(57, 255, 20, 0.6), 0 0 36px rgba(57, 255, 20, 0.3);
    }

    .tool-note.purple {
      background: #9932CC;
      box-shadow: 0 0 18px rgba(153, 50, 204, 0.6), 0 0 36px rgba(153, 50, 204, 0.3);
    }

    #canvas-wrapper {
      flex: 1;
      position: relative;
      min-width: 400px;
      min-height: 300px;
      overflow: hidden;
    }

    #canvas {
      display: block;
      width: 100%;
      height: 100%;
    }

    #drag-ghost {
      position: fixed;
      width: 40px;
      height: 40px;
      border-radius: 50%;
      pointer-events: none;
      z-index: 1000;
      opacity: 0.85;
      transform: translate(-50%, -50%);
      display: none;
    }

    #controls {
      height: 50px;
      background: rgba(255,255,255,0.02);
      border-top: 1px solid rgba(255,255,255,0.06);
      display: flex;
      align-items: center;
      padding: 0 20px;
      gap: 12px;
      flex-shrink: 0;
    }

    .ctrl-left {
      display: flex;
      gap: 10px;
      align-items: center;
      flex: 1;
    }

    .ctrl-right {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .btn {
      background: rgba(255,255,255,0.08);
      border: none;
      color: #fff;
      padding: 8px 16px;
      border-radius: 8px;
      font-size: 13px;
      cursor: pointer;
      transition: background 0.2s ease, transform 0.1s ease;
      display: flex;
      align-items: center;
      gap: 6px;
      letter-spacing: 0.5px;
    }

    .btn:hover {
      background: rgba(255,255,255,0.18);
    }

    .btn:active {
      transform: scale(0.95);
    }

    .btn.primary {
      background: rgba(0, 191, 255, 0.25);
    }

    .btn.primary:hover {
      background: rgba(0, 191, 255, 0.45);
    }

    .btn.danger {
      background: rgba(255, 51, 102, 0.2);
    }

    .btn.danger:hover {
      background: rgba(255, 51, 102, 0.35);
    }

    .speed-label {
      font-size: 12px;
      color: rgba(255,255,255,0.6);
      min-width: 44px;
    }

    #speed-slider {
      -webkit-appearance: none;
      appearance: none;
      width: 140px;
      height: 4px;
      border-radius: 2px;
      background: rgba(255,255,255,0.15);
      outline: none;
      cursor: pointer;
    }

    #speed-slider::-webkit-slider-thumb {
      -webkit-appearance: none;
      appearance: none;
      width: 16px;
      height: 16px;
      border-radius: 50%;
      background: #00BFFF;
      cursor: pointer;
      box-shadow: 0 0 10px rgba(0, 191, 255, 0.6);
      transition: transform 0.1s ease;
    }

    #speed-slider::-webkit-slider-thumb:hover {
      transform: scale(1.2);
    }

    #speed-slider::-moz-range-thumb {
      width: 16px;
      height: 16px;
      border-radius: 50%;
      background: #00BFFF;
      cursor: pointer;
      border: none;
      box-shadow: 0 0 10px rgba(0, 191, 255, 0.6);
    }

    @media (max-width: 600px) {
      #main-container {
        flex-direction: column;
      }

      #toolbar {
        width: 100%;
        height: 70px;
        flex-direction: row;
        border-right: none;
        border-bottom: 1px solid rgba(255,255,255,0.06);
        padding: 0 20px;
        gap: 20px;
      }

      #canvas-wrapper {
        min-width: unset;
        min-height: 260px;
      }

      .btn {
        padding: 6px 10px;
        font-size: 12px;
      }

      #speed-slider {
        width: 90px;
      }
    }
  </style>
</head>
<body>
  <div id="app">
    <div id="loading">
      <div class="loader">
        <div class="loader-dot"></div>
        <div class="loader-dot"></div>
        <div class="loader-dot"></div>
        <div class="loader-dot"></div>
      </div>
      <div class="loader-text">幻音涂鸦加载中...</div>
    </div>

    <div id="main-container">
      <aside id="toolbar">
        <div class="tool-note red" draggable="true" data-color="red"></div>
        <div class="tool-note blue" draggable="true" data-color="blue"></div>
        <div class="tool-note green" draggable="true" data-color="green"></div>
        <div class="tool-note purple" draggable="true" data-color="purple"></div>
      </aside>

      <div id="canvas-wrapper">
        <canvas id="canvas"></canvas>
      </div>
    </div>

    <div id="controls">
      <div class="ctrl-left">
        <button id="btn-play" class="btn primary">▶ 播放</button>
        <button id="btn-undo" class="btn">↶ 撤销</button>
        <button id="btn-clear" class="btn danger">✕ 清空</button>
      </div>
      <div class="ctrl-right">
        <span class="speed-label" id="speed-value">1.0x</span>
        <input type="range" id="speed-slider" min="0.5" max="3" step="0.1" value="1" />
      </div>
    </div>

    <div id="drag-ghost"></div>
  </div>

  <script type="module" src="/src/main.ts"></script>
</body>
</html>
