<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, maximum-scale=1.0" />
  <meta name="theme-color" content="#F5F0E8" />
  <title>墨舞蝶影 · Ink Dance Butterfly</title>
  <style>
    :root {
      --paper-start: #F5F0E8;
      --paper-end: #D4CFC8;
      --border-soft: #C4B998;
      --ink-dark: #1A1A1A;
      --ink-brown: #3D2B1F;
      --seal-brown: #8B7355;
      --gold: #FFD700;
      --coral: #FF6B6B;
      --teal: #4ECDC4;
      --canvas-width: 95vw;
      --canvas-height: 90vh;
      --canvas-padding: 3vw;
    }

    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      font-family: "Source Han Serif SC", "Noto Serif SC", "Songti SC", "SimSun", "STSong", serif;
      -webkit-font-smoothing: antialiased;
      -webkit-tap-highlight-color: transparent;
      touch-action: none;
      user-select: none;
      background: linear-gradient(180deg, var(--paper-start) 0%, var(--paper-end) 100%);
    }

    body {
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: var(--canvas-padding);
    }

    .app-wrapper {
      position: relative;
      width: var(--canvas-width);
      height: var(--canvas-height);
    }

    .seal-layer {
      position: absolute;
      inset: 0;
      pointer-events: none;
      z-index: 0;
    }

    .seal {
      position: absolute;
      border-radius: 50%;
      background: var(--seal-brown);
      opacity: 0.08;
      box-shadow: inset 0 0 4px rgba(139, 115, 85, 0.4);
    }

    .canvas-container {
      position: relative;
      width: 100%;
      height: 100%;
      z-index: 1;
      border: 0.5px solid var(--border-soft);
      background: transparent;
      box-shadow:
        -8px -8px 16px -8px rgba(0, 0, 0, 0.15),
         8px -8px 16px -8px rgba(0, 0, 0, 0.15),
        -8px  8px 16px -8px rgba(0, 0, 0, 0.15),
         8px  8px 16px -8px rgba(0, 0, 0, 0.15);
      overflow: hidden;
    }

    .canvas-container::before,
    .canvas-container::after {
      content: '';
      position: absolute;
      width: 60px;
      height: 60px;
      pointer-events: none;
      z-index: 10;
    }

    .canvas-container::before {
      top: 0;
      left: 0;
      background:
        linear-gradient(135deg, rgba(0,0,0,0.15) 0%, transparent 50%);
      clip-path: polygon(0 0, 100% 0, 0 100%);
    }

    .canvas-container::after {
      bottom: 0;
      right: 0;
      background:
        linear-gradient(315deg, rgba(0,0,0,0.15) 0%, transparent 50%);
      clip-path: polygon(100% 100%, 100% 0, 0 100%);
    }

    .corner-tr,
    .corner-bl {
      position: absolute;
      width: 60px;
      height: 60px;
      pointer-events: none;
      z-index: 10;
    }

    .corner-tr {
      top: 0;
      right: 0;
      background: linear-gradient(225deg, rgba(0,0,0,0.15) 0%, transparent 50%);
      clip-path: polygon(100% 0, 0 0, 100% 100%);
    }

    .corner-bl {
      bottom: 0;
      left: 0;
      background: linear-gradient(45deg, rgba(0,0,0,0.15) 0%, transparent 50%);
      clip-path: polygon(0 100%, 0 0, 100% 100%);
    }

    #mainCanvas {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      display: block;
      cursor: crosshair;
    }

    .stats-panel {
      position: absolute;
      left: 16px;
      bottom: 16px;
      z-index: 20;
      background: rgba(255, 255, 255, 0.55);
      backdrop-filter: blur(6px);
      -webkit-backdrop-filter: blur(6px);
      padding: 10px 14px;
      border-radius: 6px;
      border: 0.5px solid rgba(196, 185, 152, 0.6);
      font-size: 13px;
      line-height: 1.7;
      color: #3D2B1F;
      letter-spacing: 0.5px;
      pointer-events: none;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.05);
    }

    .stats-panel .stat-row {
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .stats-panel .stat-label {
      opacity: 0.7;
    }

    .stats-panel .stat-value {
      font-weight: 600;
      font-variant-numeric: tabular-nums;
      color: #1A1A1A;
    }

    .stats-panel .stat-cap {
      font-size: 11px;
      opacity: 0.5;
      font-weight: 400;
    }

    .title-watermark {
      position: absolute;
      top: 14px;
      right: 18px;
      z-index: 20;
      font-size: 14px;
      color: rgba(61, 43, 31, 0.35);
      letter-spacing: 4px;
      writing-mode: vertical-rl;
      text-orientation: upright;
      pointer-events: none;
      user-select: none;
    }

    @media (max-width: 768px) {
      :root {
        --canvas-padding: 2vw;
      }

      .stats-panel {
        left: 10px;
        bottom: 10px;
        padding: 7px 10px;
        font-size: 11px;
        line-height: 1.65;
      }

      .title-watermark {
        font-size: 11px;
        letter-spacing: 3px;
        top: 10px;
        right: 10px;
      }
    }
  </style>
</head>
<body>
  <div class="app-wrapper">
    <div class="seal-layer" id="sealLayer" aria-hidden="true"></div>

    <div class="canvas-container">
      <div class="corner-tr"></div>
      <div class="corner-bl"></div>
      <canvas id="mainCanvas"></canvas>

      <div class="stats-panel" role="status" aria-live="polite">
        <div class="stat-row">
          <span class="stat-label">蝴蝶数量</span>
          <span class="stat-value"><span id="statButterfly">0</span><span class="stat-cap">/60</span></span>
        </div>
        <div class="stat-row">
          <span class="stat-label">轨迹长度</span>
          <span class="stat-value"><span id="statLength">0</span><span class="stat-cap"> px</span></span>
        </div>
        <div class="stat-row">
          <span class="stat-label">绘制时间</span>
          <span class="stat-value"><span id="statTime">0.0</span><span class="stat-cap"> s</span></span>
        </div>
      </div>

      <div class="title-watermark">墨舞蝶影</div>
    </div>
  </div>

  <script type="module" src="/src/main.ts"></script>
</body>
</html>
