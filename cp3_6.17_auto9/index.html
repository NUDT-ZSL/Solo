<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>延迟补偿卡牌对战</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background-color: #0d1117;
    color: #e6edf3;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 20px;
  }

  h1 {
    font-size: 22px;
    margin-bottom: 16px;
    color: #58a6ff;
  }

  .game-container {
    display: flex;
    gap: 20px;
    align-items: flex-start;
    flex-wrap: wrap;
    justify-content: center;
  }

  .player-panel {
    width: 200px;
    background: #161b22;
    border-radius: 12px;
    padding: 16px;
    border: 1px solid #30363d;
  }

  .player-avatar {
    width: 48px;
    height: 48px;
    border-radius: 50%;
    margin: 0 auto 12px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 24px;
  }

  .local-avatar {
    background: linear-gradient(135deg, #1f6feb, #58a6ff);
  }

  .ai-avatar {
    background: #6e7681;
  }

  .player-name {
    text-align: center;
    font-weight: bold;
    font-size: 16px;
    margin-bottom: 12px;
  }

  .ai-status {
    text-align: center;
    color: #8b949e;
    font-size: 12px;
    margin-bottom: 12px;
  }

  .hp-container {
    margin-bottom: 12px;
  }

  .hp-label {
    font-size: 12px;
    color: #8b949e;
    margin-bottom: 4px;
  }

  .hp-bar-bg {
    width: 160px;
    height: 16px;
    background: #21262d;
    border-radius: 8px;
    overflow: hidden;
    margin: 0 auto;
  }

  .hp-bar {
    height: 100%;
    width: 100%;
    background: #66bb6a;
    transition: width 0.3s ease, background-color 0.3s ease;
    border-radius: 8px;
  }

  .hp-text {
    text-align: center;
    font-size: 12px;
    margin-top: 4px;
    color: #8b949e;
  }

  .hand-count {
    text-align: center;
    font-size: 13px;
    color: #c9d1d9;
  }

  .canvas-wrapper {
    position: relative;
    background: #1a1a2e;
    border-radius: 16px;
    padding: 0;
    box-shadow: 0 0 20px rgba(0, 0, 0, 0.5);
    overflow: hidden;
  }

  #game-canvas {
    display: block;
    border-radius: 16px;
  }

  .stats-panel {
    position: absolute;
    top: 12px;
    right: 12px;
    background: rgba(22, 27, 34, 0.85);
    border-radius: 8px;
    padding: 10px 14px;
    font-size: 12px;
    border: 1px solid #30363d;
    backdrop-filter: blur(4px);
  }

  .stat-row {
    display: flex;
    justify-content: space-between;
    gap: 16px;
    margin: 4px 0;
  }

  .stat-label { color: #8b949e; }
  .stat-value { font-weight: bold; font-variant-numeric: tabular-nums; }

  .turn-indicator-wrapper {
    position: absolute;
    top: 12px;
    left: 50%;
    transform: translateX(-50%);
  }

  .turn-indicator {
    font-weight: bold;
    font-size: 16px;
    padding: 8px 20px;
    border-radius: 20px;
    animation: pulse 0.3s ease-in-out infinite alternate;
  }

  .local-turn {
    background: rgba(102, 187, 106, 0.15);
    color: #66bb6a;
    border: 1px solid #66bb6a;
  }

  .ai-turn {
    background: rgba(255, 112, 67, 0.15);
    color: #ff7043;
    border: 1px solid #ff7043;
  }

  @keyframes pulse {
    from { transform: scale(1); }
    to { transform: scale(1.05); }
  }

  #loading {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    font-size: 16px;
    color: #58a6ff;
  }

  .modal-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0, 0, 0, 0.7);
    display: none;
    align-items: center;
    justify-content: center;
    z-index: 1000;
  }

  .modal-content {
    background: #161b22;
    border-radius: 16px;
    padding: 32px;
    min-width: 320px;
    border: 1px solid #30363d;
    text-align: center;
  }

  .modal-content h2 {
    margin-bottom: 24px;
    font-size: 28px;
  }

  .modal-stats {
    margin-bottom: 24px;
  }

  .modal-stat-row {
    display: flex;
    justify-content: space-between;
    padding: 8px 0;
    border-bottom: 1px solid #21262d;
  }

  .modal-stat-row:last-child {
    border-bottom: none;
  }

  #restart-btn {
    background: #238636;
    color: white;
    border: none;
    padding: 12px 32px;
    font-size: 16px;
    border-radius: 8px;
    cursor: pointer;
    font-weight: bold;
    transition: background 0.2s;
  }

  #restart-btn:hover {
    background: #2ea043;
  }

  .instructions {
    margin-top: 20px;
    color: #8b949e;
    font-size: 13px;
    text-align: center;
    max-width: 800px;
  }

  .instructions strong {
    color: #c9d1d9;
  }
</style>
</head>
<body>
  <h1>🃏 延迟补偿卡牌对战</h1>

  <div class="game-container">
    <div class="player-panel" id="local-panel">
      <div class="player-avatar local-avatar">👤</div>
      <div class="player-name" id="local-name">玩家</div>
      <div class="hp-container">
        <div class="hp-label">生命值</div>
        <div class="hp-bar-bg">
          <div class="hp-bar" id="local-hp-bar"></div>
        </div>
        <div class="hp-text" id="local-hp-text">20 / 20</div>
      </div>
      <div class="hand-count" id="local-hand-count">手牌: 7</div>
    </div>

    <div class="canvas-wrapper">
      <canvas id="game-canvas"></canvas>
      <div id="loading">正在连接服务器...</div>
      <div class="turn-indicator-wrapper">
        <div class="turn-indicator local-turn" id="turn-indicator">准备中...</div>
      </div>
      <div class="stats-panel">
        <div class="stat-row">
          <span class="stat-label">模拟延迟</span>
          <span class="stat-value" id="latency-value">0ms</span>
        </div>
        <div class="stat-row">
          <span class="stat-label">队列积压</span>
          <span class="stat-value" id="queue-value">0</span>
        </div>
        <div class="stat-row">
          <span class="stat-label">回滚次数</span>
          <span class="stat-value" id="rollback-value">0</span>
        </div>
      </div>
    </div>

    <div class="player-panel" id="ai-panel">
      <div class="player-avatar ai-avatar">🤖</div>
      <div class="player-name" id="ai-name">AI对手</div>
      <div class="ai-status" id="ai-status">连接中...</div>
      <div class="hp-container">
        <div class="hp-label">生命值</div>
        <div class="hp-bar-bg">
          <div class="hp-bar" id="ai-hp-bar"></div>
        </div>
        <div class="hp-text" id="ai-hp-text">20 / 20</div>
      </div>
      <div class="hand-count" id="ai-hand-count">手牌: 7</div>
    </div>
  </div>

  <div class="instructions">
    <p><strong>操作说明：</strong>拖拽手牌到中央出牌区域即可出牌。</p>
    <p>出牌立即生效并等待服务器确认，若操作冲突（如非你的回合）会自动回滚（红色闪光+牌回到手牌）。</p>
    <p>模拟延迟 100-300ms，观察右上角延迟值与队列积压情况。</p>
  </div>

  <div class="modal-overlay" id="game-over-modal">
    <div class="modal-content">
      <h2 id="winner-text">游戏结束</h2>
      <div class="modal-stats">
        <div class="modal-stat-row">
          <span>平均延迟</span>
          <span id="stat-avg-latency">-</span>
        </div>
        <div class="modal-stat-row">
          <span>回滚次数</span>
          <span id="stat-rollbacks">-</span>
        </div>
        <div class="modal-stat-row">
          <span>有效出牌率</span>
          <span id="stat-valid-rate">-</span>
        </div>
      </div>
      <button id="restart-btn">再来一局</button>
    </div>
  </div>

  <script type="module" src="/src/client/main.ts"></script>
</body>
</html>
