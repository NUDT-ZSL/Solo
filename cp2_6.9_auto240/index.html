<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>星际花火 - Interstellar Fireworks</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: linear-gradient(180deg, #05051A 0%, #0F0F2B 100%);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
      user-select: none;
    }

    #canvas-container {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      cursor: crosshair;
    }

    .ui-panel {
      animation: fadeIn 0.5s ease-out;
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(10px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    #info-panel {
      position: fixed;
      top: 20px;
      left: 20px;
      background: rgba(10, 10, 26, 0.6);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 8px;
      padding: 12px 16px;
      color: #fff;
      font-size: 14px;
      line-height: 1.8;
      min-width: 140px;
    }

    #info-panel .stat-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 16px;
    }

    #info-panel .stat-label {
      opacity: 0.7;
    }

    #info-panel .stat-value {
      font-weight: 600;
      color: #FF6B6B;
    }

    #controls-panel {
      position: fixed;
      bottom: 20px;
      right: 20px;
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      gap: 16px;
    }

    #color-picker {
      display: flex;
      gap: 8px;
      padding: 8px 12px;
      background: rgba(10, 10, 26, 0.6);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 999px;
    }

    .color-swatch {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      border: 2px solid rgba(255, 255, 255, 0.2);
      cursor: pointer;
      transition: all 0.2s ease;
      position: relative;
    }

    .color-swatch:hover {
      transform: scale(1.2);
      border-color: rgba(255, 255, 255, 0.6);
      box-shadow: 0 0 20px currentColor;
    }

    .color-swatch.active {
      border-color: #fff;
      transform: scale(1.15);
      box-shadow: 0 0 15px currentColor;
    }

    .color-swatch[data-color="#FF6B6B"] { background: #FF6B6B; color: #FF6B6B; }
    .color-swatch[data-color="#FFD93D"] { background: #FFD93D; color: #FFD93D; }
    .color-swatch[data-color="#6BCB77"] { background: #6BCB77; color: #6BCB77; }
    .color-swatch[data-color="#4D96FF"] { background: #4D96FF; color: #4D96FF; }
    .color-swatch[data-color="#9B59B6"] { background: #9B59B6; color: #9B59B6; }

    #intensity-control {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 10px 16px;
      background: rgba(10, 10, 26, 0.6);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 8px;
    }

    #intensity-control label {
      color: #fff;
      font-size: 13px;
      opacity: 0.8;
      white-space: nowrap;
    }

    #intensity-slider {
      -webkit-appearance: none;
      appearance: none;
      width: 100px;
      height: 6px;
      border-radius: 3px;
      background: linear-gradient(90deg, rgba(255,255,255,0.15), rgba(255,255,255,0.35));
      outline: none;
      cursor: pointer;
    }

    #intensity-slider::-webkit-slider-thumb {
      -webkit-appearance: none;
      appearance: none;
      width: 18px;
      height: 18px;
      border-radius: 50%;
      background: #FF6B6B;
      cursor: pointer;
      border: 2px solid rgba(255, 255, 255, 0.8);
      transition: all 0.15s ease;
      box-shadow: 0 0 10px rgba(255, 107, 107, 0.5);
    }

    #intensity-slider::-webkit-slider-thumb:hover {
      transform: scale(1.2);
      box-shadow: 0 0 15px rgba(255, 107, 107, 0.8);
    }

    #intensity-slider::-moz-range-thumb {
      width: 18px;
      height: 18px;
      border-radius: 50%;
      background: #FF6B6B;
      cursor: pointer;
      border: 2px solid rgba(255, 255, 255, 0.8);
      transition: all 0.15s ease;
      box-shadow: 0 0 10px rgba(255, 107, 107, 0.5);
    }

    #intensity-value {
      color: #FF6B6B;
      font-size: 14px;
      font-weight: 600;
      min-width: 20px;
      text-align: center;
    }
  </style>
</head>
<body>
  <div id="canvas-container"></div>

  <div id="info-panel" class="ui-panel">
    <div class="stat-item">
      <span class="stat-label">烟花:</span>
      <span class="stat-value" id="firework-count">0</span>
    </div>
    <div class="stat-item">
      <span class="stat-label">FPS:</span>
      <span class="stat-value" id="fps-counter">60</span>
    </div>
  </div>

  <div id="controls-panel" class="ui-panel">
    <div id="color-picker">
      <div class="color-swatch active" data-color="#FF6B6B"></div>
      <div class="color-swatch" data-color="#FFD93D"></div>
      <div class="color-swatch" data-color="#6BCB77"></div>
      <div class="color-swatch" data-color="#4D96FF"></div>
      <div class="color-swatch" data-color="#9B59B6"></div>
    </div>
    <div id="intensity-control">
      <label>爆炸强度</label>
      <input type="range" id="intensity-slider" min="1" max="10" value="5" />
      <span id="intensity-value">5</span>
    </div>
  </div>

  <script type="module" src="/src/main.ts"></script>
</body>
</html>
