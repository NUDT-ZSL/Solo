<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>气态星环可视化</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: linear-gradient(135deg, #0B0712 0%, #161B33 100%);
      background-attachment: fixed;
    }
    body::before {
      content: '';
      position: fixed;
      top: 0;
      left: 0;
      width: 30%;
      height: 100%;
      background: 
        radial-gradient(1px 1px at 10% 20%, rgba(255,255,255,0.2), transparent),
        radial-gradient(1px 1px at 30% 50%, rgba(255,255,255,0.15), transparent),
        radial-gradient(1.5px 1.5px at 15% 70%, rgba(255,255,255,0.25), transparent),
        radial-gradient(1px 1px at 5% 90%, rgba(255,255,255,0.1), transparent),
        radial-gradient(1px 1px at 25% 35%, rgba(255,255,255,0.2), transparent),
        radial-gradient(1.5px 1.5px at 20% 65%, rgba(255,255,255,0.3), transparent),
        radial-gradient(1px 1px at 8% 45%, rgba(255,255,255,0.15), transparent);
      background-size: 200px 200px;
      animation: starTwinkle 4s ease-in-out infinite;
      pointer-events: none;
      z-index: 0;
    }
    @keyframes starTwinkle {
      0%, 100% { opacity: 0.6; }
      50% { opacity: 1; }
    }
    #app {
      position: relative;
      width: 100%;
      height: 100%;
      z-index: 1;
    }
  </style>
</head>
<body>
  <div id="app"></div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
