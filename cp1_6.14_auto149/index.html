<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FlowField</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #0a0a1a;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    }

    #app {
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
    }

    #canvas-container {
      width: 80%;
      height: 90vh;
      position: relative;
      border-radius: 12px;
      box-shadow: 0 0 8px rgba(99, 102, 241, 0.2);
      overflow: hidden;
    }

    #three-canvas {
      display: block;
      width: 100%;
      height: 100%;
    }

    #overlay-canvas {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: auto;
    }

    .toolbar {
      position: absolute;
      top: 24px;
      left: calc(10% + 24px);
      width: 240px;
      background: rgba(10, 10, 30, 0.85);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      border-radius: 16px;
      padding: 20px;
      z-index: 100;
      border: 1px solid rgba(255, 255, 255, 0.06);
    }

    .toolbar-title {
      color: #a0a0b0;
      font-size: 13px;
      font-weight: 600;
      letter-spacing: 0.5px;
      margin-bottom: 16px;
      text-transform: uppercase;
    }

    .toolbar-buttons {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
    }

    .tool-btn {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      background: #4a4a6a;
      border: none;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s ease;
      color: #fff;
      font-size: 16px;
      font-weight: bold;
    }

    .tool-btn:hover {
      background: #7c7c9a;
    }

    .tool-btn.active {
      background: #f72585;
      box-shadow: 0 0 8px #f72585;
    }

    .control-points-panel {
      margin-top: 20px;
      max-height: 300px;
      overflow-y: auto;
    }

    .control-point-card {
      background: rgba(255, 255, 255, 0.04);
      border-radius: 10px;
      padding: 12px;
      margin-bottom: 10px;
      border: 1px solid rgba(255, 255, 255, 0.06);
    }

    .cp-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 10px;
    }

    .cp-title {
      color: #e0e0e0;
      font-size: 12px;
      font-weight: 600;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .cp-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
    }

    .cp-delete {
      background: transparent;
      border: none;
      color: #a0a0b0;
      cursor: pointer;
      font-size: 16px;
      padding: 2px 6px;
      border-radius: 4px;
      transition: all 0.2s ease;
    }

    .cp-delete:hover {
      background: rgba(247, 37, 133, 0.2);
      color: #f72585;
    }

    .slider-group {
      margin-bottom: 8px;
    }

    .slider-label {
      display: flex;
      justify-content: space-between;
      color: #a0a0b0;
      font-size: 11px;
      margin-bottom: 4px;
    }

    .slider-value {
      color: #f59e0b;
      font-family: 'SF Mono', 'Consolas', monospace;
    }

    input[type="range"] {
      width: 100%;
      height: 4px;
      background: #2d3748;
      border-radius: 2px;
      outline: none;
      -webkit-appearance: none;
      appearance: none;
    }

    input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none;
      appearance: none;
      width: 16px;
      height: 24px;
      background: #f72585;
      border-radius: 8px;
      cursor: pointer;
      box-shadow: 0 2px 6px rgba(247, 37, 133, 0.4);
      transition: all 0.2s ease;
    }

    input[type="range"]::-webkit-slider-thumb:hover {
      box-shadow: 0 2px 10px rgba(247, 37, 133, 0.6);
    }

    input[type="range"]::-moz-range-thumb {
      width: 16px;
      height: 24px;
      background: #f72585;
      border-radius: 8px;
      cursor: pointer;
      border: none;
      box-shadow: 0 2px 6px rgba(247, 37, 133, 0.4);
    }

    .performance-info {
      position: absolute;
      bottom: 24px;
      right: calc(10% + 24px);
      background: rgba(0, 0, 0, 0.5);
      border-radius: 8px;
      padding: 4px 12px;
      font-family: 'SF Mono', 'Consolas', monospace;
      font-size: 12px;
      color: #a0a0b0;
      z-index: 100;
      display: flex;
      gap: 16px;
    }

    .settings-modal {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.6);
      display: none;
      align-items: flex-end;
      justify-content: center;
      z-index: 200;
      backdrop-filter: blur(4px);
    }

    .settings-modal.visible {
      display: flex;
    }

    .settings-panel {
      width: 320px;
      background: #1a1a2e;
      border-radius: 12px;
      padding: 24px;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5);
      margin-bottom: 40px;
      animation: slideUp 0.3s cubic-bezier(0.22, 1, 0.36, 1);
    }

    @keyframes slideUp {
      from {
        transform: translateY(100%);
        opacity: 0;
      }
      to {
        transform: translateY(0);
        opacity: 1;
      }
    }

    .settings-title {
      color: #e0e0e0;
      font-size: 16px;
      font-weight: 600;
      margin-bottom: 20px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .settings-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 16px;
    }

    .settings-label {
      color: #a0a0b0;
      font-size: 13px;
    }

    .settings-input-group {
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .settings-input {
      width: 60px;
      padding: 6px 8px;
      background: transparent;
      border: 1px solid #64748b;
      border-radius: 4px;
      color: #e0e0e0;
      font-family: 'SF Mono', 'Consolas', monospace;
      font-size: 14px;
      text-align: right;
      outline: none;
      transition: all 0.2s ease;
    }

    .settings-input:focus {
      border-color: #f72585;
      box-shadow: 0 0 0 2px rgba(247, 37, 133, 0.2);
    }

    .settings-unit {
      color: #64748b;
      font-size: 12px;
      font-family: 'SF Mono', 'Consolas', monospace;
    }

    .settings-close {
      width: 100%;
      padding: 10px;
      background: linear-gradient(135deg, #4361ee, #f72585);
      border: none;
      border-radius: 8px;
      color: #fff;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      margin-top: 8px;
      transition: all 0.2s ease;
    }

    .settings-close:hover {
      transform: translateY(-1px);
      box-shadow: 0 4px 12px rgba(247, 37, 133, 0.3);
    }

    .control-points-panel::-webkit-scrollbar {
      width: 4px;
    }

    .control-points-panel::-webkit-scrollbar-track {
      background: transparent;
    }

    .control-points-panel::-webkit-scrollbar-thumb {
      background: #4a4a6a;
      border-radius: 2px;
    }
  </style>
</head>
<body>
  <div id="app">
    <div id="canvas-container">
      <canvas id="three-canvas"></canvas>
      <canvas id="overlay-canvas"></canvas>
    </div>

    <div class="toolbar">
      <div class="toolbar-title">控制点工具栏</div>
      <div class="toolbar-buttons">
        <button class="tool-btn" id="btn-add" title="添加控制点">+</button>
        <button class="tool-btn" id="btn-delete" title="删除控制点">−</button>
        <button class="tool-btn" id="btn-reset" title="重置流线">↻</button>
        <button class="tool-btn active" id="btn-play" title="播放/暂停">▶</button>
      </div>
      <div class="control-points-panel" id="cp-panel"></div>
    </div>

    <div class="performance-info" id="perf-info">
      <span id="fps">FPS: 60</span>
      <span id="particles">粒子: 0</span>
    </div>

    <div class="settings-modal" id="settings-modal">
      <div class="settings-panel">
        <div class="settings-title">
          <span class="cp-dot" id="modal-cp-dot"></span>
          <span>控制点设置</span>
        </div>
        <div class="settings-row">
          <span class="settings-label">X 坐标</span>
          <div class="settings-input-group">
            <input type="number" class="settings-input" id="input-x" step="1" />
            <span class="settings-unit">px</span>
          </div>
        </div>
        <div class="settings-row">
          <span class="settings-label">Y 坐标</span>
          <div class="settings-input-group">
            <input type="number" class="settings-input" id="input-y" step="1" />
            <span class="settings-unit">px</span>
          </div>
        </div>
        <div class="settings-row">
          <span class="settings-label">旋转角度</span>
          <div class="settings-input-group">
            <input type="number" class="settings-input" id="input-angle" step="1" min="-180" max="180" />
            <span class="settings-unit">°</span>
          </div>
        </div>
        <div class="settings-row">
          <span class="settings-label">影响半径</span>
          <div class="settings-input-group">
            <input type="number" class="settings-input" id="input-radius" step="5" min="20" max="200" />
            <span class="settings-unit">px</span>
          </div>
        </div>
        <div class="settings-row">
          <span class="settings-label">强度</span>
          <div class="settings-input-group">
            <input type="number" class="settings-input" id="input-strength" step="0.1" min="0.1" max="3.0" />
            <span class="settings-unit"></span>
          </div>
        </div>
        <button class="settings-close" id="modal-close">确认</button>
      </div>
    </div>
  </div>

  <script type="module" src="/src/main.ts"></script>
</body>
</html>
