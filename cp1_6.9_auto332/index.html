<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>思绪星云 - Thought Nebula</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    }
    #app {
      width: 100%;
      height: 100%;
      position: relative;
    }
    #controls-panel {
      position: absolute;
      top: 20px;
      right: 20px;
      z-index: 100;
      background: rgba(255, 255, 255, 0.12);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      border-radius: 8px;
      padding: 16px 20px;
      min-width: 180px;
      border: 1px solid rgba(255, 255, 255, 0.15);
    }
    #controls-panel .label {
      color: #cccccc;
      font-size: 14px;
      margin-bottom: 10px;
      display: block;
      user-select: none;
    }
    #emotion-slider {
      width: 100%;
      height: 4px;
      -webkit-appearance: none;
      appearance: none;
      background: rgba(255, 255, 255, 0.3);
      border-radius: 2px;
      outline: none;
      cursor: pointer;
      margin-bottom: 14px;
    }
    #emotion-slider::-webkit-slider-thumb {
      -webkit-appearance: none;
      appearance: none;
      width: 18px;
      height: 18px;
      border-radius: 50%;
      background: #ffffff;
      cursor: pointer;
      box-shadow: 0 2px 6px rgba(0, 0, 0, 0.3);
      transition: transform 0.2s ease;
    }
    #emotion-slider::-webkit-slider-thumb:hover {
      transform: scale(1.1);
    }
    #emotion-slider::-moz-range-thumb {
      width: 18px;
      height: 18px;
      border-radius: 50%;
      background: #ffffff;
      cursor: pointer;
      border: none;
      box-shadow: 0 2px 6px rgba(0, 0, 0, 0.3);
    }
    #reset-btn {
      width: 100%;
      padding: 8px 0;
      background: rgba(255, 255, 255, 0.15);
      color: #ffffff;
      border: 1px solid rgba(255, 255, 255, 0.25);
      border-radius: 6px;
      font-size: 13px;
      cursor: pointer;
      transition: all 0.2s ease;
      user-select: none;
    }
    #reset-btn:hover {
      background: rgba(255, 255, 255, 0.25);
      transform: translateY(-1px);
    }
    #reset-btn:active {
      transform: translateY(0);
    }
  </style>
</head>
<body>
  <div id="app">
    <div id="controls-panel">
      <span class="label">情绪</span>
      <input type="range" id="emotion-slider" min="0" max="1" step="0.01" value="0">
      <button id="reset-btn">重置</button>
    </div>
  </div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
