<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>天气塔防 - Weather Tower Defense</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #1e1e2e;
      font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, sans-serif;
      color: #e0e0e0;
      user-select: none;
    }

    #app {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      width: 100%;
      height: 100%;
      position: relative;
      overflow: hidden;
    }

    #canvas-container {
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
      flex: 1;
      width: 100%;
    }

    #game-canvas {
      display: block;
      background: #1e1e2e;
      border-radius: 8px;
      box-shadow: 0 0 40px rgba(76, 201, 240, 0.1);
    }

    #weather-banner {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      padding: 14px 20px;
      text-align: center;
      font-size: 18px;
      font-weight: 600;
      letter-spacing: 2px;
      z-index: 100;
      transform: translateY(-100%);
      transition: transform 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
      pointer-events: none;
      text-shadow: 0 2px 8px rgba(0, 0, 0, 0.5);
    }

    #weather-banner.show {
      transform: translateY(0);
    }

    #weather-banner.sunny {
      background: linear-gradient(135deg, rgba(255, 193, 7, 0.85) 0%, rgba(255, 152, 0, 0.85) 100%);
    }

    #weather-banner.rainy {
      background: linear-gradient(135deg, rgba(66, 165, 245, 0.85) 0%, rgba(33, 150, 243, 0.85) 100%);
    }

    #weather-banner.thunderstorm {
      background: linear-gradient(135deg, rgba(156, 39, 176, 0.85) 0%, rgba(103, 58, 183, 0.85) 100%);
    }

    #weather-banner.cloudy {
      background: linear-gradient(135deg, rgba(158, 158, 158, 0.85) 0%, rgba(120, 144, 156, 0.85) 100%);
    }

    #hud {
      position: fixed;
      bottom: 20px;
      right: 20px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      z-index: 50;
    }

    .hud-panel {
      padding: 12px 20px;
      border-radius: 12px;
      background: rgba(30, 30, 46, 0.6);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      border: 1px solid rgba(76, 201, 240, 0.3);
      display: flex;
      align-items: center;
      gap: 10px;
      min-width: 140px;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
    }

    .hud-icon {
      font-size: 22px;
    }

    .hud-value {
      font-size: 22px;
      font-weight: 700;
      font-family: 'Courier New', monospace;
      transition: transform 0.2s cubic-bezier(0.34, 1.56, 0.64, 1);
    }

    .hud-value.bounce {
      transform: scale(1.3);
    }

    .hud-label {
      font-size: 12px;
      opacity: 0.7;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .hud-content {
      display: flex;
      flex-direction: column;
      flex: 1;
    }

    #health-value {
      color: #ff6b6b;
    }

    #coin-value {
      color: #ffd93d;
    }

    #wave-value {
      color: #4cc9f0;
    }

    #tower-menu {
      position: fixed;
      display: none;
      z-index: 80;
      pointer-events: none;
    }

    #tower-menu.show {
      display: flex;
      pointer-events: auto;
      animation: menuScaleIn 0.2s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
    }

    #tower-menu.hide {
      animation: menuFadeOut 0.2s ease-out forwards;
    }

    @keyframes menuScaleIn {
      0% { transform: translate(-50%, -50%) scale(0); opacity: 0; }
      100% { transform: translate(-50%, -50%) scale(1); opacity: 1; }
    }

    @keyframes menuFadeOut {
      0% { opacity: 1; }
      100% { opacity: 0; }
    }

    .tower-card {
      width: 90px;
      height: 110px;
      background: rgba(30, 30, 46, 0.95);
      border: 2px solid #00f5d4;
      border-radius: 12px;
      padding: 8px;
      cursor: pointer;
      transition: all 0.15s ease;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: space-between;
      position: relative;
      box-shadow: 0 0 20px rgba(0, 245, 212, 0.2);
      margin: 0 6px;
    }

    .tower-card:hover {
      transform: scale(1.05);
      box-shadow: 0 0 30px rgba(0, 245, 212, 0.4);
    }

    .tower-card.disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .tower-card.disabled:hover {
      transform: scale(1);
    }

    .tower-icon {
      font-size: 36px;
      line-height: 1;
    }

    .tower-name {
      font-size: 12px;
      font-weight: 600;
      text-align: center;
    }

    .tower-stats {
      display: flex;
      flex-direction: column;
      gap: 2px;
      font-size: 10px;
      width: 100%;
    }

    .tower-stat-row {
      display: flex;
      justify-content: space-between;
    }

    .tower-cost {
      color: #ffd93d;
      font-weight: 700;
      font-size: 12px;
    }

    .stat-buff {
      color: #00f5a0 !important;
      animation: statGlowGreen 0.6s ease-in-out;
    }

    .stat-nerf {
      color: #ff5555 !important;
      animation: statGlowRed 0.6s ease-in-out;
    }

    @keyframes statGlowGreen {
      0%, 100% { text-shadow: none; }
      50% { text-shadow: 0 0 8px #00f5a0, 0 0 16px #00f5a0; }
    }

    @keyframes statGlowRed {
      0%, 100% { text-shadow: none; }
      50% { text-shadow: 0 0 8px #ff5555, 0 0 16px #ff5555; }
    }

    #tower-property-panel {
      position: fixed;
      top: 50%;
      left: 20px;
      transform: translateY(-50%);
      width: 200px;
      background: rgba(30, 30, 46, 0.7);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      border: 1px solid rgba(0, 245, 212, 0.4);
      border-radius: 12px;
      padding: 16px;
      z-index: 40;
      display: none;
    }

    #tower-property-panel.show {
      display: block;
    }

    #game-title {
      position: fixed;
      top: 16px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 14px;
      letter-spacing: 4px;
      text-transform: uppercase;
      opacity: 0.5;
      z-index: 10;
    }

    @media (max-width: 768px) {
      #hud {
        bottom: 10px;
        right: 10px;
      }

      .hud-panel {
        padding: 8px 14px;
        min-width: 110px;
      }

      .hud-value {
        font-size: 18px;
      }

      .tower-card {
        width: 70px;
        height: 90px;
        margin: 0 3px;
      }

      .tower-icon {
        font-size: 28px;
      }

      #tower-property-panel {
        left: 10px;
        width: 150px;
        padding: 10px;
      }
    }
  </style>
</head>
<body>
  <div id="app">
    <div id="game-title">Weather Tower Defense</div>
    <div id="weather-banner"></div>
    
    <div id="canvas-container">
      <canvas id="game-canvas"></canvas>
    </div>

    <div id="hud">
      <div class="hud-panel">
        <span class="hud-icon">❤️</span>
        <div class="hud-content">
          <span class="hud-label">Life</span>
          <span id="health-value" class="hud-value">10</span>
        </div>
      </div>
      <div class="hud-panel">
        <span class="hud-icon">🪙</span>
        <div class="hud-content">
          <span class="hud-label">Gold</span>
          <span id="coin-value" class="hud-value">100</span>
        </div>
      </div>
      <div class="hud-panel">
        <span class="hud-icon">⚔️</span>
        <div class="hud-content">
          <span class="hud-label">Wave</span>
          <span id="wave-value" class="hud-value">1</span>
        </div>
      </div>
    </div>

    <div id="tower-menu"></div>
    <div id="tower-property-panel"></div>
  </div>

  <script type="module" src="/src/main.ts"></script>
</body>
</html>
