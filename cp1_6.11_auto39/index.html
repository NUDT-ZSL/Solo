<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>因果织网 - Causal Weave</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Noto+Sans+SC:wght@300;400;500;700&display=swap" rel="stylesheet">
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      
      html, body {
        width: 100%;
        height: 100%;
        overflow: hidden;
      }
      
      body {
        background: linear-gradient(135deg, #1A1A2E 0%, #16213E 50%, #0F0F23 100%);
        font-family: 'Noto Sans SC', sans-serif;
        color: #ffffff;
      }
      
      #root {
        width: 100%;
        height: 100%;
      }
      
      .stars {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        pointer-events: none;
        z-index: 0;
      }
      
      .star {
        position: absolute;
        background: #ffffff;
        border-radius: 50%;
        animation: twinkle 3s infinite;
      }
      
      @keyframes twinkle {
        0%, 100% { opacity: 0.3; }
        50% { opacity: 1; }
      }
      
      .loading-container {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        background: linear-gradient(135deg, #1A1A2E 0%, #16213E 50%, #0F0F23 100%);
        z-index: 9999;
        transition: opacity 0.5s ease;
      }
      
      .loading-container.hidden {
        opacity: 0;
        pointer-events: none;
      }
      
      .loading-title {
        font-family: 'Orbitron', sans-serif;
        font-size: 2.5rem;
        font-weight: 900;
        background: linear-gradient(90deg, #00D4FF, #FF8C00, #FFD700);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        margin-bottom: 2rem;
        letter-spacing: 0.2em;
      }
      
      .loading-spinner {
        width: 80px;
        height: 80px;
        position: relative;
      }
      
      .loading-ring {
        position: absolute;
        width: 100%;
        height: 100%;
        border: 3px solid transparent;
        border-top-color: #00D4FF;
        border-radius: 50%;
        animation: spin 1.5s linear infinite;
      }
      
      .loading-ring:nth-child(2) {
        width: 60px;
        height: 60px;
        top: 10px;
        left: 10px;
        border-top-color: #FF8C00;
        animation-duration: 1s;
        animation-direction: reverse;
      }
      
      .loading-ring:nth-child(3) {
        width: 40px;
        height: 40px;
        top: 20px;
        left: 20px;
        border-top-color: #FFD700;
        animation-duration: 0.75s;
      }
      
      @keyframes spin {
        0% { transform: rotate(0deg); }
        100% { transform: rotate(360deg); }
      }
      
      .loading-text {
        margin-top: 1.5rem;
        font-size: 0.9rem;
        color: rgba(255, 255, 255, 0.6);
        letter-spacing: 0.3em;
      }
      
      .loading-dot {
        display: inline-block;
        animation: dot-bounce 1.4s infinite ease-in-out both;
      }
      
      .loading-dot:nth-child(1) { animation-delay: -0.32s; }
      .loading-dot:nth-child(2) { animation-delay: -0.16s; }
      
      @keyframes dot-bounce {
        0%, 80%, 100% { transform: scale(0); }
        40% { transform: scale(1); }
      }
    </style>
  </head>
  <body>
    <div class="stars" id="stars"></div>
    
    <div class="loading-container" id="loading">
      <h1 class="loading-title">因果织网</h1>
      <div class="loading-spinner">
        <div class="loading-ring"></div>
        <div class="loading-ring"></div>
        <div class="loading-ring"></div>
      </div>
      <p class="loading-text">
        正在初始化<span class="loading-dot">.</span><span class="loading-dot">.</span><span class="loading-dot">.</span>
      </p>
    </div>
    
    <div id="root"></div>
    
    <script>
      (function createStars() {
        const starsContainer = document.getElementById('stars');
        if (!starsContainer) return;
        
        const starCount = 150;
        for (let i = 0; i < starCount; i++) {
          const star = document.createElement('div');
          star.className = 'star';
          star.style.left = Math.random() * 100 + '%';
          star.style.top = Math.random() * 100 + '%';
          star.style.width = (Math.random() * 2 + 1) + 'px';
          star.style.height = star.style.width;
          star.style.animationDelay = Math.random() * 3 + 's';
          starsContainer.appendChild(star);
        }
      })();
      
      window.addEventListener('load', function() {
        setTimeout(function() {
          const loading = document.getElementById('loading');
          if (loading) {
            loading.classList.add('hidden');
            setTimeout(function() {
              loading.remove();
            }, 500);
          }
        }, 800);
      });
    </script>
    
    <script type="module" src="/src/client/main.tsx"></script>
  </body>
</html>
