<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>元素共鸣</title>
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #0a0a2e;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      overflow: hidden;
      font-family: 'Press Start 2P', monospace;
    }

    #game-container {
      position: relative;
      image-rendering: pixelated;
      image-rendering: crisp-edges;
    }

    canvas {
      display: block;
      image-rendering: pixelated;
      image-rendering: crisp-edges;
      border: 2px solid #2a2a5a;
    }

    #hud {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
    }

    #hud-level {
      position: absolute;
      top: 12px;
      left: 14px;
      color: #ccccee;
      font-size: 10px;
      line-height: 1.8;
      text-shadow: 0 0 6px #0000aa, 1px 1px 0 #000;
    }

    #hud-stars {
      margin-top: 4px;
      font-size: 12px;
      letter-spacing: 2px;
    }

    .star-on {
      color: #ffdd44;
      text-shadow: 0 0 8px #ffaa00;
    }

    .star-off {
      color: #333355;
    }

    #btn-pause {
      position: absolute;
      top: 12px;
      right: 14px;
      pointer-events: all;
      cursor: pointer;
      background: rgba(20, 20, 60, 0.6);
      backdrop-filter: blur(6px);
      -webkit-backdrop-filter: blur(6px);
      border: 1px solid rgba(100, 100, 200, 0.4);
      color: #aaaadd;
      font-family: 'Press Start 2P', monospace;
      font-size: 9px;
      padding: 6px 10px;
      border-radius: 4px;
      transition: background 0.2s, color 0.2s;
    }

    #btn-pause:hover {
      background: rgba(40, 40, 100, 0.8);
      color: #ddddff;
    }

    #hud-controls {
      position: absolute;
      bottom: 10px;
      left: 50%;
      transform: translateX(-50%);
      color: rgba(170, 170, 220, 0.5);
      font-size: 8px;
      white-space: nowrap;
      letter-spacing: 1px;
    }

    #pause-overlay {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(5, 5, 20, 0.75);
      display: none;
      justify-content: center;
      align-items: center;
      flex-direction: column;
      pointer-events: all;
    }

    #pause-overlay.active {
      display: flex;
    }

    #pause-overlay h2 {
      color: #ccccee;
      font-size: 14px;
      margin-bottom: 24px;
      text-shadow: 0 0 10px #4444ff;
    }

    .pause-btn {
      background: rgba(20, 20, 60, 0.8);
      border: 1px solid #4444aa;
      color: #aaaadd;
      font-family: 'Press Start 2P', monospace;
      font-size: 10px;
      padding: 10px 24px;
      margin: 6px;
      cursor: pointer;
      border-radius: 4px;
      transition: background 0.2s, color 0.2s;
    }

    .pause-btn:hover {
      background: rgba(40, 40, 120, 0.9);
      color: #ddddff;
    }

    #level-complete-overlay {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(5, 5, 20, 0.8);
      display: none;
      justify-content: center;
      align-items: center;
      flex-direction: column;
      pointer-events: all;
    }

    #level-complete-overlay.active {
      display: flex;
    }

    #level-complete-overlay h2 {
      color: #ffdd44;
      font-size: 14px;
      margin-bottom: 12px;
      text-shadow: 0 0 10px #ffaa00;
    }

    #complete-stars {
      font-size: 20px;
      letter-spacing: 4px;
      margin-bottom: 20px;
    }

    #menu-overlay {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(5, 5, 20, 0.9);
      display: flex;
      justify-content: center;
      align-items: center;
      flex-direction: column;
      pointer-events: all;
    }

    #menu-overlay h1 {
      color: #ffdd44;
      font-size: 16px;
      margin-bottom: 8px;
      text-shadow: 0 0 14px #ff8800;
      letter-spacing: 2px;
    }

    #menu-overlay .subtitle {
      color: #7777aa;
      font-size: 8px;
      margin-bottom: 32px;
      letter-spacing: 1px;
    }

    .menu-btn {
      background: rgba(20, 20, 60, 0.8);
      border: 1px solid #4444aa;
      color: #aaaadd;
      font-family: 'Press Start 2P', monospace;
      font-size: 10px;
      padding: 12px 28px;
      margin: 6px;
      cursor: pointer;
      border-radius: 4px;
      transition: background 0.2s, color 0.2s;
    }

    .menu-btn:hover {
      background: rgba(60, 40, 140, 0.9);
      color: #ffdd44;
    }

    #sequence-hint {
      position: absolute;
      top: 50px;
      left: 14px;
      color: rgba(150, 150, 200, 0.7);
      font-size: 7px;
      line-height: 1.6;
    }

    #sequence-hint .seq-element {
      display: inline-block;
      width: 10px;
      height: 10px;
      margin-right: 3px;
      vertical-align: middle;
    }
  </style>
</head>
<body>
  <div id="game-container">
    <canvas id="game-canvas"></canvas>
    <div id="hud">
      <div id="hud-level">
        <div id="level-text">LEVEL 1</div>
        <div id="hud-stars">
          <span class="star-off">&#9733;</span>
          <span class="star-off">&#9733;</span>
          <span class="star-off">&#9733;</span>
        </div>
      </div>
      <div id="sequence-hint"></div>
      <button id="btn-pause">| |</button>
      <div id="hud-controls">WASD - MOVE &nbsp; R - RESTART</div>
      <div id="pause-overlay">
        <h2>PAUSED</h2>
        <button class="pause-btn" id="btn-resume">RESUME</button>
        <button class="pause-btn" id="btn-restart-pause">RESTART</button>
      </div>
      <div id="level-complete-overlay">
        <h2>CLEAR!</h2>
        <div id="complete-stars"></div>
        <button class="pause-btn" id="btn-next">NEXT</button>
      </div>
      <div id="menu-overlay">
        <h1>&#x2726; 元素共鸣 &#x2726;</h1>
        <div class="subtitle">ELEMENT RESONANCE</div>
        <button class="menu-btn" id="btn-start">START</button>
      </div>
    </div>
  </div>
  <script type="module" src="/src/game.js"></script>
</body>
</html>
