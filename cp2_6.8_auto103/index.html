<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pixel Arcade Racer</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      background: #1A202C;
      display: flex;
      justify-content: center;
      align-items: center;
      font-family: 'Courier New', Courier, monospace;
      overflow: hidden;
    }

    .game-wrapper {
      display: flex;
      align-items: center;
      gap: 0;
      position: relative;
    }

    .game-container {
      position: relative;
      box-shadow: 0 0 15px rgba(255, 255, 255, 0.3), inset 0 0 8px rgba(255, 255, 255, 0.2);
      border: 1px solid #ffffff;
    }

    canvas {
      display: block;
      image-rendering: pixelated;
      image-rendering: -moz-crisp-edges;
      image-rendering: crisp-edges;
    }

    .dashboard-panel {
      width: 200px;
      height: 600px;
      background: #000000;
      border: 2px solid #4A5568;
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 24px;
    }

    .dashboard-title {
      color: #FFD700;
      font-size: 14px;
      text-align: center;
      letter-spacing: 2px;
      border-bottom: 1px solid #4A5568;
      padding-bottom: 8px;
      font-weight: bold;
    }

    .speed-section {
      text-align: center;
    }

    .speed-label {
      color: #718096;
      font-size: 12px;
      margin-bottom: 4px;
    }

    .speed-value {
      color: #00FF00;
      font-size: 18px;
      font-weight: bold;
      transition: transform 0.05s;
      font-family: 'Courier New', Courier, monospace;
    }

    .speed-value.bump {
      transform: translateY(-2px);
    }

    .speed-unit {
      color: #4A5568;
      font-size: 10px;
    }

    .score-section {
      text-align: center;
    }

    .score-label {
      color: #718096;
      font-size: 12px;
      margin-bottom: 4px;
    }

    .score-value {
      color: #ffffff;
      font-size: 24px;
      font-weight: bold;
      transition: transform 0.05s;
      font-family: 'Courier New', Courier, monospace;
    }

    .score-value.bump {
      transform: translateY(-2px);
    }

    .coins-section {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
    }

    .coin-icon {
      width: 10px;
      height: 10px;
      background: #FFD700;
      border-radius: 50%;
      box-shadow: 0 0 4px #FFD700;
    }

    .coins-value {
      color: #ECC94B;
      font-size: 12px;
      font-weight: bold;
      transition: transform 0.05s;
      font-family: 'Courier New', Courier, monospace;
    }

    .coins-value.bump {
      transform: translateY(-2px);
    }

    .controls-hint {
      margin-top: auto;
      color: #4A5568;
      font-size: 10px;
      line-height: 1.6;
      border-top: 1px solid #2D3748;
      padding-top: 12px;
    }

    .controls-hint div {
      margin-bottom: 4px;
    }

    .key {
      display: inline-block;
      background: #2D3748;
      color: #ECC94B;
      padding: 1px 5px;
      border-radius: 2px;
      font-size: 9px;
      border: 1px solid #4A5568;
    }
  </style>
</head>
<body>
  <div class="game-wrapper">
    <div class="game-container">
      <canvas id="gameCanvas" width="400" height="600"></canvas>
    </div>
    <div class="dashboard-panel">
      <div class="dashboard-title">DASHBOARD</div>

      <div class="speed-section">
        <div class="speed-label">SPEED</div>
        <div class="speed-value" id="speedValue">0</div>
        <div class="speed-unit">KM/H</div>
      </div>

      <div class="score-section">
        <div class="score-label">SCORE</div>
        <div class="score-value" id="scoreValue">0</div>
      </div>

      <div class="coins-section">
        <div class="coin-icon"></div>
        <div class="coins-value" id="coinsValue">0</div>
      </div>

      <div class="controls-hint">
        <div><span class="key">←</span> <span class="key">→</span> MOVE</div>
        <div><span class="key">↑</span> ACCELERATE</div>
        <div><span class="key">↓</span> BRAKE</div>
        <div><span class="key">SPACE</span> RESTART</div>
      </div>
    </div>
  </div>

  <script type="module" src="/src/main.ts"></script>
</body>
</html>
