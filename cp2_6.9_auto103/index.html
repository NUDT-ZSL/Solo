<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI 涂鸦接龙 · Exquisite Corpse</title>
  <link rel="stylesheet" href="/src/styles.css" />
</head>
<body>
  <div id="app">
    <!-- 大厅 / 登录界面 -->
    <div id="lobby" class="lobby">
      <div class="lobby-card">
        <h1 class="title">🎨 AI 涂鸦接龙</h1>
        <p class="subtitle">Exquisite Corpse · 协作艺术接龙</p>
        <div class="form-group">
          <label>你的昵称</label>
          <input type="text" id="nickname" placeholder="输入昵称" maxlength="12" value="匿名玩家" />
        </div>
        <div class="lobby-actions">
          <button id="createRoomBtn" class="btn btn-primary">创建房间</button>
          <div class="join-group">
            <input type="text" id="roomCodeInput" placeholder="输入 6 位房间号" maxlength="6" />
            <button id="joinRoomBtn" class="btn btn-secondary">加入房间</button>
          </div>
        </div>
        <div id="errorMsg" class="error-msg"></div>
      </div>
    </div>

    <!-- 游戏主界面 -->
    <div id="gameRoot" class="game-root hidden">
      <!-- 左侧玩家信息 -->
      <aside class="left-panel">
        <div class="room-info">
          <div class="room-code">房间号 <span id="roomCodeDisplay">------</span></div>
          <button id="copyRoomBtn" class="btn-tiny">复制</button>
        </div>
        <div class="players-grid" id="playersGrid"></div>
        <div class="turn-timer">
          <span>倒计时</span>
          <strong id="timerDisplay">15</strong>
          <span>s</span>
        </div>
        <div class="room-controls">
          <button id="startGameBtn" class="btn btn-primary">开始游戏</button>
          <button id="leaveRoomBtn" class="btn btn-ghost">离开房间</button>
        </div>
      </aside>

      <!-- 画布主区域 -->
      <main class="canvas-area">
        <div class="canvas-wrapper">
          <canvas id="drawingCanvas"></canvas>
          <!-- 当前轮次指示器 -->
          <div id="turnIndicator" class="turn-indicator hidden">
            <span class="dot"></span>
            <span id="turnNickname">玩家</span>
          </div>
          <!-- 评分气泡 -->
          <div id="scoreBubble" class="score-bubble"></div>
          <!-- 工具栏 -->
          <div class="toolbar">
            <div class="tool-group">
              <button class="tool-btn active" data-tool="freehand" title="自由手绘">✏️</button>
              <button class="tool-btn" data-tool="line" title="直线">／</button>
              <button class="tool-btn" data-tool="curve" title="曲线">〰️</button>
              <button class="tool-btn" data-tool="polygon" title="填充多边形">⬣</button>
            </div>
            <div class="palette" id="palette"></div>
            <div class="width-picker">
              <span>笔宽</span>
              <input type="range" id="widthSlider" min="1" max="8" value="3" />
              <span id="widthValue">3</span>
            </div>
            <div class="zoom-controls">
              <button id="zoomOutBtn" title="缩小">−</button>
              <span id="zoomDisplay">100%</span>
              <button id="zoomInBtn" title="放大">+</button>
              <button id="resetViewBtn" title="重置视图">⟲</button>
            </div>
          </div>
        </div>
      </main>

      <!-- 右侧聊天 / 叙事流 -->
      <aside class="right-panel">
        <div class="chat-header">🎭 叙事接龙</div>
        <div id="chatMessages" class="chat-messages"></div>
      </aside>
    </div>
  </div>

  <script type="module" src="/src/main.ts"></script>
</body>
</html>
