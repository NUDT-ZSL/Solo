<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Crystal Space</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #05050F;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
            color: #E6EDF3;
        }

        #canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            display: block;
        }

        .control-panel {
            position: fixed;
            top: 20px;
            left: 20px;
            background-color: rgba(13, 17, 23, 0.7);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border-radius: 12px;
            padding: 20px 24px;
            width: 280px;
            border: 1px solid rgba(255, 255, 255, 0.08);
            transition: border-color 0.2s ease;
        }

        .control-panel:hover {
            border-color: rgba(255, 255, 255, 0.25);
        }

        .control-panel h3 {
            font-size: 14px;
            font-weight: 600;
            margin-bottom: 16px;
            color: #F0F6FC;
            letter-spacing: 0.5px;
        }

        .slider-group {
            margin-bottom: 16px;
        }

        .slider-group:last-child {
            margin-bottom: 0;
        }

        .slider-label {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
        }

        .slider-label span:first-child {
            font-size: 12px;
            color: #8B949E;
        }

        .slider-label span:last-child {
            font-size: 12px;
            font-weight: 600;
            color: #58A6FF;
        }

        input[type="range"] {
            -webkit-appearance: none;
            appearance: none;
            width: 100%;
            height: 4px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 2px;
            outline: none;
            cursor: pointer;
            transition: background 0.2s ease;
        }

        input[type="range"]:hover {
            background: rgba(255, 255, 255, 0.18);
        }

        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 16px;
            height: 16px;
            background: #58A6FF;
            border-radius: 50%;
            cursor: pointer;
            border: 2px solid #05050F;
            transition: transform 0.15s ease, box-shadow 0.15s ease;
        }

        input[type="range"]::-webkit-slider-thumb:hover {
            transform: scale(1.15);
            box-shadow: 0 0 10px rgba(88, 166, 255, 0.5);
        }

        input[type="range"]::-moz-range-thumb {
            width: 16px;
            height: 16px;
            background: #58A6FF;
            border-radius: 50%;
            cursor: pointer;
            border: 2px solid #05050F;
            transition: transform 0.15s ease, box-shadow 0.15s ease;
        }

        input[type="range"]::-moz-range-thumb:hover {
            transform: scale(1.15);
            box-shadow: 0 0 10px rgba(88, 166, 255, 0.5);
        }

        .stats-panel {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            background-color: rgba(13, 17, 23, 0.7);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border-radius: 12px;
            padding: 16px 32px;
            display: flex;
            gap: 40px;
            border: 1px solid rgba(255, 255, 255, 0.08);
            transition: border-color 0.2s ease;
        }

        .stats-panel:hover {
            border-color: rgba(255, 255, 255, 0.25);
        }

        .stat-item {
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .stat-label {
            font-size: 11px;
            color: #8B949E;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 4px;
        }

        .stat-value {
            font-size: 18px;
            font-weight: 600;
            color: #F0F6FC;
        }

        .stat-value.color-theme {
            color: #58A6FF;
        }
    </style>
</head>
<body>
    <canvas id="canvas"></canvas>

    <div class="control-panel">
        <h3>控制面板</h3>
        <div class="slider-group">
            <div class="slider-label">
                <span>晶体密度</span>
                <span id="densityValue">225</span>
            </div>
            <input type="range" id="densitySlider" min="150" max="300" value="225" />
        </div>
        <div class="slider-group">
            <div class="slider-label">
                <span>颜色变化速度</span>
                <span id="colorSpeedValue">1.5</span>
            </div>
            <input type="range" id="colorSpeedSlider" min="0.5" max="3" step="0.1" value="1.5" />
        </div>
        <div class="slider-group">
            <div class="slider-label">
                <span>冲击波强度</span>
                <span id="shockwaveValue">2.5</span>
            </div>
            <input type="range" id="shockwaveSlider" min="1" max="4" step="0.1" value="2.5" />
        </div>
    </div>

    <div class="stats-panel">
        <div class="stat-item">
            <span class="stat-label">晶体总数</span>
            <span class="stat-value" id="totalCrystals">0</span>
        </div>
        <div class="stat-item">
            <span class="stat-label">平均高度</span>
            <span class="stat-value" id="avgHeight">0.00</span>
        </div>
        <div class="stat-item">
            <span class="stat-label">当前主题</span>
            <span class="stat-value color-theme" id="colorTheme">Nebula</span>
        </div>
    </div>

    <script type="module" src="src/main.ts"></script>
</body>
</html>
