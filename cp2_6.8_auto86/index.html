<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>3D星座连线与神话传说探索器</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      background: linear-gradient(180deg, #0A0A12 0%, #050510 100%);
      color: #E5E7EB;
    }
    #app {
      width: 100%;
      height: 100%;
      position: relative;
    }
    #canvas-container {
      width: 100%;
      height: 100%;
      position: absolute;
      top: 0;
      left: 0;
    }
    #left-panel {
      position: absolute;
      top: 0;
      left: 0;
      width: 220px;
      height: 100%;
      background: rgba(26, 26, 46, 0.85);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      border-right: 1px solid rgba(55, 65, 81, 0.5);
      padding: 20px 16px;
      overflow-y: auto;
      z-index: 10;
      transition: all 0.3s ease;
    }
    #left-panel h2 {
      font-size: 16px;
      font-weight: 600;
      color: #D4A853;
      margin-bottom: 16px;
      text-align: center;
      letter-spacing: 1px;
    }
    .constellation-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 12px;
    }
    .constellation-icon {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      background: rgba(107, 114, 128, 0.3);
      border: 2px solid #6B7280;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
      color: #9CA3AF;
      margin: 0 auto;
      position: relative;
      transition: all 0.3s ease;
    }
    .constellation-icon:hover {
      background: rgba(212, 168, 83, 0.2);
      border-color: #D4A853;
      color: #D4A853;
      transform: scale(1.05);
    }
    .constellation-icon.active {
      background: rgba(255, 215, 0, 0.25);
      border-color: #FFD700;
      color: #FFD700;
      box-shadow: 0 0 12px rgba(255, 215, 0, 0.4);
    }
    .constellation-icon.completed {
      background: rgba(78, 205, 196, 0.2);
      border-color: #4ECDC4;
      color: #4ECDC4;
    }
    .constellation-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
    }
    .constellation-name {
      font-size: 10px;
      color: #6B7280;
      opacity: 0;
      transition: opacity 0.3s ease;
      text-align: center;
      white-space: nowrap;
    }
    .constellation-item:hover .constellation-name {
      opacity: 1;
      color: #D4A853;
    }
    #bottom-bar {
      position: absolute;
      bottom: 0;
      left: 0;
      width: 100%;
      height: 60px;
      background: rgba(15, 23, 42, 0.8);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      border-top: 1px solid rgba(55, 65, 81, 0.5);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 20px;
      z-index: 10;
    }
    .control-btn {
      padding: 10px 24px;
      background: rgba(55, 65, 81, 0.6);
      border: 1px solid rgba(75, 85, 99, 0.8);
      border-radius: 8px;
      color: #E5E7EB;
      font-size: 13px;
      cursor: pointer;
      transition: all 0.3s ease;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .control-btn:hover {
      background: rgba(212, 168, 83, 0.2);
      border-color: #D4A853;
      color: #D4A853;
    }
    .control-btn:active {
      transform: scale(0.95);
    }
    .modal-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.7);
      backdrop-filter: blur(4px);
      -webkit-backdrop-filter: blur(4px);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 100;
      transition: opacity 0.3s ease;
    }
    .modal-overlay.visible {
      display: flex;
    }
    .modal {
      width: 400px;
      height: 300px;
      background: #1F2937;
      border: 1px solid #374151;
      border-radius: 12px;
      padding: 24px;
      display: flex;
      flex-direction: column;
      transition: transform 0.3s ease;
    }
    .modal-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 16px;
    }
    .modal-title {
      font-size: 20px;
      font-weight: 600;
      color: #D4A853;
    }
    .modal-close {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      background: rgba(75, 85, 99, 0.5);
      border: none;
      color: #9CA3AF;
      cursor: pointer;
      font-size: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s ease;
    }
    .modal-close:hover {
      background: rgba(239, 68, 68, 0.4);
      color: #FCA5A5;
    }
    .modal-content {
      display: flex;
      gap: 16px;
      flex: 1;
    }
    .modal-illustration {
      width: 120px;
      height: 120px;
      flex-shrink: 0;
      background: rgba(15, 23, 42, 0.6);
      border-radius: 8px;
      border: 1px solid rgba(55, 65, 81, 0.5);
    }
    .modal-text {
      flex: 1;
      font-size: 13px;
      line-height: 1.7;
      color: #D1D5DB;
      overflow-y: auto;
    }
    .hint-text {
      position: absolute;
      top: 20px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(15, 23, 42, 0.8);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      padding: 10px 20px;
      border-radius: 8px;
      border: 1px solid rgba(55, 65, 81, 0.5);
      font-size: 13px;
      color: #9CA3AF;
      z-index: 10;
      transition: all 0.3s ease;
    }
  </style>
</head>
<body>
  <div id="app">
    <div id="canvas-container"></div>
    <div id="left-panel">
      <h2>✦ 星座选择 ✦</h2>
      <div class="constellation-grid" id="constellation-grid"></div>
    </div>
    <div class="hint-text" id="hint-text">从左侧选择一个星座开始探索</div>
    <div id="bottom-bar">
      <button class="control-btn" id="btn-reset">↺ 重置连线</button>
      <button class="control-btn" id="btn-music">♪ 音乐：开启</button>
      <button class="control-btn" id="btn-export">⇩ 导出星图</button>
    </div>
    <div class="modal-overlay" id="modal-overlay">
      <div class="modal">
        <div class="modal-header">
          <span class="modal-title" id="modal-title"></span>
          <button class="modal-close" id="modal-close">×</button>
        </div>
        <div class="modal-content">
          <canvas class="modal-illustration" id="modal-illustration" width="120" height="120"></canvas>
          <div class="modal-text" id="modal-text"></div>
        </div>
      </div>
    </div>
  </div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
