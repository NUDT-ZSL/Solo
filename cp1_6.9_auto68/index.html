<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>光锥缠绕 · Light Cone Wrapping</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700;900&family=Space+Grotesk:wght@300;400;500;600&display=swap"
      rel="stylesheet"
    />
    <style>
      *,
      *::before,
      *::after {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      html,
      body,
      #app {
        width: 100%;
        height: 100%;
        overflow: hidden;
      }

      body {
        font-family: 'Space Grotesk', system-ui, -apple-system, sans-serif;
        background: linear-gradient(180deg, #0b0c10 0%, #1f2833 100%);
        color: #ffffff;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
        user-select: none;
      }

      #canvas-container {
        position: fixed;
        inset: 0;
        width: 100vw;
        height: 100vh;
        z-index: 0;
      }

      #canvas-container canvas {
        display: block;
        width: 100% !important;
        height: 100% !important;
      }

      #ui-panel {
        position: fixed;
        right: 24px;
        bottom: 24px;
        z-index: 10;
        width: 300px;
        padding: 20px 22px;
        background: rgba(255, 255, 255, 0.1);
        border: 1px solid rgba(255, 255, 255, 0.2);
        border-radius: 16px;
        backdrop-filter: blur(16px) saturate(180%);
        -webkit-backdrop-filter: blur(16px) saturate(180%);
        box-shadow:
          0 8px 32px rgba(0, 0, 0, 0.35),
          inset 0 1px 0 rgba(255, 255, 255, 0.08);
      }

      #ui-panel .panel-title {
        font-family: 'Orbitron', 'Space Grotesk', sans-serif;
        font-size: 15px;
        font-weight: 700;
        letter-spacing: 2px;
        color: #ffffff;
        margin-bottom: 18px;
        padding-bottom: 12px;
        border-bottom: 1px solid rgba(255, 255, 255, 0.12);
        text-transform: uppercase;
      }

      #ui-panel .slider-group {
        margin-bottom: 18px;
      }

      #ui-panel .slider-group:last-child {
        margin-bottom: 0;
      }

      #ui-panel .slider-label {
        display: flex;
        justify-content: space-between;
        align-items: baseline;
        margin-bottom: 8px;
      }

      #ui-panel .slider-label span:first-child {
        font-size: 13px;
        font-weight: 500;
        color: rgba(255, 255, 255, 0.85);
        letter-spacing: 0.3px;
      }

      #ui-panel .slider-value {
        font-family: 'Orbitron', monospace;
        font-size: 13px;
        font-weight: 600;
        color: #ff8a5c;
        min-width: 54px;
        text-align: right;
        letter-spacing: 0.5px;
      }

      #ui-panel input[type='range'] {
        -webkit-appearance: none;
        appearance: none;
        width: 100%;
        height: 4px;
        border-radius: 999px;
        background: linear-gradient(
          90deg,
          rgba(255, 107, 53, 0.85) 0%,
          rgba(43, 45, 66, 0.85) 100%
        );
        outline: none;
        cursor: pointer;
      }

      #ui-panel input[type='range']::-webkit-slider-thumb {
        -webkit-appearance: none;
        appearance: none;
        width: 16px;
        height: 16px;
        border-radius: 50%;
        background: #ffffff;
        border: 2px solid #ff6b35;
        box-shadow:
          0 0 0 3px rgba(255, 107, 53, 0.2),
          0 2px 8px rgba(0, 0, 0, 0.4);
        cursor: pointer;
        transition: transform 0.12s ease, box-shadow 0.12s ease;
      }

      #ui-panel input[type='range']::-webkit-slider-thumb:hover {
        transform: scale(1.15);
        box-shadow:
          0 0 0 5px rgba(255, 107, 53, 0.28),
          0 2px 12px rgba(0, 0, 0, 0.5);
      }

      #ui-panel input[type='range']::-moz-range-thumb {
        width: 16px;
        height: 16px;
        border-radius: 50%;
        background: #ffffff;
        border: 2px solid #ff6b35;
        box-shadow:
          0 0 0 3px rgba(255, 107, 53, 0.2),
          0 2px 8px rgba(0, 0, 0, 0.4);
        cursor: pointer;
      }

      @media (max-width: 1200px) {
        #ui-panel {
          width: 200px;
          padding: 14px 16px;
          right: 16px;
          bottom: 16px;
        }
        #ui-panel .panel-title {
          font-size: 12px;
          letter-spacing: 1.2px;
          margin-bottom: 12px;
          padding-bottom: 8px;
        }
        #ui-panel .slider-group {
          margin-bottom: 12px;
        }
        #ui-panel .slider-label span:first-child {
          font-size: 11px;
        }
        #ui-panel .slider-value {
          font-size: 11px;
          min-width: 42px;
        }
      }

      @media (max-width: 768px) {
        #ui-panel {
          width: 170px;
          padding: 12px 14px;
          right: 10px;
          bottom: 10px;
          border-radius: 12px;
        }
        #ui-panel .panel-title {
          font-size: 11px;
          letter-spacing: 0.8px;
          margin-bottom: 10px;
          padding-bottom: 6px;
        }
        #ui-panel .slider-label span:first-child {
          font-size: 10px;
        }
        #ui-panel .slider-value {
          font-size: 10px;
          min-width: 38px;
        }
      }

      #scene-title {
        position: fixed;
        left: 32px;
        top: 28px;
        z-index: 10;
        pointer-events: none;
      }

      #scene-title h1 {
        font-family: 'Orbitron', sans-serif;
        font-size: 22px;
        font-weight: 900;
        letter-spacing: 6px;
        color: #ffffff;
        text-shadow: 0 2px 20px rgba(255, 107, 53, 0.35);
      }

      #scene-title p {
        margin-top: 6px;
        font-size: 12px;
        font-weight: 300;
        letter-spacing: 2px;
        color: rgba(255, 255, 255, 0.55);
      }

      @media (max-width: 1200px) {
        #scene-title {
          left: 20px;
          top: 18px;
        }
        #scene-title h1 {
          font-size: 16px;
          letter-spacing: 4px;
        }
        #scene-title p {
          font-size: 10px;
          letter-spacing: 1.4px;
        }
      }

      @media (max-width: 768px) {
        #scene-title {
          left: 14px;
          top: 14px;
        }
        #scene-title h1 {
          font-size: 13px;
          letter-spacing: 2.5px;
        }
        #scene-title p {
          display: none;
        }
      }
    </style>
  </head>
  <body>
    <div id="app">
      <div id="canvas-container"></div>
      <div id="scene-title">
        <h1>LIGHT CONE</h1>
        <p>光锥缠绕 · 三维交互可视化</p>
      </div>
      <div id="ui-panel-host"></div>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
