<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>万象星盘</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: linear-gradient(135deg, #0a0015 0%, #1a0a30 50%, #0a0015 100%);
      font-family: 'Microsoft YaHei', 'PingFang SC', sans-serif;
    }
    #canvas-container {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 1;
    }
    #title {
      position: fixed;
      top: 40px;
      left: 50%;
      transform: translateX(-50%);
      color: #ffffff;
      font-size: 42px;
      font-weight: 300;
      letter-spacing: 16px;
      text-shadow: 0 0 30px rgba(180, 120, 255, 0.8), 0 0 60px rgba(180, 120, 255, 0.4);
      opacity: 0;
      animation: fadeInTitle 2s ease-out forwards;
      z-index: 10;
      pointer-events: none;
    }
    #subtitle {
      position: fixed;
      top: 100px;
      left: 50%;
      transform: translateX(-50%);
      color: rgba(200, 180, 255, 0.7);
      font-size: 14px;
      letter-spacing: 6px;
      opacity: 0;
      animation: fadeInTitle 2s ease-out 0.5s forwards;
      z-index: 10;
      pointer-events: none;
    }
    #loading {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      color: #b8a4ff;
      font-size: 18px;
      letter-spacing: 4px;
      z-index: 20;
      animation: pulseLoading 1.5s ease-in-out infinite;
    }
    #info-panel {
      position: fixed;
      bottom: 30px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      gap: 30px;
      color: rgba(200, 180, 255, 0.6);
      font-size: 12px;
      letter-spacing: 2px;
      opacity: 0;
      animation: fadeInTitle 2s ease-out 1s forwards;
      z-index: 10;
      pointer-events: none;
    }
    #info-panel span {
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: #b8a4ff;
      opacity: 0.8;
    }
    #crosshair {
      position: fixed;
      width: 24px;
      height: 24px;
      pointer-events: none;
      z-index: 100;
      display: none;
      transform: translate(-50%, -50%);
    }
    #crosshair::before, #crosshair::after {
      content: '';
      position: absolute;
      background: rgba(255, 215, 100, 0.9);
      box-shadow: 0 0 8px rgba(255, 215, 100, 0.6);
    }
    #crosshair::before {
      left: 50%;
      top: 0;
      width: 2px;
      height: 100%;
      transform: translateX(-50%);
    }
    #crosshair::after {
      top: 50%;
      left: 0;
      height: 2px;
      width: 100%;
      transform: translateY(-50%);
    }
    body.hovering-star {
      cursor: none;
    }
    body.hovering-star #crosshair {
      display: block;
    }
    @keyframes fadeInTitle {
      from { opacity: 0; transform: translateX(-50%) translateY(-10px); }
      to { opacity: 1; transform: translateX(-50%) translateY(0); }
    }
    @keyframes pulseLoading {
      0%, 100% { opacity: 0.4; }
      50% { opacity: 1; }
    }
  </style>
</head>
<body>
  <div id="loading">星盘正在初始化...</div>
  <div id="canvas-container"></div>
  <div id="crosshair"></div>
  <h1 id="title">万象星盘</h1>
  <div id="subtitle">WANXIANG STAR DISK</div>
  <div id="info-panel">
    <span><span class="dot"></span>拖拽旋转星盘</span>
    <span><span class="dot"></span>滚轮缩放</span>
    <span><span class="dot"></span>单击选中星点</span>
    <span><span class="dot"></span>双击爆裂星点</span>
  </div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
