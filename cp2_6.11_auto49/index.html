<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>声纹藻海</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: linear-gradient(180deg, #0A1C2E 0%, #1A3A2A 100%);
      background-attachment: fixed;
    }
    #canvas-container {
      width: 100%;
      height: 100%;
      position: fixed;
      top: 0;
      left: 0;
    }
    #hint {
      position: fixed;
      top: 20px;
      left: 50%;
      transform: translateX(-50%);
      color: rgba(255, 255, 255, 0.7);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      font-size: 14px;
      padding: 10px 20px;
      background: rgba(0, 0, 0, 0.3);
      border-radius: 8px;
      backdrop-filter: blur(10px);
      pointer-events: none;
      z-index: 10;
      text-align: center;
    }
    #start-btn {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      padding: 16px 32px;
      font-size: 16px;
      color: #fff;
      background: linear-gradient(135deg, #4ECDC4, #6BCB77);
      border: none;
      border-radius: 12px;
      cursor: pointer;
      z-index: 20;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      font-weight: 600;
      box-shadow: 0 4px 20px rgba(78, 205, 196, 0.4);
      transition: transform 0.2s, box-shadow 0.2s;
    }
    #start-btn:hover {
      transform: translate(-50%, -50%) scale(1.05);
      box-shadow: 0 6px 30px rgba(78, 205, 196, 0.6);
    }
    #start-btn:active {
      transform: translate(-50%, -50%) scale(0.98);
    }
  </style>
</head>
<body>
  <div id="hint">拖拽旋转视角 · 滚轮缩放 · 点击产生涟漪 · 开启麦克风让藻类随声音律动</div>
  <button id="start-btn">点击开启麦克风体验</button>
  <div id="canvas-container"></div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
