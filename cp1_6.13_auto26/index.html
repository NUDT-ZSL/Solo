<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ParticleCanvas</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #0a0a1a;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      user-select: none;
    }
    canvas {
      display: block;
      cursor: grab;
    }
    canvas:active {
      cursor: grabbing;
    }
    #tooltip {
      position: fixed;
      pointer-events: none;
      background: #ffffff;
      color: #1a1a3e;
      border-radius: 8px;
      padding: 8px 12px;
      font-size: 12px;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
      width: 140px;
      height: 60px;
      display: none;
      z-index: 1000;
      line-height: 1.5;
    }
  </style>
</head>
<body>
  <div id="tooltip"></div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
