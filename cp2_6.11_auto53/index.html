<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, min-width=1024" />
    <title>算法赛跑 - 代码性能可视化对比</title>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      html, body {
        width: 100%;
        min-height: 100vh;
        background: #0B0C10;
        overflow-x: auto;
      }
      body {
        min-width: 1024px;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      }
      #loading-screen {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100vh;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        background: #0B0C10;
        z-index: 9999;
        transition: opacity 0.5s ease;
      }
      #loading-screen.hidden {
        opacity: 0;
        pointer-events: none;
      }
      .loading-title {
        font-size: 32px;
        font-weight: 700;
        color: #66FCF1;
        letter-spacing: 4px;
        margin-bottom: 24px;
        text-shadow: 0 0 20px rgba(102, 252, 241, 0.4);
      }
      .loading-spinner {
        width: 48px;
        height: 48px;
        border: 3px solid rgba(102, 252, 241, 0.2);
        border-top-color: #66FCF1;
        border-radius: 50%;
        animation: spin 0.8s linear infinite;
      }
      .loading-tip {
        margin-top: 20px;
        font-size: 13px;
        color: #45A29E;
        letter-spacing: 2px;
      }
      @keyframes spin {
        to { transform: rotate(360deg); }
      }
    </style>
  </head>
  <body>
    <div id="loading-screen">
      <div class="loading-title">算 法 赛 跑</div>
      <div class="loading-spinner"></div>
      <div class="loading-tip">ALGORITHM RACE LOADING...</div>
    </div>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <script>
      window.addEventListener('load', () => {
        setTimeout(() => {
          const el = document.getElementById('loading-screen');
          if (el) el.classList.add('hidden');
        }, 600);
      });
    </script>
  </body>
</html>
