<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>像素孵化器</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #0D1420;
      font-family: 'Press Start 2P', 'Courier New', monospace;
      color: #F5D442;
      user-select: none;
    }

    #app {
      width: 100vw;
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background:
        linear-gradient(180deg, #0D1420 0%, #1B2838 50%, #0D1420 100%);
    }

    #border-top, #border-bottom {
      width: 100%;
      height: 40px;
      flex-shrink: 0;
      background: linear-gradient(90deg, #0D1420, #1B2838, #0D1420);
      border-top: 2px solid #F5D442;
      border-bottom: 2px solid #F5D442;
    }

    #border-top {
      border-bottom: 2px solid #F5D442;
      border-top: none;
    }

    #border-bottom {
      border-top: 2px solid #F5D442;
      border-bottom: none;
    }

    #game-container {
      position: relative;
      width: 640px;
      height: 480px;
      max-width: 100vw;
      max-height: calc(100vh - 80px);
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    #game-canvas {
      image-rendering: pixelated;
      image-rendering: crisp-edges;
      background: #1B2838;
      cursor: pointer;
      box-shadow: 0 0 20px rgba(245, 212, 66, 0.1);
    }

    #splash-screen {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: #1B2838;
      z-index: 100;
      transition: opacity 0.8s ease-out;
    }

    #splash-screen.hidden {
      opacity: 0;
      pointer-events: none;
    }

    #splash-title {
      font-size: 32px;
      color: #F5D442;
      text-shadow:
        4px 4px 0 #E25822,
        6px 6px 0 rgba(0, 0, 0, 0.5);
      margin-bottom: 32px;
      letter-spacing: 4px;
      animation: pulseTitle 2s ease-in-out infinite;
    }

    @keyframes pulseTitle {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.05); }
    }

    #splash-subtitle {
      font-size: 12px;
      color: #E25822;
      margin-bottom: 48px;
      opacity: 0.9;
    }

    #start-button {
      font-family: 'Press Start 2P', monospace;
      font-size: 14px;
      padding: 16px 40px;
      background: #F5D442;
      color: #1B2838;
      border: 4px solid #E25822;
      border-radius: 8px;
      cursor: pointer;
      letter-spacing: 2px;
      transition: all 0.15s;
      box-shadow: 0 4px 0 #E25822;
    }

    #start-button:hover {
      transform: translateY(-2px);
      box-shadow:
        0 6px 0 #E25822,
        0 0 20px rgba(245, 212, 66, 0.6);
    }

    #start-button:active {
      transform: translateY(2px);
      box-shadow: 0 2px 0 #E25822;
    }

    #evolution-toast {
      position: absolute;
      top: 20px;
      left: 50%;
      transform: translateX(-50%) scale(0);
      padding: 12px 24px;
      background: rgba(27, 40, 56, 0.95);
      border: 3px solid #F5D442;
      border-radius: 8px;
      font-size: 12px;
      color: #F5D442;
      z-index: 50;
      pointer-events: none;
      transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
      text-align: center;
      white-space: nowrap;
    }

    #evolution-toast.show {
      transform: translateX(-50%) scale(1);
    }

    #evolution-toast .ability {
      display: block;
      font-size: 10px;
      color: #E25822;
      margin-top: 8px;
    }

    #status-panel {
      position: absolute;
      top: 10px;
      right: 10px;
      width: 200px;
      height: 100px;
      background: rgba(13, 20, 32, 0.85);
      border: 2px solid rgba(245, 212, 66, 0.6);
      border-radius: 8px;
      padding: 12px;
      font-size: 8px;
      z-index: 30;
      pointer-events: none;
    }

    .status-row {
      display: flex;
      align-items: center;
      margin-bottom: 8px;
      gap: 6px;
    }

    .status-label {
      color: #F5D442;
      min-width: 60px;
    }

    .hearts-container {
      display: flex;
      gap: 2px;
    }

    .heart {
      width: 10px;
      height: 10px;
      transition: all 0.5s;
    }

    .evolution-level {
      font-size: 14px;
      font-weight: bold;
      background: linear-gradient(90deg, #F5D442, #E25822, #F5D442);
      background-size: 200% 100%;
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      animation: gradientText 2s linear infinite;
    }

    @keyframes gradientText {
      0% { background-position: 0% 50%; }
      100% { background-position: 200% 50%; }
    }

    .intimacy-bar {
      flex: 1;
      height: 8px;
      background: #1B2838;
      border: 1px solid #F5D442;
      border-radius: 4px;
      overflow: hidden;
    }

    .intimacy-fill {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, #E25822, #F5D442);
      transition: width 0.3s ease-out;
    }

    .intimacy-text {
      color: #F5D442;
      font-size: 8px;
      min-width: 28px;
      text-align: right;
    }

    #hint {
      position: absolute;
      bottom: 10px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 8px;
      color: rgba(245, 212, 66, 0.7);
      text-align: center;
      z-index: 20;
      pointer-events: none;
    }
  </style>
</head>
<body>
  <div id="app">
    <div id="border-top"></div>
    <div id="game-container">
      <canvas id="game-canvas" width="640" height="480"></canvas>
      <div id="status-panel" style="display:none;">
        <div class="status-row">
          <span class="status-label">饱食度</span>
          <div class="hearts-container" id="hearts"></div>
        </div>
        <div class="status-row">
          <span class="status-label">进化阶</span>
          <span class="evolution-level" id="evolution-level">1</span>
        </div>
        <div class="status-row">
          <span class="status-label">亲密度</span>
          <div class="intimacy-bar"><div class="intimacy-fill" id="intimacy-fill"></div></div>
          <span class="intimacy-text" id="intimacy-text">0%</span>
        </div>
      </div>
      <div id="evolution-toast"></div>
      <div id="hint" style="display:none;"></div>
      <div id="splash-screen">
        <div id="splash-title">像素孵化器</div>
        <div id="splash-subtitle">Pixel Incubator</div>
        <button id="start-button">开始游戏</button>
      </div>
    </div>
    <div id="border-bottom"></div>
  </div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
