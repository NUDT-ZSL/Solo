<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>墨迹气候</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      font-family: "STKaiti", "KaiTi", "楷体", serif;
    }

    body {
      background: linear-gradient(180deg, #ECD6B6 0%, #F5F0E8 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
    }

    body::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      opacity: 0.08;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E");
    }

    .app-container {
      display: flex;
      width: 100%;
      height: 100vh;
      padding: 30px;
      gap: 30px;
      position: relative;
      z-index: 1;
      min-width: 1200px;
      overflow-x: auto;
    }

    .left-panel {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      position: relative;
      flex-shrink: 0;
      z-index: 10;
    }

    .palette {
      background: rgba(255, 255, 255, 0.25);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      border-radius: 16px;
      padding: 16px 12px;
      display: flex;
      flex-direction: column;
      gap: 14px;
      border: 1px solid rgba(74, 53, 37, 0.15);
      box-shadow: 0 4px 20px rgba(74, 53, 37, 0.1);
    }

    .color-dot {
      width: 24px;
      height: 24px;
      border-radius: 50%;
      cursor: pointer;
      transition: transform 0.2s ease, box-shadow 0.2s ease;
      border: 2px solid rgba(255, 255, 255, 0.5);
      position: relative;
    }

    .color-dot:hover {
      transform: scale(1.15);
    }

    .color-dot.active {
      transform: scale(1.2);
      box-shadow: 0 0 0 3px rgba(74, 53, 37, 0.3), 0 0 12px currentColor;
    }

    .color-dot.rain { background-color: #4A90D9; color: #4A90D9; }
    .color-dot.heat { background-color: #D94A4A; color: #D94A4A; }
    .color-dot.thunder { background-color: #8E44AD; color: #8E44AD; }
    .color-dot.sand { background-color: #D4A017; color: #D4A017; }
    .color-dot.ink { background-color: #2C2C2C; color: #2C2C2C; }

    .canvas-wrapper {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      position: relative;
      flex-shrink: 0;
    }

    .canvas-container {
      width: 800px;
      height: 600px;
      position: relative;
      border: 0.5px solid #4A3525;
      border-radius: 4px;
      background: #F8F4EC;
      box-shadow: 0 8px 32px rgba(74, 53, 37, 0.15);
      overflow: hidden;
    }

    .canvas-container::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      opacity: 0.06;
      z-index: 2;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 400 400' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.7' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E");
    }

    #inkCanvas {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      cursor: crosshair;
      z-index: 1;
    }

    .canvas-label {
      margin-top: 12px;
      color: #4A3525;
      font-size: 14px;
      opacity: 0.7;
      letter-spacing: 2px;
    }

    .scene-container {
      flex: 1;
      display: flex;
      flex-direction: column;
      position: relative;
      min-width: 0;
    }

    .scene-wrapper {
      flex: 1;
      position: relative;
      border: 0.5px solid #4A3525;
      border-radius: 4px;
      overflow: hidden;
      background: #1a1a2e;
      box-shadow: 0 8px 32px rgba(74, 53, 37, 0.15);
    }

    #sceneCanvas {
      width: 100%;
      height: 100%;
      display: block;
    }

    .scene-label {
      margin-top: 12px;
      color: #4A3525;
      font-size: 14px;
      opacity: 0.7;
      letter-spacing: 2px;
      text-align: center;
    }

    .hint {
      position: absolute;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      color: #4A3525;
      font-size: 12px;
      opacity: 0.5;
      z-index: 10;
    }

    .clear-btn {
      margin-top: 8px;
      padding: 6px 16px;
      background: rgba(74, 53, 37, 0.1);
      border: 1px solid rgba(74, 53, 37, 0.2);
      border-radius: 6px;
      color: #4A3525;
      cursor: pointer;
      font-family: inherit;
      font-size: 12px;
      transition: all 0.2s ease;
    }

    .clear-btn:hover {
      background: rgba(74, 53, 37, 0.2);
    }
  </style>
</head>
<body>
  <div class="app-container">
    <div class="left-panel">
      <div class="palette">
        <div class="color-dot rain active" data-color="rain" title="雨天"></div>
        <div class="color-dot heat" data-color="heat" title="热浪"></div>
        <div class="color-dot thunder" data-color="thunder" title="雷电"></div>
        <div class="color-dot sand" data-color="sand" title="沙尘"></div>
        <div class="color-dot ink" data-color="ink" title="墨山"></div>
      </div>
      <button class="clear-btn" id="clearBtn">清空画布</button>
    </div>

    <div class="canvas-wrapper">
      <div class="canvas-container">
        <canvas id="inkCanvas" width="800" height="600"></canvas>
      </div>
      <div class="canvas-label">— 绘 制 墨 迹 —</div>
    </div>

    <div class="scene-container">
      <div class="scene-wrapper">
        <canvas id="sceneCanvas"></canvas>
      </div>
      <div class="scene-label">— 气 候 世 界 —</div>
    </div>
  </div>

  <div class="hint">拖拽旋转 · 滚轮缩放 · 停笔生成</div>

  <script type="module" src="/src/main.ts"></script>
</body>
</html>
