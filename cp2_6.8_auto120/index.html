<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>太空引力弹弓模拟器</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #0B0C10;
      font-family: monospace;
      color: #E2E8F0;
    }

    #app {
      display: flex;
      flex-direction: column;
      width: 100vw;
      height: 100vh;
    }

    #main-container {
      display: flex;
      flex: 1;
      overflow: hidden;
    }

    #canvas-container {
      width: 70%;
      position: relative;
      background: #0B0C10;
    }

    #game-canvas {
      display: block;
      width: 100%;
      height: 100%;
    }

    #flash-overlay {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: white;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.1s ease-out;
    }

    #right-panel {
      width: 30%;
      padding: 16px;
      background: #0B0C10;
      display: flex;
      flex-direction: column;
      gap: 16px;
      overflow-y: auto;
    }

    .panel-section {
      background: #2D3748;
      border-radius: 8px;
      padding: 16px;
    }

    .panel-title {
      font-size: 14px;
      font-weight: bold;
      margin-bottom: 12px;
      color: #E2E8F0;
      border-bottom: 1px solid #4A5568;
      padding-bottom: 8px;
    }

    .hud-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 10px;
      font-size: 12px;
    }

    .hud-label {
      color: #A0AEC0;
    }

    .hud-value {
      font-weight: bold;
    }

    .speed-value {
      color: #48BB78;
    }

    .distance-value {
      color: #F6AD55;
    }

    .angular-value {
      color: #63B3ED;
    }

    .control-group {
      margin-bottom: 12px;
    }

    .control-label {
      display: block;
      font-size: 12px;
      color: #A0AEC0;
      margin-bottom: 6px;
    }

    input[type="range"] {
      width: 100%;
      background: #4A5568;
      -webkit-appearance: none;
      height: 6px;
      border-radius: 3px;
      outline: none;
    }

    input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 14px;
      height: 14px;
      border-radius: 50%;
      background: #63B3ED;
      cursor: pointer;
    }

    .g-value-display {
      text-align: center;
      font-size: 14px;
      font-weight: bold;
      color: #63B3ED;
      margin-top: 6px;
    }

    .btn {
      font-family: monospace;
      font-size: 12px;
      padding: 8px 16px;
      background: #4A5568;
      color: white;
      border: none;
      cursor: pointer;
      transition: background 0.15s;
    }

    .btn:hover {
      background: #718096;
    }

    .btn:disabled {
      background: #2D3748;
      color: #718096;
      cursor: not-allowed;
    }

    .btn-block {
      width: 100%;
      margin-bottom: 8px;
    }

    #bottom-bar {
      height: 40px;
      background: #1A202C;
      display: flex;
      align-items: center;
      padding: 0 16px;
      gap: 12px;
      border-top: 1px solid #2D3748;
    }

    .bottom-btn {
      font-family: monospace;
      font-size: 12px;
      padding: 6px 14px;
      background: #4A5568;
      color: white;
      border: none;
      cursor: pointer;
      transition: background 0.15s;
    }

    .bottom-btn:hover {
      background: #718096;
    }

    .status-text {
      flex: 1;
      text-align: right;
      font-size: 11px;
      color: #A0AEC0;
    }

    .planet-item {
      display: flex;
      align-items: center;
      padding: 6px;
      background: #1A202C;
      border-radius: 4px;
      margin-bottom: 6px;
    }

    .planet-color-dot {
      width: 12px;
      height: 12px;
      border-radius: 50%;
      margin-right: 8px;
    }

    .planet-info {
      flex: 1;
      font-size: 11px;
    }
  </style>
</head>
<body>
  <div id="app">
    <div id="main-container">
      <div id="canvas-container">
        <canvas id="game-canvas"></canvas>
        <div id="flash-overlay"></div>
      </div>
      <div id="right-panel">
        <div class="panel-section" id="hud-section">
          <div class="panel-title">飞船状态</div>
          <div class="hud-item">
            <span class="hud-label">速度 (px/frame):</span>
            <span class="hud-value speed-value" id="hud-speed">0.00</span>
          </div>
          <div class="hud-item">
            <span class="hud-label">最近行星距离 (px):</span>
            <span class="hud-value distance-value" id="hud-distance">--</span>
          </div>
          <div class="hud-item">
            <span class="hud-label">角动量:</span>
            <span class="hud-value angular-value" id="hud-angular">0.00</span>
          </div>
        </div>

        <div class="panel-section" id="physics-section">
          <div class="panel-title">物理参数</div>
          <div class="control-group">
            <label class="control-label" for="g-slider">引力常量 G</label>
            <input type="range" id="g-slider" min="0.5" max="3.0" step="0.1" value="1.0">
            <div class="g-value-display" id="g-value">1.0</div>
          </div>
          <button class="btn btn-block" id="btn-add-planet">+ 添加行星</button>
        </div>

        <div class="panel-section" id="planets-section">
          <div class="panel-title">行星列表</div>
          <div id="planet-list"></div>
        </div>
      </div>
    </div>
    <div id="bottom-bar">
      <button class="bottom-btn" id="btn-reset">重置</button>
      <button class="bottom-btn" id="btn-launch">发射飞船</button>
      <button class="bottom-btn" id="btn-clear-trail">清空尾迹</button>
      <div class="status-text" id="status-text">就绪 - 点击发射按钮开始</div>
    </div>
  </div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
