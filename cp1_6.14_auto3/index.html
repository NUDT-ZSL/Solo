<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CityFlowHub - 3D城市交通流量时空可视化</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
    }

    body {
      background: linear-gradient(135deg, #0a0f1a 0%, #1a2744 100%);
    }

    #app {
      width: 100%;
      height: 100%;
      position: relative;
    }

    #canvas-container {
      width: 100%;
      height: 100%;
      position: absolute;
      top: 0;
      left: 0;
    }

    #heatmap-canvas {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      opacity: 0.7;
      z-index: 10;
    }

    #ui-panel {
      position: absolute;
      bottom: 24px;
      right: 24px;
      z-index: 20;
    }

    #performance-monitor {
      position: absolute;
      top: 16px;
      left: 16px;
      z-index: 30;
      font-family: 'Consolas', 'Monaco', monospace;
      font-size: 12px;
      color: #94a3b8;
      background: rgba(10, 15, 26, 0.85);
      backdrop-filter: blur(8px);
      padding: 12px 16px;
      border-radius: 8px;
      border: 1px solid
