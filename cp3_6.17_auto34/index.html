<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>联机卡牌对战 - 延迟补偿演示</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #0d1117;
      color: #fff;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      overflow: hidden;
    }

    .game-container {
      width: 1280px;
      height: 720px;
      position: relative;
      background: #0d1117;
    }

    .game-table {
      width: 100%;
      height: 100%;
      background: #1a1a2e;
      border-radius: 16px;
      box-shadow: 0 0 20px rgba(0, 0, 0, 0.5);
      position: relative;
      overflow: hidden;
    }

    .status-panel {
      position: absolute;
      top: 20px;
      left: 20px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      z-index: 10;
    }

    .player-info {
      background: rgba(255, 255, 255, 0.05);
      padding: 15px;
      border-radius: 12px;
      min-width: 200px;
    }

    .player-name {
      font-size: 18px;
      font-weight: bold;
      margin-bottom: 8px;
    }

    .health-bar {
      width: 160px;
      height: 16px;
      background: rgba(0, 0, 0, 0.5);
      border-radius: 8px;
      overflow: hidden;
      margin-bottom: 8px;
    }

    .health-fill {
      height: 100%;
      transition: width 0.3s ease, background-color 0.3s ease;
      border-radius: 8px;
    }

    .health-fill.full {
      background: #66bb6a;
    }

    .health-fill.half {
      background: #ffa726;
    }

    .health-fill.low {
      background: #ef5350;
    }

    .hand-count {
      font-size: 14px;
      opacity: 0.8;
    }

    .ai-panel {
      position: absolute;
      top: 20px;
      right: 20px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
      z-index: 10;
    }

    .ai-avatar {
      width: 48px;
      height: 48px;
      border-radius: 50%;
      background: #666;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
    }

    .ai-status {
      font-size: 14px;
      color: #888;
    }

    .ai-status.connected {
      color: #66bb6a;
    }

    .latency-panel {
      position: absolute;
      top: 20px;
      right: 220px;
      background: rgba(0, 0, 0, 0.6);
      padding: 10px 15px;
      border-radius: 8px;
      font-size: 14px;
      z-index: 10;
    }

    .latency-value {
      font-weight: bold;
      transition: color 0.3s ease;
    }

    .latency-value.low {
      color: #66bb6a;
    }

    .latency-value.medium {
      color: #ffd54f;
    }

    .latency-value.high {
      color: #ef5350;
    }

    .queue-count {
      margin-top: 5px;
      opacity: 0.8;
    }

    .turn-indicator {
      position: absolute;
      bottom: 200px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(255, 215, 0, 0.2);
      border: 2px solid #ffd700;
      padding: 10px 30px;
      border-radius: 25px;
      font-size: 18px;
      font-weight: bold;
      color: #ffd700;
      animation: pulse 0.3s ease-in-out infinite alternate;
      z-index: 10;
    }

    @keyframes pulse {
      from {
        transform: translateX(-50%) scale(1);
      }
      to {
        transform: translateX(-50%) scale(1.05);
      }
    }

    .play-area {
      position: absolute;
      bottom: 240px;
      left: 50%;
      transform: translateX(-50%);
      width: 240px;
      height: 120px;
      background: rgba(255, 255, 255, 0.05);
      border-radius: 12px;
      border: 2px dashed rgba(255, 255, 255, 0.2);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 5;
    }

    .play-area.highlight {
      border-color: #448aff;
      background: rgba(68, 138, 255, 0.1);
    }

    .play-area.flash-blue {
      animation: flashBlue 0.15s ease-out;
    }

    .play-area.flash-red {
      animation: flashRed 0.3s ease-out;
    }

    @keyframes flashBlue {
      0%, 100% {
        box-shadow: none;
      }
      50% {
        box-shadow: 0 0 30px rgba(68, 138, 255, 0.8);
      }
    }

    @keyframes flashRed {
      0%, 100% {
        box-shadow: none;
      }
      50% {
        box-shadow: 0 0 30px rgba(255, 82, 82, 0.8);
      }
    }

    .hand-area {
      position: absolute;
      bottom: 30px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      gap: 10px;
      z-index: 10;
    }

    .card {
      width: 60px;
      height: 90px;
      background: #1a237e;
      border-radius: 8px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      color: #fff;
      font-weight: bold;
      cursor: grab;
      transition: transform 0.2s ease-out, box-shadow 0.2s ease-out;
      position: relative;
      user-select: none;
    }

    .card:hover {
      transform: scale(1.1) translateY(-10px);
      box-shadow: 0 0 0 3px #ffd700;
    }

    .card.dragging {
      cursor: grabbing;
      opacity: 0.9;
      z-index: 100;
      pointer-events: none;
    }

    .card.playing {
      animation: playCard 0.2s ease-out forwards;
    }

    .card.rollback {
      animation: rollbackCard 0.4s ease-out forwards;
    }

    @keyframes playCard {
      from {
        opacity: 1;
      }
      to {
        opacity: 0;
        transform: translateY(-200px) scale(0.8);
      }
    }

    @keyframes rollbackCard {
      from {
        opacity: 0;
        transform: translateY(-200px) scale(0.8);
      }
      to {
        opacity: 1;
        transform: translateY(0) scale(1);
      }
    }

    .card-value {
      font-size: 24px;
    }

    .card-suit {
      font-size: 12px;
      margin-top: 4px;
    }

    .card-back {
      background: linear-gradient(135deg, #1a237e 0%, #0d1542 100%);
    }

    .played-card {
      position: absolute;
      width: 60px;
      height: 90px;
      background: #1a237e;
      border-radius: 8px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      color: #fff;
      font-weight: bold;
      animation: flyIn 0.2s ease-out;
    }

    @keyframes flyIn {
      from {
        transform: scale(0.5);
        opacity: 0;
      }
      to {
        transform: scale(1);
        opacity: 1;
      }
    }

    .ai-hand {
      position: absolute;
      top: 100px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      gap: 10px;
      z-index: 10;
    }

    .ai-card {
      width: 60px;
      height: 90px;
      background: linear-gradient(135deg, #2d1a7e 0%, #1a0d42 100%);
      border-radius: 8px;
      border: 2px solid #4a3a8a;
    }

    .ai-card.playing {
      animation: aiPlayCard 0.2s ease-out forwards;
    }

    @keyframes aiPlayCard {
      from {
        opacity: 1;
      }
      to {
        opacity: 0;
        transform: translateY(200px) scale(0.8);
      }
    }

    .stats-overlay {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.9);
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 1000;
    }

    .stats-overlay.show {
      display: flex;
    }

    .stats-title {
      font-size: 36px;
      margin-bottom: 30px;
      color: #ffd700;
    }

    .stats-content {
      background: rgba(255, 255, 255, 0.05);
      padding: 40px;
      border-radius: 16px;
      text-align: center;
    }

    .stat-item {
      font-size: 20px;
      margin: 15px 0;
    }

    .stat-value {
      color: #448aff;
      font-weight: bold;
    }

    .restart-btn {
      margin-top: 30px;
      padding: 15px 40px;
      font-size: 18px;
      background: #448aff;
      color: #fff;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      transition: background 0.2s ease;
    }

    .restart-btn:hover {
      background: #2979ff;
    }

    .canvas-overlay {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 50;
    }

    .discard-pile {
      position: absolute;
      top: 200px;
      right: 40px;
      width: 60px;
      height: 90px;
      background: rgba(255, 255, 255, 0.1);
      border-radius: 8px;
      border: 2px solid rgba(255, 255, 255, 0.2);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 12px;
      color: rgba(255, 255, 255, 0.6);
    }
  </style>
</head>
<body>
  <div class="game-container">
    <div class="game-table">
      <canvas class="canvas-overlay" id="gameCanvas" width="1280" height="720"></canvas>

      <div class="status-panel">
        <div class="player-info">
          <div class="player-name">玩家 (你)</div>
          <div class="health-bar">
            <div class="health-fill full" id="playerHealth" style="width: 100%"></div>
          </div>
          <div class="hand-count">手牌: <span id="playerHandCount">7</span></div>
        </div>
      </div>

      <div class="ai-panel">
        <div class="ai-avatar">🤖</div>
        <div class="ai-status" id="aiStatus">等待中</div>
        <div class="player-info" style="text-align: center;">
          <div class="player-name">AI对手</div>
          <div class="health-bar" style="margin: 0 auto;">
            <div class="health-fill full" id="aiHealth" style="width: 100%"></div>
          </div>
          <div class="hand-count">手牌: <span id="aiHandCount">7</span></div>
        </div>
      </div>

      <div class="latency-panel">
        <div>延迟: <span class="latency-value" id="latencyValue">0ms</span></div>
        <div class="queue-count">队列: <span id="queueCount">0</span></div>
      </div>

      <div class="discard-pile">
        弃牌堆<br><span id="discardCount">0</span>
      </div>

      <div class="turn-indicator" id="turnIndicator">你的回合</div>

      <div class="ai-hand" id="aiHand"></div>

      <div class="play-area" id="playArea">
        拖拽出牌到这里
      </div>

      <div class="hand-area" id="handArea"></div>

      <div class="stats-overlay" id="statsOverlay">
        <div class="stats-title" id="gameResult">游戏结束</div>
        <div class="stats-content">
          <div class="stat-item">平均延迟: <span class="stat-value" id="avgLatency">0ms</span></div>
          <div class="stat-item">回滚次数: <span class="stat-value" id="rollbackCount">0</span></div>
          <div class="stat-item">有效出牌率: <span class="stat-value" id="successRate">0%</span></div>
        </div>
        <button class="restart-btn" id="restartBtn">再来一局</button>
      </div>
    </div>
  </div>

  <script type="module" src="/src/client/main.ts"></script>
</body>
</html>
