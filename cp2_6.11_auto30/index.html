<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>文字像素画</title>
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      font-family: "PingFang SC", "Microsoft YaHei", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: linear-gradient(135deg, #E8EDF2 0%, #F5F7FA 100%);
      color: #2C3E6B;
      -webkit-font-smoothing: antialiased;
    }

    #app {
      position: relative;
      width: 100vw;
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .header {
      position: relative;
      z-index: 10;
      width: 96%;
      max-width: 1280px;
      height: 60px;
      margin: 16px auto 0;
      padding: 0 32px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 12px;
      border: 1px solid rgba(197, 165, 90, 0.5);
      background: rgba(255, 255, 255, 0.55);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      box-shadow: 0 4px 18px rgba(44, 62, 107, 0.08), 0 0 0 1px rgba(197, 165, 90, 0.12), inset 0 1px 0 rgba(255, 255, 255, 0.6);
    }

    .header h1 {
      font-size: 20px;
      font-weight: 600;
      letter-spacing: 2px;
      background: linear-gradient(90deg, #2C3E6B 0%, #4A6FA5 50%, #C5A55A 100%);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }

    .header .deco {
      position: absolute;
      left: 24px;
      display: flex;
      gap: 6px;
    }
    .header .deco span {
      width: 8px; height: 8px;
      border-radius: 50%;
    }
    .header .deco span:nth-child(1) { background: #E74C3C; }
    .header .deco span:nth-child(2) { background: #F1C40F; }
    .header .deco span:nth-child(3) { background: #2ECC71; }

    .canvas-wrapper {
      position: relative;
      margin-top: 24px;
      flex-shrink: 0;
    }

    #canvas {
      display: block;
      border-radius: 8px;
      border: 1px solid #1a1a1a;
      box-shadow: 0 12px 36px rgba(44, 62, 107, 0.12);
      background: #F5F7FA;
      cursor: default;
    }

    #exportBtn {
      position: absolute;
      top: 14px;
      right: 14px;
      width: 40px;
      height: 40px;
      border: none;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.8);
      border: 1px solid rgba(74, 111, 165, 0.25);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 4px 12px rgba(44, 62, 107, 0.15);
      transition: all 0.22s ease;
      z-index: 5;
    }
    #exportBtn:hover {
      background: #c8d1e0;
      transform: translateY(-1px);
      box-shadow: 0 6px 16px rgba(44, 62, 107, 0.22);
    }
    #exportBtn svg {
      width: 20px; height: 20px;
      stroke: #2C3E6B;
      fill: none;
      stroke-width: 2;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    #palette {
      position: fixed;
      bottom: 110px;
      z-index: 20;
      padding: 10px 14px;
      background: rgba(255, 255, 255, 0.78);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border-radius: 14px;
      border: 1px solid rgba(74, 111, 165, 0.18);
      box-shadow: 0 8px 24px rgba(44, 62, 107, 0.14);
      display: flex;
      gap: 10px;
    }
    .palette-left { left: 28px; }
    .palette-right { right: 28px; }

    .swatch {
      width: 26px;
      height: 26px;
      border-radius: 50%;
      cursor: pointer;
      border: 2px solid rgba(255, 255, 255, 0.9);
      box-shadow: 0 2px 6px rgba(0, 0, 0, 0.15);
      transition: transform 0.22s ease, box-shadow 0.22s ease, border-color 0.22s ease;
      position: relative;
    }
    .swatch:hover {
      transform: scale(1.12) translateY(-1px);
      box-shadow: 0 4px 10px rgba(0, 0, 0, 0.22);
    }
    .swatch-active {
      border-color: #C5A55A;
      transform: scale(1.18);
      box-shadow: 0 0 0 3px rgba(197, 165, 90, 0.3), 0 4px 12px rgba(0, 0, 0, 0.18);
    }

    .input-bar {
      position: fixed;
      bottom: 30px;
      left: 50%;
      transform: translateX(-50%);
      width: 60%;
      max-width: 820px;
      min-width: 520px;
      display: flex;
      gap: 14px;
      z-index: 30;
    }

    #textInput {
      flex: 1;
      height: 44px;
      padding: 0 18px;
      font-size: 15px;
      font-family: inherit;
      border: 1px solid rgba(74, 111, 165, 0.25);
      border-radius: 6px;
      outline: none;
      background: rgba(255, 255, 255, 0.95);
      color: #2C3E6B;
      box-shadow: inset 0 2px 6px rgba(44, 62, 107, 0.08);
      transition: border-color 0.2s ease, box-shadow 0.2s ease;
    }
    #textInput::placeholder {
      color: #A0A5B0;
    }
    #textInput:focus {
      border-color: #4A6FA5;
      box-shadow: inset 0 2px 6px rgba(44, 62, 107, 0.1), 0 0 0 3px rgba(74, 111, 165, 0.12);
    }

    #generateBtn {
      height: 44px;
      padding: 0 28px;
      font-size: 14px;
      font-weight: 600;
      font-family: inherit;
      color: #fff;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      background: linear-gradient(180deg, #4A6FA5 0%, #2C3E6B 100%);
      box-shadow: 0 4px 14px rgba(44, 62, 107, 0.3), inset 0 1px 0 rgba(255, 255, 255, 0.18);
      transition: filter 0.18s ease, transform 0.1s ease, box-shadow 0.2s ease;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      white-space: nowrap;
    }
    #generateBtn:hover {
      filter: brightness(1.15);
      box-shadow: 0 6px 18px rgba(44, 62, 107, 0.38), inset 0 1px 0 rgba(255, 255, 255, 0.22);
    }
    #generateBtn:active {
      transform: translateY(1.5px);
      filter: brightness(0.92);
      box-shadow: 0 2px 8px rgba(44, 62, 107, 0.3), inset 0 1px 0 rgba(255, 255, 255, 0.12);
    }
    #generateBtn:disabled {
      cursor: wait;
      opacity: 0.88;
    }

    .spinner {
      display: inline-block;
      width: 14px;
      height: 14px;
      border: 2px solid rgba(255, 255, 255, 0.35);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.3s linear;
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    #exportOverlay {
      position: fixed;
      inset: 0;
      z-index: 100;
      background: rgba(44, 62, 107, 0.28);
      backdrop-filter: blur(5px);
      -webkit-backdrop-filter: blur(5px);
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      visibility: hidden;
      transition: opacity 0.28s ease, visibility 0.28s ease;
    }
    #exportOverlay.visible {
      opacity: 1;
      visibility: visible;
    }

    .modal {
      position: relative;
      background: #fff;
      border-radius: 14px;
      padding: 22px 26px 26px;
      width: min(800px, 80vw);
      max-height: 88vh;
      display: flex;
      flex-direction: column;
      gap: 16px;
      box-shadow: 0 24px 64px rgba(44, 62, 107, 0.35), 0 0 0 1px rgba(255, 255, 255, 0.5) inset;
      transform: translateY(12px) scale(0.98);
      transition: transform 0.3s ease;
    }
    #exportOverlay.visible .modal {
      transform: translateY(0) scale(1);
    }

    .modal-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .modal-header h2 {
      font-size: 17px;
      font-weight: 600;
      color: #2C3E6B;
    }
    #modalClose {
      width: 32px; height: 32px;
      border: none;
      border-radius: 8px;
      background: rgba(44, 62, 107, 0.06);
      cursor: pointer;
      font-size: 18px;
      color: #2C3E6B;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.2s ease;
    }
    #modalClose:hover {
      background: rgba(44, 62, 107, 0.12);
    }

    .preview-wrap {
      background: #f0f2f5;
      border-radius: 8px;
      padding: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: auto;
      max-height: 58vh;
    }
    #previewImg {
      max-width: 100%;
      max-height: 54vh;
      border-radius: 8px;
      border: 8px solid #fff;
      box-shadow: 0 6px 22px rgba(0, 0, 0, 0.12);
      background: #fff;
    }

    .modal-actions {
      display: flex;
      justify-content: flex-end;
      gap: 12px;
    }
    #modalCancel, #modalSave {
      height: 38px;
      padding: 0 22px;
      font-size: 14px;
      font-weight: 600;
      font-family: inherit;
      border-radius: 6px;
      cursor: pointer;
      border: none;
      transition: filter 0.18s ease, transform 0.1s ease;
    }
    #modalCancel {
      background: #A0A0A0;
      color: #fff;
    }
    #modalSave {
      background: #4A6FA5;
      color: #fff;
      box-shadow: 0 4px 12px rgba(74, 111, 165, 0.3);
    }
    #modalCancel:hover { filter: brightness(1.1); }
    #modalSave:hover { filter: brightness(1.12); }
    #modalCancel:active, #modalSave:active { transform: translateY(1px); }

    @media (max-width: 1200px) {
      .canvas-wrapper { transform: scale(0.9); transform-origin: top center; margin-top: 8px; }
      .input-bar { min-width: 480px; }
    }
  </style>
</head>
<body>
  <div id="app">
    <header class="header">
      <div class="deco"><span></span><span></span><span></span></div>
      <h1>✦ 文字像素画 ✦ Text Pixel Art</h1>
    </header>

    <div class="canvas-wrapper">
      <canvas id="canvas" width="1100" height="600"></canvas>
      <button id="exportBtn" title="导出图片">
        <svg viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="7 10 12 15 17 10"></polyline><line x1="12" y1="15" x2="12" y2="3"></line></svg>
      </button>
    </div>

    <div id="palette" class="palette-left"></div>

    <div class="input-bar">
      <input id="textInput" type="text" maxlength="20" placeholder="请输入中文或英文（最多20字），按回车或点击生成" />
      <button id="generateBtn">✦ 生成像素</button>
    </div>

    <div id="exportOverlay">
      <div class="modal">
        <div class="modal-header">
          <h2>图片预览</h2>
          <button id="modalClose">✕</button>
        </div>
        <div class="preview-wrap">
          <img id="previewImg" alt="预览" />
        </div>
        <div class="modal-actions">
          <button id="modalCancel">取消</button>
          <button id="modalSave">保存为 PNG</button>
        </div>
      </div>
    </div>
  </div>

  <script type="module" src="/src/main.ts"></script>
</body>
</html>
