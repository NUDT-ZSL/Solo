<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>符咒工坊 - Rune Workshop</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      font-family: 'Courier New', 'Consolas', monospace;
      background: linear-gradient(135deg, #0B0014 0%, #1A0033 100%);
      color: #fff;
    }

    #loading {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      background: linear-gradient(135deg, #0B0014 0%, #1A0033 100%);
      z-index: 9999;
      transition: opacity 0.8s ease-out;
    }

    #loading.hidden {
      opacity: 0;
      pointer-events: none;
    }

    .loading-title {
      font-size: 32px;
      letter-spacing: 8px;
      color: #00BFFF;
      text-shadow: 0 0 10px #00BFFF, 0 0 20px #00BFFF, 0 0 40px #00BFFF;
      margin-bottom: 30px;
      animation: pulse 2s ease-in-out infinite;
    }

    .loading-ring {
      width: 60px;
      height: 60px;
      border: 2px solid rgba(0, 191, 255, 0.2);
      border-top: 2px solid #00BFFF;
      border-radius: 50%;
      animation: spin 1s linear infinite;
      box-shadow: 0 0 15px rgba(0, 191, 255, 0.5);
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.6; }
    }

    #game-container {
      position: relative;
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    #canvas-wrapper {
      position: relative;
      width: 80%;
      height: 85%;
      border: 2px solid #00BFFF;
      border-radius: 16px;
      box-shadow: 0 0 20px rgba(0, 191, 255, 0.4),
                  inset 0 0 30px rgba(0, 191, 255, 0.1);
      overflow: hidden;
      transition: box-shadow 0.3s ease, border-color 0.3s ease;
    }

    #canvas-wrapper.fire {
      border-color: #FF4500;
      box-shadow: 0 0 20px rgba(255, 69, 0, 0.4),
                  inset 0 0 30px rgba(255, 69, 0, 0.1);
    }

    #canvas-wrapper.thunder {
      border-color: #8A2BE2;
      box-shadow: 0 0 20px rgba(138, 43, 226, 0.4),
                  inset 0 0 30px rgba(138, 43, 226, 0.1);
    }

    #canvas-wrapper.wind {
      border-color: #00CED1;
      box-shadow: 0 0 20px rgba(0, 206, 209, 0.4),
                  inset 0 0 30px rgba(0, 206, 209, 0.1);
    }

    #canvas-wrapper.earth {
      border-color: #8B4513;
      box-shadow: 0 0 20px rgba(139, 69, 19, 0.4),
                  inset 0 0 30px rgba(139, 69, 19, 0.1);
    }

    #game-canvas {
      display: block;
      width: 100%;
      height: 100%;
      cursor: crosshair;
    }

    #toolbar {
      position: fixed;
      left: 24px;
      top: 50%;
      transform: translateY(-50%);
      display: flex;
      flex-direction: column;
      gap: 16px;
      padding: 20px 16px;
      background: rgba(255, 255, 255, 0.05);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      border: 1px solid rgba(0, 191, 255, 0.3);
      border-radius: 16px;
      z-index: 100;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
      transition: border-color 0.3s ease, box-shadow 0.3s ease;
    }

    #toolbar.fire {
      border-color: rgba(255, 69, 0, 0.5);
      box-shadow: 0 8px 32px rgba(255, 69, 0, 0.2);
    }

    #toolbar.thunder {
      border-color: rgba(138, 43, 226, 0.5);
      box-shadow: 0 8px 32px rgba(138, 43, 226, 0.2);
    }

    #toolbar.wind {
      border-color: rgba(0, 206, 209, 0.5);
      box-shadow: 0 8px 32px rgba(0, 206, 209, 0.2);
    }

    #toolbar.earth {
      border-color: rgba(139, 69, 19, 0.5);
      box-shadow: 0 8px 32px rgba(139, 69, 19, 0.2);
    }

    .tool-btn {
      width: 48px;
      height: 48px;
      border: 1px solid rgba(255, 255, 255, 0.2);
      border-radius: 12px;
      background: rgba(255, 255, 255, 0.05);
      color: #fff;
      font-size: 18px;
      cursor: pointer;
      transition: all 0.3s ease-out;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      overflow: hidden;
    }

    .tool-btn:hover {
      transform: scale(1.1);
      box-shadow: 0 0 20px currentColor;
    }

    .tool-btn.active {
      transform: scale(1.1);
      box-shadow: 0 0 25px currentColor;
    }

    .tool-btn.fire {
      color: #FFD700;
      border-color: rgba(255, 69, 0, 0.6);
      background: rgba(255, 69, 0, 0.2);
    }

    .tool-btn.thunder {
      color: #FF00FF;
      border-color: rgba(138, 43, 226, 0.6);
      background: rgba(138, 43, 226, 0.2);
    }

    .tool-btn.wind {
      color: #7FFF00;
      border-color: rgba(0, 206, 209, 0.6);
      background: rgba(0, 206, 209, 0.2);
    }

    .tool-btn.earth {
      color: #DEB887;
      border-color: rgba(139, 69, 19, 0.6);
      background: rgba(139, 69, 19, 0.2);
    }

    .tool-btn.clear-btn {
      background: linear-gradient(135deg, #FF4500 0%, #FF6347 100%);
      border-color: rgba(255, 69, 0, 0.8);
      color: #fff;
    }

    .tool-btn.clear-btn:hover {
      box-shadow: 0 0 25px rgba(255, 69, 0, 0.8);
    }

    .tool-btn.history-btn {
      color: #00BFFF;
    }

    .tool-divider {
      width: 100%;
      height: 1px;
      background: rgba(255, 255, 255, 0.15);
      margin: 4px 0;
    }

    .tool-label {
      font-size: 11px;
      text-align: center;
      color: rgba(255, 255, 255, 0.6);
      margin-top: -8px;
      letter-spacing: 1px;
    }

    #rune-thumbnails {
      position: fixed;
      top: 24px;
      right: 24px;
      display: flex;
      gap: 10px;
      padding: 12px 16px;
      background: rgba(255, 255, 255, 0.05);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      border: 1px solid rgba(0, 191, 255, 0.3);
      border-radius: 12px;
      z-index: 100;
      min-height: 60px;
      min-width: 200px;
      align-items: center;
    }

    .rune-thumb {
      width: 36px;
      height: 36px;
      border-radius: 8px;
      border: 1px solid rgba(255, 255, 255, 0.2);
      background: rgba(0, 0, 0, 0.3);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
      opacity: 0;
      transform: scale(0.5);
      transition: all 0.3s ease-out;
    }

    .rune-thumb.show {
      opacity: 1;
      transform: scale(1);
    }

    .rune-thumb.fire { color: #FFD700; border-color: #FF4500; }
    .rune-thumb.thunder { color: #FF00FF; border-color: #8A2BE2; }
    .rune-thumb.wind { color: #7FFF00; border-color: #00CED1; }
    .rune-thumb.earth { color: #DEB887; border-color: #8B4513; }

    .rune-combo-plus {
      color: rgba(255, 255, 255, 0.5);
      font-size: 18px;
      font-weight: bold;
    }

    #floating-text {
      position: fixed;
      left: 50%;
      bottom: 22%;
      transform: translateX(-50%);
      font-size: 28px;
      font-weight: bold;
      letter-spacing: 4px;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.3s ease, transform 0.3s ease;
      text-shadow: 0 0 10px currentColor, 0 0 20px currentColor, 0 0 40px currentColor;
      z-index: 200;
    }

    #floating-text.show {
      opacity: 1;
      transform: translateX(-50%) translateY(-10px);
    }

    #flash-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(255, 255, 255, 0.9);
      pointer-events: none;
      opacity: 0;
      z-index: 500;
      transition: opacity 1s ease-out;
    }

    #flash-overlay.show {
      opacity: 1;
      transition: opacity 0.05s ease-out;
    }

    #history-panel {
      position: fixed;
      left: 24px;
      bottom: -100%;
      width: 280px;
      max-height: 300px;
      background: rgba(15, 5, 30, 0.95);
      backdrop-filter: blur(15px);
      -webkit-backdrop-filter: blur(15px);
      border: 1px solid rgba(0, 191, 255, 0.4);
      border-radius: 16px;
      padding: 16px;
      z-index: 150;
      transition: bottom 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
      overflow-y: auto;
      box-shadow: 0 -10px 40px rgba(0, 0, 0, 0.5);
    }

    #history-panel.show {
      bottom: 24px;
    }

    .history-title {
      font-size: 14px;
      color: #00BFFF;
      margin-bottom: 12px;
      padding-bottom: 8px;
      border-bottom: 1px solid rgba(0, 191, 255, 0.3);
      letter-spacing: 2px;
      text-shadow: 0 0 8px rgba(0, 191, 255, 0.5);
    }

    .history-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 10px 12px;
      margin-bottom: 8px;
      background: rgba(255, 255, 255, 0.05);
      border-radius: 10px;
      border: 1px solid rgba(255, 255, 255, 0.1);
      cursor: pointer;
      transition: all 0.2s ease;
    }

    .history-item:hover {
      background: rgba(0, 191, 255, 0.1);
      border-color: rgba(0, 191, 255, 0.4);
      transform: translateX(4px);
    }

    .history-icon {
      font-size: 20px;
      width: 32px;
      text-align: center;
    }

    .history-info {
      flex: 1;
    }

    .history-name {
      font-size: 13px;
      color: #fff;
      margin-bottom: 2px;
    }

    .history-time {
      font-size: 11px;
      color: rgba(255, 255, 255, 0.5);
    }

    .history-empty {
      text-align: center;
      color: rgba(255, 255, 255, 0.4);
      font-size: 12px;
      padding: 20px 0;
    }

    #element-aura {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 50;
      opacity: 0;
      transition: opacity 0.5s ease;
    }

    #element-aura.show {
      opacity: 1;
    }

    .aura-corner {
      position: absolute;
      width: 200px;
      height: 200px;
      border-radius: 50%;
      filter: blur(60px);
      opacity: 0.3;
    }

    .aura-corner.top-left { top: -50px; left: -50px; }
    .aura-corner.top-right { top: -50px; right: -50px; }
    .aura-corner.bottom-left { bottom: -50px; left: -50px; }
    .aura-corner.bottom-right { bottom: -50px; right: -50px; }

    @keyframes shake {
      0%, 100% { transform: translate(0, 0); }
      25% { transform: translate(-3px, 2px); }
      50% { transform: translate(3px, -2px); }
      75% { transform: translate(-2px, -3px); }
    }

    #canvas-wrapper.shaking {
      animation: shake 0.2s ease-in-out;
    }

    .hint-text {
      position: absolute;
      bottom: 16px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 12px;
      color: rgba(255, 255, 255, 0.4);
      letter-spacing: 2px;
      pointer-events: none;
    }
  </style>
</head>
<body>
  <div id="loading">
    <div class="loading-title">符咒工坊</div>
    <div class="loading-ring"></div>
  </div>

  <div id="game-container">
    <div id="element-aura">
      <div class="aura-corner top-left"></div>
      <div class="aura-corner top-right"></div>
      <div class="aura-corner bottom-left"></div>
      <div class="aura-corner bottom-right"></div>
    </div>

    <div id="canvas-wrapper">
      <canvas id="game-canvas"></canvas>
      <div class="hint-text">按住鼠标绘制符文 · 松开召唤精灵</div>
    </div>

    <div id="toolbar">
      <button class="tool-btn fire active" data-element="fire" title="火元素">🔥</button>
      <button class="tool-btn thunder" data-element="thunder" title="雷元素">⚡</button>
      <button class="tool-btn wind" data-element="wind" title="风元素">🌀</button>
      <button class="tool-btn earth" data-element="earth" title="土元素">🪨</button>
      <div class="tool-divider"></div>
      <button class="tool-btn clear-btn" id="clear-btn" title="清除画布">✕</button>
      <button class="tool-btn history-btn" id="history-btn" title="历史记录">📜</button>
    </div>

    <div id="rune-thumbnails">
      <span style="font-size:12px;color:rgba(255,255,255,0.5);letter-spacing:1px;">符文序列</span>
    </div>

    <div id="floating-text"></div>
    <div id="flash-overlay"></div>

    <div id="history-panel">
      <div class="history-title">历史符文</div>
      <div id="history-list">
        <div class="history-empty">暂无历史记录</div>
      </div>
    </div>
  </div>

  <script type="module" src="/src/main.ts"></script>
</body>
</html>
