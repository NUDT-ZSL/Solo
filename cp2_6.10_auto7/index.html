<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>3D粒子气候可视化系统</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #0a0e27;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
    }
    
    #app {
      width: 100vw;
      height: 100vh;
      position: relative;
    }
    
    canvas {
      display: block;
      width: 100%;
      height: 100%;
    }
    
    #particle-info {
      position: fixed;
      background: rgba(10, 14, 39, 0.92);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border: 1px solid rgba(120, 100, 255, 0.3);
      border-radius: 12px;
      padding: 16px 20px;
      color: #e8ecff;
      font-size: 13px;
      z-index: 1000;
      display: none;
      min-width: 220px;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5);
    }
    
    #particle-info h3 {
      font-size: 15px;
      margin-bottom: 12px;
      color: #8fd4ff;
      border-bottom: 1px solid rgba(143, 212, 255, 0.2);
      padding-bottom: 8px;
    }
    
    #particle-info .info-row {
      display: flex;
      justify-content: space-between;
      padding: 4px 0;
      gap: 20px;
    }
    
    #particle-info .info-label {
      color: #9aa4d4;
    }
    
    #particle-info .info-value {
      color: #fff;
      font-weight: 500;
    }
    
    #particle-info .info-value.temp-hot { color: #ff7a59; }
    #particle-info .info-value.temp-cold { color: #59b8ff; }
    #particle-info .info-value.humid { color: #7affd4; }
  </style>
</head>
<body>
  <div id="app">
    <div id="particle-info"></div>
  </div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
