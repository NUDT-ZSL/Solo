<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>电子宠物养成模拟器</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #F3E5F5;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      padding: 20px;
    }

    .app-container {
      display: flex;
      align-items: flex-start;
      gap: 24px;
    }

    .status-panel {
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .status-bar-container {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .status-heart {
      font-size: 16px;
      width: 20px;
      text-align: center;
    }

    .status-bar {
      width: 120px;
      height: 12px;
      background: rgba(0, 0, 0, 0.1);
      border-radius: 6px;
      overflow: hidden;
      position: relative;
    }

    .status-bar-fill {
      height: 100%;
      border-radius: 6px;
      transition: width 0.3s ease, background-color 0.3s ease;
    }

    .status-bar-label {
      font-size: 12px;
      color: #666;
      min-width: 40px;
      text-align: left;
    }

    .canvas-wrapper {
      position: relative;
      width: 320px;
      height: 400px;
      border-radius: 16px;
      box-shadow: 0 8px 30px rgba(0, 0, 0, 0.15);
      overflow: hidden;
    }

    canvas {
      display: block;
      width: 320px;
      height: 400px;
    }

    .warning-border {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      border: 3px solid transparent;
      border-radius: 16px;
      pointer-events: none;
      transition: border-color 0.3s ease;
    }

    .warning-border.active {
      animation: warningBlink 1s infinite;
    }

    @keyframes warningBlink {
      0%, 100% { border-color: #F44336; }
      50% { border-color: transparent; }
    }

    .action-buttons {
      position: absolute;
      right: 12px;
      bottom: 12px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      z-index: 10;
    }

    .action-btn {
      width: 48px;
      height: 48px;
      border-radius: 50%;
      border: none;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      color: white;
      font-weight: bold;
      position: relative;
      transition: transform 0.2s ease-out;
      box-shadow: 0 3px 8px rgba(0, 0, 0, 0.25);
      user-select: none;
    }

    .action-btn:hover:not(.disabled) {
      transform: scale(1.1);
    }

    .action-btn.disabled {
      background: #9E9E9E !important;
      cursor: not-allowed;
    }

    .action-btn .cooldown-overlay {
      position: absolute;
      inset: 0;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
      font-weight: bold;
      background: rgba(0, 0, 0, 0.4);
      color: white;
    }

    .btn-feed { background: #FF9800; }
    .btn-play { background: #4CAF50; }
    .btn-sleep { background: #2196F3; }
    .btn-clean { background: #9C27B0; }

    @media (max-width: 600px) {
      .app-container {
        flex-direction: column;
        align-items: center;
      }

      .status-panel {
        flex-direction: row;
        flex-wrap: wrap;
        justify-content: center;
        gap: 10px;
        width: 320px;
      }

      .status-bar-container {
        gap: 6px;
      }

      .status-bar {
        width: 80px;
      }

      .action-buttons {
        position: absolute;
        left: 50%;
        transform: translateX(-50%);
        bottom: -70px;
        flex-direction: row;
        right: auto;
      }

      .canvas-wrapper {
        margin-bottom: 80px;
      }
    }
  </style>
</head>
<body>
  <div class="app-container">
    <div class="status-panel" id="statusPanel">
      <div class="status-bar-container">
        <span class="status-heart">🍖</span>
        <div class="status-bar">
          <div class="status-bar-fill" id="bar-hunger" style="width: 70%; background: #66BB6A;"></div>
        </div>
        <span class="status-bar-label" id="label-hunger">70%</span>
      </div>
      <div class="status-bar-container">
        <span class="status-heart">🎾</span>
        <div class="status-bar">
          <div class="status-bar-fill" id="bar-happiness" style="width: 70%; background: #66BB6A;"></div>
        </div>
        <span class="status-bar-label" id="label-happiness">70%</span>
      </div>
      <div class="status-bar-container">
        <span class="status-heart">⚡</span>
        <div class="status-bar">
          <div class="status-bar-fill" id="bar-energy" style="width: 70%; background: #66BB6A;"></div>
        </div>
        <span class="status-bar-label" id="label-energy">70%</span>
      </div>
      <div class="status-bar-container">
        <span class="status-heart">💧</span>
        <div class="status-bar">
          <div class="status-bar-fill" id="bar-clean" style="width: 70%; background: #66BB6A;"></div>
        </div>
        <span class="status-bar-label" id="label-clean">70%</span>
      </div>
    </div>

    <div class="canvas-wrapper" id="canvasWrapper">
      <canvas id="gameCanvas" width="320" height="400"></canvas>
      <div class="warning-border" id="warningBorder"></div>
      <div class="action-buttons" id="actionButtons">
        <button class="action-btn btn-feed" data-action="feed" title="喂食">🍚</button>
        <button class="action-btn btn-play" data-action="play" title="玩耍">⚽</button>
        <button class="action-btn btn-sleep" data-action="sleep" title="睡觉">🌙</button>
        <button class="action-btn btn-clean" data-action="clean" title="清洁">💦</button>
      </div>
    </div>
  </div>

  <script type="module" src="/src/main.ts"></script>
</body>
</html>
