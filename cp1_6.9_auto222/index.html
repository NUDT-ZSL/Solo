<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>波谱回廊 - Spectral Corridor</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: linear-gradient(180deg, #05001a 0%, #000000 50%, #0a0010 100%);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    }

    #canvas {
      display: block;
      width: 100vw;
      height: 100vh;
      cursor: crosshair;
    }

    #theme-toggle {
      position: fixed;
      right: 32px;
      bottom: 32px;
      width: 40px;
      height: 40px;
      border-radius: 50%;
      border: 1.5px solid rgba(255, 255, 255, 0.35);
      background: rgba(255, 255, 255, 0.08);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      cursor: pointer;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      z-index: 10;
      box-shadow: 0 0 20px rgba(255, 100, 200, 0.4);
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-size: 16px;
      user-select: none;
    }

    #theme-toggle:hover {
      width: 45px;
      height: 45px;
      right: 29.5px;
      bottom: 29.5px;
      border-color: rgba(255, 255, 255, 0.8);
      box-shadow: 0 0 30px rgba(255, 255, 255, 0.6),
                  0 0 60px rgba(255, 255, 255, 0.3);
    }

    #theme-toggle:active {
      transform: scale(0.95);
    }

    #hint {
      position: fixed;
      left: 50%;
      top: 24px;
      transform: translateX(-50%);
      color: rgba(255, 255, 255, 0.35);
      font-size: 13px;
      letter-spacing: 2px;
      pointer-events: none;
      z-index: 5;
      transition: opacity 1s ease;
    }
  </style>
</head>
<body>
  <canvas id="canvas"></canvas>
  <div id="hint">↑ 或拖拽前进　←→ 或左右拖拽旋转　点击画布触发脉冲</div>
  <button id="theme-toggle" title="切换颜色主题">✨</button>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
