<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>分子链爆</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #0A0A2E;
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    }

    #loading-screen {
      position: fixed;
      inset: 0;
      background: radial-gradient(ellipse at center, #1A1A4A 0%, #0A0A2E 100%);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 100;
      animation: fadeOut 0.5s ease forwards 1.5s;
    }

    .loader {
      width: 80px;
      height: 80px;
      position: relative;
    }

    .loader-ring {
      position: absolute;
      inset: 0;
      border: 3px solid transparent;
      border-top-color: #E0FFFF;
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }

    .loader-ring:nth-child(2) {
      inset: 10px;
      border-top-color: #FF8C00;
      animation-duration: 0.8s;
      animation-direction: reverse;
    }

    .loader-ring:nth-child(3) {
      inset: 20px;
      border-top-color: #FF4500;
      animation-duration: 0.6s;
    }

    .loader-text {
      margin-top: 24px;
      color: #E0FFFF;
      font-size: 18px;
      letter-spacing: 4px;
      animation: pulse 1s ease-in-out infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    @keyframes pulse {
      0%, 100% { opacity: 0.5; }
      50% { opacity: 1; }
    }

    @keyframes fadeOut {
      to {
        opacity: 0;
        visibility: hidden;
        pointer-events: none;
      }
    }

    #game-container {
      position: relative;
      width: 100vw;
      height: 100vh;
    }

    #game-canvas {
      display: block;
      width: 100%;
      height: 100%;
      cursor: crosshair;
    }

    #energy-counter {
      position: fixed;
      top: 20px;
      right: 20px;
      padding: 12px 24px;
      background: rgba(51, 51, 51, 0.8);
      backdrop-filter: blur(10px);
      border-radius: 12px;
      color: #FFF;
      font-size: 20px;
      font-weight: 600;
      font-family: 'Consolas', 'Monaco', monospace;
      display: flex;
      align-items: center;
      gap: 10px;
      transition: all 0.3s ease;
      border: 1px solid rgba(255, 255, 255, 0.1);
      z-index: 10;
    }

    #energy-counter.flashing {
      animation: flash 0.5s ease-in-out infinite;
    }

    @keyframes flash {
      0%, 100% {
        background: linear-gradient(135deg, rgba(255, 215, 0, 0.9), rgba(255, 69, 0, 0.9));
        box-shadow: 0 0 30px rgba(255, 215, 0, 0.6);
      }
      50% {
        background: linear-gradient(135deg, rgba(255, 69, 0, 0.9), rgba(255, 215, 0, 0.9));
        box-shadow: 0 0 50px rgba(255, 69, 0, 0.8);
      }
    }

    .energy-icon {
      font-size: 24px;
    }

    .energy-value {
      min-width: 50px;
      text-align: right;
    }

    #reset-btn {
      position: fixed;
      bottom: 20px;
      right: 20px;
      padding: 12px 28px;
      background: rgba(51, 51, 51, 0.9);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 12px;
      color: #FFF;
      font-size: 16px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.3s ease;
      z-index: 10;
      font-family: inherit;
    }

    #reset-btn:hover {
      background: #FF4500;
      border-color: #FF4500;
      transform: translateY(-2px);
      box-shadow: 0 8px 24px rgba(255, 69, 0, 0.4);
    }

    #reset-btn:active {
      transform: translateY(0);
    }

    #flash-overlay {
      position: fixed;
      inset: 0;
      background: #FFF;
      opacity: 0;
      pointer-events: none;
      z-index: 50;
    }

    #flash-overlay.active {
      animation: flashWhite 0.6s ease-out forwards;
    }

    @keyframes flashWhite {
      0% { opacity: 0.3; }
      100% { opacity: 0; }
    }
  </style>
</head>
<body>
  <div id="loading-screen">
    <div class="loader">
      <div class="loader-ring"></div>
      <div class="loader-ring"></div>
      <div class="loader-ring"></div>
    </div>
    <div class="loader-text">LOADING</div>
  </div>

  <div id="game-container">
    <canvas id="game-canvas"></canvas>
    <div id="energy-counter">
      <span class="energy-icon">⚡</span>
      <span>能量</span>
      <span class="energy-value" id="energy-value">0</span>
    </div>
    <button id="reset-btn">重置</button>
    <div id="flash-overlay"></div>
  </div>

  <script type="module" src="/src/main.ts"></script>
</body>
</html>
