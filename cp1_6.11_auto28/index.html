<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dynamic Geometric Badge Generator</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    }

    body {
      background: radial-gradient(ellipse at center, #1E1E2E 0%, #0D0D1A 100%);
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
      padding-top: 40px;
    }

    .input-container {
      width: 300px;
      margin-bottom: 20px;
    }

    #textInput {
      width: 100%;
      height: 44px;
      padding: 0 16px;
      border: none;
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.1);
      color: #ffffff;
      font-size: 16px;
      outline: none;
      transition: all 0.2s ease;
      opacity: 0.9;
    }

    #textInput::placeholder {
      color: rgba(255, 255, 255, 0.4);
    }

    #textInput:hover {
      opacity: 1;
      transform: translateY(-2px);
    }

    #textInput:focus {
      opacity: 1;
      background: rgba(255, 255, 255, 0.15);
      box-shadow: 0 0 20px rgba(255, 107, 107, 0.3);
    }

    .style-buttons {
      display: flex;
      gap: 10px;
      justify-content: center;
      margin-bottom: 30px;
    }

    .style-btn {
      width: 90px;
      height: 36px;
      border: none;
      border-radius: 18px;
      background: rgba(255, 255, 255, 0.15);
      color: rgba(255, 255, 255, 0.8);
      font-size: 13px;
      cursor: pointer;
      transition: all 0.2s ease;
      opacity: 0.7;
    }

    .style-btn:hover {
      opacity: 1;
      transform: translateY(-2px);
    }

    .style-btn.active[data-style="minimal"] {
      background: #ffffff;
      color: #1E1E2E;
      opacity: 1;
    }

    .style-btn.active[data-style="cyber"] {
      background: linear-gradient(135deg, #FF00FF, #00FFFF);
      color: #000000;
      opacity: 1;
    }

    .style-btn.active[data-style="natural"] {
      background: #228B22;
      color: #ffffff;
      opacity: 1;
    }

    .badge-container {
      width: 400px;
      height: 400px;
      background: #000000;
      border-radius: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 0 40px rgba(255, 107, 107, 0.2), 0 0 80px rgba(138, 43, 226, 0.15);
      margin-bottom: 30px;
      position: relative;
      overflow: hidden;
    }

    #badgeCanvas {
      display: block;
    }

    .export-btn {
      width: 120px;
      height: 40px;
      border: none;
      border-radius: 20px;
      background: linear-gradient(135deg, #FF6B6B, #FF8E53);
      color: #ffffff;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s ease;
      opacity: 0.9;
    }

    .export-btn:hover {
      opacity: 1;
      transform: translateY(-2px);
      box-shadow: 0 4px 20px rgba(255, 107, 107, 0.4);
    }

    .export-btn:active {
      transform: scale(0.95);
      opacity: 1;
    }

    .loading {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      color: rgba(255, 255, 255, 0.6);
      font-size: 14px;
      z-index: 100;
    }

    .loading.hidden {
      display: none;
    }

    .loading::after {
      content: '';
      display: inline-block;
      width: 12px;
      height: 12px;
      margin-left: 8px;
      border: 2px solid rgba(255, 255, 255, 0.3);
      border-top-color: rgba(255, 255, 255, 0.8);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      vertical-align: middle;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    @media (max-width: 600px) {
      body {
        padding-top: 20px;
      }

      .input-container {
        width: 85%;
      }

      .badge-container {
        width: 90vw;
        height: 90vw;
        max-width: 400px;
        max-height: 400px;
      }

      #badgeCanvas {
        width: 100%;
        height: 100%;
      }

      .style-btn {
        width: 75px;
        font-size: 11px;
      }
    }
  </style>
</head>
<body>
  <div class="loading" id="loading">Loading</div>

  <div class="input-container">
    <input type="text" id="textInput" maxlength="20" placeholder="Enter a word or phrase..." />
  </div>

  <div class="style-buttons">
    <button class="style-btn active" data-style="minimal">Minimal</button>
    <button class="style-btn" data-style="cyber">Cyber</button>
    <button class="style-btn" data-style="natural">Natural</button>
  </div>

  <div class="badge-container">
    <canvas id="badgeCanvas" width="400" height="400"></canvas>
  </div>

  <button class="export-btn" id="exportBtn">Export PNG</button>

  <script type="module" src="/src/main.ts"></script>
</body>
</html>
