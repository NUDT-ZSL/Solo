<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>三维地形探索器</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600&family=Source+Sans+3:wght@400;600;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --bg: #0d0d1a;
      --panel-bg: #1a1a2e;
      --text: #c8c8e0;
      --text-dim: #8888a8;
      --accent-from: #667eea;
      --accent-to: #764ba2;
      --border: rgba(200, 200, 224, 0.08);
      --glass: rgba(26, 26, 46, 0.75);
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: var(--bg);
      color: var(--text);
      font-family: 'Source Sans 3', sans-serif;
    }

    #app-container {
      display: flex;
      width: 100%;
      height: 100%;
    }

    #scene-container {
      flex: 1;
      position: relative;
      overflow: hidden;
    }

    #scene-container canvas {
      display: block;
      width: 100% !important;
      height: 100% !important;
    }

    #probe-tooltip {
      position: absolute;
      pointer-events: none;
      background: rgba(26, 26, 46, 0.88);
      backdrop-filter: blur(8px);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 8px 12px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 12px;
      color: var(--text);
      line-height: 1.6;
      opacity: 0;
      transition: opacity 0.15s ease;
      z-index: 10;
      white-space: nowrap;
    }

    #probe-tooltip.visible {
      opacity: 1;
    }

    #lod-indicator {
      position: absolute;
      bottom: 20px;
      left: 20px;
      background: rgba(26, 26, 46, 0.8);
      backdrop-filter: blur(6px);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 6px 14px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px;
      color: #f0a050;
      opacity: 0;
      transition: opacity 0.3s ease;
      z-index: 10;
    }

    #lod-indicator.visible {
      opacity: 1;
    }

    #info-panel {
      width: 280px;
      height: 100%;
      background: var(--glass);
      backdrop-filter: blur(16px);
      border-left: 1px solid var(--border);
      padding: 20px 16px;
      display: flex;
      flex-direction: column;
      gap: 14px;
      overflow-y: auto;
      z-index: 5;
    }

    .panel-title {
      font-family: 'Source Sans 3', sans-serif;
      font-size: 15px;
      font-weight: 700;
      color: var(--text);
      letter-spacing: 0.5px;
      text-transform: uppercase;
      padding-bottom: 8px;
      border-bottom: 1px solid var(--border);
    }

    .panel-section {
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 12px;
    }

    .panel-section-title {
      font-size: 11px;
      font-weight: 600;
      color: var(--text-dim);
      text-transform: uppercase;
      letter-spacing: 0.8px;
      margin-bottom: 8px;
    }

    .panel-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 3px 0;
    }

    .panel-label {
      font-size: 12px;
      color: var(--text-dim);
    }

    .panel-value {
      font-family: 'JetBrains Mono', monospace;
      font-size: 12px;
      font-weight: 600;
      color: var(--text);
    }

    .btn-reset {
      width: 100%;
      padding: 10px 0;
      border: none;
      border-radius: 8px;
      background: linear-gradient(135deg, var(--accent-from), var(--accent-to));
      color: #fff;
      font-family: 'Source Sans 3', sans-serif;
      font-size: 13px;
      font-weight: 600;
      letter-spacing: 0.3px;
      cursor: pointer;
      transition: transform 0.2s ease, box-shadow 0.2s ease;
      box-shadow: 0 2px 8px rgba(102, 126, 234, 0.3);
    }

    .btn-reset:hover {
      transform: translateY(-2px);
      box-shadow: 0 4px 16px rgba(102, 126, 234, 0.45);
    }

    .btn-reset:active {
      transform: translateY(0);
    }

    .btn-contour {
      width: 100%;
      padding: 10px 0;
      border: 1px solid var(--border);
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.04);
      color: var(--text);
      font-family: 'Source Sans 3', sans-serif;
      font-size: 13px;
      font-weight: 600;
      letter-spacing: 0.3px;
      cursor: pointer;
      transition: all 0.2s ease;
    }

    .btn-contour:hover {
      background: rgba(255, 255, 255, 0.08);
      transform: translateY(-1px);
    }

    .btn-contour.active {
      background: linear-gradient(135deg, rgba(102, 126, 234, 0.3), rgba(118, 75, 162, 0.3));
      border-color: var(--accent-from);
    }

    .contour-interval {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-top: 8px;
    }

    .contour-interval label {
      font-size: 11px;
      color: var(--text-dim);
      white-space: nowrap;
    }

    .contour-interval input {
      width: 60px;
      padding: 4px 6px;
      background: rgba(255, 255, 255, 0.06);
      border: 1px solid var(--border);
      border-radius: 4px;
      color: var(--text);
      font-family: 'JetBrains Mono', monospace;
      font-size: 12px;
      outline: none;
    }

    .contour-interval input:focus {
      border-color: var(--accent-from);
    }

    .status-dot {
      display: inline-block;
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: #4ade80;
      margin-right: 6px;
      animation: pulse-dot 2s infinite;
    }

    @keyframes pulse-dot {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }
  </style>
</head>
<body>
  <div id="app-container">
    <div id="scene-container">
      <div id="probe-tooltip"></div>
      <div id="lod-indicator"></div>
    </div>
    <div id="info-panel"></div>
  </div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
