<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>3D 粒子星座可视化</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    }

    body {
      background: radial-gradient(ellipse at center, #0a1628 0%, #030810 50%, #000000 100%);
    }

    #app {
      width: 100%;
      height: 100%;
      position: relative;
    }

    canvas {
      display: block;
      width: 100%;
      height: 100%;
    }

    .mode-switcher {
      position: fixed;
      right: 24px;
      bottom: 24px;
      z-index: 100;
      display: flex;
      flex-direction: column;
      gap: 8px;
      padding: 16px;
      border-radius: 16px;
      background: rgba(255, 255, 255, 0.06);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid rgba(255, 255, 255, 0.1);
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
      user-select: none;
    }

    .mode-switcher__label {
      font-size: 12px;
      color: rgba(200, 220, 255, 0.6);
      letter-spacing: 1px;
      text-transform: uppercase;
      margin-bottom: 4px;
    }

    .mode-btn {
      min-width: 140px;
      padding: 10px 18px;
      border: none;
      border-radius: 10px;
      background: rgba(100, 180, 255, 0.08);
      color: rgba(200, 230, 255, 0.8);
      font-size: 13px;
      font-weight: 500;
      letter-spacing: 0.5px;
      cursor: pointer;
      transition: all 0.25s ease;
      border: 1px solid rgba(100, 180, 255, 0.15);
      text-align: left;
    }

    .mode-btn:hover {
      background: rgba(100, 180, 255, 0.18);
      color: rgba(230, 245, 255, 1);
      transform: translateX(-2px);
      box-shadow: 0 4px 16px rgba(100, 180, 255, 0.2);
    }

    .mode-btn.active {
      background: linear-gradient(135deg, rgba(120, 200, 255, 0.3), rgba(180, 140, 255, 0.25));
      color: #ffffff;
      border-color: rgba(150, 200, 255, 0.4);
      box-shadow: 0 4px 20px rgba(120, 200, 255, 0.3), inset 0 1px 0 rgba(255, 255, 255, 0.1);
    }

    .hud {
      position: fixed;
      left: 24px;
      top: 24px;
      z-index: 100;
      padding: 14px 18px;
      border-radius: 12px;
      background: rgba(255, 255, 255, 0.04);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      border: 1px solid rgba(255, 255, 255, 0.08);
      color: rgba(180, 210, 255, 0.7);
      font-size: 12px;
      line-height: 1.8;
      pointer-events: none;
    }

    .hud__title {
      font-size: 14px;
      font-weight: 600;
      color: rgba(200, 230, 255, 0.95);
      margin-bottom: 8px;
      letter-spacing: 1px;
    }

    .hud__key {
      display: inline-block;
      padding: 1px 6px;
      border-radius: 4px;
      background: rgba(100, 180, 255, 0.15);
      color: rgba(180, 220, 255, 0.9);
      font-family: 'Consolas', monospace;
      font-size: 11px;
      margin-right: 4px;
    }
  </style>
</head>
<body>
  <div id="app">
    <canvas id="bg-stars"></canvas>
  </div>

  <div class="hud">
    <div class="hud__title">✦ 星座探索指南</div>
    <div><span class="hud__key">拖拽</span>旋转视角</div>
    <div><span class="hud__key">滚轮</span>缩放视距</div>
    <div><span class="hud__key">悬停</span>高亮粒子</div>
    <div><span class="hud__key">点击</span>触发脉冲</div>
    <div><span class="hud__key">WASD</span>平移视角</div>
  </div>

  <div class="mode-switcher">
    <div class="mode-switcher__label">Constellation Mode</div>
    <button class="mode-btn active" data-mode="random">◉ 随机星群</button>
    <button class="mode-btn" data-mode="spiral">✧ 螺旋星云</button>
    <button class="mode-btn" data-mode="binary">✦ 双星系统</button>
  </div>

  <script type="module" src="/src/main.ts"></script>
</body>
</html>
