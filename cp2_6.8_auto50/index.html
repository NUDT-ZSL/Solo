<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Magnetic Hourglass - 3D磁流体动力沙漏</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #1A1A2E;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    }
    #app {
      width: 100%;
      height: 100%;
      position: relative;
    }
    #canvas-container {
      width: 100%;
      height: 100%;
    }
    #loading {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      color: #00D4FF;
      font-size: 24px;
      text-shadow: 0 0 20px #00D4FF, 0 0 40px #00D4FF;
      letter-spacing: 4px;
      z-index: 100;
      animation: pulse 1.5s ease-in-out infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 0.5; }
      50% { opacity: 1; }
    }
    #error {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      color: #FF3366;
      font-size: 18px;
      text-shadow: 0 0 10px #FF3366;
      z-index: 100;
      display: none;
      padding: 20px;
      border: 2px solid #FF3366;
      background: rgba(26, 26, 46, 0.9);
      border-radius: 8px;
    }
    #controls {
      position: absolute;
      padding: 20px;
      background: rgba(26, 26, 46, 0.85);
      border: 2px solid #00D4FF;
      border-radius: 12px;
      box-shadow: 0 0 20px rgba(0, 212, 255, 0.3), inset 0 0 20px rgba(0, 212, 255, 0.05);
      backdrop-filter: blur(10px);
      z-index: 10;
    }
    #controls.full {
      top: 20px;
      right: 20px;
      width: 280px;
    }
    #controls.compact {
      bottom: 20px;
      right: 20px;
      width: 220px;
      padding: 12px;
    }
    #controls h3 {
      color: #00D4FF;
      margin-bottom: 16px;
      text-shadow: 0 0 10px #00D4FF;
      font-size: 16px;
      letter-spacing: 2px;
    }
    #controls.compact h3 {
      font-size: 14px;
      margin-bottom: 10px;
    }
    .control-group {
      margin-bottom: 14px;
    }
    #controls.compact .control-group {
      margin-bottom: 10px;
    }
    .control-group label {
      display: block;
      color: #E0E0E0;
      font-size: 13px;
      margin-bottom: 6px;
      letter-spacing: 1px;
    }
    #controls.compact .control-group label {
      font-size: 11px;
    }
    .slider-wrapper {
      position: relative;
    }
    input[type="range"] {
      -webkit-appearance: none;
      appearance: none;
      width: 100%;
      height: 8px;
      border-radius: 20px;
      background: linear-gradient(90deg, #00D4FF 0%, #00D4FF var(--value, 50%), rgba(0, 212, 255, 0.2) var(--value, 50%), rgba(0, 212, 255, 0.2) 100%);
      outline: none;
      transition: box-shadow 0.2s ease;
    }
    input[type="range"]:hover,
    input[type="range"]:active {
      box-shadow: 0 0 15px rgba(0, 212, 255, 0.6);
    }
    input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none;
      appearance: none;
      width: 18px;
      height: 18px;
      border-radius: 50%;
      background: #00D4FF;
      cursor: pointer;
      box-shadow: 0 0 10px #00D4FF, 0 0 20px rgba(0, 212, 255, 0.5);
      transition: transform 0.15s ease, box-shadow 0.15s ease;
    }
    input[type="range"]::-webkit-slider-thumb:hover,
    input[type="range"]:active::-webkit-slider-thumb {
      transform: scale(1.2);
      box-shadow: 0 0 15px #00D4FF, 0 0 30px #00D4FF;
    }
    input[type="range"]::-moz-range-thumb {
      width: 18px;
      height: 18px;
      border-radius: 50%;
      background: #00D4FF;
      cursor: pointer;
      border: none;
      box-shadow: 0 0 10px #00D4FF, 0 0 20px rgba(0, 212, 255, 0.5);
    }
    .slider-value {
      position: absolute;
      right: 0;
      top: -22px;
      color: #00D4FF;
      font-size: 12px;
      font-weight: bold;
      text-shadow: 0 0 5px #00D4FF;
    }
    #info {
      position: absolute;
      bottom: 20px;
      left: 20px;
      color: rgba(0, 212, 255, 0.7);
      font-size: 12px;
      z-index: 10;
      line-height: 1.8;
    }
    #fps {
      position: absolute;
      top: 20px;
      left: 20px;
      color: #00D4FF;
      font-size: 14px;
      text-shadow: 0 0 5px #00D4FF;
      z-index: 10;
      font-family: 'Courier New', monospace;
    }
  </style>
</head>
<body>
  <div id="app">
    <div id="canvas-container"></div>
    <div id="loading">INITIALIZING MAGNETIC FIELD...</div>
    <div id="error"></div>
    <div id="fps">FPS: --</div>
    <div id="controls" class="full">
      <h3>MAGNETIC HOURGLASS</h3>
      <div class="control-group">
        <label>磁场强度 / Magnetic Force</label>
        <div class="slider-wrapper">
          <span class="slider-value" id="magnet-force-value">2.5</span>
          <input type="range" id="magnet-force" min="0.1" max="5.0" step="0.1" value="2.5" />
        </div>
      </div>
      <div class="control-group">
        <label>重力加速度 / Gravity</label>
        <div class="slider-wrapper">
          <span class="slider-value" id="gravity-value">1.0</span>
          <input type="range" id="gravity" min="0.1" max="2.0" step="0.05" value="1.0" />
        </div>
      </div>
      <div class="control-group">
        <label>颗粒大小 / Particle Size</label>
        <div class="slider-wrapper">
          <span class="slider-value" id="particle-size-value">0.125</span>
          <input type="range" id="particle-size" min="0.05" max="0.3" step="0.005" value="0.125" />
        </div>
      </div>
    </div>
    <div id="info">
      拖拽鼠标旋转视角 | 滚轮缩放<br />
      拖拽红色磁铁控制磁场 | 观察颗粒流动
    </div>
  </div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
