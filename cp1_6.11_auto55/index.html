<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>目录书阁</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #1A1A2E;
      color: #FFFFFF;
      font-family: 'Microsoft YaHei', 'PingFang SC', sans-serif;
      overflow: hidden;
      height: 100vh;
      width: 100vw;
    }

    #loading-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: #1A1A2E;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 9999;
      transition: opacity 0.5s ease-out;
    }

    #loading-overlay.hidden {
      opacity: 0;
      pointer-events: none;
    }

    .loading-title {
      font-size: 28px;
      font-weight: bold;
      color: #FFA500;
      margin-bottom: 24px;
      letter-spacing: 4px;
    }

    .progress-bar-container {
      width: 300px;
      height: 4px;
      background: rgba(255, 255, 255, 0.1);
      border-radius: 2px;
      overflow: hidden;
    }

    .progress-bar {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, #FF8C00, #FFD700);
      border-radius: 2px;
      transition: width 0.3s ease-out;
    }

    .loading-text {
      margin-top: 12px;
      font-size: 13px;
      color: rgba(255, 255, 255, 0.5);
    }

    #navbar {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 48px;
      background: rgba(20, 20, 30, 0.9);
      backdrop-filter: blur(8px);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 24px;
      z-index: 100;
      border-bottom: 1px solid rgba(255, 255, 255, 0.08);
    }

    .nav-title {
      font-size: 24px;
      font-weight: bold;
      color: #FFFFFF;
      letter-spacing: 2px;
    }

    .nav-btn {
      padding: 6px 16px;
      background: rgba(255, 140, 0, 0.2);
      border: 1px solid rgba(255, 140, 0, 0.4);
      border-radius: 8px;
      color: #FFA500;
      font-size: 13px;
      cursor: pointer;
      transition: all 0.3s ease-out;
    }

    .nav-btn:hover {
      background: rgba(255, 140, 0, 0.35);
      border-color: rgba(255, 140, 0, 0.7);
    }

    #main-container {
      display: flex;
      width: 100%;
      height: calc(100vh - 48px);
      margin-top: 48px;
    }

    #left-panel {
      width: 60%;
      height: 100%;
      position: relative;
      overflow: hidden;
    }

    #right-panel {
      width: 40%;
      height: 100%;
      background: rgba(30, 30, 30, 0.7);
      backdrop-filter: blur(8px);
      border-left: 1px solid rgba(255, 255, 255, 0.08);
      overflow-y: auto;
      padding: 16px;
    }

    #upload-zone {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 10;
      background: rgba(26, 26, 46, 0.92);
      transition: opacity 0.5s ease-out;
    }

    #upload-zone.hidden {
      opacity: 0;
      pointer-events: none;
    }

    .upload-box {
      width: 400px;
      height: 260px;
      border: 2px dashed rgba(255, 140, 0, 0.4);
      border-radius: 16px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: all 0.3s ease-out;
      background: rgba(255, 140, 0, 0.05);
    }

    .upload-box:hover,
    .upload-box.drag-over {
      border-color: rgba(255, 140, 0, 0.8);
      background: rgba(255, 140, 0, 0.1);
      transform: scale(1.02);
    }

    .upload-icon {
      font-size: 48px;
      margin-bottom: 12px;
      opacity: 0.7;
    }

    .upload-text {
      font-size: 16px;
      color: rgba(255, 255, 255, 0.7);
      margin-bottom: 6px;
    }

    .upload-hint {
      font-size: 12px;
      color: rgba(255, 255, 255, 0.35);
    }

    #canvas-container {
      width: 100%;
      height: 100%;
    }

    #canvas-container canvas {
      display: block;
    }

    .section-title {
      font-size: 15px;
      font-weight: bold;
      color: #FFA500;
      margin-bottom: 12px;
      padding-bottom: 8px;
      border-bottom: 1px solid rgba(255, 140, 0, 0.2);
      letter-spacing: 1px;
    }

    .ocr-table-wrapper {
      max-height: 45%;
      overflow-y: auto;
      margin-bottom: 16px;
      border-radius: 8px;
      border: 1px solid #555;
    }

    .ocr-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 13px;
    }

    .ocr-table thead {
      position: sticky;
      top: 0;
      z-index: 1;
    }

    .ocr-table th {
      background: rgba(255, 140, 0, 0.15);
      color: #FFA500;
      padding: 8px 10px;
      text-align: left;
      font-weight: bold;
      border-bottom: 1px solid #555;
    }

    .ocr-table td {
      padding: 6px 10px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.06);
      color: rgba(255, 255, 255, 0.85);
    }

    .ocr-table tr {
      cursor: pointer;
      transition: background 0.2s ease-out;
    }

    .ocr-table tr:hover {
      background: rgba(255, 140, 0, 0.1);
    }

    .ocr-table tr.active-row {
      background: rgba(255, 140, 0, 0.2);
    }

    .level-badge {
      display: inline-block;
      padding: 1px 6px;
      border-radius: 4px;
      font-size: 11px;
      font-weight: bold;
    }

    .level-1 { background: rgba(255, 140, 0, 0.3); color: #FF8C00; }
    .level-2 { background: rgba(255, 215, 0, 0.3); color: #FFD700; }
    .level-3 { background: rgba(144, 238, 144, 0.3); color: #90EE90; }

    .control-panel {
      background: rgba(40, 40, 40, 0.6);
      border-radius: 8px;
      border: 1px solid #555;
      padding: 14px;
    }

    .control-group {
      margin-bottom: 14px;
    }

    .control-group:last-child {
      margin-bottom: 0;
    }

    .control-label {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 6px;
      font-size: 13px;
      color: rgba(255, 255, 255, 0.75);
    }

    .control-value {
      color: #FFA500;
      font-weight: bold;
    }

    input[type="range"] {
      width: 100%;
      -webkit-appearance: none;
      appearance: none;
      height: 4px;
      background: rgba(255, 255, 255, 0.15);
      border-radius: 2px;
      outline: none;
    }

    input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none;
      appearance: none;
      width: 14px;
      height: 14px;
      background: #FFA500;
      border-radius: 50%;
      cursor: pointer;
      transition: transform 0.2s ease-out;
    }

    input[type="range"]::-webkit-slider-thumb:hover {
      transform: scale(1.2);
    }

    .bg-options {
      display: flex;
      gap: 8px;
    }

    .bg-option {
      flex: 1;
      padding: 6px 0;
      text-align: center;
      border: 1px solid #555;
      border-radius: 8px;
      cursor: pointer;
      font-size: 12px;
      color: rgba(255, 255, 255, 0.7);
      transition: all 0.3s ease-out;
      background: transparent;
    }

    .bg-option:hover {
      border-color: rgba(255, 140, 0, 0.5);
    }

    .bg-option.active {
      border-color: #FFA500;
      background: rgba(255, 140, 0, 0.15);
      color: #FFA500;
    }

    .editable-cell {
      background: transparent;
      border: none;
      color: rgba(255, 255, 255, 0.85);
      font-size: 13px;
      font-family: inherit;
      width: 100%;
      outline: none;
      padding: 0;
    }

    .editable-cell:focus {
      color: #FFD700;
      border-bottom: 1px solid rgba(255, 215, 0, 0.5);
    }

    .page-input {
      width: 50px;
      background: transparent;
      border: none;
      color: #FFD700;
      font-size: 13px;
      text-align: center;
      outline: none;
      font-family: inherit;
    }

    .page-input:focus {
      border-bottom: 1px solid rgba(255, 215, 0, 0.5);
    }

    #ocr-status {
      font-size: 12px;
      color: rgba(255, 255, 255, 0.4);
      margin-bottom: 10px;
      min-height: 18px;
    }

    .placeholder-text {
      color: rgba(255, 255, 255, 0.25);
      text-align: center;
      padding: 30px 10px;
      font-size: 14px;
    }

    ::-webkit-scrollbar {
      width: 6px;
    }

    ::-webkit-scrollbar-track {
      background: transparent;
    }

    ::-webkit-scrollbar-thumb {
      background: rgba(255, 255, 255, 0.15);
      border-radius: 3px;
    }

    ::-webkit-scrollbar-thumb:hover {
      background: rgba(255, 255, 255, 0.25);
    }
  </style>
</head>
<body>
  <div id="loading-overlay">
    <div class="loading-title">目录书阁</div>
    <div class="progress-bar-container">
      <div class="progress-bar" id="progress-bar"></div>
    </div>
    <div class="loading-text" id="loading-text">正在加载资源...</div>
  </div>

  <nav id="navbar">
    <span class="nav-title">目录书阁</span>
    <button class="nav-btn" id="reupload-btn">重新上传</button>
  </nav>

  <div id="main-container">
    <div id="left-panel">
      <div id="upload-zone">
        <div class="upload-box" id="upload-box">
          <div class="upload-icon">📖</div>
          <div class="upload-text">点击或拖拽上传目录截图</div>
          <div class="upload-hint">支持 PNG / JPG，建议尺寸不超过 2000×2000</div>
        </div>
        <input type="file" id="file-input" accept="image/png,image/jpeg" style="display: none;" />
      </div>
      <div id="canvas-container"></div>
    </div>
    <div id="right-panel">
      <div class="section-title">OCR 识别结果</div>
      <div id="ocr-status"></div>
      <div class="ocr-table-wrapper" id="ocr-table-wrapper">
        <div class="placeholder-text" id="table-placeholder">上传截图后，识别结果将在此显示</div>
      </div>
      <div class="section-title">参数控制</div>
      <div class="control-panel">
        <div class="control-group">
          <div class="control-label">
            <span>书架层数</span>
            <span class="control-value" id="layer-value">5</span>
          </div>
          <input type="range" id="layer-slider" min="3" max="7" value="5" step="1" />
        </div>
        <div class="control-group">
          <div class="control-label">
            <span>书脊间距</span>
            <span class="control-value" id="spacing-value">8</span>
          </div>
          <input type="range" id="spacing-slider" min="4" max="12" value="8" step="1" />
        </div>
        <div class="control-group">
          <div class="control-label"><span>背景风格</span></div>
          <div class="bg-options">
            <button class="bg-option active" data-bg="wood">深木纹</button>
            <button class="bg-option" data-bg="black">纯黑</button>
            <button class="bg-option" data-bg="blue">深蓝</button>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script type="module" src="/src/main.ts"></script>
</body>
</html>
