<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>浮游冰晶极光森林</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #0A0A1A;
      font-family: 'Segoe UI', 'Microsoft YaHei', sans-serif;
      color: #F0F8FF;
    }
    #canvas-container {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 1;
    }
    #status-panel {
      position: fixed;
      left: 20px;
      bottom: 20px;
      z-index: 10;
      background: rgba(26, 26, 58, 0.7);
      padding: 12px 18px;
      border-radius: 8px;
      font-size: 13px;
      line-height: 1.8;
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      border: 1px solid rgba(208, 224, 255, 0.15);
      transition: color 0.5s ease;
    }
    #status-panel .label {
      color: #D0E0FF;
      opacity: 0.8;
    }
    #status-panel .value {
      color: #F0F8FF;
      font-weight: 600;
      margin-left: 8px;
    }
    #control-panel {
      position: fixed;
      right: 20px;
      bottom: 20px;
      z-index: 10;
      background: rgba(26, 26, 58, 0.7);
      padding: 18px 20px;
      border-radius: 8px;
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      border: 1px solid rgba(208, 224, 255, 0.15);
      min-width: 260px;
      transition: border-color 0.5s ease;
    }
    #control-panel h3 {
      font-size: 15px;
      font-weight: 600;
      color: #D0E0FF;
      margin-bottom: 14px;
      padding-bottom: 8px;
      border-bottom: 1px solid rgba(208, 224, 255, 0.2);
    }
    .control-item {
      margin-bottom: 14px;
    }
    .control-item:last-of-type {
      margin-bottom: 16px;
    }
    .control-item label {
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 12px;
      color: #D0E0FF;
      margin-bottom: 6px;
    }
    .control-item label .value-display {
      color: #F0F8FF;
      font-weight: 500;
    }
    .control-item input[type="range"] {
      width: 100%;
      height: 4px;
      -webkit-appearance: none;
      appearance: none;
      background: rgba(208, 224, 255, 0.2);
      border-radius: 2px;
      outline: none;
      cursor: pointer;
    }
    .control-item input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none;
      appearance: none;
      width: 14px;
      height: 14px;
      background: #D0E0FF;
      border-radius: 50%;
      cursor: pointer;
      transition: background 0.2s, transform 0.2s;
    }
    .control-item input[type="range"]::-webkit-slider-thumb:hover {
      background: #F0F8FF;
      transform: scale(1.15);
    }
    .control-item input[type="range"]::-moz-range-thumb {
      width: 14px;
      height: 14px;
      background: #D0E0FF;
      border-radius: 50%;
      cursor: pointer;
      border: none;
    }
    #reset-btn {
      width: 100%;
      padding: 10px 16px;
      background: linear-gradient(135deg, rgba(0, 255, 136, 0.15), rgba(68, 136, 255, 0.15));
      border: 1px solid rgba(208, 224, 255, 0.3);
      border-radius: 6px;
      color: #F0F8FF;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.3s ease;
    }
    #reset-btn:hover {
      background: linear-gradient(135deg, rgba(0, 255, 136, 0.25), rgba(68, 136, 255, 0.25));
      border-color: rgba(208, 224, 255, 0.5);
      transform: translateY(-1px);
    }
    #reset-btn:active {
      transform: translateY(0);
    }
  </style>
</head>
<body>
  <div id="canvas-container"></div>
  <div id="status-panel">
    <div><span class="label">FPS:</span><span class="value" id="fps-value">60</span></div>
    <div><span class="label">冰晶数量:</span><span class="value" id="crystal-count">50</span></div>
  </div>
  <div id="control-panel">
    <h3>场景参数</h3>
    <div class="control-item">
      <label>极光色彩速度 <span class="value-display" id="speed-value">1.0x</span></label>
      <input type="range" id="aurora-speed" min="0.1" max="2.0" step="0.1" value="1.0" />
    </div>
    <div class="control-item">
      <label>冰晶透明度 <span class="value-display" id="opacity-value">0.4</span></label>
      <input type="range" id="crystal-opacity" min="0.1" max="0.8" step="0.05" value="0.4" />
    </div>
    <div class="control-item">
      <label>生长粒子数量 <span class="value-display" id="particle-value">25</span></label>
      <input type="range" id="particle-count" min="10" max="50" step="5" value="25" />
    </div>
    <button id="reset-btn">重置场景</button>
  </div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
