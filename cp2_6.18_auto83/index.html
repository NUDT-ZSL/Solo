<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>牌类游戏回合记录与复盘分析</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Microsoft YaHei', Arial, sans-serif;
      background: #1a237e;
      color: #ffffff;
      min-height: 100vh;
      overflow: hidden;
    }

    #app {
      width: 100%;
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    .view-container {
      width: 100%;
      height: 100%;
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    #menuContainer {
      background: linear-gradient(135deg, #1a237e 0%, #283593 100%);
      padding: 40px;
      gap: 30px;
    }

    .menu-title {
      font-size: 36px;
      font-weight: bold;
      color: #ffffff;
      text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.3);
      margin-bottom: 20px;
    }

    .menu-section {
      background: rgba(255, 255, 255, 0.1);
      border-radius: 12px;
      padding: 24px;
      width: 400px;
      backdrop-filter: blur(10px);
    }

    .menu-section h2 {
      font-size: 20px;
      margin-bottom: 16px;
      color: #e8eaf6;
    }

    .form-group {
      margin-bottom: 16px;
    }

    .form-group label {
      display: block;
      margin-bottom: 8px;
      font-size: 14px;
      color: #c5cae9;
    }

    .form-group select,
    .form-group input {
      width: 100%;
      padding: 10px 12px;
      border: 1px solid #5c6bc0;
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.1);
      color: #ffffff;
      font-size: 14px;
      outline: none;
      transition: border-color 0.2s ease;
    }

    .form-group select:focus,
    .form-group input:focus {
      border-color: #7c4dff;
    }

    .form-group select option {
      background: #283593;
      color: #ffffff;
    }

    .btn-primary {
      background: #7c4dff;
      color: #ffffff;
      border: none;
      padding: 12px 24px;
      border-radius: 8px;
      font-size: 16px;
      font-weight: bold;
      cursor: pointer;
      transition: background 0.2s cubic-bezier(0.4, 0, 0.2, 1);
      width: 100%;
    }

    .btn-primary:hover {
      background: #b388ff;
    }

    .btn-secondary {
      background: transparent;
      color: #ffffff;
      border: 2px solid #7c4dff;
      padding: 10px 20px;
      border-radius: 8px;
      font-size: 14px;
      cursor: pointer;
      transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .btn-secondary:hover {
      background: rgba(124, 77, 255, 0.2);
    }

    #gameContainer {
      flex-direction: row;
      gap: 20px;
      padding: 20px;
    }

    .game-main {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 16px;
    }

    .game-info-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      width: 100%;
      padding: 10px 20px;
      background: rgba(0, 0, 0, 0.3);
      border-radius: 8px;
    }

    .current-player-info {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .current-player-info span.label {
      color: #9fa8da;
      font-size: 14px;
    }

    #currentPlayer {
      font-size: 18px;
      font-weight: bold;
    }

    .game-actions {
      display: flex;
      gap: 10px;
    }

    #gameCanvas {
      border-radius: 12px;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.4);
      cursor: pointer;
    }

    .sidebar {
      width: 320px;
      display: flex;
      flex-direction: column;
      gap: 16px;
      height: 100%;
    }

    .sidebar-section {
      background: rgba(0, 0, 0, 0.3);
      border-radius: 12px;
      padding: 16px;
    }

    .sidebar-section h3 {
      font-size: 16px;
      margin-bottom: 12px;
      color: #e8eaf6;
      border-bottom: 1px solid rgba(255, 255, 255, 0.1);
      padding-bottom: 8px;
    }

    #playRecordList {
      max-height: 400px;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .play-record-item {
      display: flex;
      align-items: center;
      gap: 10px;
      width: 280px;
      height: 40px;
      padding: 0 12px;
      background: rgba(255, 255, 255, 0.05);
      border-radius: 6px;
      font-size: 13px;
      color: #ffffff;
    }

    .player-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    #gameResultPanel {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.6);
      align-items: center;
      justify-content: center;
      z-index: 1000;
    }

    .result-panel-content {
      width: 400px;
      height: 300px;
      background: linear-gradient(135deg, #e8eaf6 0%, #c5cae9 100%);
      border-radius: 16px;
      padding: 30px;
      color: #1a237e;
      display: flex;
      flex-direction: column;
      align-items: center;
      transform: scale(0.8);
      opacity: 0;
      transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
      overflow-y: auto;
    }

    #gameResultPanel.panel-enter .result-panel-content {
      transform: scale(1);
      opacity: 1;
    }

    .result-panel-content h3 {
      font-size: 24px;
      margin-bottom: 16px;
      color: #1a237e;
    }

    .result-game-id {
      font-size: 12px;
      color: #5c6bc0;
      margin-bottom: 12px;
    }

    .result-player-row {
      display: flex;
      align-items: center;
      gap: 10px;
      width: 100%;
      padding: 8px 12px;
      margin-bottom: 6px;
      background: rgba(26, 35, 126, 0.1);
      border-radius: 8px;
      font-size: 14px;
      color: #1a237e;
    }

    .result-player-row.winner {
      background: rgba(124, 77, 255, 0.2);
      border: 2px solid #7c4dff;
    }

    #replayContainer {
      flex-direction: row;
      gap: 20px;
      padding: 20px;
    }

    .replay-main {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 16px;
    }

    .replay-controls {
      display: flex;
      flex-direction: column;
      gap: 12px;
      width: 100%;
      padding: 16px;
      background: rgba(0, 0, 0, 0.3);
      border-radius: 12px;
    }

    .replay-controls-top {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 16px;
    }

    .progress-container {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    #progressBar {
      width: 100%;
      height: 8px;
      -webkit-appearance: none;
      appearance: none;
      background: rgba(255, 255, 255, 0.2);
      border-radius: 4px;
      outline: none;
      cursor: pointer;
    }

    #progressBar::-webkit-slider-thumb {
      -webkit-appearance: none;
      appearance: none;
      width: 20px;
      height: 20px;
      border-radius: 50%;
      background: #7c4dff;
      cursor: pointer;
      transition: background 0.2s ease;
    }

    #progressBar::-webkit-slider-thumb:hover {
      background: #b388ff;
    }

    #stepInfo {
      font-size: 13px;
      color: #c5cae9;
    }

    .speed-controls {
      display: flex;
      gap: 4px;
    }

    .speed-btn {
      padding: 6px 12px;
      background: rgba(255, 255, 255, 0.1);
      border: 1px solid rgba(255, 255, 255, 0.2);
      border-radius: 6px;
      color: #ffffff;
      font-size: 13px;
      cursor: pointer;
      transition: all 0.2s ease;
    }

    .speed-btn:hover {
      background: rgba(124, 77, 255, 0.3);
    }

    .speed-btn.active {
      background: #7c4dff;
      border-color: #7c4dff;
    }

    .replay-sidebar {
      width: 340px;
      display: flex;
      flex-direction: column;
      gap: 16px;
      height: 100%;
    }

    .replay-input-section {
      background: rgba(0, 0, 0, 0.3);
      border-radius: 12px;
      padding: 16px;
    }

    .replay-input-section h3 {
      font-size: 16px;
      margin-bottom: 12px;
      color: #e8eaf6;
    }

    .input-row {
      display: flex;
      gap: 8px;
      margin-bottom: 12px;
    }

    .input-row input {
      flex: 1;
      padding: 8px 12px;
      border: 1px solid #5c6bc0;
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.1);
      color: #ffffff;
      font-size: 14px;
      outline: none;
    }

    .input-row button {
      padding: 8px 16px;
      background: #7c4dff;
      color: #ffffff;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-size: 14px;
      transition: background 0.2s ease;
    }

    .input-row button:hover {
      background: #b388ff;
    }

    #historyList {
      max-height: 400px;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .history-item {
      width: 300px;
      height: 50px;
      background: #37474f;
      border-radius: 8px;
      padding: 0 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      cursor: pointer;
      transition: background 0.2s cubic-bezier(0.4, 0, 0.2, 1);
      font-size: 13px;
      color: #ffffff;
    }

    .history-item:hover {
      background: #455a64;
    }

    .history-game-type {
      font-weight: bold;
    }

    .history-date {
      color: #90a4ae;
    }

    .history-players {
      color: #90a4ae;
    }

    .winrate-card {
      width: 360px;
      height: 220px;
      background: #ffffff;
      border: 2px solid #bdbdbd;
      border-radius: 12px;
      padding: 20px;
      color: #212121;
    }

    .winrate-card h3 {
      font-size: 18px;
      margin-bottom: 16px;
      color: #1a237e;
    }

    #replayCanvas {
      border-radius: 12px;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.4);
    }

    ::-webkit-scrollbar {
      width: 6px;
    }

    ::-webkit-scrollbar-track {
      background: rgba(255, 255, 255, 0.1);
      border-radius: 3px;
    }

    ::-webkit-scrollbar-thumb {
      background: rgba(255, 255, 255, 0.3);
      border-radius: 3px;
    }

    ::-webkit-scrollbar-thumb:hover {
      background: rgba(255, 255, 255, 0.5);
    }

    @media (max-width: 1000px) {
      #gameContainer,
      #replayContainer {
        flex-direction: column;
      }

      .sidebar,
      .replay-sidebar {
        width: 100%;
        max-width: 600px;
      }
    }
  </style>
</head>
<body>
  <div id="app">
    <div id="menuContainer" class="view-container">
      <h1 class="menu-title">🎴 牌类游戏复盘系统</h1>

      <div class="menu-section">
        <h2>创建新牌局</h2>
        <div class="form-group">
          <label for="gameTypeSelect">游戏类型</label>
          <select id="gameTypeSelect">
            <option value="dou dizhu">斗地主</option>
            <option value="uno">UNO</option>
          </select>
        </div>
        <div class="form-group">
          <label for="playerNamesInput">玩家名称（用逗号分隔，最多4人）</label>
          <input type="text" id="playerNamesInput" placeholder="玩家1,玩家2,玩家3" value="玩家1,玩家2,玩家3">
        </div>
        <button id="createGameBtn" class="btn-primary">开始游戏</button>
      </div>

      <div class="menu-section">
        <h2>历史牌局</h2>
        <button id="replayBtn" class="btn-secondary" style="width: 100%;">查看历史回放</button>
      </div>
    </div>

    <div id="gameContainer" class="view-container">
      <div class="game-main">
        <div class="game-info-bar">
          <div class="current-player-info">
            <span class="label">当前玩家:</span>
            <span id="currentPlayer">-</span>
          </div>
          <div class="game-actions">
            <button id="playCardsBtn" class="btn-primary" style="width: auto; padding: 8px 20px; font-size: 14px;">
              确认出牌
            </button>
            <button id="backToMenuBtn" class="btn-secondary">返回菜单</button>
          </div>
        </div>
        <canvas id="gameCanvas" width="1200" height="700"></canvas>
      </div>

      <div class="sidebar">
        <div class="sidebar-section">
          <h3>出牌记录</h3>
          <div id="playRecordList"></div>
        </div>
      </div>

      <div id="gameResultPanel">
        <div class="result-panel-content">
          <div id="resultContent"></div>
        </div>
      </div>
    </div>

    <div id="replayContainer" class="view-container">
      <div class="replay-main">
        <div class="game-info-bar">
          <div class="current-player-info">
            <span class="label">牌局回放</span>
          </div>
          <div class="game-actions">
            <button id="replayBackBtn" class="btn-secondary">返回菜单</button>
          </div>
        </div>
        <canvas id="replayCanvas" width="1200" height="700"></canvas>
        <div class="replay-controls">
          <div class="replay-controls-top">
            <div class="progress-container">
              <input type="range" id="progressBar" min="0" max="100" value="0">
              <span id="stepInfo">第 0 步</span>
            </div>
            <button id="playPauseBtn" class="btn-primary" style="width: auto; padding: 8px 20px;">播放</button>
          </div>
          <div class="speed-controls">
            <button class="speed-btn" data-speed="0.5">0.5x</button>
            <button class="speed-btn active" data-speed="1">1x</button>
            <button class="speed-btn" data-speed="2">2x</button>
          </div>
        </div>
      </div>

      <div class="replay-sidebar">
        <div class="replay-input-section">
          <h3>加载牌局</h3>
          <div class="input-row">
            <input type="text" id="gameIdInput" placeholder="输入牌局ID">
            <button id="loadReplayBtn">加载</button>
          </div>
          <div id="replayInfo" style="font-size: 13px; color: #c5cae9;">
            <p>请输入牌局ID或从历史记录中选择</p>
          </div>
        </div>

        <div class="sidebar-section">
          <h3>历史记录</h3>
          <div id="historyList"></div>
        </div>
      </div>
    </div>

    <div id="winratePanel" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); align-items: center; justify-content: center; z-index: 1000;">
      <div class="winrate-card" id="winrateCard">
        <h3>本局胜率分析</h3>
        <div id="winrateContent"></div>
      </div>
    </div>
  </div>

  <script type="module" src="/src/game-entry.ts"></script>
</body>
</html>
