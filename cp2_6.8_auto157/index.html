<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>3D 分形树生长模拟器</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      min-width: 800px;
      overflow: hidden;
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #0B132B 0%, #1C1C3A 100%);
      color: #E2E8F0;
    }

    #app {
      position: relative;
      width: 100%;
      height: 100%;
    }

    #canvas-container {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
    }

    #loading {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 16px;
      z-index: 100;
    }

    .spinner {
      width: 48px;
      height: 48px;
      border: 3px solid #2D3748;
      border-top-color: #63B3ED;
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    #loading span {
      font-size: 14px;
      color: #A0AEC0;
      letter-spacing: 0.5px;
    }

    #fps-counter {
      position: absolute;
      bottom: 20px;
      right: 20px;
      padding: 6px 12px;
      background: rgba(0, 0, 0, 0.4);
      border-radius: 6px;
      color: #FFFFFF;
      font-size: 14px;
      font-variant-numeric: tabular-nums;
      z-index: 50;
      pointer-events: none;
    }

    .hidden {
      display: none !important;
    }
  </style>
</head>
<body>
  <div id="app">
    <div id="loading">
      <div class="spinner"></div>
      <span>正在加载场景...</span>
    </div>
    <div id="canvas-container"></div>
    <div id="fps-counter">FPS: --</div>
  </div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
