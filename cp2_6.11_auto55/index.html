<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>目录书阁 - 3D沉浸式目录展示</title>
  <style>
    :root {
      --bg-page: #1A1A2E;
      --bg-panel: rgba(30, 30, 30, 0.7);
      --border-color: #555;
      --text-primary: #FFFFFF;
      --text-secondary: #CCCCCC;
      --accent-orange: #FF8C00;
      --accent-yellow: #FFD700;
      --accent-green: #90EE90;
      --wood-start: #3E2723;
      --wood-end: #5D4037;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background-color: var(--bg-page);
      color: var(--text-primary);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
    }

    #app {
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
    }

    .navbar {
      height: 56px;
      flex-shrink: 0;
      background: rgba(20, 20, 30, 0.95);
      border-bottom: 1px solid var(--border-color);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 24px;
      backdrop-filter: blur(8px);
      z-index: 100;
    }

    .navbar-title {
      font-size: 24px;
      font-weight: 700;
      color: #FFFFFF;
      letter-spacing: 2px;
    }

    .btn {
      padding: 8px 18px;
      border-radius: 8px;
      border: 1px solid var(--border-color);
      background: rgba(60, 60, 80, 0.6);
      color: var(--text-primary);
      font-size: 14px;
      cursor: pointer;
      transition: all 0.25s ease-out;
    }
    .btn:hover {
      background: var(--accent-orange);
      border-color: var(--accent-orange);
      transform: translateY(-1px);
    }
    .btn-primary {
      background: var(--accent-orange);
      border-color: var(--accent-orange);
      font-weight: 600;
    }
    .btn-primary:hover {
      background: #FFA500;
    }

    .main-container {
      flex: 1;
      display: flex;
      overflow: hidden;
    }

    .canvas-area {
      flex: 0 0 60%;
      position: relative;
      overflow: hidden;
      background: radial-gradient(ellipse at center, #2a2030 0%, #1A1A2E 100%);
    }

    #three-canvas {
      width: 100%;
      height: 100%;
      display: block;
    }

    .panel-area {
      flex: 0 0 40%;
      padding: 16px;
      overflow-y: auto;
      background: var(--bg-panel);
      backdrop-filter: blur(8px);
      border-left: 1px solid var(--border-color);
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .panel-section {
      background: rgba(40, 40, 55, 0.5);
      border: 1px solid var(--border-color);
      border-radius: 10px;
      padding: 16px;
    }

    .section-title {
      font-size: 15px;
      font-weight: 700;
      margin-bottom: 12px;
      color: var(--accent-yellow);
      padding-bottom: 8px;
      border-bottom: 1px solid rgba(255, 215, 0, 0.2);
    }

    .upload-zone {
      border: 2px dashed var(--border-color);
      border-radius: 10px;
      padding: 30px 20px;
      text-align: center;
      cursor: pointer;
      transition: all 0.3s ease-out;
    }
    .upload-zone:hover,
    .upload-zone.dragover {
      border-color: var(--accent-orange);
      background: rgba(255, 140, 0, 0.08);
    }
    .upload-icon {
      font-size: 48px;
      margin-bottom: 8px;
    }
    .upload-text {
      font-size: 14px;
      color: var(--text-secondary);
    }
    .upload-text strong {
      color: var(--accent-orange);
    }

    .progress-bar {
      margin-top: 14px;
      height: 6px;
      background: rgba(255, 255, 255, 0.1);
      border-radius: 3px;
      overflow: hidden;
      display: none;
    }
    .progress-bar.active { display: block; }
    .progress-fill {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, var(--accent-orange), var(--accent-yellow));
      transition: width 0.2s linear;
    }
    .progress-label {
      margin-top: 6px;
      font-size: 12px;
      color: var(--text-secondary);
    }

    .param-row {
      margin-bottom: 14px;
    }
    .param-label {
      display: flex;
      justify-content: space-between;
      font-size: 13px;
      margin-bottom: 6px;
      color: var(--text-secondary);
    }
    .param-value {
      color: var(--accent-yellow);
      font-weight: 600;
    }
    .slider {
      width: 100%;
      height: 6px;
      -webkit-appearance: none;
      appearance: none;
      background: rgba(255, 255, 255, 0.1);
      border-radius: 3px;
      outline: none;
    }
    .slider::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 16px;
      height: 16px;
      background: var(--accent-orange);
      border-radius: 50%;
      cursor: pointer;
      transition: all 0.2s;
    }
    .slider::-webkit-slider-thumb:hover {
      transform: scale(1.2);
      box-shadow: 0 0 10px rgba(255, 140, 0, 0.5);
    }

    .bg-options {
      display: flex;
      gap: 8px;
    }
    .bg-option {
      flex: 1;
      padding: 10px 6px;
      text-align: center;
      border-radius: 8px;
      border: 1px solid var(--border-color);
      cursor: pointer;
      font-size: 12px;
      transition: all 0.2s;
    }
    .bg-option:hover { border-color: var(--accent-yellow); }
    .bg-option.active {
      border-color: var(--accent-yellow);
      background: rgba(255, 215, 0, 0.15);
    }
    .bg-preview {
      width: 100%;
      height: 20px;
      border-radius: 4px;
      margin-bottom: 4px;
    }
    .bg-preview.wood { background: linear-gradient(180deg, #3E2723, #5D4037); }
    .bg-preview.black { background: #000000; }
    .bg-preview.navy { background: #000033; }

    .table-wrapper {
      max-height: 350px;
      overflow-y: auto;
      border-radius: 8px;
      border: 1px solid rgba(255,255,255,0.08);
    }
    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 13px;
    }
    thead {
      position: sticky;
      top: 0;
      background: rgba(50, 50, 70, 0.95);
      z-index: 10;
    }
    th {
      padding: 10px 8px;
      text-align: left;
      font-weight: 600;
      color: var(--accent-yellow);
      border-bottom: 1px solid var(--border-color);
      background: rgba(50, 50, 70, 0.95);
    }
    td {
      padding: 8px;
      border-bottom: 1px solid rgba(255,255,255,0.05);
      color: var(--text-secondary);
      vertical-align: middle;
    }
    tbody tr {
      cursor: pointer;
      transition: background 0.15s;
    }
    tbody tr:nth-child(even) {
      background: rgba(255, 255, 255, 0.02);
    }
    tbody tr:hover {
      background: rgba(255, 140, 0, 0.12);
    }
    tbody tr.active {
      background: rgba(255, 140, 0, 0.25) !important;
    }
    .level-badge {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 4px;
      font-size: 11px;
      font-weight: 700;
      color: #000;
    }
    .level-badge.l1 { background: var(--accent-orange); }
    .level-badge.l2 { background: var(--accent-yellow); }
    .level-badge.l3 { background: var(--accent-green); }

    td input {
      width: 100%;
      background: rgba(0,0,0,0.3);
      border: 1px solid var(--border-color);
      border-radius: 4px;
      padding: 4px 6px;
      color: var(--text-primary);
      font-size: 12px;
      outline: none;
    }
    td input:focus { border-color: var(--accent-orange); }

    .initial-placeholder {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      text-align: center;
      color: var(--text-secondary);
      pointer-events: none;
    }
    .placeholder-icon {
      font-size: 80px;
      opacity: 0.3;
      margin-bottom: 16px;
    }
    .placeholder-text {
      font-size: 16px;
      opacity: 0.5;
    }

    .hover-bubble {
      position: fixed;
      z-index: 200;
      width: 120px;
      height: 80px;
      background: rgba(30, 30, 40, 0.7);
      backdrop-filter: blur(4px);
      -webkit-backdrop-filter: blur(4px);
      border: 1px solid rgba(255, 255, 255, 0.15);
      border-radius: 10px;
      padding: 6px;
      pointer-events: none;
      display: none;
      opacity: 0;
      transition: opacity 0.2s ease-out;
      overflow: hidden;
    }
    .hover-bubble.visible {
      display: block;
      opacity: 1;
    }
    .hover-bubble img,
    .hover-bubble canvas {
      width: 100%;
      height: 100%;
      object-fit: cover;
      border-radius: 6px;
      animation: dynablur 2s ease-in-out infinite;
    }
    @keyframes dynablur {
      0%, 100% { filter: blur(0px); }
      50% { filter: blur(4px); }
    }
    .bubble-arrow {
      position: absolute;
      right: -10px;
      top: 50%;
      transform: translateY(-50%);
      width: 0;
      height: 0;
      border-top: 8px solid transparent;
      border-bottom: 8px solid transparent;
      border-left: 10px solid rgba(255, 255, 255, 0.15);
    }

    ::-webkit-scrollbar {
      width: 8px;
      height: 8px;
    }
    ::-webkit-scrollbar-track {
      background: rgba(0,0,0,0.2);
    }
    ::-webkit-scrollbar-thumb {
      background: rgba(255,255,255,0.15);
      border-radius: 4px;
    }
    ::-webkit-scrollbar-thumb:hover {
      background: var(--accent-orange);
    }
  </style>
</head>
<body>
  <div id="app">
    <nav class="navbar">
      <div class="navbar-title">目录书阁</div>
      <button id="btn-reupload" class="btn">📁 重新上传</button>
    </nav>

    <div class="main-container">
      <div class="canvas-area" id="canvas-area">
        <canvas id="three-canvas"></canvas>
        <div class="initial-placeholder" id="placeholder">
          <div class="placeholder-icon">📚</div>
          <div class="placeholder-text">上传目录截图，开启沉浸式书阁之旅</div>
        </div>
        <div class="hover-bubble" id="hover-bubble">
          <canvas id="bubble-thumb"></canvas>
          <div class="bubble-arrow"></div>
        </div>
      </div>

      <div class="panel-area">
        <div class="panel-section">
          <div class="section-title">📤 上传目录截图</div>
          <div class="upload-zone" id="upload-zone">
            <div class="upload-icon">🖼️</div>
            <div class="upload-text">拖拽图片到此处，或 <strong>点击选择文件</strong></div>
            <div style="font-size:12px; color:#888; margin-top:8px;">支持 PNG / JPG，建议尺寸 ≤ 2000×2000</div>
            <input type="file" id="file-input" accept="image/png,image/jpeg" style="display:none" />
            <div class="progress-bar" id="progress-bar">
              <div class="progress-fill" id="progress-fill"></div>
            </div>
            <div class="progress-label" id="progress-label" style="display:none;"></div>
          </div>
        </div>

        <div class="panel-section">
          <div class="section-title">⚙️ 参数控制面板</div>
          <div class="param-row">
            <div class="param-label">
              <span>书架层数</span>
              <span class="param-value"><span id="layers-val">5</span> 层</span>
            </div>
            <input type="range" min="3" max="7" value="5" class="slider" id="layers-slider" />
          </div>
          <div class="param-row">
            <div class="param-label">
              <span>书脊间距</span>
              <span class="param-value"><span id="gap-val">8</span> 单位</span>
            </div>
            <input type="range" min="4" max="12" value="8" class="slider" id="gap-slider" />
          </div>
          <div class="param-row">
            <div class="param-label" style="margin-bottom:10px;"><span>背景主题</span></div>
            <div class="bg-options" id="bg-options">
              <div class="bg-option active" data-bg="wood">
                <div class="bg-preview wood"></div>
                <span>深木纹</span>
              </div>
              <div class="bg-option" data-bg="black">
                <div class="bg-preview black"></div>
                <span>纯黑</span>
              </div>
              <div class="bg-option" data-bg="navy">
                <div class="bg-preview navy"></div>
                <span>深蓝</span>
              </div>
            </div>
          </div>
        </div>

        <div class="panel-section" style="flex:1; display:flex; flex-direction:column;">
          <div class="section-title">📋 OCR识别结果（可编辑，点击定位书脊）</div>
          <div class="table-wrapper" style="flex:1;">
            <table id="ocr-table">
              <thead>
                <tr>
                  <th style="width:60px;">层级</th>
                  <th>章节标题</th>
                  <th style="width:70px;">页码</th>
                </tr>
              </thead>
              <tbody id="ocr-tbody">
                <tr><td colspan="3" style="text-align:center; padding:30px; color:#666;">等待上传...</td></tr>
              </tbody>
            </table>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script type="module" src="/src/main.ts"></script>
</body>
</html>
