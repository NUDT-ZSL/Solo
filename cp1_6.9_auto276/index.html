<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>潮汐回响</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      html, body {
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: linear-gradient(180deg,
          hsl(240, 70%, 15%) 0%,
          hsl(260, 65%, 12%) 50%,
          hsl(270, 60%, 10%) 100%);
        font-family: 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
      }
      body {
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 20px;
      }
      #game-container {
        width: 100%;
        max-width: 800px;
        aspect-ratio: 16 / 9;
        border-radius: 12px;
        overflow: hidden;
        box-shadow: 0 0 60px rgba(100, 150, 255, 0.25),
                    0 20px 60px rgba(0, 0, 0, 0.5);
        position: relative;
      }
      #game-container::before {
        content: '';
        position: absolute;
        inset: 0;
        border: 1px solid rgba(150, 200, 255, 0.15);
        border-radius: 12px;
        pointer-events: none;
        z-index: 10;
      }
      #game-container canvas {
        display: block;
        width: 100% !important;
        height: 100% !important;
      }
    </style>
  </head>
  <body>
    <div id="game-container"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
