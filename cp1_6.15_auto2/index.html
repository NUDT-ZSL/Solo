<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CityAura - 城市空气质量可视化</title>
  <link rel="stylesheet" href="/src/style.css">
</head>
<body>
  <div id="app">
    <canvas id="scene-canvas"></canvas>
    
    <div id="ui-panel" class="panel">
      <div class="panel-header">
        <h2>CityAura</h2>
        <p class="subtitle">城市空气质量监测</p>
      </div>
      
      <div class="panel-section">
        <div class="stat-card">
          <span class="stat-label">全局 AQI 均值</span>
          <span id="global-aqi" class="stat-value">--</span>
        </div>
      </div>
      
      <div class="panel-section">
        <div class="selected-info">
          <span class="selected-label">选中采样点</span>
          <span id="selected-point" class="selected-value">未选择</span>
        </div>
        <div id="chart-container" class="chart-container">
          <svg id="history-chart"></svg>
        </div>
      </div>
      
      <div class="panel-section">
        <div class="control-group">
          <button id="btn-pause" class="btn btn-primary">暂停</button>
          <button id="btn-topview" class="btn">俯视图</button>
          <button id="btn-perspective" class="btn">透视图</button>
        </div>
      </div>
      
      <div class="panel-section">
        <div class="playback-controls">
          <label class="playback-label">
            <input type="checkbox" id="playback-mode"> 历史回放
          </label>
          <input type="range" id="time-slider" class="time-slider" min="0" max="100" value="100" disabled>
          <span id="time-display" class="time-display">实时</span>
        </div>
      </div>
    </div>
    
    <div id="mobile-toggle" class="mobile-toggle">
      <span>📊 查看数据</span>
    </div>
  </div>
  
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
