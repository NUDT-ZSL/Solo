<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>太阳系轨道进动模拟</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #000; }
    canvas { display: block; }
    #hint {
      position: fixed;
      bottom: 30px;
      left: 50%;
      transform: translateX(-50%);
      color: rgba(255, 255, 255, 0.7);
      font-family: 'Segoe UI', Arial, sans-serif;
      font-size: 14px;
      letter-spacing: 1px;
      text-shadow: 0 0 10px rgba(100, 150, 255, 0.5);
      pointer-events: none;
      user-select: none;
    }
    #fps-counter {
      position: fixed;
      top: 15px;
      left: 15px;
      color: #00FF00;
      font-family: 'Consolas', 'Courier New', monospace;
      font-size: 14px;
      text-shadow: 0 0 5px rgba(0, 255, 0, 0.5);
      pointer-events: none;
      user-select: none;
      z-index: 10;
    }
    #sim-time {
      position: fixed;
      top: 35px;
      left: 15px;
      color: #00FF00;
      font-family: 'Consolas', 'Courier New', monospace;
      font-size: 14px;
      text-shadow: 0 0 5px rgba(0, 255, 0, 0.5);
      pointer-events: none;
      user-select: none;
      z-index: 10;
    }
    #gravity-warning {
      position: fixed;
      top: 15px;
      right: 15px;
      display: none;
      align-items: center;
      gap: 8px;
      color: #FF4444;
      font-family: 'Segoe UI', Arial, sans-serif;
      font-size: 14px;
      font-weight: bold;
      text-shadow: 0 0 8px rgba(255, 68, 68, 0.6);
      pointer-events: none;
      user-select: none;
      z-index: 10;
    }
    #gravity-warning .icon {
      width: 16px;
      height: 16px;
      border-radius: 50%;
      background: #FF4444;
      box-shadow: 0 0 10px #FF4444;
      animation: blink 1s ease-in-out infinite;
    }
    @keyframes blink {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.2; }
    }
    #control-panel {
      position: fixed;
      bottom: 70px;
      right: 20px;
      width: 280px;
      padding: 20px;
      background: rgba(30, 35, 50, 0.55);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid rgba(255, 255, 255, 0.12);
      border-radius: 14px;
      color: #fff;
      font-family: 'Segoe UI', Arial, sans-serif;
      font-size: 13px;
      opacity: 0;
      animation: fadeIn 0.3s ease-out forwards;
      z-index: 10;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
    }
    @keyframes fadeIn {
      to { opacity: 1; }
    }
    #control-panel h3 {
      font-size: 15px;
      margin-bottom: 16px;
      font-weight: 600;
      color: rgba(255, 255, 255, 0.95);
      border-bottom: 1px solid rgba(255, 255, 255, 0.15);
      padding-bottom: 8px;
    }
    .control-row {
      margin-bottom: 14px;
    }
    .control-row label {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 6px;
      color: rgba(255, 255, 255, 0.85);
    }
    .control-row label span.value {
      color: #8B5CF6;
      font-weight: 600;
      font-family: 'Consolas', monospace;
    }
    .control-row input[type="range"] {
      width: 100%;
      height: 4px;
      -webkit-appearance: none;
      appearance: none;
      background: rgba(255, 255, 255, 0.15);
      border-radius: 2px;
      outline: none;
    }
    .control-row input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none;
      appearance: none;
      width: 14px;
      height: 14px;
      border-radius: 50%;
      background: linear-gradient(135deg, #8B5CF6, #6D28D9);
      cursor: pointer;
      box-shadow: 0 0 8px rgba(139, 92, 246, 0.6);
    }
    .control-row input[type="range"]::-moz-range-thumb {
      width: 14px;
      height: 14px;
      border-radius: 50%;
      background: linear-gradient(135deg, #8B5CF6, #6D28D9);
      cursor: pointer;
      border: none;
      box-shadow: 0 0 8px rgba(139, 92, 246, 0.6);
    }
    .control-row.checkbox-row {
      display: flex;
      align-items: center;
      gap: 8px;
      cursor: pointer;
    }
    .control-row.checkbox-row input[type="checkbox"] {
      width: 15px;
      height: 15px;
      accent-color: #8B5CF6;
      cursor: pointer;
    }
    #reset-btn {
      width: 100%;
      padding: 10px;
      margin-top: 6px;
      background: linear-gradient(135deg, #8B5CF6, #6D28D9);
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: transform 0.15s, box-shadow 0.15s;
    }
    #reset-btn:hover {
      transform: translateY(-1px);
      box-shadow: 0 4px 15px rgba(139, 92, 246, 0.4);
    }
    #reset-btn:active {
      transform: translateY(0);
    }
    #orbit-params {
      display: none;
      margin-top: 12px;
      padding-top: 12px;
      border-top: 1px solid rgba(255, 255, 255, 0.15);
      font-size: 11px;
      color: rgba(255, 255, 255, 0.7);
      font-family: 'Consolas', monospace;
    }
    #orbit-params .param-line {
      display: flex;
      justify-content: space-between;
      margin-bottom: 3px;
    }
    #orbit-params .param-line span:last-child {
      color: #4ECDC4;
    }
  </style>
</head>
<body>
  <div id="fps-counter">FPS: 0</div>
  <div id="sim-time">时间: 0.0 年</div>
  <div id="gravity-warning">
    <div class="icon"></div>
    <span>引力扰动中</span>
  </div>
  <div id="control-panel">
    <h3>控制面板</h3>
    <div class="control-row">
      <label>引力源质量 <span class="value" id="mass-value">5.0</span></label>
      <input type="range" id="mass-slider" min="1" max="10" step="0.5" value="5" />
    </div>
    <div class="control-row">
      <label>公转速度倍速 <span class="value" id="speed-value">1.0</span></label>
      <input type="range" id="speed-slider" min="0.5" max="3" step="0.5" value="1" />
    </div>
    <div class="control-row checkbox-row">
      <input type="checkbox" id="show-params" />
      <label for="show-params" style="margin: 0; cursor: pointer;">显示轨道参数</label>
    </div>
    <div id="orbit-params"></div>
    <button id="reset-btn">重置轨道</button>
  </div>
  <div id="hint">拖拽右键生成引力源 &nbsp;|&nbsp; 空格键清空轨迹</div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
