<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>三维折纸雕塑</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif;
      color: #FFFFFF;
      background: radial-gradient(ellipse at center, #1A1A2E 0%, #0F0F1F 100%);
    }

    #app {
      width: 100%;
      height: 100%;
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    #canvas-container {
      width: 80%;
      height: 95%;
      border-radius: 20px;
      overflow: hidden;
      position: relative;
      background: rgba(0, 0, 0, 0.3);
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
    }

    #canvas-container canvas {
      display: block;
      width: 100%;
      height: 100%;
    }

    #preview-container {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      max-width: 60%;
      max-height: 60%;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.3s ease;
    }

    #preview-container.visible {
      opacity: 1;
    }

    #preview-container img {
      max-width: 100%;
      max-height: 100%;
      border-radius: 8px;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.5);
    }

    #loading-overlay {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(15, 15, 31, 0.9);
      z-index: 100;
      transition: opacity 0.5s ease;
    }

    #loading-overlay.hidden {
      opacity: 0;
      pointer-events: none;
    }

    .loader {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 20px;
    }

    .loader-spinner {
      width: 50px;
      height: 50px;
      border: 3px solid rgba(0, 180, 255, 0.2);
      border-top: 3px solid #00B4FF;
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }

    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    .loader-text {
      font-size: 14px;
      color: #AAAAAA;
      letter-spacing: 1px;
    }

    #ui-panel {
      position: fixed;
      left: 20px;
      top: 50%;
      transform: translateY(-50%);
      background: rgba(255, 255, 255, 0.08);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      border-radius: 12px;
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 16px;
      z-index: 50;
      border: 1px solid rgba(255, 255, 255, 0.1);
    }

    .ui-section {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .ui-label {
      font-size: 12px;
      color: #AAAAAA;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .upload-btn {
      position: relative;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 12px 24px;
      background: linear-gradient(135deg, #00B4FF 0%, #007BFF 100%);
      border: none;
      border-radius: 8px;
      color: white;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s ease;
      overflow: hidden;
    }

    .upload-btn:hover {
      filter: brightness(1.2);
      box-shadow: 0 0 20px rgba(0, 180, 255, 0.6), 0 0 40px rgba(0, 180, 255, 0.3);
    }

    .upload-btn input[type="file"] {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      opacity: 0;
      cursor: pointer;
    }

    .toggle-btn, .reset-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 10px 20px;
      background: rgba(255, 255, 255, 0.1);
      border: 1px solid rgba(255, 255, 255, 0.2);
      border-radius: 8px;
      color: white;
      font-size: 13px;
      cursor: pointer;
      transition: all 0.3s ease;
    }

    .toggle-btn:hover, .reset-btn:hover {
      background: rgba(255, 255, 255, 0.15);
    }

    .toggle-btn.active {
      background: rgba(0, 180, 255, 0.3);
      border-color: #00B4FF;
    }

    .face-count {
      padding: 10px 16px;
      background: rgba(0, 0, 0, 0.3);
      border-radius: 8px;
      text-align: center;
      font-size: 14px;
      border: 1px solid rgba(255, 255, 255, 0.1);
    }

    .face-count .number {
      color: #00B4FF;
      font-weight: 700;
      font-size: 18px;
    }

    #info-popup {
      position: fixed;
      background: rgba(20, 20, 40, 0.95);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(0, 180, 255, 0.5);
      border-radius: 10px;
      padding: 16px;
      z-index: 60;
      display: none;
      min-width: 180px;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.5);
    }

    #info-popup.visible {
      display: block;
    }

    #info-popup .close-btn {
      position: absolute;
      top: 8px;
      right: 12px;
      background: none;
      border: none;
      color: #AAAAAA;
      font-size: 18px;
      cursor: pointer;
      transition: color 0.2s;
    }

    #info-popup .close-btn:hover {
      color: #FFFFFF;
    }

    #info-popup h4 {
      font-size: 12px;
      color: #AAAAAA;
      margin-bottom: 10px;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    #info-popup img {
      width: 100%;
      border-radius: 6px;
      margin-bottom: 10px;
      image-rendering: pixelated;
    }

    #info-popup .rgb-value {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 13px;
    }

    #info-popup .color-swatch {
      width: 24px;
      height: 24px;
      border-radius: 4px;
      border: 2px solid rgba(255, 255, 255, 0.3);
    }

    .btn-icon {
      display: none;
    }

    @media (max-width: 768px) {
      #canvas-container {
        width: 95%;
        height: 80%;
      }

      #ui-panel {
        top: auto;
        bottom: 20px;
        left: 50%;
        transform: translateX(-50%);
        flex-direction: row;
        align-items: center;
        padding: 12px 16px;
        gap: 12px;
      }

      .ui-section {
        flex-direction: row;
        align-items: center;
        gap: 8px;
      }

      .ui-label {
        display: none;
      }

      .upload-btn, .toggle-btn, .reset-btn {
        padding: 10px 14px;
        font-size: 0;
        min-width: 44px;
        min-height: 44px;
      }

      .btn-icon {
        display: inline;
        font-size: 18px;
      }

      .btn-text {
        display: none;
      }

      .face-count {
        padding: 6px 10px;
        font-size: 12px;
      }

      .face-count .number {
        font-size: 16px;
      }
    }
  </style>
</head>
<body>
  <div id="app">
    <div id="canvas-container">
      <div id="preview-container">
        <img id="preview-image" alt="预览" />
      </div>
      <div id="loading-overlay">
        <div class="loader">
          <div class="loader-spinner"></div>
          <div class="loader-text">正在处理中...</div>
        </div>
      </div>
      <div id="info-popup">
        <button class="close-btn">&times;</button>
        <h4>面片信息</h4>
        <img id="popup-snippet" alt="局部截图" />
        <div class="rgb-value">
          <div class="color-swatch" id="popup-color"></div>
          <span id="popup-rgb">RGB: --</span>
        </div>
      </div>
    </div>

    <div id="ui-panel">
      <div class="ui-section">
        <span class="ui-label">上传照片</span>
        <button class="upload-btn">
          <span class="btn-icon">📁</span>
          <span class="btn-text">上传照片</span>
          <input type="file" id="file-input" accept="image/jpeg,image/png" />
        </button>
      </div>

      <div class="ui-section">
        <span class="ui-label">自动旋转</span>
        <button class="toggle-btn" id="rotate-btn">
          <span class="btn-icon">🔄</span>
          <span class="btn-text">自动旋转</span>
        </button>
      </div>

      <div class="ui-section">
        <span class="ui-label">重置视角</span>
        <button class="reset-btn" id="reset-btn">
          <span class="btn-icon">↺</span>
          <span class="btn-text">重置</span>
        </button>
      </div>

      <div class="ui-section">
        <span class="ui-label">面片数量</span>
        <div class="face-count">
          <span class="number" id="face-count">0</span> 个面片
        </div>
      </div>
    </div>
  </div>

  <script type="module" src="/src/main.ts"></script>
</body>
</html>
