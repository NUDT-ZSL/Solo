<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>墨染流光</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #1A1510;
      font-family: "KaiTi", "STKaiti", "楷体", "华文楷体", cursive, serif;
    }

    .app {
      display: flex;
      flex-direction: column;
      width: 100vw;
      height: 100vh;
      background: #1A1510;
    }

    .top-bar {
      height: 30px;
      background: #2A2520;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      border-bottom: 1px solid #3A332E;
    }

    .title {
      font-size: 24px;
      color: #D4C5A0;
      letter-spacing: 8px;
      font-weight: normal;
      text-shadow: 0 1px 2px rgba(0, 0, 0, 0.3);
    }

    .canvas-wrapper {
      flex: 1;
      position: relative;
      overflow: hidden;
      background: #F5F0E1;
    }

    #inkCanvas {
      display: block;
      width: 100%;
      height: 100%;
      cursor: crosshair;
    }

    .info-panel {
      position: absolute;
      top: 12px;
      left: 12px;
      background: rgba(42, 37, 32, 0.75);
      padding: 8px 14px;
      border-radius: 4px;
      color: #D4C5A0;
      font-size: 13px;
      font-family: "KaiTi", "STKaiti", "楷体", serif;
      line-height: 1.8;
      backdrop-filter: blur(4px);
      pointer-events: none;
    }

    .info-panel .label {
      color: #A09078;
    }

    .bottom-bar {
      height: 30px;
      background: #2A2520;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 20px;
      flex-shrink: 0;
      border-top: 1px solid #3A332E;
    }

    .btn-group {
      display: flex;
      gap: 14px;
    }

    .btn {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      background: #3A332E;
      border: none;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.25s ease;
      padding: 0;
    }

    .btn:hover {
      background: #4C423A;
      transform: scale(1.08);
    }

    .btn:active {
      transform: scale(0.95);
    }

    .btn svg {
      width: 18px;
      height: 18px;
      stroke: #F5F0E1;
      stroke-width: 2;
      fill: none;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .btn-clear svg {
      fill: #F5F0E1;
    }

    @media (max-width: 768px) {
      .title {
        font-size: 18px;
        letter-spacing: 6px;
      }

      .btn {
        width: 28px;
        height: 28px;
      }

      .btn svg {
        width: 14px;
        height: 14px;
      }

      .info-panel {
        font-size: 11px;
        padding: 6px 10px;
      }
    }
  </style>
</head>
<body>
  <div class="app">
    <div class="top-bar">
      <h1 class="title">墨染流光</h1>
    </div>
    <div class="canvas-wrapper">
      <canvas id="inkCanvas"></canvas>
      <div class="info-panel">
        <div><span class="label">墨迹：</span><span id="inkCount">0</span></div>
        <div><span class="label">时间：</span><span id="timer">0s</span></div>
      </div>
    </div>
    <div class="bottom-bar">
      <div class="btn-group">
        <button class="btn btn-clear" id="clearBtn" title="清空画布">
          <svg viewBox="0 0 24 24">
            <circle cx="12" cy="12" r="7"></circle>
          </svg>
        </button>
      </div>
      <div class="btn-group">
        <button class="btn btn-save" id="saveBtn" title="保存为PNG">
          <svg viewBox="0 0 24 24">
            <path d="M12 3 L12 15 M6 11 L12 17 L18 11 M5 21 L19 21"></path>
          </svg>
        </button>
      </div>
    </div>
  </div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
