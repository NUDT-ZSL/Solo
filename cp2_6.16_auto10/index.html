<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>电子墨水笔记板</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #f5f5f0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      color: #333333;
      -webkit-user-select: none;
      user-select: none;
      touch-action: none;
    }

    #app {
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
    }

    .toolbar {
      height: 56px;
      background: #e0dbd2;
      border-bottom: 1px solid #ccc;
      display: flex;
      align-items: center;
      padding: 0 16px;
      gap: 20px;
      flex-shrink: 0;
    }

    .tool-group {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .tool-divider {
      width: 1px;
      height: 32px;
      background: #ccc;
    }

    .stroke-btn {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      border: none;
      background: transparent;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background-color 0.2s ease;
    }

    .stroke-btn:hover {
      background: #d5d0c6;
    }

    .stroke-btn:active {
      transform: scale(0.95);
      transition: transform 0.1s ease;
    }

    .stroke-btn.active {
      border: 2px solid #333;
    }

    .stroke-btn svg {
      width: 20px;
      height: 20px;
      stroke: #333;
      fill: none;
      stroke-width: 2;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .color-swatch {
      width: 20px;
      height: 20px;
      border-radius: 4px;
      cursor: pointer;
      border: 1px solid transparent;
      transition: transform 0.1s ease;
    }

    .color-swatch:hover {
      transform: scale(1.1);
    }

    .color-swatch.selected {
      border: 1px solid #333;
      outline: 2px solid #e0dbd2;
      outline-offset: -3px;
    }

    .thickness-container {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .thickness-slider {
      -webkit-appearance: none;
      appearance: none;
      width: 120px;
      height: 4px;
      background: #ccc;
      border-radius: 2px;
      outline: none;
    }

    .thickness-slider::-webkit-slider-thumb {
      -webkit-appearance: none;
      appearance: none;
      width: 16px;
      height: 16px;
      background: #999;
      border-radius: 8px;
      cursor: pointer;
      transition: background-color 0.2s ease;
    }

    .thickness-slider::-webkit-slider-thumb:hover {
      background: #777;
    }

    .thickness-slider::-moz-range-thumb {
      width: 16px;
      height: 16px;
      background: #999;
      border-radius: 8px;
      cursor: pointer;
      border: none;
    }

    .thickness-value {
      font-size: 12px;
      color: #555;
      min-width: 24px;
    }

    .action-btn {
      width: 36px;
      height: 36px;
      border: none;
      background: transparent;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background-color 0.2s ease;
      border-radius: 6px;
    }

    .action-btn:hover:not(:disabled) {
      background: #d5d0c6;
    }

    .action-btn:active:not(:disabled) {
      transform: scale(0.95);
      transition: transform 0.1s ease;
    }

    .action-btn:disabled {
      cursor: not-allowed;
    }

    .action-btn svg {
      width: 20px;
      height: 20px;
      stroke: #333;
      fill: none;
      stroke-width: 2;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .action-btn:disabled svg {
      stroke: #aaa;
    }

    .canvas-container {
      flex: 1;
      background: #ece8df;
      position: relative;
      overflow: hidden;
    }

    #canvas {
      display: block;
      width: 100%;
      height: 100%;
      background: #ece8df;
    }
  </style>
</head>
<body>
  <div id="app">
    <div class="toolbar">
      <div class="tool-group" id="stroke-group">
        <button class="stroke-btn active" data-stroke="pen" title="钢笔">
          <svg viewBox="0 0 24 24"><path d="M12 19l7-7 3 3-7 7-3-3z"/><path d="M18 13l-1.5-7.5L2 2l3.5 14.5L13 18l5-5z"/><path d="M2 2l7.586 7.586"/><circle cx="11" cy="11" r="2"/></svg>
        </button>
        <button class="stroke-btn" data-stroke="brush" title="毛笔">
          <svg viewBox="0 0 24 24"><path d="M9.06 11.9l8.07-8.06a2.85 2.85 0 1 1 4.03 4.03l-8.06 8.08"/><path d="M7.07 14.94c-1.66 0-3 1.35-3 3.02 0 1.33-2.5 1.52-2 2.02 1.08 1.1 2.49 2.02 4 2.02 2.2 0 4-1.8 4-4.04a3.01 3.01 0 0 0-3-3.02z"/></svg>
        </button>
        <button class="stroke-btn" data-stroke="highlighter" title="荧光笔">
          <svg viewBox="0 0 24 24"><path d="m9 11-6 6v3h9l3-3"/><path d="m22 12-4.6 4.6a2 2 0 0 1-2.8 0l-5.2-5.2a2 2 0 0 1 0-2.8L14 4"/></svg>
        </button>
      </div>
      
      <div class="tool-divider"></div>
      
      <div class="tool-group" id="color-group">
        <div class="color-swatch selected" data-color="#222222" style="background:#222222" title="墨黑"></div>
        <div class="color-swatch" data-color="#666666" style="background:#666666" title="深灰"></div>
        <div class="color-swatch" data-color="#aaaaaa" style="background:#aaaaaa" title="中灰"></div>
        <div class="color-swatch" data-color="#dddddd" style="background:#dddddd" title="浅灰"></div>
      </div>
      
      <div class="tool-divider"></div>
      
      <div class="thickness-container">
        <input type="range" class="thickness-slider" id="thickness" min="1" max="20" value="4">
        <span class="thickness-value" id="thickness-value">4</span>
      </div>
      
      <div class="tool-divider"></div>
      
      <div class="tool-group">
        <button class="action-btn" id="undo-btn" title="撤销">
          <svg viewBox="0 0 24 24"><path d="M3 7v6h6"/><path d="M21 17a9 9 0 0 0-9-9 9 9 0 0 0-6 2.3L3 13"/></svg>
        </button>
        <button class="action-btn" id="clear-btn" title="清空">
          <svg viewBox="0 0 24 24"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/><path d="M10 11v6"/><path d="M14 11v6"/><path d="M9 6V4a2 2 0 0 1 2-2h2a2 2 0 0 1 2 2v2"/></svg>
        </button>
        <button class="action-btn" id="export-btn" title="导出PNG">
          <svg viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
        </button>
      </div>
    </div>
    <div class="canvas-container">
      <canvas id="canvas"></canvas>
    </div>
  </div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
