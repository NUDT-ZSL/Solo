<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>浮光掠影 · 光影涂鸦板</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      font-family: 'Segoe UI', 'Microsoft YaHei', -apple-system, sans-serif;
      background: #0a0a2e;
      cursor: crosshair;
    }
    #app {
      position: relative;
      width: 100vw;
      height: 100vh;
    }
    canvas {
      display: block;
      position: absolute;
      top: 0;
      left: 0;
    }
  </style>
</head>
<body>
  <div id="app">
    <canvas id="canvas"></canvas>
  </div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
