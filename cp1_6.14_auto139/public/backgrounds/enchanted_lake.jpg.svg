<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="sky" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1e3a5f"/>
      <stop offset="50%" style="stop-color:#3b7a8a"/>
      <stop offset="100%" style="stop-color:#5fa8b8"/>
    </linearGradient>
    <linearGradient id="lake" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#3a7a95"/>
      <stop offset="50%" style="stop-color:#286080"/>
      <stop offset="100%" style="stop-color:#1a4060"/>
    </linearGradient>
    <radialGradient id="moonGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#d4eaff;stop-opacity:0.8"/>
      <stop offset="40%" style="stop-color:#a8d4ff;stop-opacity:0.3"/>
      <stop offset="100%" style="stop-color:#78b8ff;stop-opacity:0"/>
    </radialGradient>
    <linearGradient id="mountain" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#2a4a5a"/>
      <stop offset="100%" style="stop-color:#1a3040"/>
    </linearGradient>
    <filter id="waterBlur"><feGaussianBlur stdDeviation="3"/></filter>
    <filter id="softGlow"><feGaussianBlur stdDeviation="8"/></filter>
  </defs>
  <rect width="1920" height="1080" fill="url(#sky)"/>
