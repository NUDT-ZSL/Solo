<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" preserveAspectRatio="xMidYMid slice">
  <defs>
    <radialGradient id="nightSky" cx="50%" cy="30%" r="80%">
      <stop offset="0%" style="stop-color:#2d1b69"/>
      <stop offset="40%" style="stop-color:#1a0d3d"/>
      <stop offset="100%" style="stop-color:#0d0524"/>
    </radialGradient>
    <linearGradient id="crystalGrad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#9b59ff"/>
      <stop offset="30%" style="stop-color:#6c3ce0"/>
      <stop offset="60%" style="stop-color:#8a5cf5"/>
      <stop offset="100%" style="stop-color:#4a1fbf"/>
    </linearGradient>
    <linearGradient id="crystalGrad2" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#4db8ff"/>
      <stop offset="50%" style="stop-color:#6c63ff"/>
      <stop offset="100%" style="stop-color:#8b5cf6"/>
    </linearGradient>
    <radialGradient id="glowCenter" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#c4b5fd;stop-opacity:0.9"/>
      <stop offset="40%" style="stop-color:#a78bfa;stop-opacity:0.5"/>
      <stop offset="100%" style="stop-color:#8b5cf6;stop-opacity:0"/>
    </radialGradient>
    <filter id="glow"><feGaussianBlur stdDeviation="6"/></filter>
    <filter id="strongGlow"><feGaussianBlur stdDeviation="15"/></filter>
  </defs>
  <rect width="1920" height="1080" fill="url(#nightSky)"/>
  <g fill="#ffffff" opacity="0.8">
    <circle cx="150" cy="120" r="2"/>
    <circle cx="400" cy="80" r="1.5"/>
    <circle cx="650" cy="150" r="2.5"/>
    <circle cx="1100" cy="100" r="1.8"/>
    <circle cx="1350" cy="180" r="2"/>
    <circle cx="1600" cy="90" r="1.5"/>
    <circle cx="1800" cy="140" r="2.2"/>
    <circle cx="280" cy="250" r="1.3"/>
    <circle cx="520" cy="320" r="2"/>
    <circle cx="890" cy="220" r="1.8"/>
    <circle cx="1250" cy="300" r="1.5"/>
    <circle cx="1550" cy="260" r="2"/>
    <circle cx="80" cy="350" r="1.6"/>
    <circle cx="1720" cy="380" r="1.4"/>
  </g>
  <circle cx="960" cy="500" r="350" fill="url(#glowCenter)" filter="url(#strongGlow)"/>
  <circle cx="960" cy="500" r="200" fill="url(#glowCenter)" filter="url(#glow)" opacity="0.8"/>
  <g transform="translate(960,0)">
    <polygon points="0,180 -120,1080 120,1080" fill="url(#crystalGrad1)" opacity="0.95"/>
    <polygon points="0,180 -60,1080 0,600" fill="url(#crystalGrad2)" opacity="0.7"/>
    <polygon points="0,180 -80,1080 -40,1080 -20,500" fill="#ffffff" opacity="0.15"/>
    <polygon points="0,80 -80,180 80,180" fill="url(#crystalGrad2)"/>
    <polygon points="0,80 -40,180 0,150" fill="#ffffff" opacity="0.3"/>
    <polygon points="0,30 -50,80 50,80" fill="#c4b5fd"/>
    <circle cx="0" cy="30" r="20" fill="#e0d4ff" filter="url(#glow)"/>
    <g filter="url(#glow)">
      <polygon points="0,300 -30,400 0,500 30,400" fill="#a78bfa" opacity="0.6"/>
      <polygon points="0,550 -25,650 0,750 25,650" fill="#8b5cf6" opacity="0.5"/>
      <polygon points="0,800 -20,900 0,980 20,900" fill="#7c3aed" opacity="0.4"/>
    </g>
  </g>
  <g transform="translate(580,0)" filter="url(#glow)">
    <polygon points="0,400 -70,1080 70,1080" fill="url(#crystalGrad2)" opacity="0.7"/>
    <polygon points="0,400 -35,1080 0,700" fill="#ffffff" opacity="0.1"/>
    <polygon points="0,320 -50,400 50,400" fill="#8b5cf6"/>
    <circle cx="0" cy="320" r="12" fill="#c4b5fd" opacity="0.8"/>
  </g>
  <g transform="translate(1360,0)" filter="url(#glow)">
    <polygon points="0,350 -80,1080 80,1080" fill="url(#crystalGrad1)" opacity="0.65"/>
    <polygon points="0,350 -40,1080 0,650" fill="#ffffff" opacity="0.12"/>
    <polygon points="0,280 -55,350 55,350" fill="#a78bfa"/>
    <circle cx="0" cy="280" r="14" fill="#ddd6fe" opacity="0.7"/>
  </g>
  <g transform="translate(350,0)" opacity="0.6" filter="url(#glow)">
    <polygon points="0,550 -45,1080 45,1080" fill="url(#crystalGrad2)"/>
    <polygon points="0,550 -30,1080 0,800" fill="#ffffff" opacity="0.1"/>
  </g>
  <g transform="translate(1580,0)" opacity="0.55" filter="url(#glow)">
    <polygon points="0,500 -50,1080 50,1080" fill="url(#crystalGrad1)"/>
    <polygon points="0,500 30,1080 0,750" fill="#ffffff" opacity="0.1"/>
  </g>
  <g fill="#ffffff" opacity="0.6" filter="url(#glow)">
    <circle cx="780" cy="400" r="4"/>
    <circle cx="1050" cy="350" r="5"/>
    <circle cx="900" cy="600" r="3"/>
    <circle cx="1020" cy="650" r="4"/>
    <circle cx="680" cy="700" r="3"/>
    <circle cx="1200" cy="750" r="3.5"/>
    <circle cx="500" cy="550" r="2.5"/>
    <circle cx="1450" cy="600" r="3"/>
  </g>
  <ellipse cx="960" cy="1050" rx="800" ry="80" fill="#1a0d3d" opacity="0.8"/>
  <ellipse cx="960" cy="1060" rx="500" ry="40" fill="#4a1fbf" opacity="0.3" filter="url(#glow)"/>
</svg>