<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>残影棋局</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      font-family: 'Microsoft YaHei', 'PingFang SC', sans-serif;
    }

    body {
      background: radial-gradient(circle at center, #1a0a2e 0%, #0d1b3e 70%, #050818 100%);
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }

    #game-container {
      position: relative;
      display: flex;
      flex-direction: row;
      justify-content: center;
      align-items: flex-start;
      gap: 20px;
      padding: 20px;
    }

    #game-canvas-wrapper {
      display: flex;
      justify-content: center;
      align-items: center;
      transition: transform 0.3s ease;
    }

    #side-panel {
      width: 260px;
      background: rgba(0, 0, 0, 0.4);
      border: 1px solid rgba(79, 195, 247, 0.2);
      border-radius: 12px;
      padding: 16px;
      color: #e0e0e0;
      font-size: 13px;
      transition: all 0.3s ease;
    }

    .panel-title {
      font-size: 16px;
      font-weight: bold;
      color: #ffd700;
      margin-bottom: 12px;
      text-align: center;
      border-bottom: 1px solid rgba(255, 215, 0, 0.3);
      padding-bottom: 8px;
    }

    .piece-status {
      background: rgba(255, 255, 255, 0.05);
      border-radius: 8px;
      padding: 10px;
      margin-bottom: 8px;
      transition: all 0.3s ease;
    }

    .piece-status:hover {
      background: rgba(255, 255, 255, 0.1);
    }

    .piece-name {
      font-weight: bold;
      margin-bottom: 6px;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .piece-icon {
      width: 20px;
      height: 20px;
      border-radius: 50%;
      display: inline-block;
    }

    .piece-stat {
      display: flex;
      justify-content: space-between;
      font-size: 12px;
      color: #b0b0b0;
      margin: 2px 0;
    }

    .player1 .piece-icon { background: #4fc3f7; box-shadow: 0 0 6px #4fc3f7; }
    .player2 .piece-icon { background: #ef5350; box-shadow: 0 0 6px #ef5350; }

    .player1-text { color: #4fc3f7; }
    .player2-text { color: #ef5350; }

    .board-status {
      margin-top: 16px;
      padding-top: 12px;
      border-top: 1px solid rgba(255, 255, 255, 0.1);
    }

    .node-status {
      display: flex;
      justify-content: space-between;
      padding: 6px 0;
    }

    @media (max-width: 768px) {
      #game-container {
        flex-direction: column;
        align-items: center;
        padding: 10px;
      }

      #game-canvas-wrapper {
        transform: scale(0.8);
        transform-origin: top center;
      }

      #side-panel {
        width: 90%;
        max-width: 480px;
        order: -1;
      }
    }
  </style>
</head>
<body>
  <div id="game-container">
    <div id="game-canvas-wrapper"></div>
    <div id="side-panel">
      <div class="panel-title">棋盘状态</div>
      <div id="board-status" class="board-status"></div>
      <div class="panel-title" style="margin-top: 20px;">蓝方棋子</div>
      <div id="player1-pieces"></div>
      <div class="panel-title" style="margin-top: 20px;">红方棋子</div>
      <div id="player2-pieces"></div>
    </div>
  </div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
