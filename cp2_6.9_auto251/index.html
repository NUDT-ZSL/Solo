<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>幻境迷宫 - Phantom Maze</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Courier+Prime:wght@400;700&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #050508;
      font-family: 'Courier Prime', monospace;
    }

    #app {
      width: 100vw;
      height: 100vh;
      position: relative;
    }

    #canvas-container {
      width: 100%;
      height: 100%;
      position: absolute;
      top: 0;
      left: 0;
    }

    .ui-panel {
      position: absolute;
      background: rgba(0, 0, 0, 0.73);
      border: 1px solid #FFFFFF;
      border-radius: 8px;
      padding: 12px 16px;
      color: #FFFFFF;
      font-size: 16px;
      backdrop-filter: blur(4px);
    }

    #stats-panel {
      left: 20px;
      bottom: 20px;
      display: flex;
      flex-direction: column;
      gap: 8px;
      min-width: 140px;
    }

    .stat-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
    }

    .stat-label {
      opacity: 0.8;
    }

    #time-value {
      color: #FFFFFF;
      font-weight: 700;
    }

    #steps-value {
      font-weight: 700;
      transition: color 0.3s ease;
    }

    #controls-panel {
      right: 20px;
      top: 20px;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    #reset-btn {
      width: 40px;
      height: 40px;
      background: transparent;
      border: 1px solid #FFFFFF;
      border-radius: 50%;
      color: #FFFFFF;
      font-size: 20px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s ease;
    }

    #reset-btn:hover {
      background: rgba(255, 255, 255, 0.15);
      transform: rotate(180deg);
    }

    #difficulty-select {
      background: rgba(51, 51, 51, 0.9);
      color: #FFFFFF;
      border: 1px solid #FFFFFF;
      border-radius: 8px;
      padding: 8px 12px;
      font-family: 'Courier Prime', monospace;
      font-size: 14px;
      cursor: pointer;
      outline: none;
    }

    #difficulty-select option {
      background: #333333;
      color: #FFFFFF;
    }

    #difficulty-select option:checked {
      background: #FFD93D;
      color: #000000;
    }

    .hint-text {
      position: absolute;
      top: 20px;
      left: 50%;
      transform: translateX(-50%);
      color: rgba(255, 255, 255, 0.5);
      font-size: 13px;
      text-align: center;
      pointer-events: none;
    }
  </style>
</head>
<body>
  <div id="app">
    <div id="canvas-container"></div>
    
    <div class="hint-text">WASD 移动 · 鼠标拖拽旋转视角 · 寻找出口</div>

    <div id="stats-panel" class="ui-panel">
      <div class="stat-row">
        <span class="stat-label">时间</span>
        <span id="time-value">00:00</span>
      </div>
      <div class="stat-row">
        <span class="stat-label">步数</span>
        <span id="steps-value" style="color: #00FF88">0</span>
      </div>
    </div>

    <div id="controls-panel" class="ui-panel">
      <button id="reset-btn" title="重置迷宫">↻</button>
      <select id="difficulty-select">
        <option value="8">简单 (8×8)</option>
        <option value="10" selected>普通 (10×10)</option>
        <option value="12">困难 (12×12)</option>
      </select>
    </div>
  </div>

  <script type="module" src="/src/main.ts"></script>
</body>
</html>
