<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CrystalHabit — 水晶习惯花园</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;500;600;700&family=Noto+Sans+SC:wght@300;400;500;700&display=swap" rel="stylesheet" />
  </head>
  <body>
    <div id="app">
      <div id="scene-container"></div>
      <aside id="sidebar">
        <div id="sidebar-header">
          <h1>CrystalHabit</h1>
          <p class="subtitle">你的水晶习惯花园</p>
        </div>
        <div id="habit-cards"></div>
        <button id="add-habit-btn">
          <span class="plus-icon">+</span>
          <span>新增习惯</span>
        </button>
      </aside>
      <div id="add-modal" class="modal-overlay hidden">
        <div class="modal-content">
          <h2>新增习惯</h2>
          <div class="form-group">
            <label>习惯名称</label>
            <input type="text" id="habit-name-input" placeholder="例如：每日阅读" maxlength="20" />
          </div>
          <div class="form-group">
            <label>颜色主题</label>
            <div id="color-picker" class="color-options"></div>
          </div>
          <div class="form-group">
            <label>图标</label>
            <div id="icon-picker" class="icon-options"></div>
          </div>
          <div class="modal-actions">
            <button id="modal-cancel" class="btn-secondary">取消</button>
            <button id="modal-confirm" class="btn-primary">确认添加</button>
          </div>
        </div>
      </div>
      <div id="blessing-container"></div>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
