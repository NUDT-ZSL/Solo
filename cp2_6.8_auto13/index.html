<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>2D物理沙盒</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      user-select: none;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 16px;
      color: #e0e0e0;
    }

    .app-container {
      width: 100%;
      max-width: 960px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .status-bar {
      background: rgba(30, 30, 50, 0.85);
      backdrop-filter: blur(10px);
      border-radius: 10px;
      padding: 10px 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 14px;
      border: 1px solid rgba(74, 158, 255, 0.2);
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
    }

    .status-item {
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .status-label {
      color: #888;
      font-weight: 500;
    }

    .status-value {
      font-weight: 700;
      font-size: 16px;
      min-width: 40px;
      text-align: left;
    }

    .fps-good { color: #4ade80; }
    .fps-mid { color: #fbbf24; }
    .fps-bad { color: #f87171; }

    .main-layout {
      display: flex;
      gap: 12px;
      align-items: flex-start;
    }

    .toolbar {
      background: rgba(30, 30, 50, 0.85);
      backdrop-filter: blur(10px);
      border-radius: 10px;
      padding: 12px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      border: 1px solid rgba(74, 158, 255, 0.2);
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
      min-width: 80px;
    }

    .toolbar-section {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .toolbar-title {
      font-size: 11px;
      color: #888;
      text-transform: uppercase;
      letter-spacing: 1px;
      font-weight: 600;
      text-align: center;
    }

    button {
      font-family: inherit;
      cursor: pointer;
      border: 2px solid transparent;
      border-radius: 8px;
      background: rgba(60, 60, 80, 0.6);
      color: #e0e0e0;
      font-size: 13px;
      font-weight: 600;
      padding: 10px 8px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
      transition: all 0.2s ease-out;
    }

    button:hover {
      background: rgba(74, 158, 255, 0.25);
      transform: translateY(-1px);
    }

    button:active {
      transform: scale(0.95);
    }

    .tool-btn.active {
      border-color: #4a9eff;
      background: rgba(74, 158, 255, 0.3);
      transform: scale(1.05);
      box-shadow: 0 0 12px rgba(74, 158, 255, 0.5);
    }

    .tool-icon {
      font-size: 24px;
      line-height: 1;
    }

    .tool-label {
      font-size: 11px;
    }

    .brush-buttons {
      display: flex;
      gap: 4px;
      justify-content: center;
    }

    .brush-btn {
      padding: 6px 8px;
      font-size: 12px;
      min-width: 30px;
      flex-direction: row;
    }

    .brush-btn.active {
      border-color: #4a9eff;
      background: rgba(74, 158, 255, 0.3);
    }

    .control-buttons {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .control-btn {
      flex-direction: row;
      gap: 6px;
      padding: 10px;
      font-size: 12px;
    }

    .control-btn.paused {
      background: rgba(74, 222, 128, 0.2);
      border-color: #4ade80;
    }

    .canvas-wrapper {
      flex: 1;
      background: rgba(30, 30, 50, 0.85);
      backdrop-filter: blur(10px);
      border-radius: 10px;
      padding: 10px;
      border: 1px solid rgba(74, 158, 255, 0.2);
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
      display: flex;
      justify-content: center;
    }

    #sandbox {
      display: block;
      background: #2a2a2a;
      border-radius: 6px;
      cursor: crosshair;
      width: 100%;
      max-width: 800px;
      height: auto;
      aspect-ratio: 800 / 600;
      image-rendering: pixelated;
      image-rendering: crisp-edges;
    }

    .hint-bar {
      background: rgba(30, 30, 50, 0.6);
      border-radius: 8px;
      padding: 8px 16px;
      text-align: center;
      font-size: 12px;
      color: #888;
    }

    .hint-bar kbd {
      background: rgba(74, 158, 255, 0.2);
      color: #4a9eff;
      padding: 2px 6px;
      border-radius: 4px;
      font-family: monospace;
      font-size: 11px;
      margin: 0 2px;
    }

    @media (max-width: 720px) {
      .main-layout {
        flex-direction: column;
      }

      .toolbar {
        flex-direction: row;
        flex-wrap: wrap;
        justify-content: center;
        width: 100%;
      }

      .toolbar-section {
        flex-direction: row;
        flex-wrap: wrap;
        gap: 6px;
      }

      .toolbar-title {
        width: 100%;
      }

      .control-buttons {
        flex-direction: row;
      }

      button {
        padding: 8px 10px;
        font-size: 12px;
      }

      .tool-icon {
        font-size: 20px;
      }
    }
  </style>
</head>
<body>
  <div class="app-container">
    <div class="status-bar">
      <div class="status-item">
        <span class="status-label">颗粒数:</span>
        <span id="particleCount" class="status-value">0</span>
      </div>
      <div class="status-item" style="gap: 8px;">
        <span style="font-size: 16px;">🎨</span>
        <span style="font-weight: 700; background: linear-gradient(90deg, #4a9eff, #a78bfa, #f472b6); -webkit-background-clip: text; background-clip: text; color: transparent;">2D物理沙盒</span>
      </div>
      <div class="status-item">
        <span class="status-label">FPS:</span>
        <span id="fps" class="status-value fps-good">60</span>
      </div>
    </div>

    <div class="main-layout">
      <aside class="toolbar">
        <div class="toolbar-section">
          <div class="toolbar-title">颗粒</div>
          <button class="tool-btn active" data-type="sand">
            <span class="tool-icon">🏖️</span>
            <span class="tool-label">沙子</span>
          </button>
          <button class="tool-btn" data-type="water">
            <span class="tool-icon">💧</span>
            <span class="tool-label">水</span>
          </button>
          <button class="tool-btn" data-type="fire">
            <span class="tool-icon">🔥</span>
            <span class="tool-label">火</span>
          </button>
          <button class="tool-btn" data-type="wood">
            <span class="tool-icon">🪵</span>
            <span class="tool-label">木头</span>
          </button>
        </div>

        <div class="toolbar-section">
          <div class="toolbar-title">画笔</div>
          <div class="brush-buttons">
            <button class="brush-btn" data-size="1">1</button>
            <button class="brush-btn active" data-size="3">3</button>
            <button class="brush-btn" data-size="5">5</button>
          </div>
        </div>

        <div class="toolbar-section">
          <div class="toolbar-title">控制</div>
          <div class="control-buttons">
            <button id="pauseBtn" class="control-btn">⏸ 暂停</button>
            <button id="clearBtn" class="control-btn">🗑️ 清空</button>
          </div>
        </div>
      </aside>

      <div class="canvas-wrapper">
        <canvas id="sandbox"></canvas>
      </div>
    </div>

    <div class="hint-bar">
      <kbd>左键</kbd>绘制颗粒 &nbsp;·&nbsp; <kbd>右键</kbd>擦除 &nbsp;·&nbsp; <kbd>拖动</kbd>连续绘制
    </div>
  </div>

  <script type="module" src="/src/main.ts"></script>
</body>
</html>
