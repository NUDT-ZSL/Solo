<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>幻光夜曲</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    html, body {
      width: 100%;
      height: 100%;
      min-width: 800px;
      min-height: 600px;
      overflow: hidden;
      background: #0a0a2e;
      font-family: 'Courier New', monospace;
    }
    #gameCanvas {
      display: block;
      width: 100%;
      height: 100%;
    }
    #controlBar {
      position: fixed;
      left: 0;
      bottom: 0;
      width: 100%;
      height: 60px;
      background: rgba(0, 0, 0, 0.3);
      display: flex;
      align-items: center;
      justify-content: center;
      pointer-events: none;
      z-index: 10;
    }
    #controlText {
      color: #A0A0A0;
      font-size: 14px;
      font-family: 'Courier New', monospace;
      letter-spacing: 1px;
    }
  </style>
</head>
<body>
  <canvas id="gameCanvas"></canvas>
  <div id="controlBar">
    <div id="controlText">按 A-L 键触发光柱 · 当前音符: 无 · 光柱数: 0</div>
  </div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
