<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>水晶棱镜宇宙</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    html, body {
      width: 100%;
      height: 100%;
      min-width: 1024px;
      min-height: 768px;
      overflow: hidden;
      background: radial-gradient(ellipse at center, #1A1C2E 0%, #0B0C1A 100%);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }
    #app {
      width: 100%;
      height: 100%;
      position: relative;
    }
    canvas {
      display: block;
      width: 100%;
      height: 100%;
    }
    #controls {
      position: fixed;
      right: 24px;
      bottom: 24px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      z-index: 100;
      align-items: center;
    }
    .ctrl-btn {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.1);
      border: none;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      color: rgba(255, 255, 255, 0.9);
      font-size: 14px;
      transition: all 0.2s ease-out;
      backdrop-filter: blur(6px);
      -webkit-backdrop-filter: blur(6px);
    }
    .ctrl-btn:hover {
      background: rgba(255, 255, 255, 0.25);
      transform: scale(1.1);
    }
    .ctrl-slider {
      width: 120px;
      height: 36px;
      border-radius: 18px;
      background: rgba(255, 255, 255, 0.1);
      display: flex;
      align-items: center;
      padding: 0 12px;
      backdrop-filter: blur(6px);
      -webkit-backdrop-filter: blur(6px);
    }
    .ctrl-slider input[type="range"] {
      width: 100%;
      -webkit-appearance: none;
      appearance: none;
      height: 4px;
      background: rgba(255, 255, 255, 0.3);
      border-radius: 2px;
      outline: none;
    }
    .ctrl-slider input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none;
      appearance: none;
      width: 14px;
      height: 14px;
      border-radius: 50%;
      background: #fff;
      cursor: pointer;
      transition: transform 0.2s ease-out;
    }
    .ctrl-slider input[type="range"]::-webkit-slider-thumb:hover {
      transform: scale(1.2);
    }
    .ctrl-slider input[type="range"]::-moz-range-thumb {
      width: 14px;
      height: 14px;
      border-radius: 50%;
      background: #fff;
      cursor: pointer;
      border: none;
    }
    .theme-menu {
      position: absolute;
      right: 48px;
      bottom: 48px;
      display: flex;
      flex-direction: column;
      gap: 8px;
      opacity: 0;
      pointer-events: none;
      transition: all 0.2s ease-out;
    }
    .theme-menu.visible {
      opacity: 1;
      pointer-events: auto;
    }
    .theme-item {
      padding: 6px 14px;
      border-radius: 16px;
      background: rgba(255, 255, 255, 0.1);
      color: rgba(255, 255, 255, 0.9);
      font-size: 12px;
      cursor: pointer;
      white-space: nowrap;
      transition: all 0.2s ease-out;
      backdrop-filter: blur(6px);
      -webkit-backdrop-filter: blur(6px);
    }
    .theme-item:hover {
      background: rgba(255, 255, 255, 0.25);
      transform: translateX(-4px);
    }
    .tooltip {
      position: fixed;
      background: rgba(0, 0, 0, 0.7);
      color: #fff;
      font-size: 11px;
      padding: 4px 8px;
      border-radius: 4px;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.2s ease-out;
      white-space: nowrap;
      z-index: 200;
    }
  </style>
</head>
<body>
  <div id="app"></div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
