<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>节奏迷窟</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: linear-gradient(to bottom, #0A0E1A, #142130);
      font-family: monospace;
      color: #E0E4F0;
    }
    #app {
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      position: relative;
    }
    #start-hint {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      font-size: 24px;
      color: #E0E4F0;
      text-shadow: 0 0 10px #3A5A7A;
      background: rgba(10, 14, 26, 0.6);
      padding: 12px 24px;
      border-radius: 4px;
      pointer-events: none;
      z-index: 10;
    }
    .game-wrapper {
      position: relative;
      padding: 12px;
      background: rgba(58, 90, 122, 0.3);
      border-radius: 4px;
      box-shadow: 0 0 30px rgba(58, 90, 122, 0.5);
    }
    #game-canvas {
      display: block;
      background: #0A0E1A;
      image-rendering: pixelated;
    }
    .hud-top {
      display: flex;
      justify-content: center;
      gap: 32px;
      padding: 8px 0;
      font-size: 24px;
      color: #8AC8FF;
      font-family: monospace;
    }
    .hud-item {
      background: rgba(10, 14, 26, 0.6);
      padding: 4px 16px;
      border-radius: 4px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .hud-left {
      position: absolute;
      left: -140px;
      top: 50%;
      transform: translateY(-50%);
      display: flex;
      flex-direction: column;
      gap: 16px;
      align-items: center;
    }
    .bpm-display {
      font-size: 48px;
      color: #FFFFFF;
      font-family: monospace;
      background: rgba(10, 14, 26, 0.6);
      padding: 8px 16px;
      border-radius: 4px;
      text-shadow: 0 0 10px rgba(138, 200, 255, 0.5);
    }
    .beat-bar-container {
      width: 120px;
      height: 6px;
      background: rgba(10, 14, 26, 0.6);
      border-radius: 3px;
      overflow: hidden;
      padding: 0;
    }
    .beat-bar {
      height: 100%;
      width: 0%;
      background: linear-gradient(to right, #FF6B35, #FFD700);
      transition: none;
    }
    .overlay {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.7);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 16px;
      z-index: 20;
    }
    .overlay-title {
      font-size: 64px;
      font-weight: bold;
      font-family: monospace;
      text-shadow: 0 0 20px currentColor;
    }
    .overlay-title.victory { color: #FFD700; }
    .overlay-title.defeat { color: #FF3333; }
    .overlay-sub {
      font-size: 18px;
      color: #E0E4F0;
      font-family: monospace;
    }
    .hidden { display: none !important; }

    @media (max-width: 768px) {
      .game-wrapper {
        padding: 8px;
      }
      #game-canvas {
        width: calc(100vw - 32px) !important;
        height: calc(100vw - 32px) !important;
      }
      .hud-top {
        font-size: 19.2px;
        gap: 16px;
      }
      .hud-left {
        left: -112px;
      }
      .bpm-display {
        font-size: 38.4px;
      }
      .overlay-title {
        font-size: 51.2px;
      }
      .overlay-sub {
        font-size: 14.4px;
      }
    }
  </style>
</head>
<body>
  <div id="app">
    <div id="start-hint">按空格键开始</div>
    <div class="game-wrapper">
      <div class="hud-top">
        <div class="hud-item">
          <span id="hp-display">❤ 5</span>
        </div>
        <div class="hud-item">
          <span id="chest-display">★ 0/2</span>
        </div>
      </div>
      <canvas id="game-canvas" width="640" height="640"></canvas>
      <div class="hud-left">
        <div class="bpm-display" id="bpm-display">120</div>
        <div class="beat-bar-container">
          <div class="beat-bar" id="beat-bar"></div>
        </div>
      </div>
      <div id="overlay" class="overlay hidden">
        <div id="overlay-title" class="overlay-title"></div>
        <div id="overlay-sub" class="overlay-sub"></div>
      </div>
    </div>
  </div>
  <script type="module" src="/src/game.ts"></script>
</body>
</html>
