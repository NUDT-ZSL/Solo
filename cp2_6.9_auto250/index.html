<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>深渊回响 - 深海生物召唤对战</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #001122; font-family: 'Segoe UI', sans-serif; }
    canvas { display: block; width: 100%; height: 100%; }
    #hint {
      position: absolute;
      top: 12px;
      left: 12px;
      color: #E0F0FF;
      font-size: 13px;
      opacity: 0.85;
      background: rgba(0, 20, 40, 0.5);
      padding: 8px 12px;
      border-radius: 6px;
      border: 1px solid rgba(0, 255, 170, 0.3);
      pointer-events: none;
      line-height: 1.5;
    }
    #hint b { color: #00FFAA; }
  </style>
</head>
<body>
  <div id="hint">
    <b>深渊回响</b><br/>
    悬停声呐盘 → 扫描对手能量<br/>
    点击卡牌 → 点击能量卵 → 召唤生物<br/>
    相同深度层生物会产生共鸣 +2攻击
  </div>
  <canvas id="game"></canvas>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
