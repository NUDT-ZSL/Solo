<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Galaxy Creator</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      html, body {
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: #0F0F23;
        font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
        color: #F8FAFC;
      }

      #app {
        position: relative;
        width: 100%;
        height: 100%;
      }

      #galaxy-canvas {
        display: block;
        width: 100%;
        height: 100%;
        position: absolute;
        top: 0;
        left: 0;
        z-index: 1;
      }

      .starfield {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        z-index: 0;
        pointer-events: none;
      }

      .star-particle {
        position: absolute;
        border-radius: 50%;
        background: white;
        animation: twinkle var(--duration) ease-in-out infinite alternate;
      }

      @keyframes twinkle {
        0% { opacity: var(--min-opacity); }
        100% { opacity: var(--max-opacity); }
      }

      #fps-counter {
        position: fixed;
        top: 16px;
        left: 16px;
        z-index: 100;
        font-size: 16px;
        font-family: 'Courier New', monospace;
        color: #00FF88;
        pointer-events: none;
        user-select: none;
      }

      #perf-notice {
        position: fixed;
        top: 40px;
        left: 16px;
        z-index: 100;
        font-size: 14px;
        color: white;
        pointer-events: none;
        user-select: none;
        display: none;
      }

      #boundary-notice {
        position: fixed;
        top: 16px;
        left: 50%;
        transform: translateX(-50%);
        z-index: 100;
        font-size: 16px;
        color: white;
        pointer-events: none;
        user-select: none;
        opacity: 0;
        transition: opacity 0.3s ease-out;
      }

      #boundary-notice.visible {
        opacity: 1;
      }

      #generate-btn {
        position: fixed;
        top: 24px;
        left: 50%;
        transform: translateX(-50%);
        z-index: 100;
        width: 160px;
        height: 48px;
        border: none;
        border-radius: 24px;
        font-size: 16px;
        font-weight: 600;
        color: white;
        cursor: pointer;
        transition: transform 0.2s ease-out, filter 0.2s ease-out;
      }

      #generate-btn:hover {
        filter: brightness(1.2);
      }

      #generate-btn:active {
        transform: translateX(-50%) scale(0.95);
      }

      #param-panel {
        position: fixed;
        top: 50%;
        right: 20px;
        transform: translateY(-50%);
        width: 320px;
        background: rgba(26, 26, 46, 0.85);
        padding: 20px;
        border-radius: 12px;
        z-index: 100;
        backdrop-filter: blur(10px);
        border: 1px solid rgba(255, 255, 255, 0.08);
      }

      .panel-title {
        font-size: 18px;
        font-weight: 600;
        color: #F8FAFC;
        margin-bottom: 20px;
        text-align: center;
      }

      .control-group {
        margin-bottom: 18px;
      }

      .control-label {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 8px;
      }

      .control-label span:first-child {
        font-size: 14px;
        color: #F8FAFC;
      }

      .control-value {
        font-size: 14px;
        color: #94A3B8;
      }

      input[type="range"] {
        -webkit-appearance: none;
        appearance: none;
        width: 100%;
        height: 6px;
        border-radius: 3px;
        background: #334155;
        outline: none;
        cursor: pointer;
      }

      input[type="range"]::-webkit-slider-thumb {
        -webkit-appearance: none;
        appearance: none;
        width: 18px;
        height: 18px;
        border-radius: 50%;
        cursor: pointer;
      }

      input[type="range"]::-moz-range-thumb {
        width: 18px;
        height: 18px;
        border-radius: 50%;
        cursor: pointer;
        border: none;
      }

      select {
        width: 100%;
        padding: 8px 12px;
        border-radius: 8px;
        border: 1px solid #334155;
        background: #1A1A2E;
        color: #F8FAFC;
        font-size: 14px;
        outline: none;
        cursor: pointer;
      }

      select:focus {
        border-color: #8B5CF6;
      }

      select option {
        background: #1A1A2E;
        color: #F8FAFC;
      }

      .dual-slider {
        display: flex;
        flex-direction: column;
        gap: 8px;
      }

      .dual-slider-row {
        display: flex;
        align-items: center;
        gap: 8px;
      }

      .dual-slider-row .label-text {
        font-size: 12px;
        color: #94A3B8;
        min-width: 30px;
      }

      @media (max-width: 768px) {
        #param-panel {
          top: auto;
          bottom: 0;
          right: 0;
          left: 0;
          transform: none;
          width: 100%;
          height: 300px;
          border-radius: 12px 12px 0 0;
          overflow-x: auto;
          overflow-y: hidden;
          display: flex;
          flex-wrap: nowrap;
          gap: 16px;
          padding: 16px;
        }

        .panel-title {
          writing-mode: vertical-rl;
          margin-bottom: 0;
          margin-right: 8px;
        }

        .control-group {
          min-width: 200px;
          margin-bottom: 0;
        }
      }
    </style>
  </head>
  <body>
    <div id="app">
      <div class="starfield" id="starfield"></div>
      <canvas id="galaxy-canvas"></canvas>

      <div id="fps-counter">FPS: --</div>
      <div id="perf-notice">性能模式已启用</div>
      <div id="boundary-notice">已探索至星系外围</div>

      <button id="generate-btn">生成星系</button>

      <div id="param-panel">
        <div class="panel-title">星系参数</div>

        <div class="control-group">
          <div class="control-label">
            <span>恒星数量</span>
            <span class="control-value" id="star-count-value">200</span>
          </div>
          <input type="range" id="star-count" min="50" max="500" step="10" value="200" />
        </div>

        <div class="control-group">
          <div class="control-label">
            <span>行星轨道半径范围</span>
          </div>
          <div class="dual-slider">
            <div class="dual-slider-row">
              <span class="label-text">最小</span>
              <input type="range" id="orbit-min" min="2" max="8" step="0.5" value="5" />
              <span class="control-value" id="orbit-min-value">5</span>
            </div>
            <div class="dual-slider-row">
              <span class="label-text">最大</span>
              <input type="range" id="orbit-max" min="10" max="20" step="0.5" value="12" />
              <span class="control-value" id="orbit-max-value">12</span>
            </div>
          </div>
        </div>

        <div class="control-group">
          <div class="control-label">
            <span>颜色主题</span>
          </div>
          <select id="color-theme">
            <option value="galaxy-purple">星河紫</option>
            <option value="sunset-orange">落日橙</option>
            <option value="aurora-green">极光绿</option>
          </select>
        </div>
      </div>
    </div>

    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
