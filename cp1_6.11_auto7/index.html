<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>云纹织机</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      font-family: "Source Han Serif CN", "Noto Serif SC", "SimSun", serif;
      background: #0a0a15;
    }

    #app {
      width: 100%;
      height: 100%;
      position: relative;
    }

    #canvas-container {
      width: 100%;
      height: 100%;
      position: absolute;
      top: 0;
      left: 0;
    }

    #canvas-container canvas {
      display: block;
      width: 100%;
      height: 100%;
    }

    #ui-container {
      position: absolute;
      top: 20px;
      left: 20px;
      z-index: 10;
    }

    .panel {
      width: 280px;
      background: rgba(26, 26, 46, 0.85);
      border-radius: 8px;
      padding: 20px;
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
    }

    .panel-title {
      color: #ffffff;
      font-size: 18px;
      text-align: center;
      margin-bottom: 20px;
      text-shadow: 0 0 6px #FFD700;
      font-weight: 600;
      letter-spacing: 2px;
    }

    .divider {
      height: 1px;
      background: #333;
      margin: 16px 0;
    }

    .param-group {
      margin-bottom: 16px;
    }

    .param-label {
      display: flex;
      justify-content: space-between;
      align-items: center;
      color: #ccc;
      font-size: 13px;
      margin-bottom: 8px;
    }

    .param-value {
      color: #FFD700;
      font-weight: 500;
      font-size: 12px;
    }

    .slider-container {
      position: relative;
      width: 100%;
      height: 24px;
      display: flex;
      align-items: center;
    }

    input[type="range"] {
      -webkit-appearance: none;
      appearance: none;
      width: 100%;
      height: 4px;
      border-radius: 2px;
      background: linear-gradient(to right, #2D2D44, #4A4A6E);
      outline: none;
      cursor: pointer;
    }

    input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none;
      appearance: none;
      width: 16px;
      height: 16px;
      border-radius: 50%;
      background: #6C63FF;
      cursor: pointer;
      border: 2px solid #fff;
      box-shadow: 0 2px 6px rgba(0, 0, 0, 0.3);
      transition: transform 0.2s ease;
    }

    input[type="range"]::-webkit-slider-thumb:hover {
      transform: scale(1.1);
    }

    input[type="range"]::-moz-range-thumb {
      width: 16px;
      height: 16px;
      border-radius: 50%;
      background: #6C63FF;
      cursor: pointer;
      border: 2px solid #fff;
      box-shadow: 0 2px 6px rgba(0, 0, 0, 0.3);
    }

    .btn-group {
      display: flex;
      gap: 8px;
      margin-top: 8px;
    }

    .btn {
      flex: 1;
      padding: 8px 12px;
      border: none;
      border-radius: 8px;
      background: #6C63FF;
      color: #fff;
      font-size: 12px;
      cursor: pointer;
      transition: background 0.2s ease, transform 0.1s ease;
      font-family: inherit;
    }

    .btn:hover {
      background: #8B7FFF;
    }

    .btn:active {
      background: #5A52D5;
      transform: scale(0.98);
    }

    .btn.active {
      background: #FF6584;
      box-shadow: 0 0 10px rgba(255, 101, 132, 0.5);
    }

    .btn.active:hover {
      background: #FF85A0;
    }

    .btn-reset {
      width: 100%;
      margin-top: 16px;
      padding: 10px;
      background: #4A4A6E;
    }

    .btn-reset:hover {
      background: #5A5A7E;
    }

    .btn-reset:active {
      background: #3A3A5E;
    }

    .shape-label {
      color: #ccc;
      font-size: 13px;
      margin-bottom: 8px;
    }

    .mobile-toolbar {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      height: 60px;
      background: rgba(26, 26, 46, 0.95);
      z-index: 20;
      padding: 0 16px;
      align-items: center;
      justify-content: space-between;
      backdrop-filter: blur(10px);
    }

    .mobile-toolbar .panel-title {
      margin: 0;
      font-size: 16px;
    }

    .menu-btn {
      background: none;
      border: none;
      color: #fff;
      font-size: 24px;
      cursor: pointer;
      padding: 8px;
    }

    .mobile-panel {
      display: none;
      position: fixed;
      top: 60px;
      left: 0;
      right: 0;
      background: rgba(26, 26, 46, 0.95);
      z-index: 15;
      padding: 16px;
      max-height: calc(100vh - 60px);
      overflow-y: auto;
      backdrop-filter: blur(10px);
    }

    .mobile-panel.open {
      display: block;
    }

    @media (max-width: 768px) {
      #ui-container {
        display: none;
      }

      .mobile-toolbar {
        display: flex;
      }

      #canvas-container {
        top: 60px;
        height: calc(100% - 60px);
      }
    }
  </style>
</head>
<body>
  <div id="app">
    <div id="canvas-container"></div>
    
    <div id="ui-container">
      <div class="panel">
        <h1 class="panel-title">云纹织机</h1>
        <div class="divider"></div>
        
        <div class="param-group">
          <div class="param-label">
            <span>旋度</span>
            <span class="param-value" id="curl-value">50</span>
          </div>
          <div class="slider-container">
            <input type="range" id="curl-slider" min="0" max="100" value="50" />
          </div>
        </div>

        <div class="param-group">
          <div class="param-label">
            <span>密度</span>
            <span class="param-value" id="density-value">30</span>
          </div>
          <div class="slider-container">
            <input type="range" id="density-slider" min="10" max="50" value="30" />
          </div>
        </div>

        <div class="param-group">
          <div class="param-label">
            <span>色彩偏移</span>
            <span class="param-value" id="hue-value">0°</span>
          </div>
          <div class="slider-container">
            <input type="range" id="hue-slider" min="0" max="360" value="0" />
          </div>
        </div>

        <div class="param-group">
          <div class="param-label">
            <span>流动速度</span>
            <span class="param-value" id="speed-value">0.05</span>
          </div>
          <div class="slider-container">
            <input type="range" id="speed-slider" min="0" max="0.2" step="0.001" value="0.05" />
          </div>
        </div>

        <div class="divider"></div>

        <div class="shape-label">曲面体型</div>
        <div class="btn-group">
          <button class="btn active" data-shape="cylinder">圆柱</button>
          <button class="btn" data-shape="sphere">球体</button>
          <button class="btn" data-shape="torusKnot">环形结</button>
        </div>

        <button class="btn btn-reset" id="reset-btn">重置</button>
      </div>
    </div>

    <div class="mobile-toolbar">
      <button class="menu-btn" id="menu-btn">☰</button>
      <h1 class="panel-title">云纹织机</h1>
      <div style="width: 40px;"></div>
    </div>

    <div class="mobile-panel" id="mobile-panel">
      <div class="param-group">
        <div class="param-label">
          <span>旋度</span>
          <span class="param-value" id="m-curl-value">50</span>
        </div>
        <div class="slider-container">
          <input type="range" id="m-curl-slider" min="0" max="100" value="50" />
        </div>
      </div>

      <div class="param-group">
        <div class="param-label">
          <span>密度</span>
          <span class="param-value" id="m-density-value">30</span>
        </div>
        <div class="slider-container">
          <input type="range" id="m-density-slider" min="10" max="50" value="30" />
        </div>
      </div>

      <div class="param-group">
        <div class="param-label">
          <span>色彩偏移</span>
          <span class="param-value" id="m-hue-value">0°</span>
        </div>
        <div class="slider-container">
          <input type="range" id="m-hue-slider" min="0" max="360" value="0" />
        </div>
      </div>

      <div class="param-group">
        <div class="param-label">
          <span>流动速度</span>
          <span class="param-value" id="m-speed-value">0.05</span>
        </div>
        <div class="slider-container">
          <input type="range" id="m-speed-slider" min="0" max="0.2" step="0.001" value="0.05" />
        </div>
      </div>

      <div class="divider"></div>

      <div class="shape-label">曲面体型</div>
      <div class="btn-group">
        <button class="btn active" data-shape="cylinder">圆柱</button>
        <button class="btn" data-shape="sphere">球体</button>
        <button class="btn" data-shape="torusKnot">环形结</button>
      </div>

      <button class="btn btn-reset" id="m-reset-btn">重置</button>
    </div>
  </div>

  <script type="module" src="/src/main.ts"></script>
</body>
</html>
