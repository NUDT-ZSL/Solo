<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>卡牌对战 - 延迟补偿演示</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background-color: #0d1117;
      color: #ffffff;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    #game-container {
      position: relative;
      width: 1280px;
      height: 720px;
      background-color: #1a1a2e;
      border-radius: 16px;
      box-shadow: 0 0 20px rgba(0, 0, 0, 0.5);
      overflow: hidden;
    }

    #status-panel-left {
      position: absolute;
      top: 20px;
      left: 20px;
      width: 200px;
      padding: 16px;
      background: rgba(255, 255, 255, 0.05);
      border-radius: 12px;
    }

    #status-panel-right {
      position: absolute;
      top: 20px;
      right: 20px;
      width: 200px;
      padding: 16px;
      background: rgba(255, 255, 255, 0.05);
      border-radius: 12px;
      text-align: center;
    }

    .player-name {
      font-size: 18px;
      font-weight: bold;
      margin-bottom: 8px;
    }

    .player-hand-count {
      font-size: 14px;
      color: #aaa;
      margin-bottom: 12px;
    }

    .health-bar-container {
      width: 160px;
      height: 16px;
      background: #333;
      border-radius: 8px;
      overflow: hidden;
    }

    .health-bar {
      height: 100%;
      transition: width 0.3s ease, background-color 0.3s ease;
      border-radius: 8px;
    }

    .health-bar.full {
      background-color: #66bb6a;
    }

    .health-bar.half {
      background-color: #ffa726;
    }

    .health-bar.low {
      background-color: #ef5350;
    }

    .ai-avatar {
      width: 48px;
      height: 48px;
      border-radius: 50%;
      background: #555;
      margin: 0 auto 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
    }

    .ai-status {
      font-size: 14px;
      color: #888;
    }

    #turn-indicator {
      position: absolute;
      bottom: 220px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 20px;
      font-weight: bold;
      padding: 10px 24px;
      background: rgba(0, 0, 0, 0.5);
      border-radius: 20px;
      animation: pulse 0.3s ease-in-out infinite alternate;
    }

    @keyframes pulse {
      from {
        transform: translateX(-50%) scale(1);
      }
      to {
        transform: translateX(-50%) scale(1.05);
      }
    }

    #play-area {
      position: absolute;
      bottom: 180px;
      left: 50%;
      transform: translateX(-50%);
      width: 240px;
      height: 120px;
      background: rgba(255, 255, 255, 0.05);
      border-radius: 12px;
      border: 2px dashed rgba(255, 255, 255, 0.2);
      display: flex;
      align-items: center;
      justify-content: center;
    }

    #play-area.flash-blue {
      animation: flashBlue 0.15s ease-out;
    }

    #play-area.flash-red {
      animation: flashRed 0.3s ease-out;
    }

    @keyframes flashBlue {
      0% {
        box-shadow: 0 0 0 rgba(68, 138, 255, 0);
      }
      50% {
        box-shadow: 0 0 30px rgba(68, 138, 255, 0.8);
      }
      100% {
        box-shadow: 0 0 0 rgba(68, 138, 255, 0);
      }
    }

    @keyframes flashRed {
      0% {
        box-shadow: 0 0 0 rgba(255, 82, 82, 0);
      }
      50% {
        box-shadow: 0 0 40px rgba(255, 82, 82, 0.9);
      }
      100% {
        box-shadow: 0 0 0 rgba(255, 82, 82, 0);
      }
    }

    #hand-area {
      position: absolute;
      bottom: 40px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      gap: 10px;
      padding: 10px;
    }

    .card {
      width: 60px;
      height: 90px;
      background: #1a237e;
      border-radius: 8px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      color: white;
      cursor: grab;
      transition: transform 0.15s ease, box-shadow 0.15s ease;
      user-select: none;
      position: relative;
      border: 2px solid transparent;
    }

    .card:hover {
      transform: scale(1.1);
      border-color: #ffd700;
      box-shadow: 0 0 15px rgba(255, 215, 0, 0.5);
      z-index: 10;
    }

    .card.dragging {
      cursor: grabbing;
      opacity: 0.9;
      z-index: 100;
    }

    .card.playing {
      position: absolute;
      pointer-events: none;
      z-index: 50;
    }

    .card.rollback {
      animation: rollbackFadeIn 0.4s ease-out;
    }

    @keyframes rollbackFadeIn {
      0% {
        opacity: 0;
        transform: scale(0.8);
      }
      100% {
        opacity: 1;
        transform: scale(1);
      }
    }

    .card-value {
      font-size: 24px;
      font-weight: bold;
    }

    .card-type {
      font-size: 10px;
      margin-top: 4px;
    }

    #latency-panel {
      position: absolute;
      top: 20px;
      right: 240px;
      padding: 10px 16px;
      background: rgba(0, 0, 0, 0.5);
      border-radius: 8px;
      font-size: 12px;
    }

    .latency-value {
      font-weight: bold;
      margin-bottom: 4px;
    }

    .latency-value.green {
      color: #66bb6a;
    }

    .latency-value.yellow {
      color: #ffa726;
    }

    .latency-value.red {
      color: #ef5350;
    }

    .queue-count {
      color: #aaa;
    }

    #game-over-panel {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      background: rgba(0, 0, 0, 0.9);
      padding: 40px;
      border-radius: 16px;
      text-align: center;
      z-index: 200;
      display: none;
    }

    #game-over-panel.show {
      display: block;
    }

    .game-over-title {
      font-size: 32px;
      font-weight: bold;
      margin-bottom: 20px;
    }

    .game-over-stats {
      text-align: left;
      margin-bottom: 20px;
    }

    .game-over-stats div {
      margin: 8px 0;
      font-size: 16px;
    }

    #restart-btn {
      padding: 12px 32px;
      font-size: 18px;
      background: #448aff;
      color: white;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      transition: background 0.2s;
    }

    #restart-btn:hover {
      background: #2979ff;
    }

    #ai-hand-area {
      position: absolute;
      top: 40px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      gap: 10px;
      padding: 10px;
    }

    .ai-card {
      width: 60px;
      height: 90px;
      background: #2d2d2d;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #666;
      font-size: 24px;
      border: 2px solid #444;
    }

    .ai-card.playing {
      position: absolute;
      z-index: 50;
    }

    #discard-pile {
      position: absolute;
      bottom: 180px;
      right: 100px;
      width: 60px;
      height: 90px;
      background: rgba(255, 255, 255, 0.08);
      border-radius: 8px;
      border: 2px dashed #555;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 12px;
      color: #888;
    }
  </style>
</head>
<body>
  <div id="game-container">
    <!-- 左侧状态面板 - 本地玩家 -->
    <div id="status-panel-left">
      <div class="player-name" id="player-name">玩家</div>
      <div class="player-hand-count">手牌: <span id="player-hand-count">7</span> 张</div>
      <div class="health-bar-container">
        <div class="health-bar full" id="player-health-bar" style="width: 100%"></div>
      </div>
      <div style="font-size: 12px; color: #aaa; margin-top: 4px;">
        HP: <span id="player-hp">30</span>/30
      </div>
    </div>

    <!-- 右侧状态面板 - AI玩家 -->
    <div id="status-panel-right">
      <div class="ai-avatar">🤖</div>
      <div class="player-name">AI对手</div>
      <div class="ai-status" id="ai-status">等待中...</div>
      <div class="player-hand-count">手牌: <span id="ai-hand-count">7</span> 张</div>
      <div class="health-bar-container" style="margin: 0 auto;">
        <div class="health-bar full" id="ai-health-bar" style="width: 100%"></div>
      </div>
      <div style="font-size: 12px; color: #aaa; margin-top: 4px;">
        HP: <span id="ai-hp">30</span>/30
      </div>
    </div>

    <!-- 延迟面板 -->
    <div id="latency-panel">
      <div class="latency-value green" id="latency-value">延迟: 0ms</div>
      <div class="queue-count">队列: <span id="queue-count">0</span>/10</div>
    </div>

    <!-- AI手牌区 -->
    <div id="ai-hand-area"></div>

    <!-- 回合指示器 -->
    <div id="turn-indicator">准备开始...</div>

    <!-- 出牌区域 -->
    <div id="play-area">出牌区</div>

    <!-- 弃牌堆 -->
    <div id="discard-pile">弃牌堆<br><span id="discard-count">0</span></div>

    <!-- 手牌区 -->
    <div id="hand-area"></div>

    <!-- 游戏结束面板 -->
    <div id="game-over-panel">
      <div class="game-over-title" id="game-over-title">游戏结束</div>
      <div class="game-over-stats">
        <div>平均延迟: <span id="avg-latency">0</span>ms</div>
        <div>回滚次数: <span id="rollback-count">0</span>次</div>
        <div>有效出牌率: <span id="success-rate">0</span>%</div>
      </div>
      <button id="restart-btn">再来一局</button>
    </div>
  </div>

  <script type="module" src="/src/client/main.ts"></script>
</body>
</html>
