<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>StarForge - Interactive 3D Star Particle Generator</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #000;
      font-family: 'Segoe UI', 'Consolas', monospace;
    }
    #canvas-container {
      width: 100%;
      height: 100%;
      position: absolute;
      top: 0;
      left: 0;
    }
    #tooltip {
      position: absolute;
      pointer-events: none;
      display: none;
      background: rgba(10, 10, 30, 0.85);
      border: 1px solid rgba(180, 180, 220, 0.4);
      border-radius: 6px;
      padding: 6px 10px;
      color: #d0d0e8;
      font-size: 12px;
      line-height: 1.5;
      backdrop-filter: blur(4px);
      white-space: nowrap;
      z-index: 100;
    }
  </style>
</head>
<body>
  <div id="canvas-container"></div>
  <div id="tooltip"></div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
