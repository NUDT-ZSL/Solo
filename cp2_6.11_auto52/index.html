<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>记忆迷宫 | Memory Maze</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    }

    body {
      background: linear-gradient(135deg, #0B0B1A 0%, #1A1A3E 50%, #0B0B1A 100%);
      background-size: 400% 400%;
      animation: gradientShift 15s ease infinite;
    }

    @keyframes gradientShift {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    #app {
      width: 100%;
      height: 100%;
      position: relative;
    }

    #canvas-container {
      width: 100%;
      height: 100%;
    }

    #loading-screen {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: linear-gradient(135deg, #0B0B1A 0%, #1A1A3E 100%);
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      z-index: 1000;
      transition: opacity 0.8s ease;
    }

    #loading-screen.hidden {
      opacity: 0;
      pointer-events: none;
    }

    .loading-title {
      font-size: 48px;
      font-weight: 300;
      color: #00E5FF;
      margin-bottom: 20px;
      text-shadow: 0 0 20px rgba(0, 229, 255, 0.5);
      letter-spacing: 8px;
    }

    .loading-subtitle {
      font-size: 16px;
      color: rgba(255, 255, 255, 0.6);
      margin-bottom: 40px;
      letter-spacing: 2px;
    }

    .loading-spinner {
      width: 60px;
      height: 60px;
      border: 2px solid rgba(0, 229, 255, 0.2);
      border-top-color: #00E5FF;
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .loading-progress {
      margin-top: 30px;
      font-size: 14px;
      color: rgba(0, 229, 255, 0.8);
    }

    #controls-hint {
      position: absolute;
      bottom: 30px;
      right: 30px;
      display: flex;
      gap: 20px;
      z-index: 100;
      opacity: 0;
      transition: opacity 0.5s ease 1s;
    }

    #controls-hint.visible {
      opacity: 1;
    }

    .control-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
      padding: 12px 16px;
      background: rgba(11, 11, 26, 0.8);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(0, 229, 255, 0.3);
      border-radius: 12px;
      transition: all 0.3s ease;
    }

    .control-item:hover {
      background: rgba(0, 229, 255, 0.1);
      border-color: rgba(0, 229, 255, 0.6);
      transform: translateY(-2px);
    }

    .control-key {
      font-size: 18px;
      font-weight: bold;
      color: #00E5FF;
      text-shadow: 0 0 10px rgba(0, 229, 255, 0.5);
    }

    .control-label {
      font-size: 11px;
      color: rgba(255, 255, 255, 0.7);
      letter-spacing: 1px;
    }

    .wasd-group {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 4px;
    }

    .wasd-key {
      width: 24px;
      height: 24px;
      display: flex;
      justify-content: center;
      align-items: center;
      font-size: 12px;
      font-weight: bold;
      color: #00E5FF;
      background: rgba(0, 229, 255, 0.1);
      border: 1px solid rgba(0, 229, 255, 0.4);
      border-radius: 4px;
    }

    .wasd-key:nth-child(2) {
      grid-column: 2;
    }

    .wasd-key:nth-child(3),
    .wasd-key:nth-child(4),
    .wasd-key:nth-child(5) {
      grid-row: 2;
    }

    #screenshot-flash {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: white;
      opacity: 0;
      pointer-events: none;
      z-index: 500;
      transition: opacity 0.1s ease;
    }

    #screenshot-flash.active {
      opacity: 0.8;
    }

    #crosshair {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 4px;
      height: 4px;
      background: rgba(0, 229, 255, 0.8);
      border-radius: 50%;
      pointer-events: none;
      z-index: 50;
      box-shadow: 0 0 10px rgba(0, 229, 255, 0.5);
    }

    #memory-toast {
      position: absolute;
      top: 80px;
      left: 50%;
      transform: translateX(-50%);
      padding: 16px 32px;
      background: rgba(11, 11, 26, 0.9);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(0, 229, 255, 0.5);
      border-radius: 8px;
      color: #00E5FF;
      font-size: 16px;
      letter-spacing: 2px;
      opacity: 0;
      transition: all 0.3s ease;
      pointer-events: none;
      z-index: 200;
    }

    #memory-toast.visible {
      opacity: 1;
      top: 100px;
    }
  </style>
</head>
<body>
  <div id="app">
    <div id="loading-screen">
      <h1 class="loading-title">记忆迷宫</h1>
      <p class="loading-subtitle">MEMORY MAZE</p>
      <div class="loading-spinner"></div>
      <p class="loading-progress">正在构建您的记忆宫殿...</p>
    </div>

    <div id="canvas-container"></div>

    <div id="crosshair"></div>

    <div id="screenshot-flash"></div>

    <div id="memory-toast"></div>

    <div id="controls-hint">
      <div class="control-item">
        <div class="wasd-group">
          <div class="wasd-key">W</div>
          <div class="wasd-key">A</div>
          <div class="wasd-key">S</div>
          <div class="wasd-key">D</div>
        </div>
        <span class="control-label">移动</span>
      </div>
      <div class="control-item">
        <span class="control-key">E</span>
        <span class="control-label">截图</span>
      </div>
      <div class="control-item">
        <span class="control-key">R</span>
        <span class="control-label">重播</span>
      </div>
      <div class="control-item">
        <span class="control-key">ESC</span>
        <span class="control-label">解锁</span>
      </div>
    </div>
  </div>

  <script type="module" src="/src/main.ts"></script>
</body>
</html>
