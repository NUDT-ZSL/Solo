<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>3D 植物向光性生长模拟</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #1A1A2E;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif;
      color: #E0E0E8;
    }

    #app {
      display: flex;
      flex-direction: row;
      width: 100vw;
      height: 100vh;
      transition: flex-direction 0.4s cubic-bezier(0.68, -0.55, 0.27, 1.55);
    }

    #scene-container {
      position: relative;
      flex: 0 0 70%;
      width: 70%;
      height: 100%;
      transition: flex-basis 0.4s cubic-bezier(0.68, -0.55, 0.27, 1.55),
                  width 0.4s cubic-bezier(0.68, -0.55, 0.27, 1.55),
                  height 0.4s cubic-bezier(0.68, -0.55, 0.27, 1.55);
    }

    #scene-container canvas {
      display: block;
      width: 100% !important;
      height: 100% !important;
    }

    #control-panel {
      flex: 0 0 30%;
      width: 30%;
      height: 100%;
      padding: 20px;
      background: #16162A;
      border-left: 1px solid #2A2A3A;
      display: flex;
      flex-direction: column;
      gap: 12px;
      overflow-y: auto;
      transition: flex-basis 0.4s cubic-bezier(0.68, -0.55, 0.27, 1.55),
                  width 0.4s cubic-bezier(0.68, -0.55, 0.27, 1.55),
                  height 0.4s cubic-bezier(0.68, -0.55, 0.27, 1.55);
    }

    .panel-title {
      font-size: 18px;
      font-weight: 600;
      color: #FFFFFF;
      margin-bottom: 8px;
      letter-spacing: 0.5px;
    }

    .panel-subtitle {
      font-size: 12px;
      color: #80809A;
      margin-bottom: 4px;
    }

    .card {
      background: #2A2A3A;
      border: 1px solid #4A4A5A;
      border-radius: 8px;
      padding: 16px;
      backdrop-filter: blur(10px);
    }

    .card-title {
      font-size: 14px;
      font-weight: 500;
      color: #C0C0D8;
      margin-bottom: 12px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .card-title .icon {
      width: 18px;
      height: 18px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
    }

    .slider-container {
      position: relative;
      padding: 8px 0;
    }

    .slider-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 10px;
    }

    .slider-label {
      font-size: 13px;
      color: #A0A0B8;
    }

    .slider-value {
      font-size: 13px;
      color: #81C784;
      font-weight: 500;
      font-variant-numeric: tabular-nums;
      min-width: 42px;
      text-align: right;
    }

    .slider-wrapper {
      position: relative;
      height: 24px;
      display: flex;
      align-items: center;
    }

    input[type="range"] {
      -webkit-appearance: none;
      appearance: none;
      width: 100%;
      height: 4px;
      background: linear-gradient(to right, #4CAF50, #2E7D32);
      border-radius: 4px;
      outline: none;
      cursor: pointer;
    }

    input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none;
      appearance: none;
      width: 18px;
      height: 18px;
      background: #FFFFFF;
      border: 2px solid #4CAF50;
      border-radius: 50%;
      cursor: pointer;
      box-shadow: 0 2px 8px rgba(76, 175, 80, 0.4);
      transition: transform 0.15s ease, box-shadow 0.15s ease;
    }

    input[type="range"]::-webkit-slider-thumb:hover {
      transform: scale(1.15);
      box-shadow: 0 2px 12px rgba(76, 175, 80, 0.6);
    }

    input[type="range"]::-webkit-slider-thumb:active {
      transform: scale(1.1);
    }

    input[type="range"]::-moz-range-thumb {
      width: 18px;
      height: 18px;
      background: #FFFFFF;
      border: 2px solid #4CAF50;
      border-radius: 50%;
      cursor: pointer;
      box-shadow: 0 2px 8px rgba(76, 175, 80, 0.4);
    }

    .slider-popup {
      position: absolute;
      top: -28px;
      transform: translateX(-50%);
      background: #4CAF50;
      color: #FFFFFF;
      font-size: 12px;
      font-weight: 600;
      padding: 4px 8px;
      border-radius: 4px;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.2s ease;
      white-space: nowrap;
    }

    .slider-popup.visible {
      opacity: 1;
    }

    .slider-popup::after {
      content: '';
      position: absolute;
      bottom: -4px;
      left: 50%;
      transform: translateX(-50%);
      width: 0;
      height: 0;
      border-left: 4px solid transparent;
      border-right: 4px solid transparent;
      border-top: 4px solid #4CAF50;
    }

    .info-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    .info-item {
      background: rgba(74, 74, 90, 0.5);
      border-radius: 6px;
      padding: 10px 12px;
    }

    .info-item-label {
      font-size: 11px;
      color: #80809A;
      margin-bottom: 4px;
    }

    .info-item-value {
      font-size: 14px;
      font-weight: 500;
      color: #E0E0E8;
    }

    .status-dot {
      display: inline-block;
      width: 8px;
      height: 8px;
      border-radius: 50%;
      margin-right: 6px;
      vertical-align: middle;
    }

    .status-dot.active {
      background: #4CAF50;
      box-shadow: 0 0 6px #4CAF50;
      animation: pulse 2s infinite;
    }

    .status-dot.inactive {
      background: #666;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.5; }
    }

    .hint {
      font-size: 12px;
      color: #80809A;
      line-height: 1.6;
    }

    .hint strong {
      color: #A0A0B8;
    }

    @media (max-width: 768px) {
      #app {
        flex-direction: column;
      }

      #scene-container {
        flex: 0 0 70%;
        width: 100%;
        height: 70%;
      }

      #control-panel {
        flex: 0 0 30%;
        width: 100%;
        height: 30%;
        border-left: none;
        border-top: 1px solid #2A2A3A;
        padding: 12px 16px;
      }

      .panel-title {
        font-size: 16px;
      }

      .card {
        padding: 12px;
      }
    }
  </style>
</head>
<body>
  <div id="app">
    <div id="scene-container"></div>
    <div id="control-panel">
      <div>
        <div class="panel-title">🌱 植物生长模拟器</div>
        <div class="panel-subtitle">Phototropism &amp; Environment Response</div>
      </div>

      <div class="card">
        <div class="card-title">
          <span class="icon">💡</span>
          光照强度
        </div>
        <div class="slider-container">
          <div class="slider-header">
            <span class="slider-label">Light Intensity</span>
            <span class="slider-value" id="light-value">1.0</span>
          </div>
          <div class="slider-wrapper">
            <input type="range" id="light-slider" min="0.1" max="2.0" step="0.1" value="1.0" />
            <div class="slider-popup" id="light-popup">1.0</div>
          </div>
        </div>
      </div>

      <div class="card">
        <div class="card-title">
          <span class="icon">💧</span>
          土壤湿度
        </div>
        <div class="slider-container">
          <div class="slider-header">
            <span class="slider-label">Soil Moisture</span>
            <span class="slider-value" id="moisture-value">60%</span>
          </div>
          <div class="slider-wrapper">
            <input type="range" id="moisture-slider" min="10" max="100" step="1" value="60" />
            <div class="slider-popup" id="moisture-popup">60%</div>
          </div>
        </div>
      </div>

      <div class="card">
        <div class="card-title">
          <span class="icon">📊</span>
          环境状态
        </div>
        <div class="info-grid">
          <div class="info-item">
            <div class="info-item-label">生长状态</div>
            <div class="info-item-value">
              <span class="status-dot active"></span>
              <span id="growth-status">正常生长</span>
            </div>
          </div>
          <div class="info-item">
            <div class="info-item-label">开花进度</div>
            <div class="info-item-value" id="flower-progress">—</div>
          </div>
          <div class="info-item">
            <div class="info-item-label">茎段数量</div>
            <div class="info-item-value">6</div>
          </div>
          <div class="info-item">
            <div class="info-item-label">叶片数量</div>
            <div class="info-item-value">2 × 4段</div>
          </div>
        </div>
      </div>

      <div class="card">
        <div class="card-title">
          <span class="icon">🖱️</span>
          操作指南
        </div>
        <div class="hint">
          <strong>拖拽光源：</strong>点击黄色光球在场景中拖动<br />
          <strong>视角控制：</strong>鼠标右键拖拽旋转视角<br />
          <strong>开花条件：</strong>光照 &lt; 0.3 且 湿度 &gt; 80%<br />
          持续60秒后植物顶端将绽放花朵
        </div>
      </div>
    </div>
  </div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
