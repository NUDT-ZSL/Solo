<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>季风信笺 | Monsoon Letter</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      background-color: #1A1A2E;
      color: #FFFFFF;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
      overflow: hidden;
    }

    #app {
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      position: relative;
    }

    .loading {
      position: fixed;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #1A1A2E;
      z-index: 9999;
      font-size: 14px;
      color: #888;
      letter-spacing: 2px;
      transition: opacity 0.6s ease;
    }

    .loading.hidden {
      opacity: 0;
      pointer-events: none;
    }

    .loading-dot {
      display: inline-block;
      width: 6px;
      height: 6px;
      margin: 0 4px;
      border-radius: 50%;
      background: #8BC34A;
      animation: pulse 1.2s infinite;
    }
    .loading-dot:nth-child(2) { background: #00BCD4; animation-delay: 0.2s; }
    .loading-dot:nth-child(3) { background: #FF7043; animation-delay: 0.4s; }
    .loading-dot:nth-child(4) { background: #E0F7FA; animation-delay: 0.6s; }

    @keyframes pulse {
      0%, 80%, 100% { transform: scale(0.6); opacity: 0.5; }
      40% { transform: scale(1); opacity: 1; }
    }

    .season-switcher {
      position: absolute;
      top: 24px;
      left: 24px;
      display: flex;
      gap: 12px;
      z-index: 100;
    }

    .season-btn {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      border: 2px solid rgba(255,255,255,0.15);
      cursor: pointer;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      position: relative;
      box-shadow: 0 2px 12px rgba(0,0,0,0.3);
    }

    .season-btn:hover {
      transform: scale(1.15);
      border-color: rgba(255,255,255,0.6);
    }

    .season-btn.active {
      border-color: #FFFFFF;
      transform: scale(1.1);
      box-shadow: 0 0 20px currentColor;
    }

    .season-btn.spring { background: linear-gradient(135deg, #8BC34A, #FFEB3B); color: #8BC34A; }
    .season-btn.summer { background: linear-gradient(135deg, #00BCD4, #01579B); color: #00BCD4; }
    .season-btn.autumn { background: linear-gradient(135deg, #FF7043, #FFD700); color: #FF7043; }
    .season-btn.winter { background: linear-gradient(135deg, #E0F7FA, #FFFFFF); color: #B3E5FC; }

    .letter-wrapper {
      position: relative;
      width: min(60vw, 700px);
      height: 70vh;
      min-height: 500px;
      perspective: 2000px;
      transform-style: preserve-3d;
    }

    .letter-card {
      position: absolute;
      inset: 0;
      transform-style: preserve-3d;
      transition: transform 0.5s cubic-bezier(0.22, 1, 0.36, 1);
      box-shadow: 0 8px 60px rgba(0,0,0,0.5), 0 2px 8px rgba(0,0,0,0.3);
      border-radius: 4px;
      cursor: grab;
    }

    .letter-card:active {
      cursor: grabbing;
    }

    .letter-face {
      position: absolute;
      inset: 0;
      backface-visibility: hidden;
      -webkit-backface-visibility: hidden;
      border-radius: 4px;
      overflow: hidden;
    }

    .letter-front {
      background: linear-gradient(180deg, #FFFEF7 0%, #FFF9E8 100%);
    }

    .letter-back {
      background: linear-gradient(180deg, #FFF8E1 0%, #FFECB3 100%);
      transform: rotateY(180deg);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 32px;
    }

    #particleCanvas {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
    }

    #textCanvas {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 10;
    }

    .letter-edge {
      position: absolute;
      inset: 0;
      pointer-events: none;
      z-index: 5;
      border-radius: 4px;
    }

    .corner-hit {
      position: absolute;
      width: 40px;
      height: 40px;
      z-index: 20;
      cursor: nwse-resize;
    }
    .corner-hit.tl { top: 0; left: 0; cursor: nesw-resize; }
    .corner-hit.tr { top: 0; right: 0; cursor: nwse-resize; }
    .corner-hit.bl { bottom: 0; left: 0; cursor: nwse-resize; }
    .corner-hit.br { bottom: 0; right: 0; cursor: nesw-resize; }

    .back-icon {
      width: 30%;
      opacity: 0.9;
    }

    .back-proverb {
      font-size: 14px;
      color: #666666;
      text-align: center;
      max-width: 70%;
      line-height: 1.8;
      letter-spacing: 2px;
      font-style: italic;
    }

    .bottom-controls {
      position: absolute;
      bottom: 24px;
      right: 24px;
      display: flex;
      gap: 12px;
      z-index: 100;
    }

    .action-btn {
      padding: 12px 24px;
      border: none;
      border-radius: 24px;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      color: #FFFFFF;
      box-shadow: 0 4px 16px rgba(0,0,0,0.2);
      position: relative;
      overflow: hidden;
    }

    .action-btn:hover {
      transform: scale(1.05);
      box-shadow: 0 6px 24px currentColor;
    }

    .action-btn:active {
      transform: scale(0.98);
    }

    .action-btn::after {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(120deg, transparent 30%, rgba(255,255,255,0.3) 50%, transparent 70%);
      transform: translateX(-100%);
      transition: transform 0.6s;
    }

    .action-btn:hover::after {
      transform: translateX(100%);
    }

    .input-panel {
      position: absolute;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      gap: 12px;
      z-index: 100;
      align-items: center;
      background: rgba(255,255,255,0.05);
      backdrop-filter: blur(10px);
      padding: 12px 20px;
      border-radius: 28px;
      border: 1px solid rgba(255,255,255,0.1);
    }

    .letter-input {
      width: 320px;
      padding: 10px 16px;
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 20px;
      background: rgba(0,0,0,0.3);
      color: #FFFFFF;
      font-size: 14px;
      outline: none;
      transition: all 0.3s;
      font-family: inherit;
    }

    .letter-input::placeholder {
      color: rgba(255,255,255,0.3);
    }

    .letter-input:focus {
      border-color: rgba(255,255,255,0.4);
      background: rgba(0,0,0,0.5);
    }

    .char-count {
      font-size: 12px;
      color: rgba(255,255,255,0.4);
      min-width: 48px;
      text-align: right;
    }

    .title {
      position: absolute;
      top: 24px;
      right: 24px;
      font-size: 13px;
      letter-spacing: 4px;
      color: rgba(255,255,255,0.5);
      z-index: 100;
      font-weight: 300;
    }

    .hint {
      position: absolute;
      top: 64px;
      right: 24px;
      font-size: 11px;
      color: rgba(255,255,255,0.25);
      z-index: 100;
      letter-spacing: 1px;
    }
  </style>
</head>
<body>
  <div class="loading" id="loading">
    <span>正在加载季风信笺</span>
    <span class="loading-dot"></span>
    <span class="loading-dot"></span>
    <span class="loading-dot"></span>
    <span class="loading-dot"></span>
  </div>

  <div id="app">
    <div class="title">季 风 信 笺</div>
    <div class="hint">拖拽四角折叠信纸 · 背面藏有惊喜</div>

    <div class="season-switcher" id="seasonSwitcher">
      <button class="season-btn spring active" data-season="spring" title="春芽"></button>
      <button class="season-btn summer" data-season="summer" title="夏浪"></button>
      <button class="season-btn autumn" data-season="autumn" title="秋枫"></button>
      <button class="season-btn winter" data-season="winter" title="冬雪"></button>
    </div>

    <div class="letter-wrapper" id="letterWrapper">
      <div class="letter-card" id="letterCard">
        <div class="letter-face letter-front">
          <canvas id="particleCanvas"></canvas>
          <div class="letter-edge" id="letterEdge"></div>
          <canvas id="textCanvas"></canvas>
          <div class="corner-hit tl" data-corner="tl"></div>
          <div class="corner-hit tr" data-corner="tr"></div>
          <div class="corner-hit bl" data-corner="bl"></div>
          <div class="corner-hit br" data-corner="br"></div>
        </div>
        <div class="letter-face letter-back" id="letterBack">
          <div class="back-icon" id="backIcon"></div>
          <div class="back-proverb" id="backProverb"></div>
        </div>
      </div>
    </div>

    <div class="input-panel">
      <input
        type="text"
        class="letter-input"
        id="letterInput"
        placeholder="写下一句祝福或短诗（20-100字）..."
        maxlength="100"
      />
      <span class="char-count" id="charCount">0 / 100</span>
    </div>

    <div class="bottom-controls">
      <button class="action-btn" id="generateBtn">生成信笺</button>
      <button class="action-btn" id="downloadBtn">下载PNG</button>
    </div>
  </div>

  <script type="module" src="/src/main.ts"></script>
</body>
</html>
