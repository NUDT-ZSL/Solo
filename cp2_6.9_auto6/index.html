<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>3D粒子星系</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      overflow: hidden;
      background: #0a0a1a;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    }

    #canvas-container {
      width: 100vw;
      height: 100vh;
      position: fixed;
      top: 0;
      left: 0;
      background: #0a0a1a;
    }

    canvas {
      display: block;
    }

    #fps-counter {
      position: fixed;
      bottom: 20px;
      left: 20px;
      color: #ffffff;
      font-size: 12px;
      font-family: 'Consolas', 'Monaco', monospace;
      text-shadow: 0 0 8px rgba(255, 255, 255, 0.5), 0 0 16px rgba(0, 212, 255, 0.3);
      z-index: 100;
      line-height: 1.6;
      pointer-events: none;
    }

    #control-panel {
      position: fixed;
      top: 20px;
      right: 20px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      z-index: 100;
    }

    .control-group {
      display: flex;
      gap: 10px;
      align-items: center;
      justify-content: center;
      background: rgba(255, 255, 255, 0.05);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      padding: 10px;
      border-radius: 12px;
      border: 1px solid rgba(255, 255, 255, 0.08);
    }

    .btn {
      width: 44px;
      height: 44px;
      border: none;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.1);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.3s ease;
      border: 1px solid rgba(255, 255, 255, 0.1);
      position: relative;
      overflow: hidden;
    }

    .btn:hover {
      background: rgba(255, 255, 255, 0.25);
      transform: translateY(-2px);
      box-shadow: 0 4px 20px rgba(0, 212, 255, 0.3);
    }

    .btn:active {
      animation: pulse 0.1s ease;
    }

    @keyframes pulse {
      0% { transform: scale(1); }
      50% { transform: scale(0.95); }
      100% { transform: scale(1); }
    }

    .btn svg {
      width: 20px;
      height: 20px;
    }

    .btn-audio svg {
      fill: #ffffff;
      transition: fill 0.3s ease;
    }

    .btn-audio.active svg {
      fill: #00ff88;
      animation: breathe 1.5s ease-in-out infinite;
    }

    @keyframes breathe {
      0%, 100% { filter: brightness(1); }
      50% { filter: brightness(1.8); }
    }

    .btn-preset {
      background: linear-gradient(135deg, rgba(0, 212, 255, 0.2), rgba(138, 43, 226, 0.2));
    }

    .btn-preset:hover {
      background: linear-gradient(135deg, rgba(0, 212, 255, 0.4), rgba(138, 43, 226, 0.4));
    }

    .btn-preset.active {
      background: linear-gradient(135deg, rgba(0, 212, 255, 0.5), rgba(138, 43, 226, 0.5));
      box-shadow: 0 0 15px rgba(0, 212, 255, 0.5), 0 0 30px rgba(138, 43, 226, 0.3);
    }

    .btn-reset svg {
      fill: url(#resetGradient);
    }

    .btn-audio svg {
      fill: url(#audioGradient);
    }

    .btn-preset svg {
      fill: url(#presetGradient);
    }

    .btn-tooltip {
      position: absolute;
      bottom: -28px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(0, 0, 0, 0.7);
      color: white;
      font-size: 11px;
      padding: 4px 8px;
      border-radius: 4px;
      white-space: nowrap;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s ease;
    }

    .btn:hover .btn-tooltip {
      opacity: 1;
    }

    @media (max-width: 768px) {
      #control-panel {
        top: auto;
        bottom: 20px;
        left: 50%;
        right: auto;
        transform: translateX(-50%);
        flex-direction: row;
      }

      #fps-counter {
        bottom: 90px;
      }
    }
  </style>
</head>
<body>
  <div id="canvas-container"></div>

  <div id="fps-counter">
    <div>FPS: <span id="fps-value">60</span></div>
    <div>粒子: <span id="particle-count">20000</span></div>
  </div>

  <div id="control-panel">
    <div class="control-group">
      <button class="btn btn-audio" id="btn-audio" title="启动音频模式">
        <svg viewBox="0 0 24 24">
          <defs>
            <linearGradient id="audioGradient" x1="0%" y1="0%" x2="100%" y2="100%">
              <stop offset="0%" style="stop-color:#00d4ff"/>
              <stop offset="100%" style="stop-color:#8a2be2"/>
            </linearGradient>
          </defs>
          <path d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3zm-1-9c0-.55.45-1 1-1s1 .45 1 1v6c0 .55-.45 1-1 1s-1-.45-1-1V5z"/>
          <path d="M17 11c0 2.76-2.24 5-5 5s-5-2.24-5-5H5c0 3.53 2.61 6.43 6 6.92V21h2v-3.08c3.39-.49 6-3.39 6-6.92h-2z"/>
        </svg>
        <span class="btn-tooltip">音频模式</span>
      </button>
    </div>
    <div class="control-group">
      <button class="btn btn-preset active" id="btn-spiral" title="螺旋星系">
        <svg viewBox="0 0 24 24">
          <defs>
            <linearGradient id="presetGradient" x1="0%" y1="0%" x2="100%" y2="100%">
              <stop offset="0%" style="stop-color:#00d4ff"/>
              <stop offset="100%" style="stop-color:#8a2be2"/>
            </linearGradient>
          </defs>
          <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 18c-4.41 0-8-3.59-8-8s3.59-8 8-8 8 3.59 8 8-3.59 8-8 8z"/>
          <path d="M12 6c-3.31 0-6 2.69-6 6s2.69 6 6 6 6-2.69 6-6-2.69-6-6-6zm0 10c-2.21 0-4-1.79-4-4s1.79-4 4-4 4 1.79 4 4-1.79 4-4 4z"/>
          <circle cx="12" cy="12" r="2"/>
        </svg>
        <span class="btn-tooltip">螺旋星系</span>
      </button>
      <button class="btn btn-preset" id="btn-globular" title="球状星团">
        <svg viewBox="0 0 24 24">
          <circle cx="12" cy="12" r="8" fill="none" stroke="url(#presetGradient)" stroke-width="1.5"/>
          <circle cx="12" cy="12" r="5" fill="none" stroke="url(#presetGradient)" stroke-width="1.5"/>
          <circle cx="12" cy="12" r="2" fill="url(#presetGradient)"/>
        </svg>
        <span class="btn-tooltip">球状星团</span>
      </button>
      <button class="btn btn-preset" id="btn-irregular" title="不规则星云">
        <svg viewBox="0 0 24 24">
          <path d="M12 3c-1.5 2-3 2.5-5 2-2.5-.5-5 1-4.5 3.5.5 2.5-1.5 4-1 6.5.5 2.5 3 3 5 2.5 1.5-.5 2.5 0 3.5 2 1.5 3 4.5 2 6-.5 1-1.5 2.5-2 4-1.5 2 .5 4-1 3.5-3-.5-2 1-4-1-5.5-2-1.5-2.5-3-1-5 1.5-2.5-1-5-3.5-5-1.5 0-2.5-1-3.5-2.5-1-1.5-2-2.5-3-2z" fill="none" stroke="url(#presetGradient)" stroke-width="1.5"/>
        </svg>
        <span class="btn-tooltip">不规则星云</span>
      </button>
    </div>
    <div class="control-group">
      <button class="btn btn-reset" id="btn-reset" title="重置视角">
        <svg viewBox="0 0 24 24">
          <defs>
            <linearGradient id="resetGradient" x1="0%" y1="0%" x2="100%" y2="100%">
              <stop offset="0%" style="stop-color:#00d4ff"/>
              <stop offset="100%" style="stop-color:#8a2be2"/>
            </linearGradient>
          </defs>
          <path d="M17.65 6.35C16.2 4.9 14.21 4 12 4c-4.42 0-7.99 3.58-7.99 8s3.57 8 7.99 8c3.73 0 6.84-2.55 7.73-6h-2.08c-.82 2.33-3.04 4-5.65 4-3.31 0-6-2.69-6-6s2.69-6 6-6c1.66 0 3.14.69 4.22 1.78L13 11h7V4l-2.35 2.35z"/>
        </svg>
        <span class="btn-tooltip">重置视角</span>
      </button>
    </div>
  </div>

  <script type="module" src="/src/main.ts"></script>
</body>
</html>
