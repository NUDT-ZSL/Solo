<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>财经趋势力量场</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
    #app { width: 100%; height: 100%; }
    
    #info-panel {
      position: absolute;
      top: 20px;
      left: 20px;
      width: 220px;
      background: rgba(15, 18, 34, 0.8);
      border-radius: 12px;
      padding: 16px;
      color: #FFFFFF;
      font-size: 14px;
      backdrop-filter: blur(8px);
      box-shadow: 0 4px 24px rgba(0, 0, 0, 0.3);
      z-index: 10;
    }

    #info-panel h3 {
      font-size: 16px;
      margin-bottom: 12px;
      color: #A5B4FC;
      font-weight: 600;
    }

    #info-panel .info-row {
      margin: 8px 0;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    #info-panel .info-label {
      color: #94A3B8;
      font-size: 12px;
    }

    #info-panel .info-value {
      color: #FFFFFF;
      font-weight: 500;
    }

    #info-panel .price-up { color: #FF4444; }
    #info-panel .price-down { color: #44FF44; }

    #info-panel .action-btn {
      width: 100%;
      margin-top: 14px;
      padding: 10px;
      border: none;
      border-radius: 8px;
      background: linear-gradient(135deg, #6366F1 0%, #8B5CF6 100%);
      color: #FFFFFF;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.3s ease;
    }

    #info-panel .action-btn:hover {
      filter: brightness(1.2);
      transform: translateY(-1px);
    }

    #fps-counter {
      position: absolute;
      bottom: 20px;
      left: 20px;
      color: rgba(255, 255, 255, 0.7);
      font-size: 12px;
      font-family: 'Courier New', monospace;
      z-index: 10;
      padding: 8px 12px;
      background: rgba(0, 0, 0, 0.3);
      border-radius: 6px;
    }

    #detail-panel {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      min-width: 280px;
      background: rgba(26, 26, 46, 0.95);
      border-radius: 8px;
      padding: 20px;
      color: #FFFFFF;
      font-size: 14px;
      backdrop-filter: blur(12px);
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5);
      z-index: 20;
      display: none;
    }

    #detail-panel h2 {
      font-size: 20px;
      margin-bottom: 16px;
      color: #A5B4FC;
      padding-bottom: 12px;
      border-bottom: 1px solid rgba(165, 180, 252, 0.2);
    }

    #detail-panel .detail-row {
      margin: 10px 0;
      display: flex;
      justify-content: space-between;
    }

    #detail-panel .detail-label {
      color: #94A3B8;
    }

    #detail-panel .detail-value {
      font-weight: 600;
    }

    #detail-panel .close-btn {
      position: absolute;
      top: 12px;
      right: 16px;
      background: none;
      border: none;
      color: #94A3B8;
      font-size: 20px;
      cursor: pointer;
      transition: color 0.2s;
    }

    #detail-panel .close-btn:hover {
      color: #FFFFFF;
    }

    @media (max-width: 768px) {
      #info-panel {
        width: calc(220px * 0.8);
        font-size: calc(14px * 0.8);
        padding: calc(16px * 0.8);
      }
      #info-panel h3 { font-size: calc(16px * 0.8); }
      #info-panel .info-label { font-size: calc(12px * 0.8); }
      #info-panel .action-btn { font-size: calc(13px * 0.8); }
      #fps-counter { font-size: calc(12px * 0.8); }
    }
  </style>
</head>
<body>
  <div id="app">
    <canvas id="scene-canvas"></canvas>
    
    <div id="info-panel">
      <h3>📊 财经数据面板</h3>
      <div class="info-row">
        <span class="info-label">股票数量</span>
        <span class="info-value" id="stock-count">-</span>
      </div>
      <div class="info-row">
        <span class="info-label">数据点数</span>
        <span class="info-value" id="point-count">-</span>
      </div>
      <div class="info-row">
        <span class="info-label">当前选中</span>
        <span class="info-value" id="selected-stock">无</span>
      </div>
      <div class="info-row">
        <span class="info-label">整体趋势</span>
        <span class="info-value" id="market-trend">-</span>
      </div>
      <button class="action-btn" id="reset-view-btn">重置视角</button>
      <button class="action-btn" id="toggle-lines-btn">切换力场线</button>
    </div>

    <div id="detail-panel">
      <button class="close-btn" id="close-detail">×</button>
      <h2 id="detail-stock-code">股票详情</h2>
      <div class="detail-row">
        <span class="detail-label">最新价格</span>
        <span class="detail-value" id="detail-price">-</span>
      </div>
      <div class="detail-row">
        <span class="detail-label">涨跌额</span>
        <span class="detail-value" id="detail-change">-</span>
      </div>
      <div class="detail-row">
        <span class="detail-label">涨跌幅</span>
        <span class="detail-value" id="detail-pct">-</span>
      </div>
      <div class="detail-row">
        <span class="detail-label">初始价格</span>
        <span class="detail-value" id="detail-open">-</span>
      </div>
      <div class="detail-row">
        <span class="detail-label">最高价</span>
        <span class="detail-value" id="detail-high">-</span>
      </div>
      <div class="detail-row">
        <span class="detail-label">最低价</span>
        <span class="detail-value" id="detail-low">-</span>
      </div>
      <div class="detail-row">
        <span class="detail-label">平均成交量</span>
        <span class="detail-value" id="detail-volume">-</span>
      </div>
    </div>

    <div id="fps-counter">
      FPS: <span id="fps-value">60</span> | 粒子: <span id="particle-count">0</span>
    </div>
  </div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
