<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>云壑流音</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: linear-gradient(180deg, #b0bec5 0%, #b2dfdb 50%, #c8ddd8 100%);
      font-family: 'PingFang SC', 'Microsoft YaHei', 'Noto Sans SC', sans-serif;
    }

    #app {
      width: 100%;
      height: 100%;
      position: relative;
    }

    canvas {
      display: block;
      width: 100%;
      height: 100%;
    }

    .chime-info-card {
      position: absolute;
      pointer-events: none;
      padding: 16px 24px;
      background: rgba(200, 215, 220, 0.35);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border: 1px solid rgba(255, 255, 255, 0.3);
      border-radius: 12px;
      color: #2c3e50;
      font-size: 14px;
      line-height: 1.8;
      opacity: 0;
      transform: translateY(8px);
      transition: opacity 0.4s ease, transform 0.4s ease;
      z-index: 100;
      min-width: 160px;
    }

    .chime-info-card.visible {
      opacity: 1;
      transform: translateY(0);
    }

    .chime-info-card .card-title {
      font-size: 16px;
      font-weight: 600;
      margin-bottom: 6px;
      color: #1a2a3a;
    }

    .chime-info-card .card-row {
      display: flex;
      justify-content: space-between;
      gap: 16px;
    }

    .chime-info-card .card-label {
      color: #5a7a8a;
    }

    .chime-info-card .card-value {
      font-weight: 500;
      color: #2c3e50;
    }
  </style>
</head>
<body>
  <div id="app"></div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
