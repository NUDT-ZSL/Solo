<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Nebula Tactics - 星云战术</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%;
      height: 100%;
      background: #0a0a2a;
      font-family: 'Segoe UI', 'Microsoft YaHei', sans-serif;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    #game-wrapper {
      position: relative;
      padding: 24px;
      border-radius: 16px;
      background: linear-gradient(135deg, rgba(48,43,99,0.6), rgba(36,36,62,0.6), rgba(15,12,41,0.6));
      box-shadow: 0 0 30px rgba(0,212,255,0.3);
    }
    #game-canvas {
      display: block;
      width: 800px;
      height: 600px;
      border-radius: 12px;
      box-shadow: 0 0 30px rgba(0,212,255,0.3);
      cursor: crosshair;
    }
    .overlay {
      position: absolute;
      top: 24px; left: 24px; right: 24px; bottom: 24px;
      border-radius: 12px;
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      background: rgba(10,10,42,0.8);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 20px;
      z-index: 10;
    }
    .overlay.hidden { display: none; }
    .overlay h1 {
      font-size: 48px;
      color: #00d4ff;
      text-shadow: 0 0 20px rgba(0,212,255,0.8);
      letter-spacing: 4px;
    }
    .overlay h2 {
      font-size: 36px;
      color: #ff4757;
      text-shadow: 0 0 20px rgba(255,71,87,0.8);
    }
    .btn {
      width: 160px; height: 50px;
      border-radius: 25px;
      background: #00d4ff;
      color: #fff;
      border: none;
      font-size: 20px;
      font-weight: bold;
      cursor: pointer;
      letter-spacing: 2px;
      transition: transform 0.2s ease, box-shadow 0.2s ease;
      box-shadow: 0 0 15px rgba(0,212,255,0.5);
    }
    .btn:hover {
      transform: scale(1.1);
      box-shadow: 0 0 25px rgba(0,212,255,0.8);
    }
    .highscore {
      font-size: 18px;
      color: #ffdd57;
      text-shadow: 0 0 10px rgba(255,221,87,0.6);
    }
    .final-score {
      font-size: 24px;
      color: #ffffff;
    }
    .instructions {
      font-size: 14px;
      color: #aaa;
      line-height: 1.8;
      text-align: center;
      max-width: 480px;
    }
    .instructions span.k { color: #00d4ff; font-weight: bold; }
  </style>
</head>
<body>
  <div id="game-wrapper">
    <canvas id="game-canvas" width="800" height="600"></canvas>

    <div id="start-screen" class="overlay">
      <h1>NEBULA TACTICS</h1>
      <div class="instructions">
        <div><span class="k">WASD</span> 移动飞船 &nbsp;|&nbsp; <span class="k">鼠标左键</span> 发射等离子弹</div>
        <div><span class="k">鼠标右键</span> 释放减速力场 &nbsp;|&nbsp; <span class="k">空格</span> 暂停</div>
        <div>采集 <span style="color:#70a1ff;">蓝色水晶</span> 恢复护盾与能量 &nbsp; 击碎 <span style="color:#ff4757;">红色陨石</span> 得分</div>
      </div>
      <button id="start-btn" class="btn">START</button>
      <div id="start-highscore" class="highscore">最高分: 0</div>
    </div>

    <div id="pause-screen" class="overlay hidden">
      <h1 style="color:#ffdd57; text-shadow:0 0 20px rgba(255,221,87,0.8);">PAUSED</h1>
      <button id="resume-btn" class="btn">RESUME</button>
    </div>

    <div id="gameover-screen" class="overlay hidden">
      <h2>GAME OVER</h2>
      <div class="final-score">最终分数: <span id="final-score">0</span></div>
      <div class="highscore">最高分: <span id="final-highscore">0</span></div>
      <button id="restart-btn" class="btn">RESTART</button>
    </div>
  </div>

  <script type="module" src="/src/game.ts"></script>
</body>
</html>
