<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>动态星空星座图</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
    }

    #canvas-container {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      min-width: 800px;
      min-height: 600px;
      background: radial-gradient(ellipse at center, #1A1A2E 0%, #0B0B1A 100%);
    }

    #control-panel {
      position: fixed;
      top: 20px;
      left: 20px;
      padding: 20px 24px;
      border-radius: 12px;
      background: rgba(10, 10, 30, 0.7);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      color: #ffffff;
      font-size: 14px;
      line-height: 1.8;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.4);
      z-index: 100;
      user-select: none;
      min-width: 220px;
    }

    #control-panel .title {
      font-size: 16px;
      font-weight: 600;
      margin-bottom: 12px;
      color: #A0C4FF;
    }

    #control-panel .theme-name {
      font-weight: 600;
      margin-bottom: 8px;
    }

    #control-panel .divider {
      height: 1px;
      background: rgba(255, 255, 255, 0.15);
      margin: 10px 0;
    }

    #control-panel kbd {
      display: inline-block;
      padding: 2px 8px;
      margin: 0 2px;
      background: rgba(255, 255, 255, 0.15);
      border-radius: 4px;
      font-family: monospace;
      font-size: 12px;
      border: 1px solid rgba(255, 255, 255, 0.2);
    }

    #control-panel .tip {
      opacity: 0.7;
      font-size: 12px;
      margin-top: 8px;
    }
  </style>
</head>
<body>
  <div id="canvas-container"></div>
  <div id="control-panel">
    <div class="title">✨ 星空星座绘制面板</div>
    <div class="theme-name">当前主题：<span id="theme-label">默认</span></div>
    <div class="divider"></div>
    <div><kbd>左键拖拽</kbd> 绘制星点</div>
    <div><kbd>1</kbd> 冷夜主题</div>
    <div><kbd>2</kbd> 暖阳主题</div>
    <div><kbd>3</kbd> 幻彩主题</div>
    <div><kbd>空格</kbd> 粒子流动画</div>
    <div><kbd>Ctrl+滚轮</kbd> 缩放视角</div>
    <div><kbd>右键拖拽</kbd> 平移视角</div>
    <div class="tip">提示：靠近的星点会自动连线形成星座</div>
  </div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
