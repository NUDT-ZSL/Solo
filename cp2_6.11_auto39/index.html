<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>风息琴弦</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      touch-action: none;
      background: #0A1628;
    }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    }
    #canvas {
      display: block;
      width: 100%;
      height: 100%;
    }
    #mic-authorize {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      padding: 20px 40px;
      background: rgba(255, 255, 255, 0.1);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255, 255, 255, 0.2);
      border-radius: 12px;
      color: #fff;
      font-size: 16px;
      cursor: pointer;
      z-index: 100;
      transition: all 0.3s ease;
    }
    #mic-authorize:hover {
      background: rgba(255, 255, 255, 0.2);
      transform: translate(-50%, -50%) scale(1.05);
    }
    #volume-bar {
      position: fixed;
      left: 20px;
      bottom: 20px;
      width: 120px;
      height: 6px;
      background: rgba(255, 255, 255, 0.2);
      border-radius: 3px;
      overflow: hidden;
      z-index: 10;
      opacity: 0;
      transition: opacity 0.5s ease;
    }
    #volume-bar.visible {
      opacity: 1;
    }
    #volume-fill {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, #4ECDC4, #FF6B6B);
      border-radius: 3px;
      transition: width 0.05s linear;
    }
  </style>
</head>
<body>
  <canvas id="canvas"></canvas>
  <button id="mic-authorize">点击开启麦克风</button>
  <div id="volume-bar">
    <div id="volume-fill"></div>
  </div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
