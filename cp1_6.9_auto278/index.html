<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>归墟之环</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #05020f;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    }
    #app {
      width: 100vw;
      height: 100vh;
      position: relative;
    }
    #app canvas {
      display: block;
    }
    .hint {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%);
      color: rgba(200, 180, 255, 0.5);
      font-size: 13px;
      letter-spacing: 2px;
      pointer-events: none;
      user-select: none;
      text-align: center;
      line-height: 1.8;
    }
  </style>
</head>
<body>
  <div id="app"></div>
  <div class="hint">
    拖拽旋转 · 滚轮缩放 · 点击碎片进行记忆修复
  </div>
  <script type="module" src="/src/ruins.ts"></script>
</body>
</html>
