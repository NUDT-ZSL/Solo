<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>记忆星云 - Memory Nebula</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700&family=Space+Grotesk:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      font-family: 'Noto Sans SC', 'Space Grotesk', -apple-system, BlinkMacSystemFont, sans-serif;
      color: #E0E0E0;
      user-select: none;
    }

    body {
      background: radial-gradient(ellipse at center, #1A0A3E 0%, #0D1117 70%, #050810 100%);
      position: relative;
    }

    #app {
      width: 100%;
      height: 100%;
    }

    #canvas-container {
      width: 100%;
      height: 100%;
      position: absolute;
      top: 0;
      left: 0;
    }

    .input-container {
      position: absolute;
      top: 30px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 10;
      display: flex;
      gap: 10px;
      align-items: center;
    }

    .nebula-input {
      width: 400px;
      height: 44px;
      padding: 0 16px;
      background: #1E3A5F;
      border: none;
      border-radius: 6px;
      color: #ffffff;
      font-size: 14px;
      font-family: inherit;
      outline: none;
      transition: background-color 150ms ease, box-shadow 150ms ease;
    }

    .nebula-input::placeholder {
      color: rgba(255, 255, 255, 0.5);
    }

    .nebula-input:hover {
      background: #2A4E77;
    }

    .nebula-input:focus {
      background: #2A4E77;
      box-shadow: 0 0 0 2px rgba(100, 150, 255, 0.3);
    }

    .generate-btn {
      height: 44px;
      padding: 0 20px;
      background: #1E3A5F;
      border: none;
      border-radius: 6px;
      color: #ffffff;
      font-size: 14px;
      font-family: inherit;
      cursor: pointer;
      transition: background-color 150ms ease;
    }

    .generate-btn:hover {
      background: #2A4E77;
    }

    .generate-btn:active {
      background: #152A44;
    }

    .help-panel {
      position: absolute;
      top: 30px;
      right: 30px;
      z-index: 10;
      padding: 12px;
      background: rgba(45, 45, 68, 0.6);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      border-radius: 8px;
      border: 0.5px solid rgba(255, 255, 255, 0.15);
      font-size: 12px;
      line-height: 1.6;
      color: #E0E0E0;
      opacity: 0.5;
      transition: opacity 200ms ease;
      width: 220px;
    }

    .help-panel:hover {
      opacity: 1;
    }

    .help-panel h3 {
      font-size: 13px;
      font-weight: 500;
      margin-bottom: 8px;
      color: #ffffff;
    }

    .help-panel p {
      margin: 4px 0;
      font-weight: 300;
    }

    .help-panel .key {
      display: inline-block;
      background: rgba(255, 255, 255, 0.1);
      padding: 1px 6px;
      border-radius: 4px;
      font-size: 11px;
      margin-right: 4px;
    }

    .help-toggle {
      display: none;
      position: absolute;
      top: 30px;
      right: 30px;
      z-index: 10;
      width: 40px;
      height: 40px;
      background: rgba(45, 45, 68, 0.8);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      border-radius: 8px;
      border: 0.5px solid rgba(255, 255, 255, 0.15);
      color: #ffffff;
      font-size: 20px;
      cursor: pointer;
      align-items: center;
      justify-content: center;
    }

    .bottom-toolbar {
      position: absolute;
      bottom: 30px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 10;
      display: flex;
      gap: 12px;
    }

    .toolbar-btn {
      height: 40px;
      padding: 0 18px;
      background: rgba(30, 58, 95, 0.8);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      border: 0.5px solid rgba(255, 255, 255, 0.1);
      border-radius: 6px;
      color: #ffffff;
      font-size: 13px;
      font-family: inherit;
      cursor: pointer;
      transition: background-color 150ms ease;
    }

    .toolbar-btn:hover {
      background: #2A4E77;
    }

    .toolbar-btn:active {
      background: #152A44;
    }

    .detail-card {
      position: absolute;
      z-index: 20;
      min-width: 280px;
      max-width: 360px;
      padding: 20px;
      background: linear-gradient(135deg, rgba(26, 26, 46, 0.9) 0%, rgba(22, 33, 62, 0.9) 100%);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border-radius: 12px;
      border: 0.5px solid rgba(255, 255, 255, 0.2);
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
      cursor: move;
      transform: translate(-50%, -50%);
      display: none;
    }

    .detail-card.visible {
      display: block;
      animation: cardFadeIn 300ms ease;
    }

    @keyframes cardFadeIn {
      from {
        opacity: 0;
        transform: translate(-50%, -45%) scale(0.95);
      }
      to {
        opacity: 1;
        transform: translate(-50%, -50%) scale(1);
      }
    }

    .detail-card .card-title {
      font-size: 18px;
      font-weight: 500;
      color: #ffffff;
      margin-bottom: 12px;
    }

    .detail-card .card-text {
      font-size: 14px;
      line-height: 1.6;
      color: rgba(255, 255, 255, 0.8);
      margin-bottom: 16px;
      font-weight: 300;
    }

    .detail-card .card-meta {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-bottom: 12px;
    }

    .detail-card .emotion-tag {
      display: inline-block;
      padding: 4px 12px;
      border-radius: 20px;
      font-size: 12px;
      font-weight: 500;
    }

    .emotion-tag.positive {
      background: rgba(255, 107, 107, 0.2);
      color: #FF6B6B;
      border: 1px solid rgba(255, 107, 107, 0.3);
    }

    .emotion-tag.negative {
      background: rgba(77, 150, 255, 0.2);
      color: #4D96FF;
      border: 1px solid rgba(77, 150, 255, 0.3);
    }

    .emotion-tag.neutral {
      background: rgba(224, 224, 224, 0.2);
      color: #E0E0E0;
      border: 1px solid rgba(224, 224, 224, 0.3);
    }

    .detail-card .card-time {
      font-size: 12px;
      color: rgba(255, 255, 255, 0.5);
    }

    .detail-card .close-btn {
      position: absolute;
      top: 10px;
      right: 12px;
      width: 28px;
      height: 28px;
      background: none;
      border: none;
      color: rgba(255, 255, 255, 0.6);
      font-size: 20px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 4px;
      transition: color 150ms ease, background-color 150ms ease;
    }

    .detail-card .close-btn:hover {
      color: #ffffff;
      background: rgba(255, 255, 255, 0.1);
    }

    .hover-label {
      position: absolute;
      z-index: 15;
      padding: 6px 12px;
      background: rgba(20, 20, 40, 0.9);
      backdrop-filter: blur(6px);
      -webkit-backdrop-filter: blur(6px);
      border-radius: 6px;
      border: 0.5px solid rgba(255, 255, 255, 0.2);
      font-size: 12px;
      color: #ffffff;
      pointer-events: none;
      display: none;
      transform: translate(-50%, -120%);
      white-space: nowrap;
    }

    .hover-label.visible {
      display: block;
    }

    .toast {
      position: fixed;
      top: 100px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 100;
      padding: 12px 24px;
      background: rgba(30, 58, 95, 0.95);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border-radius: 8px;
      border: 0.5px solid rgba(255, 255, 255, 0.15);
      color: #ffffff;
      font-size: 14px;
      opacity: 0;
      pointer-events: none;
      transition: opacity 300ms ease, transform 300ms ease;
    }

    .toast.visible {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    @media (max-width: 768px) {
      .help-panel {
        display: none;
      }

      .help-panel.mobile-expanded {
        display: block;
        position: absolute;
        top: 80px;
        right: 10px;
        opacity: 1;
      }

      .help-toggle {
        display: flex;
      }

      .input-container {
        top: 20px;
        width: calc(100% - 40px);
      }

      .nebula-input {
        width: 100%;
        flex: 1;
      }

      .bottom-toolbar {
        bottom: 20px;
        width: calc(100% - 40px);
        justify-content: center;
      }

      .toolbar-btn {
        flex: 1;
        padding: 0 12px;
        font-size: 12px;
      }
    }
  </style>
</head>
<body>
  <div id="app">
    <div id="canvas-container"></div>

    <div class="input-container">
      <input type="text" class="nebula-input" id="nebula-input" placeholder="输入一段文字，生成你的记忆星云..." maxlength="200">
      <button class="generate-btn" id="generate-btn">生成星云</button>
    </div>

    <button class="help-toggle" id="help-toggle">?</button>
    <div class="help-panel" id="help-panel">
      <h3>操作指南</h3>
      <p><span class="key">左键拖拽</span>旋转视角</p>
      <p><span class="key">右键拖拽</span>平移画面</p>
      <p><span class="key">滚轮</span>缩放视图</p>
      <p><span class="key">点击星团</span>查看详情</p>
      <p><span class="key">拖拽星团</span>重组结构</p>
    </div>

    <div class="bottom-toolbar">
      <button class="toolbar-btn" id="save-btn">保存星云</button>
      <button class="toolbar-btn" id="share-btn">生成链接</button>
      <button class="toolbar-btn" id="reset-btn">重置视角</button>
    </div>

    <div class="detail-card" id="detail-card">
      <button class="close-btn" id="close-card">&times;</button>
      <div class="card-title" id="card-title">星团详情</div>
      <div class="card-meta">
        <span class="emotion-tag" id="card-emotion">中性</span>
      </div>
      <div class="card-text" id="card-text">...</div>
      <div class="card-time" id="card-time">创建于 --</div>
    </div>

    <div class="hover-label" id="hover-label"></div>
    <div class="toast" id="toast"></div>
  </div>

  <script type="module" src="/src/main.ts"></script>
</body>
</html>
