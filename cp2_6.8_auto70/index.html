<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>3D 城市天际线生长模拟器</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background-color: #1A1A2E;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif;
      color: #E8E8E8;
      min-width: 1024px;
    }

    #app {
      display: flex;
      width: 100%;
      height: 100%;
      min-height: 600px;
    }

    #left-panel {
      width: 220px;
      min-width: 220px;
      height: 100%;
      background-color: #16213E;
      border-right: 1px solid #0F3460;
      padding: 20px 16px;
      display: flex;
      flex-direction: column;
      gap: 16px;
      overflow-y: auto;
    }

    .panel-title {
      font-size: 16px;
      font-weight: 600;
      color: #FFD700;
      letter-spacing: 0.5px;
      padding-bottom: 8px;
      border-bottom: 1px solid #0F3460;
      margin-bottom: 4px;
    }

    .building-card {
      background-color: #1A1A2E;
      border: 1px solid #0F3460;
      border-radius: 8px;
      padding: 12px;
      cursor: grab;
      transition: all 0.2s ease;
      user-select: none;
    }

    .building-card:hover {
      border-color: #FFD700;
      transform: translateY(-2px);
      box-shadow: 0 4px 12px rgba(255, 215, 0, 0.15);
    }

    .building-card:active {
      cursor: grabbing;
      transform: scale(0.98);
    }

    .building-card .icon-wrapper {
      width: 100%;
      height: 56px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 10px;
    }

    .building-card svg {
      max-width: 100%;
      max-height: 100%;
    }

    .building-card .card-name {
      font-size: 14px;
      font-weight: 600;
      margin-bottom: 4px;
      text-align: center;
    }

    .building-card .card-size {
      font-size: 11px;
      color: #8892B0;
      text-align: center;
    }

    .building-card.low-rise .card-name { color: #F5E6CC; }
    .building-card.mid-rise .card-name { color: #B3D4FC; }
    .building-card.high-rise .card-name { color: #8FA8C8; }

    .info-box {
      margin-top: auto;
      padding: 12px;
      background-color: #0F2744;
      border-radius: 6px;
      font-size: 11px;
      line-height: 1.6;
      color: #8892B0;
    }

    .info-box .info-title {
      color: #FFD700;
      font-weight: 600;
      margin-bottom: 6px;
      font-size: 12px;
    }

    #scene-container {
      flex: 1;
      position: relative;
      min-height: 600px;
      background-color: #87CEEB;
      overflow: hidden;
    }

    #scene-canvas {
      display: block;
      width: 100%;
      height: 100%;
    }

    #time-slider-container {
      position: absolute;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%);
      width: 240px;
      height: 100px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-end;
      pointer-events: auto;
    }

    #time-slider-canvas {
      width: 240px;
      height: 80px;
      cursor: pointer;
    }

    #time-label {
      font-size: 13px;
      color: #FFD700;
      font-weight: 600;
      margin-bottom: 4px;
      letter-spacing: 1px;
      font-variant-numeric: tabular-nums;
    }

    .hint-text {
      position: absolute;
      top: 16px;
      right: 20px;
      font-size: 12px;
      color: rgba(255, 255, 255, 0.6);
      background-color: rgba(22, 33, 62, 0.7);
      padding: 8px 14px;
      border-radius: 6px;
      backdrop-filter: blur(8px);
      pointer-events: none;
    }

    .stats-counter {
      position: absolute;
      top: 16px;
      left: 20px;
      font-size: 12px;
      color: #FFD700;
      background-color: rgba(22, 33, 62, 0.7);
      padding: 8px 14px;
      border-radius: 6px;
      backdrop-filter: blur(8px);
      pointer-events: none;
    }
  </style>
</head>
<body>
  <div id="app">
    <aside id="left-panel">
      <div class="panel-title">建筑面板</div>

      <div class="building-card low-rise" draggable="true" data-type="low_rise">
        <div class="icon-wrapper">
          <svg viewBox="0 0 60 40" width="50" height="40">
            <rect x="15" y="18" width="30" height="18" fill="#F5E6CC" rx="1"/>
            <rect x="20" y="24" width="6" height="6" fill="#FFD700" opacity="0.8"/>
            <rect x="34" y="24" width="6" height="6" fill="#FFD700" opacity="0.8"/>
          </svg>
        </div>
        <div class="card-name">低层住宅</div>
        <div class="card-size">1.5 × 1.5 × 0.8~1.2</div>
      </div>

      <div class="building-card mid-rise" draggable="true" data-type="mid_rise">
        <div class="icon-wrapper">
          <svg viewBox="0 0 60 56" width="45" height="52">
            <rect x="18" y="10" width="24" height="42" fill="#B3D4FC" rx="1"/>
            <rect x="23" y="16" width="5" height="5" fill="#FFD700" opacity="0.7"/>
            <rect x="32" y="16" width="5" height="5" fill="#FFD700" opacity="0.7"/>
            <rect x="23" y="26" width="5" height="5" fill="#FFD700" opacity="0.7"/>
            <rect x="32" y="26" width="5" height="5" fill="#FFD700" opacity="0.7"/>
            <rect x="23" y="36" width="5" height="5" fill="#FFD700" opacity="0.7"/>
            <rect x="32" y="36" width="5" height="5" fill="#FFD700" opacity="0.7"/>
          </svg>
        </div>
        <div class="card-name">中层办公楼</div>
        <div class="card-size">1.2 × 1.2 × 2.0~2.8</div>
      </div>

      <div class="building-card high-rise" draggable="true" data-type="high_rise">
        <div class="icon-wrapper">
          <svg viewBox="0 0 60 60" width="40" height="58">
            <rect x="22" y="2" width="16" height="54" fill="#2C3E50" rx="1"/>
            <rect x="26" y="8" width="3" height="3" fill="#FFD700" opacity="0.7"/>
            <rect x="31" y="8" width="3" height="3" fill="#FFD700" opacity="0.7"/>
            <rect x="26" y="16" width="3" height="3" fill="#FFD700" opacity="0.7"/>
            <rect x="31" y="16" width="3" height="3" fill="#FFD700" opacity="0.7"/>
            <rect x="26" y="24" width="3" height="3" fill="#FFD700" opacity="0.7"/>
            <rect x="31" y="24" width="3" height="3" fill="#FFD700" opacity="0.7"/>
            <rect x="26" y="32" width="3" height="3" fill="#FFD700" opacity="0.7"/>
            <rect x="31" y="32" width="3" height="3" fill="#FFD700" opacity="0.7"/>
            <rect x="26" y="40" width="3" height="3" fill="#FFD700" opacity="0.7"/>
            <rect x="31" y="40" width="3" height="3" fill="#FFD700" opacity="0.7"/>
          </svg>
        </div>
        <div class="card-name">高层塔楼</div>
        <div class="card-size">1.0 × 1.0 × 3.5~5.0</div>
      </div>

      <div class="info-box">
        <div class="info-title">操作提示</div>
        拖拽左侧建筑至右侧网格<br/>
        鼠标左键旋转视角<br/>
        滚轮缩放场景<br/>
        右键平移视图
      </div>
    </aside>

    <main id="scene-container">
      <canvas id="scene-canvas"></canvas>
      <div class="stats-counter" id="stats-counter">建筑: 0 / 200</div>
      <div class="hint-text">从左侧面板拖拽建筑放置到网格上</div>
      <div id="time-slider-container">
        <div id="time-label">12:00</div>
        <canvas id="time-slider-canvas" width="240" height="80"></canvas>
      </div>
    </main>
  </div>

  <script type="module" src="/src/main.ts"></script>
</body>
</html>
