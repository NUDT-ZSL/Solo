
<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>3D 交互式粒子星系生成器</title>
  <style>
    :root {
      --panel-bg: rgba(255, 255, 255, 0.08);
      --panel-border: rgba(100, 180, 255, 0.2);
      --panel-glow: rgba(100, 180, 255, 0.15);
      --text-primary: rgba(255, 255, 255, 0.92);
      --text-secondary: rgba(255, 255, 255, 0.6);
      --slider-track-start: #4f8cff;
      --slider-track-end: #8b5cf6;
      --slider-thumb: #ffffff;
      --transition-fast: 0.2s ease;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
      background: radial-gradient(ellipse at center, #0a0a2e 0%, #000008 70%, #000003 100%);
      color: var(--text-primary);
      -webkit-font-smoothing: antialiased;
    }

    #app {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
    }

    #starfield {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 0;
    }

    #canvas-container {
      position: fixed;
      inset: 0;
      z-index: 1;
    }

    #hint {
      position: fixed;
      top: 20px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 10;
      padding: 8px 16px;
      background: var(--panel-bg);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid var(--panel-border);
      border-radius: 8px;
      font-size: 12px;
      color: var(--text-secondary);
      opacity: 0.8;
      transition: opacity var(--transition-fast);
      letter-spacing: 0.5px;
    }

    #hint:hover {
      opacity: 1;
    }

    #controls {
      position: fixed;
      right: 20px;
      bottom: 20px;
      z-index: 20;
      width: 280px;
      padding: 16px 18px;
      background: var(--panel-bg);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid var(--panel-border);
      border-radius: 12px;
      box-shadow: 0 0 30px var(--panel-glow), inset 0 1px 0 rgba(255, 255, 255, 0.05);
      transition: opacity var(--transition-fast), transform var(--transition-fast);
      opacity: 0;
      transform: translateY(10px);
      animation: fadeInUp 0.4s ease 0.3s forwards;
    }

    @keyframes fadeInUp {
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    #controls h2 {
      font-size: 14px;
      font-weight: 600;
      margin-bottom: 14px;
      color: var(--text-primary);
      letter-spacing: 0.5px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    #controls h2::before {
      content: '';
      display: inline-block;
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--slider-track-start), var(--slider-track-end));
      box-shadow: 0 0 8px var(--slider-track-end);
    }

    .control-group {
      margin-bottom: 12px;
    }

    .control-group:last-child {
      margin-bottom: 0;
    }

    .control-label {
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 12px;
      color: var(--text-secondary);
      margin-bottom: 6px;
    }

    .control-value {
      font-family: 'SF Mono', 'Consolas', 'Monaco', monospace;
      font-size: 11px;
      color: var(--text-primary);
      background: rgba(255, 255, 255, 0.06);
      padding: 2px 6px;
      border-radius: 4px;
      min-width: 32px;
      text-align: center;
    }

    input[type="range"] {
      -webkit-appearance: none;
      appearance: none;
      width: 100%;
      height: 4px;
      border-radius: 2px;
      background: linear-gradient(90deg, var(--slider-track-start), var(--slider-track-end));
      outline: none;
      cursor: pointer;
      transition: height var(--transition-fast);
    }

    input[type="range"]:hover {
      height: 5px;
    }

    input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none;
      appearance: none;
      width: 14px;
      height: 14px;
      border-radius: 50%;
      background: var(--slider-thumb);
      border: 2px solid rgba(100, 180, 255, 0.4);
      box-shadow: 0 0 8px rgba(100, 180, 255, 0.5), inset 0 1px 2px rgba(255, 255, 255, 0.8);
      cursor: pointer;
      transition: transform var(--transition-fast), box-shadow var(--transition-fast);
    }

    input[type="range"]::-webkit-slider-thumb:hover {
      transform: scale(1.15);
      box-shadow: 0 0 12px rgba(100, 180, 255, 0.7), inset 0 1px 2px rgba(255, 255, 255, 0.9);
    }

    input[type="range"]::-moz-range-thumb {
      width: 14px;
      height: 14px;
      border-radius: 50%;
      background: var(--slider-thumb);
      border: 2px solid rgba(100, 180, 255, 0.4);
      box-shadow: 0 0 8px rgba(100, 180, 255, 0.5);
      cursor: pointer;
      transition: transform var(--transition-fast);
    }

    input[type="range"]::-moz-range-thumb:hover {
      transform: scale(1.15);
    }

    #panel-toggle {
      display: none;
      position: fixed;
      left: 0;
      right: 0;
      bottom: 0;
      z-index: 19;
      height: 40px;
      background: var(--panel-bg);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border-top: 1px solid var(--panel-border);
      border-radius: 16px 16px 0 0;
      color: var(--text-primary);
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      align-items: center;
      justify-content: center;
      gap: 8px;
      transition: background var(--transition-fast);
    }

    #panel-toggle:hover {
      background: rgba(255, 255, 255, 0.12);
    }

    #panel-toggle::before {
      content: '';
      display: block;
      width: 32px;
      height: 3px;
      border-radius: 2px;
      background: rgba(255, 255, 255, 0.3);
      position: absolute;
      top: 8px;
    }

    @media (max-width: 768px) {
      #hint {
        font-size: 11px;
        top: 12px;
        padding: 6px 12px;
      }

      #panel-toggle {
        display: flex;
      }

      #controls {
        right: 0;
        bottom: 40px;
        left: 0;
        width: 100%;
        border-radius: 16px 16px 0 0;
        border: none;
        border-top: 1px solid var(--panel-border);
        max-height: 60vh;
        overflow-y: auto;
        transform: translateY(100%);
        animation: none;
        opacity: 1;
        transition: transform 0.3s ease;
      }

      #controls.open {
        transform: translateY(0);
      }

      #controls.closed {
        transform: translateY(calc(100% + 40px));
        pointer-events: none;
      }
    }
  </style>
</head>
<body>
  <div id="app">
    <canvas id="starfield"></canvas>
    <div id="canvas-container"></div>
    <div id="hint">拖拽旋转 · 滚轮缩放 · 空格俯视图 · R 重置视角</div>
    <button id="panel-toggle" aria-label="切换参数面板">星系参数</button>
    <div id="controls" class="closed">
      <h2>星系参数</h2>
    </div>
  </div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
