<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>3D 地形生成器</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
      color: #fff;
    }

    #app {
      width: 100%;
      height: 100%;
      position: relative;
    }

    #canvas-container {
      width: 100%;
      height: 100%;
    }

    .control-panel {
      position: fixed;
      top: 20px;
      left: 20px;
      width: 320px;
      background: rgba(26, 26, 46, 0.75);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid rgba(233, 69, 96, 0.2);
      border-radius: 12px;
      padding: 20px;
      z-index: 100;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
    }

    .panel-title {
      font-size: 18px;
      font-weight: 600;
      color: #fff;
      margin-bottom: 20px;
      padding-bottom: 12px;
      border-bottom: 1px solid rgba(233, 69, 96, 0.3);
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .panel-title::before {
      content: '';
      width: 4px;
      height: 18px;
      background: #e94560;
      border-radius: 2px;
    }

    .control-group {
      margin-bottom: 18px;
    }

    .control-label {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 8px;
      font-size: 13px;
      color: rgba(255, 255, 255, 0.85);
    }

    .control-value {
      background: rgba(233, 69, 96, 0.2);
      color: #e94560;
      padding: 2px 10px;
      border-radius: 6px;
      font-size: 12px;
      font-weight: 600;
      min-width: 48px;
      text-align: center;
    }

    .slider {
      -webkit-appearance: none;
      appearance: none;
      width: 100%;
      height: 4px;
      background: rgba(255, 255, 255, 0.15);
      border-radius: 2px;
      outline: none;
      cursor: pointer;
      transition: background 0.2s;
    }

    .slider:hover {
      background: rgba(255, 255, 255, 0.25);
    }

    .slider::-webkit-slider-thumb {
      -webkit-appearance: none;
      appearance: none;
      width: 16px;
      height: 16px;
      background: #e94560;
      border-radius: 50%;
      cursor: pointer;
      box-shadow: 0 2px 8px rgba(233, 69, 96, 0.5);
      transition: transform 0.15s ease, box-shadow 0.15s ease;
    }

    .slider::-webkit-slider-thumb:hover {
      transform: scale(1.2);
      box-shadow: 0 3px 12px rgba(233, 69, 96, 0.7);
    }

    .slider::-moz-range-thumb {
      width: 16px;
      height: 16px;
      background: #e94560;
      border-radius: 50%;
      cursor: pointer;
      border: none;
      box-shadow: 0 2px 8px rgba(233, 69, 96, 0.5);
      transition: transform 0.15s ease;
    }

    .slider::-moz-range-thumb:hover {
      transform: scale(1.2);
    }

    .action-btn {
      width: 100%;
      padding: 12px 16px;
      background: linear-gradient(135deg, #e94560 0%, #c73652 100%);
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: transform 0.1s ease, box-shadow 0.2s ease, opacity 0.2s ease;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      margin-top: 6px;
    }

    .action-btn:hover:not(:disabled) {
      box-shadow: 0 4px 16px rgba(233, 69, 96, 0.4);
    }

    .action-btn:active:not(:disabled) {
      transform: scale(0.95);
    }

    .action-btn:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }

    .loading-spinner {
      width: 16px;
      height: 16px;
      border: 2px solid rgba(255, 255, 255, 0.3);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 1.2s linear infinite;
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }

    .stats-panel {
      position: fixed;
      bottom: 20px;
      right: 20px;
      background: rgba(26, 26, 46, 0.75);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid rgba(233, 69, 96, 0.2);
      border-radius: 10px;
      padding: 14px 18px;
      z-index: 100;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
      min-width: 160px;
    }

    .stat-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 4px 0;
      font-size: 13px;
    }

    .stat-label {
      color: rgba(255, 255, 255, 0.65);
    }

    .stat-value {
      color: #e94560;
      font-weight: 600;
      font-variant-numeric: tabular-nums;
    }

    .loading-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(26, 26, 46, 0.5);
      backdrop-filter: blur(4px);
      z-index: 99;
      display: flex;
      align-items: center;
      justify-content: center;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.3s ease;
    }

    .loading-overlay.active {
      opacity: 1;
      pointer-events: auto;
    }

    .overlay-spinner {
      width: 48px;
      height: 48px;
      border: 4px solid rgba(233, 69, 96, 0.2);
      border-top-color: #e94560;
      border-radius: 50%;
      animation: spin 1.2s linear infinite;
    }
  </style>
</head>
<body>
  <div id="app">
    <div id="canvas-container"></div>

    <div class="control-panel" id="control-panel">
      <div class="panel-title">地形参数控制</div>

      <div class="control-group">
        <div class="control-label">
          <span>噪声频率</span>
          <span class="control-value" id="freq-value">2.0</span>
        </div>
        <input type="range" class="slider" id="freq-slider" min="0.5" max="5.0" step="0.1" value="2.0" />
      </div>

      <div class="control-group">
        <div class="control-label">
          <span>平整度</span>
          <span class="control-value" id="flat-value">0.5</span>
        </div>
        <input type="range" class="slider" id="flat-slider" min="0.1" max="1.0" step="0.05" value="0.5" />
      </div>

      <div class="control-group">
        <div class="control-label">
          <span>树木密度</span>
          <span class="control-value" id="density-value">10%</span>
        </div>
        <input type="range" class="slider" id="density-slider" min="0" max="20" step="1" value="10" />
      </div>

      <button class="action-btn" id="seed-btn">
        <span id="seed-btn-text">🎲 随机种子</span>
        <div class="loading-spinner" id="seed-spinner" style="display: none;"></div>
      </button>
    </div>

    <div class="stats-panel">
      <div class="stat-item">
        <span class="stat-label">帧率 (FPS)</span>
        <span class="stat-value" id="fps-value">60</span>
      </div>
      <div class="stat-item">
        <span class="stat-label">地形顶点</span>
        <span class="stat-value" id="vertex-value">0</span>
      </div>
      <div class="stat-item">
        <span class="stat-label">树木数量</span>
        <span class="stat-value" id="tree-value">0</span>
      </div>
    </div>

    <div class="loading-overlay" id="loading-overlay">
      <div class="overlay-spinner"></div>
    </div>
  </div>

  <script type="module" src="/src/main.ts"></script>
</body>
</html>
