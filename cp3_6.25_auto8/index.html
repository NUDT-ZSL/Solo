<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pixel Roguelike Dungeon</title>
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background-color: #263238;
      font-family: 'Press Start 2P', monospace;
      color: #ffffff;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      overflow: hidden;
    }

    #app {
      display: flex;
      flex-direction: column;
      gap: 12px;
      padding: 12px;
    }

    #hud {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 12px 16px;
      background-color: #1e2a2f;
      border: 1px solid #455a64;
      border-radius: 8px;
      font-size: 16px;
      gap: 24px;
    }

    #hud .hud-item {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    #game-container {
      display: flex;
      gap: 12px;
    }

    #dungeon-canvas {
      border: 1px solid #455a64;
      image-rendering: pixelated;
      image-rendering: crisp-edges;
    }

    #log-panel {
      width: 220px;
      height: 500px;
      background-color: #1e2a2f;
      border: 1px solid #455a64;
      border-radius: 8px;
      overflow-y: auto;
      padding: 8px;
    }

    #log-panel::-webkit-scrollbar {
      width: 6px;
    }

    #log-panel::-webkit-scrollbar-track {
      background: #1e2a2f;
    }

    #log-panel::-webkit-scrollbar-thumb {
      background: #455a64;
      border-radius: 3px;
    }

    .log-entry {
      height: 28px;
      display: flex;
      align-items: center;
      padding: 0 8px;
      font-size: 10px;
      line-height: 1.2;
      border-radius: 4px;
      margin-bottom: 2px;
    }

    .log-entry.log-odd {
      background-color: #273238;
    }

    .log-entry.log-even {
      background-color: #1e2a2f;
    }

    .log-icon {
      margin-right: 8px;
      font-size: 12px;
      flex-shrink: 0;
    }

    .log-text {
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    #game-over {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-color: rgba(0, 0, 0, 0.5);
      display: none;
      justify-content: center;
      align-items: center;
      flex-direction: column;
      z-index: 100;
    }

    #game-over.active {
      display: flex;
    }

    #game-over h1 {
      color: #e53935;
      font-size: 48px;
      margin-bottom: 24px;
      text-shadow: 2px 2px 0 #000;
    }

    #game-over .stats {
      font-size: 14px;
      text-align: center;
      line-height: 2;
      margin-bottom: 32px;
    }

    #game-over .hint {
      font-size: 12px;
      color: #cfd8dc;
      animation: blink 1s infinite;
    }

    @keyframes blink {
      0%, 50% { opacity: 1; }
      51%, 100% { opacity: 0.3; }
    }

    .fade-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-color: #000;
      opacity: 0;
      pointer-events: none;
      z-index: 50;
      transition: opacity 0.3s ease;
    }

    .fade-overlay.fading {
      opacity: 1;
    }

    .damage-number {
      position: absolute;
      color: #ffffff;
      font-size: 16px;
      font-family: 'Press Start 2P', monospace;
      pointer-events: none;
      z-index: 30;
      text-shadow: 1px 1px 0 #000;
      animation: floatUp 0.5s ease-out forwards;
    }

    @keyframes floatUp {
      0% {
        opacity: 1;
        transform: translateY(0);
      }
      100% {
        opacity: 0;
        transform: translateY(-30px);
      }
    }
  </style>
</head>
<body>
  <div id="app">
    <div id="hud">
      <div class="hud-item" id="floor-display">FLOOR: 1</div>
      <div class="hud-item" id="hp-display">HP: 100</div>
      <div class="hud-item" id="def-display">DEF: 0</div>
      <div class="hud-item" id="atk-display">ATK: 30</div>
    </div>
    <div id="game-container">
      <canvas id="dungeon-canvas" width="500" height="500"></canvas>
      <div id="log-panel"></div>
    </div>
  </div>
  <div id="game-over">
    <h1>GAME OVER</h1>
    <div class="stats">
      <div id="final-floor">FLOOR REACHED: 1</div>
      <div id="final-kills">ENEMIES DEFEATED: 0</div>
    </div>
    <div class="hint">PRESS ANY KEY TO RESTART</div>
  </div>
  <div class="fade-overlay" id="fade-overlay"></div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
