<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Neon Vortex Defense</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    html, body {
      width: 100%;
      height: 100%;
      background-color: #050510;
      overflow: hidden;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    }
    #game-container {
      width: 100vw;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
    }
    #game-canvas {
      display: block;
      cursor: none;
    }
    #loader {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      z-index: 100;
    }
    .loader-star {
      position: absolute;
      width: 4px;
      height: 4px;
      background: #00FFB9;
      border-radius: 50%;
      box-shadow: 0 0 8px #00FFB9, 0 0 16px #00FFB9;
      animation: spin 1.5s linear infinite;
    }
    .loader-star:nth-child(1) { animation-delay: 0s; left: 0px; top: -30px; }
    .loader-star:nth-child(2) { animation-delay: 0.2s; left: 26px; top: -15px; background: #A78BFA; box-shadow: 0 0 8px #A78BFA, 0 0 16px #A78BFA; }
    .loader-star:nth-child(3) { animation-delay: 0.4s; left: 26px; top: 15px; background: #FF6B6B; box-shadow: 0 0 8px #FF6B6B, 0 0 16px #FF6B6B; }
    .loader-star:nth-child(4) { animation-delay: 0.6s; left: 0px; top: 30px; background: #FAD02E; box-shadow: 0 0 8px #FAD02E, 0 0 16px #FAD02E; }
    .loader-star:nth-child(5) { animation-delay: 0.8s; left: -26px; top: 15px; background: #6BCB77; box-shadow: 0 0 8px #6BCB77, 0 0 16px #6BCB77; }
    .loader-star:nth-child(6) { animation-delay: 1.0s; left: -26px; top: -15px; background: #00D4FF; box-shadow: 0 0 8px #00D4FF, 0 0 16px #00D4FF; }
    @keyframes spin {
      from { transform: rotate(0deg) translateX(30px) rotate(0deg); }
      to { transform: rotate(360deg) translateX(30px) rotate(-360deg); }
    }
    .hidden {
      display: none !important;
    }
  </style>
</head>
<body>
  <div id="loader">
    <div class="loader-star"></div>
    <div class="loader-star"></div>
    <div class="loader-star"></div>
    <div class="loader-star"></div>
    <div class="loader-star"></div>
    <div class="loader-star"></div>
  </div>
  <div id="game-container">
    <canvas id="game-canvas" width="800" height="600"></canvas>
  </div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
