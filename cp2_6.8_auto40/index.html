<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>甲虫对战模拟器</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #1a0f08;
      font-family: "Georgia", "Times New Roman", serif;
    }
    #game-container {
      position: relative;
      width: 100vw;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    canvas {
      display: block;
      image-rendering: pixelated;
      background: linear-gradient(180deg, #2a1a0e 0%, #3d2817 50%, #2a1a0e 100%);
      border: 4px solid #c9a227;
      border-radius: 8px;
      box-shadow: 0 0 30px rgba(201, 162, 39, 0.3), inset 0 0 60px rgba(0, 0, 0, 0.5);
    }
  </style>
</head>
<body>
  <div id="game-container">
    <canvas id="game-canvas" width="1280" height="720"></canvas>
  </div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
