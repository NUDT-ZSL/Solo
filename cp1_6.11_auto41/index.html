<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>星轨舞者 - Star Trail Dancer</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      overflow: hidden;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      background: linear-gradient(180deg, #0B0B2A 0%, #1B1B4A 100%);
      min-width: 800px;
      min-height: 600px;
    }

    #gameCanvas {
      display: block;
      width: 100vw;
      height: 100vh;
    }

    .loading-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: linear-gradient(180deg, #0B0B2A 0%, #1B1B4A 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 1000;
      transition: opacity 0.8s ease-out;
    }

    .loading-overlay.hidden {
      opacity: 0;
      pointer-events: none;
    }

    .loading-content {
      text-align: center;
    }

    .loading-title {
      font-size: 48px;
      font-weight: 300;
      color: #E0E0E0;
      letter-spacing: 8px;
      margin-bottom: 30px;
      text-shadow: 0 0 30px rgba(138, 43, 226, 0.6);
    }

    .loading-subtitle {
      font-size: 16px;
      color: rgba(224, 224, 224, 0.6);
      letter-spacing: 4px;
      margin-bottom: 50px;
    }

    .loading-spinner {
      width: 60px;
      height: 60px;
      border: 2px solid rgba(135, 206, 235, 0.2);
      border-top-color: #87CEEB;
      border-radius: 50%;
      animation: spin 1.2s linear infinite;
      margin: 0 auto;
      box-shadow: 0 0 20px rgba(135, 206, 235, 0.4);
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .glass-panel {
      background: rgba(10, 10, 30, 0.7);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 12px;
    }

    .btn-glass {
      background: rgba(10, 10, 30, 0.7);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      border: 1px solid rgba(255, 255, 255, 0.15);
      color: #E0E0E0;
      padding: 12px 36px;
      font-size: 16px;
      letter-spacing: 2px;
      border-radius: 8px;
      cursor: pointer;
      transition: all 0.2s ease;
    }

    .btn-glass:hover {
      transform: scale(1.05);
      border-color: rgba(255, 255, 255, 0.3);
      box-shadow: 0 0 20px rgba(138, 43, 226, 0.4);
    }

    .btn-glass:active {
      transform: scale(0.95);
    }
  </style>
</head>
<body>
  <div class="loading-overlay" id="loadingOverlay">
    <div class="loading-content">
      <div class="loading-title">星轨舞者</div>
      <div class="loading-subtitle">STAR TRAIL DANCER</div>
      <div class="loading-spinner"></div>
    </div>
  </div>
  <canvas id="gameCanvas"></canvas>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
