<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>纸鸢风铃</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      font-family: Arial, sans-serif;
    }
    #canvas {
      display: block;
      width: 100%;
      height: 100%;
      cursor: crosshair;
    }
    #controls {
      position: fixed;
      bottom: 20px;
      right: 20px;
      z-index: 10;
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 12px 16px;
      background: rgba(0, 0, 0, 0.5);
      border-radius: 8px;
      color: #fff;
      font-family: Arial, sans-serif;
      user-select: none;
    }
    #controls label {
      font-size: 14px;
      white-space: nowrap;
    }
    #windSlider {
      -webkit-appearance: none;
      appearance: none;
      width: 150px;
      height: 6px;
      border-radius: 3px;
      background: linear-gradient(to right, #87CEEB, #FFD700);
      outline: none;
      cursor: pointer;
    }
    #windSlider::-webkit-slider-thumb {
      -webkit-appearance: none;
      appearance: none;
      width: 18px;
      height: 18px;
      border-radius: 50%;
      background: #fff;
      border: 2px solid #FFD700;
      cursor: grab;
      box-shadow: 0 2px 6px rgba(0, 0, 0, 0.3);
    }
    #windSlider::-webkit-slider-thumb:active {
      cursor: grabbing;
    }
    #windSlider::-moz-range-thumb {
      width: 18px;
      height: 18px;
      border-radius: 50%;
      background: #fff;
      border: 2px solid #FFD700;
      cursor: grab;
      box-shadow: 0 2px 6px rgba(0, 0, 0, 0.3);
    }
  </style>
</head>
<body>
  <canvas id="canvas"></canvas>
  <div id="controls">
    <label for="windSlider">风力强度:</label>
    <input type="range" id="windSlider" min="0" max="10" step="0.1" value="3">
  </div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
