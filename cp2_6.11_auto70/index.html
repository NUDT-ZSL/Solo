<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>3D 声纹地貌可视化</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      font-family: Consolas, Monaco, 'Courier New', monospace;
      background: linear-gradient(135deg, #0B0B2B 0%, #1A1A3E 100%);
      color: #fff;
    }

    #app {
      width: 100%;
      height: 100%;
      position: relative;
    }

    #canvas-container {
      width: 100%;
      height: 100%;
      position: absolute;
      top: 0;
      left: 0;
    }

    #waveform-canvas {
      position: absolute;
      left: 20px;
      bottom: 20px;
      width: 300px;
      height: 100px;
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.03);
      backdrop-filter: blur(8px);
      border: 1px solid rgba(255, 255, 255, 0.08);
      z-index: 10;
    }

    #control-panel {
      position: absolute;
      top: 20px;
      right: 20px;
      width: 280px;
      padding: 20px;
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.06);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid rgba(255, 255, 255, 0.1);
      z-index: 20;
      transition: transform 0.3s ease, opacity 0.3s ease;
    }

    #control-panel.hidden {
      transform: translateX(320px);
      opacity: 0;
    }

    #control-panel h2 {
      font-size: 16px;
      font-weight: 600;
      margin-bottom: 16px;
      color: #fff;
      letter-spacing: 1px;
    }

    .control-group {
      margin-bottom: 16px;
    }

    .control-group label {
      display: block;
      font-size: 12px;
      color: rgba(255, 255, 255, 0.7);
      margin-bottom: 8px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .control-group input[type="range"] {
      width: 100%;
      height: 6px;
      border-radius: 3px;
      background: rgba(255, 255, 255, 0.1);
      outline: none;
      -webkit-appearance: none;
      appearance: none;
      cursor: pointer;
      transition: transform 0.2s ease;
    }

    .control-group input[type="range"]:hover {
      transform: scale(1.02);
    }

    .control-group input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none;
      appearance: none;
      width: 16px;
      height: 16px;
      border-radius: 50%;
      background: linear-gradient(135deg, #6366f1, #a855f7);
      cursor: pointer;
      transition: transform 0.2s ease, box-shadow 0.2s ease;
    }

    .control-group input[type="range"]::-webkit-slider-thumb:hover {
      transform: scale(1.2);
      box-shadow: 0 0 12px rgba(168, 85, 247, 0.6);
    }

    .control-group input[type="range"]::-moz-range-thumb {
      width: 16px;
      height: 16px;
      border-radius: 50%;
      background: linear-gradient(135deg, #6366f1, #a855f7);
      cursor: pointer;
      border: none;
      transition: transform 0.2s ease, box-shadow 0.2s ease;
    }

    .control-group input[type="range"]::-moz-range-thumb:hover {
      transform: scale(1.2);
      box-shadow: 0 0 12px rgba(168, 85, 247, 0.6);
    }

    .value-display {
      font-size: 11px;
      color: rgba(255, 255, 255, 0.5);
      float: right;
    }

    .theme-buttons {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 8px;
    }

    .theme-btn {
      padding: 8px 12px;
      border: 1px solid rgba(255, 255, 255, 0.15);
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.05);
      color: rgba(255, 255, 255, 0.8);
      font-family: inherit;
      font-size: 12px;
      cursor: pointer;
      transition: all 0.2s ease;
    }

    .theme-btn:hover {
      transform: scale(1.05);
      background: rgba(255, 255, 255, 0.1);
      border-color: rgba(255, 255, 255, 0.25);
    }

    .theme-btn.active {
      background: linear-gradient(135deg, rgba(99, 102, 241, 0.4), rgba(168, 85, 247, 0.4));
      border-color: rgba(168, 85, 247, 0.5);
      color: #fff;
    }

    #toggle-panel {
      position: absolute;
      top: 20px;
      right: 20px;
      width: 40px;
      height: 40px;
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.06);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid rgba(255, 255, 255, 0.1);
      color: #fff;
      font-size: 18px;
      cursor: pointer;
      z-index: 21;
      display: none;
      transition: transform 0.2s ease;
    }

    #toggle-panel:hover {
      transform: scale(1.05);
    }

    #loading {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: linear-gradient(135deg, #0B0B2B 0%, #1A1A3E 100%);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 100;
      transition: opacity 0.5s ease;
    }

    #loading.fade-out {
      opacity: 0;
      pointer-events: none;
    }

    .loader-ring {
      width: 60px;
      height: 60px;
      border: 3px solid rgba(255, 255, 255, 0.1);
      border-top-color: #a855f7;
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .loading-text {
      margin-top: 20px;
      font-size: 14px;
      color: rgba(255, 255, 255, 0.6);
      letter-spacing: 2px;
    }

    #start-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(11, 11, 43, 0.9);
      backdrop-filter: blur(8px);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 90;
      transition: opacity 0.5s ease;
    }

    #start-overlay.hidden {
      opacity: 0;
      pointer-events: none;
    }

    #start-overlay h1 {
      font-size: 32px;
      margin-bottom: 12px;
      background: linear-gradient(135deg, #6366f1, #a855f7, #ec4899);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      letter-spacing: 2px;
    }

    #start-overlay p {
      font-size: 14px;
      color: rgba(255, 255, 255, 0.6);
      margin-bottom: 30px;
      text-align: center;
      max-width: 400px;
      line-height: 1.6;
    }

    #start-btn {
      padding: 14px 40px;
      border: none;
      border-radius: 8px;
      background: linear-gradient(135deg, #6366f1, #a855f7);
      color: #fff;
      font-family: inherit;
      font-size: 14px;
      letter-spacing: 1px;
      cursor: pointer;
      transition: transform 0.2s ease, box-shadow 0.2s ease;
    }

    #start-btn:hover {
      transform: scale(1.05);
      box-shadow: 0 0 30px rgba(168, 85, 247, 0.4);
    }

    .fps-counter {
      position: absolute;
      top: 20px;
      left: 20px;
      font-size: 12px;
      color: rgba(255, 255, 255, 0.5);
      z-index: 10;
      font-family: Consolas, Monaco, 'Courier New', monospace;
    }

    @media (max-width: 768px) {
      #control-panel {
        width: 240px;
        padding: 16px;
      }

      #waveform-canvas {
        width: 200px;
        height: 80px;
      }
    }
  </style>
</head>
<body>
  <div id="app">
    <div id="loading">
      <div class="loader-ring"></div>
      <div class="loading-text">LOADING</div>
    </div>

    <div id="start-overlay">
      <h1>声纹地貌</h1>
      <p>对着麦克风说话或播放音乐，<br>声音将化为起伏的彩色地形与流动的粒子</p>
      <button id="start-btn">开始体验</button>
    </div>

    <div id="canvas-container"></div>
    <canvas id="waveform-canvas" width="300" height="100"></canvas>
    <div class="fps-counter" id="fps-counter">FPS: --</div>

    <button id="toggle-panel">☰</button>

    <div id="control-panel">
      <h2>控制面板</h2>

      <div class="control-group">
        <label>音量增益 <span class="value-display" id="gain-value">1.00</span></label>
        <input type="range" id="gain-slider" min="0" max="2" step="0.01" value="1" />
      </div>

      <div class="control-group">
        <label>旋转速度 <span class="value-display" id="rotation-value">0.50</span></label>
        <input type="range" id="rotation-slider" min="0" max="1" step="0.01" value="0.5" />
      </div>

      <div class="control-group">
        <label>粒子数量 <span class="value-display" id="particle-value">300</span></label>
        <input type="range" id="particle-slider" min="100" max="500" step="1" value="300" />
      </div>

      <div class="control-group">
        <label>颜色主题</label>
        <div class="theme-buttons">
          <button class="theme-btn active" data-theme="default">默认</button>
          <button class="theme-btn" data-theme="neon">霓虹</button>
          <button class="theme-btn" data-theme="ice">冰雪</button>
          <button class="theme-btn" data-theme="lava">熔岩</button>
        </div>
      </div>
    </div>
  </div>

  <script type="module" src="/src/main.ts"></script>
</body>
</html>
