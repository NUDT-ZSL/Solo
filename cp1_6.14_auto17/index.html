<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DeepStratify - 3D考古遗址地层可视化</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
    #app { width: 100vw; height: 100vh; position: relative; }
    #canvas-container { width: 100%; height: 100%; position: absolute; top: 0; left: 0; }
    #canvas-container canvas { display: block; }

    #hamburger-btn { display: none; position: fixed; top: 16px; left: 16px; width: 40px; height: 40px; background: rgba(15,23,42,0.9); border: none; border-radius: 8px; color: #fff; font-size: 20px; cursor: pointer; z-index: 200; }

    #left-panel {
      position: fixed; top: 20px; left: 20px; width: 280px;
      background: rgba(15,23,42,0.85);
      backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
      border-radius: 12px; padding: 20px; z-index: 100;
      color: #e2e8f0; box-shadow: 0 8px 32px rgba(0,0,0,0.3);
      border: 1px solid rgba(255,255,255,0.08);
      transition: transform 0.3s ease;
    }
    #left-panel h3 { font-size: 16px; margin-bottom: 16px; color: #f59e0b; letter-spacing: 0.5px; }
    #left-panel label { display: block; font-size: 13px; color: #94a3b8; margin-bottom: 8px; }
    .slider-container { display: flex; flex-direction: column; align-items: center; gap: 12px; margin: 20px 0; }
    #stratum-slider {
      -webkit-appearance: slider-vertical; appearance: slider-vertical;
      width: 6px; height: 180px; background: #334155; border-radius: 3px; outline: none; cursor: pointer;
    }
    #stratum-slider::-webkit-slider-thumb {
      -webkit-appearance: none; appearance: none;
      width: 18px; height: 18px; border-radius: 50%;
      background: #f59e0b; cursor: pointer; border: 2px solid #fbbf24;
      box-shadow: 0 0 8px rgba(245,158,11,0.6);
    }
    .slider-labels { display: flex; justify-content: space-between; width: 100%; font-size: 11px; color: #94a3b8; }
    #filter-select {
      width: 100%; padding: 10px 12px; background: #334155; border: 1px solid #475569;
      border-radius: 8px; color: #e2e8f0; font-size: 13px; outline: none; cursor: pointer;
    }
    #filter-select:focus { border-color: #f59e0b; }

    #search-container {
      position: fixed; top: 20px; right: 20px; z-index: 100;
    }
    #search-box {
      width: 240px; display: flex; align-items: center;
      background: #334155; border-radius: 8px; padding: 4px 12px;
      border: 1px solid transparent; transition: border-color 0.2s;
    }
    #search-box:focus-within { border-color: #3b82f6; }
    #search-input {
      flex: 1; background: transparent; border: none; outline: none;
      color: #e2e8f0; font-size: 14px; padding: 8px 0;
    }
    #search-input::placeholder { color: #94a3b8; }
    #mic-btn {
      width: 32px; height: 32px; border-radius: 50%; border: none;
      background: transparent; color: #94a3b8; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: all 0.2s; font-size: 16px;
    }
    #mic-btn:hover { background: #475569; color: #fbbf24; }
    #mic-btn.active { background: #dc2626; color: #fff; animation: pulse 1s infinite; }
    @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.6; } }
    #search-dropdown {
      position: absolute; top: calc(100% + 6px); left: 0; right: 0;
      background: #1e293b; border-radius: 8px; overflow: hidden;
      box-shadow: 0 8px 24px rgba(0,0,0,0.4); display: none;
      max-height: 320px; overflow-y: auto; z-index: 101;
    }
    #search-dropdown.visible { display: block; }
    .search-item {
      height: 40px; padding: 0 16px; display: flex; align-items: center;
      color: #e2e8f0; font-size: 13px; cursor: pointer; transition: background 0.15s;
      border-bottom: 1px solid rgba(255,255,255,0.05);
    }
    .search-item:last-child { border-bottom: none; }
    .search-item:hover { background: #475569; }
    .search-item .year { margin-left: auto; color: #94a3b8; font-size: 12px; }

    #timeline-panel {
      position: fixed; bottom: 0; left: 0; right: 0; height: 120px;
      background: #0f172a; z-index: 90; padding: 12px 20px;
      border-top: 1px solid rgba(255,255,255,0.08);
    }
    #timeline-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 6px; }
    #timeline-title { color: #94a3b8; font-size: 12px; letter-spacing: 1px; text-transform: uppercase; }
    #timeline-controls { display: flex; gap: 8px; }
    .zoom-btn {
      width: 32px; height: 32px; border-radius: 50%; border: none;
      background: #3b82f6; color: #fff; font-size: 16px; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: all 0.2s; font-weight: bold;
    }
    .zoom-btn:hover { width: 36px; height: 36px; }
    #timeline-svg { width: 100%; height: 70px; display: block; }
    .timeline-band { cursor: pointer; transition: opacity 0.2s; }
    .timeline-band:hover { opacity: 0.8; }
    .timeline-axis text { fill: #64748b; font-size: 10px; }
    .timeline-axis path, .timeline-axis line { stroke: #475569; }
    .timeline-brush .selection { fill: rgba(59,130,246,0.25); stroke: #3b82f6; stroke-width: 1.5px; }

    #artifact-card {
      position: fixed; width: 320px;
      background: #1e293b; border-radius: 12px; padding: 20px;
      z-index: 150; color: #e2e8f0; display: none;
      box-shadow: 0 12px 40px rgba(0,0,0,0.5);
      border: 1px solid rgba(255,255,255,0.08);
    }
    #artifact-card.visible { display: block; animation: cardIn 0.3s ease-out; }
    @keyframes cardIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    #card-close {
      position: absolute; top: 12px; right: 12px; width: 28px; height: 28px;
      border-radius: 50%; border: none; background: #334155; color: #94a3b8;
      cursor: pointer; font-size: 16px; display: flex; align-items: center; justify-content: center;
    }
    #card-close:hover { background: #475569; color: #fff; }
    #card-name { font-size: 18px; font-weight: 600; margin-bottom: 6px; color: #fbbf24; padding-right: 32px; }
    #card-meta { display: flex; gap: 12px; margin-bottom: 14px; flex-wrap: wrap; }
    #card-meta span { font-size: 12px; padding: 3px 10px; background: #334155; border-radius: 12px; color: #94a3b8; }
    #card-description { font-size: 13px; line-height: 1.6; color: #cbd5e1; margin-bottom: 16px; }
    #card-tts {
      display: flex; align-items: center; gap: 8px; padding: 8px 16px;
      background: #3b82f6; border: none; border-radius: 8px; color: #fff;
      font-size: 13px; cursor: pointer; transition: background 0.2s;
    }
    #card-tts:hover { background: #2563eb; }

    #loading-overlay {
      position: fixed; inset: 0; background: #0f172a; z-index: 999;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      color: #e2e8f0; transition: opacity 0.5s;
    }
    #loading-overlay.hidden { opacity: 0; pointer-events: none; }
    #loading-spinner {
      width: 48px; height: 48px; border: 3px solid #334155; border-top-color: #f59e0b;
      border-radius: 50%; animation: spin 1s linear infinite; margin-bottom: 16px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    #loading-text { font-size: 14px; color: #94a3b8; }

    @media (max-width: 768px) {
      #hamburger-btn { display: flex; align-items: center; justify-content: center; }
      #left-panel { top: 0; left: 0; width: 100%; height: 100vh; border-radius: 0; transform: translateX(-100%); padding-top: 70px; }
      #left-panel.open { transform: translateX(0); }
      #search-container { top: 16px; right: 16px; }
      #search-box { width: calc(100vw - 120px); max-width: 240px; }
      #timeline-panel { height: 140px; }
      #artifact-card { width: calc(100vw - 32px); left: 16px !important; right: 16px; bottom: 156px; top: auto !important; }
    }
  </style>
</head>
<body>
  <div id="app">
    <div id="loading-overlay">
      <div id="loading-spinner"></div>
      <div id="loading-text">正在加载遗址数据...</div>
    </div>

    <div id="canvas-container"></div>

    <button id="hamburger-btn">☰</button>

    <div id="left-panel">
      <h3>🏛️ 地层控制</h3>
      <label>地层剖切深度</label>
      <div class="slider-container">
        <span class="slider-labels"><span>地表</span><span>基岩</span></span>
        <input type="range" id="stratum-slider" min="0" max="6" step="0.01" value="6" orient="vertical" />
      </div>
      <label>文物分类筛选</label>
      <select id="filter-select">
        <option value="all">全部文物</option>
        <option value="陶器">陶器</option>
        <option value="青铜器">青铜器</option>
        <option value="玉器">玉器</option>
        <option value="骨器">骨器</option>
        <option value="石器">石器</option>
      </select>
    </div>

    <div id="search-container">
      <div id="search-box">
        <input id="search-input" type="text" placeholder="输入或说出文物名称" autocomplete="off" />
        <button id="mic-btn" title="语音搜索">🎤</button>
      </div>
      <div id="search-dropdown"></div>
    </div>

    <div id="artifact-card">
      <button id="card-close">✕</button>
      <div id="card-name"></div>
      <div id="card-meta"></div>
      <div id="card-description"></div>
      <button id="card-tts">🔊 朗读描述</button>
    </div>

    <div id="timeline-panel">
      <div id="timeline-header">
        <span id="timeline-title">文物年代分布 · 距今2000年</span>
        <div id="timeline-controls">
          <button class="zoom-btn" id="zoom-out" title="缩小">−</button>
          <button class="zoom-btn" id="zoom-in" title="放大">+</button>
        </div>
      </div>
      <svg id="timeline-svg"></svg>
    </div>
  </div>

  <script type="module" src="/src/main.ts"></script>
</body>
</html>
