<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>2D弹射平台跳跃编辑器</title>
  <link rel="stylesheet" href="./src/styles.css" />
</head>
<body>
  <div id="app">
    <div class="main-container">
      <div class="canvas-wrapper">
        <div class="mode-switcher">
          <button id="modeEditor" class="mode-btn active">编辑器</button>
          <button id="modePlay" class="mode-btn">试玩</button>
        </div>
        <canvas id="gameCanvas" width="600" height="400"></canvas>
        <div class="toolbar" id="toolbar">
          <button class="tool-btn" data-type="spring" title="弹力垫">
            <svg width="24" height="24" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10" fill="#48BB78"/></svg>
          </button>
          <button class="tool-btn" data-type="bouncer" title="弹跳板">
            <svg width="24" height="24" viewBox="0 0 24 24"><rect x="3" y="8" width="18" height="8" fill="#ED8936"/></svg>
          </button>
          <button class="tool-btn" data-type="portal" title="传送门">
            <svg width="24" height="24" viewBox="0 0 24 24"><polygon points="12,2 22,12 12,22 2,12" fill="#9F7AEA"/></svg>
          </button>
        </div>
        <div id="previewBar" class="preview-bar"></div>
      </div>
      <div class="side-panel" id="sidePanel">
        <div class="fps-counter" id="fpsCounter">FPS: 60</div>
        <div class="stats">
          <div class="stat-item">
            <label>速度 (px/帧)</label>
            <div class="stat-value" id="speedValue">0.00</div>
          </div>
          <div class="stat-item">
            <label>角速度 (rad/s)</label>
            <div class="stat-value" id="angVelValue">0.00</div>
          </div>
          <div class="stat-item">
            <label>通关时间 (ms)</label>
            <div class="stat-value" id="timeValue">0</div>
          </div>
        </div>
        <div class="launch-controls" id="launchControls" style="display:none;">
          <button id="launchBtn" class="launch-btn">发射</button>
        </div>
        <button id="resetBtn" class="reset-btn">重置关卡</button>
      </div>
    </div>
  </div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
