<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>浮光蝶影</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: linear-gradient(135deg, #1a0a2e 0%, #2d1b4e 50%, #4a2c6a 100%);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    }
    #app {
      width: 100%;
      height: 100%;
      position: relative;
    }
    canvas {
      display: block;
      cursor: grab;
    }
    canvas:active {
      cursor: grabbing;
    }
    #control-panel {
      position: absolute;
      top: 20px;
      left: 20px;
      background: rgba(0, 0, 0, 0.3);
      border-radius: 12px;
      padding: 16px 20px;
      color: white;
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255, 255, 255, 0.1);
      min-width: 180px;
      z-index: 10;
    }
    #control-panel h3 {
      font-size: 14px;
      font-weight: 600;
      margin-bottom: 12px;
      opacity: 0.9;
      letter-spacing: 1px;
    }
    #control-panel .stat {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 6px 0;
      font-size: 13px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.08);
    }
    #control-panel .stat:last-child {
      border-bottom: none;
    }
    #control-panel .stat-label {
      opacity: 0.7;
    }
    #control-panel .stat-value {
      font-weight: 600;
      font-variant-numeric: tabular-nums;
    }
    #reset-btn {
      position: absolute;
      bottom: 30px;
      right: 30px;
      width: 60px;
      height: 60px;
      border-radius: 50%;
      border: none;
      cursor: pointer;
      background: linear-gradient(135deg, #ffd700 0%, #ffaa00 50%, #ff8c00 100%);
      box-shadow: 0 4px 20px rgba(255, 170, 0, 0.5), inset 0 1px 0 rgba(255, 255, 255, 0.3);
      color: #3a2000;
      font-size: 11px;
      font-weight: 700;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.3s ease;
      z-index: 10;
    }
    #reset-btn:hover {
      transform: scale(1.1);
      box-shadow: 0 6px 30px rgba(255, 170, 0, 0.7), inset 0 1px 0 rgba(255, 255, 255, 0.4);
    }
    #reset-btn:active {
      transform: scale(0.95);
    }
  </style>
</head>
<body>
  <div id="app">
    <div id="control-panel">
      <h3>✦ 浮光蝶影 ✦</h3>
      <div class="stat">
        <span class="stat-label">蝴蝶数量</span>
        <span class="stat-value" id="butterfly-count">0</span>
      </div>
      <div class="stat">
        <span class="stat-label">花朵数量</span>
        <span class="stat-value" id="flower-count">0</span>
      </div>
      <div class="stat">
        <span class="stat-label">FPS</span>
        <span class="stat-value" id="fps-value">0</span>
      </div>
    </div>
    <button id="reset-btn" title="重置场景">重置</button>
  </div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
