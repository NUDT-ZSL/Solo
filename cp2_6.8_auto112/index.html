<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0" />
  <title>3D 神经元网络信号传导可视化器</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      min-width: 800px;
      min-height: 600px;
      overflow: hidden;
      background: #0D0D1A;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      color: #FFFFFFAA;
      user-select: none;
    }

    #app {
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
    }

    #scene-container {
      flex: 5;
      position: relative;
      overflow: hidden;
    }

    #scene-canvas {
      width: 100%;
      height: 100%;
      display: block;
    }

    #fps-counter {
      position: absolute;
      top: 16px;
      right: 20px;
      font-size: 12px;
      color: #AAAAAA;
      z-index: 10;
      letter-spacing: 0.5px;
    }

    #tooltip {
      position: absolute;
      padding: 4px 8px;
      background: rgba(0, 0, 0, 0.7);
      color: #FFFFFF;
      font-size: 12px;
      border-radius: 4px;
      pointer-events: none;
      z-index: 20;
      display: none;
      white-space: nowrap;
    }

    #chart-container {
      position: absolute;
      top: 16px;
      right: 20px;
      width: 260px;
      height: 140px;
      background: #1A1A2E;
      border-radius: 6px;
      padding: 8px;
      z-index: 5;
      display: none;
    }

    #chart-title {
      font-size: 11px;
      color: #FFFFFFAA;
      margin-bottom: 4px;
    }

    #chart-canvas {
      width: 100%;
      height: calc(100% - 18px);
      display: block;
    }

    #reset-btn {
      position: absolute;
      top: 16px;
      left: 20px;
      padding: 8px 16px;
      background: #1A1A2E;
      border: 1px solid #4DA6FF;
      border-radius: 8px;
      color: #FFFFFFAA;
      font-size: 13px;
      cursor: pointer;
      z-index: 10;
      transition: transform 0.08s ease, background 0.2s ease;
    }

    #reset-btn:hover {
      background: #252540;
    }

    #reset-btn:active {
      transform: translateY(1px);
    }

    #control-panel {
      flex: 1;
      background: linear-gradient(to bottom, #0D0D1A, #0A0A23);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 0 40px;
      gap: 60px;
      border-top: 1px solid #FFFFFF10;
    }

    .slider-group {
      display: flex;
      align-items: center;
      gap: 16px;
      flex: 1;
      max-width: 420px;
    }

    .slider-label {
      font-size: 13px;
      color: #FFFFFFAA;
      min-width: 84px;
      white-space: nowrap;
    }

    .slider-wrapper {
      flex: 1;
      position: relative;
      height: 24px;
      display: flex;
      align-items: center;
    }

    input[type="range"] {
      -webkit-appearance: none;
      appearance: none;
      width: 100%;
      height: 4px;
      background: #666;
      border-radius: 2px;
      outline: none;
      cursor: pointer;
    }

    input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none;
      appearance: none;
      width: 18px;
      height: 18px;
      background: #4DA6FF;
      border-radius: 50%;
      cursor: pointer;
      box-shadow: 0 0 8px rgba(77, 166, 255, 0.4);
    }

    input[type="range"]::-moz-range-thumb {
      width: 18px;
      height: 18px;
      background: #4DA6FF;
      border-radius: 50%;
      cursor: pointer;
      border: none;
      box-shadow: 0 0 8px rgba(77, 166, 255, 0.4);
    }

    .slider-value {
      min-width: 48px;
      text-align: right;
      font-size: 13px;
      color: #4DA6FF;
      font-variant-numeric: tabular-nums;
    }

    @media (max-width: 900px) {
      #control-panel {
        flex-direction: column;
        gap: 8px;
        padding: 12px 24px;
      }

      .slider-group {
        width: 100%;
        max-width: none;
      }
    }
  </style>
</head>
<body>
  <div id="app">
    <div id="scene-container">
      <canvas id="scene-canvas"></canvas>
      <div id="fps-counter">FPS: --</div>
      <button id="reset-btn">重置网络</button>
      <div id="chart-container">
        <div id="chart-title">膜电位 (mV)</div>
        <canvas id="chart-canvas"></canvas>
      </div>
      <div id="tooltip"></div>
    </div>
    <div id="control-panel">
      <div class="slider-group">
        <span class="slider-label">连接密度</span>
        <div class="slider-wrapper">
          <input type="range" id="density-slider" min="0.2" max="0.8" step="0.1" value="0.4" />
        </div>
        <span class="slider-value" id="density-value">0.4</span>
      </div>
      <div class="slider-group">
        <span class="slider-label">刺激频率</span>
        <div class="slider-wrapper">
          <input type="range" id="frequency-slider" min="0.5" max="5" step="0.5" value="2" />
        </div>
        <span class="slider-value" id="frequency-value">2.0 Hz</span>
      </div>
    </div>
  </div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
