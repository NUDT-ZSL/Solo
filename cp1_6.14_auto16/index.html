<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>3D Particle Text</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #0b0f1a;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    }
    #app {
      width: 100%;
      height: 100%;
      position: relative;
    }
    #canvas-container {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
    }
    #canvas-container canvas {
      display: block;
    }
    .input-wrapper {
      position: absolute;
      top: 24px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 10;
    }
    .text-input {
      width: 360px;
      height: 48px;
      padding: 0 18px;
      font-size: 16px;
      color: #ffffff;
      background: #1e2433;
      border: 2px solid transparent;
      border-radius: 10px;
      outline: none;
      transition: border-color 0.3s ease, box-shadow 0.3s ease;
    }
    .text-input:focus {
      border-image: linear-gradient(90deg, #4ade80, #3b82f6) 1;
      border-radius: 10px;
      box-shadow: 0 0 0 2px rgba(74, 222, 128, 0.15), 0 0 20px rgba(59, 130, 246, 0.25);
    }
    .text-input::placeholder {
      color: #64748b;
    }
    .panel-toggle {
      display: none;
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      padding: 10px 20px;
      background: #2563eb;
      color: #fff;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      z-index: 25;
      font-size: 14px;
      transition: background 0.2s ease, transform 0.1s ease;
    }
    .panel-toggle:hover {
      background: #3b82f6;
    }
    .panel-toggle:active {
      transform: translateX(-50%) scale(0.96);
    }
    @media (max-width: 768px) {
      .text-input {
        width: calc(100% - 40px);
        max-width: 360px;
      }
      .panel-toggle {
        display: block;
      }
    }
  </style>
</head>
<body>
  <div id="app">
    <div id="canvas-container"></div>
    <div class="input-wrapper">
      <input type="text" class="text-input" id="text-input" placeholder="Type a word or phrase..." value="HELLO" autocomplete="off" />
    </div>
    <button class="panel-toggle" id="panel-toggle">Toggle Controls</button>
  </div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
