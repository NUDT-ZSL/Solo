<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Math Visualizer - 数学函数图形生成器</title>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      html, body, #root { width: 100%; height: 100%; overflow: hidden; }
      body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; }

      input[type="range"]::-webkit-slider-thumb {
        -webkit-appearance: none;
        width: 16px;
        height: 16px;
        border-radius: 50%;
        background: #ffffff;
        cursor: pointer;
        border: 2px solid #e94560;
        box-shadow: 0 2px 6px #00000060;
        transition: transform 0.15s;
      }
      input[type="range"]::-webkit-slider-thumb:hover {
        transform: scale(1.15);
      }
      input[type="range"]::-moz-range-thumb {
        width: 16px;
        height: 16px;
        border-radius: 50%;
        background: #ffffff;
        cursor: pointer;
        border: 2px solid #e94560;
      }
      input[type="range"]::-webkit-slider-runnable-track {
        height: 6px;
        border-radius: 3px;
      }
      input::-webkit-outer-spin-button,
      input::-webkit-inner-spin-button {
        -webkit-appearance: none;
        margin: 0;
      }
      input[type=number] {
        -moz-appearance: textfield;
      }
      button:hover { filter: brightness(1.1); }
      .add-btn:hover { background: #ffffff15 !important; border-color: #ffffff50 !important; }
      .submit-btn:hover { transform: translateY(-1px); box-shadow: 0 6px 18px #e9456060 !important; }
      .tool-btn:hover { transform: scale(1.1); background: #ffffff15 !important; }
      .icon-btn:hover { background: #ffffff15 !important; color: #fff !important; }
      .hist-item:hover .del-btn { opacity: 1 !important; }
      .hist-item:hover { background: #ffffff15 !important; transform: translateY(-1px); }
      .suggest-item:hover { background: #3a3a4e !important; }
      .expr-row:hover { background: #ffffff10 !important; }

      @keyframes fadeIn {
        from { opacity: 0; }
        to { opacity: 1; }
      }
      @keyframes toastIn {
        from { opacity: 0; transform: translate(-50%, 20px); }
        to { opacity: 1; transform: translate(-50%, 0); }
      }
      ::-webkit-scrollbar {
        width: 6px;
        height: 6px;
      }
      ::-webkit-scrollbar-track {
        background: transparent;
      }
      ::-webkit-scrollbar-thumb {
        background: #ffffff20;
        border-radius: 3px;
      }
      ::-webkit-scrollbar-thumb:hover {
        background: #ffffff40;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/frontend/main.tsx"></script>
  </body>
</html>
