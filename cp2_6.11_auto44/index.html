<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <meta name="description" content="晶格呼吸 - 交互式三维可视化晶体森林" />
    <meta name="theme-color" content="#0B132B" />
    <title>晶格呼吸 | Lattice Breath</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@200;300;400&display=swap" rel="stylesheet" />
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      html, body {
        width: 100%;
        height: 100%;
        overflow: hidden;
        font-family: 'Noto Sans SC', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        background: linear-gradient(135deg, #0B132B 0%, #1F0B3A 100%);
        background-attachment: fixed;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
      }
      #app {
        position: relative;
        width: 100vw;
        height: 100vh;
      }
      #scene-canvas {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        display: block;
      }
      .app-title {
        position: fixed;
        top: 24px;
        left: 28px;
        font-size: 20px;
        font-weight: 200;
        color: rgba(255, 255, 255, 0.5);
        letter-spacing: 0.1em;
        pointer-events: none;
        z-index: 10;
        transition: all 0.5s ease-in-out;
        user-select: none;
      }
      .hud-panel {
        position: fixed;
        bottom: 40px;
        left: 50%;
        transform: translateX(-50%);
        width: 600px;
        max-width: calc(100vw - 40px);
        height: 52px;
        padding: 0 24px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 20px;
        border-radius: 16px;
        background: rgba(15, 20, 40, 0.6);
        backdrop-filter: blur(10px);
        -webkit-backdrop-filter: blur(10px);
        border: 1px solid rgba(144, 202, 249, 0.1);
        z-index: 10;
        pointer-events: none;
        transition: all 0.5s ease-in-out;
        box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
      }
      .hud-row {
        display: flex;
        flex-direction: column;
        gap: 2px;
        flex: 1;
      }
      .hud-label {
        font-size: 11px;
        color: rgba(144, 202, 249, 0.5);
        font-weight: 300;
        letter-spacing: 0.05em;
      }
      .hud-value {
        font-size: 14px;
        color: #90CAF9;
        font-weight: 400;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }
      .hud-divider {
        width: 1px;
        height: 28px;
        background: linear-gradient(to bottom, transparent, rgba(144, 202, 249, 0.2), transparent);
      }
      .controls-hint {
        position: fixed;
        top: 24px;
        right: 28px;
        font-size: 12px;
        color: rgba(255, 255, 255, 0.4);
        font-weight: 300;
        line-height: 1.8;
        text-align: right;
        pointer-events: none;
        z-index: 10;
        transition: all 0.5s ease-in-out;
        user-select: none;
      }
      .controls-hint kbd {
        display: inline-block;
        padding: 1px 6px;
        border-radius: 4px;
        background: rgba(255, 255, 255, 0.08);
        border: 1px solid rgba(255, 255, 255, 0.15);
        font-family: inherit;
        font-size: 11px;
        color: rgba(255, 255, 255, 0.6);
        margin: 0 2px;
      }
      @media (max-width: 1024px) {
        .hud-panel {
          width: 80vw;
          height: 48px;
          padding: 0 16px;
          gap: 12px;
        }
        .hud-value {
          font-size: 13px;
        }
      }
      @media (max-width: 768px) {
        .app-title {
          top: 16px;
          left: 20px;
          font-size: 18px;
        }
        .controls-hint {
          top: 16px;
          right: 20px;
          font-size: 11px;
        }
        .hud-panel {
          width: 80vw;
          height: 64px;
          bottom: 24px;
          padding: 8px 14px;
          flex-wrap: wrap;
          gap: 4px 12px;
        }
        .hud-row {
          flex: 0 0 calc(50% - 12px);
        }
        .hud-divider {
          display: none;
        }
      }
    </style>
  </head>
  <body>
    <div id="app">
      <canvas id="scene-canvas"></canvas>
      <div class="app-title">晶 格 呼 吸</div>
      <div class="controls-hint">
        <div><kbd>鼠标</kbd> 悬停 / 点击</div>
        <div><kbd>← →</kbd> 波浪扭曲</div>
        <div><kbd>↑ ↓</kbd> 高度起伏</div>
      </div>
      <div class="hud-panel" id="hud-panel">
        <div class="hud-row">
          <div class="hud-label">悬停位置</div>
          <div class="hud-value" id="hud-hover">—</div>
        </div>
        <div class="hud-divider"></div>
        <div class="hud-row">
          <div class="hud-label">扭曲模式</div>
          <div class="hud-value" id="hud-distort">无</div>
        </div>
        <div class="hud-divider"></div>
        <div class="hud-row">
          <div class="hud-label">选中柱体</div>
          <div class="hud-value" id="hud-selected">无</div>
        </div>
        <div class="hud-divider"></div>
        <div class="hud-row">
          <div class="hud-label">帧率</div>
          <div class="hud-value" id="hud-fps">— FPS</div>
        </div>
      </div>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
