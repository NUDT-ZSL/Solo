<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>地脉勘探 - 3D地质交互可视化平台</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      font-family: 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
    }

    body {
      background: radial-gradient(ellipse at center, #1a1a1a 0%, #0a0a0a 100%);
      color: #66ccff;
    }

    #app {
      position: relative;
      width: 100%;
      height: 100%;
    }

    canvas {
      display: block;
      width: 100%;
      height: 100%;
    }

    #controls-hint {
      position: absolute;
      top: 20px;
      left: 20px;
      padding: 12px 20px;
      background: rgba(20, 30, 48, 0.75);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(102, 204, 255, 0.3);
      border-radius: 4px;
      font-size: 15px;
      line-height: 1.8;
      color: #66ccff;
      pointer-events: none;
      z-index: 100;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.5);
    }

    #controls-hint .title {
      color: #FFD700;
      font-weight: 600;
      font-size: 16px;
      margin-bottom: 8px;
      border-bottom: 1px solid rgba(255, 215, 0, 0.3);
      padding-bottom: 6px;
    }

    #controls-hint .item {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    #controls-hint .key {
      display: inline-block;
      min-width: 24px;
      padding: 2px 8px;
      background: rgba(102, 204, 255, 0.15);
      border: 1px solid rgba(102, 204, 255, 0.4);
      border-radius: 4px;
      font-size: 12px;
      color: #66ccff;
      text-align: center;
    }

    #fps-counter {
      position: absolute;
      bottom: 20px;
      right: 20px;
      padding: 8px 14px;
      background: rgba(20, 30, 48, 0.6);
      backdrop-filter: blur(8px);
      border: 1px solid rgba(0, 255, 100, 0.3);
      border-radius: 4px;
      font-size: 13px;
      font-family: 'Consolas', 'Monaco', monospace;
      color: #00ff64;
      pointer-events: none;
      z-index: 100;
      text-shadow: 0 0 8px rgba(0, 255, 100, 0.5);
    }

    #info-label {
      position: absolute;
      display: none;
      padding: 14px 18px;
      background: rgba(0, 0, 0, 0.85);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(255, 215, 0, 0.5);
      border-radius: 4px;
      font-size: 14px;
      line-height: 1.7;
      color: #e8e8e8;
      pointer-events: none;
      z-index: 200;
      min-width: 220px;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.8);
      transform: translate(-50%, -110%);
    }

    #info-label .label-title {
      color: #FFD700;
      font-size: 16px;
      font-weight: 600;
      margin-bottom: 10px;
      padding-bottom: 8px;
      border-bottom: 1px solid rgba(255, 215, 0, 0.3);
    }

    #info-label .label-row {
      display: flex;
      justify-content: space-between;
      margin: 4px 0;
    }

    #info-label .label-key {
      color: #66ccff;
      opacity: 0.9;
    }

    #info-label .label-value {
      color: #ffffff;
      font-weight: 500;
    }

    #cutting-status {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      display: none;
      padding: 16px 32px;
      background: rgba(255, 215, 0, 0.15);
      backdrop-filter: blur(10px);
      border: 2px solid rgba(255, 215, 0, 0.6);
      border-radius: 4px;
      font-size: 18px;
      color: #FFD700;
      font-weight: 600;
      z-index: 150;
      text-shadow: 0 0 20px rgba(255, 215, 0, 0.6);
      letter-spacing: 2px;
    }

    @media (max-width: 768px) {
      #controls-hint {
        top: 10px;
        left: 50%;
        transform: translateX(-50%);
        font-size: 14px;
        text-align: center;
        padding: 10px 16px;
      }

      #controls-hint .item {
        justify-content: center;
      }
    }
  </style>
</head>
<body>
  <div id="app">
    <div id="controls-hint">
      <div class="title">⛏️ 地脉勘探 · 操作指南</div>
      <div class="item"><span class="key">拖拽</span>旋转视角</div>
      <div class="item"><span class="key">滚轮</span>缩放场景</div>
      <div class="item"><span class="key">点击</span>探测矿脉/断层</div>
      <div class="item"><span class="key">空格</span>断层剖切动画</div>
    </div>
    <div id="fps-counter">FPS: --</div>
    <div id="info-label"></div>
    <div id="cutting-status">🔍 断层剖切进行中...</div>
  </div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
