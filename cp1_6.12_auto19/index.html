<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CSS渐变生成器</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600&family=Space+Grotesk:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/src/style.css" />
</head>
<body>
  <div id="app">
    <aside class="editor-panel" id="editor-panel">
      <div class="panel-header">
        <div class="logo">
          <span class="logo-icon"></span>
          <span class="logo-text">GradientLab</span>
        </div>
        <button class="mobile-toggle" id="mobile-toggle" aria-label="切换面板">
          <span></span>
          <span></span>
          <span></span>
        </button>
      </div>
      <div class="editor-content" id="editor-content"></div>
    </aside>
    <main class="preview-panel">
      <div id="preview-root"></div>
    </main>
  </div>
  <div id="fullscreen-overlay" class="fullscreen-overlay hidden">
    <div class="fullscreen-close" id="fullscreen-close" aria-label="关闭全屏">×</div>
    <div class="overlay-content">
      <div class="clock-widget">
        <div class="clock-time" id="clock-time">00:00:00</div>
        <div class="clock-date" id="clock-date">2026年6月12日</div>
      </div>
      <div class="weather-widget">
        <svg class="weather-icon" viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
          <circle cx="24" cy="28" r="12" fill="currentColor"/>
          <circle cx="24" cy="28" r="8" fill="#0f0f23" opacity="0.3"/>
          <rect x="30" y="38" width="24" height="10" rx="5" fill="#ffffff" opacity="0.95"/>
          <rect x="34" y="34" width="16" height="8" rx="4" fill="#ffffff" opacity="0.85"/>
        </svg>
        <span class="weather-temp">24°</span>
        <span class="weather-desc">晴朗</span>
      </div>
    </div>
  </div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
