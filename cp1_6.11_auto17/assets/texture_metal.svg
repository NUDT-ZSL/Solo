<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="metalGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#e8e8e8;stop-opacity:1" />
      <stop offset="25%" style="stop-color:#a0a0a0;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#d0d0d0;stop-opacity:1" />
      <stop offset="75%" style="stop-color:#808080;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#b0b0b0;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="metalHighlight" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:rgba(255,255,255,0);stop-opacity:1" />
      <stop offset="50%" style="stop-color:rgba(255,255,255,0.3);stop-opacity:1" />
      <stop offset="100%" style="stop-color:rgba(255,255,255,0);stop-opacity:1" />
    </linearGradient>
    <pattern id="brush" x="0" y="0" width="4" height="512" patternUnits="userSpaceOnUse">
      <line x1="0" y1="0" x2="0" y2="512" stroke="rgba(0,0,0,0.05)" stroke-width="1"/>
    </pattern>
  </defs>
  <rect width="512" height="512" fill="url(#metalGrad)"/>
  <rect width="512" height="512" fill="url(#brush)"/>
  <rect x="0" y="100" width="512" height="60" fill="url(#metalHighlight)" opacity="0.5"/>
  <rect x="0" y="320" width="512" height="40" fill="url(#metalHighlight)" opacity="0.4"/>
  <circle cx="100" cy="200" r="2" fill="rgba(255,255,255,0.4)"/>
  <circle cx="400" cy="100" r="3" fill="rgba(255,255,255,0.3)"/>
  <circle cx="300" cy="400" r="2" fill="rgba(255,255,255,0.35)"/>
</svg>
