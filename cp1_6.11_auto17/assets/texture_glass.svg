<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="glassGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:rgba(200,230,255,0.3);stop-opacity:1" />
      <stop offset="100%" style="stop-color:rgba(176,224,230,0.2);stop-opacity:1" />
    </linearGradient>
    <linearGradient id="glassShine1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:rgba(255,255,255,0.6);stop-opacity:1" />
      <stop offset="100%" style="stop-color:rgba(255,255,255,0);stop-opacity:1" />
    </linearGradient>
    <linearGradient id="glassShine2" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:rgba(255,255,255,0.4);stop-opacity:1" />
      <stop offset="100%" style="stop-color:rgba(255,255,255,0);stop-opacity:1" />
    </linearGradient>
  </defs>
  <rect width="512" height="512" fill="url(#glassGrad)"/>
  <rect x="0" y="0" width="512" height="512" fill="rgba(176,224,230,0.15)" stroke="rgba(255,255,255,0.3)" stroke-width="2"/>
  <polygon points="0,0 150,0 0,150" fill="url(#glassShine1)" opacity="0.6"/>
  <polygon points="512,512 350,512 512,350" fill="url(#glassShine2)" opacity="0.5"/>
  <rect x="120" y="250" width="20" height="150" fill="rgba(255,255,255,0.2)" rx="10"/>
  <rect x="380" y="80" width="15" height="100" fill="rgba(255,255,255,0.15)" rx="7"/>
  <circle cx="200" cy="350" r="8" fill="rgba(255,255,255,0.1)"/>
  <circle cx="400" cy="200" r="5" fill="rgba(255,255,255,0.12)"/>
  <circle cx="100" cy="420" r="6" fill="rgba(255,255,255,0.1)"/>
