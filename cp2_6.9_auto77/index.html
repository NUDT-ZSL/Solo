<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>水墨书法</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      font-family: "Microsoft YaHei", "PingFang SC", sans-serif;
      background: #f5f0e6;
    }
    #canvas {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      display: block;
      touch-action: none;
    }
    .top-buttons {
      position: fixed;
      top: 20px;
      left: 20px;
      display: flex;
      gap: 12px;
      z-index: 10;
    }
    .seal-btn {
      padding: 10px 18px;
      border: 2px solid #3a3a3a;
      background: transparent;
      color: #3a3a3a;
      font-size: 14px;
      cursor: pointer;
      letter-spacing: 2px;
      border-radius: 4px;
      transition: all 0.3s ease;
      font-family: "KaiTi", "STKaiti", serif;
      font-weight: bold;
    }
    .seal-btn:hover {
      border-color: #c9a96e;
      color: #c9a96e;
    }
    .control-panel {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%);
      height: 60px;
      background: rgba(255, 255, 255, 0.25);
      border-radius: 16px;
      padding: 0 32px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 40px;
      z-index: 10;
      backdrop-filter: blur(8px);
    }
    .slider-group {
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .slider-label {
      color: #3a3a3a;
      font-size: 13px;
      min-width: 40px;
      font-family: "KaiTi", "STKaiti", serif;
    }
    .slider {
      -webkit-appearance: none;
      appearance: none;
      width: 140px;
      height: 6px;
      border-radius: 3px;
      background: rgba(245, 240, 230, 0.9);
      outline: none;
      cursor: pointer;
    }
    .slider::-webkit-slider-thumb {
      -webkit-appearance: none;
      appearance: none;
      width: 18px;
      height: 18px;
      border-radius: 50%;
      background: #3a3a3a;
      cursor: pointer;
      transition: all 0.3s ease;
    }
    .slider::-webkit-slider-thumb:hover {
      background: #c9a96e;
      transform: scale(1.1);
    }
    .slider::-moz-range-thumb {
      width: 18px;
      height: 18px;
      border-radius: 50%;
      background: #3a3a3a;
      cursor: pointer;
      border: none;
      transition: all 0.3s ease;
    }
    .slider::-moz-range-thumb:hover {
      background: #c9a96e;
      transform: scale(1.1);
    }
    .panel-buttons {
      display: flex;
      gap: 12px;
    }
  </style>
</head>
<body>
  <canvas id="canvas"></canvas>
  <div class="top-buttons">
    <button class="seal-btn" id="clearBtn">清空画布</button>
    <button class="seal-btn" id="saveBtn">保存作品</button>
  </div>
  <div class="control-panel" id="controlPanel"></div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
