<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>光谱编织者 - Spectrum Weaver</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #000;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    }

    #app {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      background: radial-gradient(ellipse at center, #0a1128 0%, #000000 100%);
    }

    #canvas {
      display: block;
      width: 100%;
      height: 100%;
      cursor: crosshair;
    }

    .hud {
      position: fixed;
      top: 20px;
      left: 20px;
      color: rgba(255, 255, 255, 0.5);
      font-size: 12px;
      font-family: 'Courier New', monospace;
      pointer-events: none;
      user-select: none;
      z-index: 10;
    }

    .hud .title {
      font-size: 18px;
      color: rgba(255, 255, 255, 0.8);
      margin-bottom: 8px;
      letter-spacing: 2px;
      text-shadow: 0 0 10px rgba(100, 200, 255, 0.5);
    }

    .hud .divider {
      width: 120px;
      height: 1px;
      background: linear-gradient(90deg, rgba(100, 200, 255, 0.5), transparent);
      margin: 10px 0;
    }

    .hud .info {
      line-height: 1.8;
    }

    .hud .info span {
      color: rgba(100, 200, 255, 0.8);
    }

    .hint {
      position: fixed;
      bottom: 30px;
      left: 50%;
      transform: translateX(-50%);
      color: rgba(255, 255, 255, 0.35);
      font-size: 13px;
      letter-spacing: 1px;
      pointer-events: none;
      user-select: none;
      z-index: 10;
      text-align: center;
    }

    .hint .key {
      display: inline-block;
      padding: 2px 8px;
      border: 1px solid rgba(255, 255, 255, 0.3);
      border-radius: 3px;
      margin: 0 3px;
      color: rgba(100, 200, 255, 0.6);
    }
  </style>
</head>
<body>
  <div id="app">
    <canvas id="canvas"></canvas>
    <div class="hud">
      <div class="title">SPECTRUM WEAVER</div>
      <div class="divider"></div>
      <div class="info">
        色块: <span id="blockCount">0</span><br/>
        速度: <span id="speed">0</span> px/s<br/>
        FPS: <span id="fps">0</span>
      </div>
    </div>
    <div class="hint">
      移动鼠标编织光谱 <span class="key">快滑</span> 粒子爆裂 <span class="key">点击</span> 亮度爆发
    </div>
  </div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
