<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SketchTo3D · 草图转3D立体模型</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500&family=SF+Pro+Display:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --primary: #3B82F6;
      --primary-light: #60A5FA;
      --success: #10B981;
      --warning: #F59E0B;
      --danger: #EF4444;
      --bg-dark: #0F172A;
      --bg-panel: #1E293B;
      --bg-card: #243147;
      --text-primary: #F1F5F9;
      --text-secondary: #94A3B8;
      --border: #334155;
      --radius: 8px;
      --shadow-sm: 0 2px 8px rgba(0,0,0,0.3);
      --shadow-md: 0 4px 16px rgba(0,0,0,0.4);
      --shadow-lg: 0 8px 32px rgba(0,0,0,0.5);
    }
    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "SF Pro Display", "Microsoft YaHei", sans-serif;
      background: var(--bg-dark);
      color: var(--text-primary);
      -webkit-font-smoothing: antialiased;
    }
    #app { width: 100%; height: 100%; display: flex; flex-direction: column; }

    /* 顶部导航栏 */
    .top-nav {
      height: 56px;
      min-height: 56px;
      background: linear-gradient(180deg, #1E293B 0%, #172033 100%);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 24px;
      box-shadow: var(--shadow-sm);
      z-index: 100;
    }
    .nav-brand {
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .nav-logo {
      width: 32px; height: 32px;
      border-radius: var(--radius);
      background: linear-gradient(135deg, var(--primary) 0%, #8B5CF6 100%);
      display: flex; align-items: center; justify-content: center;
      font-weight: 700; font-size: 14px; color: white;
      box-shadow: 0 0 20px rgba(59, 130, 246, 0.4);
    }
    .nav-title {
      font-size: 16px;
      font-weight: 600;
      letter-spacing: 0.5px;
      background: linear-gradient(90deg, var(--primary-light) 0%, #A78BFA 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .nav-stats {
      display: flex;
      align-items: center;
      gap: 24px;
    }
    .fps-counter {
      font-family: "JetBrains Mono", monospace;
      font-size: 13px;
      font-weight: 500;
      padding: 4px 12px;
      border-radius: 20px;
      background: rgba(15, 23, 42, 0.6);
      border: 1px solid var(--border);
      transition: color 0.3s ease;
    }

    /* 主内容区 */
    .main-content {
      flex: 1;
      display: flex;
      flex-direction: row;
      overflow: hidden;
      min-height: 0;
      padding: 16px;
      gap: 16px;
    }

    /* 左侧画布区 */
    .canvas-panel {
      width: 40%;
      min-width: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--bg-panel);
      border-radius: var(--radius);
      border: 1px solid var(--border);
      box-shadow: var(--shadow-md);
      padding: 16px;
      position: relative;
      overflow: hidden;
    }
    .canvas-wrapper {
      width: 100%;
      aspect-ratio: 4 / 3;
      max-height: 100%;
      border-radius: var(--radius);
      overflow: hidden;
      box-shadow: inset 0 2px 8px rgba(0,0,0,0.3);
      position: relative;
    }
    #sketchCanvas {
      width: 100%;
      height: 100%;
      display: block;
      cursor: crosshair;
      background-color: #F8FAFC;
    }
    .canvas-hint {
      position: absolute;
      top: 16px;
      left: 16px;
      font-size: 12px;
      color: var(--text-secondary);
      pointer-events: none;
      opacity: 0.8;
    }

    /* 右侧预览区 */
    .preview-panel {
      flex: 1;
      min-width: 0;
      position: relative;
      background: radial-gradient(ellipse at 50% 30%, #1E293B 0%, #0F172A 100%);
      border-radius: var(--radius);
      border: 1px solid var(--border);
      box-shadow: var(--shadow-md);
      overflow: hidden;
    }
    #threeCanvas {
      width: 100%;
      height: 100%;
      display: block;
    }
    .stats-overlay {
      position: absolute;
      top: 16px;
      right: 16px;
      font-family: "JetBrains Mono", monospace;
      font-size: 12px;
      color: var(--text-secondary);
      padding: 10px 14px;
      border-radius: var(--radius);
      background: rgba(15, 23, 42, 0.75);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      border: 1px solid var(--border);
      line-height: 1.8;
      z-index: 10;
    }
    .stats-overlay .stat-label { color: var(--text-secondary); }
    .stats-overlay .stat-value { color: var(--primary-light); font-weight: 500; }
    .preview-hint {
      position: absolute;
      bottom: 16px;
      left: 16px;
      font-size: 11px;
      color: var(--text-secondary);
      opacity: 0.6;
      pointer-events: none;
      z-index: 10;
    }

    /* 底部工具栏 */
    .bottom-toolbar {
      height: 96px;
      min-height: 96px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 24px;
      padding: 0 32px;
      background: transparent;
      position: relative;
      z-index: 50;
    }
    .tool-btn {
      width: 56px; height: 56px;
      border-radius: 50%;
      border: none;
      cursor: pointer;
      position: relative;
      overflow: hidden;
      background: rgba(59, 130, 246, 0.12);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid rgba(59, 130, 246, 0.3);
      box-shadow: 
        0 4px 16px rgba(0,0,0,0.3),
        inset 0 1px 0 rgba(255,255,255,0.15);
      transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--primary-light);
    }
    .tool-btn:hover:not(:disabled) {
      transform: translateY(-4px);
      background: rgba(59, 130, 246, 0.2);
      border-color: rgba(59, 130, 246, 0.5);
      box-shadow: 
        0 8px 24px rgba(59, 130, 246, 0.35),
        inset 0 1px 0 rgba(255,255,255,0.2);
      color: white;
    }
    .tool-btn:active:not(:disabled) {
      transform: translateY(-2px);
    }
    .tool-btn:disabled {
      opacity: 0.4;
      cursor: not-allowed;
    }
    .tool-btn svg { width: 24px; height: 24px; }
    .tool-btn .btn-tooltip {
      position: absolute;
      bottom: -32px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 11px;
      color: var(--text-secondary);
      white-space: nowrap;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.2s;
    }
    .tool-btn:hover .btn-tooltip { opacity: 1; }
    .ripple {
      position: absolute;
      border-radius: 50%;
      background: rgba(96, 165, 250, 0.5);
      transform: scale(0);
      animation: ripple-anim 0.6s ease-out;
      pointer-events: none;
    }
    @keyframes ripple-anim {
      to { transform: scale(4); opacity: 0; }
    }

    /* 材质下拉选择器 */
    .material-wrapper {
      position: relative;
    }
    .material-dropdown {
      position: absolute;
      bottom: calc(100% + 16px);
      left: 50%;
      transform: translateX(-50%) scale(0.95);
      width: 320px;
      padding: 16px;
      background: rgba(36, 49, 71, 0.95);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: var(--shadow-lg);
      display: none;
      opacity: 0;
      transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
    }
    .material-dropdown.open {
      display: block;
      opacity: 1;
      transform: translateX(-50%) scale(1);
    }
    .material-title {
      font-size: 12px;
      color: var(--text-secondary);
      margin-bottom: 12px;
      font-weight: 500;
    }
    .material-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 10px;
    }
    .material-item {
      aspect-ratio: 1;
      border-radius: var(--radius);
      cursor: pointer;
      border: 2px solid transparent;
      position: relative;
      transition: all 0.2s;
      overflow: hidden;
    }
    .material-item:hover {
      transform: scale(1.08);
      border-color: var(--primary-light);
    }
    .material-item.active {
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.25);
    }
    .material-swatch {
      width: 100%; height: 100%;
      border-radius: 6px;
    }
    .material-name {
      position: absolute;
      bottom: 0; left: 0; right: 0;
      font-size: 10px;
      text-align: center;
      padding: 2px;
      background: rgba(0,0,0,0.6);
      color: white;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    /* 响应式 < 1024px */
    @media (max-width: 1024px) {
      .main-content {
        flex-direction: column;
      }
      .canvas-panel {
        width: 100%;
        height: 50%;
        min-height: 0;
      }
      .preview-panel {
        width: 100%;
        height: 50%;
        min-height: 0;
      }
      .bottom-toolbar {
        height: 80px;
        min-height: 80px;
        gap: 16px;
      }
      .tool-btn {
        width: 48px;
        height: 48px;
      }
      .tool-btn svg { width: 20px; height: 20px; }
    }
  </style>
</head>
<body>
  <div id="app">
    <!-- 顶部导航栏 -->
    <header class="top-nav">
      <div class="nav-brand">
        <div class="nav-logo">S3D</div>
        <div class="nav-title">SketchTo3D · 草图转立体模型</div>
      </div>
      <div class="nav-stats">
        <div class="fps-counter" id="fpsCounter">FPS: --</div>
      </div>
    </header>

    <!-- 主内容区 -->
    <main class="main-content">
      <!-- 左侧画布区 -->
      <section class="canvas-panel">
        <div class="canvas-wrapper">
          <canvas id="sketchCanvas"></canvas>
          <div class="canvas-hint">✏️ 绘制封闭轮廓草图</div>
        </div>
      </section>

      <!-- 右侧3D预览区 -->
      <section class="preview-panel">
        <canvas id="threeCanvas"></canvas>
        <div class="stats-overlay" id="statsOverlay">
          <div><span class="stat-label">顶点数：</span><span class="stat-value" id="vertCount">0</span></div>
          <div><span class="stat-label">面数：</span><span class="stat-value" id="faceCount">0</span></div>
        </div>
        <div class="preview-hint">🖱 拖拽旋转 · 滚轮缩放</div>
      </section>
    </main>

    <!-- 底部工具栏 -->
    <footer class="bottom-toolbar" id="bottomToolbar">
      <button class="tool-btn" id="btnClear" title="清空画布">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M3 6h18M8 6V4a2 2 0 012-2h4a2 2 0 012 2v2m3 0v14a2 2 0 01-2 2H7a2 2 0 01-2-2V6h14z"></path>
          <path d="M10 11v6M14 11v6"></path>
        </svg>
        <span class="btn-tooltip">清空画布</span>
      </button>

      <button class="tool-btn" id="btnExtrude" title="挤出生成3D" disabled>
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M21 16V8a2 2 0 00-1-1.73l-7-4a2 2 0 00-2 0l-7 4A2 2 0 003 8v8a2 2 0 001 1.73l7 4a2 2 0 002 0l7-4A2 2 0 0021 16z"></path>
          <path d="M3.27 6.96L12 12.01l8.73-5.05M12 22.08V12"></path>
        </svg>
        <span class="btn-tooltip">挤出生成3D</span>
      </button>

      <button class="tool-btn" id="btnSymmetry" title="对称镜像" disabled>
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M12 3v18M5 7l7 4-7 4V7zM19 7l-7 4 7 4V7z"></path>
        </svg>
        <span class="btn-tooltip">对称镜像</span>
      </button>

      <div class="material-wrapper">
        <button class="tool-btn" id="btnMaterial" title="材质选择" disabled>
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M20.71 4.63l-1.34-1.34a2 2 0 00-2.83 0L4 15.83V20h4.17L20.71 7.46a2 2 0 000-2.83zM7 18H5v-2m8.5-11.5l2 2"></path>
          </svg>
          <span class="btn-tooltip">材质选择</span>
        </button>
        <div class="material-dropdown" id="materialDropdown">
          <div class="material-title">选择材质（12种PBR预设）</div>
          <div class="material-grid" id="materialGrid"></div>
        </div>
      </div>
    </footer>
  </div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
