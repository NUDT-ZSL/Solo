<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📚</text></svg>" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>BookShelf · 温暖的独立书店</title>
  </head>
  <body>
    <div id="root">
      <div style="display:flex;flex-direction:column;align-items:center;justify-content:center;height:100vh;background:#FDF5E6;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;">
        <div style="font-size:64px;margin-bottom:24px;animation:bookBounce 1.2s ease-in-out infinite;">📚</div>
        <div style="font-size:24px;color:#8B4513;font-weight:600;margin-bottom:16px;">BookShelf</div>
        <div style="font-size:14px;color:#8B6F47;letter-spacing:2px;">正在加载书店...</div>
        <div style="width:200px;height:4px;background:#F5DEB3;border-radius:2px;margin-top:24px;overflow:hidden;">
          <div style="width:60%;height:100%;background:#8B4513;border-radius:2px;animation:loadingBar 1.4s ease-in-out infinite;"></div>
        </div>
      </div>
    </div>
    <style>
      @keyframes bookBounce {
        0%,100% { transform: translateY(0) rotate(-2deg); }
        50% { transform: translateY(-12px) rotate(2deg); }
      }
      @keyframes loadingBar {
        0% { transform: translateX(-100%); }
        100% { transform: translateX(260%); }
      }
    </style>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
