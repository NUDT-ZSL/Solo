<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>3D 魔方解谜</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #1E1E2E;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      user-select: none;
    }
    #app {
      position: relative;
      width: 100%;
      height: 100%;
    }
    canvas {
      display: block;
    }
    .ui-panel {
      position: absolute;
      z-index: 10;
    }
    #action-btn {
      left: 30px;
      bottom: 30px;
      padding: 14px 32px;
      border: none;
      border-radius: 12px;
      background: #3A3A5C;
      color: rgba(255, 255, 255, 0.9);
      font-size: 14px;
      cursor: pointer;
      transition: background 0.2s, transform 0.1s;
    }
    #action-btn:hover {
      background: #5A5A8C;
    }
    #action-btn:active {
      transform: scale(0.95);
    }
    #speed-selector {
      right: 30px;
      bottom: 30px;
      padding: 10px 16px;
      border-radius: 8px;
      background: #2D2D44;
      color: rgba(255, 255, 255, 0.9);
      font-size: 14px;
      border: none;
      cursor: pointer;
      outline: none;
    }
    #progress-panel {
      right: 30px;
      top: 30px;
      width: 260px;
    }
    #progress-bar-container {
      width: 200px;
      height: 8px;
      background: #333350;
      border-radius: 4px;
      overflow: hidden;
      margin-bottom: 12px;
    }
    #progress-bar {
      height: 100%;
      width: 0%;
      background: #6C63FF;
      border-radius: 4px;
      transition: width 0.3s ease;
    }
    #move-list {
      color: rgba(255, 255, 255, 0.75);
      font-size: 14px;
      line-height: 1.6;
      max-height: 200px;
      overflow-y: auto;
      word-break: break-all;
    }
    #status-text {
      color: rgba(255, 255, 255, 0.5);
      font-size: 14px;
      margin-bottom: 8px;
    }
  </style>
</head>
<body>
  <div id="app">
    <div class="ui-panel" id="progress-panel">
      <div id="status-text">准备就绪</div>
      <div id="progress-bar-container">
        <div id="progress-bar"></div>
      </div>
      <div id="move-list"></div>
    </div>
    <button id="action-btn" class="ui-panel">打乱</button>
    <select id="speed-selector" class="ui-panel">
      <option value="0.5">0.5x</option>
      <option value="1" selected>1x</option>
      <option value="2">2x</option>
    </select>
  </div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
