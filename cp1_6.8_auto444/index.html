<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>笔墨流光</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=ZCOOL+XiaoWei&family=Noto+Serif+SC:wght@400;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      font-family: 'Noto Serif SC', serif;
      background: linear-gradient(135deg, #F5F0E8 0%, #E8E3DB 50%, #F0EBE1 100%);
    }

    #app {
      display: flex;
      width: 100%;
      height: 100%;
      position: relative;
    }

    #canvas-wrap {
      flex: 1;
      position: relative;
      overflow: hidden;
    }

    #ink-canvas {
      display: block;
      width: 100%;
      height: 100%;
      cursor: crosshair;
      touch-action: none;
    }

    #control-panel {
      width: 240px;
      height: 100%;
      background: rgba(255, 255, 255, 0.72);
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
      border-left: 1px solid #C4A87C;
      display: flex;
      flex-direction: column;
      padding: 28px 20px;
      gap: 24px;
      overflow-y: auto;
      transition: transform 0.4s cubic-bezier(0.22, 1, 0.36, 1);
      z-index: 10;
    }

    .panel-title {
      font-family: 'ZCOOL XiaoWei', serif;
      font-size: 22px;
      color: #3A2F27;
      text-align: center;
      letter-spacing: 6px;
      padding-bottom: 16px;
      border-bottom: 1px solid rgba(196, 168, 124, 0.4);
      position: relative;
    }

    .panel-title::after {
      content: '';
      position: absolute;
      bottom: -1px;
      left: 50%;
      transform: translateX(-50%);
      width: 40px;
      height: 2px;
      background: #C4A87C;
    }

    .control-group {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .control-label {
      font-size: 13px;
      color: #5A4A3A;
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-weight: 600;
    }

    .control-value {
      font-size: 12px;
      color: #8B7355;
      font-weight: 400;
      background: rgba(196, 168, 124, 0.15);
      padding: 1px 8px;
      border-radius: 4px;
    }

    input[type="range"] {
      -webkit-appearance: none;
      appearance: none;
      width: 100%;
      height: 6px;
      background: linear-gradient(to right, #C4A87C, #8B7355);
      border-radius: 3px;
      outline: none;
      cursor: pointer;
    }

    input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none;
      appearance: none;
      width: 18px;
      height: 18px;
      background: radial-gradient(circle at 40% 40%, #D4C4A8, #8B7355);
      border: 2px solid #F5F0E8;
      border-radius: 50%;
      cursor: pointer;
      box-shadow: 0 2px 6px rgba(0,0,0,0.2);
      transition: box-shadow 0.2s;
    }

    input[type="range"]::-webkit-slider-thumb:hover {
      box-shadow: 0 2px 10px rgba(139, 115, 85, 0.5);
    }

    input[type="range"]::-moz-range-thumb {
      width: 18px;
      height: 18px;
      background: radial-gradient(circle at 40% 40%, #D4C4A8, #8B7355);
      border: 2px solid #F5F0E8;
      border-radius: 50%;
      cursor: pointer;
      box-shadow: 0 2px 6px rgba(0,0,0,0.2);
    }

    .btn-seal {
      position: relative;
      padding: 10px 0;
      font-family: 'ZCOOL XiaoWei', serif;
      font-size: 15px;
      color: #F5F0E8;
      letter-spacing: 4px;
      background: #8B2500;
      border: 2px solid #6B1C00;
      border-radius: 4px;
      cursor: pointer;
      transition: all 0.3s ease;
      box-shadow:
        2px 2px 0 #6B1C00,
        inset 0 0 12px rgba(0,0,0,0.15);
      overflow: hidden;
    }

    .btn-seal::before {
      content: '';
      position: absolute;
      inset: 2px;
      border: 1px solid rgba(245, 240, 232, 0.15);
      border-radius: 2px;
      pointer-events: none;
    }

    .btn-seal:hover {
      background: #A52F00;
      box-shadow:
        2px 2px 0 #6B1C00,
        0 0 16px rgba(139, 37, 0, 0.5),
        inset 0 0 12px rgba(0,0,0,0.15);
    }

    .btn-seal:active {
      transform: translate(1px, 1px);
      box-shadow:
        1px 1px 0 #6B1C00,
        inset 0 0 12px rgba(0,0,0,0.15);
    }

    #hamburger-btn {
      display: none;
      position: fixed;
      bottom: 20px;
      right: 20px;
      width: 48px;
      height: 48px;
      background: rgba(255,255,255,0.85);
      backdrop-filter: blur(10px);
      border: 1px solid #C4A87C;
      border-radius: 50%;
      cursor: pointer;
      z-index: 20;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 5px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.12);
      transition: transform 0.3s;
    }

    #hamburger-btn:hover {
      transform: scale(1.08);
    }

    #hamburger-btn span {
      display: block;
      width: 22px;
      height: 2px;
      background: #5A4A3A;
      border-radius: 1px;
      transition: all 0.3s;
    }

    #hamburger-btn.active span:nth-child(1) {
      transform: rotate(45deg) translate(5px, 5px);
    }
    #hamburger-btn.active span:nth-child(2) {
      opacity: 0;
    }
    #hamburger-btn.active span:nth-child(3) {
      transform: rotate(-45deg) translate(5px, -5px);
    }

    .divider {
      height: 1px;
      background: linear-gradient(to right, transparent, rgba(196,168,124,0.4), transparent);
    }

    @media (max-width: 767px) {
      #app {
        flex-direction: column;
      }

      #control-panel {
        position: fixed;
        bottom: 0;
        left: 0;
        right: 0;
        width: 100%;
        height: auto;
        max-height: 70vh;
        border-left: none;
        border-top: 1px solid #C4A87C;
        border-radius: 16px 16px 0 0;
        transform: translateY(100%);
        padding: 24px 20px 32px;
      }

      #control-panel.open {
        transform: translateY(0);
      }

      #hamburger-btn {
        display: flex;
      }

      .panel-title {
        font-size: 18px;
        letter-spacing: 4px;
      }
    }
  </style>
</head>
<body>
  <div id="app">
    <div id="canvas-wrap">
      <canvas id="ink-canvas"></canvas>
    </div>
    <div id="control-panel">
      <div class="panel-title">笔墨流光</div>

      <div class="control-group">
        <div class="control-label">
          <span>墨色浓度</span>
          <span class="control-value" id="density-value">0.60</span>
        </div>
        <input type="range" id="ink-density" min="0.1" max="1.0" step="0.01" value="0.6" />
      </div>

      <div class="control-group">
        <div class="control-label">
          <span>晕染速度</span>
          <span class="control-value" id="spread-value">1.00</span>
        </div>
        <input type="range" id="spread-speed" min="0.5" max="2.0" step="0.01" value="1.0" />
      </div>

      <div class="divider"></div>

      <button class="btn-seal" id="btn-clear">清空画布</button>
      <button class="btn-seal" id="btn-save">保存作品</button>
    </div>
  </div>

  <button id="hamburger-btn">
    <span></span>
    <span></span>
    <span></span>
  </button>

  <script type="module" src="/src/main.ts"></script>
</body>
</html>
