<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>星尘星云 - Stardust Nebula</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #000000;
    }

    #app {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
    }

    canvas {
      display: block;
    }

    .info-panel {
      position: fixed;
      top: 20px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(0, 0, 0, 0.6);
      border-radius: 12px;
      padding: 16px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 40px;
      z-index: 10;
      backdrop-filter: blur(4px);
      border: 1px solid rgba(0, 255, 136, 0.3);
      box-shadow: 0 0 20px rgba(0, 255, 136, 0.1);
    }

    .info-section {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .info-left {
      align-items: flex-start;
    }

    .info-right {
      align-items: flex-end;
    }

    .info-item {
      font-family: monospace;
      font-size: 14px;
      color: #00FF88;
      text-shadow: 0 0 4px #00FF88;
      transform: rotate(-0.04rad);
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .color-swatch {
      width: 20px;
      height: 20px;
      border-radius: 4px;
      border: 1px solid rgba(255, 255, 255, 0.3);
      box-shadow: 0 0 8px currentColor;
    }

    .hint {
      position: fixed;
      bottom: 20px;
      right: 20px;
      font-family: monospace;
      font-size: 14px;
      color: #00BFFF;
      text-shadow: 0 0 4px #00BFFF;
      transform: rotate(-0.04rad);
      z-index: 10;
      opacity: 0.8;
    }
  </style>
</head>
<body>
  <div id="app"></div>
  
  <div class="info-panel" id="infoPanel">
    <div class="info-section info-left">
      <div class="info-item">
        <span>粒子总数: <span id="particleCount">0</span></span>
      </div>
      <div class="info-item">
        <span>平均颜色: </span>
        <div class="color-swatch" id="avgColor" style="background: #884488;"></div>
      </div>
    </div>
    <div class="info-section info-right">
      <div class="info-item">
        <span>超新星位置: <span id="supernovaPos">--</span></span>
      </div>
      <div class="info-item">
        <span>爆发次数: <span id="supernovaCount">0</span></span>
      </div>
    </div>
  </div>

  <div class="hint">拖拽旋转 | 滚轮缩放 | 点击亮点触发超新星</div>

  <script type="module" src="/src/main.ts"></script>
</body>
</html>
