<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>粒子罗盘 | Particle Compass</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
    }
    body {
      background: radial-gradient(
        ellipse at center,
        hsl(250, 60%, 15%) 0%,
        hsl(265, 65%, 10%) 40%,
        hsl(280, 70%, 7%) 70%,
        hsl(220, 80%, 5%) 100%
      );
      cursor: crosshair;
      font-family: monospace;
    }
    #app {
      width: 100vw;
      height: 100vh;
      position: relative;
    }
    #app canvas {
      display: block;
    }
    .version-tag {
      position: fixed;
      left: 16px;
      bottom: 12px;
      font-size: 12px;
      font-family: monospace;
      color: #ffffff;
      opacity: 0.3;
      user-select: none;
      pointer-events: none;
      z-index: 1000;
    }
    .click-halo {
      position: fixed;
      width: 40px;
      height: 40px;
      border: 2px solid rgba(120, 180, 255, 0.8);
      border-radius: 50%;
      pointer-events: none;
      transform: translate(-50%, -50%) scale(2.5);
      animation: haloShrink 0.3s ease-out forwards;
      z-index: 999;
    }
    @keyframes haloShrink {
      0% {
        opacity: 0.8;
        transform: translate(-50%, -50%) scale(2.5);
      }
      100% {
        opacity: 0;
        transform: translate(-50%, -50%) scale(0.3);
      }
    }
  </style>
</head>
<body>
  <div id="app"></div>
  <div class="version-tag">v1.0.0 · particle-compass</div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
