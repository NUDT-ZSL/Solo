<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>2D未来交通流智能调度系统</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
      font-weight: 500;
    }
    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #1A1A2E;
      color: #E0E0E0;
    }
    #app {
      width: 100%;
      height: 100%;
      display: flex;
    }
    #canvas-wrap {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
    }
    #traffic-canvas {
      background: #1A1A2E;
      border-radius: 4px;
      cursor: pointer;
    }
    #panel {
      width: 280px;
      background: #16162A;
      border-left: 1px solid #2D2D44;
      padding: 16px;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }
    .panel-section {
      background: #1E1E38;
      border-radius: 4px;
      padding: 12px;
    }
    .panel-title {
      font-size: 13px;
      color: #8888AA;
      margin-bottom: 10px;
      letter-spacing: 0.5px;
    }
    .stat-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }
    .stat-item {
      background: #252545;
      border-radius: 4px;
      padding: 10px;
      text-align: center;
    }
    .stat-value {
      font-size: 22px;
      color: #4A90D9;
      line-height: 1.2;
    }
    .stat-value.red { color: #D94A4A; }
    .stat-value.green { color: #4AD97A; }
    .stat-value.yellow { color: #D9C74A; }
    .stat-label {
      font-size: 11px;
      color: #8888AA;
      margin-top: 4px;
    }
    select {
      width: 100%;
      padding: 10px 12px;
      background: #252545;
      border: 1px solid #3D3D66;
      color: #E0E0E0;
      border-radius: 4px;
      font-size: 13px;
      cursor: pointer;
      outline: none;
      transition: all 0.3s cubic-bezier(0.25,0.1,0.25,1);
    }
    select:hover {
      border-color: #4A90D9;
    }
    select:focus {
      border-color: #4A90D9;
      box-shadow: 0 0 0 2px rgba(74,144,217,0.2);
    }
    #chart-canvas {
      width: 100%;
      height: 120px;
      background: #121225;
      border-radius: 4px;
    }
    #modal-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.6);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 100;
      opacity: 0;
      transition: opacity 0.3s cubic-bezier(0.25,0.1,0.25,1);
    }
    #modal-overlay.visible {
      display: flex;
      opacity: 1;
    }
    #modal {
      background: #1E1E38;
      border-radius: 6px;
      padding: 20px;
      min-width: 360px;
      max-width: 480px;
      transform: translateY(20px);
      transition: transform 0.3s cubic-bezier(0.25,0.1,0.25,1);
    }
    #modal-overlay.visible #modal {
      transform: translateY(0);
    }
    #modal-title {
      font-size: 16px;
      color: #E0E0E0;
      margin-bottom: 16px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    #modal-close {
      background: none;
      border: none;
      color: #8888AA;
      font-size: 20px;
      cursor: pointer;
      padding: 0 4px;
      line-height: 1;
      transition: color 0.2s;
    }
    #modal-close:hover { color: #E0E0E0; }
    .modal-section { margin-bottom: 14px; }
    .modal-section-title {
      font-size: 12px;
      color: #8888AA;
      margin-bottom: 8px;
    }
    .modal-row {
      display: flex;
      justify-content: space-between;
      padding: 6px 0;
      border-bottom: 1px solid #2D2D44;
      font-size: 13px;
    }
    .modal-row:last-child { border-bottom: none; }
    .modal-row .label { color: #AAAAAA; }
    .modal-row .value { color: #4A90D9; }
    .modal-row .value.red { color: #D94A4A; }
    .modal-row .value.green { color: #4AD97A; }
    .modal-row .value.yellow { color: #D9C74A; }
    .fade-transition {
      transition: opacity 0.5s ease;
    }
    .strategy-hint {
      font-size: 11px;
      color: #666688;
      margin-top: 8px;
      line-height: 1.5;
    }
    @media (max-width: 900px) {
      #app { flex-direction: column; }
      #panel {
        width: 100%;
        height: auto;
        max-height: 45%;
        border-left: none;
        border-top: 1px solid #2D2D44;
        flex-direction: row;
        flex-wrap: wrap;
      }
      .panel-section { flex: 1; min-width: 200px; }
    }
  </style>
</head>
<body>
  <div id="app">
    <div id="canvas-wrap">
      <canvas id="traffic-canvas"></canvas>
    </div>
    <div id="panel">
      <div class="panel-section">
        <div class="panel-title">信号灯调度策略</div>
        <select id="strategy-select">
          <option value="fixed">固定时长 (绿灯30s+黄灯3s+红灯30s)</option>
          <option value="adaptive">自适应 (根据排队动态调整 10-60s)</option>
          <option value="mainRoadPriority">优先主干道 (主干道绿灯时间×2)</option>
          <option value="aiPredict">AI预测 (30秒移动平均预测)</option>
        </select>
        <div class="strategy-hint" id="strategy-hint">所有路口将在下一信号灯周期开始时更新策略</div>
      </div>
      <div class="panel-section">
        <div class="panel-title">实时统计</div>
        <div class="stat-grid">
          <div class="stat-item">
            <div class="stat-value" id="stat-vehicles">0</div>
            <div class="stat-label">当前车辆数</div>
          </div>
          <div class="stat-item">
            <div class="stat-value yellow" id="stat-wait">0.0</div>
            <div class="stat-label">平均等待(秒)</div>
          </div>
          <div class="stat-item">
            <div class="stat-value red" id="stat-queue">0</div>
            <div class="stat-label">最大排队长度</div>
          </div>
          <div class="stat-item">
            <div class="stat-value green" id="stat-passed">0</div>
            <div class="stat-label">总通过车辆数</div>
          </div>
        </div>
      </div>
      <div class="panel-section">
        <div class="panel-title">60秒历史趋势</div>
        <canvas id="chart-canvas"></canvas>
      </div>
    </div>
  </div>
  <div id="modal-overlay">
    <div id="modal">
      <div id="modal-title">
        <span>路口详情</span>
        <button id="modal-close">×</button>
      </div>
      <div id="modal-content"></div>
    </div>
  </div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
