<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>3D化学元素周期表探索器</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #0A1628;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
      color: #fff;
      min-width: 1024px;
    }
    #app {
      width: 100%;
      height: 100%;
      position: relative;
    }
    canvas {
      display: block;
    }

    .search-panel {
      position: absolute;
      left: 24px;
      bottom: 72px;
      width: 280px;
      padding: 16px;
      background: rgba(26, 26, 46, 0.85);
      border-radius: 12px;
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      z-index: 100;
      border: 1px solid rgba(255, 255, 255, 0.08);
    }
    .search-panel h3 {
      font-size: 14px;
      margin-bottom: 10px;
      color: #8BC34A;
      font-weight: 600;
    }
    .search-panel input {
      width: 100%;
      padding: 10px 12px;
      border: 1px solid rgba(255, 255, 255, 0.15);
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.06);
      color: #fff;
      font-size: 14px;
      outline: none;
      transition: all 0.3s ease;
    }
    .search-panel input:focus {
      border-color: #4A90D9;
      background: rgba(255, 255, 255, 0.1);
    }
    .search-panel input::placeholder {
      color: rgba(255, 255, 255, 0.4);
    }
    .search-hint {
      margin-top: 8px;
      font-size: 11px;
      color: rgba(255, 255, 255, 0.45);
    }

    .detail-panel {
      position: absolute;
      right: 24px;
      bottom: 72px;
      width: 300px;
      padding: 20px;
      background: rgba(30, 58, 95, 0.65);
      border-radius: 16px;
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      z-index: 100;
      border: 1px solid rgba(255, 255, 255, 0.1);
      display: none;
      animation: fadeIn 0.4s ease;
    }
    .detail-panel.show {
      display: block;
    }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .detail-header {
      display: flex;
      align-items: center;
      gap: 14px;
      margin-bottom: 16px;
      padding-bottom: 14px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.1);
    }
    .detail-symbol {
      width: 56px;
      height: 56px;
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 28px;
      font-weight: 700;
      color: #fff;
    }
    .detail-titles h2 {
      font-size: 20px;
      margin-bottom: 2px;
    }
    .detail-titles p {
      font-size: 13px;
      color: rgba(255, 255, 255, 0.6);
    }
    .detail-info {
      font-size: 13px;
      line-height: 1.9;
    }
    .detail-info .label {
      color: rgba(255, 255, 255, 0.55);
      display: inline-block;
      width: 88px;
    }
    .detail-info .value {
      color: #fff;
    }
    .show-reactions-btn {
      margin-top: 16px;
      width: 100%;
      padding: 10px;
      border: none;
      border-radius: 10px;
      background: linear-gradient(135deg, #FF9F43, #FF6B6B);
      color: #fff;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s ease;
    }
    .show-reactions-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(255, 107, 107, 0.4);
    }

    .filter-bar {
      position: absolute;
      left: 0;
      bottom: 0;
      width: 100%;
      height: 48px;
      background: #2D3748;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      z-index: 90;
      padding: 0 20px;
    }
    .filter-tag {
      padding: 6px 14px;
      border-radius: 16px;
      font-size: 12px;
      cursor: pointer;
      background: rgba(255, 255, 255, 0.06);
      color: rgba(255, 255, 255, 0.7);
      transition: all 0.4s ease-in-out;
      user-select: none;
    }
    .filter-tag:hover {
      background: rgba(255, 255, 255, 0.12);
      color: #fff;
    }
    .filter-tag.active {
      background: #4A90D9;
      color: #fff;
      box-shadow: 0 2px 10px rgba(74, 144, 217, 0.5);
    }
    .filter-tag.inactive {
      opacity: 0.4;
    }

    .element-label {
      position: absolute;
      pointer-events: none;
      color: #fff;
      font-size: 18px;
      font-weight: 700;
      text-shadow: 0 2px 8px rgba(0, 0, 0, 0.8);
      padding: 6px 12px;
      background: rgba(0, 0, 0, 0.6);
      border-radius: 8px;
      white-space: nowrap;
      transform: translate(-50%, -50%);
      transition: opacity 0.2s ease;
      opacity: 0;
      z-index: 50;
    }
    .element-label.show {
      opacity: 1;
    }
    .element-label small {
      display: block;
      font-size: 12px;
      font-weight: 400;
      opacity: 0.8;
      margin-top: 2px;
    }

    .reaction-label {
      position: absolute;
      pointer-events: none;
      color: #fff;
      font-size: 12px;
      padding: 4px 10px;
      background: rgba(0, 0, 0, 0.75);
      border-radius: 6px;
      white-space: nowrap;
      transform: translate(-50%, -50%);
      z-index: 50;
      opacity: 0;
      transition: opacity 0.3s ease;
    }
    .reaction-label.show {
      opacity: 1;
    }

    .close-btn {
      position: absolute;
      top: 12px;
      right: 14px;
      width: 24px;
      height: 24px;
      border: none;
      background: rgba(255, 255, 255, 0.1);
      color: rgba(255, 255, 255, 0.6);
      border-radius: 6px;
      cursor: pointer;
      font-size: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s ease;
    }
    .close-btn:hover {
      background: rgba(255, 255, 255, 0.2);
      color: #fff;
    }
  </style>
</head>
<body>
  <div id="app">
    <div class="search-panel">
      <h3>🔍 全局搜索</h3>
      <input type="text" id="searchInput" placeholder="输入元素符号或名称，如 Na 或 Sodium" />
      <div class="search-hint">支持符号、英文名、中文名搜索</div>
    </div>

    <div class="detail-panel" id="detailPanel">
      <button class="close-btn" id="closeDetail">×</button>
      <div class="detail-header">
        <div class="detail-symbol" id="detailSymbol">H</div>
        <div class="detail-titles">
          <h2 id="detailNameCN">氢</h2>
          <p id="detailNameEN">Hydrogen</p>
        </div>
      </div>
      <div class="detail-info">
        <div><span class="label">原子序数</span><span class="value" id="detailNumber">1</span></div>
        <div><span class="label">原子量</span><span class="value" id="detailMass">1.008</span></div>
        <div><span class="label">电子排布</span><span class="value" id="detailElectron">1s¹</span></div>
        <div><span class="label">常见化合价</span><span class="value" id="detailValence">+1, -1</span></div>
      </div>
      <button class="show-reactions-btn" id="showReactions">⚡ 显示反应伙伴</button>
    </div>

    <div class="filter-bar" id="filterBar"></div>
    <div class="element-label" id="elementLabel"></div>
    <div class="reaction-label" id="reactionLabel"></div>
  </div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
