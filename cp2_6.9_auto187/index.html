<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>碎镜重构 - 数字拼图</title>
  <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;600&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: linear-gradient(180deg, #0A0A2E 0%, #1A1A3E 100%);
      font-family: 'Fira Code', monospace;
    }

    #gameCanvas {
      display: block;
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
    }

    .glass-panel {
      position: absolute;
      background: rgba(255, 255, 255, 0.06);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      border: 1px solid rgba(255, 255, 255, 0.13);
      border-radius: 12px;
      color: #FFFFFF;
    }

    #startBtn {
      position: absolute;
      bottom: 30px;
      right: 40px;
      padding: 14px 28px;
      font-family: 'Fira Code', monospace;
      font-size: 16px;
      font-weight: 600;
      color: #FFFFFF;
      cursor: pointer;
      background: rgba(255, 255, 255, 0.10);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      border: 1px solid rgba(255, 255, 255, 0.20);
      border-radius: 12px;
      transition: transform 0.2s ease, box-shadow 0.2s ease;
    }

    #startBtn:hover {
      transform: scale(1.1);
      box-shadow: 4px 4px 12px rgba(0, 0, 0, 0.38);
    }

    #startBtn:active {
      transform: scale(0.95);
    }

    #regenerateBtn {
      position: absolute;
      top: 24px;
      left: 24px;
      padding: 10px 20px;
      font-family: 'Fira Code', monospace;
      font-size: 14px;
      font-weight: 600;
      color: #FFFFFF;
      cursor: pointer;
      background: rgba(255, 255, 255, 0.10);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      border: 1px solid rgba(255, 255, 255, 0.20);
      border-radius: 12px;
      transition: transform 0.2s ease, box-shadow 0.2s ease;
      z-index: 10;
    }

    #regenerateBtn:hover {
      transform: scale(1.1);
      box-shadow: 4px 4px 12px rgba(0, 0, 0, 0.38);
    }

    #regenerateBtn:active {
      transform: scale(0.95);
    }

    #counterPanel {
      position: absolute;
      top: 24px;
      right: 24px;
      padding: 14px 18px;
      font-family: 'Fira Code', monospace;
      color: #FFFFFF;
      background: rgba(0, 0, 0, 0.50);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      border: 1px solid rgba(255, 255, 255, 0.13);
      border-radius: 12px;
      z-index: 10;
    }

    #counterPanel .label {
      font-size: 12px;
      opacity: 0.7;
      margin-bottom: 6px;
    }

    #counterPanel .numbers {
      font-size: 22px;
      font-weight: 600;
      margin-bottom: 10px;
    }

    #progressBar {
      width: 200px;
      height: 8px;
      background: #333333;
      border-radius: 4px;
      overflow: hidden;
    }

    #progressFill {
      height: 100%;
      width: 0%;
      background: #FF6B6B;
      border-radius: 4px;
      transition: width 0.3s ease, background-color 0.3s ease;
    }

    #hintPanel {
      position: absolute;
      top: 24px;
      right: 260px;
      padding: 14px 18px;
      font-family: 'Fira Code', monospace;
      font-size: 12px;
      line-height: 1.8;
      color: #FFFFFF;
      background: rgba(255, 255, 255, 0.06);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      border: 1px solid rgba(255, 255, 255, 0.13);
      border-radius: 12px;
      z-index: 10;
    }

    #hintPanel .title {
      font-size: 14px;
      font-weight: 600;
      margin-bottom: 8px;
      opacity: 0.9;
    }

    #hintPanel .tip {
      opacity: 0.65;
    }
  </style>
</head>
<body>
  <canvas id="gameCanvas"></canvas>

  <button id="regenerateBtn">🔄 重新生成</button>

  <div id="counterPanel">
    <div class="label">碎片回收进度</div>
    <div class="numbers"><span id="collectedCount">0</span> / <span id="totalCount">0</span></div>
    <div id="progressBar"><div id="progressFill"></div></div>
  </div>

  <div id="hintPanel">
    <div class="title">操作提示</div>
    <div class="tip">🖱️ 拖拽碎片移动</div>
    <div class="tip">📥 拖到底部回收区</div>
    <div class="tip">✨ 全部回收自动重组</div>
  </div>

  <button id="startBtn">✨ 开始分割</button>

  <script type="module" src="/src/main.ts"></script>
</body>
</html>
