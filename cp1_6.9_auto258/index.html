<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>浮游灯塔 Floating Lighthouse</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    html, body {
      width: 100%;
      height: 100%;
      background: #000;
      overflow: hidden;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    }
    canvas {
      display: block;
      width: 100%;
      height: 100%;
    }
    #hint {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%);
      color: rgba(180, 220, 255, 0.6);
      font-size: 13px;
      letter-spacing: 2px;
      pointer-events: none;
      text-shadow: 0 0 12px rgba(100, 180, 255, 0.4);
      user-select: none;
    }
  </style>
</head>
<body>
  <div id="hint">拖拽旋转视角 · 滚轮缩放 · 点击灯塔激活</div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
