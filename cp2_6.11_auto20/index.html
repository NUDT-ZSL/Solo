<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>烛影谜廊</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #2C1810;
    }

    #app {
      position: relative;
      width: 100%;
      height: 100%;
    }

    canvas {
      display: block;
      width: 100%;
      height: 100%;
      cursor: crosshair;
    }

    #loading-screen {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: linear-gradient(180deg, #2C1810 0%, #3D1C10 100%);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 100;
      transition: opacity 1.2s ease-out;
    }

    #loading-screen.fade-out {
      opacity: 0;
      pointer-events: none;
    }

    .loading-title {
      font-family: 'Georgia', 'SimSun', serif;
      font-size: 48px;
      color: #FFB347;
      letter-spacing: 12px;
      text-shadow: 0 0 30px rgba(255, 179, 71, 0.5);
      margin-bottom: 50px;
      animation: titleGlow 2s ease-in-out infinite alternate;
    }

    @keyframes titleGlow {
      from {
        text-shadow: 0 0 20px rgba(255, 179, 71, 0.3);
      }
      to {
        text-shadow: 0 0 40px rgba(255, 179, 71, 0.6), 0 0 60px rgba(255, 109, 0, 0.3);
      }
    }

    .loading-bar-container {
      width: 300px;
      height: 4px;
      background: rgba(255, 179, 71, 0.15);
      border-radius: 2px;
      overflow: hidden;
      position: relative;
    }

    .loading-bar {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, #FF6D00, #FFB347, #FF6D00);
      background-size: 200% 100%;
      border-radius: 2px;
      animation: shimmer 1.5s ease-in-out infinite;
      box-shadow: 0 0 10px rgba(255, 179, 71, 0.6);
    }

    @keyframes shimmer {
      0% {
        background-position: -200% 0;
      }
      100% {
        background-position: 200% 0;
      }
    }

    .loading-text {
      margin-top: 20px;
      font-family: 'Georgia', 'SimSun', serif;
      font-size: 14px;
      color: rgba(255, 179, 71, 0.6);
      letter-spacing: 4px;
    }
  </style>
</head>
<body>
  <div id="app">
    <div id="loading-screen">
      <div class="loading-title">烛影谜廊</div>
      <div class="loading-bar-container">
        <div class="loading-bar" id="loading-bar"></div>
      </div>
      <div class="loading-text">正在点燃烛火...</div>
    </div>
    <canvas id="game-canvas"></canvas>
  </div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
