<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="theme-color" content="#0a0e27" />
  <title>音轨捕手 · Sonic Tracker</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #0a0e27;
      touch-action: none;
      -webkit-touch-callout: none;
      -webkit-user-select: none;
      user-select: none;
    }
    #app {
      width: 100vw;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
    }
    canvas {
      display: block;
      border-radius: 4px;
      box-shadow: 0 0 60px rgba(0, 255, 255, 0.15), 0 0 120px rgba(100, 0, 200, 0.1);
    }
    @font-face {
      font-family: 'OrbitronFallback';
      src: local('Orbitron'), local('Share Tech Mono'), local('Courier New');
    }
  </style>
</head>
<body>
  <div id="app">
    <canvas id="game-canvas"></canvas>
  </div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
