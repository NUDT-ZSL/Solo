<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>3D 折纸探索器 | Origami Explorer</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: linear-gradient(135deg, #2a2a2a 0%, #1a1a1a 100%);
    }
    #app {
      width: 100%;
      height: 100%;
      position: relative;
    }
    #canvas-container {
      position: absolute;
      top: 0;
      left: 20%;
      width: 80%;
      height: 100%;
    }
    .toolbar {
      position: absolute;
      left: 20px;
      top: 50%;
      transform: translateY(-50%);
      display: flex;
      flex-direction: column;
      gap: 16px;
      z-index: 100;
    }
    .tool-btn {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      border: none;
      background: #333;
      color: #fff;
      font-size: 14px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 300ms ease;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.3);
      position: relative;
    }
    .tool-btn:hover {
      width: 44px;
      height: 44px;
      box-shadow: 0 6px 20px rgba(0, 212, 255, 0.4);
      transform: scale(1.1);
    }
    .tool-btn .tooltip {
      position: absolute;
      left: 52px;
      top: 50%;
      transform: translateY(-50%);
      background: rgba(0, 0, 0, 0.8);
      color: #fff;
      padding: 6px 10px;
      border-radius: 4px;
      font-size: 12px;
      white-space: nowrap;
      opacity: 0;
      pointer-events: none;
      transition: opacity 300ms ease;
    }
    .tool-btn:hover .tooltip {
      opacity: 1;
    }
    .status-panel {
      position: absolute;
      right: 20px;
      bottom: 20px;
      background: rgba(0, 0, 0, 0.6);
      color: #fff;
      padding: 12px 16px;
      border-radius: 8px;
      font-size: 12px;
      line-height: 1.6;
      z-index: 100;
      backdrop-filter: blur(8px);
    }
    .status-panel .stat {
      display: flex;
      justify-content: space-between;
      gap: 16px;
    }
    .status-panel .stat-label {
      color: #aaa;
    }
    .status-panel .stat-value {
      color: #00d4ff;
      font-weight: 600;
    }
    .info-panel {
      position: absolute;
      left: 50%;
      top: 20px;
      transform: translateX(-50%);
      background: rgba(0, 0, 0, 0.6);
      color: #fff;
      padding: 10px 20px;
      border-radius: 8px;
      font-size: 13px;
      z-index: 100;
      backdrop-filter: blur(8px);
      display: none;
    }
    .info-panel.visible {
      display: block;
      animation: fadeIn 300ms ease;
    }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateX(-50%) translateY(-10px); }
      to { opacity: 1; transform: translateX(-50%) translateY(0); }
    }
    .model-selector {
      position: absolute;
      top: 20px;
      left: 20px;
      background: rgba(0, 0, 0, 0.6);
      padding: 10px;
      border-radius: 8px;
      z-index: 100;
      backdrop-filter: blur(8px);
    }
    .model-selector label {
      color: #fff;
      font-size: 12px;
      margin-right: 8px;
    }
    .model-selector select {
      background: #333;
      color: #fff;
      border: 1px solid #555;
      border-radius: 4px;
      padding: 4px 8px;
      font-size: 12px;
      cursor: pointer;
    }
    .hamburger {
      display: none;
      position: absolute;
      top: 16px;
      left: 16px;
      width: 40px;
      height: 40px;
      border-radius: 8px;
      background: #333;
      border: none;
      cursor: pointer;
      z-index: 200;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 5px;
    }
    .hamburger span {
      display: block;
      width: 20px;
      height: 2px;
      background: #fff;
      transition: all 300ms ease;
    }
    @media (max-width: 768px) {
      #canvas-container {
        left: 0;
        width: 100%;
      }
      .hamburger {
        display: flex;
      }
      .toolbar {
        left: 16px;
        top: 66px;
        transform: none;
        opacity: 0;
        pointer-events: none;
        transition: opacity 300ms ease;
      }
      .toolbar.mobile-open {
        opacity: 1;
        pointer-events: auto;
      }
      .model-selector {
        top: 16px;
        left: 66px;
      }
    }
  </style>
</head>
<body>
  <div id="app">
    <button class="hamburger" id="hamburger" aria-label="菜单">
      <span></span>
      <span></span>
      <span></span>
    </button>
    <div class="model-selector">
      <label for="modelSelect">模型：</label>
      <select id="modelSelect">
        <option value="crane">纸鹤</option>
        <option value="lily">百合花</option>
      </select>
    </div>
    <div class="toolbar" id="toolbar">
      <button class="tool-btn" id="btnUnfold" title="展开">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M4 4h16v4H4z"/>
          <path d="M4 10h16v10H4z"/>
        </svg>
        <span class="tooltip">展开 (U)</span>
      </button>
      <button class="tool-btn" id="btnRestore" title="还原">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/>
          <path d="M3 3v5h5"/>
        </svg>
        <span class="tooltip">还原 (R)</span>
      </button>
      <button class="tool-btn" id="btnSave" title="保存">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/>
          <polyline points="17 21 17 13 7 13 7 21"/>
          <polyline points="7 3 7 8 15 8"/>
        </svg>
        <span class="tooltip">保存 (S)</span>
      </button>
    </div>
    <div id="canvas-container"></div>
    <div class="status-panel" id="statusPanel">
      <div class="stat">
        <span class="stat-label">折叠折痕数：</span>
        <span class="stat-value" id="creaseCount">0</span>
      </div>
      <div class="stat">
        <span class="stat-label">撤销步数：</span>
        <span class="stat-value" id="undoCount">0</span>
      </div>
    </div>
    <div class="info-panel" id="infoPanel"></div>
  </div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
