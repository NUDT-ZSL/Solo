<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>幻音方块 - Phantom Sound Blocks</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      font-family: 'Courier New', Consolas, monospace;
    }

    body {
      background: radial-gradient(ellipse at center, #121224 0%, #0A0A14 100%);
    }

    #gameCanvas {
      display: block;
      width: 100vw;
      height: 100vh;
    }

    #ui-layer {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 10;
    }

    #stats {
      position: absolute;
      top: 24px;
      left: 24px;
      color: #B0B0C0;
      font-family: 'Courier New', Consolas, monospace;
      font-size: 18px;
      line-height: 1.6;
      letter-spacing: 1px;
      user-select: none;
    }

    #stats .label {
      opacity: 0.6;
      font-size: 14px;
    }

    #stats .value {
      font-size: 28px;
      font-weight: bold;
    }

    #stats .value.danger {
      color: #FF3366;
      transition: color 0.3s ease;
    }

    #controls {
      position: absolute;
      bottom: 24px;
      right: 24px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      align-items: flex-end;
      pointer-events: auto;
    }

    #startBtn {
      padding: 14px 32px;
      font-size: 16px;
      font-family: 'Courier New', Consolas, monospace;
      font-weight: bold;
      color: #FFFFFF;
      background: linear-gradient(135deg, #00D4FF 0%, #A855F7 100%);
      border: none;
      border-radius: 8px;
      cursor: pointer;
      letter-spacing: 2px;
      box-shadow: 0 0 20px rgba(0, 212, 255, 0.3), 0 0 40px rgba(168, 85, 247, 0.2);
      transition: all 0.2s ease;
    }

    #startBtn:hover {
      transform: translateY(-2px);
      box-shadow: 0 0 30px rgba(0, 212, 255, 0.5), 0 0 60px rgba(168, 85, 247, 0.3);
    }

    #startBtn:active {
      transform: translateY(0);
    }

    #difficultySelect {
      padding: 10px 16px;
      font-size: 14px;
      font-family: 'Courier New', Consolas, monospace;
      color: #B0B0C0;
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.15);
      border-radius: 6px;
      cursor: pointer;
      outline: none;
      letter-spacing: 1px;
    }

    #difficultySelect:hover {
      background: rgba(255, 255, 255, 0.1);
      border-color: rgba(0, 212, 255, 0.4);
    }

    #difficultySelect option {
      background: #121224;
      color: #B0B0C0;
    }

    #gameOverModal {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      padding: 40px 60px;
      background: rgba(0, 0, 0, 0.8);
      border-radius: 16px;
      text-align: center;
      color: #FFFFFF;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.4s ease;
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255, 255, 255, 0.1);
    }

    #gameOverModal.visible {
      opacity: 1;
      pointer-events: auto;
    }

    #gameOverModal h2 {
      font-size: 28px;
      margin-bottom: 16px;
      letter-spacing: 3px;
      background: linear-gradient(135deg, #00D4FF 0%, #A855F7 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    #finalScore {
      font-size: 56px;
      font-weight: bold;
      margin-bottom: 24px;
      font-family: 'Courier New', Consolas, monospace;
    }

    #restartBtn {
      padding: 14px 40px;
      font-size: 16px;
      font-family: 'Courier New', Consolas, monospace;
      font-weight: bold;
      color: #FFFFFF;
      background: linear-gradient(135deg, #00D4FF 0%, #A855F7 100%);
      border: none;
      border-radius: 8px;
      cursor: pointer;
      letter-spacing: 2px;
      box-shadow: 0 0 20px rgba(0, 212, 255, 0.3);
      transition: all 0.2s ease;
    }

    #restartBtn:hover {
      transform: translateY(-2px);
      box-shadow: 0 0 30px rgba(0, 212, 255, 0.5);
    }
  </style>
</head>
<body>
  <canvas id="gameCanvas"></canvas>

  <div id="ui-layer">
    <div id="stats">
      <div>
        <div class="label">得分 SCORE</div>
        <div class="value" id="scoreDisplay">0</div>
      </div>
      <div style="margin-top: 12px;">
        <div class="label">倒计时 TIME</div>
        <div class="value" id="timeDisplay">30</div>
      </div>
    </div>

    <div id="controls">
      <select id="difficultySelect">
        <option value="easy">简单 Easy (3×4)</option>
        <option value="normal" selected>普通 Normal (4×4)</option>
        <option value="hard">困难 Hard (4×5)</option>
      </select>
      <button id="startBtn">开始游戏 START</button>
    </div>

    <div id="gameOverModal">
      <h2>游戏结束 GAME OVER</h2>
      <div id="finalScore">0</div>
      <button id="restartBtn">再来一次 RETRY</button>
    </div>
  </div>

  <script type="module" src="/src/Main.ts"></script>
</body>
</html>
