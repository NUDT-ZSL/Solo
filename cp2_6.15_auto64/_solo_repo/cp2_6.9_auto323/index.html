<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>星尘回声 - Stardust Echo</title>
  <style>
    *, *::before, *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', sans-serif;
    }

    body {
      background: radial-gradient(ellipse at center, #141E30 0%, #0A0E17 100%);
    }

    #app {
      width: 100vw;
      height: 100vh;
      position: relative;
    }

    #canvas-container {
      width: 100%;
      height: 100%;
      position: absolute;
      top: 0;
      left: 0;
    }

    #event-toast {
      position: absolute;
      top: 30px;
      left: 50%;
      transform: translateX(-50%);
      color: #A8C8FF;
      font-size: 16px;
      font-weight: 500;
      letter-spacing: 1px;
      padding: 10px 24px;
      background: rgba(15, 20, 25, 0.7);
      border: 1px solid rgba(100, 150, 255, 0.3);
      border-radius: 8px;
      backdrop-filter: blur(10px);
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.4s ease;
      z-index: 10;
    }

    #event-toast.show {
      opacity: 1;
    }
  </style>
</head>
<body>
  <div id="app">
    <div id="canvas-container"></div>
    <div id="event-toast"></div>
  </div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
