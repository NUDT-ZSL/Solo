<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>3D点云雕塑重建</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #0b0b1a;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      color: #ffffff;
    }

    #app {
      width: 100vw;
      height: 100vh;
      position: relative;
    }

    #canvas-container {
      width: 100%;
      height: 100%;
      position: absolute;
      top: 0;
      left: 0;
      background: linear-gradient(180deg, #0b0b1a 0%, #1a1a2e 100%);
    }

    canvas {
      display: block;
    }

    .navbar {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 50px;
      background: rgba(20, 20, 40, 0.85);
      backdrop-filter: blur(10px);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 100;
      border-bottom: 1px solid rgba(0, 212, 255, 0.3);
    }

    .navbar h1 {
      font-size: 16px;
      font-weight: 500;
      color: #00d4ff;
      letter-spacing: 2px;
    }

    .panel {
      position: absolute;
      top: 70px;
      background: rgba(20, 20, 40, 0.8);
      backdrop-filter: blur(10px);
      border: 1px solid #00d4ff;
      border-radius: 12px;
      padding: 20px;
      z-index: 50;
      transition: opacity 0.3s ease, transform 0.3s ease;
    }

    .panel-left {
      left: 20px;
      width: 280px;
    }

    .panel-right {
      right: 20px;
      width: 220px;
      background: rgba(20, 20, 40, 0.85);
      border-radius: 10px;
    }

    .panel.hidden {
      opacity: 0;
      pointer-events: none;
      transform: translateX(-20px);
    }

    .panel-right.hidden {
      transform: translateX(20px);
    }

    .panel-title {
      font-size: 14px;
      font-weight: 600;
      color: #00d4ff;
      margin-bottom: 16px;
      padding-bottom: 10px;
      border-bottom: 1px solid rgba(0, 212, 255, 0.3);
      letter-spacing: 1px;
    }

    .info-row {
      display: flex;
      justify-content: space-between;
      margin-bottom: 10px;
      font-size: 13px;
    }

    .info-label {
      color: #8888aa;
    }

    .info-value {
      color: #ffffff;
      font-family: 'Courier New', monospace;
    }

    .info-section {
      margin-top: 16px;
      padding-top: 12px;
      border-top: 1px solid rgba(0, 212, 255, 0.2);
    }

    .color-preview {
      width: 30px;
      height: 20px;
      border-radius: 4px;
      border: 1px solid rgba(255, 255, 255, 0.3);
      display: inline-block;
      vertical-align: middle;
    }

    .mode-btn {
      display: block;
      width: 100%;
      padding: 10px 16px;
      margin-bottom: 8px;
      background: rgba(0, 212, 255, 0.1);
      border: 1px solid rgba(0, 212, 255, 0.5);
      border-radius: 8px;
      color: #00d4ff;
      font-size: 13px;
      cursor: pointer;
      transition: all 0.2s ease;
      text-align: left;
    }

    .mode-btn:hover {
      background: rgba(0, 212, 255, 0.2);
      border-color: #00ffff;
      color: #00ffff;
    }

    .mode-btn:active {
      transform: scale(0.97);
      transition: transform 0.1s ease;
    }

    .mode-btn.active {
      background: rgba(0, 212, 255, 0.3);
      border-color: #00ffff;
      color: #00ffff;
    }

    .slider-group {
      margin-bottom: 16px;
    }

    .slider-label {
      font-size: 12px;
      color: #8888aa;
      margin-bottom: 6px;
      display: flex;
      justify-content: space-between;
    }

    .slider-label span:last-child {
      color: #00d4ff;
      font-family: 'Courier New', monospace;
    }

    input[type="range"] {
      width: 100%;
      height: 6px;
      border-radius: 3px;
      background: rgba(0, 212, 255, 0.2);
      outline: none;
      -webkit-appearance: none;
      cursor: pointer;
    }

    input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 16px;
      height: 16px;
      border-radius: 50%;
      background: #00d4ff;
      cursor: pointer;
      transition: background 0.2s ease;
    }

    input[type="range"]::-webkit-slider-thumb:hover {
      background: #00ffff;
    }

    .action-btn {
      display: block;
      width: 100%;
      padding: 12px 16px;
      margin-top: 12px;
      background: rgba(0, 212, 255, 0.15);
      border: 1px solid #00d4ff;
      border-radius: 8px;
      color: #00d4ff;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s ease;
    }

    .action-btn:hover {
      background: rgba(0, 212, 255, 0.3);
      border-color: #00ffff;
      color: #00ffff;
    }

    .action-btn:active {
      transform: scale(0.97);
      transition: transform 0.1s ease;
    }

    .action-btn.active {
      background: rgba(255, 107, 107, 0.2);
      border-color: #ff6b6b;
      color: #ff6b6b;
    }

    .progress-container {
      position: absolute;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      width: 400px;
      height: 8px;
      background: rgba(20, 20, 40, 0.8);
      border: 1px solid rgba(0, 212, 255, 0.5);
      border-radius: 4px;
      overflow: hidden;
      z-index: 50;
    }

    .progress-bar {
      height: 100%;
      background: linear-gradient(90deg, #00d4ff, #00ffff);
      width: 0%;
      transition: width 0.1s linear;
    }

    .progress-label {
      position: absolute;
      bottom: 35px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 11px;
      color: #00d4ff;
      font-family: 'Courier New', monospace;
      z-index: 50;
    }

    .toggle-btn {
      position: absolute;
      top: 70px;
      width: 36px;
      height: 36px;
      background: rgba(20, 20, 40, 0.9);
      border: 1px solid #00d4ff;
      border-radius: 8px;
      color: #00d4ff;
      cursor: pointer;
      z-index: 60;
      display: none;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      transition: all 0.2s ease;
    }

    .toggle-btn:hover {
      color: #00ffff;
      border-color: #00ffff;
    }

    .toggle-btn-left {
      left: 10px;
    }

    .toggle-btn-right {
      right: 10px;
    }

    .empty-state {
      color: #555577;
      font-size: 12px;
      text-align: center;
      padding: 20px 0;
      font-style: italic;
    }

    @media (max-width: 768px) {
      .panel {
        width: calc(100% - 40px) !important;
        top: 70px;
      }

      .panel-left {
        left: 20px;
        right: 20px;
      }

      .panel-right {
        left: 20px;
        right: 20px;
        top: auto;
        bottom: 60px;
      }

      .panel.hidden {
        opacity: 0;
        pointer-events: none;
        transform: translateY(-20px);
      }

      .panel-right.hidden {
        transform: translateY(20px);
      }

      .toggle-btn {
        display: flex;
      }

      .progress-container {
        width: calc(100% - 60px);
      }

      .navbar h1 {
        font-size: 14px;
      }
    }
  </style>
</head>
<body>
  <div id="app">
    <div id="canvas-container"></div>

    <nav class="navbar">
      <h1>3D 点云雕塑重建系统</h1>
    </nav>

    <button class="toggle-btn toggle-btn-left" id="toggle-left">◀</button>
    <button class="toggle-btn toggle-btn-right" id="toggle-right">▶</button>

    <aside class="panel panel-left" id="panel-left">
      <div class="panel-title">粒子信息</div>
      <div id="particle-info">
        <div class="empty-state">点击任意粒子查看详细信息</div>
      </div>
    </aside>

    <aside class="panel panel-right" id="panel-right">
      <div class="panel-title">着色工具</div>
      
      <div class="slider-group" id="custom-sliders" style="display:none;">
        <div class="slider-label">
          <span>最低色相</span>
          <span id="hue-min-val">0°</span>
        </div>
        <input type="range" id="hue-min" min="0" max="360" value="30">
        
        <div class="slider-label" style="margin-top:12px;">
          <span>最高色相</span>
          <span id="hue-max-val">0°</span>
        </div>
        <input type="range" id="hue-max" min="0" max="360" value="200">
      </div>

      <button class="action-btn" id="auto-rotate-btn">自动旋转</button>
    </aside>

    <div class="progress-label" id="progress-label">0°</div>
    <div class="progress-container">
      <div class="progress-bar" id="progress-bar"></div>
    </div>
  </div>

  <script type="module" src="/src/main.ts"></script>
</body>
</html>
