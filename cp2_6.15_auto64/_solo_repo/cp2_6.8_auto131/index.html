<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>3D 流动星系粒子生成器</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #0D0D1A;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    }

    #app {
      width: 100%;
      height: 100%;
      position: relative;
    }

    canvas {
      display: block;
    }

    .control-panel {
      position: fixed;
      top: 20px;
      right: 20px;
      width: 260px;
      background: rgba(30, 30, 50, 0.7);
      border: 1px solid rgba(255, 255, 255, 0.15);
      border-radius: 12px;
      padding: 20px;
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      z-index: 100;
      color: #fff;
      max-height: calc(100vh - 40px);
      overflow-y: auto;
    }

    .control-panel h2 {
      font-size: 16px;
      font-weight: 600;
      margin-bottom: 20px;
      color: #fff;
      letter-spacing: 0.5px;
    }

    .control-group {
      margin-bottom: 16px;
    }

    .control-group label {
      display: block;
      font-size: 14px;
      color: #fff;
      margin-bottom: 12px;
      font-weight: 400;
    }

    .control-group .value-display {
      float: right;
      color: #63B3ED;
      font-size: 13px;
      font-weight: 500;
    }

    input[type="range"] {
      -webkit-appearance: none;
      appearance: none;
      width: 100%;
      height: 6px;
      background: rgba(255, 255, 255, 0.1);
      border-radius: 3px;
      outline: none;
      cursor: pointer;
    }

    input[type="range"]::-webkit-slider-runnable-track {
      height: 6px;
      background: rgba(255, 255, 255, 0.1);
      border-radius: 3px;
    }

    input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none;
      appearance: none;
      width: 16px;
      height: 16px;
      background: #63B3ED;
      border-radius: 50%;
      cursor: pointer;
      margin-top: -5px;
      transition: transform 0.15s ease, background 0.15s ease;
    }

    input[type="range"]::-webkit-slider-thumb:hover {
      background: #3182CE;
      transform: scale(1.2);
    }

    input[type="range"]:active::-webkit-slider-thumb {
      background: #3182CE;
      transform: scale(1.2);
    }

    input[type="range"]::-moz-range-track {
      height: 6px;
      background: rgba(255, 255, 255, 0.1);
      border-radius: 3px;
    }

    input[type="range"]::-moz-range-thumb {
      width: 16px;
      height: 16px;
      background: #63B3ED;
      border-radius: 50%;
      cursor: pointer;
      border: none;
      transition: transform 0.15s ease, background 0.15s ease;
    }

    input[type="range"]::-moz-range-thumb:hover {
      background: #3182CE;
      transform: scale(1.2);
    }

    .color-picker-wrapper {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .color-picker-btn {
      width: 30px;
      height: 30px;
      border-radius: 6px;
      border: 2px solid rgba(255, 255, 255, 0.3);
      cursor: pointer;
      padding: 0;
      background: none;
      position: relative;
    }

    .color-picker-btn .color-inner {
      width: 100%;
      height: 100%;
      border-radius: 4px;
      display: block;
    }

    .color-picker-btn:hover {
      border-color: #63B3ED;
    }

    .color-presets {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
      margin-top: 10px;
    }

    .color-preset {
      width: 20px;
      height: 20px;
      border-radius: 4px;
      cursor: pointer;
      border: 1px solid rgba(255, 255, 255, 0.2);
      transition: transform 0.15s ease, border-color 0.15s ease;
    }

    .color-preset:hover {
      transform: scale(1.15);
      border-color: #fff;
    }

    .color-preset.active {
      border-color: #fff;
      box-shadow: 0 0 0 2px #63B3ED;
    }

    .particle-info {
      margin-top: 20px;
      padding-top: 16px;
      border-top: 1px solid rgba(255, 255, 255, 0.1);
    }

    .particle-info h3 {
      font-size: 14px;
      font-weight: 600;
      margin-bottom: 12px;
      color: #F6E05E;
    }

    .particle-info .info-row {
      display: flex;
      justify-content: space-between;
      font-size: 13px;
      margin-bottom: 8px;
      color: rgba(255, 255, 255, 0.85);
    }

    .particle-info .info-row .label {
      color: rgba(255, 255, 255, 0.6);
    }

    .particle-info .no-selection {
      font-size: 12px;
      color: rgba(255, 255, 255, 0.5);
      font-style: italic;
    }

    @media (max-width: 768px) {
      .control-panel {
        top: auto;
        right: 0;
        bottom: 0;
        left: 0;
        width: 100%;
        height: 150px;
        max-height: 150px;
        border-radius: 12px 12px 0 0;
        display: flex;
        flex-direction: column;
        overflow-y: auto;
      }

      .control-panel h2 {
        margin-bottom: 12px;
        font-size: 14px;
      }

      .controls-container {
        display: flex;
        gap: 16px;
        flex-wrap: nowrap;
        overflow-x: auto;
      }

      .control-group {
        flex-shrink: 0;
        min-width: 140px;
        margin-bottom: 0;
      }

      .particle-info {
        margin-top: 12px;
        padding-top: 10px;
      }
    }
  </style>
</head>
<body>
  <div id="app"></div>
  <div class="control-panel" id="controlPanel">
    <h2>🌌 星系控制面板</h2>
    <div class="controls-container" id="controlsContainer">
      <div class="control-group">
        <label>粒子数量 <span class="value-display" id="countValue">3000</span></label>
        <input type="range" id="particleCount" min="500" max="6000" step="500" value="3000" />
      </div>
      <div class="control-group">
        <label>旋转速度 <span class="value-display" id="speedValue">0.10</span></label>
        <input type="range" id="rotationSpeed" min="0" max="0.5" step="0.01" value="0.1" />
      </div>
      <div class="control-group">
        <label>臂宽偏移 <span class="value-display" id="armValue">0.3</span></label>
        <input type="range" id="armWidth" min="0" max="1" step="0.1" value="0.3" />
      </div>
      <div class="control-group">
        <label>外围渐变色</label>
        <div class="color-picker-wrapper">
          <button class="color-picker-btn" id="colorPickerBtn">
            <span class="color-inner" id="colorPreview" style="background: #FC8181;"></span>
          </button>
          <span id="colorHex" style="font-size: 12px; color: rgba(255,255,255,0.7);">#FC8181</span>
        </div>
        <div class="color-presets" id="colorPresets">
          <div class="color-preset active" style="background: #FC8181;" data-color="#FC8181"></div>
          <div class="color-preset" style="background: #B794F4;" data-color="#B794F4"></div>
          <div class="color-preset" style="background: #63B3ED;" data-color="#63B3ED"></div>
          <div class="color-preset" style="background: #68D391;" data-color="#68D391"></div>
          <div class="color-preset" style="background: #F6AD55;" data-color="#F6AD55"></div>
          <div class="color-preset" style="background: #F687B3;" data-color="#F687B3"></div>
        </div>
      </div>
    </div>
    <div class="particle-info" id="particleInfo">
      <h3>✨ 粒子信息</h3>
      <div id="particleInfoContent">
        <p class="no-selection">点击星系中的粒子查看详情</p>
      </div>
    </div>
  </div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
