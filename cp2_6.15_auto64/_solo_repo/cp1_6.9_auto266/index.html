<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>光谱涟漪</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: linear-gradient(180deg, #0a0a1a 0%, #1a1a2e 100%);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    #app {
      position: relative;
      width: 100vw;
      height: 100vh;
    }

    #canvas {
      display: block;
      width: 100%;
      height: 100%;
      cursor: none;
    }

    #control-bar {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 40px;
      background: rgba(0, 0, 0, 0.3);
      display: flex;
      align-items: center;
      padding: 0 16px;
      gap: 12px;
      z-index: 100;
      transition: opacity 0.3s ease;
      opacity: 1;
    }

    #control-bar.faded {
      opacity: 0.1;
    }

    .ctrl-btn {
      height: 28px;
      padding: 0 14px;
      border: none;
      border-radius: 6px;
      background: rgba(255, 255, 255, 0.08);
      color: #ffffff;
      font-size: 13px;
      cursor: pointer;
      transition: background 0.2s ease;
      user-select: none;
    }

    .ctrl-btn:hover {
      background: rgba(255, 255, 255, 0.12);
      filter: brightness(1.5);
    }

    #wave-count {
      position: fixed;
      top: 52px;
      right: 16px;
      color: #ffffff;
      font-size: 14px;
      z-index: 99;
      pointer-events: none;
      font-variant-numeric: tabular-nums;
    }

    #custom-cursor {
      position: fixed;
      width: 16px;
      height: 16px;
      border-radius: 50%;
      border: 1px solid rgba(255, 255, 255, 1);
      background: rgba(255, 255, 255, 0.3);
      pointer-events: none;
      z-index: 1000;
      transform: translate(-50%, -50%);
      left: -100px;
      top: -100px;
    }
  </style>
</head>
<body>
  <div id="app">
    <div id="control-bar">
      <button id="reset-btn" class="ctrl-btn">重置</button>
      <button id="speed-btn" class="ctrl-btn">慢速 / 快速</button>
    </div>
    <div id="wave-count">0</div>
    <canvas id="canvas"></canvas>
    <div id="custom-cursor"></div>
  </div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
