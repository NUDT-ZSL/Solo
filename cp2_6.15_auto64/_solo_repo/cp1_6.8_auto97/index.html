<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
    <title>星尘回廊 — Stardust Corridor</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
    <style>
      *, *::before, *::after {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      html, body {
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: #0a0a2e;
        font-family: 'Rajdhani', sans-serif;
      }
      #canvas-container {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        z-index: 1;
      }
      #ui-overlay {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        z-index: 10;
        pointer-events: none;
      }
      #ui-overlay > * {
        pointer-events: auto;
      }
      #star-info {
        position: fixed;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        z-index: 20;
        pointer-events: none;
        opacity: 0;
        transition: opacity 0.3s ease;
        font-family: 'Orbitron', monospace;
        text-align: center;
        color: #fff;
      }
      #star-info.visible {
        opacity: 1;
      }
      #star-info .spectral-type {
        font-size: 28px;
        font-weight: 900;
        letter-spacing: 4px;
        text-shadow: 0 0 20px currentColor, 0 0 40px currentColor;
      }
      #star-info .brightness {
        font-size: 16px;
        font-weight: 400;
        margin-top: 6px;
        letter-spacing: 2px;
        color: rgba(255, 255, 255, 0.7);
      }
    </style>
  </head>
  <body>
    <div id="canvas-container"></div>
    <div id="ui-overlay"></div>
    <div id="star-info">
      <div class="spectral-type" id="info-spectral"></div>
      <div class="brightness" id="info-brightness"></div>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
