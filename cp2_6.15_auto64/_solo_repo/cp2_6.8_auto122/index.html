<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>熔岩地牢逃生</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      background: #1a202c;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      font-family: 'Courier New', monospace;
      overflow: hidden;
    }
    #game-container {
      position: relative;
      width: 800px;
      height: 600px;
    }
    #game-canvas {
      display: block;
      image-rendering: pixelated;
      image-rendering: crisp-edges;
    }
    #hud {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      padding: 10px 15px;
      background: rgba(0, 0, 0, 0.6);
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-family: 'Courier New', monospace;
      pointer-events: none;
    }
    #hud-left, #hud-center, #hud-right {
      display: flex;
      align-items: center;
      gap: 10px;
    }
    #hud-center {
      flex: 1;
      justify-content: center;
    }
    #hearts {
      color: #E53E3E;
      font-size: 18px;
      letter-spacing: 2px;
    }
    #warning {
      color: #E53E3E;
      font-size: 20px;
      opacity: 0;
      transition: opacity 0.1s;
    }
    #warning.visible {
      opacity: 1;
    }
    #keys {
      color: #F6E05E;
      font-size: 16px;
      font-weight: bold;
    }
    #timer {
      color: #ffffff;
      font-size: 16px;
    }
    #overlay {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      display: none;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      font-family: 'Courier New', monospace;
      pointer-events: none;
    }
    #overlay.active {
      display: flex;
    }
    #overlay.gameover {
      background: rgba(0, 0, 0, 0.75);
    }
    #overlay.victory-flash {
      background: #F6E05E;
    }
    #overlay.victory {
      background: rgba(0, 0, 0, 0.85);
    }
    #overlay-title {
      font-size: 64px;
      font-weight: bold;
      margin-bottom: 20px;
      letter-spacing: 4px;
    }
    #overlay.gameover #overlay-title {
      color: #ffffff;
    }
    #overlay.victory #overlay-title {
      color: #F6E05E;
    }
    #overlay-stats {
      font-size: 20px;
      color: #ffffff;
      margin-bottom: 30px;
      line-height: 1.8;
      text-align: center;
    }
    #overlay-hint {
      font-size: 16px;
      color: #A0AEC0;
      animation: blink 1s infinite;
    }
    @keyframes blink {
      0%, 50% { opacity: 1; }
      51%, 100% { opacity: 0.3; }
    }
  </style>
</head>
<body>
  <div id="game-container">
    <canvas id="game-canvas" width="800" height="600"></canvas>
    <div id="hud">
      <div id="hud-left">
        <span id="hearts"></span>
      </div>
      <div id="hud-center">
        <span id="warning">&#9650;</span>
      </div>
      <div id="hud-right">
        <span id="keys">钥匙: 0/3</span>
        <span id="timer">00:00</span>
      </div>
    </div>
    <div id="overlay">
      <div id="overlay-title"></div>
      <div id="overlay-stats"></div>
      <div id="overlay-hint">按 R 键重新开始</div>
    </div>
  </div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
