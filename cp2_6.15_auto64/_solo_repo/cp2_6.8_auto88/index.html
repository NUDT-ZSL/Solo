<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>节奏跑酷关卡编辑器</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #1A1A1E;
      color: #E0E0E0;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      overflow: hidden;
      height: 100vh;
    }

    #app {
      display: flex;
      width: 100vw;
      height: 100vh;
    }

    .left-spacer {
      flex: 0 0 auto;
      min-width: 20px;
    }

    .canvas-container {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 20px;
      min-width: 0;
    }

    .canvas-wrapper {
      position: relative;
      max-width: 100%;
      overflow-x: auto;
      overflow-y: hidden;
    }

    #gameCanvas {
      display: block;
      background: #2A2A2E;
      border: 1px solid #3D3D42;
      cursor: default;
    }

    #gameCanvas.tool-active {
      cursor: crosshair;
    }

    .timeline-wrapper {
      width: 1200px;
      max-width: 100%;
      margin-top: 4px;
      overflow-x: auto;
      overflow-y: hidden;
    }

    #timelineCanvas {
      display: block;
      background: #1E1E22;
      border: 1px solid #3D3D42;
      cursor: pointer;
    }

    #controlPanel {
      width: 250px;
      background: #222226;
      border-left: 1px solid #3D3D42;
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 16px;
      overflow-y: auto;
      flex-shrink: 0;
    }

    .panel-section {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .panel-title {
      font-size: 12px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: #888;
      margin-bottom: 4px;
    }

    .tool-buttons {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 8px;
    }

    .tool-btn {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 10px 6px;
      background: #333;
      border: 2px solid transparent;
      border-radius: 6px;
      color: #E0E0E0;
      cursor: pointer;
      transition: all 0.2s ease;
      font-size: 11px;
      gap: 6px;
    }

    .tool-btn:hover:not(:disabled) {
      background: #555;
    }

    .tool-btn:active:not(:disabled) {
      transform: scale(0.95);
    }

    .tool-btn:disabled {
      opacity: 0.4;
      cursor: not-allowed;
    }

    .tool-btn.active {
      border-color: #E0E0E0;
      background: #444;
    }

    .tool-icon {
      width: 24px;
      height: 24px;
      border-radius: 3px;
    }

    .btn {
      padding: 10px 16px;
      background: #333;
      border: none;
      border-radius: 6px;
      color: #E0E0E0;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s ease;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
    }

    .btn:hover:not(:disabled) {
      background: #555;
    }

    .btn:active:not(:disabled) {
      transform: scale(0.95);
    }

    .btn:disabled {
      opacity: 0.4;
      cursor: not-allowed;
    }

    .btn-primary {
      background: #3498DB;
    }

    .btn-primary:hover:not(:disabled) {
      background: #5DADE2;
    }

    .btn-danger {
      background: #E74C3C;
    }

    .btn-danger:hover:not(:disabled) {
      background: #EC7063;
    }

    .action-buttons {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }

    .undo-status {
      font-size: 12px;
      color: #888;
      text-align: center;
      padding: 8px;
      background: #1A1A1E;
      border-radius: 4px;
    }

    .level-list {
      display: flex;
      flex-direction: column;
      gap: 6px;
      max-height: 200px;
      overflow-y: auto;
    }

    .level-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 8px 10px;
      background: #1A1A1E;
      border-radius: 4px;
      font-size: 12px;
    }

    .level-item-name {
      flex: 1;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .level-item-actions {
      display: flex;
      gap: 4px;
    }

    .level-btn {
      padding: 4px 8px;
      background: #333;
      border: none;
      border-radius: 3px;
      color: #E0E0E0;
      font-size: 10px;
      cursor: pointer;
      transition: all 0.2s ease;
    }

    .level-btn:hover:not(:disabled) {
      background: #555;
    }

    .level-btn:disabled {
      opacity: 0.4;
      cursor: not-allowed;
    }

    .input-field {
      padding: 8px 10px;
      background: #1A1A1E;
      border: 1px solid #3D3D42;
      border-radius: 4px;
      color: #E0E0E0;
      font-size: 12px;
      outline: none;
    }

    .input-field:focus {
      border-color: #3498DB;
    }

    .save-row {
      display: flex;
      gap: 6px;
    }

    .save-row .input-field {
      flex: 1;
    }

    .flash-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      background: rgba(231, 76, 60, 0.5);
      pointer-events: none;
      opacity: 0;
      z-index: 1000;
    }

    .flash-overlay.active {
      animation: flashRed 0.2s ease-out;
    }

    @keyframes flashRed {
      0% { opacity: 0; }
      50% { opacity: 1; }
      100% { opacity: 0; }
    }

    .empty-levels {
      font-size: 11px;
      color: #666;
      text-align: center;
      padding: 12px;
    }

    .key-hint {
      font-size: 10px;
      color: #666;
      text-align: center;
      margin-top: 4px;
    }

    @media (max-width: 900px) {
      #app {
        flex-direction: column;
      }

      .left-spacer {
        display: none;
      }

      #controlPanel {
        width: 100%;
        height: auto;
        max-height: 40vh;
        border-left: none;
        border-top: 1px solid #3D3D42;
        flex-direction: row;
        flex-wrap: wrap;
        padding: 12px;
        overflow-y: auto;
      }

      .panel-section {
        flex: 1;
        min-width: 180px;
      }

      .canvas-container {
        padding: 10px;
      }
    }
  </style>
</head>
<body>
  <div id="app">
    <div class="left-spacer"></div>
    <div class="canvas-container">
      <div class="canvas-wrapper" id="canvasWrapper">
        <canvas id="gameCanvas" width="1200" height="600"></canvas>
      </div>
      <div class="timeline-wrapper" id="timelineWrapper">
        <canvas id="timelineCanvas" width="1200" height="40"></canvas>
      </div>
    </div>
    <div id="controlPanel">
      <div class="panel-section">
        <div class="panel-title">障碍物工具</div>
        <div class="tool-buttons">
          <button class="tool-btn" data-tool="wall" title="矮墙（跳跃越过）">
            <div class="tool-icon" style="background:#E74C3C"></div>
            <span>矮墙</span>
          </button>
          <button class="tool-btn" data-tool="spike" title="尖刺（蹲伏通过）">
            <div class="tool-icon" style="background:#F39C12"></div>
            <span>尖刺</span>
          </button>
          <button class="tool-btn" data-tool="platform" title="移动平台">
            <div class="tool-icon" style="background:#3498DB"></div>
            <span>平台</span>
          </button>
        </div>
      </div>

      <div class="panel-section">
        <div class="panel-title">节拍工具</div>
        <button class="btn" id="beatToolBtn">
          <span style="display:inline-block;width:3px;height:14px;background:#9B59B6"></span>
          添加节拍
        </button>
        <div class="key-hint">点击画布或时间线放置</div>
      </div>

      <div class="panel-section">
        <div class="panel-title">试玩</div>
        <div class="action-buttons">
          <button class="btn btn-primary" id="playBtn">▶ 播放</button>
          <button class="btn btn-danger" id="stopBtn" disabled>■ 停止</button>
        </div>
        <div class="key-hint">空格=跳跃，S=蹲伏</div>
      </div>

      <div class="panel-section">
        <div class="panel-title">撤销 / 重做</div>
        <div class="action-buttons">
          <button class="btn" id="undoBtn">↶ 撤销</button>
          <button class="btn" id="redoBtn">↷ 重做</button>
        </div>
        <div class="undo-status" id="undoStatus">撤销(0/10)</div>
        <div class="key-hint">Ctrl+Z / Ctrl+Y</div>
      </div>

      <div class="panel-section">
        <div class="panel-title">保存关卡</div>
        <div class="save-row">
          <input type="text" class="input-field" id="levelNameInput" placeholder="关卡名称..." />
          <button class="btn" id="saveBtn">保存</button>
        </div>
      </div>

      <div class="panel-section">
        <div class="panel-title">已保存关卡</div>
        <div class="level-list" id="levelList">
          <div class="empty-levels">暂无保存的关卡</div>
        </div>
      </div>
    </div>
  </div>
  <div class="flash-overlay" id="flashOverlay"></div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
