<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>知识竞技对战平台</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;700;900&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      html, body, #root {
        height: 100%;
        width: 100%;
      }
      body {
        font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
        background: linear-gradient(135deg, #0a1628 0%, #1a1a3e 50%, #2d1b4e 100%);
        background-attachment: fixed;
        min-height: 100vh;
        overflow-x: hidden;
      }
      :root {
        --primary-deep: #0a1628;
        --primary-violet: #7c3aed;
        --primary-violet-light: #a78bfa;
        --accent-green: #22c55e;
        --accent-green-light: #4ade80;
        --accent-red: #ef4444;
        --accent-gold: #fbbf24;
        --accent-silver: #cbd5e1;
        --accent-bronze: #cd7f32;
        --glow-violet: rgba(124, 58, 237, 0.4);
        --glow-green: rgba(34, 197, 94, 0.4);
        --glass-bg: rgba(255, 255, 255, 0.06);
        --glass-border: rgba(255, 255, 255, 0.12);
      }
      ::-webkit-scrollbar {
        width: 8px;
        height: 8px;
      }
      ::-webkit-scrollbar-track {
        background: rgba(255, 255, 255, 0.05);
      }
      ::-webkit-scrollbar-thumb {
        background: rgba(124, 58, 237, 0.4);
        border-radius: 4px;
      }
      ::-webkit-scrollbar-thumb:hover {
        background: rgba(124, 58, 237, 0.6);
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/client/main.tsx"></script>
  </body>
</html>
