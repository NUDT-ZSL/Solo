<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>古代陶器修复与纹饰拼合</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: linear-gradient(135deg, #2D2D2D 0%, #1A1A1A 100%);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
    }
    #app {
      width: 100%;
      height: 100%;
      position: relative;
    }
    #canvas-container {
      width: 100%;
      height: 100%;
    }

    .glass {
      background: rgba(255, 255, 255, 0.1);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      border: 1px solid rgba(255, 255, 255, 0.15);
      border-radius: 12px;
      color: #fff;
    }

    #progress-panel {
      position: absolute;
      left: 20px;
      bottom: 20px;
      padding: 16px 20px;
      min-width: 200px;
      user-select: none;
    }
    #progress-panel .title {
      font-size: 13px;
      color: rgba(255, 255, 255, 0.7);
      margin-bottom: 8px;
      letter-spacing: 0.5px;
    }
    #progress-panel .count {
      font-size: 28px;
      font-weight: 600;
      color: #D4A853;
      margin-bottom: 8px;
    }
    #progress-bar {
      width: 100%;
      height: 6px;
      background: rgba(255, 255, 255, 0.1);
      border-radius: 3px;
      overflow: hidden;
    }
    #progress-fill {
      height: 100%;
      background: linear-gradient(90deg, #D4A853 0%, #F7C948 100%);
      width: 0%;
      transition: width 0.4s ease;
      border-radius: 3px;
    }

    #controls-panel {
      position: absolute;
      right: 20px;
      top: 20px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      align-items: flex-end;
    }

    .action-buttons {
      display: flex;
      gap: 10px;
    }

    .btn {
      padding: 10px 18px;
      border: none;
      cursor: pointer;
      font-size: 13px;
      font-weight: 500;
      color: #1A1A1A;
      background: #D4A853;
      border-radius: 8px;
      transition: all 0.25s ease;
      letter-spacing: 0.5px;
    }
    .btn:hover {
      transform: scale(1.05);
      background: #F7C948;
      box-shadow: 0 4px 20px rgba(247, 201, 72, 0.35);
    }
    .btn:active {
      transform: scale(0.98);
    }

    #lighting-panel {
      display: flex;
      gap: 10px;
      padding: 10px;
    }

    .light-btn {
      position: relative;
      width: 44px;
      height: 44px;
      border-radius: 50%;
      border: 2px solid transparent;
      background: rgba(255, 255, 255, 0.08);
      color: #fff;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      transition: all 0.3s ease;
      overflow: hidden;
    }
    .light-btn:hover {
      background: rgba(255, 255, 255, 0.18);
    }
    .light-btn.active {
      border-color: #F7C948;
      background: rgba(247, 201, 72, 0.15);
      color: #F7C948;
    }
    .light-btn::after {
      content: '';
      position: absolute;
      top: 50%;
      left: 50%;
      width: 0;
      height: 0;
      border-radius: 50%;
      background: rgba(247, 201, 72, 0.4);
      transform: translate(-50%, -50%);
      pointer-events: none;
    }
    .light-btn.ripple::after {
      animation: ripple 0.8s ease-out forwards;
    }
    @keyframes ripple {
      0% { width: 0; height: 0; opacity: 0.8; }
      100% { width: 120px; height: 120px; opacity: 0; }
    }

    #hint {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      padding: 12px 24px;
      font-size: 14px;
      color: rgba(255, 255, 255, 0.85);
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.4s ease;
      text-align: center;
    }
    #hint.show {
      opacity: 1;
    }

    @media (max-width: 768px) {
      #progress-panel {
        left: 12px;
        bottom: 120px;
        right: 12px;
        min-width: auto;
      }
      #controls-panel {
        top: auto;
        right: 12px;
        left: 12px;
        bottom: 12px;
        flex-direction: row;
        justify-content: space-between;
        align-items: center;
      }
      .action-buttons {
        flex-direction: row;
      }
      .btn {
        padding: 14px 20px;
        font-size: 15px;
        min-height: 48px;
      }
      .light-btn {
        width: 52px;
        height: 52px;
        font-size: 20px;
      }
    }
  </style>
</head>
<body>
  <div id="app">
    <div id="canvas-container"></div>

    <div id="hint" class="glass">提示：左键拖拽移动陶片 · 右键拖拽旋转 · 滚轮缩放视角</div>

    <div id="progress-panel" class="glass">
      <div class="title">拼接进度</div>
      <div class="count"><span id="progress-current">0</span> / <span id="progress-total">0</span></div>
      <div id="progress-bar">
        <div id="progress-fill"></div>
      </div>
    </div>

    <div id="controls-panel">
      <div id="lighting-panel" class="glass">
        <button class="light-btn active" data-light="sunlight" title="日光">☀️</button>
        <button class="light-btn" data-light="museum" title="博物馆射灯">💡</button>
        <button class="light-btn" data-light="darkroom" title="暗室">🌙</button>
      </div>
      <div class="action-buttons">
        <button id="reset-btn" class="btn">重置</button>
        <button id="export-btn" class="btn">导出截图</button>
      </div>
    </div>
  </div>

  <script type="module" src="/src/main.ts"></script>
</body>
</html>
