<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>墨渊钓客 · Moyuan Fisher</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;700&family=Noto+Sans+SC:wght@300;400;500;700&family=ZCOOL+XiaoWei&display=swap"
    rel="stylesheet"
  />
  <style>
    :root {
      --bg-top: #0a192f;
      --bg-bot: #020c1b;
      --accent: #64ffda;
      --accent-hover: #fbbf24;
      --glass-bg: rgba(10, 25, 47, 0.8);
      --glass-blur: blur(8px);
      --common: #4ade80;
      --rare: #c084fc;
      --epic: #fb923c;
      --legendary: #fbbf24;
      --mythic-1: #ff6b6b;
      --mythic-2: #ff4757;
      --panel-ease: cubic-bezier(0.16, 1, 0.3, 1);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    html, body, #app {
      width: 100%;
      height: 100%;
      overflow: hidden;
      font-family: 'Noto Sans SC', 'ZCOOL XiaoWei', system-ui, sans-serif;
      color: #e6f1ff;
      background: linear-gradient(180deg, var(--bg-top) 0%, var(--bg-bot) 100%);
      user-select: none;
      -webkit-user-select: none;
    }

    #game-canvas {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      display: block;
      cursor: crosshair;
      z-index: 1;
    }

    .top-toolbar {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      padding: 16px 24px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      z-index: 10;
      pointer-events: none;
    }
    .top-toolbar > * { pointer-events: auto; }

    .score-display {
      font-family: 'Cinzel', 'ZCOOL XiaoWei', serif;
      font-size: 28px;
      font-weight: 700;
      color: var(--legendary);
      text-shadow: 0 0 12px rgba(251, 191, 36, 0.6),
                   0 0 24px rgba(251, 191, 36, 0.3);
      letter-spacing: 2px;
    }

    .glass-btn {
      background: var(--glass-bg);
      backdrop-filter: var(--glass-blur);
      -webkit-backdrop-filter: var(--glass-blur);
      border: 1px solid rgba(100, 255, 218, 0.25);
      color: var(--accent);
      padding: 10px 18px;
      border-radius: 10px;
      font-family: inherit;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s ease;
      display: inline-flex;
      align-items: center;
      gap: 8px;
    }
    .glass-btn:hover {
      color: var(--accent-hover);
      border-color: rgba(251, 191, 36, 0.4);
      transform: scale(1.05);
      box-shadow: 0 4px 20px rgba(251, 191, 36, 0.2);
    }
    .glass-btn .icon { font-size: 18px; }

    .codex-panel {
      position: absolute;
      top: 0;
      left: 0;
      width: min(560px, 95vw);
      max-height: 85vh;
      background: var(--glass-bg);
      backdrop-filter: var(--glass-blur);
      -webkit-backdrop-filter: var(--glass-blur);
      border: 1px solid rgba(100, 255, 218, 0.2);
      border-radius: 0 0 16px 0;
      padding: 24px;
      z-index: 20;
      transform: translateY(-105%);
      transition: transform 0.3s var(--panel-ease);
      overflow-y: auto;
    }
    .codex-panel.open { transform: translateY(0); }

    .codex-title, .achv-title {
      font-family: 'Cinzel', 'ZCOOL XiaoWei', serif;
      font-size: 24px;
      color: var(--accent);
      margin-bottom: 16px;
      letter-spacing: 1px;
    }

    .codex-grid {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 12px;
    }

    .codex-cell {
      aspect-ratio: 1 / 1;
      background: rgba(2, 12, 27, 0.6);
      border: 1px solid rgba(100, 255, 218, 0.15);
      border-radius: 10px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: all 0.2s ease;
      position: relative;
      overflow: hidden;
    }
    .codex-cell.unlocked {
      border-color: rgba(100, 255, 218, 0.35);
    }
    .codex-cell.unlocked:hover {
      border-color: var(--accent-hover);
      transform: scale(1.05);
    }
    .codex-cell.locked {
      opacity: 0.45;
      filter: grayscale(1);
    }
    .codex-cell .emoji {
      font-size: 36px;
      margin-bottom: 4px;
    }
    .codex-cell .name {
      font-size: 11px;
      font-weight: 500;
      text-align: center;
      padding: 0 4px;
    }
    .codex-cell .rarity-bar {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      height: 3px;
    }
    .rarity-common { background: var(--common); }
    .rarity-rare { background: var(--rare); }
    .rarity-epic { background: var(--epic); }
    .rarity-legendary { background: var(--legendary); }
    .rarity-mythic {
      background: linear-gradient(90deg, var(--mythic-1), var(--mythic-2));
    }

    .achievement-panel {
      position: absolute;
      top: 0;
      right: 0;
      width: min(380px, 95vw);
      max-height: 85vh;
      background: var(--glass-bg);
      backdrop-filter: var(--glass-blur);
      -webkit-backdrop-filter: var(--glass-blur);
      border: 1px solid rgba(100, 255, 218, 0.2);
      border-radius: 0 0 0 16px;
      padding: 24px;
      z-index: 20;
      transform: translateX(105%);
      transition: transform 0.3s var(--panel-ease);
      overflow-y: auto;
    }
    .achievement-panel.open { transform: translateX(0); }

    .achv-list { display: flex; flex-direction: column; gap: 12px; }
    .achv-item {
      display: flex;
      gap: 12px;
      padding: 12px;
      background: rgba(2, 12, 27, 0.5);
      border: 1px solid rgba(100, 255, 218, 0.15);
      border-radius: 10px;
      transition: all 0.3s ease;
      opacity: 0.55;
    }
    .achv-item.unlocked {
      opacity: 1;
      border-color: var(--legendary);
      box-shadow: 0 0 16px rgba(251, 191, 36, 0.25);
      color: var(--accent-hover);
    }
    .achv-icon {
      font-size: 26px;
      flex-shrink: 0;
    }
    .achv-info { flex: 1; }
    .achv-name { font-size: 14px; font-weight: 700; margin-bottom: 4px; }
    .achv-desc { font-size: 12px; opacity: 0.75; line-height: 1.4; }

    .power-bar-wrap {
      position: fixed;
      width: 120px;
      height: 14px;
      background: var(--glass-bg);
      backdrop-filter: var(--glass-blur);
      -webkit-backdrop-filter: var(--glass-blur);
      border: 1px solid rgba(100, 255, 218, 0.35);
      border-radius: 7px;
      overflow: hidden;
      z-index: 30;
      pointer-events: none;
      transform: translate(-50%, -170%);
      display: none;
    }
    .power-bar-wrap.active { display: block; }
    .power-bar-fill {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, #64ffda, #fbbf24);
      box-shadow: 0 0 10px rgba(100, 255, 218, 0.7);
      transition: width 0.02s linear;
    }

    .bite-hint {
      position: fixed;
      left: 50%;
      top: 30%;
      transform: translateX(-50%);
      font-family: 'Cinzel', 'ZCOOL XiaoWei', serif;
      font-size: 42px;
      font-weight: 700;
      color: #ff4757;
      text-shadow: 0 0 20px rgba(255, 71, 87, 0.8),
                   0 0 40px rgba(255, 71, 87, 0.4);
      z-index: 25;
      pointer-events: none;
      opacity: 0;
      letter-spacing: 4px;
      animation: biteBlink 0.5s ease-in-out infinite alternate;
    }
    .bite-hint.active { opacity: 1; }
    @keyframes biteBlink {
      from { transform: translateX(-50%) scale(1); }
      to   { transform: translateX(-50%) scale(1.1); }
    }

    .achv-unlock-overlay {
      position: fixed;
      inset: 0;
      z-index: 50;
      pointer-events: none;
      opacity: 0;
    }
    .achv-unlock-overlay.active {
      animation: achvFlash 2s ease-out forwards;
    }
    .achv-flash {
      position: absolute;
      inset: 0;
      background: radial-gradient(
        ellipse at center,
        rgba(251, 191, 36, 0.35) 0%,
        rgba(251, 191, 36, 0.1) 40%,
        transparent 75%
      );
    }
    .achv-unlock-text {
      position: absolute;
      left: 50%;
      top: 40%;
      transform: translate(-50%, -50%);
      text-align: center;
    }
    .achv-unlock-label {
      font-family: 'Cinzel', serif;
      font-size: 18px;
      color: var(--legendary);
      letter-spacing: 6px;
      margin-bottom: 12px;
      text-shadow: 0 0 20px rgba(251, 191, 36, 0.8);
    }
    .achv-unlock-name {
      font-family: 'ZCOOL XiaoWei', serif;
      font-size: 44px;
      font-weight: 700;
      color: var(--accent-hover);
      text-shadow: 0 0 24px rgba(251, 191, 36, 0.9),
                   0 0 48px rgba(251, 191, 36, 0.5);
    }
    @keyframes achvFlash {
      0%   { opacity: 0; }
      12%  { opacity: 1; }
      30%  { opacity: 0.7; }
      50%  { opacity: 0.9; }
      80%  { opacity: 0.6; }
      100% { opacity: 0; }
    }

    .creature-result {
      position: fixed;
      left: 50%;
      top: 55%;
      transform: translate(-50%, -50%) scale(0.8);
      background: var(--glass-bg);
      backdrop-filter: var(--glass-blur);
      -webkit-backdrop-filter: var(--glass-blur);
      border: 1px solid rgba(100, 255, 218, 0.3);
      border-radius: 18px;
      padding: 28px 40px;
      z-index: 40;
      opacity: 0;
      pointer-events: none;
      transition: all 0.4s var(--panel-ease);
      text-align: center;
      min-width: 280px;
    }
    .creature-result.show {
      opacity: 1;
      transform: translate(-50%, -50%) scale(1);
    }
    .result-emoji {
      font-size: 72px;
      margin-bottom: 8px;
      animation: resultPop 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
    }
    @keyframes resultPop {
      0% { transform: scale(0) rotate(-30deg); }
      60% { transform: scale(1.2) rotate(8deg); }
      100% { transform: scale(1) rotate(0); }
    }
    .result-rarity {
      display: inline-block;
      padding: 3px 14px;
      border-radius: 20px;
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 2px;
      margin-bottom: 8px;
    }
    .result-name {
      font-family: 'ZCOOL XiaoWei', serif;
      font-size: 26px;
      font-weight: 700;
      margin-bottom: 6px;
    }
    .result-desc {
      font-size: 13px;
      opacity: 0.75;
      line-height: 1.5;
      margin-bottom: 14px;
    }
    .result-score {
      font-family: 'Cinzel', serif;
      font-size: 18px;
      color: var(--legendary);
      font-weight: 700;
    }

    .codex-detail {
      margin-top: 20px;
      padding: 16px;
      background: rgba(2, 12, 27, 0.7);
      border: 1px solid rgba(100, 255, 218, 0.2);
      border-radius: 10px;
    }
    .codex-detail h4 {
      color: var(--accent);
      margin-bottom: 10px;
      font-family: 'ZCOOL XiaoWei', serif;
      font-size: 18px;
    }
    .codex-detail p {
      font-size: 13px;
      line-height: 1.6;
      opacity: 0.8;
      margin-bottom: 6px;
    }

    .status-tip {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 13px;
      color: rgba(100, 255, 218, 0.6);
      z-index: 10;
      pointer-events: none;
      text-align: center;
    }

    @media (max-width: 768px) {
      .top-toolbar {
        padding: 12px;
        flex-direction: row;
        overflow-x: auto;
        gap: 10px;
        -webkit-overflow-scrolling: touch;
      }
      .top-toolbar::-webkit-scrollbar { display: none; }
      .score-display { font-size: 20px; }
      .glass-btn { padding: 8px 14px; font-size: 13px; min-width: 44px; min-height: 44px; justify-content: center; }
      .codex-grid { grid-template-columns: repeat(3, 1fr); gap: 8px; }
      .codex-panel, .achievement-panel { width: 96vw; max-height: 78vh; }
      .power-bar-wrap { width: 150px; height: 18px; }
      .creature-result { padding: 20px 24px; min-width: 240px; }
      .result-name { font-size: 22px; }
      .result-emoji { font-size: 60px; }
    }

    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: rgba(100, 255, 218, 0.3); border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: rgba(100, 255, 218, 0.5); }
  </style>
</head>
<body>
  <div id="app">
    <canvas id="game-canvas"></canvas>

    <div class="top-toolbar">
      <button class="glass-btn" id="btn-codex" aria-label="图鉴">
        <span class="icon">📖</span><span>图鉴</span>
      </button>
      <div class="score-display">
        <span id="score-value">0</span> 分
      </div>
      <button class="glass-btn" id="btn-achv" aria-label="成就">
        <span class="icon">🏆</span><span>成就</span>
      </button>
    </div>

    <div class="codex-panel" id="codex-panel">
      <div class="codex-title">📖 生物图鉴 · Codex</div>
      <div class="codex-grid" id="codex-grid"></div>
      <div class="codex-detail" id="codex-detail" style="display:none;"></div>
    </div>

    <div class="achievement-panel" id="achv-panel">
      <div class="achv-title">🏆 成就 · Achievements</div>
      <div class="achv-list" id="achv-list"></div>
    </div>

    <div class="power-bar-wrap" id="power-bar">
      <div class="power-bar-fill" id="power-fill"></div>
    </div>

    <div class="bite-hint" id="bite-hint">— 咬钩！ —</div>

    <div class="achv-unlock-overlay" id="achv-overlay">
      <div class="achv-flash"></div>
      <div class="achv-unlock-text">
        <div class="achv-unlock-label">✦ 成就解锁 ✦</div>
        <div class="achv-unlock-name" id="achv-unlock-name">——</div>
      </div>
    </div>

    <div class="creature-result" id="creature-result">
      <div class="result-emoji" id="res-emoji">🐟</div>
      <div class="result-rarity" id="res-rarity" style="background:var(--common);color:#020c1b;">普通</div>
      <div class="result-name" id="res-name">幽灵鱼</div>
      <div class="result-desc" id="res-desc">——</div>
      <div class="result-score">+ <span id="res-score">10</span> 分</div>
    </div>

    <div class="status-tip" id="status-tip">按住鼠标左键蓄力，松开投掷浮标 · 咬钩后0.8秒内点击收杆</div>
  </div>

  <script type="module" src="/src/main.ts"></script>
</body>
</html>
