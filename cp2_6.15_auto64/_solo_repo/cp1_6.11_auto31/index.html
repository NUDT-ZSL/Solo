<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>3D 声纹雕塑</title>
  <link rel="stylesheet" href="/src/styles.css" />
</head>
<body>
  <div id="app">
    <div id="viewport">
      <canvas id="scene"></canvas>
      <canvas id="spectrum-preview"></canvas>
    </div>
    <aside id="control-panel">
      <h2 class="panel-title">控制面板</h2>

      <div class="control-group">
        <label for="density-slider">粒子密度</label>
        <input type="range" id="density-slider" min="50" max="500" step="10" value="150" />
        <span id="density-value" class="slider-value">150</span>
      </div>

      <div class="control-group">
        <label for="ring-slider">环数</label>
        <input type="range" id="ring-slider" min="3" max="8" step="1" value="5" />
        <span id="ring-value" class="slider-value">5</span>
      </div>

      <div class="control-group">
        <button id="record-btn" class="btn record-idle" title="开始录制">
          <svg class="icon-idle" viewBox="0 0 24 24" width="24" height="24">
            <circle cx="12" cy="12" r="8" fill="#888" />
          </svg>
          <svg class="icon-recording" viewBox="0 0 24 24" width="24" height="24" style="display:none">
            <rect x="6" y="6" width="12" height="12" rx="2" fill="#FF0000" />
          </svg>
          <svg class="icon-redo" viewBox="0 0 24 24" width="24" height="24" style="display:none">
            <path d="M12 4V1L8 5l4 4V6c3.31 0 6 2.69 6 6s-2.69 6-6 6-6-2.69-6-6H4c0 4.42 3.58 8 8 8s8-3.58 8-8-3.58-8-8-8z" fill="#4CAF50"/>
          </svg>
          <span id="record-label">录制</span>
        </button>
      </div>

      <div class="control-group">
        <button id="reset-camera-btn" class="btn" title="重置视角">
          <svg viewBox="0 0 24 24" width="24" height="24">
            <path d="M12 8c-2.21 0-4 1.79-4 4s1.79 4 4 4 4-1.79 4-4-1.79-4-4-4zm8.94 3A8.994 8.994 0 0012 3 8.994 8.994 0 003.06 11H1v2h2.06A8.994 8.994 0 0012 21a8.994 8.994 0 008.94-8H23v-2h-2.06zM12 19c-3.87 0-7-3.13-7-7s3.13-7 7-7 7 3.13 7 7-3.13 7-7 7z" fill="white"/>
          </svg>
          <span>重置视角</span>
        </button>
      </div>
    </aside>
  </div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
