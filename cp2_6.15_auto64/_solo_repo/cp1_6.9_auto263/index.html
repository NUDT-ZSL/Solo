<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>回声拼贴 · Echo Collage</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      html, body, #root {
        width: 100%;
        height: 100%;
        min-height: 100vh;
        background: linear-gradient(135deg, #0a0a1a 0%, #1a0a2a 100%);
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
        color: #ffffff;
        overflow-x: hidden;
      }
      .loader-wrap {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        z-index: 9999;
        background: linear-gradient(135deg, #0a0a1a 0%, #1a0a2a 100%);
        transition: opacity 0.6s ease;
      }
      .loader-wrap.hidden {
        opacity: 0;
        pointer-events: none;
      }
      .loader-wave {
        display: flex;
        align-items: center;
        gap: 6px;
        height: 80px;
      }
      .loader-wave span {
        display: block;
        width: 8px;
        height: 20px;
        background: linear-gradient(180deg, #00ffff, #ff00ff);
        border-radius: 4px;
        animation: wave 1.2s ease-in-out infinite;
        box-shadow: 0 0 12px rgba(0, 255, 255, 0.6);
      }
      .loader-wave span:nth-child(1) { animation-delay: 0.0s; }
      .loader-wave span:nth-child(2) { animation-delay: 0.1s; }
      .loader-wave span:nth-child(3) { animation-delay: 0.2s; }
      .loader-wave span:nth-child(4) { animation-delay: 0.3s; }
      .loader-wave span:nth-child(5) { animation-delay: 0.4s; }
      .loader-wave span:nth-child(6) { animation-delay: 0.5s; }
      .loader-wave span:nth-child(7) { animation-delay: 0.6s; }
      .loader-wave span:nth-child(8) { animation-delay: 0.7s; }
      .loader-title {
        margin-top: 28px;
        font-size: 22px;
        font-weight: 600;
        letter-spacing: 4px;
        background: linear-gradient(90deg, #00ffff, #ff00ff);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
      }
      .loader-sub {
        margin-top: 10px;
        font-size: 13px;
        color: rgba(255, 255, 255, 0.4);
        letter-spacing: 2px;
      }
      @keyframes wave {
        0%, 100% { height: 12px; }
        50% { height: 64px; }
      }
    </style>
  </head>
  <body>
    <div id="root">
      <div class="loader-wrap" id="loader">
        <div class="loader-wave">
          <span></span><span></span><span></span><span></span>
          <span></span><span></span><span></span><span></span>
        </div>
        <div class="loader-title">回声拼贴</div>
        <div class="loader-sub">ECHO COLLAGE · LOADING</div>
      </div>
    </div>
    <script type="module" src="/src/main.tsx"></script>
    <script>
      window.addEventListener('load', () => {
        setTimeout(() => {
          const loader = document.getElementById('loader');
          if (loader) loader.classList.add('hidden');
        }, 800);
      });
    </script>
  </body>
</html>
