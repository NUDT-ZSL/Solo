<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>3D数学曲面探索器</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: linear-gradient(135deg, #0A0A2E 0%, #1A1A4E 100%);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    }
    #app { width: 100%; height: 100%; position: relative; }
    #canvas-container { width: 100%; height: 100%; }
    #canvas-container canvas { display: block; }

    .control-panel {
      position: absolute;
      top: 50%;
      right: 20px;
      transform: translateY(-50%);
      width: 280px;
      background: rgba(255, 255, 255, 0.5);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border-radius: 12px;
      padding: 20px;
      color: #1a1a2e;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.2);
      z-index: 10;
      user-select: none;
    }

    .panel-title {
      font-size: 14px;
      font-weight: 600;
      margin-bottom: 16px;
      color: #1a1a2e;
      letter-spacing: 0.5px;
    }

    .surface-buttons {
      display: flex;
      gap: 12px;
      margin-bottom: 20px;
      justify-content: center;
    }

    .surface-btn {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      border: 1.5px solid rgba(255, 255, 255, 0.3);
      background: rgba(255, 255, 255, 0.15);
      color: #1a1a2e;
      font-weight: 700;
      font-size: 15px;
      cursor: pointer;
      transition: all 0.2s ease;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .surface-btn:hover { background: rgba(255, 255, 255, 0.35); }
    .surface-btn.active {
      border-color: #00D2FF;
      box-shadow: 0 0 0 0.2px #00D2FF, 0 0 12px rgba(0, 210, 255, 0.4);
      background: rgba(0, 210, 255, 0.15);
    }

    .sliders-group { display: flex; flex-direction: column; gap: 14px; }

    .slider-item { display: flex; flex-direction: column; gap: 6px; }

    .slider-label {
      display: flex;
      justify-content: space-between;
      font-size: 12px;
      color: #2a2a4e;
      font-weight: 500;
    }
    .slider-value {
      color: #00D2FF;
      font-weight: 700;
      font-variant-numeric: tabular-nums;
    }

    .slider-track {
      position: relative;
      width: 180px;
      height: 4px;
      background: #E0E0E0;
      border-radius: 2px;
      cursor: pointer;
      margin: 0 auto;
    }

    .slider-fill {
      position: absolute;
      top: 0; left: 0;
      height: 100%;
      background: linear-gradient(90deg, #00D2FF, #45B7D1);
      border-radius: 2px;
      pointer-events: none;
    }

    .slider-thumb {
      position: absolute;
      top: 50%;
      width: 16px;
      height: 16px;
      background: #00D2FF;
      border-radius: 50%;
      transform: translate(-50%, -50%);
      cursor: grab;
      box-shadow: 0 2px 8px rgba(0, 210, 255, 0.5);
      transition: transform 0.1s cubic-bezier(0.34, 1.56, 0.64, 1);
    }
    .slider-thumb:active { cursor: grabbing; transform: translate(-50%, -50%) scale(1.15); }

    .hint {
      margin-top: 16px;
      padding-top: 12px;
      border-top: 1px solid rgba(255,255,255,0.2);
      font-size: 11px;
      color: #3a3a5e;
      line-height: 1.6;
    }
  </style>
</head>
<body>
  <div id="app">
    <div id="canvas-container"></div>
  </div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
