<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>时间线工坊</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { width: 100%; height: 100%; overflow: hidden; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif; }
    body { display: flex; flex-direction: column; }

    #topbar {
      height: 56px;
      background: #2D3748;
      color: #fff;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 20px;
      flex-shrink: 0;
      z-index: 10;
    }
    #topbar .title { font-size: 18px; font-weight: 600; letter-spacing: 1px; }
    #exportBtn {
      background: #3182CE;
      color: #fff;
      border: none;
      padding: 8px 18px;
      border-radius: 6px;
      font-size: 14px;
      cursor: pointer;
      transition: transform 0.1s ease, background 0.2s ease;
    }
    #exportBtn:hover { background: #2B6CB0; }
    #exportBtn:active { transform: scale(0.95); }

    #main { flex: 1; display: flex; position: relative; overflow: hidden; }

    #sidebar {
      width: 240px;
      background: #EDF2F7;
      padding: 16px 12px;
      flex-shrink: 0;
      border-right: 1px solid #E2E8F0;
      overflow-y: auto;
      transition: transform 0.3s ease;
      z-index: 5;
    }
    #sidebar.hidden { transform: translateX(-100%); position: absolute; top: 0; left: 0; height: 100%; }
    .tool-group { margin-bottom: 18px; }
    .tool-group-label { font-size: 11px; color: #718096; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 8px; padding-left: 4px; }
    .tool-btn {
      display: flex;
      align-items: center;
      gap: 10px;
      width: 100%;
      background: #fff;
      border: 1px solid #E2E8F0;
      border-radius: 6px;
      padding: 10px 12px;
      margin-bottom: 6px;
      font-size: 14px;
      color: #2D3748;
      cursor: pointer;
      transition: transform 0.1s ease, background 0.15s ease, border-color 0.15s ease;
    }
    .tool-btn:hover { background: #F7FAFC; border-color: #CBD5E0; }
    .tool-btn:active { transform: scale(0.97); }
    .tool-btn.active { background: #EBF4FF; border-color: #3182CE; color: #2B6CB0; }
    .tool-btn .icon { width: 18px; height: 18px; display: inline-flex; align-items: center; justify-content: center; flex-shrink: 0; }
    .align-row { display: flex; gap: 6px; margin-top: 8px; }
    .align-row select {
      flex: 1;
      padding: 7px 8px;
      border: 1px solid #E2E8F0;
      border-radius: 5px;
      background: #fff;
      font-size: 13px;
      color: #2D3748;
    }
    #hamburger {
      display: none;
      background: transparent;
      border: none;
      color: #fff;
      font-size: 22px;
      cursor: pointer;
      padding: 4px 8px;
    }
    #canvasWrap {
      flex: 1;
      position: relative;
      background: #F7FAFC;
      overflow: hidden;
    }
    #canvas {
      display: block;
      width: 100%;
      height: 100%;
      cursor: default;
    }
    #canvas.grab { cursor: grab; }
    #canvas.grabbing { cursor: grabbing; }

    #panel {
      position: absolute;
      top: 0;
      right: 0;
      width: 300px;
      height: 100%;
      background: #fff;
      border-left: 1px solid #E2E8F0;
      padding: 20px;
      transform: translateX(100%);
      transition: transform 0.3s ease;
      overflow-y: auto;
      z-index: 6;
      box-shadow: -4px 0 16px rgba(0,0,0,0.06);
    }
    #panel.open { transform: translateX(0); }
    #panel h3 { font-size: 16px; margin-bottom: 16px; color: #2D3748; padding-bottom: 10px; border-bottom: 1px solid #EDF2F7; }
    .field { margin-bottom: 14px; }
    .field label { display: block; font-size: 12px; color: #4A5568; margin-bottom: 5px; font-weight: 500; }
    .field input, .field textarea, .field select {
      width: 100%;
      padding: 8px 10px;
      border: 1px solid #E2E8F0;
      border-radius: 5px;
      font-size: 13px;
      font-family: inherit;
      color: #2D3748;
      transition: border-color 0.15s ease, box-shadow 0.15s ease;
    }
    .field input:focus, .field textarea:focus, .field select:focus {
      outline: none;
      border-color: #3182CE;
      box-shadow: 0 0 0 3px rgba(49,130,206,0.1);
    }
    .field textarea { resize: vertical; min-height: 60px; }
    .field small { color: #A0AEC0; font-size: 11px; }
    .tag-list { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 6px; }
    .tag-chip {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      padding: 3px 9px;
      border-radius: 12px;
      color: #fff;
      font-size: 12px;
    }
    .tag-chip button {
      background: rgba(255,255,255,0.3);
      border: none;
      color: #fff;
      width: 16px;
      height: 16px;
      border-radius: 50%;
      cursor: pointer;
      font-size: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 0;
    }
    .tag-input-row { display: flex; gap: 6px; margin-top: 6px; }
    .tag-input-row input { flex: 1; }
    .tag-input-row select { width: 80px; }
    .tag-input-row button {
      padding: 8px 12px;
      background: #3182CE;
      color: #fff;
      border: none;
      border-radius: 5px;
      cursor: pointer;
      font-size: 13px;
    }
    .tag-input-row button:disabled { background: #CBD5E0; cursor: not-allowed; }
    .color-dot { display: inline-block; width: 12px; height: 12px; border-radius: 50%; vertical-align: middle; margin-right: 4px; }
    #panelClose {
      position: absolute;
      top: 14px;
      right: 14px;
      background: transparent;
      border: none;
      font-size: 20px;
      color: #718096;
      cursor: pointer;
      width: 28px;
      height: 28px;
      border-radius: 5px;
      transition: background 0.15s ease;
    }
    #panelClose:hover { background: #EDF2F7; }

    #toast {
      position: fixed;
      bottom: 30px;
      left: 50%;
      transform: translateX(-50%) translateY(100px);
      background: #48BB78;
      color: #fff;
      padding: 12px 24px;
      border-radius: 8px;
      font-size: 14px;
      box-shadow: 0 4px 16px rgba(0,0,0,0.15);
      opacity: 0;
      transition: transform 0.3s ease, opacity 0.3s ease;
      z-index: 100;
      pointer-events: none;
    }
    #toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }

    @media (max-width: 768px) {
      #sidebar { position: absolute; top: 0; left: 0; height: 100%; z-index: 20; }
      #sidebar.hidden { transform: translateX(-100%); }
      #hamburger { display: block; }
    }
  </style>
</head>
<body>
  <div id="topbar">
    <div style="display:flex;align-items:center;gap:12px;">
      <button id="hamburger" title="菜单">☰</button>
      <span class="title">时间线工坊</span>
    </div>
    <button id="exportBtn">导出 PNG</button>
  </div>
  <div id="main">
    <aside id="sidebar">
      <div class="tool-group">
        <div class="tool-group-label">基础工具</div>
        <button class="tool-btn active" data-tool="select">
          <span class="icon">↖</span><span>选择/移动</span>
        </button>
        <button class="tool-btn" data-tool="node">
          <span class="icon">▭</span><span>事件节点</span>
        </button>
        <button class="tool-btn" data-tool="arrow">
          <span class="icon">➝</span><span>连接箭头</span>
        </button>
        <button class="tool-btn" data-tool="label">
          <span class="icon">T</span><span>文本标签</span>
        </button>
        <button class="tool-btn" data-tool="timeline">
          <span class="icon">—</span><span>添加时间轴</span>
        </button>
      </div>
      <div class="tool-group">
        <div class="tool-group-label">对齐工具</div>
        <button class="tool-btn" id="alignHBtn">
          <span class="icon">↔</span><span>水平对齐</span>
        </button>
        <button class="tool-btn" id="alignVBtn">
          <span class="icon">↕</span><span>垂直对齐</span>
        </button>
        <div class="align-row">
          <select id="alignGap">
            <option value="20">间距 20px</option>
            <option value="40" selected>间距 40px</option>
            <option value="60">间距 60px</option>
          </select>
        </div>
      </div>
      <div class="tool-group">
        <div class="tool-group-label">提示</div>
        <div style="font-size:12px;color:#718096;line-height:1.6;padding:4px;">
          · 按住 Ctrl 可多选节点<br>
          · 拖动时间轴两端锚点可调整长度<br>
          · 节点靠近时间轴会自动吸附
        </div>
      </div>
    </aside>
    <div id="canvasWrap">
      <canvas id="canvas"></canvas>
      <div id="panel">
        <button id="panelClose">×</button>
        <h3>节点属性</h3>
        <div class="field">
          <label>事件标题 <small id="titleCount">(0/50)</small></label>
          <input type="text" id="nodeTitle" maxlength="50" placeholder="输入事件标题" />
        </div>
        <div class="field">
          <label>详细描述 <small id="descCount">(0/200)</small></label>
          <textarea id="nodeDesc" maxlength="200" placeholder="输入详细描述，支持换行"></textarea>
        </div>
        <div class="field">
          <label>日期</label>
          <input type="date" id="nodeDate" />
        </div>
        <div class="field">
          <label>关联标签 <small>(最多 3 个)</small></label>
          <div class="tag-list" id="tagList"></div>
          <div class="tag-input-row">
            <input type="text" id="tagText" maxlength="12" placeholder="标签名" />
            <select id="tagColor">
              <option value="#E53E3E"><span class="color-dot" style="background:#E53E3E"></span>红</option>
              <option value="#DD6B20"><span class="color-dot" style="background:#DD6B20"></span>橙</option>
              <option value="#D69E2E"><span class="color-dot" style="background:#D69E2E"></span>黄</option>
              <option value="#38A169"><span class="color-dot" style="background:#38A169"></span>绿</option>
              <option value="#3182CE" selected><span class="color-dot" style="background:#3182CE"></span>蓝</option>
              <option value="#805AD5"><span class="color-dot" style="background:#805AD5"></span>紫</option>
            </select>
            <button id="addTagBtn">添加</button>
          </div>
        </div>
      </div>
    </div>
  </div>
  <div id="toast">已保存到下载目录</div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
