<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>墨韵流光 - 交互式水墨动画画板</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      min-height: 100vh;
      font-family: "PingFang SC", "Microsoft YaHei", "Hiragino Sans GB", sans-serif;
      background: #F5F0E1;
      color: #3d3d3d;
      overflow-x: hidden;
    }

    body {
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
    }

    .header {
      width: 100%;
      padding: 24px 0;
      background: linear-gradient(135deg, #2c2c2c 0%, #1a1a1a 100%);
      text-align: center;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.15);
    }

    .header h1 {
      font-size: 32px;
      font-weight: 300;
      color: #F5F0E1;
      letter-spacing: 8px;
      text-shadow: 0 2px 10px rgba(0, 0, 0, 0.3);
    }

    .header .subtitle {
      font-size: 14px;
      color: rgba(245, 240, 225, 0.6);
      margin-top: 8px;
      letter-spacing: 4px;
    }

    .canvas-container {
      width: 80%;
      max-width: 1200px;
      margin: 32px auto;
      background: #fff;
      border-radius: 8px;
      box-shadow: 
        0 10px 40px rgba(0, 0, 0, 0.1),
        0 2px 8px rgba(0, 0, 0, 0.05);
      overflow: hidden;
      position: relative;
    }

    canvas {
      display: block;
      width: 100%;
      height: 600px;
      cursor: crosshair;
      touch-action: none;
    }

    .toolbar {
      width: 80%;
      max-width: 1200px;
      margin: 0 auto 40px;
      padding: 16px 24px;
      background: rgba(245, 240, 225, 0.7);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      border-radius: 16px;
      border: 1px solid rgba(61, 61, 61, 0.1);
      display: flex;
      justify-content: center;
      gap: 16px;
      flex-wrap: wrap;
    }

    .toolbar button {
      padding: 10px 24px;
      border: 1px solid rgba(61, 61, 61, 0.2);
      border-radius: 20px;
      background: rgba(255, 255, 255, 0.5);
      color: #3d3d3d;
      font-size: 14px;
      font-family: inherit;
      cursor: pointer;
      transition: all 0.25s ease;
      letter-spacing: 1px;
    }

    .toolbar button:hover {
      background: rgba(61, 61, 61, 0.1);
      transform: translateY(-1px);
      box-shadow: 0 6px 20px rgba(0, 0, 0, 0.1);
    }

    .toolbar button:active {
      transform: translateY(0);
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
    }

    .toolbar button.active {
      background: rgba(44, 44, 44, 0.85);
      color: #F5F0E1;
      border-color: transparent;
    }

    .info-panel {
      position: absolute;
      top: 16px;
      right: 16px;
      padding: 8px 14px;
      background: rgba(245, 240, 225, 0.85);
      backdrop-filter: blur(4px);
      border-radius: 8px;
      font-size: 12px;
      color: #3d3d3d;
      pointer-events: none;
      border: 1px solid rgba(61, 61, 61, 0.1);
    }

    .info-panel span {
      font-weight: 600;
      color: #2c2c2c;
    }

    @media (max-width: 768px) {
      .header h1 {
        font-size: 24px;
        letter-spacing: 4px;
      }

      .header .subtitle {
        font-size: 12px;
        letter-spacing: 2px;
      }

      .canvas-container {
        width: 94%;
        margin: 20px auto;
      }

      canvas {
        height: 60vh;
      }

      .toolbar {
        width: 94%;
        flex-direction: column;
        padding: 16px;
        gap: 12px;
      }

      .toolbar button {
        width: 100%;
        padding: 14px 24px;
        font-size: 15px;
      }
    }
  </style>
</head>
<body>
  <header class="header">
    <h1>墨 韵 流 光</h1>
    <p class="subtitle">INK · FLOWING · LIGHT</p>
  </header>

  <div class="canvas-container">
    <canvas id="inkCanvas"></canvas>
    <div class="info-panel">
      粒子数: <span id="particleCount">0</span> | FPS: <span id="fps">60</span>
    </div>
  </div>

  <div class="toolbar">
    <button id="btnClear">清空画布</button>
    <button id="btnSave">保存 PNG</button>
    <button id="btnUndo">撤 销</button>
    <button id="btnMode" class="active">墨 韵</button>
  </div>

  <script type="module" src="/src/main.ts"></script>
</body>
</html>
