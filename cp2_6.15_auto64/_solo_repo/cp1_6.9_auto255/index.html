<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>镜界迷踪 - Mirror Maze</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #0a0a1a;
      font-family: 'Courier New', 'Consolas', monospace;
      color: #00e5ff;
    }

    #app {
      position: relative;
      width: 100vw;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    #canvas {
      display: block;
      width: 100%;
      height: 100%;
      cursor: crosshair;
    }

    #title {
      position: absolute;
      top: 24px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 20px;
      font-weight: bold;
      letter-spacing: 8px;
      color: rgba(0, 229, 255, 0.85);
      text-shadow: 0 0 20px rgba(0, 188, 212, 0.6), 0 0 40px rgba(0, 188, 212, 0.3);
      user-select: none;
      pointer-events: none;
      transition: all 0.3s ease-out;
    }

    #hint {
      position: absolute;
      top: 64px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 11px;
      color: rgba(0, 229, 255, 0.4);
      letter-spacing: 2px;
      user-select: none;
      pointer-events: none;
      transition: all 0.3s ease-out;
    }

    #controls {
      position: absolute;
      right: 24px;
      bottom: 24px;
      padding: 18px 20px;
      background: rgba(255, 255, 255, 0.06);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      border: 1px solid rgba(0, 229, 255, 0.15);
      border-radius: 14px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      min-width: 180px;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
      transition: all 0.3s ease-out;
      user-select: none;
    }

    #controls:hover {
      border-color: rgba(0, 229, 255, 0.35);
      background: rgba(255, 255, 255, 0.08);
    }

    .ctrl-btn {
      padding: 10px 14px;
      font-family: inherit;
      font-size: 12px;
      letter-spacing: 1px;
      color: rgba(0, 229, 255, 0.9);
      background: rgba(0, 229, 255, 0.08);
      border: 1px solid rgba(0, 229, 255, 0.2);
      border-radius: 8px;
      cursor: pointer;
      transition: all 0.3s ease-out;
    }

    .ctrl-btn:hover {
      background: rgba(0, 229, 255, 0.18);
      border-color: rgba(0, 229, 255, 0.6);
      box-shadow: 0 0 16px rgba(0, 229, 255, 0.25);
      color: #ffffff;
    }

    .ctrl-btn:active {
      transform: scale(0.97);
    }

    #stats {
      font-size: 11px;
      color: rgba(0, 229, 255, 0.55);
      text-align: center;
      padding-top: 4px;
      border-top: 1px solid rgba(0, 229, 255, 0.1);
      letter-spacing: 1px;
    }

    #stats strong {
      color: rgba(0, 229, 255, 0.95);
      font-size: 13px;
      text-shadow: 0 0 8px rgba(0, 229, 255, 0.5);
    }
  </style>
</head>
<body>
  <div id="app">
    <canvas id="canvas"></canvas>
    <div id="title">镜 界 迷 踪</div>
    <div id="hint">按住鼠标绘制 · 滚轮缩放 · 空格 + 拖拽平移</div>
    <div id="controls">
      <button class="ctrl-btn" id="clearBtn">清除所有路径</button>
      <button class="ctrl-btn" id="exportBtn">导出为 SVG</button>
      <div id="stats">路径数量：<strong id="pathCount">0</strong></div>
    </div>
  </div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
