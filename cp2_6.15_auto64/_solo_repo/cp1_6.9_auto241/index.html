<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>思流漫游 · 创意头脑风暴</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      font-family: 'Noto Sans SC', sans-serif;
      background: radial-gradient(ellipse at 30% 20%, #1a1a4e 0%, #0d0d2b 40%, #05050f 100%);
      color: #fff;
    }
    #app {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
    }
    canvas {
      display: block;
      width: 100%;
      height: 100%;
      cursor: crosshair;
    }
    .hint {
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 13px;
      color: rgba(255, 255, 255, 0.4);
      text-align: center;
      pointer-events: none;
      user-select: none;
      letter-spacing: 1px;
      z-index: 10;
    }
    .title {
      position: fixed;
      top: 20px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 18px;
      font-weight: 300;
      color: rgba(180, 200, 255, 0.6);
      letter-spacing: 8px;
      pointer-events: none;
      user-select: none;
      z-index: 10;
      text-shadow: 0 0 20px rgba(120, 140, 255, 0.5);
    }
  </style>
</head>
<body>
  <div class="title">思 · 流 · 漫 · 游</div>
  <div id="app">
    <canvas id="mindCanvas"></canvas>
  </div>
  <div class="hint">点击空白创建卡片 · Shift+拖拽卡片创建连线 · 双击编辑 · 右键删除</div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
