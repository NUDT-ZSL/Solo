<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>浮光掠影集</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: linear-gradient(180deg, #1a1a2e 0%, #0f0f1a 50%, #05050a 100%);
      font-family: 'Courier New', monospace;
    }
    #app {
      width: 100vw;
      height: 100vh;
      position: relative;
    }
    canvas {
      display: block;
      width: 100%;
      height: 100%;
      cursor: crosshair;
    }
    #hint {
      position: absolute;
      top: 20px;
      left: 50%;
      transform: translateX(-50%);
      color: rgba(150, 180, 255, 0.5);
      font-size: 14px;
      letter-spacing: 4px;
      pointer-events: none;
      user-select: none;
      text-shadow: 0 0 10px rgba(100, 150, 255, 0.3);
    }
  </style>
</head>
<body>
  <div id="app">
    <div id="hint">移动鼠标吸引光符 · 点击捕获符号</div>
    <canvas id="stage"></canvas>
  </div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
