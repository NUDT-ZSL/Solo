<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>火焰粒子沙盒</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #1a1a2e;
      font-family: monospace;
    }
    #gameCanvas {
      display: block;
      background: #1a1a2e;
    }
    #toolbar {
      position: fixed;
      top: 10px;
      left: 10px;
      background: rgba(0, 0, 0, 0.7);
      border-radius: 8px;
      padding: 10px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      color: white;
      z-index: 10;
      user-select: none;
    }
    #toolbar .title {
      font-size: 12px;
      color: #aaa;
    }
    #toolbar .materials {
      display: flex;
      gap: 8px;
    }
    .material-btn {
      width: 40px;
      height: 40px;
      border-radius: 6px;
      border: 2px solid #555;
      cursor: pointer;
      transition: transform 0.1s ease, border-color 0.2s ease;
    }
    .material-btn.active {
      border-color: white;
    }
    .material-btn:active {
      transform: scale(0.9);
    }
    #toolbar .hint {
      font-size: 11px;
      color: #ccc;
      line-height: 1.4;
    }
    #statusPanel {
      position: fixed;
      bottom: 10px;
      right: 10px;
      background: rgba(0, 0, 0, 0.5);
      border-radius: 6px;
      padding: 6px 10px;
      color: white;
      font-size: 12px;
      font-family: monospace;
      z-index: 10;
      user-select: none;
      text-align: right;
    }
  </style>
</head>
<body>
  <canvas id="gameCanvas"></canvas>
  <div id="toolbar">
    <div class="title">材质选择</div>
    <div class="materials">
      <button class="material-btn active" data-material="wood" style="background:#8B4513" title="木头"></button>
      <button class="material-btn" data-material="stone" style="background:#808080" title="石头"></button>
      <button class="material-btn" data-material="water" style="background:#1E90FF" title="水"></button>
      <button class="material-btn" data-material="oil" style="background:#FFD700" title="油"></button>
    </div>
    <div class="hint">左键放置方块，右键生成火焰<br/>空格暂停，R键重置</div>
  </div>
  <div id="statusPanel">
    <div id="fpsDisplay">FPS: 0</div>
    <div id="particleDisplay">粒子数：0</div>
  </div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
