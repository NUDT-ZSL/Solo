<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>风息之诗 - 三维风场可视化</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
    }

    body {
      background: linear-gradient(180deg, #0A0A2E 0%, #1B1B3A 100%);
      color: #ffffff;
    }

    #app {
      width: 100%;
      height: 100%;
      position: relative;
    }

    #canvas-container {
      width: 100%;
      height: 100%;
      position: absolute;
      top: 0;
      left: 0;
    }

    canvas {
      display: block;
    }

    #loading-screen {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: linear-gradient(180deg, #0A0A2E 0%, #1B1B3A 100%);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 9999;
      transition: opacity 0.8s ease-out;
    }

    #loading-screen.hidden {
      opacity: 0;
      pointer-events: none;
    }

    .loading-title {
      font-size: 2.5rem;
      font-weight: 300;
      letter-spacing: 0.5rem;
      color: #00CED1;
      margin-bottom: 2rem;
      text-shadow: 0 0 30px rgba(0, 206, 209, 0.5);
      animation: titleGlow 2s ease-in-out infinite alternate;
    }

    @keyframes titleGlow {
      from {
        text-shadow: 0 0 30px rgba(0, 206, 209, 0.5);
      }
      to {
        text-shadow: 0 0 50px rgba(0, 206, 209, 0.8), 0 0 80px rgba(138, 43, 226, 0.4);
      }
    }

    .loading-subtitle {
      font-size: 0.95rem;
      color: rgba(255, 255, 255, 0.6);
      letter-spacing: 0.3rem;
      margin-bottom: 3rem;
    }

    .loader {
      width: 80px;
      height: 80px;
      position: relative;
    }

    .loader::before,
    .loader::after {
      content: '';
      position: absolute;
      border-radius: 50%;
      border: 2px solid transparent;
    }

    .loader::before {
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      border-top-color: #00CED1;
      border-right-color: #00CED1;
      animation: spin 1.5s linear infinite;
    }

    .loader::after {
      top: 15%;
      left: 15%;
      width: 70%;
      height: 70%;
      border-bottom-color: #8A2BE2;
      border-left-color: #8A2BE2;
      animation: spin 1s linear infinite reverse;
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }

    .loading-text {
      margin-top: 2rem;
      font-size: 0.85rem;
      color: rgba(255, 255, 255, 0.5);
      letter-spacing: 0.15rem;
    }

    .wind-speed-label {
      position: absolute;
      padding: 4px 10px;
      background: rgba(255, 255, 255, 0.12);
      backdrop-filter: blur(8px);
      border: 1px solid rgba(255, 255, 255, 0.2);
      border-radius: 4px;
      color: white;
      font-size: 12px;
      font-weight: 500;
      pointer-events: none;
      transform: translate(-50%, -100%);
      white-space: nowrap;
      z-index: 100;
      text-shadow: 0 1px 3px rgba(0, 0, 0, 0.5);
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.3);
      transition: opacity 0.2s ease-out;
    }

    .wind-speed-label.hidden {
      opacity: 0;
    }
  </style>
</head>
<body>
  <div id="app">
    <div id="loading-screen">
      <div class="loading-title">风息之诗</div>
      <div class="loading-subtitle">WIND BREATH POEM</div>
      <div class="loader"></div>
      <div class="loading-text">正在构建风场...</div>
    </div>
    <div id="canvas-container"></div>
    <div id="speed-label" class="wind-speed-label hidden"></div>
  </div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
