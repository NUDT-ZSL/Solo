<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>时间操控解谜 - Time Manipulation Puzzle</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      background: #0A0A1A;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
      min-width: 1000px;
      font-family: monospace;
    }

    #game-wrapper {
      position: relative;
      width: 900px;
      height: 600px;
    }

    #game-canvas {
      display: block;
      background: #1A1A2E;
      border: 1px solid #333;
    }
  </style>
</head>
<body>
  <div id="game-wrapper">
    <canvas id="game-canvas" width="900" height="600"></canvas>
  </div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
