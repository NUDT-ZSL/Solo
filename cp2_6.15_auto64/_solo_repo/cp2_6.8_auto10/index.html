<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>3D 植物生长模拟器</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
    }

    body {
      background: radial-gradient(ellipse at center, #2d5a27 0%, #1a3a14 50%, #0d1f0a 100%);
      position: relative;
    }

    body::before {
      content: '';
      position: absolute;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3CfeColorMatrix values='0 0 0 0 0.2 0 0 0 0 0.5 0 0 0 0 0.2 0 0 0 0.08 0'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E");
      opacity: 0.6;
      pointer-events: none;
    }

    #app {
      width: 100%;
      height: 100%;
      position: relative;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    #canvas-container {
      flex: 1;
      height: 100%;
      display: flex;
      justify-content: center;
      align-items: center;
      position: relative;
    }

    #canvas-container canvas {
      display: block;
      max-width: 80%;
      max-height: 100%;
    }

    #control-panel {
      width: 250px;
      height: 100%;
      position: fixed;
      right: 0;
      top: 0;
      background: rgba(20, 40, 25, 0.55);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border-left: 1px solid rgba(139, 195, 74, 0.25);
      padding: 24px 18px;
      overflow-y: auto;
      z-index: 10;
      transition: transform 0.35s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .panel-title {
      color: #a5d6a7;
      font-size: 17px;
      font-weight: 600;
      margin-bottom: 20px;
      letter-spacing: 0.5px;
      padding-bottom: 12px;
      border-bottom: 1px solid rgba(139, 195, 74, 0.2);
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .panel-title::before {
      content: '';
      display: inline-block;
      width: 6px;
      height: 6px;
      background: #8bc34a;
      border-radius: 50%;
      box-shadow: 0 0 10px #8bc34a;
    }

    .section {
      margin-bottom: 22px;
    }

    .section-label {
      color: #c5e1a5;
      font-size: 12px;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 10px;
    }

    .slider-group {
      margin-bottom: 16px;
    }

    .slider-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 6px;
    }

    .slider-label {
      color: #dcedc8;
      font-size: 13px;
    }

    .slider-value {
      color: #aed581;
      font-size: 13px;
      font-weight: 600;
      background: rgba(139, 195, 74, 0.12);
      padding: 2px 8px;
      border-radius: 6px;
      min-width: 36px;
      text-align: center;
    }

    input[type="range"] {
      -webkit-appearance: none;
      appearance: none;
      width: 100%;
      height: 6px;
      background: rgba(139, 195, 74, 0.18);
      border-radius: 3px;
      outline: none;
      cursor: pointer;
      transition: all 0.2s;
    }

    input[type="range"]:hover {
      background: rgba(139, 195, 74, 0.28);
      box-shadow: 0 0 8px rgba(139, 195, 74, 0.2);
    }

    input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none;
      appearance: none;
      width: 16px;
      height: 16px;
      background: linear-gradient(135deg, #aed581, #7cb342);
      border-radius: 50%;
      cursor: pointer;
      box-shadow: 0 0 0 2px rgba(139, 195, 74, 0.25), 0 2px 6px rgba(0, 0, 0, 0.3);
      transition: all 0.2s;
    }

    input[type="range"]::-webkit-slider-thumb:hover {
      transform: scale(1.15);
      box-shadow: 0 0 0 3px rgba(139, 195, 74, 0.4), 0 0 15px rgba(139, 195, 74, 0.4), 0 2px 6px rgba(0, 0, 0, 0.3);
    }

    input[type="range"]::-moz-range-thumb {
      width: 16px;
      height: 16px;
      background: linear-gradient(135deg, #aed581, #7cb342);
      border-radius: 50%;
      cursor: pointer;
      border: none;
      box-shadow: 0 0 0 2px rgba(139, 195, 74, 0.25), 0 2px 6px rgba(0, 0, 0, 0.3);
      transition: all 0.2s;
    }

    input[type="range"]::-moz-range-thumb:hover {
      transform: scale(1.15);
      box-shadow: 0 0 0 3px rgba(139, 195, 74, 0.4), 0 0 15px rgba(139, 195, 74, 0.4), 0 2px 6px rgba(0, 0, 0, 0.3);
    }

    .btn-group {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
    }

    .btn {
      flex: 1;
      min-width: 0;
      padding: 9px 10px;
      border: none;
      border-radius: 9px;
      background: rgba(139, 195, 74, 0.12);
      color: #c5e1a5;
      font-size: 12.5px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.22s cubic-bezier(0.4, 0, 0.2, 1);
      border: 1px solid rgba(139, 195, 74, 0.15);
      position: relative;
      overflow: hidden;
    }

    .btn:hover {
      background: rgba(139, 195, 74, 0.25);
      color: #ffffff;
      box-shadow: 0 0 16px rgba(139, 195, 74, 0.35);
      transform: translateY(-1px);
      border-color: rgba(139, 195, 74, 0.4);
    }

    .btn:active {
      transform: scale(0.95);
      transition: transform 0.08s;
    }

    .btn.active {
      background: linear-gradient(135deg, rgba(139, 195, 74, 0.45), rgba(104, 159, 56, 0.45));
      color: #ffffff;
      box-shadow: 0 0 14px rgba(139, 195, 74, 0.45), inset 0 1px 0 rgba(255, 255, 255, 0.15);
      border-color: rgba(139, 195, 74, 0.6);
    }

    .btn-primary {
      background: linear-gradient(135deg, #8bc34a, #689f38);
      color: #ffffff;
      border-color: transparent;
      font-weight: 600;
    }

    .btn-primary:hover {
      background: linear-gradient(135deg, #9ccc65, #7cb342);
      box-shadow: 0 0 22px rgba(139, 195, 74, 0.55);
    }

    .btn-block {
      width: 100%;
      padding: 11px;
      font-size: 13.5px;
    }

    .stage-indicator {
      display: flex;
      gap: 5px;
      margin-top: 6px;
    }

    .stage-dot {
      flex: 1;
      height: 5px;
      border-radius: 2.5px;
      background: rgba(139, 195, 74, 0.18);
      transition: all 0.4s ease;
    }

    .stage-dot.active {
      background: linear-gradient(90deg, #8bc34a, #aed581);
      box-shadow: 0 0 8px rgba(139, 195, 74, 0.5);
    }

    .stage-label {
      color: #aed581;
      font-size: 12px;
      margin-top: 8px;
      text-align: center;
      font-style: italic;
    }

    #mobile-toggle {
      display: none;
      position: fixed;
      bottom: 16px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 20;
      padding: 12px 24px;
      background: rgba(20, 40, 25, 0.85);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid rgba(139, 195, 74, 0.35);
      border-radius: 28px;
      color: #c5e1a5;
      font-size: 14px;
      cursor: pointer;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.4);
      transition: all 0.25s;
    }

    #mobile-toggle:hover {
      box-shadow: 0 4px 28px rgba(139, 195, 74, 0.35);
      background: rgba(30, 55, 35, 0.9);
    }

    #mobile-toggle:active {
      transform: translateX(-50%) scale(0.95);
    }

    #mobile-close {
      display: none;
      position: absolute;
      top: 12px;
      right: 12px;
      width: 32px;
      height: 32px;
      background: rgba(139, 195, 74, 0.15);
      border: none;
      border-radius: 50%;
      color: #c5e1a5;
      font-size: 18px;
      cursor: pointer;
      transition: all 0.2s;
      align-items: center;
      justify-content: center;
    }

    #mobile-close:hover {
      background: rgba(139, 195, 74, 0.3);
      color: #ffffff;
    }

    @media (max-width: 768px) {
      #canvas-container canvas {
        max-width: 100%;
      }

      #control-panel {
        width: 100%;
        height: 50vh;
        top: auto;
        bottom: 0;
        border-left: none;
        border-top: 1px solid rgba(139, 195, 74, 0.25);
        transform: translateY(100%);
        border-radius: 20px 20px 0 0;
      }

      #control-panel.open {
        transform: translateY(0);
      }

      #mobile-toggle {
        display: block;
      }

      #mobile-close {
        display: flex;
      }
    }
  </style>
</head>
<body>
  <div id="app">
    <div id="canvas-container"></div>

    <aside id="control-panel">
      <button id="mobile-close" aria-label="关闭面板">&times;</button>

      <div class="panel-title">植物生长控制</div>

      <div class="section">
        <div class="section-label">生长速度</div>
        <div class="btn-group" id="speed-group">
          <button class="btn" data-speed="slow">慢速</button>
          <button class="btn active" data-speed="normal">中速</button>
          <button class="btn" data-speed="fast">快速</button>
        </div>
        <div class="stage-indicator" id="stage-indicator">
          <div class="stage-dot active"></div>
          <div class="stage-dot"></div>
          <div class="stage-dot"></div>
          <div class="stage-dot"></div>
          <div class="stage-dot"></div>
        </div>
        <div class="stage-label" id="stage-label">种子 · Seed</div>
      </div>

      <div class="section">
        <div class="section-label">环境参数</div>
        <div class="slider-group">
          <div class="slider-header">
            <span class="slider-label">☀ 光照强度</span>
            <span class="slider-value" id="light-value">60</span>
          </div>
          <input type="range" id="light-slider" min="0" max="100" value="60" />
        </div>
        <div class="slider-group">
          <div class="slider-header">
            <span class="slider-label">💧 水分值</span>
            <span class="slider-value" id="water-value">60</span>
          </div>
          <input type="range" id="water-slider" min="0" max="100" value="60" />
        </div>
        <div class="slider-group">
          <div class="slider-header">
            <span class="slider-label">🌡 温度</span>
            <span class="slider-value" id="temp-value">50</span>
          </div>
          <input type="range" id="temp-slider" min="0" max="100" value="50" />
        </div>
      </div>

      <div class="section">
        <div class="section-label">观察视角</div>
        <div class="btn-group">
          <button class="btn" id="view-top">俯视</button>
          <button class="btn" id="view-side">侧视</button>
          <button class="btn" id="view-reset">重置</button>
        </div>
      </div>

      <div class="section">
        <div class="btn-group">
          <button class="btn" id="btn-reset" style="flex:1">重置生长</button>
        </div>
        <div style="height:10px"></div>
        <button class="btn btn-primary btn-block" id="btn-snapshot">📷 生成快照</button>
      </div>
    </aside>

    <button id="mobile-toggle">⚙ 控制面板</button>
  </div>

  <script type="module" src="/src/main.ts"></script>
</body>
</html>
