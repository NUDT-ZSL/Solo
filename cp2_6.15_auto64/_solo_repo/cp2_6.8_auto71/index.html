<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>音频驱动动态图案生成器</title>
  <link rel="stylesheet" href="/src/styles.css" />
</head>
<body>
  <canvas id="visualizer-canvas"></canvas>

  <div class="control-panel" id="controlPanel">
    <div class="panel-header">
      <span class="panel-title">参数控制</span>
      <button class="panel-toggle" id="panelToggle" aria-label="折叠面板">
        <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M6 9l6 6 6-6"/>
        </svg>
      </button>
    </div>

    <div class="panel-content">
      <div class="control-group">
        <label for="beatThreshold">节拍阈值: <span id="beatThresholdVal">0.50</span></label>
        <input type="range" id="beatThreshold" min="0" max="1" step="0.01" value="0.5" class="custom-slider" />
      </div>

      <div class="control-group">
        <label for="saturation">颜色饱和度: <span id="saturationVal">70</span>%</label>
        <input type="range" id="saturation" min="0" max="100" step="1" value="70" class="custom-slider" />
      </div>

      <div class="control-group">
        <label for="particleCount">粒子数量: <span id="particleCountVal">50</span></label>
        <input type="range" id="particleCount" min="10" max="200" step="1" value="50" class="custom-slider" />
      </div>

      <div class="control-group">
        <label for="sizeScale">图案尺寸: <span id="sizeScaleVal">1.00</span>x</label>
        <input type="range" id="sizeScale" min="0.5" max="2" step="0.01" value="1" class="custom-slider" />
      </div>

      <div class="effects-section">
        <span class="effects-title">视觉效果</span>

        <div class="effect-item">
          <label class="switch">
            <input type="checkbox" id="glowToggle" />
            <span class="slider-switch"></span>
          </label>
          <span class="effect-label">辉光</span>
          <input type="range" id="glowIntensity" min="5" max="50" step="1" value="20" class="effect-slider" />
        </div>

        <div class="effect-item">
          <label class="switch">
            <input type="checkbox" id="trailToggle" />
            <span class="slider-switch"></span>
          </label>
          <span class="effect-label">残影</span>
          <input type="range" id="trailIntensity" min="1" max="10" step="1" value="2" class="effect-slider" />
        </div>

        <div class="effect-item">
          <label class="switch">
            <input type="checkbox" id="mosaicToggle" />
            <span class="slider-switch"></span>
          </label>
          <span class="effect-label">马赛克</span>
          <input type="range" id="mosaicBlockSize" min="5" max="15" step="1" value="10" class="effect-slider" />
        </div>
      </div>
    </div>
  </div>

  <div class="bottom-bar" id="bottomBar">
    <div class="bar-content">
      <label class="upload-btn ripple-btn" for="fileInput">
        <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
          <polyline points="17 8 12 3 7 8"/>
          <line x1="12" y1="3" x2="12" y2="15"/>
        </svg>
        <span>上传音频</span>
      </label>
      <input type="file" id="fileInput" accept="audio/mp3,audio/wav,audio/ogg,.mp3,.wav,.ogg" hidden />

      <button class="mic-btn ripple-btn" id="micBtn" aria-label="麦克风">
        <span class="mic-dot" id="micDot"></span>
        <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/>
          <path d="M19 10v2a7 7 0 0 1-14 0v-2"/>
          <line x1="12" y1="19" x2="12" y2="23"/>
          <line x1="8" y1="23" x2="16" y2="23"/>
        </svg>
      </button>

      <div class="pattern-selector">
        <button class="pattern-btn active ripple-btn" data-pattern="circle" aria-label="圆形脉冲" title="圆形脉冲">
          <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="12" cy="12" r="9"/>
            <circle cx="12" cy="12" r="4"/>
          </svg>
        </button>
        <button class="pattern-btn ripple-btn" data-pattern="polygon" aria-label="多边形旋转" title="多边形旋转">
          <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="2">
            <polygon points="12,2 22,8.5 18.5,20 5.5,20 2,8.5"/>
          </svg>
        </button>
        <button class="pattern-btn ripple-btn" data-pattern="spiral" aria-label="螺旋线生长" title="螺旋线生长">
          <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M12 12 m0 -10 a10 10 0 1 1 -0.1 0" fill="none"/>
            <path d="M12 12 m0 -7 a7 7 0 1 1 -0.1 0" fill="none"/>
            <path d="M12 12 m0 -4 a4 4 0 1 1 -0.1 0" fill="none"/>
          </svg>
        </button>
        <button class="pattern-btn ripple-btn" data-pattern="particles" aria-label="粒子簇扩散" title="粒子簇扩散">
          <svg viewBox="0 0 24 24" width="22" height="22" fill="currentColor" stroke="none">
            <circle cx="12" cy="5" r="1.5"/>
            <circle cx="5" cy="12" r="1.5"/>
            <circle cx="19" cy="12" r="1.5"/>
            <circle cx="12" cy="19" r="1.5"/>
            <circle cx="7" cy="7" r="1.2"/>
            <circle cx="17" cy="7" r="1.2"/>
            <circle cx="7" cy="17" r="1.2"/>
            <circle cx="17" cy="17" r="1.2"/>
            <circle cx="12" cy="12" r="2"/>
          </svg>
        </button>
        <button class="pattern-btn ripple-btn" data-pattern="waveform" aria-label="波形轨迹" title="波形轨迹">
          <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="2">
            <polyline points="2,12 5,6 8,18 11,4 14,20 17,8 20,14 22,12"/>
          </svg>
        </button>
      </div>
    </div>
  </div>

  <div class="mobile-drawer-handle" id="drawerHandle">
    <svg viewBox="0 0 24 24" width="24" height="24" fill="none" stroke="currentColor" stroke-width="2">
      <path d="M12 15l-6-6 6-6"/>
      <path d="M6 9h12"/>
    </svg>
  </div>

  <script type="module" src="/src/main.ts"></script>
</body>
</html>
