<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>声纹画卷 · Voiceprint Canvas</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #000;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      user-select: none;
    }

    #app {
      position: relative;
      width: 100vw;
      height: 100vh;
      background: radial-gradient(circle at center, #1a1a2e 0%, #121212 70%, #000000 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    .canvas-wrapper {
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    #visualizer {
      display: block;
      border-radius: 8px;
    }

    .record-btn {
      position: absolute;
      right: 20px;
      bottom: 20px;
      width: 44px;
      height: 44px;
      min-width: 44px;
      min-height: 44px;
      border: none;
      border-radius: 50%;
      cursor: pointer;
      background: linear-gradient(135deg, #00ffff 0%, #0066ff 100%);
      box-shadow: 0 0 8px #00ffff, inset 0 0 12px rgba(0, 255, 255, 0.3);
      display: flex;
      align-items: center;
      justify-content: center;
      transition: transform 0.3s ease-out, box-shadow 0.3s ease-out;
      z-index: 10;
      touch-action: manipulation;
    }

    .record-btn:hover {
      box-shadow: 0 0 16px #00ffff, 0 0 24px #0066ff, inset 0 0 16px rgba(0, 255, 255, 0.5);
      animation: hover-pulse 1.5s ease-in-out infinite;
    }

    .record-btn.recording {
      background: linear-gradient(135deg, #ff6b6b 0%, #a855f7 100%);
      box-shadow: 0 0 8px #ff6b6b, inset 0 0 12px rgba(255, 107, 107, 0.3);
      animation: record-pulse 1.2s ease-in-out infinite;
    }

    .record-btn.recording:hover {
      box-shadow: 0 0 16px #ff6b6b, 0 0 24px #a855f7, inset 0 0 16px rgba(255, 107, 107, 0.5);
    }

    .record-btn svg {
      width: 20px;
      height: 20px;
      fill: #fff;
    }

    @keyframes record-pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.1); }
    }

    @keyframes hover-pulse {
      0%, 100% { box-shadow: 0 0 16px #00ffff, 0 0 24px #0066ff, inset 0 0 16px rgba(0, 255, 255, 0.5); }
      50% { box-shadow: 0 0 20px #00ffff, 0 0 32px #0066ff, inset 0 0 20px rgba(0, 255, 255, 0.6); }
    }

    .histogram-container {
      position: absolute;
      left: 50%;
      bottom: 20px;
      transform: translateX(-50%);
      width: 240px;
      height: 40px;
      display: flex;
      align-items: flex-end;
      justify-content: center;
      gap: 2px;
      opacity: 0;
      transition: opacity 0.5s ease-out;
      z-index: 5;
      pointer-events: none;
    }

    .histogram-container.visible {
      opacity: 1;
    }

    .histogram-bar {
      width: 6px;
      height: 4px;
      border-radius: 2px 2px 0 0;
      background: linear-gradient(180deg, #ff6b6b 0%, #00ff88 100%);
      transition: height 0.08s ease-out;
      box-shadow: 0 0 4px rgba(0, 255, 136, 0.4);
    }

    .loader {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 80px;
      height: 80px;
      z-index: 100;
      opacity: 1;
      transition: opacity 0.5s ease-out;
      pointer-events: none;
    }

    .loader.hidden {
      opacity: 0;
    }

    .loader-ring {
      position: absolute;
      top: 50%;
      left: 50%;
      border-radius: 50%;
      border: 2px solid transparent;
    }

    .loader-ring:nth-child(1) {
      width: 80px;
      height: 80px;
      margin: -40px 0 0 -40px;
      border-top-color: #00ffff;
      animation: loader-spin 1.2s linear infinite;
      box-shadow: 0 0 8px #00ffff;
    }

    .loader-ring:nth-child(2) {
      width: 60px;
      height: 60px;
      margin: -30px 0 0 -30px;
      border-right-color: #a855f7;
      animation: loader-spin 1.8s linear infinite reverse;
      box-shadow: 0 0 8px #a855f7;
    }

    .loader-ring:nth-child(3) {
      width: 40px;
      height: 40px;
      margin: -20px 0 0 -20px;
      border-bottom-color: #ff6b6b;
      animation: loader-spin 2.4s linear infinite;
      box-shadow: 0 0 8px #ff6b6b;
    }

    @keyframes loader-spin {
      to { transform: rotate(360deg); }
    }

    .status-text {
      position: absolute;
      top: 20px;
      left: 50%;
      transform: translateX(-50%);
      color: rgba(0, 255, 255, 0.7);
      font-size: 12px;
      letter-spacing: 2px;
      text-shadow: 0 0 8px #00ffff;
      z-index: 5;
      pointer-events: none;
      transition: opacity 0.3s ease-out;
    }

    .status-text.hidden {
      opacity: 0;
    }

    @media (max-width: 600px) {
      .record-btn {
        right: 16px;
        bottom: 16px;
      }

      .histogram-container {
        width: 200px;
        bottom: 16px;
      }

      .histogram-bar {
        width: 5px;
      }
    }
  </style>
</head>
<body>
  <div id="app">
    <div class="loader" id="loader">
      <div class="loader-ring"></div>
      <div class="loader-ring"></div>
      <div class="loader-ring"></div>
    </div>

    <div class="status-text hidden" id="statusText">点击右下角按钮开始录音</div>

    <div class="canvas-wrapper" id="canvasWrapper">
      <canvas id="visualizer"></canvas>

      <button class="record-btn" id="recordBtn" aria-label="开始录音">
        <svg viewBox="0 0 24 24" id="micIcon">
          <path d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3zm5.3-3c0 3-2.54 5.1-5.3 5.1S6.7 14 6.7 11H5c0 3.41 2.72 6.23 6 6.72V21h2v-3.28c3.28-.48 6-3.3 6-6.72h-1.7z"/>
        </svg>
      </button>

      <div class="histogram-container" id="histogram"></div>
    </div>
  </div>

  <script type="module" src="/src/main.ts"></script>
</body>
</html>
