<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>3D 数据流沙漏</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      html,
      body {
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: linear-gradient(180deg, #0a0a2a 0%, #1a1a3a 100%);
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto,
          "Helvetica Neue", Arial, sans-serif;
      }
      #app {
        width: 100%;
        height: 100%;
        position: relative;
      }
      canvas {
        display: block;
        width: 100%;
        height: 100%;
      }
      .hint-bar {
        position: absolute;
        top: 0;
        left: 0;
        right: 0;
        padding: 12px 24px;
        background: rgba(0, 0, 0, 0.35);
        backdrop-filter: blur(8px);
        color: #ffffff;
        font-size: 13px;
        line-height: 1.6;
        display: flex;
        justify-content: center;
        align-items: center;
        gap: 28px;
        flex-wrap: wrap;
        z-index: 10;
        border-bottom: 1px solid rgba(255, 255, 255, 0.08);
      }
      .hint-bar .hint-item {
        display: flex;
        align-items: center;
        gap: 6px;
      }
      .hint-bar .key {
        display: inline-block;
        padding: 2px 8px;
        background: rgba(255, 255, 255, 0.12);
        border: 1px solid rgba(255, 255, 255, 0.2);
        border-radius: 4px;
        font-family: monospace;
        font-size: 12px;
        color: #a0d8ff;
      }
      .hint-bar .sep {
        opacity: 0.3;
      }
      @media (max-width: 768px) {
        .hint-bar {
          font-size: 11px;
          padding: 8px 12px;
          gap: 14px;
        }
        .hint-bar .key {
          font-size: 10px;
          padding: 1px 6px;
        }
      }
    </style>
  </head>
  <body>
    <div id="app">
      <div class="hint-bar">
        <div class="hint-item"><span class="key">拖拽</span>旋转视角</div>
        <div class="hint-item"><span class="key">滚轮</span>缩放</div>
        <div class="hint-item"><span class="key">空格</span>脉冲扰动</div>
        <div class="hint-item"><span class="key">R</span>重置</div>
        <div class="hint-item"><span class="key">悬停</span>加速附近粒子</div>
      </div>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
