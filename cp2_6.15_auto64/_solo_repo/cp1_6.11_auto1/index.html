<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>星轨弹球</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    }

    body {
      display: flex;
      justify-content: center;
      align-items: center;
      background: radial-gradient(ellipse at center, #0B1026 0%, #1A0E30 100%);
      min-height: 100vh;
    }

    #game-wrapper {
      width: 100%;
      height: 100%;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 5vh 5vw;
    }

    #game-canvas {
      max-width: 800px;
      max-height: 600px;
      width: 80vw;
      height: 60vw;
      aspect-ratio: 4 / 3;
      border-radius: 12px;
      box-shadow: 0 0 40px rgba(100, 100, 255, 0.3);
      display: block;
    }
  </style>
</head>
<body>
  <div id="game-wrapper">
    <canvas id="game-canvas" width="800" height="600"></canvas>
  </div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
