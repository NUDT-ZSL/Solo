<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>墨渊钓客</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: linear-gradient(180deg, #0a192f 0%, #020c1b 100%);
      font-family: 'Microsoft YaHei', 'PingFang SC', sans-serif;
      color: #64ffda;
      cursor: crosshair;
    }

    #gameCanvas {
      display: block;
      width: 100%;
      height: 100%;
      touch-action: none;
    }

    #loadingScreen {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: linear-gradient(180deg, #0a192f 0%, #020c1b 100%);
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      z-index: 9999;
      transition: opacity 0.5s ease-out;
    }

    #loadingScreen.hidden {
      opacity: 0;
      pointer-events: none;
    }

    .loading-title {
      font-size: 48px;
      color: #64ffda;
      text-shadow: 0 0 20px rgba(100, 255, 218, 0.5);
      margin-bottom: 30px;
      animation: pulse 2s ease-in-out infinite;
    }

    .loading-subtitle {
      font-size: 18px;
      color: #8892b0;
      margin-bottom: 40px;
    }

    .loading-bar {
      width: 200px;
      height: 4px;
      background: rgba(100, 255, 218, 0.2);
      border-radius: 2px;
      overflow: hidden;
    }

    .loading-progress {
      height: 100%;
      background: linear-gradient(90deg, #64ffda, #fbbf24);
      width: 0%;
      animation: loading 1.5s ease-in-out forwards;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.7; }
    }

    @keyframes loading {
      0% { width: 0%; }
      100% { width: 100%; }
    }

    .glass-panel {
      background: rgba(10, 25, 47, 0.8);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      border: 1px solid rgba(100, 255, 218, 0.2);
      border-radius: 8px;
    }

    .btn {
      background: rgba(10, 25, 47, 0.8);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      border: 1px solid rgba(100, 255, 218, 0.3);
      color: #64ffda;
      padding: 10px 20px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 14px;
      transition: all 0.2s ease;
      font-family: inherit;
    }

    .btn:hover {
      color: #fbbf24;
      border-color: rgba(251, 191, 36, 0.5);
      transform: scale(1.05);
    }

    @media (max-width: 768px) {
      .loading-title {
        font-size: 32px;
      }
    }
  </style>
</head>
<body>
  <div id="loadingScreen">
    <h1 class="loading-title">墨渊钓客</h1>
    <p class="loading-subtitle">准备渔具，探索深渊...</p>
    <div class="loading-bar">
      <div class="loading-progress"></div>
    </div>
  </div>
  <canvas id="gameCanvas"></canvas>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
