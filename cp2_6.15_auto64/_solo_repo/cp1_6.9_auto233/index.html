<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>灵契召唤</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #0a0015;
      font-family: 'Georgia', 'Microsoft YaHei', serif;
    }
    body {
      display: flex;
      align-items: center;
      justify-content: center;
      background:
        radial-gradient(ellipse at 20% 30%, rgba(40, 10, 80, 0.6) 0%, transparent 50%),
        radial-gradient(ellipse at 80% 70%, rgba(80, 10, 30, 0.5) 0%, transparent 50%),
        linear-gradient(135deg, #1a0a2e 0%, #2d0a1e 50%, #3d0a0a 100%);
      position: relative;
    }
    body::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-image:
        radial-gradient(1px 1px at 25px 25px, rgba(255,255,255,0.8), transparent),
        radial-gradient(1px 1px at 50px 80px, rgba(255,255,255,0.6), transparent),
        radial-gradient(1px 1px at 120px 150px, rgba(255,255,255,0.5), transparent),
        radial-gradient(2px 2px at 200px 50px, rgba(255,215,0,0.7), transparent),
        radial-gradient(1px 1px at 300px 200px, rgba(255,255,255,0.4), transparent),
        radial-gradient(1px 1px at 400px 80px, rgba(255,255,255,0.6), transparent),
        radial-gradient(1px 1px at 500px 180px, rgba(255,255,255,0.5), transparent),
        radial-gradient(2px 2px at 600px 120px, rgba(255,215,0,0.5), transparent);
      background-size: 700px 300px;
      animation: twinkle 8s ease-in-out infinite alternate;
      pointer-events: none;
      z-index: 0;
    }
    @keyframes twinkle {
      0% { opacity: 0.5; }
      100% { opacity: 1; }
    }
    #game-container {
      position: relative;
      z-index: 1;
      box-shadow:
        0 0 60px rgba(100, 50, 200, 0.4),
        0 0 120px rgba(255, 100, 50, 0.2),
        inset 0 0 30px rgba(0, 0, 0, 0.5);
      border: 2px solid rgba(255, 215, 100, 0.3);
      border-radius: 8px;
      overflow: hidden;
    }
    canvas {
      display: block;
      image-rendering: pixelated;
    }
  </style>
</head>
<body>
  <div id="game-container"></div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
