<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>深渊回声 · Abyss Echoes</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #001F3F;
    }
    #canvas-container {
      position: fixed;
      inset: 0;
      z-index: 0;
    }
    #canvas-container canvas {
      display: block;
      width: 100%;
      height: 100%;
    }
    #control-panel {
      position: fixed;
      left: 20px;
      top: 20px;
      width: 180px;
      background: rgba(10, 26, 46, 0.7);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      border: 0.5px solid rgba(255, 255, 255, 0.3);
      border-radius: 12px;
      padding: 16px;
      z-index: 10;
      color: #A0E0FF;
      user-select: none;
    }
    #control-panel .title {
      font-size: 12px;
      font-weight: 600;
      margin-bottom: 14px;
      letter-spacing: 1px;
      color: #00D4FF;
      text-transform: uppercase;
    }
    .control-row {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 12px;
    }
    #play-btn {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      background: rgba(0, 212, 255, 0.2);
      border: 1px solid rgba(0, 212, 255, 0.5);
      color: #00D4FF;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s ease;
      flex-shrink: 0;
    }
    #play-btn:hover {
      background: rgba(0, 212, 255, 0.35);
      transform: scale(1.05);
    }
    #play-btn svg {
      width: 14px;
      height: 14px;
      fill: currentColor;
    }
    .volume-wrap {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 4px;
    }
    .volume-label {
      font-size: 10px;
      color: rgba(160, 224, 255, 0.7);
    }
    #volume-slider {
      -webkit-appearance: none;
      appearance: none;
      width: 100%;
      height: 4px;
      border-radius: 2px;
      background: rgba(160, 224, 255, 0.2);
      outline: none;
      cursor: pointer;
    }
    #volume-slider::-webkit-slider-thumb {
      -webkit-appearance: none;
      appearance: none;
      width: 12px;
      height: 12px;
      border-radius: 50%;
      background: #00D4FF;
      cursor: pointer;
      box-shadow: 0 0 8px rgba(0, 212, 255, 0.6);
    }
    #volume-slider::-moz-range-thumb {
      width: 12px;
      height: 12px;
      border-radius: 50%;
      background: #00D4FF;
      cursor: pointer;
      border: none;
      box-shadow: 0 0 8px rgba(0, 212, 255, 0.6);
    }
    #waveform-canvas {
      width: 120px;
      height: 30px;
      display: block;
      margin: 8px auto 0;
    }
  </style>
</head>
<body>
  <div id="canvas-container"></div>
  <div id="control-panel">
    <div class="title">深渊回声</div>
    <div class="control-row">
      <button id="play-btn" title="播放/暂停">
        <svg id="icon-play" viewBox="0 0 24 24" style="display:block;">
          <path d="M8 5v14l11-7z"/>
        </svg>
        <svg id="icon-pause" viewBox="0 0 24 24" style="display:none;">
          <path d="M6 4h4v16H6zM14 4h4v16h-4z"/>
        </svg>
      </button>
      <div class="volume-wrap">
        <span class="volume-label">音量</span>
        <input type="range" id="volume-slider" min="0" max="100" value="70" />
      </div>
    </div>
    <canvas id="waveform-canvas" width="120" height="30"></canvas>
  </div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
