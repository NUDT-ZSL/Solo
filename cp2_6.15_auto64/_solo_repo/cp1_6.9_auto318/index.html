<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>回声镜廊 | Echo Mirror Gallery</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      html, body {
        width: 100%;
        height: 100%;
        overflow: hidden;
        background-color: #0a0a1a;
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        color: #ffffff;
      }
      #app {
        width: 100vw;
        height: 100vh;
        position: relative;
      }
      #canvas-container {
        width: 100%;
        height: 100%;
      }
      #ui-overlay {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        pointer-events: none;
        z-index: 10;
      }
      #hud-info {
        position: absolute;
        top: 20px;
        left: 20px;
        font-size: 14px;
        line-height: 1.8;
        color: rgba(200, 200, 255, 0.8);
        background: rgba(10, 10, 26, 0.6);
        padding: 12px 18px;
        border-radius: 8px;
        border: 1px solid rgba(180, 150, 255, 0.3);
        backdrop-filter: blur(8px);
      }
      #hud-info span {
        color: #b388ff;
        font-weight: bold;
      }
      #interact-hint {
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, 40px);
        padding: 10px 20px;
        background: rgba(179, 136, 255, 0.15);
        border: 1px solid rgba(179, 136, 255, 0.5);
        border-radius: 20px;
        font-size: 16px;
        color: #e1bee7;
        opacity: 0;
        transition: opacity 0.3s ease;
        backdrop-filter: blur(4px);
      }
      #interact-hint.visible {
        opacity: 1;
      }
      #recording-overlay {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        display: none;
        align-items: center;
        justify-content: center;
        background: rgba(0, 0, 0, 0.7);
        z-index: 20;
        pointer-events: auto;
      }
      #recording-overlay.active {
        display: flex;
      }
      #recording-panel {
        position: relative;
        width: 360px;
        height: 480px;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
      }
      #timer-canvas {
        position: absolute;
        top: 0;
        left: 50%;
        transform: translateX(-50%);
        width: 100px;
        height: 100px;
      }
      #waveform-canvas {
        width: 300px;
        height: 400px;
        border: 4px solid #ffd700;
        border-radius: 8px;
        background: rgba(10, 10, 30, 0.9);
        box-shadow: 0 0 30px rgba(255, 215, 0, 0.3),
                    inset 0 0 20px rgba(179, 136, 255, 0.1);
      }
      #recording-status {
        margin-top: 20px;
        font-size: 18px;
        color: #e1bee7;
        text-align: center;
      }
      #recording-status.recording {
        color: #ff5252;
        animation: pulse 0.8s infinite;
      }
      @keyframes pulse {
        0%, 100% { opacity: 1; }
        50% { opacity: 0.5; }
      }
      #crosshair {
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        width: 6px;
        height: 6px;
        background: rgba(255, 255, 255, 0.6);
        border-radius: 50%;
        pointer-events: none;
      }
      #loading {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        display: flex;
        align-items: center;
        justify-content: center;
        background: #0a0a1a;
        z-index: 100;
        font-size: 20px;
        color: #b388ff;
      }
      #loading.hidden {
        display: none;
      }
      .loader-dot {
        display: inline-block;
        width: 8px;
        height: 8px;
        margin: 0 4px;
        background: #b388ff;
        border-radius: 50%;
        animation: bounce 1.4s infinite ease-in-out both;
      }
      .loader-dot:nth-child(1) { animation-delay: -0.32s; }
      .loader-dot:nth-child(2) { animation-delay: -0.16s; }
      @keyframes bounce {
        0%, 80%, 100% { transform: scale(0); }
        40% { transform: scale(1); }
      }
    </style>
  </head>
  <body>
    <div id="app">
      <div id="loading">
        <span>正在加载回声镜廊</span>
        <span class="loader-dot"></span>
        <span class="loader-dot"></span>
        <span class="loader-dot"></span>
      </div>
      <div id="canvas-container"></div>
      <div id="ui-overlay">
        <div id="crosshair"></div>
        <div id="hud-info">
          <div><span>WASD</span> 在迷宫内移动</div>
          <div><span>鼠标拖拽</span> 调整视角</div>
          <div><span>靠近画框 + E</span> 录制声音</div>
          <div>画框数量: <span id="frame-count">0</span>/12</div>
        </div>
        <div id="interact-hint">按 E 录制你的独白</div>
      </div>
      <div id="recording-overlay">
        <div id="recording-panel">
          <canvas id="timer-canvas" width="100" height="100"></canvas>
          <canvas id="waveform-canvas" width="300" height="400"></canvas>
          <div id="recording-status">点击开始录制</div>
        </div>
      </div>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
