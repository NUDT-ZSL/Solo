<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>星焰书简 · 文字星空可视化</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600;900&family=Noto+Sans+SC:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --deep-space: #0B0E2A;
      --deep-space-alt: #050816;
      --star-white: #F0F4FF;
      --gold-start: #FFD700;
      --gold-end: #FF8C00;
      --pos-color: #FFD700;
      --neu-color: #C0C0C0;
      --neg-color: #4A90D9;
      --glass-bg: rgba(11, 14, 42, 0.55);
      --glass-border: rgba(240, 244, 255, 0.18);
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      font-family: 'Noto Sans SC', sans-serif;
      color: var(--star-white);
      background: radial-gradient(ellipse at top, #121742 0%, var(--deep-space) 45%, var(--deep-space-alt) 100%);
    }

    #canvas-container {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 1;
    }

    #canvas-container canvas {
      display: block;
      width: 100%;
      height: 100%;
    }

    .bg-stars {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 0;
      pointer-events: none;
      background-image:
        radial-gradient(1px 1px at 12% 18%, rgba(255,255,255,0.6), transparent),
        radial-gradient(1px 1px at 28% 72%, rgba(255,255,255,0.4), transparent),
        radial-gradient(1.5px 1.5px at 52% 34%, rgba(255,215,0,0.45), transparent),
        radial-gradient(1px 1px at 68% 88%, rgba(255,255,255,0.55), transparent),
        radial-gradient(1px 1px at 82% 22%, rgba(255,255,255,0.5), transparent),
        radial-gradient(1.5px 1.5px at 92% 58%, rgba(74,144,217,0.5), transparent),
        radial-gradient(1px 1px at 42% 92%, rgba(255,255,255,0.4), transparent),
        radial-gradient(1px 1px at 8% 52%, rgba(255,255,255,0.35), transparent);
      background-size: 100% 100%;
      opacity: 0.85;
      animation: twinkle 6s ease-in-out infinite alternate;
    }

    @keyframes twinkle {
      from { opacity: 0.55; }
      to { opacity: 0.95; }
    }

    .title-wrap {
      position: fixed;
      top: 38px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 10;
      text-align: center;
      pointer-events: none;
    }

    .title {
      font-family: 'Noto Serif SC', serif;
      font-size: 44px;
      font-weight: 900;
      letter-spacing: 14px;
      background: linear-gradient(135deg, #F0F4FF 0%, #FFD700 50%, #FFA500 100%);
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
      text-shadow: 0 0 40px rgba(255, 215, 0, 0.25);
      padding-left: 14px;
    }

    .subtitle {
      margin-top: 8px;
      font-size: 13px;
      letter-spacing: 6px;
      color: rgba(240, 244, 255, 0.55);
      font-weight: 300;
    }

    .input-card {
      position: fixed;
      top: 50%;
      left: 42px;
      transform: translateY(-50%);
      z-index: 20;
      width: 420px;
      padding: 30px 28px 28px;
      background: var(--glass-bg);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid var(--glass-border);
      border-radius: 20px;
      box-shadow:
        0 8px 32px rgba(0, 0, 0, 0.35),
        inset 0 1px 0 rgba(255, 255, 255, 0.08);
    }

    .card-label {
      font-family: 'Noto Serif SC', serif;
      font-size: 18px;
      font-weight: 600;
      color: var(--star-white);
      margin-bottom: 14px;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .card-label::before {
      content: '';
      display: inline-block;
      width: 4px;
      height: 18px;
      border-radius: 2px;
      background: linear-gradient(180deg, var(--gold-start), var(--gold-end));
      box-shadow: 0 0 10px rgba(255, 215, 0, 0.5);
    }

    .textarea-wrap {
      position: relative;
    }

    #text-input {
      width: 100%;
      min-height: 170px;
      padding: 14px 16px;
      font-family: 'Noto Serif SC', serif;
      font-size: 15px;
      line-height: 1.8;
      color: var(--star-white);
      background: rgba(5, 8, 22, 0.5);
      border: 1px solid rgba(240, 244, 255, 0.12);
      border-radius: 12px;
      outline: none;
      resize: none;
      backdrop-filter: blur(4px);
      transition: border-color 0.3s ease, box-shadow 0.3s ease;
    }

    #text-input::placeholder {
      color: rgba(240, 244, 255, 0.35);
      font-style: italic;
    }

    #text-input:focus {
      border-color: rgba(255, 215, 0, 0.45);
      box-shadow: 0 0 0 3px rgba(255, 215, 0, 0.08), 0 0 24px rgba(255, 215, 0, 0.1);
    }

    .counter-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin: 10px 4px 18px;
      font-size: 12px;
    }

    .counter {
      color: rgba(240, 244, 255, 0.5);
    }

    .counter.warn {
      color: #FF8C00;
    }

    .counter.error {
      color: #FF5555;
    }

    .hint {
      color: rgba(240, 244, 255, 0.35);
      font-size: 11px;
    }

    #transform-btn {
      width: 100%;
      height: 48px;
      font-family: 'Noto Serif SC', serif;
      font-size: 16px;
      font-weight: 600;
      letter-spacing: 4px;
      color: #2A1E00;
      background: linear-gradient(135deg, var(--gold-start) 0%, var(--gold-end) 100%);
      border: none;
      border-radius: 12px;
      cursor: pointer;
      box-shadow: 0 4px 16px rgba(255, 140, 0, 0.35), 0 2px 4px rgba(0, 0, 0, 0.2);
      transition: transform 0.22s cubic-bezier(0.22, 1, 0.36, 1),
                  box-shadow 0.22s ease,
                  filter 0.22s ease;
      position: relative;
      overflow: hidden;
    }

    #transform-btn::after {
      content: '';
      position: absolute;
      top: 0;
      left: -100%;
      width: 100%;
      height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.35), transparent);
      transition: left 0.5s ease;
    }

    #transform-btn:hover:not(:disabled) {
      transform: translateY(-2px);
      box-shadow: 0 8px 28px rgba(255, 140, 0, 0.5), 0 4px 10px rgba(0, 0, 0, 0.25);
      filter: brightness(1.06);
    }

    #transform-btn:hover:not(:disabled)::after {
      left: 100%;
    }

    #transform-btn:active:not(:disabled) {
      transform: translateY(0);
    }

    #transform-btn:disabled {
      opacity: 0.45;
      cursor: not-allowed;
      filter: grayscale(0.3);
    }

    .control-panel {
      position: fixed;
      right: 42px;
      bottom: 38px;
      z-index: 20;
      width: 300px;
      padding: 20px 22px;
      background: var(--glass-bg);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid var(--glass-border);
      border-radius: 16px;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
    }

    .panel-title {
      font-size: 13px;
      color: rgba(240, 244, 255, 0.7);
      letter-spacing: 2px;
      margin-bottom: 14px;
      font-weight: 500;
    }

    .slider-row {
      margin-bottom: 18px;
    }

    .slider-label {
      display: flex;
      justify-content: space-between;
      font-size: 12px;
      color: rgba(240, 244, 255, 0.6);
      margin-bottom: 8px;
    }

    .slider-value {
      color: var(--gold-start);
      font-variant-numeric: tabular-nums;
    }

    #speed-slider {
      width: 100%;
      height: 4px;
      -webkit-appearance: none;
      appearance: none;
      background: rgba(240, 244, 255, 0.12);
      border-radius: 2px;
      outline: none;
    }

    #speed-slider::-webkit-slider-thumb {
      -webkit-appearance: none;
      appearance: none;
      width: 14px;
      height: 14px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--gold-start), var(--gold-end));
      cursor: pointer;
      box-shadow: 0 0 10px rgba(255, 215, 0, 0.55);
      transition: transform 0.15s ease;
    }

    #speed-slider::-webkit-slider-thumb:hover {
      transform: scale(1.2);
    }

    #speed-slider::-moz-range-thumb {
      width: 14px;
      height: 14px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--gold-start), var(--gold-end));
      cursor: pointer;
      border: none;
      box-shadow: 0 0 10px rgba(255, 215, 0, 0.55);
    }

    .legend {
      border-top: 1px solid rgba(240, 244, 255, 0.08);
      padding-top: 14px;
    }

    .legend-title {
      font-size: 12px;
      color: rgba(240, 244, 255, 0.55);
      margin-bottom: 10px;
    }

    .legend-list {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .legend-item {
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 12px;
      color: rgba(240, 244, 255, 0.7);
    }

    .legend-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      box-shadow: 0 0 8px currentColor;
      flex-shrink: 0;
    }

    .legend-dot.pos { color: var(--pos-color); background: var(--pos-color); }
    .legend-dot.neu { color: var(--neu-color); background: var(--neu-color); }
    .legend-dot.neg { color: var(--neg-color); background: var(--neg-color); }

    .stats {
      margin-top: 14px;
      padding-top: 12px;
      border-top: 1px solid rgba(240, 244, 255, 0.08);
      display: flex;
      gap: 16px;
    }

    .stat-item {
      flex: 1;
      text-align: center;
    }

    .stat-num {
      font-size: 20px;
      font-weight: 600;
      font-family: 'Noto Serif SC', serif;
      color: var(--gold-start);
      font-variant-numeric: tabular-nums;
    }

    .stat-label {
      font-size: 10px;
      color: rgba(240, 244, 255, 0.45);
      margin-top: 2px;
      letter-spacing: 1px;
    }

    .tip {
      position: fixed;
      left: 50%;
      bottom: 38px;
      transform: translateX(-50%);
      z-index: 15;
      font-size: 12px;
      color: rgba(240, 244, 255, 0.4);
      letter-spacing: 2px;
      pointer-events: none;
    }

    @media (max-width: 900px) {
      .input-card {
        left: 50%;
        top: 110px;
        transform: translateX(-50%);
        width: calc(100% - 32px);
        max-width: 420px;
      }
      .control-panel {
        right: 50%;
        bottom: 24px;
        transform: translateX(50%);
        width: calc(100% - 32px);
        max-width: 420px;
      }
      .tip { display: none; }
      .title { font-size: 30px; letter-spacing: 8px; }
    }
  </style>
</head>
<body>
  <div class="bg-stars"></div>
  <div id="canvas-container"></div>

  <div class="title-wrap">
    <h1 class="title">星焰书简</h1>
    <p class="subtitle">让 文 字 化 作 满 天 星 河</p>
  </div>

  <div class="input-card" id="input-card">
    <div class="card-label">书写一段心语</div>
    <div class="textarea-wrap">
      <textarea
        id="text-input"
        maxlength="300"
        placeholder="请在此输入一段散文或诗歌&#10;例如：夜色如水，星光洒落人间，&#10;思念如潮水般涌来，带着温暖的记忆..."
      ></textarea>
    </div>
    <div class="counter-row">
      <span class="counter" id="counter">0 / 50-200 字</span>
      <span class="hint">建议 50-200 字效果最佳</span>
    </div>
    <button id="transform-btn" disabled>✦ 点 亮 星 焰 ✦</button>
  </div>

  <div class="control-panel">
    <div class="panel-title">✦ 星 空 调 控</div>
    <div class="slider-row">
      <div class="slider-label">
        <span>旋转速度</span>
        <span class="slider-value" id="speed-value">1.5°/s</span>
      </div>
      <input type="range" id="speed-slider" min="0.5" max="5" step="0.1" value="1.5" />
    </div>
    <div class="legend">
      <div class="legend-title">星语情感图谱</div>
      <div class="legend-list">
        <div class="legend-item">
          <span class="legend-dot pos"></span>
          <span>积极情感 · 金橙色 · #FFD700</span>
        </div>
        <div class="legend-item">
          <span class="legend-dot neu"></span>
          <span>中性情感 · 银白 · #C0C0C0</span>
        </div>
        <div class="legend-item">
          <span class="legend-dot neg"></span>
          <span>消极情感 · 幽蓝 · #4A90D9</span>
        </div>
      </div>
    </div>
    <div class="stats">
      <div class="stat-item">
        <div class="stat-num" id="stat-stars">0</div>
        <div class="stat-label">星 点 数</div>
      </div>
      <div class="stat-item">
        <div class="stat-num" id="stat-clusters">0</div>
        <div class="stat-label">星 座 数</div>
      </div>
      <div class="stat-item">
        <div class="stat-num" id="stat-fps">60</div>
        <div class="stat-label">帧 率</div>
      </div>
    </div>
  </div>

  <div class="tip">拖 动 旋 转 视 角 · 滚 轮 缩 放 星 空</div>

  <script type="module" src="/src/main.ts"></script>
</body>
</html>
