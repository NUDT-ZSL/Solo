<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>星语脉冲 · Stellar Pulse</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background-color: #0a0a1a;
      font-family: 'JetBrains Mono', 'Consolas', 'Courier New', monospace;
      color: #cfefff;
      user-select: none;
      -webkit-user-select: none;
    }
    #app-container {
      position: relative;
      width: 100vw;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }
    #three-canvas {
      display: block;
      width: 100%;
      height: 100%;
      background-color: #0a0a1a;
    }
    #ui-overlay {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 10;
    }
    #pulse-btn {
      position: absolute;
      top: 28px;
      left: 28px;
      width: 120px;
      height: 44px;
      border: none;
      border-radius: 22px;
      cursor: pointer;
      pointer-events: auto;
      font-family: inherit;
      font-size: 15px;
      font-weight: 600;
      letter-spacing: 1px;
      color: #001f2a;
      background: linear-gradient(135deg, #00e5ff 0%, #00b8d4 100%);
      box-shadow: 0 0 20px rgba(0, 229, 255, 0.35),
                  0 4px 16px rgba(0, 184, 212, 0.25);
      transition: filter 0.18s ease, transform 0.1s ease, box-shadow 0.18s ease;
    }
    #pulse-btn:hover {
      filter: brightness(1.15);
      box-shadow: 0 0 32px rgba(0, 229, 255, 0.55),
                  0 6px 22px rgba(0, 184, 212, 0.35);
    }
    #pulse-btn:active {
      transform: scaleY(0.9);
      filter: brightness(1.2);
    }
    #title-badge {
      position: absolute;
      top: 26px;
      right: 28px;
      text-align: right;
      pointer-events: none;
    }
    #title-badge h1 {
      font-size: 18px;
      font-weight: 600;
      letter-spacing: 3px;
      color: #00e5ff;
      text-shadow: 0 0 12px rgba(0, 229, 255, 0.6);
      margin-bottom: 4px;
    }
    #title-badge p {
      font-size: 11px;
      letter-spacing: 1.5px;
      color: #6a8ba8;
    }
    #info-hint {
      position: absolute;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 11px;
      letter-spacing: 1.2px;
      color: #5b7a96;
      pointer-events: none;
      text-align: center;
      line-height: 1.8;
    }
    #info-hint span {
      display: inline-block;
      margin: 0 10px;
      padding: 4px 10px;
      border: 1px solid rgba(0, 229, 255, 0.18);
      border-radius: 10px;
      background: rgba(0, 229, 255, 0.04);
    }
    @media (max-width: 768px) {
      #app-container {
        transform: scale(0.8);
        transform-origin: center center;
        width: 125vw;
        height: 125vh;
        margin-left: -12.5vw;
        margin-top: -12.5vh;
      }
      #pulse-btn {
        top: 20px;
        left: 20px;
        width: 100px;
        height: 38px;
        font-size: 13px;
      }
      #title-badge {
        top: 18px;
        right: 20px;
      }
      #title-badge h1 {
        font-size: 15px;
        letter-spacing: 2px;
      }
      #info-hint {
        bottom: 16px;
        font-size: 10px;
      }
      #info-hint span {
        margin: 0 5px;
        padding: 3px 8px;
      }
    }
  </style>
</head>
<body>
  <div id="app-container">
    <canvas id="three-canvas"></canvas>
    <div id="ui-overlay">
      <button id="pulse-btn">脉冲 · PULSE</button>
      <div id="title-badge">
        <h1>星语脉冲</h1>
        <p>STELLAR · PULSE · ANALYZER</p>
      </div>
      <div id="info-hint">
        <span>左键拖拽旋转</span>
        <span>滚轮缩放</span>
        <span>Shift+拖拽框选分析</span>
      </div>
    </div>
  </div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
