<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>晶格宇宙 - Crystal Universe</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: linear-gradient(to bottom, #0a0a1a, #1a1a3a);
      font-family: 'Segoe UI', Arial, sans-serif;
    }
    #app {
      width: 100%;
      height: 100%;
      position: relative;
    }
    #version {
      position: absolute;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      color: rgba(255, 255, 255, 0.3);
      font-size: 14px;
      letter-spacing: 2px;
      pointer-events: none;
      z-index: 10;
    }
    #label {
      position: absolute;
      pointer-events: none;
      background: rgba(10, 10, 40, 0.85);
      border: 1px solid rgba(120, 180, 255, 0.4);
      border-radius: 6px;
      padding: 8px 12px;
      color: #ffffff;
      font-size: 12px;
      line-height: 1.6;
      display: none;
      z-index: 20;
      backdrop-filter: blur(4px);
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.4);
    }
    #label .coord {
      color: #88ccff;
      font-weight: 600;
    }
    #label .connections {
      color: #ffcc88;
    }
    canvas {
      display: block;
    }
  </style>
</head>
<body>
  <div id="app">
    <div id="version">Crystal Universe v1.0</div>
    <div id="label"></div>
  </div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
