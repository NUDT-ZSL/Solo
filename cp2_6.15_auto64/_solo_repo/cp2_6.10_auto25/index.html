<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>实时协作思维导图</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
    }
    #app {
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
    }
    #toolbar {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      height: 56px;
      background: #1a1a2e;
      display: flex;
      align-items: center;
      padding: 0 16px;
      gap: 8px;
      z-index: 100;
      flex-wrap: wrap;
      min-height: 56px;
      height: auto;
    }
    .toolbar-btn {
      background: transparent;
      color: #e0e0e0;
      border: none;
      padding: 8px 16px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 14px;
      transition: background-color 0.2s ease;
      display: inline-flex;
      align-items: center;
      gap: 6px;
    }
    .toolbar-btn:hover {
      background: #2a2a4e;
    }
    .toolbar-btn:disabled {
      opacity: 0.4;
      cursor: not-allowed;
    }
    .toolbar-divider {
      width: 1px;
      height: 24px;
      background: #3a3a5e;
      margin: 0 8px;
    }
    #canvas-container {
      position: absolute;
      top: 56px;
      left: 0;
      right: 0;
      bottom: 0;
      background: #ffffff;
      overflow: hidden;
    }
    #canvas {
      display: block;
      position: absolute;
      top: 0;
      left: 0;
    }
    .color-palette {
      position: absolute;
      background: #ffffff;
      border-radius: 8px;
      box-shadow: 0 4px 16px rgba(0,0,0,0.15);
      padding: 8px;
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 6px;
      z-index: 200;
    }
    .color-swatch {
      width: 28px;
      height: 28px;
      border-radius: 6px;
      cursor: pointer;
      border: 2px solid transparent;
      transition: transform 0.15s, border-color 0.15s;
    }
    .color-swatch:hover {
      transform: scale(1.1);
      border-color: #4285f4;
    }
    .node-editor {
      position: absolute;
      z-index: 150;
      background: transparent;
      border: 2px solid #4285f4;
      border-radius: 12px;
      outline: none;
      resize: none;
      padding: 12px 16px;
      font-size: 14px;
      font-family: inherit;
      text-align: center;
    }
    #node-panel {
      position: fixed;
      right: 16px;
      top: 72px;
      background: #ffffff;
      border-radius: 12px;
      box-shadow: 0 4px 16px rgba(0,0,0,0.12);
      padding: 16px;
      width: 240px;
      z-index: 100;
      display: none;
    }
    #node-panel.visible {
      display: block;
    }
    .panel-title {
      font-size: 14px;
      font-weight: 600;
      color: #333;
      margin-bottom: 12px;
    }
    .panel-section {
      margin-bottom: 16px;
    }
    .panel-label {
      font-size: 12px;
      color: #666;
      margin-bottom: 6px;
      display: block;
    }
    .panel-row {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
    }
    .priority-btn {
      flex: 1;
      padding: 6px 8px;
      border: 1px solid #ddd;
      background: #fff;
      border-radius: 6px;
      cursor: pointer;
      font-size: 12px;
      transition: all 0.2s;
    }
    .priority-btn:hover {
      border-color: #4285f4;
    }
    .priority-btn.active {
      background: #4285f4;
      color: #fff;
      border-color: #4285f4;
    }
    .border-slider {
      width: 100%;
      cursor: pointer;
    }
    @media (max-width: 640px) {
      #toolbar {
        padding: 8px;
        gap: 4px;
      }
      .toolbar-btn {
        padding: 6px 10px;
        font-size: 12px;
      }
      #node-panel {
        right: 8px;
        left: 8px;
        width: auto;
      }
    }
  </style>
</head>
<body>
  <div id="app">
    <div id="toolbar">
      <button class="toolbar-btn" id="btn-undo" title="撤销 (Ctrl+Z)">↶ 撤销</button>
      <button class="toolbar-btn" id="btn-redo" title="重做 (Ctrl+Shift+Z)">↷ 重做</button>
      <div class="toolbar-divider"></div>
      <button class="toolbar-btn" id="btn-add-node">+ 新建节点</button>
      <button class="toolbar-btn" id="btn-delete-node" title="删除选中节点">🗑 删除节点</button>
      <div class="toolbar-divider"></div>
      <button class="toolbar-btn" id="btn-export">⬇ 导出PNG</button>
      <button class="toolbar-btn" id="btn-clear">🧹 清空画布</button>
    </div>
    <div id="canvas-container">
      <canvas id="canvas"></canvas>
    </div>
    <div id="node-panel">
      <div class="panel-title">节点样式</div>
      <div class="panel-section">
        <span class="panel-label">背景色</span>
        <div class="panel-row" id="bg-colors"></div>
      </div>
      <div class="panel-section">
        <span class="panel-label">字体颜色</span>
        <div class="panel-row" id="text-colors"></div>
      </div>
      <div class="panel-section">
        <span class="panel-label">边框粗细: <span id="border-value">2</span>px</span>
        <input type="range" class="border-slider" id="border-slider" min="1" max="5" value="2">
      </div>
      <div class="panel-section">
        <span class="panel-label">优先级</span>
        <div class="panel-row">
          <button class="priority-btn" data-priority="high">🔴 高</button>
          <button class="priority-btn" data-priority="medium">🟡 中</button>
          <button class="priority-btn" data-priority="low">🟢 低</button>
        </div>
      </div>
    </div>
  </div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
