<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GlowPong</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      background-color: #0a0a0a;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      overflow: hidden;
    }

    body {
      display: flex;
      justify-content: center;
      align-items: center;
      flex-direction: column;
    }

    #game-container {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 16px;
    }

    #game-canvas {
      display: block;
      border-radius: 8px;
      box-shadow: 0 0 40px rgba(247, 37, 133, 0.2);
    }
  </style>
</head>
<body>
  <div id="game-container">
    <canvas id="game-canvas" width="800" height="540"></canvas>
  </div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
