<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>分子链爆 · Molecular Chain Explosion</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: linear-gradient(135deg, #0A0A2E 0%, #1A1A4A 100%);
      font-family: 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
      color: #fff;
    }
    #game-container {
      position: relative;
      width: 100vw;
      height: 100vh;
      overflow: hidden;
    }
    canvas {
      display: block;
      width: 100%;
      height: 100%;
    }
    #loading {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #0A0A2E 0%, #1A1A4A 100%);
      z-index: 100;
      transition: opacity 0.6s ease;
    }
    #loading.hidden {
      opacity: 0;
      pointer-events: none;
    }
    .loader {
      width: 60px;
      height: 60px;
      border: 3px solid rgba(224, 255, 255, 0.2);
      border-top-color: #E0FFFF;
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
    .loading-text {
      margin-top: 20px;
      font-size: 16px;
      letter-spacing: 4px;
      color: #E0FFFF;
      opacity: 0.8;
      animation: pulse 1.5s ease-in-out infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 0.4; }
      50% { opacity: 1; }
    }
    #reset-btn {
      position: absolute;
      right: 20px;
      bottom: 20px;
      padding: 10px 24px;
      background: #333;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      cursor: pointer;
      transition: all 0.25s ease;
      z-index: 10;
      user-select: none;
    }
    #reset-btn:hover {
      background: #FF4500;
      transform: translateY(-2px);
      box-shadow: 0 4px 12px rgba(255, 69, 0, 0.4);
    }
    #energy-counter {
      position: absolute;
      top: 20px;
      right: 20px;
      padding: 10px 20px;
      border-radius: 10px;
      background: rgba(255, 215, 0, 0.15);
      border: 1px solid rgba(255, 215, 0, 0.3);
      font-size: 18px;
      font-weight: bold;
      z-index: 10;
      transition: all 0.3s ease;
      min-width: 120px;
      text-align: center;
    }
    #energy-counter.highlight {
      animation: blink 0.6s ease-in-out infinite;
      background: linear-gradient(90deg, #FFD700, #FF4500);
      border-color: #FF4500;
    }
    @keyframes blink {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.1); }
    }
    #flash {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: #fff;
      opacity: 0;
      pointer-events: none;
      z-index: 50;
    }
    #flash.active {
      animation: flashAnim 0.6s ease-out forwards;
    }
    @keyframes flashAnim {
      0% { opacity: 0.3; }
      100% { opacity: 0; }
    }
  </style>
</head>
<body>
  <div id="game-container">
    <canvas id="game-canvas"></canvas>
    <div id="energy-counter">能量: 0</div>
    <button id="reset-btn">重 置</button>
    <div id="flash"></div>
    <div id="loading">
      <div class="loader"></div>
      <div class="loading-text">LOADING</div>
    </div>
  </div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
