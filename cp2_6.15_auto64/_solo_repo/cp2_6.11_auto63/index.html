<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>情绪星图 · Emotion Star Map</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", "Segoe UI", sans-serif;
      background: linear-gradient(180deg, #0D0221 0%, #000000 100%);
      color: #fff;
    }
    #app {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
    }
    canvas {
      display: block;
      width: 100%;
      height: 100%;
    }
    #loader {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      background: linear-gradient(180deg, #0D0221 0%, #000000 100%);
      z-index: 9999;
      transition: opacity 0.8s ease;
    }
    #loader.hidden {
      opacity: 0;
      pointer-events: none;
    }
    .loader-ring {
      width: 60px;
      height: 60px;
      border: 3px solid rgba(255,255,255,0.1);
      border-top-color: #FFD700;
      border-radius: 50%;
      animation: spin 1.2s linear infinite;
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
    .loader-text {
      margin-top: 24px;
      font-size: 14px;
      letter-spacing: 3px;
      color: rgba(255,255,255,0.6);
      animation: breathe 2.4s ease-in-out infinite;
    }
    @keyframes breathe {
      0%, 100% { opacity: 0.4; }
      50% { opacity: 1; }
    }
    #ui-panel {
      position: fixed;
      top: 24px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 100;
      width: 90%;
      max-width: 640px;
      padding: 20px;
      background: rgba(255,255,255,0.1);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 16px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.4);
    }
    .panel-title {
      font-size: 18px;
      font-weight: 600;
      margin-bottom: 12px;
      letter-spacing: 2px;
      background: linear-gradient(90deg, #FFD700, #87CEEB, #98FB98, #9370DB);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .panel-subtitle {
      font-size: 12px;
      color: rgba(255,255,255,0.5);
      margin-bottom: 14px;
      letter-spacing: 1px;
    }
    #text-input {
      width: 100%;
      min-height: 100px;
      max-height: 200px;
      padding: 14px 16px;
      font-size: 14px;
      line-height: 1.7;
      color: #fff;
      background: rgba(0,0,0,0.25);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 10px;
      outline: none;
      resize: vertical;
      font-family: inherit;
      transition: border-color 0.2s;
    }
    #text-input::placeholder {
      color: rgba(255,255,255,0.3);
    }
    #text-input:focus {
      border-color: rgba(255,215,0,0.5);
    }
    .input-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-top: 12px;
      gap: 12px;
    }
    .char-count {
      font-size: 11px;
      color: rgba(255,255,255,0.4);
      letter-spacing: 1px;
    }
    #generate-btn {
      padding: 10px 28px;
      font-size: 13px;
      font-weight: 600;
      letter-spacing: 2px;
      color: #0D0221;
      background: linear-gradient(135deg, #FFD700, #FFA500);
      border: none;
      border-radius: 10px;
      cursor: pointer;
      opacity: 0.85;
      animation: btn-breathe 1.5s ease-in-out infinite;
      transition: transform 0.15s, box-shadow 0.2s;
      box-shadow: 0 2px 12px rgba(255,215,0,0.3);
    }
    #generate-btn:hover {
      transform: translateY(-1px);
      box-shadow: 0 4px 20px rgba(255,215,0,0.5);
    }
    #generate-btn:active {
      transform: translateY(0);
    }
    @keyframes btn-breathe {
      0%, 100% { opacity: 0.82; }
      50% { opacity: 1; }
    }
    #generate-btn:disabled {
      animation: none;
      opacity: 0.4;
      cursor: not-allowed;
      transform: none;
      box-shadow: none;
    }
    #legend {
      position: fixed;
      bottom: 24px;
      left: 24px;
      z-index: 100;
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      padding: 14px 18px;
      background: rgba(255,255,255,0.08);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 12px;
    }
    .legend-item {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 11px;
      color: rgba(255,255,255,0.75);
      letter-spacing: 1px;
    }
    .legend-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      box-shadow: 0 0 8px currentColor;
    }
    #hint {
      position: fixed;
      bottom: 24px;
      right: 24px;
      z-index: 100;
      font-size: 11px;
      color: rgba(255,255,255,0.4);
      letter-spacing: 1px;
      text-align: right;
      line-height: 1.8;
      padding: 14px 18px;
      background: rgba(255,255,255,0.06);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 12px;
    }
    #bubble-container {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 200;
    }
    .text-bubble {
      position: absolute;
      max-width: 340px;
      min-width: 160px;
      padding: 14px 18px;
      background: rgba(18, 6, 42, 0.85);
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
      border: 1px solid rgba(255,255,255,0.2);
      border-radius: 14px;
      box-shadow: 0 8px 40px rgba(0,0,0,0.6), inset 0 0 0 1px rgba(255,255,255,0.05);
      transform: translate(-50%, -100%) translateY(-16px);
      opacity: 0;
      transition: opacity 0.35s ease, transform 0.35s cubic-bezier(0.34, 1.56, 0.64, 1);
      pointer-events: auto;
    }
    .text-bubble.visible {
      opacity: 1;
      transform: translate(-50%, -100%) translateY(-8px);
    }
    .bubble-emotion-tag {
      display: inline-block;
      padding: 2px 10px;
      font-size: 10px;
      letter-spacing: 2px;
      border-radius: 20px;
      margin-bottom: 10px;
      font-weight: 600;
    }
    .bubble-text {
      font-size: 14px;
      line-height: 1.75;
      color: #fff;
      text-shadow: 0 1px 3px rgba(0,0,0,0.8), 0 0 20px rgba(255,255,255,0.1);
      letter-spacing: 0.3px;
      word-break: break-word;
    }
    .bubble-arrow {
      position: absolute;
      bottom: -8px;
      left: 50%;
      transform: translateX(-50%);
      width: 16px;
      height: 16px;
      background: rgba(18, 6, 42, 0.85);
      border-right: 1px solid rgba(255,255,255,0.2);
      border-bottom: 1px solid rgba(255,255,255,0.2);
      transform: translateX(-50%) rotate(45deg);
    }
    @media (max-width: 768px) {
      #ui-panel {
        top: 16px;
        width: 80%;
        padding: 16px;
      }
      .panel-title {
        font-size: 16px;
      }
      #text-input {
        min-height: 80px;
        font-size: 13px;
      }
      #generate-btn {
        padding: 8px 20px;
        font-size: 12px;
        letter-spacing: 1px;
      }
      #legend {
        bottom: 12px;
        left: 12px;
        right: 12px;
        padding: 10px 12px;
        gap: 8px;
      }
      .legend-item {
        font-size: 10px;
      }
      #hint {
        display: none;
      }
      .text-bubble {
        max-width: 260px;
        padding: 12px 14px;
      }
      .bubble-text {
        font-size: 13px;
      }
    }
  </style>
</head>
<body>
  <div id="loader">
    <div class="loader-ring"></div>
    <div class="loader-text">加载星图引擎</div>
  </div>
  <div id="app"></div>

  <div id="ui-panel">
    <div class="panel-title">✦ 情绪星图 ✦</div>
    <div class="panel-subtitle">输入日记 / 诗句 / 思绪，生成属于你的专属星座</div>
    <textarea
      id="text-input"
      placeholder="示例：今天阳光很好，我在公园散步时笑出了声。可是一想到下周的考试，我又有点焦虑不安。深夜看着窗外的月亮，心里却异常平静。"></textarea>
    <div class="input-row">
      <span class="char-count"><span id="count">0</span> / 500 字</span>
      <button id="generate-btn">生 成 星 图</button>
    </div>
  </div>

  <div id="legend">
    <div class="legend-item"><span class="legend-dot" style="background:#FFD700;color:#FFD700"></span>快乐</div>
    <div class="legend-item"><span class="legend-dot" style="background:#4A90D9;color:#4A90D9"></span>悲伤</div>
    <div class="legend-item"><span class="legend-dot" style="background:#DC143C;color:#DC143C"></span>愤怒</div>
    <div class="legend-item"><span class="legend-dot" style="background:#98FB98;color:#98FB98"></span>平静</div>
    <div class="legend-item"><span class="legend-dot" style="background:#9370DB;color:#9370DB"></span>焦虑</div>
  </div>

  <div id="hint">
    🖱 拖拽旋转视角<br>
    🔍 滚轮缩放远近<br>
    ✨ 点击恒星查看文字
  </div>

  <div id="bubble-container"></div>

  <script type="module" src="/src/main.ts"></script>
</body>
</html>
