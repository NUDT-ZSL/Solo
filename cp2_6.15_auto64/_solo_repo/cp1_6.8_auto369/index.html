<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>息壤世界 - 交互式地形生成与探索</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      html, body {
        width: 100%;
        height: 100%;
        overflow: hidden;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
        background: #1a1a2e;
      }
      #canvas-container {
        width: 100%;
        height: 100%;
        position: absolute;
        top: 0;
        left: 0;
      }
      canvas {
        display: block;
      }

      .glass-panel {
        position: fixed;
        top: 16px;
        left: 16px;
        background: rgba(255, 255, 255, 0.12);
        backdrop-filter: blur(16px);
        -webkit-backdrop-filter: blur(16px);
        border: 1px solid rgba(255, 255, 255, 0.2);
        border-radius: 16px;
        padding: 20px;
        min-width: 220px;
        color: #fff;
        z-index: 100;
        transition: all 0.3s ease;
      }
      .glass-panel.collapsed {
        min-width: auto;
        padding: 12px;
        border-radius: 50%;
        cursor: pointer;
      }
      .glass-panel.collapsed .panel-content {
        display: none;
      }
      .panel-toggle {
        display: none;
        width: 28px;
        height: 28px;
        cursor: pointer;
        font-size: 18px;
        text-align: center;
        line-height: 28px;
      }
      .glass-panel.collapsed .panel-toggle {
        display: block;
      }
      .panel-title {
        font-size: 14px;
        font-weight: 600;
        margin-bottom: 16px;
        letter-spacing: 0.5px;
        opacity: 0.9;
      }
      .glass-panel.collapsed .panel-title {
        display: none;
      }
      .control-group {
        margin-bottom: 14px;
      }
      .control-label {
        font-size: 11px;
        opacity: 0.7;
        margin-bottom: 6px;
        text-transform: uppercase;
        letter-spacing: 1px;
      }
      .control-group input[type="range"] {
        width: 100%;
        height: 4px;
        -webkit-appearance: none;
        appearance: none;
        background: rgba(255, 255, 255, 0.2);
        border-radius: 2px;
        outline: none;
      }
      .control-group input[type="range"]::-webkit-slider-thumb {
        -webkit-appearance: none;
        appearance: none;
        width: 14px;
        height: 14px;
        border-radius: 50%;
        background: #4CAF50;
        cursor: pointer;
        border: 2px solid #fff;
      }
      .control-value {
        font-size: 11px;
        opacity: 0.6;
        text-align: right;
        margin-top: 4px;
      }
      .btn-clear {
        width: 100%;
        padding: 8px;
        background: rgba(244, 67, 54, 0.3);
        border: 1px solid rgba(244, 67, 54, 0.5);
        border-radius: 8px;
        color: #fff;
        font-size: 12px;
        cursor: pointer;
        transition: background 0.2s;
        letter-spacing: 0.5px;
      }
      .btn-clear:hover {
        background: rgba(244, 67, 54, 0.5);
      }

      .tool-bar {
        position: fixed;
        bottom: 24px;
        left: 50%;
        transform: translateX(-50%);
        display: flex;
        gap: 8px;
        background: rgba(255, 255, 255, 0.12);
        backdrop-filter: blur(16px);
        -webkit-backdrop-filter: blur(16px);
        border: 1px solid rgba(255, 255, 255, 0.2);
        border-radius: 16px;
        padding: 10px 16px;
        z-index: 100;
      }
      .tool-btn {
        width: 44px;
        height: 44px;
        border-radius: 12px;
        border: 1px solid rgba(255, 255, 255, 0.15);
        background: rgba(255, 255, 255, 0.08);
        color: #fff;
        font-size: 20px;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        transition: all 0.2s;
        position: relative;
      }
      .tool-btn:hover {
        background: rgba(255, 255, 255, 0.18);
        transform: translateY(-2px);
      }
      .tool-btn.active {
        background: rgba(76, 175, 80, 0.4);
        border-color: rgba(76, 175, 80, 0.7);
      }
      .tool-btn .tool-label {
        position: absolute;
        bottom: -18px;
        font-size: 9px;
        opacity: 0.6;
        white-space: nowrap;
      }

      .mode-bar {
        position: fixed;
        top: 16px;
        left: 50%;
        transform: translateX(-50%);
        display: flex;
        gap: 4px;
        background: rgba(255, 255, 255, 0.12);
        backdrop-filter: blur(16px);
        -webkit-backdrop-filter: blur(16px);
        border: 1px solid rgba(255, 255, 255, 0.2);
        border-radius: 12px;
        padding: 6px;
        z-index: 100;
      }
      .mode-btn {
        padding: 6px 16px;
        border-radius: 8px;
        border: none;
        background: transparent;
        color: rgba(255, 255, 255, 0.6);
        font-size: 12px;
        cursor: pointer;
        transition: all 0.2s;
      }
      .mode-btn.active {
        background: rgba(76, 175, 80, 0.4);
        color: #fff;
      }
      .mode-btn:hover:not(.active) {
        background: rgba(255, 255, 255, 0.1);
        color: rgba(255, 255, 255, 0.9);
      }

      .fps-counter {
        position: fixed;
        bottom: 16px;
        right: 16px;
        background: rgba(0, 0, 0, 0.4);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        border-radius: 8px;
        padding: 6px 12px;
        color: #4CAF50;
        font-size: 12px;
        font-family: 'Courier New', monospace;
        z-index: 100;
        min-width: 60px;
        text-align: center;
      }

      .river-hint {
        position: fixed;
        top: 60px;
        left: 50%;
        transform: translateX(-50%);
        background: rgba(79, 195, 247, 0.2);
        backdrop-filter: blur(8px);
        border: 1px solid rgba(79, 195, 247, 0.4);
        border-radius: 8px;
        padding: 6px 16px;
        color: #4FC3F7;
        font-size: 12px;
        z-index: 100;
        display: none;
      }

      @media (max-width: 768px) {
        .glass-panel {
          min-width: 180px;
          padding: 14px;
        }
        .tool-btn {
          width: 36px;
          height: 36px;
          font-size: 16px;
        }
        .tool-bar {
          padding: 8px 12px;
          gap: 6px;
        }
      }
    </style>
  </head>
  <body>
    <div id="canvas-container"></div>

    <div class="glass-panel" id="control-panel">
      <div class="panel-toggle" id="panel-toggle">☰</div>
      <div class="panel-content">
        <div class="panel-title">息壤世界</div>
        <div class="control-group">
          <div class="control-label">高度缩放</div>
          <input type="range" id="height-scale" min="0.5" max="5" step="0.1" value="2" />
          <div class="control-value" id="height-scale-val">2.0</div>
        </div>
        <div class="control-group">
          <div class="control-label">元素密度</div>
          <input type="range" id="density" min="0.2" max="2" step="0.1" value="1" />
          <div class="control-value" id="density-val">1.0</div>
        </div>
        <div class="control-group">
          <div class="control-label">编辑半径</div>
          <input type="range" id="edit-radius" min="1" max="8" step="0.5" value="3" />
          <div class="control-value" id="edit-radius-val">3.0</div>
        </div>
        <div class="control-group">
          <div class="control-label">编辑强度</div>
          <input type="range" id="edit-strength" min="0.1" max="2" step="0.1" value="0.5" />
          <div class="control-value" id="edit-strength-val">0.5</div>
        </div>
        <button class="btn-clear" id="btn-clear">清除所有元素</button>
      </div>
    </div>

    <div class="mode-bar" id="mode-bar">
      <button class="mode-btn active" data-mode="raise">隆起</button>
      <button class="mode-btn" data-mode="flatten">刮平</button>
      <button class="mode-btn" data-mode="place">放置</button>
    </div>

    <div class="tool-bar" id="tool-bar" style="display: none;">
      <button class="tool-btn active" data-tool="tree" title="树木">🌲<span class="tool-label">树木</span></button>
      <button class="tool-btn" data-tool="rock" title="石头">🪨<span class="tool-label">石头</span></button>
      <button class="tool-btn" data-tool="river" title="河流">💧<span class="tool-label">河流</span></button>
    </div>

    <div class="fps-counter" id="fps-counter">60 FPS</div>
    <div class="river-hint" id="river-hint">点击地形选择河流终点</div>

    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
