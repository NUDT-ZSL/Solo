<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>数字水彩画创作工具</title>
  <link rel="stylesheet" href="/src/style.css" />
</head>
<body>
  <div id="app">
    <div id="canvas-container">
      <canvas id="watercolor-canvas"></canvas>
      <canvas id="paper-canvas"></canvas>
      <div id="fps-counter">FPS: 60</div>
    </div>
    <aside id="control-panel">
      <h1 class="panel-title">水彩画创作</h1>
      
      <div class="section">
        <h2 class="section-title">调色板</h2>
        <div id="palette" class="palette"></div>
      </div>

      <div class="section">
        <h2 class="section-title">笔刷扩散速度</h2>
        <div class="slider-row">
          <input type="range" id="diffusion-speed" min="0.5" max="3" step="0.1" value="1" />
          <span id="diffusion-value">1.0x</span>
        </div>
      </div>

      <div class="section">
        <h2 class="section-title">颜料透明度</h2>
        <div class="slider-row">
          <input type="range" id="opacity" min="0.1" max="1" step="0.05" value="0.7" />
          <span id="opacity-value">0.70</span>
        </div>
      </div>

      <div class="section">
        <h2 class="section-title">纸纹强度</h2>
        <div class="slider-row">
          <input type="range" id="paper-intensity" min="0" max="100" step="1" value="60" />
          <span id="paper-value">60%</span>
        </div>
      </div>

      <div class="section buttons">
        <button id="clear-btn" class="btn btn-secondary">清空画布</button>
        <button id="save-btn" class="btn btn-primary">保存为PNG</button>
      </div>

      <div class="section hint">
        <p>🎨 慢速拖动：浓郁色块</p>
        <p>✏️ 中速拖动：飞白笔触</p>
        <p>💨 快速拖动：飞溅粒子</p>
        <p>👆 单击：颜料飞溅</p>
        <p>👆👆 双击：颜料爆炸</p>
      </div>
    </aside>
  </div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
