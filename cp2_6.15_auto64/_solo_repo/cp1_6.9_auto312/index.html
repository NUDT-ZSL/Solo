<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>幻界灯影 - Phantom Lantern</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background-color: hsl(220, 10%, 5%);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
      color: #fff;
    }

    #game-container {
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    #canvas-wrapper {
      position: relative;
      border: 20px solid transparent;
      border-image: linear-gradient(135deg, 
        #6b4423 0%, #8b5a2b 20%, #5d3a1a 40%, 
        #a0622d 60%, #7a4a1f 80%, #6b4423 100%) 1;
      box-shadow: 
        inset 0 0 20px rgba(0,0,0,0.7),
        0 0 40px rgba(0,0,0,0.8),
        0 8px 32px rgba(0,0,0,0.6),
        0 2px 8px rgba(0,0,0,0.9);
      background: linear-gradient(135deg, #4a3015 0%, #3a2410 100%);
    }

    #canvas-wrapper::before {
      content: '';
      position: absolute;
      top: -20px;
      left: -20px;
      right: -20px;
      bottom: -20px;
      background: 
        repeating-linear-gradient(
          90deg,
          transparent 0px, transparent 3px,
          rgba(0,0,0,0.15) 3px, rgba(0,0,0,0.15) 6px
        ),
        repeating-linear-gradient(
          0deg,
          transparent 0px, transparent 4px,
          rgba(139,90,43,0.1) 4px, rgba(139,90,43,0.1) 8px
        );
      pointer-events: none;
      z-index: 10;
    }

    #game-canvas {
      display: block;
      background-color: hsl(220, 10%, 5%);
      cursor: crosshair;
      image-rendering: pixelated;
    }

    #game-overlay {
      position: absolute;
      top: 20px;
      left: 20px;
      right: 20px;
      bottom: 20px;
      pointer-events: none;
      z-index: 5;
    }

    #game-over-screen {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.95);
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 20;
      pointer-events: auto;
    }

    #game-over-screen.visible {
      display: flex;
    }

    #game-over-title {
      font-size: 32px;
      color: #fff;
      margin-bottom: 20px;
      animation: breathe 3s ease-in-out infinite;
      text-shadow: 0 0 20px rgba(255, 200, 100, 0.3);
    }

    @keyframes breathe {
      0%, 100% { opacity: 0.6; transform: scale(1); }
      50% { opacity: 1; transform: scale(1.05); }
    }

    #restart-btn {
      padding: 12px 36px;
      font-size: 16px;
      background: linear-gradient(135deg, #8b5a2b 0%, #6b4423 100%);
      border: 2px solid #a0622d;
      color: #fff;
      border-radius: 8px;
      cursor: pointer;
      transition: all 0.3s ease;
      box-shadow: 0 4px 16px rgba(0,0,0,0.5);
    }

    #restart-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(139, 90, 43, 0.4);
      background: linear-gradient(135deg, #a0622d 0%, #8b5a2b 100%);
    }

    #restart-btn:active {
      transform: translateY(0);
    }
  </style>
</head>
<body>
  <div id="game-container">
    <div id="canvas-wrapper">
      <canvas id="game-canvas" width="800" height="600"></canvas>
      <div id="game-overlay"></div>
      <div id="game-over-screen">
        <div id="game-over-title">灯笼熄灭了</div>
        <button id="restart-btn">再试一次</button>
      </div>
    </div>
  </div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
