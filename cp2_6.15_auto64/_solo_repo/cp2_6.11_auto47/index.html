<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>水晶记忆 - Crystal Memory</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: linear-gradient(135deg, #0B0B2A 0%, #1B1B4A 100%);
      font-family: 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
    }
    #loading-screen {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: linear-gradient(135deg, #0B0B2A 0%, #1B1B4A 100%);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 9999;
      transition: opacity 0.8s ease;
    }
    #loading-screen.fade-out {
      opacity: 0;
      pointer-events: none;
    }
    .loading-crystal {
      width: 60px;
      height: 60px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(255,255,255,0.3) 0%, rgba(100,100,255,0.1) 60%, transparent 100%);
      animation: pulse-glow 2s ease-in-out infinite;
      position: relative;
    }
    .loading-crystal::after {
      content: '';
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 20px;
      height: 20px;
      border-radius: 50%;
      background: rgba(255,255,255,0.6);
      animation: inner-pulse 2s ease-in-out infinite;
    }
    @keyframes pulse-glow {
      0%, 100% { transform: scale(1); box-shadow: 0 0 30px rgba(100,100,255,0.3); }
      50% { transform: scale(1.15); box-shadow: 0 0 60px rgba(100,100,255,0.5); }
    }
    @keyframes inner-pulse {
      0%, 100% { opacity: 0.6; }
      50% { opacity: 1; }
    }
    .loading-text {
      margin-top: 24px;
      color: rgba(255,255,255,0.6);
      font-size: 14px;
      letter-spacing: 4px;
    }
    #canvas-container {
      width: 100%;
      height: 100%;
      position: fixed;
      top: 0;
      left: 0;
    }
    canvas {
      display: block;
    }
  </style>
</head>
<body>
  <div id="loading-screen">
    <div class="loading-crystal"></div>
    <div class="loading-text">水晶记忆加载中</div>
  </div>
  <div id="canvas-container"></div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
