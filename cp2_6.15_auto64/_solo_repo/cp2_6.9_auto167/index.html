<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>情绪粒子肖像</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      font-family: 'Segoe UI', sans-serif;
    }

    #canvas {
      display: block;
      width: 100%;
      height: 100%;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
    }

    #controls {
      position: absolute;
      top: 16px;
      left: 16px;
      background: rgba(0, 0, 0, 0.3);
      border-radius: 8px;
      padding: 12px 16px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      backdrop-filter: blur(6px);
    }

    .slider-group {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .slider-group label {
      color: #cccccc;
      font-size: 12px;
      user-select: none;
    }

    .slider-group input[type="range"] {
      width: 180px;
      height: 4px;
      -webkit-appearance: none;
      appearance: none;
      background: #333333;
      border-radius: 2px;
      outline: none;
    }

    .slider-group input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none;
      appearance: none;
      width: 14px;
      height: 14px;
      border-radius: 50%;
      background: #888888;
      cursor: pointer;
      transition: background 0.3s ease;
    }

    .slider-group input[type="range"]::-moz-range-thumb {
      width: 14px;
      height: 14px;
      border-radius: 50%;
      background: #888888;
      cursor: pointer;
      border: none;
      transition: background 0.3s ease;
    }

    #emotion-bar {
      position: absolute;
      bottom: 32px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      gap: 15px;
    }

    .emotion-btn {
      width: 80px;
      height: 40px;
      border: none;
      border-radius: 8px;
      color: #ffffff;
      font-size: 14px;
      font-family: 'Segoe UI', sans-serif;
      font-weight: 500;
      cursor: pointer;
      transition: transform 0.1s ease;
      user-select: none;
    }

    .emotion-btn:active {
      transform: scale(0.9);
    }

    .emotion-btn.happy { background: #FFD93D; color: #333; }
    .emotion-btn.sad { background: #6C5CE7; }
    .emotion-btn.angry { background: #FF6B6B; }
    .emotion-btn.calm { background: #55EFC4; color: #333; }
  </style>
</head>
<body>
  <canvas id="canvas"></canvas>

  <div id="controls">
    <div class="slider-group">
      <label for="density">粒子密度：<span id="density-val">2000</span></label>
      <input type="range" id="density" min="1000" max="4000" step="100" value="2000" />
    </div>
    <div class="slider-group">
      <label for="speed">粒子速度：<span id="speed-val">1.0</span></label>
      <input type="range" id="speed" min="0.1" max="3.0" step="0.1" value="1.0" />
    </div>
  </div>

  <div id="emotion-bar">
    <button class="emotion-btn happy" data-emotion="happy">快乐</button>
    <button class="emotion-btn sad" data-emotion="sad">悲伤</button>
    <button class="emotion-btn angry" data-emotion="angry">愤怒</button>
    <button class="emotion-btn calm" data-emotion="calm">平静</button>
  </div>

  <script type="module" src="/src/main.ts"></script>
</body>
</html>
