<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Neon Turret Defense</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    html, body {
      width: 100%;
      height: 100%;
      background: #000;
      overflow: hidden;
      font-family: monospace;
    }
    #game-container {
      position: relative;
      width: 800px;
      height: 600px;
      margin: 0 auto;
      top: 50%;
      transform: translateY(-50%);
    }
    #game-canvas {
      display: block;
      width: 800px;
      height: 600px;
      image-rendering: pixelated;
    }
    #game-over-overlay {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.7);
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 10;
    }
    #game-over-overlay.visible {
      display: flex;
    }
    #game-over-title {
      color: #FFFFFF;
      font-size: 36px;
      font-family: monospace;
      margin-bottom: 20px;
    }
    #final-score {
      color: #FFFFFF;
      font-size: 20px;
      font-family: monospace;
      margin-bottom: 30px;
    }
    #restart-btn {
      padding: 12px 30px;
      font-size: 16px;
      font-family: monospace;
      color: #00FF41;
      background: #1A202C;
      border: 2px solid #00FF41;
      border-radius: 4px;
      cursor: pointer;
      transition: background 0.15s;
    }
    #restart-btn:hover {
      background: #2D3748;
    }
    #restart-btn.blinking {
      animation: blink 0.8s infinite;
    }
    @keyframes blink {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }
    #energy-warning {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      box-shadow: inset 0 0 80px rgba(255, 255, 255, 0);
      transition: box-shadow 0.1s;
      z-index: 5;
    }
    #energy-warning.active {
      box-shadow: inset 0 0 80px rgba(255, 255, 255, 0.3);
    }
  </style>
</head>
<body>
  <div id="game-container">
    <canvas id="game-canvas" width="800" height="600"></canvas>
    <div id="energy-warning"></div>
    <div id="game-over-overlay">
      <div id="game-over-title">GAME OVER</div>
      <div id="final-score"></div>
      <button id="restart-btn" class="blinking">RESTART</button>
    </div>
  </div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
