<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>动态几何图案生成器</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #0d0d1d;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      color: #ffffff;
    }

    #canvas {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      display: block;
    }

    #canvas canvas {
      width: 100%;
      height: 100%;
      display: block;
    }

    .control-panel {
      position: fixed;
      bottom: 0;
      left: 0;
      width: 100%;
      height: 80px;
      background-color: rgba(26, 26, 46, 0.85);
      backdrop-filter: blur(10px);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 40px;
      padding: 0 40px;
      transition: background-color 0.2s ease;
      z-index: 10;
    }

    .control-panel:hover {
      background-color: rgba(26, 26, 46, 0.95);
    }

    .control-group {
      display: flex;
      flex-direction: column;
      gap: 6px;
      min-width: 160px;
    }

    .control-label {
      font-size: 12px;
      font-weight: 500;
      letter-spacing: 0.5px;
      color: #ffffff;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .control-value {
      font-size: 11px;
      opacity: 0.7;
      font-variant-numeric: tabular-nums;
    }

    input[type="range"] {
      -webkit-appearance: none;
      appearance: none;
      width: 100%;
      height: 6px;
      border-radius: 3px;
      background: #3a3a5e;
      outline: none;
      cursor: pointer;
    }

    input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none;
      appearance: none;
      width: 16px;
      height: 16px;
      border-radius: 50%;
      background: #ff6b35;
      cursor: pointer;
      transition: background-color 0.15s ease, transform 0.15s ease;
    }

    input[type="range"]::-webkit-slider-thumb:hover,
    input[type="range"]::-webkit-slider-thumb:active {
      background: #ff8c42;
      transform: scale(1.15);
    }

    input[type="range"]::-moz-range-thumb {
      width: 16px;
      height: 16px;
      border-radius: 50%;
      background: #ff6b35;
      cursor: pointer;
      border: none;
      transition: background-color 0.15s ease, transform 0.15s ease;
    }

    input[type="range"]::-moz-range-thumb:hover,
    input[type="range"]::-moz-range-thumb:active {
      background: #ff8c42;
      transform: scale(1.15);
    }

    .color-picker-wrapper {
      display: flex;
      flex-direction: column;
      gap: 6px;
      align-items: flex-start;
    }

    .color-picker-btn {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      border: 2px solid rgba(255, 255, 255, 0.3);
      cursor: pointer;
      background: #ff6b35;
      transition: transform 0.15s ease, border-color 0.15s ease;
      overflow: hidden;
      position: relative;
    }

    .color-picker-btn:hover {
      transform: scale(1.1);
      border-color: rgba(255, 255, 255, 0.6);
    }

    .color-picker-btn input[type="color"] {
      position: absolute;
      top: 50%;
      left: 50%;
      width: 300%;
      height: 300%;
      transform: translate(-50%, -50%);
      opacity: 0;
      cursor: pointer;
      border: none;
    }
  </style>
</head>
<body>
  <div id="canvas"></div>

  <div class="control-panel" id="controlPanel">
    <div class="control-group">
      <label class="control-label" for="speed">
        <span>旋转速度</span>
        <span class="control-value" id="speedValue">2.00</span>
      </label>
      <input type="range" id="speed" min="0" max="5" step="0.01" value="2">
    </div>

    <div class="control-group">
      <label class="control-label" for="scale">
        <span>缩放比例</span>
        <span class="control-value" id="scaleValue">1.00</span>
      </label>
      <input type="range" id="scale" min="0.5" max="2.0" step="0.01" value="1.0">
    </div>

    <div class="control-group">
      <label class="control-label" for="symmetry">
        <span>对称数量</span>
        <span class="control-value" id="symmetryValue">6</span>
      </label>
      <input type="range" id="symmetry" min="3" max="12" step="1" value="6">
    </div>

    <div class="color-picker-wrapper">
      <label class="control-label">主要颜色</label>
      <div class="color-picker-btn" id="colorPickerBtn">
        <input type="color" id="colorPicker" value="#ff6b35">
      </div>
    </div>
  </div>

  <script type="module" src="/src/main.ts"></script>
</body>
</html>
