<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>古代星图与行星轨迹追踪</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', 'Helvetica Neue', Arial, sans-serif;
      background: #000;
      color: #E8E8F0;
    }
    #app {
      width: 100%;
      height: 100%;
      position: relative;
    }
    canvas {
      display: block;
    }
    .glass {
      background: rgba(10, 10, 46, 0.55);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid rgba(255, 255, 255, 0.15);
      border-radius: 12px;
    }
    #control-panel {
      position: fixed;
      left: 20px;
      bottom: 20px;
      width: 280px;
      padding: 20px;
      z-index: 100;
      transition: all 0.3s ease;
    }
    #control-panel h3 {
      font-size: 16px;
      color: #C9A93E;
      margin-bottom: 16px;
      letter-spacing: 1px;
    }
    .control-group {
      margin-bottom: 14px;
    }
    .control-group label {
      display: block;
      font-size: 12px;
      color: #E8E8F0;
      margin-bottom: 6px;
      opacity: 0.85;
    }
    .toggle-switch {
      position: relative;
      display: inline-block;
      width: 44px;
      height: 22px;
    }
    .toggle-switch input {
      opacity: 0;
      width: 0;
      height: 0;
    }
    .slider {
      position: absolute;
      cursor: pointer;
      top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(255,255,255,0.1);
      transition: 0.3s;
      border-radius: 22px;
    }
    .slider:before {
      position: absolute;
      content: "";
      height: 16px;
      width: 16px;
      left: 3px;
      bottom: 3px;
      background: #E8E8F0;
      transition: 0.3s;
      border-radius: 50%;
    }
    input:checked + .slider {
      background: #C9A93E;
      box-shadow: 0 0 10px rgba(201, 169, 62, 0.6);
    }
    input:checked + .slider:before {
      transform: translateX(22px);
    }
    input[type="range"] {
      width: 100%;
      height: 4px;
      -webkit-appearance: none;
      appearance: none;
      background: rgba(255,255,255,0.15);
      border-radius: 2px;
      outline: none;
    }
    input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none;
      appearance: none;
      width: 16px;
      height: 16px;
      background: #C9A93E;
      border-radius: 50%;
      cursor: pointer;
      box-shadow: 0 0 8px rgba(201, 169, 62, 0.8);
      transition: transform 0.2s;
    }
    input[type="range"]::-webkit-slider-thumb:hover {
      transform: scale(1.2);
    }
    .speed-value {
      display: inline-block;
      margin-left: 8px;
      color: #C9A93E;
      font-weight: bold;
      font-size: 13px;
      min-width: 30px;
      text-align: center;
      transition: all 0.2s ease;
    }
    .btn {
      display: inline-block;
      padding: 6px 14px;
      margin: 3px;
      background: rgba(201, 169, 62, 0.15);
      border: 1px solid rgba(201, 169, 62, 0.4);
      border-radius: 6px;
      color: #E8E8F0;
      font-size: 12px;
      cursor: pointer;
      transition: all 0.2s ease;
      position: relative;
      overflow: hidden;
    }
    .btn:hover {
      background: rgba(201, 169, 62, 0.3);
      box-shadow: 0 0 12px rgba(201, 169, 62, 0.5);
      transform: translateY(-1px);
    }
    .btn:active {
      transform: scale(0.95);
    }
    .ripple {
      position: absolute;
      border-radius: 50%;
      background: rgba(201, 169, 62, 0.5);
      transform: scale(0);
      animation: ripple-effect 0.4s ease-out;
      pointer-events: none;
    }
    @keyframes ripple-effect {
      to {
        transform: scale(4);
        opacity: 0;
      }
    }
    #info-panel {
      position: fixed;
      left: 20px;
      top: 20px;
      width: 340px;
      padding: 24px;
      z-index: 100;
      opacity: 0;
      transform: translateY(-10px);
      pointer-events: none;
      transition: opacity 0.3s ease, transform 0.3s ease;
    }
    #info-panel.visible {
      opacity: 1;
      transform: translateY(0);
      pointer-events: auto;
    }
    #info-panel h2 {
      font-size: 18px;
      color: #C9A93E;
      margin-bottom: 8px;
    }
    #info-panel .year {
      font-size: 13px;
      color: #8888AA;
      margin-bottom: 12px;
      font-style: italic;
    }
    #info-panel p {
      font-size: 13px;
      line-height: 1.7;
      color: #E8E8F0;
      opacity: 0.9;
    }
    #info-panel .close-btn {
      position: absolute;
      top: 12px;
      right: 14px;
      background: none;
      border: none;
      color: #E8E8F0;
      font-size: 20px;
      cursor: pointer;
      opacity: 0.6;
      transition: opacity 0.2s;
    }
    #info-panel .close-btn:hover {
      opacity: 1;
    }
    .history-list {
      max-height: 140px;
      overflow-y: auto;
    }
    .history-list::-webkit-scrollbar {
      width: 4px;
    }
    .history-list::-webkit-scrollbar-track {
      background: rgba(255,255,255,0.05);
    }
    .history-list::-webkit-scrollbar-thumb {
      background: rgba(201, 169, 62, 0.4);
      border-radius: 2px;
    }
    #hamburger {
      display: none;
      position: fixed;
      left: 20px;
      bottom: 20px;
      width: 44px;
      height: 44px;
      z-index: 101;
      cursor: pointer;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 5px;
    }
    #hamburger span {
      width: 22px;
      height: 2px;
      background: #C9A93E;
      border-radius: 1px;
      transition: all 0.3s;
    }
    #instructions {
      position: fixed;
      right: 20px;
      top: 20px;
      padding: 12px 16px;
      font-size: 12px;
      line-height: 1.6;
      z-index: 100;
    }
    #instructions .title {
      color: #C9A93E;
      font-weight: bold;
      margin-bottom: 6px;
    }
    #instructions span.key {
      display: inline-block;
      padding: 1px 6px;
      background: rgba(201, 169, 62, 0.25);
      border-radius: 3px;
      font-family: monospace;
      margin: 0 2px;
    }
    @media (max-width: 768px) {
      #control-panel {
        position: fixed;
        left: 0;
        right: 0;
        bottom: 0;
        width: 100%;
        border-radius: 16px 16px 0 0;
        transform: translateY(100%);
        padding: 24px;
      }
      #control-panel.open {
        transform: translateY(0);
      }
      #hamburger {
        display: flex;
      }
      #info-panel {
        left: 10px;
        right: 10px;
        top: 10px;
        width: auto;
      }
      #instructions {
        display: none;
      }
    }
  </style>
</head>
<body>
  <div id="app"></div>

  <div id="info-panel" class="glass">
    <button class="close-btn">&times;</button>
    <h2 id="info-title">天文记录</h2>
    <div class="year" id="info-year"></div>
    <p id="info-description"></p>
  </div>

  <div id="instructions" class="glass">
    <div class="title">操作指南</div>
    <div>鼠标拖拽：旋转视角</div>
    <div>滚轮：缩放视野</div>
    <div><span class="key">1</span><span class="key">2</span><span class="key">3</span>：聚焦行星</div>
    <div><span class="key">0</span>：重置视角</div>
  </div>

  <div id="hamburger" class="glass">
    <span></span>
    <span></span>
    <span></span>
  </div>

  <div id="control-panel" class="glass">
    <h3>★ 星图控制</h3>
    <div class="control-group">
      <label>星空旋转</label>
      <label class="toggle-switch">
        <input type="checkbox" id="toggle-rotation" checked>
        <span class="slider"></span>
      </label>
    </div>
    <div class="control-group">
      <label>
        行星速度
        <span class="speed-value" id="speed-value">1.0x</span>
      </label>
      <input type="range" id="speed-slider" min="0.5" max="3" step="0.1" value="1">
    </div>
    <div class="control-group">
      <label>星座连线</label>
      <label class="toggle-switch">
        <input type="checkbox" id="toggle-constellations" checked>
        <span class="slider"></span>
      </label>
    </div>
    <div class="control-group">
      <label>历史记录</label>
      <div class="history-list" id="history-list"></div>
    </div>
  </div>

  <script type="module" src="/src/main.ts"></script>
</body>
</html>
