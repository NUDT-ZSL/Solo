<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>记忆迷宫 | Memory Labyrinth</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: linear-gradient(145deg, #0B0B1A 0%, #0f0f2e 50%, #0B0B1A 100%);
      font-family: 'Courier New', monospace;
    }
    #loading {
      position: fixed;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 100;
      background: linear-gradient(145deg, #0B0B1A 0%, #0f0f2e 50%, #0B0B1A 100%);
      transition: opacity 0.6s ease;
    }
    #loading.fade-out {
      opacity: 0;
      pointer-events: none;
    }
    #loading h1 {
      color: #00E5FF;
      font-size: 2rem;
      letter-spacing: 0.3em;
      text-shadow: 0 0 20px rgba(0, 229, 255, 0.5);
      margin-bottom: 1.5rem;
    }
    #loading p {
      color: rgba(0, 229, 255, 0.6);
      font-size: 0.9rem;
      animation: pulse 2s ease-in-out infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 0.4; }
      50% { opacity: 1; }
    }
    canvas { display: block; }
  </style>
</head>
<body>
  <div id="loading">
    <h1>记忆迷宫</h1>
    <p>正在构建你的记忆空间...</p>
  </div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
