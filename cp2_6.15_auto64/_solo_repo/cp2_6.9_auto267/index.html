<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>遘伜｢☎ｯｻ雕ｪ - 蜿､蠅灘ｯ㋜ｮ､騾☂┳</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #0D0805;
      font-family: 'Microsoft YaHei', sans-serif;
    }
    #game-container {
      width: 100%;
      height: 100%;
      display: flex;
      justify-content: center;
      align-items: center;
      background: radial-gradient(ellipse at center, #3A2818 0%, #0D0805 100%);
    }
    #game-canvas {
      display: block;
      cursor: pointer;
      image-rendering: pixelated;
    }
    #hint {
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      color: #C8A55E;
      font-size: 14px;
      text-shadow: 0 0 10px rgba(200, 165, 94, 0.5);
      opacity: 0;
      transition: opacity 0.5s;
      pointer-events: none;
      z-index: 100;
    }
    #hint.show {
      opacity: 1;
    }
  </style>
</head>
<body>
  <div id="game-container">
    <canvas id="game-canvas"></canvas>
  </div>
  <div id="hint"></div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
