<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>霓虹光轨绘画 · Cyberpunk City</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #0A0A0F;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: #E0E0E0;
    }

    #app {
      position: relative;
      width: 100vw;
      height: 100vh;
      padding: 20px;
      display: flex;
      flex-direction: column;
    }

    #toolbar {
      position: relative;
      z-index: 10;
      background: rgba(15, 15, 30, 0.7);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 12px;
      padding: 12px 20px;
      display: flex;
      align-items: center;
      gap: 20px;
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      flex-wrap: wrap;
    }

    .tool-group {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .tool-label {
      font-size: 12px;
      color: rgba(255, 255, 255, 0.6);
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .tool-btn {
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.1);
      color: #E0E0E0;
      padding: 8px 16px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 13px;
      transition: all 0.3s ease;
    }

    .tool-btn:hover {
      background: var(--brush-color-alpha, rgba(255, 0, 127, 0.2));
      border-color: var(--brush-color, #FF007F);
      color: #fff;
    }

    .tool-btn.primary {
      background: linear-gradient(135deg, #FF007F, #7F00FF);
      border: none;
      color: #fff;
      font-weight: 600;
    }

    .tool-btn.primary:hover {
      filter: brightness(1.2);
      box-shadow: 0 0 20px rgba(255, 0, 127, 0.5);
    }

    input[type="range"] {
      -webkit-appearance: none;
      appearance: none;
      width: 120px;
      height: 4px;
      background: rgba(255, 255, 255, 0.1);
      border-radius: 2px;
      outline: none;
      cursor: pointer;
    }

    input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none;
      appearance: none;
      width: 16px;
      height: 16px;
      background: var(--brush-color, #FF007F);
      border-radius: 50%;
      cursor: pointer;
      box-shadow: 0 0 10px var(--brush-color, #FF007F);
    }

    input[type="range"]::-moz-range-thumb {
      width: 16px;
      height: 16px;
      background: var(--brush-color, #FF007F);
      border-radius: 50%;
      cursor: pointer;
      border: none;
      box-shadow: 0 0 10px var(--brush-color, #FF007F);
    }

    #canvas-wrap {
      position: relative;
      flex: 1;
      margin-top: 20px;
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 0 40px rgba(127, 0, 255, 0.1);
    }

    #canvas {
      width: 100%;
      height: 100%;
      display: block;
      cursor: crosshair;
      background: radial-gradient(ellipse at center, #1A1A2E 0%, #0A0A0F 100%);
    }

    #colorPalette {
      position: absolute;
      right: 20px;
      bottom: 20px;
      z-index: 10;
      display: flex;
      gap: 4px;
      padding: 8px;
      background: rgba(15, 15, 30, 0.7);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 12px;
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
    }

    .color-swatch {
      width: 40px;
      height: 40px;
      border-radius: 8px;
      cursor: pointer;
      border: 2px solid transparent;
      transition: all 0.2s cubic-bezier(0.34, 1.56, 0.64, 1);
      position: relative;
    }

    .color-swatch:hover {
      transform: scale(1.1);
    }

    .color-swatch:active {
      border-radius: 50%;
      transform: scale(1.2);
    }

    .color-swatch.active {
      border-color: #fff;
      box-shadow: 0 0 15px var(--swatch-color);
    }

    .color-swatch.selected-ring {
      border-width: 3px;
    }

    .value-display {
      min-width: 32px;
      text-align: center;
      font-size: 12px;
      font-family: "Courier New", monospace;
      color: var(--brush-color, #FF007F);
    }

    #flashOverlay {
      position: absolute;
      inset: 0;
      background: white;
      opacity: 0;
      pointer-events: none;
      z-index: 50;
      border-radius: 12px;
    }

    @media (max-width: 768px) {
      #app {
        padding: 12px;
      }

      #toolbar {
        padding: 10px;
        gap: 12px;
        flex-direction: column;
        align-items: stretch;
      }

      .tool-group {
        width: 100%;
        justify-content: space-between;
      }

      input[type="range"] {
        width: 100px;
      }

      #canvas-wrap {
        margin-top: 12px;
      }

      #colorPalette {
        right: 12px;
        bottom: 12px;
        flex-direction: column;
      }

      .color-swatch {
        width: 32px;
        height: 32px;
      }
    }
  </style>
</head>
<body>
  <div id="app">
    <div id="toolbar">
      <div class="tool-group">
        <span class="tool-label">粗细</span>
        <input type="range" id="brushSize" min="6" max="30" value="14" />
        <span class="value-display" id="brushSizeValue">14</span>
      </div>
      <div class="tool-group">
        <span class="tool-label">透明度</span>
        <input type="range" id="brushOpacity" min="20" max="100" value="70" />
        <span class="value-display" id="brushOpacityValue">70%</span>
      </div>
      <div class="tool-group">
        <button class="tool-btn" id="clearBtn">清空画布</button>
        <button class="tool-btn primary" id="generateBtn">生成壁纸</button>
      </div>
    </div>

    <div id="canvas-wrap">
      <canvas id="canvas"></canvas>
      <div id="flashOverlay"></div>
    </div>

    <div id="colorPalette"></div>
  </div>

  <script type="module" src="/src/main.ts"></script>
</body>
</html>
