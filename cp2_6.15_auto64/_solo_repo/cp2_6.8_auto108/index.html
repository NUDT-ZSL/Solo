<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>动态分形树可视化</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      html, body {
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: #1A202C;
        color: #E2E8F0;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
        user-select: none;
      }

      #app {
        position: relative;
        width: 100%;
        height: 100%;
      }

      #canvas {
        position: absolute;
        top: 0;
        left: 0;
        display: block;
        background: #1A202C;
        cursor: crosshair;
      }

      #panel {
        position: fixed;
        top: 20px;
        right: 20px;
        width: 280px;
        max-height: calc(100vh - 40px);
        overflow-y: auto;
        background: rgba(45, 55, 72, 0.8);
        backdrop-filter: blur(10px);
        -webkit-backdrop-filter: blur(10px);
        border: 1px solid #4A5568;
        border-radius: 8px;
        padding: 20px;
        z-index: 10;
        transition: transform 0.3s ease, opacity 0.3s ease;
      }

      #panel::-webkit-scrollbar {
        width: 6px;
      }
      #panel::-webkit-scrollbar-thumb {
        background: #4A5568;
        border-radius: 3px;
      }
      #panel::-webkit-scrollbar-track {
        background: transparent;
      }

      .panel-title {
        font-size: 18px;
        font-weight: 600;
        margin-bottom: 16px;
        color: #E2E8F0;
        letter-spacing: 0.5px;
      }

      .preset-section {
        margin-bottom: 20px;
      }

      .preset-title {
        font-size: 12px;
        color: #A0AEC0;
        margin-bottom: 8px;
        text-transform: uppercase;
        letter-spacing: 0.8px;
      }

      .preset-buttons {
        display: flex;
        gap: 8px;
      }

      .preset-btn {
        flex: 1;
        padding: 10px 6px;
        border: none;
        border-radius: 4px;
        color: white;
        font-size: 11px;
        font-weight: 600;
        cursor: pointer;
        transition: transform 0.15s ease, box-shadow 0.2s ease;
        letter-spacing: 0.3px;
      }

      .preset-btn:hover {
        box-shadow: 0 2px 12px rgba(0, 0, 0, 0.3);
      }

      .preset-btn:active {
        transform: scale(0.9);
      }

      .preset-btn.pine {
        background: #E53E3E;
      }
      .preset-btn.willow {
        background: #38A169;
      }
      .preset-btn.oak {
        background: #805AD5;
      }

      .params-section {
        margin-bottom: 20px;
      }

      .params-title {
        font-size: 12px;
        color: #A0AEC0;
        margin-bottom: 12px;
        text-transform: uppercase;
        letter-spacing: 0.8px;
      }

      .param-row {
        margin-bottom: 14px;
      }

      .param-label {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 6px;
      }

      .param-label span {
        font-size: 13px;
        color: #CBD5E0;
      }

      .param-input {
        width: 50px;
        padding: 3px 6px;
        background: #1A202C;
        border: 1px solid #4A5568;
        border-radius: 4px;
        color: #E2E8F0;
        font-size: 12px;
        text-align: center;
        outline: none;
        transition: border-color 0.2s ease;
      }

      .param-input:focus {
        border-color: #3182CE;
      }

      .slider {
        -webkit-appearance: none;
        appearance: none;
        width: 100%;
        height: 4px;
        border-radius: 2px;
        background: #3182CE;
        outline: none;
        transition: background 0.2s ease;
      }

      .slider:hover {
        background: #63B3ED;
      }

      .slider::-webkit-slider-thumb {
        -webkit-appearance: none;
        appearance: none;
        width: 16px;
        height: 16px;
        border-radius: 50%;
        background: #FFFFFF;
        cursor: pointer;
        box-shadow: 0 1px 4px rgba(0, 0, 0, 0.4);
        transition: transform 0.15s ease;
      }

      .slider::-webkit-slider-thumb:hover {
        transform: scale(1.15);
      }

      .slider::-moz-range-thumb {
        width: 16px;
        height: 16px;
        border-radius: 50%;
        background: #FFFFFF;
        cursor: pointer;
        border: none;
        box-shadow: 0 1px 4px rgba(0, 0, 0, 0.4);
      }

      .stats-section {
        margin-bottom: 20px;
        padding: 14px;
        background: rgba(26, 32, 44, 0.6);
        border-radius: 6px;
      }

      .stats-title {
        font-size: 12px;
        color: #A0AEC0;
        margin-bottom: 12px;
        text-transform: uppercase;
        letter-spacing: 0.8px;
      }

      .stat-row {
        display: flex;
        justify-content: space-between;
        padding: 5px 0;
        font-size: 13px;
      }

      .stat-label {
        color: #A0AEC0;
      }

      .stat-value {
        color: #63B3ED;
        font-weight: 600;
        font-variant-numeric: tabular-nums;
      }

      .save-section {
        position: relative;
      }

      .save-btn {
        width: 100%;
        padding: 12px;
        background: #3182CE;
        border: none;
        border-radius: 6px;
        color: white;
        font-size: 14px;
        font-weight: 600;
        cursor: pointer;
        transition: background 0.2s ease, transform 0.15s ease;
        letter-spacing: 0.5px;
      }

      .save-btn:hover {
        background: #63B3ED;
      }

      .save-btn:active {
        transform: scale(0.95);
      }

      .save-check {
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%) scale(0);
        color: #48BB78;
        font-size: 22px;
        font-weight: bold;
        pointer-events: none;
        opacity: 0;
        transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1), opacity 0.3s ease;
      }

      .save-check.show {
        transform: translate(-50%, -50%) scale(1);
        opacity: 1;
      }

      .save-btn.saving .btn-text {
        opacity: 0;
      }

      #toggle-btn {
        display: none;
        position: fixed;
        bottom: 16px;
        left: 50%;
        transform: translateX(-50%);
        width: 48px;
        height: 48px;
        border-radius: 50%;
        background: #3182CE;
        border: none;
        color: white;
        font-size: 20px;
        cursor: pointer;
        z-index: 20;
        box-shadow: 0 4px 16px rgba(0, 0, 0, 0.4);
        transition: transform 0.3s ease, background 0.2s ease;
      }

      #toggle-btn:hover {
        background: #63B3ED;
      }

      #toggle-btn:active {
        transform: translateX(-50%) scale(0.92);
      }

      @media (max-width: 768px) {
        #panel {
          top: auto;
          bottom: 0;
          left: 0;
          right: 0;
          width: 100%;
          max-height: 60vh;
          border-radius: 12px 12px 0 0;
          padding: 16px;
          transform: translateY(100%);
        }

        #panel.open {
          transform: translateY(0);
        }

        #toggle-btn {
          display: flex;
          align-items: center;
          justify-content: center;
        }

        #panel.open ~ #toggle-btn {
          transform: translateX(-50%) translateY(-60vh);
        }
      }
    </style>
  </head>
  <body>
    <div id="app">
      <canvas id="canvas"></canvas>

      <div id="panel">
        <div class="panel-title">🌿 分形树控制台</div>

        <div class="preset-section">
          <div class="preset-title">预设模板</div>
          <div class="preset-buttons">
            <button class="preset-btn pine" data-preset="pine">松树</button>
            <button class="preset-btn willow" data-preset="willow">柳树</button>
            <button class="preset-btn oak" data-preset="oak">橡树</button>
          </div>
        </div>

        <div class="params-section">
          <div class="params-title">生长参数</div>

          <div class="param-row">
            <div class="param-label">
              <span>递归深度</span>
              <input type="number" class="param-input" id="input-depth" min="1" max="8" value="6" />
            </div>
            <input type="range" class="slider" id="slider-depth" min="1" max="8" step="1" value="6" />
          </div>

          <div class="param-row">
            <div class="param-label">
              <span>分支角度 (°)</span>
              <input type="number" class="param-input" id="input-angle" min="10" max="80" value="30" />
            </div>
            <input type="range" class="slider" id="slider-angle" min="10" max="80" step="1" value="30" />
          </div>

          <div class="param-row">
            <div class="param-label">
              <span>长度比</span>
              <input type="number" class="param-input" id="input-ratio" min="0.3" max="1" step="0.01" value="0.7" />
            </div>
            <input type="range" class="slider" id="slider-ratio" min="0.3" max="1" step="0.01" value="0.7" />
          </div>

          <div class="param-row">
            <div class="param-label">
              <span>主干长度 (px)</span>
              <input type="number" class="param-input" id="input-trunk" min="30" max="100" value="50" />
            </div>
            <input type="range" class="slider" id="slider-trunk" min="30" max="100" step="1" value="50" />
          </div>
        </div>

        <div class="stats-section">
          <div class="stats-title">树的统计</div>
          <div class="stat-row">
            <span class="stat-label">总枝干数</span>
            <span class="stat-value" id="stat-branches">0</span>
          </div>
          <div class="stat-row">
            <span class="stat-label">总节点数</span>
            <span class="stat-value" id="stat-nodes">0</span>
          </div>
          <div class="stat-row">
            <span class="stat-label">最高高度 (px)</span>
            <span class="stat-value" id="stat-height">0</span>
          </div>
          <div class="stat-row">
            <span class="stat-label">平均分支角度</span>
            <span class="stat-value" id="stat-avgangle">0°</span>
          </div>
          <div class="stat-row">
            <span class="stat-label">当前递归深度</span>
            <span class="stat-value" id="stat-depth">0</span>
          </div>
        </div>

        <div class="save-section">
          <button class="save-btn" id="save-btn">
            <span class="btn-text">💾 保存为 PNG</span>
          </button>
          <div class="save-check" id="save-check">✓</div>
        </div>
      </div>

      <button id="toggle-btn" aria-label="切换面板">⚙</button>
    </div>

    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
