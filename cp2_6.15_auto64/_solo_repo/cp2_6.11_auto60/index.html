<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=0.8" />
  <title>声波进化岛 · Sonic Evolution Island</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700;900&family=Rajdhani:wght@400;500;600&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg-deep: #0A0A2E;
      --bg-mid: #1C1C5E;
      --grid-line: rgba(79, 195, 247, 0.6);
      --accent: #4FC3F7;
      --danger: #FF5252;
      --success: #69F0AE;
      --warning: #FFD740;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      width: 100%;
      height: 100%;
      min-width: 800px;
      min-height: 600px;
      overflow: hidden;
      font-family: 'Rajdhani', 'PingFang SC', sans-serif;
      color: #E0F7FA;
      background: radial-gradient(ellipse at center, var(--bg-mid) 0%, var(--bg-deep) 100%);
      user-select: none;
    }

    #app {
      position: relative;
      width: 100vw;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    canvas#game {
      display: block;
      image-rendering: pixelated;
      box-shadow: 0 0 80px rgba(79, 195, 247, 0.15);
      border-radius: 12px;
    }

    /* 加载层 */
    #loading-layer {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 32px;
      z-index: 20;
      background: radial-gradient(ellipse at center, rgba(28,28,94,0.92) 0%, rgba(10,10,46,0.98) 100%);
      backdrop-filter: blur(6px);
      transition: opacity 0.6s ease;
    }

    #loading-layer.hidden {
      opacity: 0;
      pointer-events: none;
    }

    .title {
      font-family: 'Orbitron', monospace;
      font-weight: 900;
      font-size: clamp(32px, 5vw, 64px);
      letter-spacing: 6px;
      background: linear-gradient(135deg, #4FC3F7 0%, #CE93D8 50%, #FFD740 100%);
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
      text-shadow: 0 0 40px rgba(79, 195, 247, 0.4);
      animation: titleGlow 3s ease-in-out infinite;
    }

    @keyframes titleGlow {
      0%, 100% { filter: drop-shadow(0 0 12px rgba(79,195,247,0.5)); }
      50%      { filter: drop-shadow(0 0 28px rgba(206,147,216,0.7)); }
    }

    .loader-core {
      width: 80px;
      height: 80px;
      border-radius: 50%;
      background: radial-gradient(circle, #4FC3F7 0%, rgba(79,195,247,0.2) 60%, transparent 100%);
      animation: breathe 2s ease-in-out infinite;
      position: relative;
    }

    .loader-core::before,
    .loader-core::after {
      content: '';
      position: absolute;
      inset: -8px;
      border-radius: 50%;
      border: 2px solid rgba(79, 195, 247, 0.4);
      animation: ripple 2s ease-out infinite;
    }
    .loader-core::after { animation-delay: 0.8s; }

    @keyframes breathe {
      0%, 100% { transform: scale(1); opacity: 0.9; }
      50%      { transform: scale(1.15); opacity: 1; }
    }
    @keyframes ripple {
      0%   { transform: scale(1); opacity: 0.8; }
      100% { transform: scale(2); opacity: 0; }
    }

    .btn-primary {
      position: relative;
      padding: 14px 42px;
      font-family: 'Orbitron', monospace;
      font-size: 15px;
      font-weight: 600;
      letter-spacing: 3px;
      color: #E0F7FA;
      background: linear-gradient(135deg, rgba(79,195,247,0.2) 0%, rgba(206,147,216,0.2) 100%);
      border: 2px solid rgba(79, 195, 247, 0.6);
      border-radius: 999px;
      cursor: pointer;
      transition: all 0.3s ease;
      box-shadow: 0 0 20px rgba(79, 195, 247, 0.25), inset 0 0 20px rgba(79, 195, 247, 0.1);
      overflow: hidden;
    }
    .btn-primary:hover {
      transform: translateY(-2px);
      border-color: #4FC3F7;
      box-shadow: 0 0 40px rgba(79, 195, 247, 0.55), inset 0 0 30px rgba(79, 195, 247, 0.25);
      filter: brightness(1.2);
    }
    .btn-primary:active { transform: translateY(0); }

    .hint {
      font-size: 13px;
      letter-spacing: 2px;
      color: rgba(224, 247, 250, 0.6);
      text-align: center;
      line-height: 1.8;
    }
    .hint kbd {
      display: inline-block;
      padding: 2px 8px;
      border: 1px solid rgba(79, 195, 247, 0.4);
      border-radius: 4px;
      background: rgba(79, 195, 247, 0.08);
      color: #4FC3F7;
      font-family: 'Orbitron', monospace;
      font-size: 11px;
    }

    .error-text {
      color: #FF5252;
      font-size: 13px;
      letter-spacing: 1px;
      min-height: 18px;
      text-shadow: 0 0 8px rgba(255, 82, 82, 0.6);
    }

    /* 结束弹窗 */
    #gameover-modal {
      position: absolute;
      inset: 0;
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 30;
      backdrop-filter: blur(10px);
      background: rgba(10, 10, 46, 0.75);
    }
    #gameover-modal.show { display: flex; animation: fadeIn 0.4s ease; }

    @keyframes fadeIn {
      from { opacity: 0; }
      to   { opacity: 1; }
    }

    .modal-card {
      width: min(480px, 80vw);
      padding: 48px 40px;
      background: linear-gradient(160deg, rgba(28,28,94,0.95) 0%, rgba(10,10,46,0.95) 100%);
      border: 1px solid rgba(79, 195, 247, 0.35);
      border-radius: 20px;
      box-shadow: 0 0 80px rgba(79, 195, 247, 0.25), inset 0 0 40px rgba(79, 195, 247, 0.05);
      text-align: center;
      animation: popIn 0.5s cubic-bezier(.25,.8,.25,1);
    }
    @keyframes popIn {
      from { transform: scale(0.85); opacity: 0; }
      to   { transform: scale(1);    opacity: 1; }
    }

    .modal-title {
      font-family: 'Orbitron', monospace;
      font-size: 28px;
      font-weight: 700;
      letter-spacing: 4px;
      color: #FF8A80;
      text-shadow: 0 0 20px rgba(255, 82, 82, 0.5);
      margin-bottom: 36px;
    }

    .stat-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 14px 20px;
      margin-bottom: 12px;
      background: rgba(79, 195, 247, 0.06);
      border: 1px solid rgba(79, 195, 247, 0.2);
      border-radius: 10px;
    }
    .stat-label {
      font-size: 14px;
      letter-spacing: 2px;
      color: rgba(224, 247, 250, 0.75);
    }
    .stat-value {
      font-family: 'Orbitron', monospace;
      font-size: 22px;
      font-weight: 700;
      color: #4FC3F7;
      text-shadow: 0 0 10px rgba(79, 195, 247, 0.6);
    }
    .stat-value.evo { color: #FFD740; text-shadow: 0 0 10px rgba(255, 215, 64, 0.6); }

    .modal-actions { margin-top: 36px; }
  </style>
</head>
<body>
  <div id="app">
    <canvas id="game" width="900" height="900"></canvas>

    <!-- 加载层 -->
    <div id="loading-layer">
      <div class="title">声波进化岛</div>
      <div class="loader-core"></div>
      <button id="mic-btn" class="btn-primary">授权麦克风</button>
      <div id="error-msg" class="error-text"></div>
      <div class="hint">
        请允许浏览器使用麦克风<br/>
        操作提示：<kbd>响度</kbd> 控制移动速度 · <kbd>频率</kbd> 改变体色 · <kbd>节奏</kbd> 驱动脉动<br/>
        大声喊叫 <kbd>&gt; 80</kbd> 可临时震碎周围墙壁
      </div>
    </div>

    <!-- 结束弹窗 -->
    <div id="gameover-modal">
      <div class="modal-card">
        <div class="modal-title">进 化 终 止</div>
        <div class="stat-row">
          <span class="stat-label">收集食物总数</span>
          <span id="stat-food" class="stat-value">0</span>
        </div>
        <div class="stat-row">
          <span class="stat-label">最终进化等级</span>
          <span id="stat-evo" class="stat-value evo">Lv. 0</span>
        </div>
        <div class="modal-actions">
          <button id="restart-btn" class="btn-primary">重新进化</button>
        </div>
      </div>
    </div>
  </div>

  <script type="module" src="/src/main.ts"></script>
</body>
</html>
