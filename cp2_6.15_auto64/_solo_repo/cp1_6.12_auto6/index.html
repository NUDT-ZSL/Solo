<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>分子结构可视化工具</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600&family=Orbitron:wght@400;600;700;900&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      font-family: 'JetBrains Mono', monospace;
    }

    body {
      background: linear-gradient(180deg, #1a1a2e 0%, #16213e 100%);
      color: #ffffff;
    }

    #app {
      width: 100%;
      height: 100%;
      position: relative;
    }

    #canvas-container {
      width: 100%;
      height: 100%;
      position: absolute;
      top: 0;
      left: 0;
    }

    canvas {
      display: block;
    }

    .control-panel {
      position: fixed;
      top: 0;
      left: 0;
      width: 280px;
      height: 100vh;
      background: rgba(255, 255, 255, 0.05);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      border-right: 1px solid rgba(255, 255, 255, 0.1);
      padding: 24px 20px;
      z-index: 100;
      display: flex;
      flex-direction: column;
      gap: 24px;
    }

    .panel-title {
      font-family: 'Orbitron', sans-serif;
      font-size: 20px;
      font-weight: 700;
      background: linear-gradient(90deg, #00d4ff, #7b2ff7);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      letter-spacing: 1px;
    }

    .panel-section {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .section-label {
      font-size: 12px;
      color: rgba(255, 255, 255, 0.5);
      text-transform: uppercase;
      letter-spacing: 1.5px;
      font-weight: 500;
    }

    .molecule-buttons {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .molecule-btn {
      background: rgba(255, 255, 255, 0.08);
      border: 1px solid rgba(255, 255, 255, 0.15);
      border-radius: 8px;
      padding: 14px 16px;
      color: #ffffff;
      font-family: 'JetBrains Mono', monospace;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .molecule-btn:hover {
      background: rgba(0, 212, 255, 0.15);
      border-color: rgba(0, 212, 255, 0.5);
      transform: translateX(4px);
      box-shadow: 0 4px 20px rgba(0, 212, 255, 0.2);
    }

    .molecule-btn.active {
      background: linear-gradient(90deg, rgba(0, 212, 255, 0.25), rgba(123, 47, 247, 0.25));
      border-color: rgba(0, 212, 255, 0.8);
      box-shadow: 0 4px 24px rgba(0, 212, 255, 0.3);
    }

    .molecule-btn .formula {
      font-family: 'Orbitron', sans-serif;
      font-weight: 600;
      font-size: 16px;
    }

    .molecule-btn .name {
      font-size: 11px;
      color: rgba(255, 255, 255, 0.6);
    }

    .molecule-btn .btn-content {
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      gap: 2px;
    }

    .fps-counter {
      margin-top: auto;
      padding: 16px;
      background: rgba(0, 0, 0, 0.3);
      border-radius: 8px;
      border: 1px solid rgba(255, 255, 255, 0.1);
    }

    .fps-value {
      font-family: 'Orbitron', sans-serif;
      font-size: 28px;
      font-weight: 700;
      color: #00d4ff;
      line-height: 1;
    }

    .fps-label {
      font-size: 11px;
      color: rgba(255, 255, 255, 0.5);
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-top: 4px;
    }

    .info-card {
      position: fixed;
      top: 24px;
      right: 24px;
      width: 320px;
      background: rgba(15, 23, 42, 0.9);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border: 1px solid rgba(0, 212, 255, 0.3);
      border-radius: 12px;
      padding: 24px;
      z-index: 200;
      opacity: 0;
      transform: translateY(-10px);
      transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
      pointer-events: none;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4), 0 0 40px rgba(0, 212, 255, 0.1);
    }

    .info-card.visible {
      opacity: 1;
      transform: translateY(0);
    }

    .info-card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 2px;
      background: linear-gradient(90deg, #00d4ff, #7b2ff7, #00d4ff);
      border-radius: 12px 12px 0 0;
      animation: shimmer 2s ease-in-out infinite;
    }

    @keyframes shimmer {
      0%, 100% { opacity: 0.6; }
      50% { opacity: 1; }
    }

    .info-header {
      display: flex;
      align-items: center;
      gap: 16px;
      margin-bottom: 20px;
    }

    .atom-symbol {
      width: 64px;
      height: 64px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Orbitron', sans-serif;
      font-size: 28px;
      font-weight: 900;
      box-shadow: 0 0 30px currentColor, inset 0 0 20px rgba(255, 255, 255, 0.2);
    }

    .atom-info {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .atom-name {
      font-family: 'Orbitron', sans-serif;
      font-size: 20px;
      font-weight: 700;
    }

    .atom-detail {
      font-size: 12px;
      color: rgba(255, 255, 255, 0.6);
    }

    .info-section {
      margin-bottom: 16px;
    }

    .info-section:last-child {
      margin-bottom: 0;
    }

    .info-section-label {
      font-size: 11px;
      color: rgba(255, 255, 255, 0.5);
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 8px;
    }

    .coord-number {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 40px;
      padding: 8px 16px;
      background: linear-gradient(90deg, rgba(0, 212, 255, 0.2), rgba(123, 47, 247, 0.2));
      border: 1px solid rgba(0, 212, 255, 0.4);
      border-radius: 20px;
      font-family: 'Orbitron', sans-serif;
      font-size: 20px;
      font-weight: 700;
      color: #00d4ff;
    }

    .bond-angles {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .bond-angle-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 10px 14px;
      background: rgba(255, 255, 255, 0.05);
      border-radius: 8px;
      border: 1px solid rgba(255, 255, 255, 0.08);
    }

    .bond-angle-label {
      font-size: 13px;
      color: rgba(255, 255, 255, 0.8);
    }

    .bond-angle-value {
      font-family: 'Orbitron', sans-serif;
      font-size: 16px;
      font-weight: 600;
      color: #00d4ff;
    }

    .close-hint {
      position: absolute;
      bottom: -24px;
      right: 0;
      font-size: 11px;
      color: rgba(255, 255, 255, 0.4);
    }

    .instructions {
      padding: 16px;
      background: rgba(0, 0, 0, 0.2);
      border-radius: 8px;
      border: 1px solid rgba(255, 255, 255, 0.08);
      font-size: 12px;
      color: rgba(255, 255, 255, 0.6);
      line-height: 1.8;
    }

    .instructions span {
      color: #00d4ff;
      font-weight: 600;
    }
  </style>
</head>
<body>
  <div id="app">
    <div id="canvas-container"></div>
  </div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
