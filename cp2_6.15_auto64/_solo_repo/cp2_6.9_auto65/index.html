<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>情绪花园 - Emotion Garden</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    }
    #root {
      width: 100vw;
      height: 100vh;
      position: relative;
    }
    canvas {
      display: block;
      position: absolute;
      top: 0;
      left: 0;
    }
    .emotion-controls {
      position: fixed;
      bottom: 30px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      gap: 16px;
      z-index: 100;
      padding: 16px 24px;
      background: rgba(255, 255, 255, 0.15);
      backdrop-filter: blur(10px);
      border-radius: 50px;
      border: 1px solid rgba(255, 255, 255, 0.3);
    }
    .emotion-btn {
      padding: 12px 24px;
      border: none;
      border-radius: 30px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      color: #fff;
      transition: all 0.3s ease;
      box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
    }
    .emotion-btn:hover {
      transform: translateY(-3px) scale(1.05);
      box-shadow: 0 6px 20px rgba(0, 0, 0, 0.3);
    }
    .emotion-btn.active {
      transform: scale(1.1);
      box-shadow: 0 0 25px rgba(255, 255, 255, 0.5);
    }
    .emotion-btn.happy { background: linear-gradient(135deg, #ff8c42, #ffd700); }
    .emotion-btn.sad { background: linear-gradient(135deg, #4a6fa5, #8b6fa5); }
    .emotion-btn.angry { background: linear-gradient(135deg, #8b0000, #ff4500); }
    .emotion-btn.calm { background: linear-gradient(135deg, #2ecc71, #87ceeb); }
    .hint {
      position: fixed;
      top: 20px;
      left: 50%;
      transform: translateX(-50%);
      color: rgba(255, 255, 255, 0.9);
      font-size: 14px;
      z-index: 100;
      text-shadow: 0 2px 10px rgba(0, 0, 0, 0.3);
      pointer-events: none;
    }
  </style>
</head>
<body>
  <div id="root">
    <canvas id="garden-canvas"></canvas>
    <div class="hint">选择一种情绪，开始种植你的花园 🌸 拖拽花朵可移动，点击花朵可让它绽放</div>
    <div class="emotion-controls">
      <button class="emotion-btn happy" data-emotion="happy">😊 快乐</button>
      <button class="emotion-btn sad" data-emotion="sad">😢 悲伤</button>
      <button class="emotion-btn angry" data-emotion="angry">😠 愤怒</button>
      <button class="emotion-btn calm" data-emotion="calm">😌 平静</button>
    </div>
  </div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
