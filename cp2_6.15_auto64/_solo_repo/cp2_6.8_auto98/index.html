<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pong - 经典乒乓游戏</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background-color: #0D1117;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      color: #E2E8F0;
      padding: 20px;
    }

    .game-container {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 16px;
    }

    .game-title {
      font-size: 28px;
      font-weight: 700;
      color: #63B3ED;
      letter-spacing: 4px;
      text-transform: uppercase;
      text-shadow: 0 0 20px rgba(99, 179, 237, 0.3);
    }

    .canvas-wrapper {
      position: relative;
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 0 40px rgba(99, 179, 237, 0.15),
                  0 10px 40px rgba(0, 0, 0, 0.5);
    }

    canvas {
      display: block;
      border-radius: 12px;
    }

    .flash-overlay {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-color: rgba(255, 255, 255, 0);
      pointer-events: none;
      transition: background-color 0.05s ease;
    }

    .flash-overlay.active {
      background-color: rgba(255, 255, 255, 0.3);
    }

    .win-overlay {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.5s ease;
    }

    .win-overlay.active {
      opacity: 1;
      pointer-events: auto;
    }

    .win-text {
      font-size: 48px;
      font-weight: 700;
      color: #FFD700;
      text-shadow: 0 0 20px rgba(255, 215, 0, 0.6),
                   0 0 40px rgba(255, 215, 0, 0.3);
    }

    .restart-btn-overlay {
      position: absolute;
      bottom: 16px;
      right: 16px;
      padding: 10px 20px;
      background-color: #E53E3E;
      color: #FFFFFF;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      opacity: 0;
      pointer-events: none;
      transition: all 0.2s ease;
    }

    .restart-btn-overlay.active {
      opacity: 1;
      pointer-events: auto;
    }

    .restart-btn-overlay:hover {
      background-color: #C53030;
      transform: translateY(-1px);
    }

    .controls-bar {
      width: 800px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      padding: 12px 16px;
      background-color: rgba(0, 0, 0, 0.5);
      border-radius: 12px;
      backdrop-filter: blur(8px);
      transition: all 0.2s ease;
    }

    .control-group {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .control-label {
      font-size: 14px;
      color: #A0AEC0;
      font-weight: 500;
    }

    .switch {
      position: relative;
      width: 52px;
      height: 28px;
      background-color: #4A5568;
      border-radius: 14px;
      cursor: pointer;
      transition: background-color 0.2s ease;
    }

    .switch.active {
      background-color: #48BB78;
    }

    .switch-knob {
      position: absolute;
      top: 4px;
      left: 4px;
      width: 20px;
      height: 20px;
      background-color: #FFFFFF;
      border-radius: 50%;
      transition: transform 0.2s ease;
    }

    .switch.active .switch-knob {
      transform: translateX(24px);
    }

    .slider-container {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .slider-value {
      font-size: 12px;
      color: #63B3ED;
      font-weight: 600;
      width: 30px;
      text-align: center;
    }

    input[type="range"] {
      -webkit-appearance: none;
      appearance: none;
      width: 120px;
      height: 6px;
      background: #A0AEC0;
      border-radius: 3px;
      outline: none;
      cursor: pointer;
    }

    input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none;
      appearance: none;
      width: 18px;
      height: 18px;
      background: #48BB78;
      border-radius: 50%;
      cursor: pointer;
      transition: transform 0.15s ease;
      box-shadow: 0 2px 8px rgba(72, 187, 120, 0.4);
    }

    input[type="range"]::-webkit-slider-thumb:hover {
      transform: scale(1.15);
    }

    input[type="range"]::-moz-range-thumb {
      width: 18px;
      height: 18px;
      background: #48BB78;
      border-radius: 50%;
      cursor: pointer;
      border: none;
      box-shadow: 0 2px 8px rgba(72, 187, 120, 0.4);
    }

    .speed-display {
      font-size: 14px;
      color: #FFFFFF;
      font-weight: 500;
      padding: 6px 12px;
      background-color: rgba(99, 179, 237, 0.15);
      border-radius: 6px;
      border: 1px solid rgba(99, 179, 237, 0.3);
    }

    .reset-btn {
      padding: 8px 16px;
      background-color: #2D3748;
      color: #FFFFFF;
      border: 1px solid #4A5568;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s ease;
    }

    .reset-btn:hover {
      background-color: #4A5568;
      border-color: #63B3ED;
      color: #63B3ED;
    }

    @media (max-width: 900px) {
      .canvas-wrapper,
      canvas,
      .controls-bar {
        width: 640px !important;
      }
    }

    @media (max-width: 700px) {
      .game-title {
        font-size: 22px;
      }

      .controls-bar {
        flex-direction: column;
        align-items: stretch;
        gap: 12px;
      }

      .control-group {
        justify-content: space-between;
      }
    }
  </style>
</head>
<body>
  <div class="game-container">
    <h1 class="game-title">PONG</h1>
    
    <div class="canvas-wrapper" id="canvasWrapper">
      <canvas id="gameCanvas" width="800" height="500"></canvas>
      <div class="flash-overlay" id="flashOverlay"></div>
      <div class="win-overlay" id="winOverlay">
        <span class="win-text" id="winText"></span>
      </div>
      <button class="restart-btn-overlay" id="restartBtnOverlay">重新开始</button>
    </div>

    <div class="controls-bar" id="controlsBar">
      <div class="control-group">
        <span class="control-label">游戏模式:</span>
        <div class="switch" id="modeSwitch" title="单人/双人模式">
          <div class="switch-knob"></div>
        </div>
        <span class="control-label" id="modeLabel">单人</span>
      </div>

      <div class="control-group">
        <span class="control-label">AI速度:</span>
        <div class="slider-container">
          <span class="slider-value" id="aiSpeedLabel">中</span>
          <input type="range" id="aiSpeedSlider" min="1" max="3" step="1" value="2">
        </div>
      </div>

      <div class="control-group">
        <span class="control-label">球速:</span>
        <span class="speed-display" id="speedDisplay">4.0</span>
      </div>

      <div class="control-group">
        <button class="reset-btn" id="resetBtn">重置游戏</button>
      </div>
    </div>
  </div>

  <script type="module" src="/src/main.ts"></script>
</body>
</html>
