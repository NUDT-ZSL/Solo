<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>深渊契约 - Abyss Contract</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #0a0612;
      overflow: hidden;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      width: 100vw;
      font-family: 'Segoe UI', 'Microsoft YaHei', sans-serif;
    }

    #gameCanvas {
      display: block;
      image-rendering: pixelated;
      background: #0d0820;
      border: 1px solid rgba(120, 40, 160, 0.3);
      box-shadow: 0 0 40px rgba(100, 20, 140, 0.2), inset 0 0 60px rgba(0, 0, 0, 0.5);
    }

    #uiOverlay {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
    }

    #uiOverlay > * {
      pointer-events: auto;
    }
  </style>
</head>
<body>
  <canvas id="gameCanvas"></canvas>
  <div id="uiOverlay"></div>
  <script type="module" src="/src/GameEngine.ts"></script>
</body>
</html>
