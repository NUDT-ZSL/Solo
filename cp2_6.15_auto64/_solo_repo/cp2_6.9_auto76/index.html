<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>海岸线淹没模拟 | Coastal Flood Simulation</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      font-family: 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
      background: linear-gradient(180deg, #0a1a3a 0%, #1a1a2e 100%);
      color: #ffffff;
    }

    #app {
      position: relative;
      width: 100vw;
      height: 100vh;
    }

    #app canvas {
      display: block;
      width: 100%;
      height: 100%;
    }

    .info-panel {
      position: fixed;
      top: 20px;
      left: 20px;
      min-width: 220px;
      padding: 16px 20px;
      background: rgba(0, 0, 0, 0.6);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 0.3px solid rgba(255, 255, 255, 0.1);
      border-radius: 8px;
      z-index: 100;
      box-shadow: 0 4px 24px rgba(0, 0, 0, 0.4);
    }

    .info-panel h3 {
      font-size: 13px;
      font-weight: 400;
      color: rgba(255, 255, 255, 0.6);
      margin-bottom: 12px;
      letter-spacing: 1px;
      text-transform: uppercase;
    }

    .info-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 6px 0;
      border-bottom: 1px solid rgba(255, 255, 255, 0.08);
    }

    .info-row:last-child {
      border-bottom: none;
    }

    .info-label {
      font-size: 12px;
      color: rgba(255, 255, 255, 0.7);
    }

    .info-value {
      font-family: 'SF Mono', 'Consolas', 'Monaco', monospace;
      font-size: 18px;
      font-weight: 700;
      color: #ffffff;
      transition: transform 0.3s ease, opacity 0.3s ease;
      min-width: 80px;
      text-align: right;
    }

    .info-value.updating {
      transform: translateY(-8px);
      opacity: 0;
    }

    .slider-container {
      position: fixed;
      bottom: 30px;
      left: 50%;
      transform: translateX(-50%);
      width: 85%;
      max-width: 800px;
      padding: 20px 24px;
      background: rgba(255, 255, 255, 0.08);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 0.3px solid rgba(255, 255, 255, 0.1);
      border-radius: 12px;
      z-index: 100;
      box-shadow: 0 4px 24px rgba(0, 0, 0, 0.3);
    }

    .slider-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 16px;
    }

    .slider-title {
      font-size: 13px;
      font-weight: 500;
      color: rgba(255, 255, 255, 0.85);
      letter-spacing: 0.5px;
    }

    .slider-year-display {
      font-family: 'SF Mono', 'Consolas', monospace;
      font-size: 20px;
      font-weight: 700;
      color: #00aaff;
    }

    .slider-wrapper {
      position: relative;
      padding: 8px 0;
    }

    .year-slider {
      -webkit-appearance: none;
      appearance: none;
      width: 100%;
      height: 4px;
      background: #555;
      border-radius: 2px;
      outline: none;
      cursor: pointer;
      transition: background 0.2s ease;
    }

    .year-slider:hover {
      background: #666;
    }

    .year-slider::-webkit-slider-thumb {
      -webkit-appearance: none;
      appearance: none;
      width: 24px;
      height: 24px;
      border-radius: 50%;
      background: #00aaff;
      cursor: pointer;
      box-shadow: 0 0 0 4px rgba(255, 255, 255, 0.3),
                  0 0 12px rgba(0, 170, 255, 0.6);
      transition: transform 0.15s ease, box-shadow 0.15s ease;
    }

    .year-slider::-webkit-slider-thumb:hover {
      transform: scale(1.1);
      box-shadow: 0 0 0 4px rgba(255, 255, 255, 0.5),
                  0 0 16px rgba(0, 170, 255, 0.8);
    }

    .year-slider::-moz-range-thumb {
      width: 24px;
      height: 24px;
      border-radius: 50%;
      background: #00aaff;
      cursor: pointer;
      border: none;
      box-shadow: 0 0 0 4px rgba(255, 255, 255, 0.3),
                  0 0 12px rgba(0, 170, 255, 0.6);
      transition: transform 0.15s ease, box-shadow 0.15s ease;
    }

    .year-slider::-moz-range-thumb:hover {
      transform: scale(1.1);
      box-shadow: 0 0 0 4px rgba(255, 255, 255, 0.5),
                  0 0 16px rgba(0, 170, 255, 0.8);
    }

    .slider-ticks {
      display: flex;
      justify-content: space-between;
      margin-top: 8px;
      padding: 0 12px;
    }

    .slider-tick {
      font-family: 'SF Mono', 'Consolas', monospace;
      font-size: 11px;
      color: rgba(255, 255, 255, 0.5);
      position: relative;
    }

    .slider-tick::before {
      content: '';
      position: absolute;
      top: -12px;
      left: 50%;
      transform: translateX(-50%);
      width: 1px;
      height: 6px;
      background: rgba(255, 255, 255, 0.3);
    }

    @media (max-width: 768px) {
      .info-panel {
        top: 12px;
        left: 12px;
        right: 12px;
        min-width: auto;
        padding: 12px 16px;
      }

      .slider-container {
        bottom: 16px;
        left: 12px;
        right: 12px;
        width: auto;
        transform: none;
        padding: 16px;
      }

      .info-value {
        font-size: 16px;
      }

      .slider-year-display {
        font-size: 18px;
      }
    }
  </style>
</head>
<body>
  <div id="app"></div>

  <div class="info-panel" id="infoPanel">
    <h3>海平面监测面板</h3>
    <div class="info-row">
      <span class="info-label">当前年份</span>
      <span class="info-value" id="yearValue">2020</span>
    </div>
    <div class="info-row">
      <span class="info-label">海平面高度</span>
      <span class="info-value" id="levelValue">0.00 m</span>
    </div>
    <div class="info-row">
      <span class="info-label">已淹没面积</span>
      <span class="info-value" id="percentValue">0.00%</span>
    </div>
  </div>

  <div class="slider-container" id="sliderContainer">
    <div class="slider-header">
      <span class="slider-title">时间推进 · Sea Level Rise Timeline</span>
      <span class="slider-year-display" id="sliderYear">2020</span>
    </div>
    <div class="slider-wrapper">
      <input type="range" class="year-slider" id="yearSlider" min="2020" max="2100" step="1" value="2020" />
      <div class="slider-ticks">
        <span class="slider-tick">2020</span>
        <span class="slider-tick">2040</span>
        <span class="slider-tick">2060</span>
        <span class="slider-tick">2080</span>
        <span class="slider-tick">2100</span>
      </div>
    </div>
  </div>

  <script type="module" src="/src/main.ts"></script>
</body>
</html>
