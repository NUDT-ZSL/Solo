<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>昆虫复眼视觉模拟器</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    }

    #app {
      width: 100%;
      height: 100%;
      background: linear-gradient(180deg, #0A0A2E 0%, #1A0A3E 100%);
      position: relative;
    }

    #canvas-container {
      width: 100%;
      height: 100%;
      position: absolute;
      top: 0;
      left: 0;
    }

    #control-panel {
      position: absolute;
      left: 20px;
      bottom: 20px;
      width: 320px;
      background: rgba(255, 255, 255, 0.1);
      border: 1px solid rgba(255, 255, 255, 0.2);
      border-radius: 12px;
      padding: 20px;
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      color: #fff;
      z-index: 100;
    }

    #control-panel h2 {
      font-size: 16px;
      font-weight: 600;
      margin-bottom: 16px;
      color: #FFD700;
      text-shadow: 0 0 10px rgba(255, 215, 0, 0.5);
    }

    .control-group {
      margin-bottom: 16px;
    }

    .control-group label {
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 13px;
      margin-bottom: 8px;
      color: rgba(255, 255, 255, 0.9);
    }

    .control-group .value {
      font-weight: 600;
      color: #FFD700;
      background: rgba(255, 215, 0, 0.1);
      padding: 2px 8px;
      border-radius: 4px;
      font-size: 12px;
    }

    .slider-container {
      position: relative;
      width: 100%;
      height: 6px;
    }

    input[type="range"] {
      -webkit-appearance: none;
      appearance: none;
      width: 100%;
      height: 6px;
      border-radius: 3px;
      background: rgba(255, 255, 255, 0.15);
      outline: none;
      cursor: pointer;
      position: relative;
      z-index: 2;
    }

    input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none;
      appearance: none;
      width: 16px;
      height: 16px;
      border-radius: 50%;
      background: linear-gradient(135deg, #FFD700, #FF8C00);
      cursor: pointer;
      box-shadow: 0 0 10px rgba(255, 215, 0, 0.6);
      border: 2px solid #fff;
    }

    input[type="range"]::-moz-range-thumb {
      width: 16px;
      height: 16px;
      border-radius: 50%;
      background: linear-gradient(135deg, #FFD700, #FF8C00);
      cursor: pointer;
      box-shadow: 0 0 10px rgba(255, 215, 0, 0.6);
      border: 2px solid #fff;
    }

    .slider-fill {
      position: absolute;
      top: 0;
      left: 0;
      height: 6px;
      border-radius: 3px;
      background: linear-gradient(90deg, #FF8C00, #FFD700);
      pointer-events: none;
      z-index: 1;
    }

    .toggle-container {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .toggle {
      position: relative;
      width: 48px;
      height: 24px;
      background: rgba(255, 255, 255, 0.15);
      border-radius: 12px;
      cursor: pointer;
      transition: background 0.3s;
    }

    .toggle.active {
      background: linear-gradient(90deg, #FF8C00, #FFD700);
      box-shadow: 0 0 15px rgba(255, 215, 0, 0.5);
    }

    .toggle::after {
      content: '';
      position: absolute;
      top: 2px;
      left: 2px;
      width: 20px;
      height: 20px;
      background: #fff;
      border-radius: 50%;
      transition: transform 0.3s;
    }

    .toggle.active::after {
      transform: translateX(24px);
    }

    #view-controls {
      position: absolute;
      top: 20px;
      right: 20px;
      display: flex;
      gap: 10px;
      z-index: 100;
      align-items: flex-start;
    }

    .view-btn {
      padding: 10px 20px;
      background: rgba(255, 255, 255, 0.1);
      border: 1px solid rgba(255, 255, 255, 0.2);
      border-radius: 8px;
      color: #fff;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.3s;
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      position: relative;
      overflow: visible;
    }

    .view-btn:hover {
      background: rgba(255, 255, 255, 0.2);
      border-color: rgba(255, 255, 255, 0.4);
    }

    .view-btn.active {
      background: rgba(255, 215, 0, 0.2);
      border-color: #FFD700;
      color: #FFD700;
    }

    .view-btn.active::after {
      content: '';
      position: absolute;
      top: -2px;
      left: -2px;
      right: -2px;
      bottom: -2px;
      border: 2px solid #FFD700;
      border-radius: 10px;
      animation: pulse 0.6s ease-out;
      pointer-events: none;
    }

    @keyframes pulse {
      0% {
        opacity: 1;
        transform: scale(1);
      }
      100% {
        opacity: 0;
        transform: scale(1.3);
      }
    }

    #fps-counter {
      position: absolute;
      top: 20px;
      right: 20px;
      padding: 8px 14px;
      background: rgba(255, 255, 255, 0.1);
      border: 1px solid rgba(255, 255, 255, 0.2);
      border-radius: 8px;
      color: #7CFC00;
      font-size: 13px;
      font-family: 'Courier New', monospace;
      font-weight: 600;
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      z-index: 99;
      margin-top: 60px;
    }

    .eye-info {
      margin-top: 12px;
      padding-top: 12px;
      border-top: 1px solid rgba(255, 255, 255, 0.1);
      font-size: 11px;
      color: rgba(255, 255, 255, 0.6);
      line-height: 1.6;
    }

    .eye-info span {
      color: #FFD700;
      font-weight: 600;
    }
  </style>
</head>
<body>
  <div id="app">
    <div id="canvas-container"></div>

    <div id="view-controls">
      <button class="view-btn" data-view="insect">昆虫视角</button>
      <button class="view-btn" data-view="macro">宏观视角</button>
      <button class="view-btn active" data-view="free">自由视角</button>
    </div>

    <div id="fps-counter">FPS: --</div>

    <div id="control-panel">
      <h2>🦋 复眼参数控制</h2>

      <div class="control-group">
        <label>
          <span>小眼数量</span>
          <span class="value" id="ommatidia-value">200</span>
        </label>
        <div class="slider-container">
          <div class="slider-fill" id="ommatidia-fill"></div>
          <input type="range" id="ommatidia-count" min="50" max="500" value="200" step="10" />
        </div>
      </div>

      <div class="control-group">
        <label>
          <span>排列曲率</span>
          <span class="value" id="curvature-value">0.6</span>
        </label>
        <div class="slider-container">
          <div class="slider-fill" id="curvature-fill"></div>
          <input type="range" id="curvature" min="0.2" max="1.0" value="0.6" step="0.05" />
        </div>
      </div>

      <div class="control-group">
        <label>
          <span>感光灵敏度</span>
          <span class="value" id="sensitivity-value">1.0</span>
        </label>
        <div class="slider-container">
          <div class="slider-fill" id="sensitivity-fill"></div>
          <input type="range" id="sensitivity" min="0.1" max="2.0" value="1.0" step="0.1" />
        </div>
      </div>

      <div class="control-group">
        <label>
          <span>场景色温</span>
          <span class="value" id="temperature-value">1.0</span>
        </label>
        <div class="slider-container">
          <div class="slider-fill" id="temperature-fill"></div>
          <input type="range" id="temperature" min="0.3" max="2.0" value="1.0" step="0.1" />
        </div>
      </div>

      <div class="control-group">
        <div class="toggle-container">
          <label style="margin-bottom: 0;">鲜艳模式</label>
          <div class="toggle" id="vivid-toggle"></div>
        </div>
      </div>

      <div class="eye-info">
        检测到物体: <span id="detected-count">0</span> 个<br />
        最近距离: <span id="nearest-distance">--</span><br />
        平均颜色: <span id="avg-color">--</span>
      </div>
    </div>
  </div>

  <script type="module" src="/src/main.ts"></script>
</body>
</html>
