<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BarCode Art</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet" />
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      background: #1a1a2e;
      color: #e0e0e0;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .card {
      width: 800px;
      height: 600px;
      background: #16213e;
      border-radius: 16px;
      padding: 24px 32px;
      display: flex;
      flex-direction: column;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
      position: relative;
    }

    .header {
      display: flex;
      align-items: center;
      margin-bottom: 20px;
    }

    .title {
      font-family: 'Orbitron', sans-serif;
      font-size: 24px;
      font-weight: 700;
      background: linear-gradient(90deg, #00d2ff, #3a7bd5);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .barcode-wrapper {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
    }

    .barcode-glow {
      position: absolute;
      width: 540px;
      height: 340px;
      border-radius: 12px;
      background: radial-gradient(ellipse at center, rgba(0, 210, 255, 0.3) 0%, transparent 70%);
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.2s;
    }

    .barcode-glow.active {
      opacity: 1;
      animation: pulse 0.5s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 0.3; }
      50% { opacity: 0.6; }
    }

    .barcode-container {
      position: relative;
      width: 500px;
      height: 300px;
      background: #0d1b2a;
      border-radius: 8px;
      overflow: hidden;
      cursor: crosshair;
    }

    #barcodeCanvas {
      display: block;
      width: 100%;
      height: 100%;
    }

    .magnifier {
      position: absolute;
      width: 150px;
      height: 150px;
      border: 3px solid #00d2ff;
      border-radius: 50%;
      pointer-events: none;
      display: none;
      overflow: hidden;
      background: #0d1b2a;
      box-shadow: 0 0 20px rgba(0, 210, 255, 0.5);
    }

    .magnifier canvas {
      width: 300px;
      height: 600px;
      transform-origin: 0 0;
    }

    .controls {
      display: flex;
      align-items: center;
      gap: 16px;
      margin-top: 20px;
      flex-wrap: wrap;
    }

    .text-input {
      flex: 1;
      min-width: 180px;
      height: 40px;
      padding: 0 14px;
      background: #0d1b2a;
      border: 1px solid #2c3e50;
      border-radius: 8px;
      color: #e0e0e0;
      font-size: 14px;
      outline: none;
      transition: border-color 0.2s;
    }

    .text-input:focus {
      border-color: #00d2ff;
    }

    .slider-group {
      display: flex;
      align-items: center;
      gap: 8px;
      flex: 1;
      min-width: 140px;
    }

    .slider-label {
      font-size: 12px;
      color: #a0a0a0;
      min-width: 40px;
    }

    .slider-wrapper {
      flex: 1;
      position: relative;
      height: 24px;
      display: flex;
      align-items: center;
    }

    input[type="range"] {
      -webkit-appearance: none;
      appearance: none;
      width: 100%;
      height: 4px;
      background: linear-gradient(90deg, #00d2ff, #3a7bd5);
      border-radius: 2px;
      outline: none;
      cursor: pointer;
    }

    input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none;
      appearance: none;
      width: 18px;
      height: 18px;
      border-radius: 50%;
      background: #ffffff;
      border: 2px solid #3a7bd5;
      cursor: pointer;
      box-shadow: 0 2px 6px rgba(0, 0, 0, 0.3);
    }

    input[type="range"]::-moz-range-thumb {
      width: 18px;
      height: 18px;
      border-radius: 50%;
      background: #ffffff;
      border: 2px solid #3a7bd5;
      cursor: pointer;
      box-shadow: 0 2px 6px rgba(0, 0, 0, 0.3);
    }

    .slider-value {
      font-size: 12px;
      color: #00d2ff;
      min-width: 36px;
      text-align: right;
    }

    .color-picker {
      display: flex;
      gap: 4px;
    }

    .color-input {
      width: 32px;
      height: 32px;
      border: 2px solid #2c3e50;
      border-radius: 50%;
      background: none;
      cursor: pointer;
      padding: 0;
      overflow: hidden;
    }

    .color-input::-webkit-color-swatch-wrapper {
      padding: 0;
    }

    .color-input::-webkit-color-swatch {
      border: none;
      border-radius: 50%;
    }

    .footer {
      display: flex;
      justify-content: center;
      gap: 16px;
      margin-top: 20px;
    }

    .btn {
      height: 40px;
      padding: 0 28px;
      border: none;
      border-radius: 8px;
      background: linear-gradient(135deg, #0f3460, #533483);
      color: #e0e0e0;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s ease-in-out;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .btn:hover {
      transform: translateY(-3px);
      box-shadow: 0 8px 20px rgba(83, 52, 131, 0.4);
    }

    .btn:active {
      transform: translateY(-1px);
    }

    .toast {
      position: fixed;
      top: 24px;
      left: 50%;
      transform: translateX(-50%) translateY(-100px);
      background: #0f3460;
      color: #e0e0e0;
      padding: 12px 24px;
      border-radius: 8px;
      font-size: 14px;
      opacity: 0;
      transition: all 0.3s ease;
      z-index: 1000;
      box-shadow: 0 4px 16px rgba(0, 0, 0, 0.3);
    }

    .toast.show {
      transform: translateX(-50%) translateY(0);
      opacity: 1;
    }

    @media (max-width: 1024px) {
      .card {
        width: 90vw;
        height: auto;
        min-height: 600px;
      }
    }

    @media (max-width: 640px) {
      .card {
        width: 95vw;
        height: auto;
        padding: 16px;
      }

      .barcode-container {
        width: 100%;
        height: 240px;
      }

      .barcode-glow {
        width: calc(100% + 40px);
        height: calc(100% + 40px);
      }

      .controls {
        flex-direction: column;
        align-items: stretch;
      }

      .slider-group {
        width: 100%;
      }

      .footer {
        flex-direction: column;
      }

      .btn {
        justify-content: center;
      }
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="header">
      <h1 class="title">BarCode Art</h1>
    </div>

    <div class="barcode-wrapper">
      <div class="barcode-glow" id="barcodeGlow"></div>
      <div class="barcode-container" id="barcodeContainer">
        <canvas id="barcodeCanvas" width="500" height="300"></canvas>
        <div class="magnifier" id="magnifier">
          <canvas id="magnifierCanvas" width="300" height="600"></canvas>
        </div>
      </div>
    </div>

    <div class="controls">
      <input type="text" id="textInput" class="text-input" maxlength="20" placeholder="输入文字 (最多20字符)" value="Hello" />

      <div class="slider-group">
        <span class="slider-label">颜色</span>
        <div class="color-picker">
          <input type="color" class="color-input" id="color1" value="#000000" />
          <input type="color" class="color-input" id="color2" value="#3a7bd5" />
          <input type="color" class="color-input" id="color3" value="#00d2ff" />
        </div>
      </div>

      <div class="slider-group">
        <span class="slider-label">密度</span>
        <div class="slider-wrapper">
          <input type="range" id="densitySlider" min="1" max="8" step="1" value="3" />
        </div>
        <span class="slider-value" id="densityValue">3</span>
      </div>

      <div class="slider-group">
        <span class="slider-label">透明度</span>
        <div class="slider-wrapper">
          <input type="range" id="opacitySlider" min="0" max="1" step="0.05" value="1" />
        </div>
        <span class="slider-value" id="opacityValue">1.00</span>
      </div>
    </div>

    <div class="footer">
      <button class="btn" id="copyBtn">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path></svg>
        复制PNG
      </button>
      <button class="btn" id="downloadBtn">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="7 10 12 15 17 10"></polyline><line x1="12" y1="15" x2="12" y2="3"></line></svg>
        下载SVG
      </button>
    </div>
  </div>

  <div class="toast" id="toast"></div>

  <script type="module" src="/src/main.ts"></script>
</body>
</html>
