<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>太空采矿 - 2D像素风资源管理游戏演示</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #000;
      color: #E2E8F0;
      font-family: 'Consolas', 'Courier New', monospace;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    .game-container {
      display: flex;
      gap: 16px;
      align-items: flex-start;
      padding: 20px;
    }

    .control-panel {
      display: flex;
      flex-direction: column;
      gap: 16px;
      width: 220px;
      background: rgba(11, 12, 16, 0.9);
      border-radius: 8px;
      padding: 16px;
      border: 1px solid rgba(99, 179, 237, 0.3);
    }

    .control-panel h3 {
      color: #63B3ED;
      font-size: 14px;
      margin-bottom: 4px;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .slider-group {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .slider-group label {
      font-size: 12px;
      color: #A0AEC0;
      display: flex;
      justify-content: space-between;
    }

    .slider-group label span {
      color: #63B3ED;
      font-weight: bold;
    }

    input[type="range"] {
      -webkit-appearance: none;
      appearance: none;
      width: 100%;
      height: 6px;
      background: #2D3748;
      border-radius: 3px;
      outline: none;
      cursor: pointer;
    }

    input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none;
      appearance: none;
      width: 20px;
      height: 12px;
      background: #63B3ED;
      border-radius: 3px;
      cursor: pointer;
      transition: background 0.2s;
    }

    input[type="range"]::-webkit-slider-thumb:hover {
      background: #90CDF4;
    }

    input[type="range"]::-moz-range-thumb {
      width: 20px;
      height: 12px;
      background: #63B3ED;
      border-radius: 3px;
      cursor: pointer;
      border: none;
      transition: background 0.2s;
    }

    input[type="range"]::-moz-range-thumb:hover {
      background: #90CDF4;
    }

    .reset-btn {
      background: #2D3748;
      color: #E2E8F0;
      border: 1px solid #4A5568;
      padding: 10px 16px;
      border-radius: 6px;
      font-family: inherit;
      font-size: 13px;
      cursor: pointer;
      transition: all 0.2s;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .reset-btn:hover {
      background: #4A5568;
      border-color: #63B3ED;
      color: #63B3ED;
    }

    .canvas-wrapper {
      position: relative;
      box-shadow: 0 0 30px rgba(79, 209, 197, 0.15);
      border-radius: 4px;
      overflow: hidden;
    }

    #gameCanvas {
      display: block;
      background: linear-gradient(180deg, #0B0C10 0%, #1A202C 100%);
    }

    .hints {
      margin-top: 8px;
      padding: 10px;
      background: rgba(45, 55, 72, 0.5);
      border-radius: 6px;
      font-size: 11px;
      line-height: 1.6;
      color: #A0AEC0;
    }

    .hints b {
      color: #63B3ED;
    }

    @media (max-width: 768px) {
      .game-container {
        flex-direction: column;
        align-items: center;
        padding: 10px;
      }

      .control-panel {
        width: 100%;
        max-width: 400px;
        order: 2;
      }

      .canvas-wrapper {
        order: 1;
      }
    }
  </style>
</head>
<body>
  <div class="game-container">
    <div class="control-panel">
      <h3>游戏参数</h3>
      
      <div class="slider-group">
        <label>AI追踪速度 <span id="aiSpeedValue">1.5</span> px/帧</label>
        <input type="range" id="aiSpeed" min="1" max="3" step="0.1" value="1.5" />
      </div>

      <div class="slider-group">
        <label>敌船再生延迟 <span id="respawnValue">15</span> 秒</label>
        <input type="range" id="respawnDelay" min="10" max="25" step="1" value="15" />
      </div>

      <div class="slider-group">
        <label>水晶掉落率 <span id="crystalValue">3</span> 颗/陨石</label>
        <input type="range" id="crystalDropRate" min="1" max="5" step="1" value="3" />
      </div>

      <button class="reset-btn" id="resetBtn">重置游戏</button>

      <div class="hints">
        <b>操作说明：</b><br/>
        WASD - 移动飞船<br/>
        空格 - 发射激光<br/>
        击碎陨石收集水晶<br/>
        躲避或击毁敌船
      </div>
    </div>

    <div class="canvas-wrapper">
      <canvas id="gameCanvas" width="800" height="600"></canvas>
    </div>
  </div>

  <script type="module" src="/src/main.ts"></script>
</body>
</html>
