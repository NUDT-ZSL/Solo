<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>3D 粒子混沌运动模拟器</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: linear-gradient(135deg, #0B0B2A 0%, #1A1A3E 100%);
      font-family: 'Segoe UI', 'Microsoft YaHei', sans-serif;
    }
    #app {
      width: 100%;
      height: 100%;
      position: relative;
    }
    canvas {
      display: block;
      width: 100%;
      height: 100%;
    }
    .hud-top-right {
      position: absolute;
      top: 20px;
      right: 20px;
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid #4A4A6A;
      border-radius: 8px;
      padding: 12px 16px;
      color: #E0E0FF;
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      font-size: 13px;
      min-width: 160px;
      line-height: 1.8;
    }
    .hud-top-right .label {
      opacity: 0.7;
      display: inline-block;
      width: 60px;
    }
    .hud-top-right .value {
      font-weight: 600;
      color: #FFFFFF;
    }
    .control-panel {
      position: absolute;
      left: 20px;
      bottom: 20px;
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid #4A4A6A;
      border-radius: 8px;
      padding: 18px 20px;
      color: #E0E0FF;
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      width: 280px;
      font-size: 13px;
    }
    .control-panel h3 {
      font-size: 14px;
      margin-bottom: 14px;
      color: #FFFFFF;
      letter-spacing: 1px;
      border-bottom: 1px solid rgba(74, 74, 106, 0.5);
      padding-bottom: 8px;
    }
    .slider-group {
      margin-bottom: 12px;
    }
    .slider-group label {
      display: flex;
      justify-content: space-between;
      margin-bottom: 5px;
      font-size: 12px;
    }
    .slider-group label .value-display {
      color: #FFFFFF;
      font-weight: 600;
    }
    input[type="range"] {
      width: 100%;
      height: 4px;
      -webkit-appearance: none;
      appearance: none;
      background: linear-gradient(90deg, #4A4A6A, #6A6A9A);
      border-radius: 2px;
      outline: none;
      cursor: pointer;
      transition: filter 0.2s ease;
    }
    input[type="range"]:hover {
      filter: brightness(1.2);
    }
    input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none;
      appearance: none;
      width: 14px;
      height: 14px;
      background: #E0E0FF;
      border-radius: 50%;
      cursor: pointer;
      box-shadow: 0 0 6px rgba(224, 224, 255, 0.4);
      transition: box-shadow 0.2s ease;
    }
    input[type="range"]::-webkit-slider-thumb:hover {
      box-shadow: 0 0 10px rgba(224, 224, 255, 0.7);
    }
    .button-group {
      display: flex;
      gap: 8px;
      margin-top: 14px;
      margin-bottom: 8px;
    }
    .btn {
      flex: 1;
      padding: 8px 10px;
      background: rgba(74, 74, 106, 0.4);
      border: 1px solid #4A4A6A;
      border-radius: 6px;
      color: #E0E0FF;
      font-size: 12px;
      cursor: pointer;
      transition: all 0.2s ease;
      font-family: inherit;
    }
    .btn:hover {
      background: rgba(106, 106, 154, 0.5);
      filter: brightness(1.2);
    }
    .btn.active {
      background: rgba(255, 200, 100, 0.2);
      border-color: #FFC864;
      color: #FFC864;
    }
    .view-buttons {
      display: flex;
      gap: 8px;
      margin-top: 8px;
    }
    .attractor-label {
      position: absolute;
      color: #FFD700;
      font-size: 11px;
      font-weight: 600;
      text-shadow: 0 0 4px rgba(255, 215, 0, 0.6);
      pointer-events: none;
      white-space: nowrap;
      transform: translate(-50%, -150%);
    }
    .instructions {
      position: absolute;
      top: 20px;
      left: 20px;
      color: #E0E0FF;
      font-size: 11px;
      opacity: 0.5;
      line-height: 1.6;
    }
  </style>
</head>
<body>
  <div id="app">
    <div class="instructions">
      鼠标拖拽：旋转视角 | 滚轮：缩放 | WASD：平移 | 拖拽金色吸引子：调整位置
    </div>
    <div class="hud-top-right">
      <div><span class="label">FPS:</span><span class="value" id="fpsDisplay">60</span></div>
      <div><span class="label">动能:</span><span class="value" id="energyDisplay">0</span></div>
    </div>
    <div class="control-panel">
      <h3>控制面板</h3>
      <div class="slider-group">
        <label>重力常数 G <span class="value-display" id="gValue">1.0</span></label>
        <input type="range" id="gSlider" min="0.1" max="5.0" step="0.1" value="1.0" />
      </div>
      <div class="slider-group">
        <label>引力衰减指数 <span class="value-display" id="expValue">2.0</span></label>
        <input type="range" id="expSlider" min="1" max="3" step="0.1" value="2.0" />
      </div>
      <div class="slider-group">
        <label>碰撞弹性系数 <span class="value-display" id="elasticValue">0.8</span></label>
        <input type="range" id="elasticSlider" min="0" max="1" step="0.1" value="0.8" />
      </div>
      <div class="slider-group">
        <label>粒子半径 <span class="value-display" id="radiusValue">0.15</span></label>
        <input type="range" id="radiusSlider" min="0.05" max="0.3" step="0.01" value="0.15" />
      </div>
      <div class="button-group">
        <button class="btn" id="resetBtn">重置粒子</button>
        <button class="btn active" id="pauseBtn">暂停 / 继续</button>
      </div>
      <div class="view-buttons">
        <button class="btn" id="topView">俯视视角</button>
        <button class="btn" id="sideView">侧视视角</button>
      </div>
    </div>
    <div class="attractor-label" id="attractor1Label"></div>
    <div class="attractor-label" id="attractor2Label"></div>
  </div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
