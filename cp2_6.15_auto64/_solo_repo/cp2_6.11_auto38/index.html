<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>拓印迷宫 - Rune Maze</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      font-family: 'Songti SC', 'SimSun', serif;
    }

    body {
      background: linear-gradient(135deg, #1A233A 0%, #0F1A1A 100%);
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .loading-screen {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: linear-gradient(135deg, #101B2B 0%, #0A0A0A 100%);
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      z-index: 1000;
      transition: opacity 0.8s ease;
    }

    .loading-screen.hidden {
      opacity: 0;
      pointer-events: none;
    }

    .loading-spinner {
      width: 60px;
      height: 60px;
      border: 3px solid rgba(184, 134, 11, 0.2);
      border-top-color: #B8860B;
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }

    .loading-text {
      margin-top: 20px;
      color: #B8860B;
      font-size: 18px;
      letter-spacing: 4px;
      animation: pulse 1.5s ease-in-out infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    @keyframes pulse {
      0%, 100% { opacity: 0.6; }
      50% { opacity: 1; }
    }

    .game-container {
      position: relative;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
    }

    .game-title {
      color: #B8860B;
      font-size: 24px;
      letter-spacing: 8px;
      text-shadow: 0 0 20px rgba(184, 134, 11, 0.5);
    }

    #gameCanvas {
      border: 1px solid #B8860B;
      border-radius: 6px;
      box-shadow: 0 0 30px rgba(184, 134, 11, 0.2);
      position: relative;
    }

    .canvas-frame {
      position: relative;
      padding: 20px;
      background: linear-gradient(135deg, #101B2B 0%, #0A0A0A 100%);
      border-radius: 6px;
    }

    .corner-decoration {
      position: absolute;
      width: 30px;
      height: 30px;
      font-size: 20px;
      color: rgba(184, 134, 11, 0.4);
      font-family: 'KaiTi', serif;
    }

    .corner-tl { top: 5px; left: 5px; }
    .corner-tr { top: 5px; right: 5px; transform: scaleX(-1); }
    .corner-bl { bottom: 5px; left: 5px; transform: scaleY(-1); }
    .corner-br { bottom: 5px; right: 5px; transform: scale(-1, -1); }
  </style>
</head>
<body>
  <div class="loading-screen" id="loadingScreen">
    <div class="loading-spinner"></div>
    <div class="loading-text">加载古籍中...</div>
  </div>

  <div class="game-container">
    <h1 class="game-title">拓 印 迷 宫</h1>
    <div class="canvas-frame">
      <span class="corner-decoration corner-tl">卍</span>
      <span class="corner-decoration corner-tr">卍</span>
      <span class="corner-decoration corner-bl">卍</span>
      <span class="corner-decoration corner-br">卍</span>
      <canvas id="gameCanvas" width="900" height="600"></canvas>
    </div>
  </div>

  <script type="module" src="/src/GameEngine.ts"></script>
</body>
</html>
