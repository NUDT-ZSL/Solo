<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>星辰烘焙坊 - Stardust Bakery</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      font-family: 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
      background: radial-gradient(ellipse at center, #1A0530 0%, #0B0B2A 100%);
      color: #ffffff;
    }

    #app {
      position: relative;
      width: 100%;
      height: 100%;
    }

    #main-canvas {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 1;
    }

    #ui-layer {
      position: relative;
      z-index: 10;
      width: 100%;
      height: 100%;
      pointer-events: none;
    }

    .glass {
      background: rgba(255, 255, 255, 0.08);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid rgba(255, 255, 255, 0.15);
      border-radius: 20px;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
    }

    .title {
      position: absolute;
      top: 30px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 36px;
      font-weight: 300;
      letter-spacing: 8px;
      text-align: center;
      background: linear-gradient(135deg, #FFD700, #FF69B4, #87CEEB);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      text-shadow: 0 0 40px rgba(255, 215, 0, 0.3);
      pointer-events: none;
    }

    .subtitle {
      position: absolute;
      top: 80px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 14px;
      letter-spacing: 4px;
      color: rgba(255, 255, 255, 0.5);
      pointer-events: none;
    }

    #ingredients-panel {
      position: absolute;
      left: 30px;
      top: 50%;
      transform: translateY(-50%);
      width: 140px;
      padding: 20px 15px;
      pointer-events: auto;
    }

    .ingredient-item {
      position: relative;
      width: 100%;
      height: 100px;
      margin-bottom: 15px;
      border-radius: 16px;
      cursor: grab;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      transition: all 0.2s ease;
      overflow: hidden;
      user-select: none;
    }

    .ingredient-item:last-child {
      margin-bottom: 0;
    }

    .ingredient-item:hover {
      transform: scale(1.05);
      box-shadow: 0 0 20px currentColor;
    }

    .ingredient-item:active {
      cursor: grabbing;
    }

    .ingredient-item.dragging {
      opacity: 0.5;
      transform: scale(0.95);
    }

    .ingredient-particle-canvas {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 1;
    }

    .ingredient-icon {
      font-size: 36px;
      z-index: 2;
      position: relative;
    }

    .ingredient-name {
      font-size: 12px;
      margin-top: 6px;
      z-index: 2;
      position: relative;
      color: rgba(255, 255, 255, 0.9);
      text-shadow: 0 0 10px currentColor;
    }

    #mixing-area {
      position: absolute;
      left: 50%;
      top: 50%;
      transform: translate(-50%, -50%);
      width: 360px;
      height: 360px;
      pointer-events: auto;
    }

    #mixing-bowl {
      position: absolute;
      width: 100%;
      height: 100%;
      border-radius: 50%;
      background: radial-gradient(ellipse at 30% 30%, rgba(100, 80, 150, 0.4), rgba(30, 20, 60, 0.8));
      border: 3px solid rgba(255, 255, 255, 0.2);
      box-shadow: 
        inset 0 -20px 60px rgba(0, 0, 0, 0.5),
        0 0 60px rgba(138, 43, 226, 0.3);
      cursor: copy;
      transition: all 0.3s ease;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    #mixing-bowl.drag-over {
      background: radial-gradient(ellipse at 30% 30%, rgba(150, 100, 200, 0.5), rgba(50, 30, 100, 0.9));
      box-shadow: 
        inset 0 -20px 60px rgba(0, 0, 0, 0.5),
        0 0 100px rgba(138, 43, 226, 0.6);
      transform: scale(1.02);
    }

    #bowl-particles {
      position: absolute;
      width: 100%;
      height: 100%;
      border-radius: 50%;
      overflow: hidden;
    }

    #ratio-canvas {
      position: absolute;
      bottom: -30px;
      left: 50%;
      transform: translateX(-50%);
      width: 80px;
      height: 80px;
      border-radius: 50%;
      background: rgba(0, 0, 0, 0.5);
    }

    #preview-panel {
      position: absolute;
      right: 30px;
      top: 50%;
      transform: translateY(-50%);
      width: 220px;
      padding: 20px;
      pointer-events: auto;
    }

    #preview-title {
      font-size: 14px;
      color: rgba(255, 255, 255, 0.7);
      margin-bottom: 12px;
      letter-spacing: 2px;
    }

    #preview-canvas-container {
      width: 100%;
      height: 180px;
      border-radius: 12px;
      overflow: hidden;
      background: rgba(0, 0, 0, 0.3);
      margin-bottom: 15px;
    }

    #preview-canvas {
      width: 100%;
      height: 100%;
    }

    .property-bar {
      margin-bottom: 10px;
    }

    .property-label {
      display: flex;
      justify-content: space-between;
      font-size: 12px;
      color: rgba(255, 255, 255, 0.6);
      margin-bottom: 4px;
    }

    .property-track {
      height: 6px;
      background: rgba(255, 255, 255, 0.1);
      border-radius: 3px;
      overflow: hidden;
    }

    .property-fill {
      height: 100%;
      border-radius: 3px;
      transition: width 0.3s ease, background 0.3s ease;
    }

    #bake-button {
      position: absolute;
      bottom: 40px;
      left: 50%;
      transform: translateX(-50%);
      padding: 16px 48px;
      font-size: 18px;
      letter-spacing: 4px;
      color: #fff;
      background: linear-gradient(135deg, #8A2BE2, #4B0082);
      border: none;
      border-radius: 30px;
      cursor: pointer;
      pointer-events: auto;
      transition: all 0.2s ease;
      box-shadow: 0 4px 20px rgba(138, 43, 226, 0.4);
    }

    #bake-button:hover:not(:disabled) {
      transform: translateX(-50%) scale(1.05);
      box-shadow: 0 0 30px rgba(138, 43, 226, 0.8);
    }

    #bake-button:disabled {
      opacity: 0.4;
      cursor: not-allowed;
    }

    #reset-button {
      position: absolute;
      bottom: 40px;
      left: 30px;
      padding: 10px 24px;
      font-size: 14px;
      color: rgba(255, 255, 255, 0.7);
      background: rgba(255, 255, 255, 0.1);
      border: 1px solid rgba(255, 255, 255, 0.2);
      border-radius: 20px;
      cursor: pointer;
      pointer-events: auto;
      transition: all 0.2s ease;
    }

    #reset-button:hover {
      background: rgba(255, 255, 255, 0.2);
      color: #fff;
    }

    #oven-view {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: radial-gradient(ellipse at center, #1a0a1a 0%, #0a0515 100%);
      z-index: 20;
      display: none;
    }

    #oven-canvas {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
    }

    #oven-door {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: linear-gradient(180deg, #2a1a2a 0%, #1a0a1a 100%);
      border: 4px solid rgba(255, 100, 50, 0.3);
      display: flex;
      align-items: center;
      justify-content: center;
      transition: transform 0.8s ease;
      transform-origin: top center;
    }

    #oven-door.open {
      transform: rotateX(-120deg);
    }

    #oven-window {
      width: 200px;
      height: 150px;
      background: radial-gradient(ellipse at center, rgba(255, 150, 50, 0.3), rgba(255, 50, 0, 0.1));
      border: 3px solid rgba(255, 100, 50, 0.5);
      border-radius: 12px;
      box-shadow: 
        inset 0 0 30px rgba(255, 100, 50, 0.3),
        0 0 50px rgba(255, 100, 50, 0.2);
    }

    #baking-status {
      position: absolute;
      bottom: 50px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 24px;
      letter-spacing: 6px;
      color: #FFD700;
      text-shadow: 0 0 20px rgba(255, 215, 0, 0.5);
    }

    #temperature-bar {
      position: absolute;
      bottom: 100px;
      left: 50%;
      transform: translateX(-50%);
      width: 300px;
      height: 8px;
      background: rgba(0, 0, 0, 0.5);
      border-radius: 4px;
      overflow: hidden;
    }

    #temperature-fill {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, #FFD700, #FF6347, #FF0000);
      border-radius: 4px;
      transition: width 0.1s linear;
    }

    #decorate-panel {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(10, 5, 20, 0.6);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      z-index: 30;
      display: none;
      pointer-events: auto;
    }

    #decorate-title {
      position: absolute;
      top: 30px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 28px;
      letter-spacing: 8px;
      background: linear-gradient(135deg, #FFD700, #FF69B4);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    #decorate-hint {
      position: absolute;
      top: 80px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 14px;
      color: rgba(255, 255, 255, 0.5);
      letter-spacing: 2px;
    }

    #decorate-canvas {
      position: absolute;
      top: 120px;
      left: 50%;
      transform: translateX(-50%);
      width: 500px;
      height: 400px;
      border-radius: 16px;
      background: rgba(0, 0, 0, 0.3);
    }

    #decoration-library {
      position: absolute;
      left: 30px;
      top: 50%;
      transform: translateY(-50%);
      width: 160px;
      padding: 20px 15px;
    }

    .decoration-item {
      width: 100%;
      height: 80px;
      margin-bottom: 12px;
      border-radius: 12px;
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.1);
      cursor: pointer;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      transition: all 0.2s ease;
    }

    .decoration-item:last-child {
      margin-bottom: 0;
    }

    .decoration-item:hover,
    .decoration-item.active {
      background: rgba(255, 255, 255, 0.15);
      transform: scale(1.05);
      box-shadow: 0 0 20px rgba(255, 255, 255, 0.2);
    }

    .decoration-icon {
      font-size: 28px;
    }

    .decoration-name {
      font-size: 11px;
      margin-top: 4px;
      color: rgba(255, 255, 255, 0.7);
    }

    .color-picker {
      display: flex;
      gap: 8px;
      margin-top: 8px;
      justify-content: center;
    }

    .color-option {
      width: 20px;
      height: 20px;
      border-radius: 50%;
      cursor: pointer;
      border: 2px solid transparent;
      transition: all 0.2s ease;
    }

    .color-option:hover,
    .color-option.active {
      transform: scale(1.2);
      border-color: #fff;
      box-shadow: 0 0 10px currentColor;
    }

    #share-button {
      position: absolute;
      bottom: 40px;
      left: 50%;
      transform: translateX(-50%);
      padding: 14px 40px;
      font-size: 16px;
      letter-spacing: 4px;
      color: #fff;
      background: linear-gradient(135deg, #FF69B4, #FFD700);
      border: none;
      border-radius: 30px;
      cursor: pointer;
      transition: all 0.2s ease;
      box-shadow: 0 4px 20px rgba(255, 105, 180, 0.4);
    }

    #share-button:hover {
      transform: translateX(-50%) scale(1.05);
      box-shadow: 0 0 30px rgba(255, 105, 180, 0.8);
    }

    #back-button {
      position: absolute;
      bottom: 40px;
      left: 30px;
      padding: 10px 24px;
      font-size: 14px;
      color: rgba(255, 255, 255, 0.7);
      background: rgba(255, 255, 255, 0.1);
      border: 1px solid rgba(255, 255, 255, 0.2);
      border-radius: 20px;
      cursor: pointer;
      transition: all 0.2s ease;
    }

    #back-button:hover {
      background: rgba(255, 255, 255, 0.2);
      color: #fff;
    }

    #card-modal {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(5, 2, 15, 0.9);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 40;
      pointer-events: auto;
    }

    #dessert-card {
      width: 420px;
      padding: 30px;
      background: linear-gradient(135deg, rgba(138, 43, 226, 0.2), rgba(255, 105, 180, 0.1));
      border: 2px solid rgba(255, 255, 255, 0.2);
      border-radius: 24px;
      text-align: center;
      box-shadow: 
        0 0 60px rgba(138, 43, 226, 0.3),
        0 0 120px rgba(255, 105, 180, 0.2);
      animation: cardAppear 0.6s ease-out;
    }

    @keyframes cardAppear {
      from {
        opacity: 0;
        transform: scale(0.8) translateY(30px);
      }
      to {
        opacity: 1;
        transform: scale(1) translateY(0);
      }
    }

    #card-title {
      font-size: 28px;
      letter-spacing: 6px;
      background: linear-gradient(135deg, #FFD700, #FF69B4, #87CEEB);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 20px;
    }

    #card-image {
      width: 280px;
      height: 200px;
      margin: 0 auto 20px;
      border-radius: 12px;
      overflow: hidden;
      background: rgba(0, 0, 0, 0.4);
    }

    #card-image img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .card-properties {
      display: flex;
      justify-content: space-around;
      margin-bottom: 20px;
    }

    .card-property {
      text-align: center;
    }

    .property-stars {
      font-size: 20px;
      color: #FFD700;
      text-shadow: 0 0 10px rgba(255, 215, 0, 0.5);
      letter-spacing: 2px;
    }

    .property-name {
      font-size: 12px;
      color: rgba(255, 255, 255, 0.6);
      margin-top: 4px;
      letter-spacing: 2px;
    }

    #card-description {
      font-size: 14px;
      line-height: 1.8;
      color: rgba(255, 255, 255, 0.8);
      margin-bottom: 20px;
      letter-spacing: 1px;
    }

    #share-link-container {
      display: flex;
      gap: 10px;
      margin-bottom: 20px;
    }

    #share-link {
      flex: 1;
      padding: 10px 14px;
      background: rgba(255, 255, 255, 0.1);
      border: 1px solid rgba(255, 255, 255, 0.2);
      border-radius: 8px;
      font-size: 12px;
      color: rgba(255, 255, 255, 0.7);
      font-family: monospace;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    #copy-link-button {
      padding: 10px 20px;
      background: linear-gradient(135deg, #8A2BE2, #4B0082);
      border: none;
      border-radius: 8px;
      color: #fff;
      font-size: 12px;
      cursor: pointer;
      transition: all 0.2s ease;
    }

    #copy-link-button:hover {
      transform: scale(1.05);
      box-shadow: 0 0 15px rgba(138, 43, 226, 0.6);
    }

    #card-actions {
      display: flex;
      gap: 12px;
      justify-content: center;
    }

    .card-button {
      padding: 12px 30px;
      font-size: 14px;
      border: none;
      border-radius: 25px;
      cursor: pointer;
      transition: all 0.2s ease;
      letter-spacing: 2px;
    }

    .card-button.primary {
      background: linear-gradient(135deg, #FF69B4, #FFD700);
      color: #fff;
      box-shadow: 0 4px 15px rgba(255, 105, 180, 0.4);
    }

    .card-button.secondary {
      background: rgba(255, 255, 255, 0.1);
      color: rgba(255, 255, 255, 0.8);
      border: 1px solid rgba(255, 255, 255, 0.2);
    }

    .card-button:hover {
      transform: scale(1.05);
    }

    .card-button.primary:hover {
      box-shadow: 0 0 25px rgba(255, 105, 180, 0.7);
    }

    .card-button.secondary:hover {
      background: rgba(255, 255, 255, 0.2);
    }

    #star-particles {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 5;
    }

    @media (max-width: 1280px) {
      #ingredients-panel {
        width: 120px;
        left: 20px;
      }
      
      .ingredient-item {
        height: 85px;
      }
      
      #mixing-area {
        width: 300px;
        height: 300px;
      }
      
      #preview-panel {
        width: 180px;
        right: 20px;
      }
      
      #decorate-canvas {
        width: 400px;
        height: 320px;
      }
      
      #decoration-library {
        width: 140px;
        left: 20px;
      }
    }

    @media (max-width: 1024px) {
      .title {
        font-size: 28px;
      }
      
      #ingredients-panel {
        width: 100px;
        padding: 15px 10px;
      }
      
      .ingredient-item {
        height: 70px;
        margin-bottom: 10px;
      }
      
      .ingredient-icon {
        font-size: 28px;
      }
      
      .ingredient-name {
        font-size: 10px;
      }
      
      #mixing-area {
        width: 240px;
        height: 240px;
      }
      
      #preview-panel {
        width: 150px;
        padding: 15px;
      }
      
      #preview-canvas-container {
        height: 140px;
      }
      
      #dessert-card {
        width: 340px;
        padding: 20px;
      }
      
      #card-title {
        font-size: 22px;
      }
      
      #card-image {
        width: 220px;
        height: 160px;
      }
      
      #decorate-canvas {
        width: 320px;
        height: 260px;
      }
      
      #decoration-library {
        width: 120px;
        padding: 15px 10px;
      }
      
      .decoration-item {
        height: 65px;
      }
    }
  </style>
</head>
<body>
  <div id="app">
    <canvas id="main-canvas"></canvas>
    <canvas id="star-particles"></canvas>
    
    <div id="ui-layer">
      <h1 class="title">星辰烘焙坊</h1>
      <p class="subtitle">STARDUST BAKERY</p>
      
      <div id="ingredients-panel" class="glass">
        <div class="ingredient-item" draggable="true" data-ingredient="glowing_berry" style="color: #FF6B6B;">
          <canvas class="ingredient-particle-canvas"></canvas>
          <span class="ingredient-icon">🍓</span>
          <span class="ingredient-name">发光莓果</span>
        </div>
        <div class="ingredient-item" draggable="true" data-ingredient="stardust_flour" style="color: #E8E8E8;">
          <canvas class="ingredient-particle-canvas"></canvas>
          <span class="ingredient-icon">✨</span>
          <span class="ingredient-name">星屑面粉</span>
        </div>
        <div class="ingredient-item" draggable="true" data-ingredient="moonlight_cream" style="color: #C0C0FF;">
          <canvas class="ingredient-particle-canvas"></canvas>
          <span class="ingredient-icon">🌙</span>
          <span class="ingredient-name">月光奶油</span>
        </div>
        <div class="ingredient-item" draggable="true" data-ingredient="comet_frosting" style="color: #9B59B6;">
          <canvas class="ingredient-particle-canvas"></canvas>
          <span class="ingredient-icon">☄️</span>
          <span class="ingredient-name">彗星糖霜</span>
        </div>
      </div>
      
      <div id="mixing-area">
        <div id="mixing-bowl">
          <canvas id="bowl-particles"></canvas>
        </div>
        <canvas id="ratio-canvas"></canvas>
      </div>
      
      <div id="preview-panel" class="glass">
        <div id="preview-title">✨ 甜点预览</div>
        <div id="preview-canvas-container">
          <canvas id="preview-canvas"></canvas>
        </div>
        <div class="property-bar">
          <div class="property-label">
            <span>🍬 甜度</span>
            <span id="sweetness-value">0</span>
          </div>
          <div class="property-track">
            <div id="sweetness-fill" class="property-fill" style="width: 0%; background: linear-gradient(90deg, #FF6B6B, #FF8E8E);"></div>
          </div>
        </div>
        <div class="property-bar">
          <div class="property-label">
            <span>☁️ 蓬松度</span>
            <span id="fluffiness-value">0</span>
          </div>
          <div class="property-track">
            <div id="fluffiness-fill" class="property-fill" style="width: 0%; background: linear-gradient(90deg, #87CEEB, #B0E0E6);"></div>
          </div>
        </div>
        <div class="property-bar">
          <div class="property-label">
            <span>💫 发光强度</span>
            <span id="glow-value">0</span>
          </div>
          <div class="property-track">
            <div id="glow-fill" class="property-fill" style="width: 0%; background: linear-gradient(90deg, #FFD700, #FFA500);"></div>
          </div>
        </div>
      </div>
      
      <button id="reset-button">重新开始</button>
      <button id="bake-button" disabled>开始烘焙</button>
    </div>
    
    <div id="oven-view">
      <canvas id="oven-canvas"></canvas>
      <div id="temperature-bar">
        <div id="temperature-fill"></div>
      </div>
      <div id="baking-status">预热中...</div>
      <div id="oven-door">
        <div id="oven-window"></div>
      </div>
    </div>
    
    <div id="decorate-panel">
      <h2 id="decorate-title">装饰你的甜点</h2>
      <p id="decorate-hint">拖拽旋转视角 · 点击甜点添加装饰</p>
      <canvas id="decorate-canvas"></canvas>
      
      <div id="decoration-library" class="glass">
        <div class="decoration-item active" data-decoration="star_sprinkle">
          <span class="decoration-icon">⭐</span>
          <span class="decoration-name">星星糖针</span>
          <div class="color-picker">
            <div class="color-option active" data-color="#FFD700" style="background: #FFD700; color: #FFD700;"></div>
            <div class="color-option" data-color="#FF69B4" style="background: #FF69B4; color: #FF69B4;"></div>
            <div class="color-option" data-color="#87CEEB" style="background: #87CEEB; color: #87CEEB;"></div>
          </div>
        </div>
        <div class="decoration-item" data-decoration="rainbow_sauce">
          <span class="decoration-icon">🌈</span>
          <span class="decoration-name">彩虹酱</span>
        </div>
      </div>
      
      <button id="back-button">返回</button>
      <button id="share-button">生成分享卡片</button>
    </div>
    
    <div id="card-modal">
      <div id="dessert-card" class="glass">
        <h2 id="card-title">✨ 魔法甜点 ✨</h2>
        <div id="card-image">
          <img id="card-screenshot" alt="甜点截图" />
        </div>
        <div class="card-properties">
          <div class="card-property">
            <div class="property-stars" id="card-sweetness">☆☆☆☆☆</div>
            <div class="property-name">甜度</div>
          </div>
          <div class="card-property">
            <div class="property-stars" id="card-fluffiness">☆☆☆☆☆</div>
            <div class="property-name">蓬松度</div>
          </div>
          <div class="card-property">
            <div class="property-stars" id="card-glow">☆☆☆☆☆</div>
            <div class="property-name">发光</div>
          </div>
        </div>
        <p id="card-description"></p>
        <div id="share-link-container">
          <div id="share-link"></div>
          <button id="copy-link-button">复制</button>
        </div>
        <div id="card-actions">
          <button class="card-button secondary" id="restart-button">重新制作</button>
          <button class="card-button primary" id="download-button">保存图片</button>
        </div>
      </div>
    </div>
  </div>
  
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
