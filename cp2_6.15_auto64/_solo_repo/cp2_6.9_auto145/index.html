<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DNA序列可视化图谱</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #1A1A2E;
      color: #fff;
    }

    #app {
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
    }

    .navbar {
      height: 56px;
      background: linear-gradient(90deg, #16213E 0%, #0F3460 100%);
      display: flex;
      align-items: center;
      padding: 0 24px;
      flex-shrink: 0;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.3);
    }

    .navbar h1 {
      font-size: 18px;
      font-weight: 600;
      color: #fff;
    }

    .main-container {
      flex: 1;
      display: flex;
      overflow: hidden;
      position: relative;
    }

    .canvas-wrapper {
      flex: 1;
      position: relative;
      overflow: hidden;
      transition: flex 0.3s ease-in-out;
    }

    #canvas {
      width: 100%;
      height: 100%;
      display: block;
    }

    .toggle-btn {
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      width: 24px;
      height: 48px;
      background: #16213E;
      border: none;
      color: #fff;
      cursor: pointer;
      z-index: 10;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
      border-radius: 4px 0 0 4px;
      right: 0;
      transition: right 0.3s ease-in-out, background 0.2s;
    }

    .toggle-btn:hover {
      background: #0F3460;
    }

    .toggle-btn.collapsed {
      right: 0;
      border-radius: 4px 0 0 4px;
    }

    .panel {
      width: 30%;
      min-width: 320px;
      max-width: 420px;
      background: #16213E;
      border-left: 1px solid #2C2C3E;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      transition: width 0.3s ease-in-out, min-width 0.3s ease-in-out, opacity 0.3s ease-in-out;
    }

    .panel.collapsed {
      width: 0;
      min-width: 0;
      opacity: 0;
      border-left: none;
    }

    .panel-section {
      padding: 20px;
      border-bottom: 1px solid #2C2C3E;
    }

    .panel-section:last-child {
      border-bottom: none;
    }

    .section-title {
      font-size: 14px;
      font-weight: 600;
      color: #E94560;
      margin-bottom: 16px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .action-buttons {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .action-btn {
      padding: 12px 16px;
      background: #E94560;
      color: #fff;
      border: none;
      border-radius: 6px;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.2s, transform 0.1s;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .action-btn:hover {
      background: #C0392B;
    }

    .action-btn:active {
      transform: scale(0.98);
    }

    .action-btn .shortcut {
      background: rgba(0, 0, 0, 0.25);
      padding: 2px 8px;
      border-radius: 4px;
      font-size: 12px;
    }

    .rotate-btn {
      padding: 12px 16px;
      background: #E94560;
      color: #fff;
      border: none;
      border-radius: 6px;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.2s, transform 0.1s;
      width: 100%;
    }

    .rotate-btn:hover {
      background: #C0392B;
    }

    .rotate-btn:active {
      transform: scale(0.98);
    }

    .alignment-result {
      background: #1A1A2E;
      border-radius: 6px;
      padding: 16px;
      max-height: 300px;
      overflow-y: auto;
      font-family: 'Consolas', 'Monaco', monospace;
      font-size: 12px;
      line-height: 1.8;
    }

    .alignment-result::-webkit-scrollbar {
      width: 6px;
    }

    .alignment-result::-webkit-scrollbar-track {
      background: #1A1A2E;
    }

    .alignment-result::-webkit-scrollbar-thumb {
      background: #2C2C3E;
      border-radius: 3px;
    }

    .alignment-row {
      display: flex;
      flex-wrap: wrap;
      gap: 2px;
      margin-bottom: 8px;
    }

    .alignment-label {
      color: #888;
      width: 50px;
      flex-shrink: 0;
      padding: 2px 0;
    }

    .base-cell {
      width: 20px;
      height: 24px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 3px;
      font-weight: 600;
    }

    .base-match {
      background: rgba(76, 175, 80, 0.3);
      border: 1px solid #4CAF50;
      color: #81C784;
    }

    .base-mismatch {
      background: rgba(244, 67, 54, 0.3);
      border: 1px solid #F44336;
      color: #EF5350;
    }

    .base-neutral {
      background: transparent;
      color: #aaa;
    }

    .match-percentage {
      margin-top: 16px;
      padding-top: 16px;
      border-top: 1px solid #2C2C3E;
      text-align: center;
    }

    .match-percentage .value {
      font-size: 32px;
      font-weight: 700;
      color: #4CAF50;
    }

    .match-percentage .label {
      font-size: 12px;
      color: #888;
      margin-top: 4px;
    }

    .hint {
      font-size: 12px;
      color: #888;
      margin-top: 12px;
      line-height: 1.6;
    }
  </style>
</head>
<body>
  <div id="app">
    <div class="navbar">
      <h1>🧬 DNA序列可视化图谱</h1>
    </div>
    <div class="main-container">
      <div class="canvas-wrapper" id="canvasWrapper">
        <canvas id="canvas"></canvas>
        <button class="toggle-btn" id="togglePanel" title="折叠/展开面板">◀</button>
      </div>
      <div class="panel" id="panel">
        <div class="panel-section">
          <div class="section-title">突变操作</div>
          <div class="action-buttons">
            <button class="action-btn" id="btnPointMutation">
              <span>点突变</span>
              <span class="shortcut">1</span>
            </button>
            <button class="action-btn" id="btnInsertion">
              <span>插入3个碱基</span>
              <span class="shortcut">2</span>
            </button>
            <button class="action-btn" id="btnDeletion">
              <span>删除3个碱基</span>
              <span class="shortcut">3</span>
            </button>
          </div>
          <div class="hint">
            在画布上拖拽生成新序列<br>
            将鼠标悬停在碱基上后按快捷键执行突变
          </div>
        </div>
        <div class="panel-section">
          <div class="section-title">比对结果</div>
          <div class="alignment-result" id="alignmentResult">
            <div style="color: #888; text-align: center; padding: 20px;">
              拖拽画布生成序列后查看比对结果
            </div>
          </div>
          <div class="match-percentage" id="matchPercentage" style="display: none;">
            <div class="value" id="matchValue">0.0%</div>
            <div class="label">序列匹配度</div>
          </div>
        </div>
        <div class="panel-section">
          <div class="section-title">视图控制</div>
          <button class="rotate-btn" id="btnRotate">旋转视图</button>
        </div>
      </div>
    </div>
  </div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
