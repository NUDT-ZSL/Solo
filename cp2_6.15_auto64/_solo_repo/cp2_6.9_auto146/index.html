<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>古罗马浴场热水管道系统可视化</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    }

    #app {
      width: 100vw;
      height: 100vh;
      background: linear-gradient(180deg, #1a1a2e 0%, #16213e 100%);
    }

    #info-panel {
      position: fixed;
      top: 16px;
      left: 16px;
      width: 200px;
      padding: 12px;
      background: #00000099;
      border-radius: 8px;
      color: #ffffff;
      font-size: 12px;
      z-index: 100;
      pointer-events: none;
    }

    #info-panel h3 {
      font-size: 14px;
      margin-bottom: 8px;
      color: #FFD700;
      border-bottom: 1px solid #ffffff33;
      padding-bottom: 4px;
    }

    #info-panel .info-row {
      display: flex;
      justify-content: space-between;
      margin: 4px 0;
      line-height: 1.5;
    }

    #info-panel .label {
      color: #aaaaaa;
    }

    #info-panel .value {
      color: #ffffff;
      font-weight: bold;
    }

    #controls {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      gap: 12px;
      z-index: 100;
    }

    .control-btn {
      padding: 10px 20px;
      background: #333333;
      color: #ffffff;
      border: none;
      border-radius: 8px;
      font-size: 13px;
      cursor: pointer;
      transition: all 0.2s ease;
    }

    .control-btn:hover {
      background: #555555;
    }

    .control-btn:active {
      transform: scale(0.95);
    }

    .control-btn.active {
      background: #FF8C00;
    }

    #tooltip {
      position: fixed;
      padding: 6px 10px;
      background: #000000CC;
      color: #ffffff;
      font-size: 12px;
      border-radius: 4px;
      pointer-events: none;
      z-index: 200;
      display: none;
      transform: translate(-50%, -130%);
      white-space: nowrap;
    }

    #pipe-details {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      background: #000000EE;
      color: #ffffff;
      padding: 20px;
      border-radius: 12px;
      z-index: 300;
      display: none;
      min-width: 280px;
      border: 1px solid #FFD700;
    }

    #pipe-details h3 {
      color: #FFD700;
      margin-bottom: 12px;
      border-bottom: 1px solid #ffffff33;
      padding-bottom: 8px;
    }

    #pipe-details .detail-row {
      display: flex;
      justify-content: space-between;
      margin: 8px 0;
      font-size: 13px;
    }

    #pipe-details .detail-row .label {
      color: #aaaaaa;
    }

    #pipe-details .detail-row .value {
      color: #ffffff;
      font-weight: bold;
    }

    #pipe-details .close-btn {
      position: absolute;
      top: 8px;
      right: 12px;
      background: none;
      border: none;
      color: #ffffff;
      font-size: 18px;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <div id="app"></div>
  
  <div id="info-panel">
    <h3>浴场状态</h3>
    <div class="info-row">
      <span class="label">温度:</span>
      <span class="value" id="temp-value">-- ℃</span>
    </div>
    <div class="info-row">
      <span class="label">管道状态:</span>
      <span class="value" id="pipe-status">正常</span>
    </div>
    <div class="info-row">
      <span class="label">水流状态:</span>
      <span class="value" id="flow-status">运行中</span>
    </div>
    <div class="info-row">
      <span class="label">悬停对象:</span>
      <span class="value" id="hover-object">无</span>
    </div>
  </div>

  <div id="controls">
    <button class="control-btn active" id="btn-flow">流动动画</button>
    <button class="control-btn" id="btn-color">温度染色</button>
    <button class="control-btn active" id="btn-thermal">热力层</button>
    <button class="control-btn" id="btn-reset">重置视角</button>
  </div>

  <div id="tooltip"></div>

  <div id="pipe-details">
    <button class="close-btn" id="close-details">&times;</button>
    <h3>管道详细信息</h3>
    <div class="detail-row">
      <span class="label">管道长度:</span>
      <span class="value" id="detail-length">-- m</span>
    </div>
    <div class="detail-row">
      <span class="label">管道直径:</span>
      <span class="value" id="detail-diameter">-- m</span>
    </div>
    <div class="detail-row">
      <span class="label">材质:</span>
      <span class="value" id="detail-material">--</span>
    </div>
    <div class="detail-row">
      <span class="label">温度区间:</span>
      <span class="value" id="detail-temp">-- ℃</span>
    </div>
  </div>

  <script type="module" src="/src/main.ts"></script>
</body>
</html>
