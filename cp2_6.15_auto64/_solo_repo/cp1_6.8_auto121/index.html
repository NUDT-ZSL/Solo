<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>星尘交响曲</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      html, body {
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: #000;
        font-family: 'Rajdhani', sans-serif;
        color: #fff;
      }

      canvas {
        display: block;
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
      }

      .glass-panel {
        background: rgba(10, 10, 30, 0.55);
        backdrop-filter: blur(18px);
        -webkit-backdrop-filter: blur(18px);
        border: 1px solid rgba(100, 120, 255, 0.15);
        border-radius: 12px;
        box-shadow: 0 0 30px rgba(80, 100, 255, 0.08), inset 0 0 20px rgba(80, 100, 255, 0.04);
      }

      #control-panel {
        position: fixed;
        top: 24px;
        left: 24px;
        padding: 20px 24px;
        z-index: 10;
        min-width: 240px;
        user-select: none;
      }

      #control-panel h2 {
        font-family: 'Orbitron', sans-serif;
        font-size: 14px;
        font-weight: 700;
        letter-spacing: 2px;
        text-transform: uppercase;
        color: rgba(180, 200, 255, 0.9);
        margin-bottom: 18px;
        text-shadow: 0 0 12px rgba(100, 140, 255, 0.4);
      }

      .control-group {
        margin-bottom: 14px;
      }

      .control-group label {
        display: flex;
        justify-content: space-between;
        align-items: center;
        font-size: 13px;
        font-weight: 500;
        color: rgba(200, 210, 255, 0.75);
        margin-bottom: 6px;
        letter-spacing: 0.5px;
      }

      .control-group label span.val {
        font-family: 'Orbitron', sans-serif;
        font-size: 12px;
        color: rgba(150, 180, 255, 0.9);
      }

      input[type="range"] {
        -webkit-appearance: none;
        appearance: none;
        width: 100%;
        height: 4px;
        border-radius: 2px;
        background: rgba(80, 100, 200, 0.25);
        outline: none;
        cursor: pointer;
      }

      input[type="range"]::-webkit-slider-thumb {
        -webkit-appearance: none;
        appearance: none;
        width: 14px;
        height: 14px;
        border-radius: 50%;
        background: radial-gradient(circle, rgba(140, 170, 255, 1), rgba(80, 120, 255, 0.8));
        box-shadow: 0 0 10px rgba(100, 140, 255, 0.6);
        cursor: pointer;
        transition: box-shadow 0.2s;
      }

      input[type="range"]::-webkit-slider-thumb:hover {
        box-shadow: 0 0 18px rgba(120, 160, 255, 0.9);
      }

      input[type="range"]::-moz-range-thumb {
        width: 14px;
        height: 14px;
        border-radius: 50%;
        background: radial-gradient(circle, rgba(140, 170, 255, 1), rgba(80, 120, 255, 0.8));
        box-shadow: 0 0 10px rgba(100, 140, 255, 0.6);
        cursor: pointer;
        border: none;
      }

      #reset-btn {
        width: 100%;
        margin-top: 8px;
        padding: 8px 0;
        font-family: 'Orbitron', sans-serif;
        font-size: 11px;
        font-weight: 600;
        letter-spacing: 1.5px;
        text-transform: uppercase;
        color: rgba(180, 200, 255, 0.85);
        background: rgba(60, 80, 180, 0.2);
        border: 1px solid rgba(100, 130, 255, 0.25);
        border-radius: 8px;
        cursor: pointer;
        transition: all 0.25s;
      }

      #reset-btn:hover {
        background: rgba(80, 100, 220, 0.35);
        border-color: rgba(120, 150, 255, 0.45);
        box-shadow: 0 0 16px rgba(100, 140, 255, 0.25);
        color: rgba(210, 220, 255, 1);
      }

      #info-card {
        position: fixed;
        bottom: 24px;
        right: 24px;
        padding: 16px 20px;
        z-index: 10;
        min-width: 220px;
        opacity: 0;
        transform: translateY(10px);
        transition: opacity 0.4s, transform 0.4s;
        pointer-events: none;
        user-select: none;
      }

      #info-card.visible {
        opacity: 1;
        transform: translateY(0);
        pointer-events: auto;
      }

      #info-card h3 {
        font-family: 'Orbitron', sans-serif;
        font-size: 12px;
        font-weight: 700;
        letter-spacing: 1.5px;
        text-transform: uppercase;
        color: rgba(180, 200, 255, 0.85);
        margin-bottom: 12px;
        text-shadow: 0 0 10px rgba(100, 140, 255, 0.35);
      }

      .info-row {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 5px 0;
        border-bottom: 1px solid rgba(80, 100, 200, 0.1);
        font-size: 13px;
      }

      .info-row:last-child {
        border-bottom: none;
      }

      .info-row .info-label {
        color: rgba(160, 175, 220, 0.6);
        font-weight: 400;
      }

      .info-row .info-value {
        font-family: 'Orbitron', sans-serif;
        font-size: 12px;
        color: rgba(200, 215, 255, 0.9);
      }

      .color-swatch {
        display: inline-block;
        width: 12px;
        height: 12px;
        border-radius: 50%;
        margin-right: 6px;
        vertical-align: middle;
        box-shadow: 0 0 8px currentColor;
      }

      #loading-screen {
        position: fixed;
        inset: 0;
        background: #000;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        z-index: 100;
        transition: opacity 0.8s;
      }

      #loading-screen.fade-out {
        opacity: 0;
        pointer-events: none;
      }

      #loading-screen h1 {
        font-family: 'Orbitron', sans-serif;
        font-size: 28px;
        font-weight: 900;
        letter-spacing: 6px;
        color: rgba(180, 200, 255, 0.9);
        text-shadow: 0 0 40px rgba(100, 140, 255, 0.5);
        margin-bottom: 12px;
      }

      #loading-screen p {
        font-size: 14px;
        letter-spacing: 2px;
        color: rgba(140, 160, 220, 0.5);
        animation: pulse 2s ease-in-out infinite;
      }

      @keyframes pulse {
        0%, 100% { opacity: 0.4; }
        50% { opacity: 1; }
      }
    </style>
  </head>
  <body>
    <div id="loading-screen">
      <h1>STARDUST SYMPHONY</h1>
      <p>星尘交响曲 · 初始化中...</p>
    </div>

    <div id="control-panel" class="glass-panel">
      <h2>控制面板</h2>
      <div class="control-group">
        <label>旋转速度 <span class="val" id="speed-val">1.0x</span></label>
        <input type="range" id="speed-slider" min="0.1" max="3" step="0.1" value="1" />
      </div>
      <div class="control-group">
        <label>粒子密度 <span class="val" id="density-val">800</span></label>
        <input type="range" id="density-slider" min="100" max="2000" step="50" value="800" />
      </div>
      <div class="control-group">
        <label>音乐音量 <span class="val" id="volume-val">50%</span></label>
        <input type="range" id="volume-slider" min="0" max="1" step="0.05" value="0.5" />
      </div>
      <button id="reset-btn">重置视角</button>
    </div>

    <div id="info-card" class="glass-panel">
      <h3>星尘信息</h3>
      <div class="info-row">
        <span class="info-label">颜色分组</span>
        <span class="info-value" id="info-color">—</span>
      </div>
      <div class="info-row">
        <span class="info-label">粒子大小</span>
        <span class="info-value" id="info-size">—</span>
      </div>
      <div class="info-row">
        <span class="info-label">最近坍缩</span>
        <span class="info-value" id="info-collapse">—</span>
      </div>
    </div>

    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
