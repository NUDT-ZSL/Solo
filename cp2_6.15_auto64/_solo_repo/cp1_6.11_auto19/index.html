<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>弦音裂空 - String Split Rhythm</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #000011;
      font-family: 'Orbitron', sans-serif;
      touch-action: none;
      -webkit-touch-callout: none;
      -webkit-user-select: none;
      user-select: none;
    }

    #app {
      width: 100%;
      height: 100%;
      display: flex;
      justify-content: center;
      align-items: center;
      background: radial-gradient(ellipse at center, #1A0033 0%, #000011 100%);
    }

    #gameCanvas {
      display: block;
      max-width: 100vw;
      max-height: 100vh;
      aspect-ratio: 1 / 1;
      cursor: pointer;
    }

    .glow-text {
      text-shadow: 0 0 4px currentColor, 0 0 8px currentColor;
    }

    .glow-box {
      box-shadow: 0 0 4px currentColor, 0 0 8px currentColor;
    }
  </style>
</head>
<body>
  <div id="app">
    <canvas id="gameCanvas"></canvas>
  </div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
