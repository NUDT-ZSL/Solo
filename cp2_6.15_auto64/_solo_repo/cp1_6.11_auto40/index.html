<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>折纸雕塑 · Origami Photo Sculpture</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
      background: radial-gradient(ellipse at center, #1A1A2E 0%, #0F0F1F 100%);
      color: #FFFFFF;
    }

    #app {
      position: relative;
      width: 100%;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    #canvas-wrapper {
      position: relative;
      width: 80vw;
      height: 95vh;
      max-width: 1600px;
      max-height: 900px;
      border-radius: 20px;
      overflow: hidden;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
    }

    #three-canvas {
      display: block;
      width: 100%;
      height: 100%;
    }

    #ui-panel {
      position: fixed;
      left: 24px;
      top: 50%;
      transform: translateY(-50%);
      width: 240px;
      padding: 20px;
      background: rgba(255, 255, 255, 0.08);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      border-radius: 12px;
      border: 1px solid rgba(255, 255, 255, 0.12);
      z-index: 100;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    #ui-panel h2 {
      font-size: 15px;
      font-weight: 600;
      letter-spacing: 0.5px;
      margin-bottom: 4px;
      background: linear-gradient(135deg, #00B4FF, #7B68EE);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    #ui-panel .subtitle {
      font-size: 11px;
      color: #AAAAAA;
      margin-bottom: 8px;
    }

    .upload-btn {
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      width: 100%;
      padding: 12px 16px;
      font-size: 14px;
      font-weight: 600;
      color: #FFFFFF;
      background: linear-gradient(135deg, #00B4FF 0%, #007BFF 100%);
      border: none;
      border-radius: 8px;
      cursor: pointer;
      transition: all 0.3s ease;
      box-shadow: 0 0 0 rgba(0, 180, 255, 0);
    }

    .upload-btn:hover {
      filter: brightness(1.2);
      box-shadow: 0 0 20px rgba(0, 180, 255, 0.6), 0 0 8px rgba(0, 180, 255, 0.4);
      transform: translateY(-1px);
    }

    .upload-btn:active {
      transform: translateY(0);
    }

    .upload-btn input[type="file"] {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      opacity: 0;
      cursor: pointer;
    }

    .btn-row {
      display: flex;
      gap: 10px;
    }

    .toggle-btn {
      flex: 1;
      padding: 10px 12px;
      font-size: 12px;
      font-weight: 500;
      color: #FFFFFF;
      background: rgba(255, 255, 255, 0.06);
      border: 1px solid rgba(255, 255, 255, 0.12);
      border-radius: 8px;
      cursor: pointer;
      transition: all 0.25s ease;
    }

    .toggle-btn:hover {
      background: rgba(255, 255, 255, 0.12);
      border-color: rgba(0, 180, 255, 0.4);
    }

    .toggle-btn.active {
      background: linear-gradient(135deg, rgba(0, 180, 255, 0.3), rgba(0, 123, 255, 0.3));
      border-color: rgba(0, 180, 255, 0.6);
      color: #00B4FF;
    }

    .reset-btn {
      flex: 1;
      padding: 10px 12px;
      font-size: 12px;
      font-weight: 500;
      color: #FFFFFF;
      background: rgba(255, 255, 255, 0.06);
      border: 1px solid rgba(255, 255, 255, 0.12);
      border-radius: 8px;
      cursor: pointer;
      transition: all 0.25s ease;
    }

    .reset-btn:hover {
      background: rgba(255, 107, 107, 0.15);
      border-color: rgba(255, 107, 107, 0.5);
      color: #FF6B6B;
    }

    .stat-box {
      padding: 12px;
      background: rgba(0, 0, 0, 0.25);
      border-radius: 8px;
      border: 1px solid rgba(255, 255, 255, 0.06);
    }

    .stat-label {
      font-size: 10px;
      color: #AAAAAA;
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 6px;
    }

    .stat-value {
      font-size: 22px;
      font-weight: 700;
      color: #00B4FF;
    }

    .stat-unit {
      font-size: 12px;
      color: #AAAAAA;
      font-weight: 400;
      margin-left: 4px;
    }

    .hint-text {
      font-size: 10px;
      color: #666666;
      text-align: center;
      line-height: 1.6;
    }

    #info-popup {
      position: fixed;
      display: none;
      min-width: 220px;
      padding: 16px;
      background: rgba(20, 20, 35, 0.95);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border-radius: 10px;
      border: 1px solid rgba(255, 255, 255, 0.15);
      box-shadow: 0 10px 40px rgba(0, 0, 0, 0.6);
      z-index: 200;
      pointer-events: none;
    }

    #info-popup .popup-header {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 12px;
    }

    #info-popup .color-swatch {
      width: 24px;
      height: 24px;
      border-radius: 6px;
      border: 2px solid rgba(255, 255, 255, 0.2);
    }

    #info-popup .popup-title {
      font-size: 13px;
      font-weight: 600;
      color: #FFFFFF;
    }

    #info-popup .popup-thumb {
      width: 100%;
      height: 100px;
      border-radius: 6px;
      margin-bottom: 12px;
      object-fit: cover;
      border: 1px solid rgba(255, 255, 255, 0.1);
    }

    #info-popup .popup-row {
      display: flex;
      justify-content: space-between;
      font-size: 11px;
      padding: 3px 0;
      border-bottom: 1px solid rgba(255, 255, 255, 0.06);
    }

    #info-popup .popup-row:last-child {
      border-bottom: none;
    }

    #info-popup .popup-label {
      color: #888888;
    }

    #info-popup .popup-val {
      color: #00B4FF;
      font-family: 'SF Mono', Consolas, monospace;
    }

    #loading-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: radial-gradient(ellipse at center, #1A1A2E 0%, #0F0F1F 100%);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 1000;
      transition: opacity 0.6s ease;
    }

    #loading-overlay.fade-out {
      opacity: 0;
      pointer-events: none;
    }

    .loader {
      width: 60px;
      height: 60px;
      position: relative;
      margin-bottom: 24px;
    }

    .loader::before,
    .loader::after {
      content: '';
      position: absolute;
      border-radius: 50%;
      animation: loaderSpin 1.4s ease-in-out infinite;
    }

    .loader::before {
      width: 100%;
      height: 100%;
      border: 3px solid transparent;
      border-top-color: #00B4FF;
      border-right-color: #00B4FF;
    }

    .loader::after {
      width: 70%;
      height: 70%;
      top: 15%;
      left: 15%;
      border: 3px solid transparent;
      border-top-color: #7B68EE;
      animation-direction: reverse;
      animation-duration: 1.8s;
    }

    @keyframes loaderSpin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    .loading-text {
      font-size: 14px;
      color: #AAAAAA;
      letter-spacing: 2px;
    }

    .loading-text::after {
      content: '';
      animation: dots 1.5s infinite;
    }

    @keyframes dots {
      0%, 20% { content: ''; }
      40% { content: '.'; }
      60% { content: '..'; }
      80%, 100% { content: '...'; }
    }

    .btn-icon {
      display: none;
    }

    @media (max-width: 768px) {
      #canvas-wrapper {
        width: 96vw;
        height: 70vh;
        margin-top: 10px;
      }

      #ui-panel {
        position: fixed;
        left: 50%;
        top: auto;
        bottom: 16px;
        transform: translateX(-50%);
        width: 94vw;
        max-width: 480px;
        padding: 14px;
        flex-direction: row;
        flex-wrap: wrap;
        gap: 10px;
        align-items: center;
      }

      #ui-panel h2,
      #ui-panel .subtitle {
        display: none;
      }

      .upload-btn {
        flex: 1 1 100%;
        padding: 14px;
        font-size: 13px;
      }

      .btn-row {
        flex: 1;
        min-width: 0;
      }

      .toggle-btn,
      .reset-btn {
        padding: 12px 8px;
        font-size: 0;
        gap: 0;
      }

      .btn-icon {
        display: inline-block;
        width: 20px;
        height: 20px;
      }

      .stat-box {
        flex: 1;
        padding: 8px 12px;
        min-width: 100px;
      }

      .stat-value {
        font-size: 18px;
      }

      .hint-text {
        display: none;
      }
    }
  </style>
</head>
<body>
  <div id="app">
    <div id="loading-overlay">
      <div class="loader"></div>
      <div class="loading-text">正在初始化</div>
    </div>

    <div id="canvas-wrapper">
      <canvas id="three-canvas"></canvas>
    </div>

    <aside id="ui-panel">
      <h2>✦ 折纸雕塑</h2>
      <div class="subtitle">Origami Photo Sculpture</div>

      <button class="upload-btn" id="upload-btn">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
          <polyline points="17 8 12 3 7 8"/>
          <line x1="12" y1="3" x2="12" y2="15"/>
        </svg>
        <span>上传照片</span>
        <input type="file" id="file-input" accept="image/jpeg,image/png,image/jpg" />
      </button>

      <div class="btn-row">
        <button class="toggle-btn" id="auto-rotate-btn">
          <svg class="btn-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="23 4 23 10 17 10"/>
            <path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/>
          </svg>
          <span>自动旋转</span>
        </button>
        <button class="reset-btn" id="reset-btn">
          <svg class="btn-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/>
            <path d="M3 3v5h5"/>
          </svg>
          <span>重置视角</span>
        </button>
      </div>

      <div class="stat-box">
        <div class="stat-label">面片数量</div>
        <div class="stat-value"><span id="face-count">0</span><span class="stat-unit">个面片</span></div>
      </div>

      <div class="hint-text">
        拖拽旋转视角 · 滚轮缩放<br/>
        点击面片查看详情
      </div>
    </aside>

    <div id="info-popup"></div>
  </div>

  <script type="module" src="/src/main.ts"></script>
</body>
</html>
