<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>像素沙盒游戏</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background-color: #2C2C2C;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 20px;
      color: #fff;
      user-select: none;
    }

    #game-container {
      position: relative;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 16px;
    }

    #toolbar {
      position: absolute;
      top: 16px;
      left: 16px;
      display: flex;
      gap: 12px;
      padding: 12px 16px;
      background: rgba(255, 255, 255, 0.08);
      border-radius: 16px;
      backdrop-filter: blur(8px);
      border: 1px solid rgba(255, 255, 255, 0.1);
      z-index: 10;
    }

    .material-btn {
      width: 48px;
      height: 48px;
      border: 3px solid transparent;
      border-radius: 12px;
      cursor: pointer;
      transition: all 0.2s ease;
      opacity: 0.7;
    }

    .material-btn:hover {
      opacity: 0.9;
      transform: scale(1.05);
    }

    .material-btn.active {
      opacity: 1;
      border-color: #fff;
      box-shadow: 0 0 16px rgba(255, 255, 255, 0.4);
    }

    .material-btn.sand {
      background-color: #D4A574;
    }

    .material-btn.water {
      background-color: #4A90D9;
    }

    .material-btn.wood {
      background-color: #8B5E3C;
    }

    #canvas-wrapper {
      border-radius: 16px;
      overflow: hidden;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
      border: 1px solid rgba(255, 255, 255, 0.1);
    }

    #game-canvas {
      display: block;
      cursor: crosshair;
    }

    #status-bar {
      display: flex;
      gap: 24px;
      padding: 12px 24px;
      background: rgba(255, 255, 255, 0.08);
      border-radius: 16px;
      backdrop-filter: blur(8px);
      border: 1px solid rgba(255, 255, 255, 0.1);
      font-size: 14px;
      font-weight: 500;
    }

    .status-item {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .status-label {
      color: rgba(255, 255, 255, 0.6);
    }

    .status-value {
      font-variant-numeric: tabular-nums;
      min-width: 60px;
      text-align: right;
    }
  </style>
</head>
<body>
  <div id="game-container">
    <div id="toolbar">
      <button class="material-btn sand active" data-material="sand" title="沙子 (左键放置，右键擦除)"></button>
      <button class="material-btn water" data-material="water" title="水"></button>
      <button class="material-btn wood" data-material="wood" title="木头"></button>
    </div>
    <div id="canvas-wrapper">
      <canvas id="game-canvas"></canvas>
    </div>
    <div id="status-bar">
      <div class="status-item">
        <span class="status-label">粒子总数:</span>
        <span class="status-value" id="particle-count">0</span>
      </div>
      <div class="status-item">
        <span class="status-label">帧率:</span>
        <span class="status-value" id="fps">60</span>
      </div>
    </div>
  </div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
