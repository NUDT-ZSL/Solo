<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="星焰骰子 - 一款以掷骰子为核心的视觉化概率博弈游戏" />
  <meta name="theme-color" content="#1A0A2E" />
  <title>星焰骰子 | Star Flame Dice</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;700;900&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: radial-gradient(ellipse at center top, #1A0A2E 0%, #0D0519 50%, #070310 100%);
      background-color: #1A0A2E;
      font-family: 'Orbitron', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      color: #FFFFFF;
      user-select: none;
      -webkit-user-select: none;
      -webkit-tap-highlight-color: transparent;
    }
    #game-canvas {
      display: block;
      width: 100%;
      height: 100%;
      cursor: default;
      touch-action: manipulation;
    }
    body::before {
      content: '';
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: radial-gradient(circle at 20% 30%, rgba(108, 59, 158, 0.1) 0%, transparent 50%),
                  radial-gradient(circle at 80% 70%, rgba(255, 123, 36, 0.06) 0%, transparent 50%);
      pointer-events: none;
      z-index: 0;
    }
    #game-canvas {
      position: relative;
      z-index: 1;
    }
  </style>
</head>
<body>
  <canvas id="game-canvas"></canvas>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
