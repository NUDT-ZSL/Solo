<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>影迹画廊 - ShadowTrace Gallery</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      html, body, #root {
        width: 100%;
        height: 100%;
        overflow: hidden;
        font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      }
      body {
        background: linear-gradient(135deg, #0A0A0A 0%, #1F1F1F 100%);
        color: #ffffff;
      }
      .ws-status {
        position: fixed;
        top: 12px;
        right: 12px;
        z-index: 1000;
        display: flex;
        align-items: center;
        gap: 8px;
        padding: 8px 14px;
        background: rgba(41, 41, 41, 0.8);
        backdrop-filter: blur(12px);
        -webkit-backdrop-filter: blur(12px);
        border-radius: 12px;
        border: 1px solid rgba(255, 255, 255, 0.1);
        font-size: 12px;
      }
      .ws-status-dot {
        width: 8px;
        height: 8px;
        border-radius: 50%;
        animation: pulse-glow 2s ease-in-out infinite;
      }
      .ws-status-dot.connected {
        background: #00FF88;
        box-shadow: 0 0 10px #00FF88;
      }
      .ws-status-dot.disconnected {
        background: #FF4444;
        box-shadow: 0 0 10px #FF4444;
      }
      .ws-status-dot.connecting {
        background: #FFB800;
        box-shadow: 0 0 10px #FFB800;
      }
      @keyframes pulse-glow {
        0%, 100% { opacity: 0.7; transform: scale(1); }
        50% { opacity: 1; transform: scale(1.3); }
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <div class="ws-status" id="ws-status">
      <div class="ws-status-dot connecting" id="ws-dot"></div>
      <span id="ws-text">连接中...</span>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
