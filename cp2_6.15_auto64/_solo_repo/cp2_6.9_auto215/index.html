<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>陨石晶体矿洞</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #111111;
    }
    #app {
      width: 100%;
      height: 100%;
    }
    #hud {
      position: fixed;
      z-index: 100;
      pointer-events: none;
    }
    #fps {
      position: fixed;
      left: 20px;
      bottom: 20px;
      background: rgba(26, 26, 46, 0.7);
      color: #00ff88;
      font-family: monospace;
      font-size: 14px;
      padding: 8px 14px;
      border-radius: 8px;
      pointer-events: none;
      z-index: 100;
    }
    #crystal-count {
      position: fixed;
      right: 20px;
      bottom: 20px;
      background: rgba(26, 26, 46, 0.7);
      color: #ffffff;
      font-family: monospace;
      font-size: 14px;
      padding: 8px 14px;
      border-radius: 8px;
      pointer-events: none;
      z-index: 100;
    }
  </style>
</head>
<body>
  <div id="app"></div>
  <div id="fps">FPS: 0</div>
  <div id="crystal-count">晶体簇: 0</div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
