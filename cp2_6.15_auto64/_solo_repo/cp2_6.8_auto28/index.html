<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pixel Animator - 像素动画编辑器</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --bg: #1e1e2e;
      --bg-secondary: #252535;
      --bg-tertiary: #303045;
      --primary: #cba6f7;
      --primary-hover: #d9b8ff;
      --text: #cdd6f4;
      --text-secondary: #a6adc8;
      --border: #45475a;
      --border-light: #585b70;
      --success: #a6e3a1;
      --warning: #f9e2af;
    }

    body {
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      background-color: var(--bg);
      color: var(--text);
      min-height: 100vh;
      overflow-x: hidden;
    }

    .app-container {
      display: flex;
      flex-direction: column;
      min-height: 100vh;
      padding: 16px;
      gap: 16px;
    }

    /* 顶部工具栏 */
    .toolbar {
      background: var(--bg-secondary);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 12px 20px;
      display: flex;
      align-items: center;
      flex-wrap: wrap;
      gap: 16px;
    }

    .toolbar-title {
      font-size: 18px;
      font-weight: 600;
      color: var(--primary);
      margin-right: auto;
    }

    .control-group {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .btn {
      background: var(--bg-tertiary);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 8px 16px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 14px;
      transition: all 0.3s ease;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
    }

    .btn:hover {
      background: rgba(203, 166, 247, 0.15);
      border-color: var(--primary);
      color: var(--primary);
    }

    .btn-primary {
      background: var(--primary);
      color: var(--bg);
      border-color: var(--primary);
      font-weight: 500;
    }

    .btn-primary:hover {
      background: var(--primary-hover);
      border-color: var(--primary-hover);
      color: var(--bg);
    }

    .btn-icon {
      padding: 8px 12px;
      font-size: 16px;
    }

    /* 速度滑块 */
    .speed-control {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .speed-label {
      font-size: 13px;
      color: var(--text-secondary);
      min-width: 42px;
    }

    input[type="range"] {
      -webkit-appearance: none;
      appearance: none;
      width: 140px;
      height: 6px;
      border-radius: 3px;
      background: linear-gradient(to right, #8964b8, #cba6f7, #e5c9ff);
      outline: none;
      cursor: pointer;
    }

    input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none;
      appearance: none;
      width: 18px;
      height: 18px;
      border-radius: 50%;
      background: var(--primary);
      border: 3px solid var(--bg);
      cursor: pointer;
      transition: transform 0.2s ease;
    }

    input[type="range"]::-webkit-slider-thumb:hover {
      transform: scale(1.15);
    }

    input[type="range"]::-moz-range-thumb {
      width: 18px;
      height: 18px;
      border-radius: 50%;
      background: var(--primary);
      border: 3px solid var(--bg);
      cursor: pointer;
    }

    /* 帧时间控制 */
    .frame-time-control {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .frame-time-input {
      background: var(--bg);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 6px 10px;
      border-radius: 6px;
      width: 70px;
      font-size: 13px;
    }

    .frame-time-input:focus {
      outline: none;
      border-color: var(--primary);
    }

    /* 开关 */
    .toggle {
      position: relative;
      width: 44px;
      height: 24px;
    }

    .toggle input {
      opacity: 0;
      width: 0;
      height: 0;
    }

    .toggle-slider {
      position: absolute;
      cursor: pointer;
      inset: 0;
      background-color: var(--bg-tertiary);
      border: 1px solid var(--border);
      transition: 0.3s;
      border-radius: 24px;
    }

    .toggle-slider:before {
      position: absolute;
      content: "";
      height: 16px;
      width: 16px;
      left: 3px;
      top: 3px;
      background-color: var(--text-secondary);
      transition: 0.3s;
      border-radius: 50%;
    }

    .toggle input:checked + .toggle-slider {
      background-color: var(--primary);
      border-color: var(--primary);
    }

    .toggle input:checked + .toggle-slider:before {
      transform: translateX(20px);
      background-color: var(--bg);
    }

    /* 主内容区 */
    .main-content {
      display: grid;
      grid-template-columns: 1fr 360px;
      gap: 16px;
      flex: 1;
      min-height: 0;
    }

    /* 左侧编辑区 */
    .editor-panel {
      background: var(--bg-secondary);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 24px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 20px;
    }

    .canvas-wrapper {
      position: relative;
      padding: 16px;
      background: var(--bg);
      border-radius: 12px;
      box-shadow: 0 4px 24px rgba(0, 0, 0, 0.3),
                  0 0 0 1px var(--border-light);
    }

    #editorCanvas {
      display: block;
      image-rendering: pixelated;
      image-rendering: crisp-edges;
      cursor: crosshair;
    }

    .editor-info {
      display: flex;
      justify-content: space-between;
      width: 100%;
      max-width: 520px;
      font-size: 13px;
      color: var(--text-secondary);
    }

    /* 右侧面板 */
    .right-panel {
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .panel-card {
      background: var(--bg-secondary);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 16px;
    }

    .panel-title {
      font-size: 14px;
      font-weight: 600;
      color: var(--primary);
      margin-bottom: 12px;
      padding-bottom: 8px;
      border-bottom: 1px solid var(--border);
    }

    /* 预览区 */
    .preview-section {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
    }

    .preview-canvas-wrapper {
      padding: 12px;
      background: var(--bg);
      border-radius: 8px;
      border: 1px solid var(--border);
    }

    #previewCanvas {
      display: block;
      image-rendering: pixelated;
      image-rendering: crisp-edges;
    }

    .preview-label {
      font-size: 12px;
      color: var(--text-secondary);
    }

    /* 调色板 */
    .palette-grid {
      display: grid;
      grid-template-columns: repeat(8, 1fr);
      gap: 6px;
    }

    .color-swatch {
      width: 100%;
      aspect-ratio: 1;
      border-radius: 6px;
      cursor: pointer;
      border: 2px solid transparent;
      transition: all 0.2s ease;
      position: relative;
    }

    .color-swatch:hover {
      transform: scale(1.08);
    }

    .color-swatch.active {
      border-color: var(--primary);
      box-shadow: 0 0 0 2px var(--bg), 0 0 12px rgba(203, 166, 247, 0.5);
    }

    .color-swatch.eraser {
      background: repeating-conic-gradient(#ff6b6b 0% 25%, var(--bg) 0% 50%) 50% / 10px 10px;
    }

    /* 帧缩略图 */
    .frames-section {
      margin-top: auto;
    }

    .frames-container {
      display: flex;
      gap: 10px;
      overflow-x: auto;
      padding: 4px;
    }

    .frame-thumb {
      position: relative;
      cursor: pointer;
      border-radius: 8px;
      border: 2px solid var(--border);
      overflow: hidden;
      transition: all 0.2s ease;
      flex-shrink: 0;
    }

    .frame-thumb:hover {
      border-color: var(--border-light);
    }

    .frame-thumb.active {
      border-color: var(--primary);
      box-shadow: 0 0 0 2px var(--bg), 0 0 16px rgba(203, 166, 247, 0.4);
    }

    .frame-thumb canvas {
      display: block;
      image-rendering: pixelated;
      image-rendering: crisp-edges;
    }

    .frame-index {
      position: absolute;
      top: 2px;
      left: 4px;
      font-size: 10px;
      font-weight: 600;
      color: var(--text);
      background: rgba(0, 0, 0, 0.6);
      padding: 1px 5px;
      border-radius: 4px;
    }

    /* 响应式 */
    @media (max-width: 768px) {
      .app-container {
        padding: 10px;
        gap: 10px;
      }

      .toolbar {
        padding: 10px;
        gap: 10px;
      }

      .toolbar-title {
        font-size: 16px;
        width: 100%;
        margin-bottom: 6px;
      }

      .main-content {
        grid-template-columns: 1fr;
      }

      .right-panel {
        order: -1;
      }

      input[type="range"] {
        width: 100px;
      }
    }
  </style>
</head>
<body>
  <div class="app-container">
    <!-- 顶部工具栏 -->
    <header class="toolbar">
      <div class="toolbar-title">🎨 Pixel Animator</div>

      <div class="control-group">
        <button class="btn btn-icon" id="prevFrameBtn" title="上一帧">⏮</button>
        <button class="btn btn-primary btn-icon" id="playBtn" title="播放/暂停">▶</button>
        <button class="btn btn-icon" id="nextFrameBtn" title="下一帧">⏭</button>
      </div>

      <div class="control-group speed-control">
        <span class="speed-label" id="speedLabel">1.0x</span>
        <input type="range" id="speedSlider" min="0.5" max="2" step="0.1" value="1">
      </div>

      <div class="control-group">
        <span class="speed-label">循环</span>
        <label class="toggle">
          <input type="checkbox" id="loopToggle" checked>
          <span class="toggle-slider"></span>
        </label>
      </div>

      <div class="control-group">
        <span class="speed-label">网格</span>
        <label class="toggle">
          <input type="checkbox" id="gridToggle" checked>
          <span class="toggle-slider"></span>
        </label>
      </div>

      <div class="control-group frame-time-control">
        <span class="speed-label">帧间隔</span>
        <input type="number" class="frame-time-input" id="frameTimeInput" min="100" max="500" value="200">
        <span class="speed-label">ms</span>
      </div>

      <div class="control-group" style="margin-left: auto;">
        <button class="btn" id="exportPngBtn">📥 导出 PNG</button>
        <button class="btn" id="exportJsonBtn">📄 导出 JSON</button>
      </div>
    </header>

    <!-- 主内容区 -->
    <main class="main-content">
      <!-- 左侧编辑区 -->
      <section class="editor-panel">
        <div class="canvas-wrapper">
          <canvas id="editorCanvas" width="512" height="512"></canvas>
        </div>
        <div class="editor-info">
          <span id="pixelInfo">像素: -</span>
          <span id="frameInfo">帧: 1 / 5</span>
        </div>
      </section>

      <!-- 右侧面板 -->
      <aside class="right-panel">
        <div class="panel-card preview-section">
          <div class="panel-title">动画预览</div>
          <div class="preview-canvas-wrapper">
            <canvas id="previewCanvas" width="192" height="192"></canvas>
          </div>
          <div class="preview-label" id="previewInfo">当前帧: 1</div>
        </div>

        <div class="panel-card">
          <div class="panel-title">调色板</div>
          <div class="palette-grid" id="paletteGrid"></div>
        </div>

        <div class="panel-card frames-section">
          <div class="panel-title">帧序列</div>
          <div class="frames-container" id="framesContainer"></div>
        </div>
      </aside>
    </main>
  </div>

  <script type="module" src="/src/main.ts"></script>
</body>
</html>
