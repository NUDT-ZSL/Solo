<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>气泡回音 · Bubble Echo</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: linear-gradient(
        180deg,
        hsl(250, 60%, 15%) 0%,
        hsl(265, 55%, 12%) 50%,
        hsl(280, 50%, 10%) 100%
      );
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      cursor: none;
    }
    #app {
      width: 100vw;
      height: 100vh;
      position: relative;
    }
    canvas {
      display: block;
      width: 100%;
      height: 100%;
    }
    #hint-panel {
      position: fixed;
      top: 24px;
      left: 24px;
      padding: 14px 20px;
      background: rgba(255, 255, 255, 0.08);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid rgba(255, 255, 255, 0.12);
      border-radius: 12px;
      color: rgba(230, 235, 255, 0.9);
      font-size: 12px;
      line-height: 1.8;
      letter-spacing: 0.5px;
      pointer-events: none;
      z-index: 10;
      transition: opacity 0.8s ease-out;
      box-shadow: 0 4px 24px rgba(0, 0, 0, 0.3);
    }
    #hint-panel .title {
      font-size: 14px;
      font-weight: 600;
      margin-bottom: 6px;
      color: rgba(200, 210, 255, 1);
      letter-spacing: 1px;
    }
    #hint-panel.fade-out {
      opacity: 0;
    }
  </style>
</head>
<body>
  <div id="app">
    <canvas id="canvas"></canvas>
    <div id="hint-panel">
      <div class="title">✦ 气泡回音</div>
      <div>点击空白区域 · 随机生成 1-3 个气泡</div>
      <div>按住鼠标拖拽 · 沿轨迹连续生成气泡</div>
      <div>气泡相遇会排斥或融合 · 破裂绽放光点涟漪</div>
    </div>
  </div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
