<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>流光羽衣</title>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      html, body { width: 100%; height: 100%; overflow: hidden; background: #0a0618; }
      #canvas-container { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 0; }
      #ui-root { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; pointer-events: none; }
      #ui-root > * { pointer-events: auto; }
    </style>
  </head>
  <body>
    <div id="canvas-container"></div>
    <div id="ui-root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
