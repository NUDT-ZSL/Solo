<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>3D气象数据可视化</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      html, body {
        width: 100%;
        height: 100%;
        overflow: hidden;
      }

      #root {
        width: 100%;
        height: 100%;
      }

      .loading-container {
        width: 100%;
        height: 100%;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        background-color: #0a0a2e;
      }

      .loading-ring {
        width: 80px;
        height: 80px;
        border: 4px solid rgba(0, 188, 212, 0.2);
        border-top-color: #00bcd4;
        border-radius: 50%;
        animation: spin 1s linear infinite;
        margin-bottom: 40px;
        box-shadow: 0 0 20px rgba(0, 188, 212, 0.3), inset 0 0 20px rgba(0, 188, 212, 0.1);
      }

      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }

      .loading-text {
        color: #00bcd4;
        font-size: 20px;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        font-weight: 500;
        letter-spacing: 2px;
        opacity: 0;
        text-shadow: 0 0 10px rgba(0, 188, 212, 0.5);
      }

      .loading-text.step-1 {
        animation: fadeInOut 0.5s ease-in-out forwards;
      }

      .loading-text.step-2 {
        animation: fadeInOut 0.7s ease-in-out 0.5s forwards;
      }

      .loading-text.step-3 {
        animation: fadeInOut 0.8s ease-in-out 1.2s forwards;
      }

      .loading-text.step-4 {
        animation: fadeIn 0.5s ease-out 2s forwards;
      }

      @keyframes fadeInOut {
        0% {
          opacity: 0;
          transform: translateY(10px);
        }
        20% {
          opacity: 1;
          transform: translateY(0);
        }
        80% {
          opacity: 1;
          transform: translateY(0);
        }
        100% {
          opacity: 0;
          transform: translateY(-10px);
        }
      }

      @keyframes fadeIn {
        0% {
          opacity: 0;
          transform: translateY(10px);
        }
        100% {
          opacity: 1;
          transform: translateY(0);
        }
      }
    </style>
    <script type="module">
      if (import.meta.hot?.on) {
        import.meta.hot.on('vite:error', (error) => {
          if (error.err) {
            console.error(
              [error.err.message, error.err.frame].filter(Boolean).join('\n'),
            )
          }
        })
      }
    </script>
  </head>
  <body>
    <div id="root">
      <div class="loading-container">
        <div class="loading-ring"></div>
        <div class="loading-text step-1">正在初始化...</div>
        <div class="loading-text step-2">正在解析气象数据...</div>
        <div class="loading-text step-3">正在构建3D场景...</div>
        <div class="loading-text step-4">准备就绪</div>
      </div>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
