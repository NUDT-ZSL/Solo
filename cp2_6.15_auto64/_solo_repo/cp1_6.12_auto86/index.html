<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>SonicCanvas</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      html, body {
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: linear-gradient(135deg, #0a0a2e 0%, #1a1a3e 100%);
        font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
        color: #e0e0e0;
      }
      #app {
        width: 100%;
        height: 100%;
        display: flex;
        position: relative;
      }
      #canvas-container {
        width: 70%;
        height: 100%;
        position: relative;
      }
      #canvas-container canvas {
        display: block;
        width: 100%;
        height: 100%;
      }
      #sidebar {
        width: 300px;
        min-width: 300px;
        height: 100%;
        background: rgba(255, 255, 255, 0.08);
        backdrop-filter: blur(20px);
        -webkit-backdrop-filter: blur(20px);
        border-radius: 8px;
        margin: 8px 8px 8px 0;
        padding: 16px;
        display: flex;
        flex-direction: column;
        gap: 16px;
        overflow-y: auto;
        z-index: 10;
      }
      #control-panel {
        position: fixed;
        top: 12px;
        right: 320px;
        width: 200px;
        background: rgba(255, 255, 255, 0.1);
        backdrop-filter: blur(16px);
        -webkit-backdrop-filter: blur(16px);
        border-radius: 8px;
        padding: 12px;
        display: flex;
        flex-direction: column;
        gap: 8px;
        z-index: 20;
      }
      #control-panel .btn {
        width: 100%;
        padding: 8px 12px;
        border: 1px solid rgba(0, 255, 255, 0.3);
        border-radius: 6px;
        background: rgba(0, 255, 255, 0.1);
        color: #00ffff;
        cursor: pointer;
        font-size: 13px;
        transition: all 0.2s ease;
        outline: none;
      }
      #control-panel .btn:hover {
        background: rgba(0, 255, 255, 0.2);
        border-color: rgba(0, 255, 255, 0.5);
      }
      #control-panel .btn.active {
        background: rgba(0, 255, 255, 0.25);
        border-color: #00ffff;
        box-shadow: 0 0 12px rgba(0, 255, 255, 0.3);
      }
      #control-panel .bpm-label {
        font-size: 12px;
        color: #aaa;
      }
      #control-panel .bpm-value {
        font-size: 20px;
        font-weight: 700;
        color: #00ffff;
      }
      #control-panel .level-bar-container {
        width: 100%;
        height: 8px;
        background: rgba(255, 255, 255, 0.1);
        border-radius: 4px;
        overflow: hidden;
      }
      #control-panel .level-bar {
        height: 100%;
        width: 0%;
        background: linear-gradient(90deg, #00ff88, #ffff00, #ff4444);
        border-radius: 4px;
        transition: width 0.016s linear;
      }
      .sidebar-section {
        display: flex;
        flex-direction: column;
        gap: 8px;
      }
      .sidebar-section h3 {
        font-size: 13px;
        font-weight: 600;
        color: #00cccc;
        text-transform: uppercase;
        letter-spacing: 1px;
      }
      #waveform-canvas {
        width: 100%;
        height: 80px;
        border-radius: 6px;
        background: rgba(0, 0, 0, 0.3);
      }
      .slider-group {
        display: flex;
        flex-direction: column;
        gap: 4px;
      }
      .slider-group label {
        font-size: 12px;
        color: #aaa;
        display: flex;
        justify-content: space-between;
      }
      .slider-group label span {
        color: #00cccc;
        font-weight: 600;
      }
      input[type="range"] {
        -webkit-appearance: none;
        appearance: none;
        width: 100%;
        height: 6px;
        border-radius: 3px;
        background: #333;
        outline: none;
        cursor: pointer;
      }
      input[type="range"]::-webkit-slider-thumb {
        -webkit-appearance: none;
        appearance: none;
        width: 16px;
        height: 16px;
        border-radius: 50%;
        background: radial-gradient(circle, #00ffff, #008888);
        border: 2px solid #00ffff;
        cursor: pointer;
        transition: transform 0.15s cubic-bezier(0.34, 1.56, 0.64, 1);
        box-shadow: 0 0 8px rgba(0, 255, 255, 0.4);
      }
      input[type="range"]::-webkit-slider-thumb:hover {
        transform: scale(1.2);
      }
      input[type="range"]:active::-webkit-slider-thumb {
        transform: scale(1.3);
      }
      input[type="range"]::-moz-range-thumb {
        width: 16px;
        height: 16px;
        border-radius: 50%;
        background: radial-gradient(circle, #00ffff, #008888);
        border: 2px solid #00ffff;
        cursor: pointer;
        transition: transform 0.15s cubic-bezier(0.34, 1.56, 0.64, 1);
        box-shadow: 0 0 8px rgba(0, 255, 255, 0.4);
      }
      input[type="range"]::-moz-range-track {
        height: 6px;
        border-radius: 3px;
        background: #333;
      }
      #file-input {
        display: none;
      }
      @media (max-width: 768px) {
        #app {
          flex-direction: column;
        }
        #canvas-container {
          width: 100%;
          height: calc(100% - 200px);
        }
        #sidebar {
          width: 100%;
          min-width: unset;
          height: 200px;
          margin: 0;
          border-radius: 8px 8px 0 0;
          flex-direction: row;
          flex-wrap: wrap;
          overflow-x: auto;
          overflow-y: hidden;
          transition: height 0.3s ease;
        }
        #control-panel {
          right: 12px;
          top: auto;
          bottom: 212px;
        }
      }
    </style>
  </head>
  <body>
    <div id="app">
      <div id="canvas-container"></div>
      <div id="sidebar">
        <div class="sidebar-section">
          <h3>波形</h3>
          <canvas id="waveform-canvas"></canvas>
        </div>
        <div class="sidebar-section">
          <div class="slider-group">
            <label>节奏灵敏度 <span id="sensitivity-val">50</span></label>
            <input type="range" id="sensitivity-slider" min="0" max="100" value="50" />
          </div>
          <div class="slider-group">
            <label>几何体密度 <span id="density-val">35</span></label>
            <input type="range" id="density-slider" min="20" max="50" value="35" />
          </div>
          <div class="slider-group">
            <label>颜色饱和度 <span id="saturation-val">70</span></label>
            <input type="range" id="saturation-slider" min="0" max="100" value="70" />
          </div>
        </div>
      </div>
      <div id="control-panel">
        <button class="btn" id="mic-btn">🎤 开始录音</button>
        <button class="btn" id="upload-btn">📁 上传音频</button>
        <input type="file" id="file-input" accept=".mp3,audio/mpeg" />
        <div>
          <div class="bpm-label">BPM</div>
          <div class="bpm-value" id="bpm-display">--</div>
        </div>
        <div>
          <div class="bpm-label">音量电平</div>
          <div class="level-bar-container">
            <div class="level-bar" id="level-bar"></div>
          </div>
        </div>
      </div>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
