<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <meta name="theme-color" content="#0a0a2a" />
    <title>地脉涟漪 - 全球地震数据3D可视化</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      html,
      body,
      #root {
        width: 100%;
        height: 100%;
        overflow: hidden;
      }
      body {
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC',
          'Hiragino Sans GB', 'Microsoft YaHei', sans-serif;
        background: radial-gradient(ellipse at center, #0a0a2a 0%, #1a1a3a 100%;
        color: #ffffff;
      }
      @keyframes fadeInOut {
        0% { opacity: 0; transform: translateY(-10px); }
        20% { opacity: 1; transform: translateY(0); }
        80% { opacity: 1; transform: translateY(0); }
        100% { opacity: 0; transform: translateY(-10px); }
      }
      .refresh-notice {
        position: fixed;
        top: 24px;
        left: 24px;
        z-index: 100;
        padding: 12px 24px;
        font-size: 14px;
        font-weight: 500;
        letter-spacing: 0.5px;
        color: #b8f0ff;
        background: rgba(20, 100, 180, 0.25);
        border: 1px solid rgba(120, 200, 255, 0.4);
        border-radius: 6px;
        backdrop-filter: blur(8px);
        box-shadow: 0 0 24px rgba(100, 200, 255, 0.2),
                    inset 0 0 12px rgba(100, 200, 255, 0.15);
        animation: fadeInOut 2s ease-in-out forwards;
        pointer-events: none;
      }
      @keyframes labelFadeIn {
        from { opacity: 0; transform: translate(-50%, calc(-100% - 16px)) scale(0.9); }
        to   { opacity: 1; transform: translate(-50%, calc(-100% - 16px)) scale(1); }
      }
      @keyframes labelFadeOut {
        from { opacity: 1; transform: translate(-50%, calc(-100% - 16px)) scale(1); }
        to   { opacity: 0; transform: translate(-50%, calc(-100% - 16px)) scale(0.95); }
      }
      .earthquake-label {
        position: fixed;
        z-index: 90;
        pointer-events: none;
        padding: 10px 14px;
        font-size: 13px;
        line-height: 1.6;
        color: #e6f7ff;
        background: rgba(10, 20, 40, 0.85);
        border: 1px solid rgba(120, 200, 255, 0.5);
        border-radius: 8px;
        backdrop-filter: blur(6px);
        box-shadow: 0 0 20px rgba(80, 180, 255, 0.25);
        white-space: nowrap;
        animation: labelFadeIn 0.4s cubic-bezier(0.22, 1, 0.36, 1) forwards;
      }
      .earthquake-label.fading {
        animation: labelFadeOut 0.4s cubic-bezier(0.55, 0, 1, 0.45) forwards;
      }
      .earthquake-label .label-magnitude {
        font-weight: 700;
        font-size: 15px;
        margin-bottom: 4px;
      }
      .earthquake-label .label-row {
        display: flex;
        gap: 8px;
        color: #9dc4e8;
      }
      .earthquake-label .label-row span:first-child {
        color: #6a90b0;
      }
      canvas {
        display: block;
        cursor: grab;
      }
      canvas:active {
        cursor: grabbing;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
