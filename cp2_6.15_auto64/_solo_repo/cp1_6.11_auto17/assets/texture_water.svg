<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="waterGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e3a5f;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#2c5282;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1a365d;stop-opacity:1" />
    </linearGradient>
    <pattern id="ripples" x="0" y="0" width="128" height="128" patternUnits="userSpaceOnUse">
      <circle cx="64" cy="64" r="30" fill="none" stroke="rgba(74,144,217,0.2)" stroke-width="2"/>
      <circle cx="64" cy="64" r="50" fill="none" stroke="rgba(74,144,217,0.1)" stroke-width="1"/>
      <circle cx="64" cy="64" r="10" fill="rgba(74,144,217,0.15)"/>
    </pattern>
  </defs>
  <rect width="512" height="512" fill="url(#waterGrad)"/>
  <rect width="512" height="512" fill="url(#ripples)"/>
  <filter id="gloss">
    <feGaussianBlur stdDeviation="2"/>
  </filter>
  <ellipse cx="180" cy="120" rx="80" ry="20" fill="rgba(255,255,255,0.08)" filter="url(#gloss)"/>
  <ellipse cx="350" cy="380" rx="60" ry="15" fill="rgba(255,255,255,0.06)" filter="url(#gloss)"/>
</svg>
