<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>镜像迷宫 - Mirror Maze</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      font-family: 'Courier New', Consolas, monospace;
      background: linear-gradient(180deg, #0A0E17 0%, #1A243B 100%);
      cursor: crosshair;
    }

    #app {
      position: relative;
      width: 100vw;
      height: 100vh;
    }

    #canvas-container {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
    }

    .hud-panel {
      position: absolute;
      background: rgba(26, 26, 46, 0.6);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      border-radius: 12px;
      padding: 14px 20px;
      color: #ffffff;
      font-size: 14px;
      letter-spacing: 1px;
      border: 1px solid rgba(255, 255, 255, 0.1);
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
    }

    #hud-top-left {
      top: 20px;
      left: 20px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .hud-row {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .hud-label {
      color: #8892B0;
      font-size: 12px;
      text-transform: uppercase;
    }

    .hud-value {
      font-weight: bold;
      font-size: 16px;
    }

    #timer-value {
      color: #FF6B35;
      font-size: 22px;
      text-shadow: 0 0 10px rgba(255, 107, 53, 0.5);
    }

    #room-value {
      color: #A0C4FF;
    }

    #fragments-value {
      color: #00FF88;
      text-shadow: 0 0 8px rgba(0, 255, 136, 0.5);
    }

    .fragment-icon {
      width: 14px;
      height: 14px;
      background: radial-gradient(circle, #FFD700 0%, #FFA500 100%);
      border-radius: 50%;
      box-shadow: 0 0 8px #FFD700;
      display: inline-block;
    }

    #minimap-container {
      position: absolute;
      bottom: 20px;
      right: 20px;
      background: rgba(26, 26, 46, 0.6);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      border-radius: 12px;
      padding: 12px;
      border: 2px solid rgba(74, 144, 217, 0.5);
      animation: borderPulse 2s ease-in-out infinite;
    }

    @keyframes borderPulse {
      0%, 100% {
        border-color: rgba(74, 144, 217, 0.5);
        box-shadow: 0 0 10px rgba(74, 144, 217, 0.3);
      }
      50% {
        border-color: rgba(74, 144, 217, 0.8);
        box-shadow: 0 0 20px rgba(74, 144, 217, 0.6);
      }
    }

    #minimap {
      display: block;
    }

    #game-over, #game-win {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      background: rgba(26, 26, 46, 0.9);
      backdrop-filter: blur(15px);
      -webkit-backdrop-filter: blur(15px);
      border-radius: 16px;
      padding: 40px 60px;
      text-align: center;
      border: 2px solid rgba(255, 255, 255, 0.2);
      display: none;
      z-index: 100;
    }

    #game-over h1 {
      color: #FF6B35;
      font-size: 36px;
      margin-bottom: 16px;
      text-shadow: 0 0 20px rgba(255, 107, 53, 0.7);
    }

    #game-win h1 {
      color: #00FF88;
      font-size: 36px;
      margin-bottom: 16px;
      text-shadow: 0 0 20px rgba(0, 255, 136, 0.7);
    }

    .game-over-text, .game-win-text {
      color: #8892B0;
      font-size: 16px;
      margin-bottom: 24px;
    }

    .restart-btn {
      background: linear-gradient(135deg, #4A90D9 0%, #A0C4FF 100%);
      color: #ffffff;
      border: none;
      padding: 12px 32px;
      font-size: 16px;
      font-family: inherit;
      border-radius: 8px;
      cursor: pointer;
      letter-spacing: 2px;
      transition: all 0.3s ease;
      box-shadow: 0 4px 15px rgba(74, 144, 217, 0.4);
    }

    .restart-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(74, 144, 217, 0.6);
    }

    #start-screen {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: linear-gradient(180deg, #0A0E17 0%, #1A243B 100%);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 200;
    }

    #start-screen h1 {
      font-size: 48px;
      background: linear-gradient(135deg, #A0C4FF 0%, #4A90D9 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 20px;
      letter-spacing: 8px;
      text-shadow: 0 0 40px rgba(160, 196, 255, 0.3);
    }

    #start-screen p {
      color: #8892B0;
      font-size: 14px;
      margin-bottom: 10px;
      max-width: 500px;
      text-align: center;
      line-height: 1.8;
    }

    .controls-info {
      margin: 30px 0;
      padding: 20px 30px;
      background: rgba(26, 26, 46, 0.6);
      border-radius: 12px;
      border: 1px solid rgba(255, 255, 255, 0.1);
    }

    .controls-info h3 {
      color: #A0C4FF;
      margin-bottom: 12px;
      font-size: 14px;
      letter-spacing: 2px;
    }

    .controls-info p {
      color: #8892B0;
      font-size: 12px;
      margin: 6px 0;
    }

    .start-btn {
      background: linear-gradient(135deg, #00FF88 0%, #00CC6A 100%);
      color: #0A0E17;
      border: none;
      padding: 16px 48px;
      font-size: 18px;
      font-family: inherit;
      font-weight: bold;
      border-radius: 8px;
      cursor: pointer;
      letter-spacing: 4px;
      transition: all 0.3s ease;
      box-shadow: 0 4px 20px rgba(0, 255, 136, 0.4);
    }

    .start-btn:hover {
      transform: translateY(-3px);
      box-shadow: 0 8px 30px rgba(0, 255, 136, 0.6);
    }

    #boost-indicator {
      position: absolute;
      bottom: 20px;
      left: 20px;
      background: rgba(26, 26, 46, 0.6);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      border-radius: 12px;
      padding: 10px 16px;
      border: 1px solid rgba(255, 107, 53, 0.5);
      display: none;
    }

    .boost-label {
      color: #8892B0;
      font-size: 11px;
      letter-spacing: 1px;
    }

    .boost-bar-container {
      width: 100px;
      height: 6px;
      background: rgba(255, 255, 255, 0.1);
      border-radius: 3px;
      margin-top: 6px;
      overflow: hidden;
    }

    .boost-bar {
      height: 100%;
      background: linear-gradient(90deg, #FF6B35, #FFD700);
      border-radius: 3px;
      transition: width 0.1s linear;
    }
  </style>
</head>
<body>
  <div id="app">
    <div id="canvas-container"></div>

    <div id="start-screen">
      <h1>镜像迷宫</h1>
      <p>MIRROR MAZE</p>
      <p>在不断重组的镜像迷宫中寻找出口，收集光之碎片，但小心——你的影子正在追逐你...</p>
      <div class="controls-info">
        <h3>操作指南</h3>
        <p>WASD - 移动</p>
        <p>鼠标拖拽 - 旋转视角</p>
        <p>SHIFT - 加速冲刺</p>
      </div>
      <button class="start-btn" id="start-btn">开始游戏</button>
    </div>

    <div class="hud-panel" id="hud-top-left" style="display: none;">
      <div class="hud-row">
        <span class="hud-label">剩余时间</span>
        <span class="hud-value" id="timer-value">120</span>
      </div>
      <div class="hud-row">
        <span class="hud-label">房间</span>
        <span class="hud-value" id="room-value">(0, 0)</span>
      </div>
      <div class="hud-row">
        <span class="fragment-icon"></span>
        <span class="hud-label">碎片</span>
        <span class="hud-value" id="fragments-value">0 / 3</span>
      </div>
    </div>

    <div id="boost-indicator">
      <div class="boost-label" id="boost-label">冲刺</div>
      <div class="boost-bar-container">
        <div class="boost-bar" id="boost-bar" style="width: 100%;"></div>
      </div>
    </div>

    <div id="minimap-container" style="display: none;">
      <canvas id="minimap" width="150" height="150"></canvas>
    </div>

    <div id="game-over">
      <h1>游戏结束</h1>
      <p class="game-over-text">你的影子追上了你...</p>
      <button class="restart-btn" id="restart-btn-lose">重新开始</button>
    </div>

    <div id="game-win">
      <h1>胜利!</h1>
      <p class="game-win-text">你成功逃出了镜像迷宫!</p>
      <button class="restart-btn" id="restart-btn-win">再来一局</button>
    </div>
  </div>

  <script type="module" src="/src/main.ts"></script>
</body>
</html>
