<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>微型钢琴卷帘编辑器</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #2D2D3F;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      color: #FFFFFF;
      padding: 20px;
      gap: 20px;
    }

    h1 {
      font-size: 24px;
      font-weight: 600;
      color: #FFFFFF;
      text-align: center;
    }

    .canvas-wrapper {
      position: relative;
      display: flex;
      justify-content: center;
    }

    canvas {
      background: #1E1E2E;
      border-radius: 8px;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
      cursor: crosshair;
      display: block;
    }

    .controls {
      display: flex;
      flex-direction: row;
      align-items: center;
      gap: 20px;
      padding: 16px 24px;
      background: #1E1E2E;
      border-radius: 12px;
      box-shadow: 0 4px 16px rgba(0, 0, 0, 0.3);
      flex-wrap: wrap;
      justify-content: center;
    }

    .control-group {
      display: flex;
      flex-direction: column;
      gap: 6px;
      align-items: center;
    }

    .control-label {
      font-size: 12px;
      color: #A0A0B0;
      font-weight: 500;
    }

    .play-btn {
      width: 48px;
      height: 48px;
      border-radius: 50%;
      border: none;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #4ADE80, #22C55E);
      color: white;
      font-size: 20px;
      transition: all 0.3s ease;
      box-shadow: 0 4px 12px rgba(74, 222, 128, 0.3);
    }

    .play-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(74, 222, 128, 0.5);
    }

    .play-btn.playing {
      background: linear-gradient(135deg, #F87171, #EF4444);
      box-shadow: 0 4px 12px rgba(248, 113, 113, 0.3);
    }

    .play-btn.playing:hover {
      box-shadow: 0 6px 20px rgba(248, 113, 113, 0.5);
    }

    .clear-btn {
      padding: 10px 20px;
      border-radius: 8px;
      border: none;
      cursor: pointer;
      background: linear-gradient(135deg, #F87171, #EF4444);
      color: white;
      font-size: 14px;
      font-weight: 500;
      transition: all 0.3s ease;
      box-shadow: 0 4px 12px rgba(248, 113, 113, 0.3);
    }

    .clear-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(248, 113, 113, 0.5);
    }

    input[type="range"] {
      -webkit-appearance: none;
      appearance: none;
      width: 140px;
      height: 6px;
      border-radius: 3px;
      background: #3A3A4A;
      outline: none;
      cursor: pointer;
    }

    input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none;
      appearance: none;
      width: 18px;
      height: 18px;
      border-radius: 50%;
      background: linear-gradient(135deg, #818CF8, #6366F1);
      cursor: pointer;
      transition: transform 0.2s ease;
      box-shadow: 0 2px 8px rgba(129, 140, 248, 0.4);
    }

    input[type="range"]::-webkit-slider-thumb:hover {
      transform: scale(1.1);
    }

    input[type="range"]::-moz-range-thumb {
      width: 18px;
      height: 18px;
      border-radius: 50%;
      background: linear-gradient(135deg, #818CF8, #6366F1);
      cursor: pointer;
      border: none;
      box-shadow: 0 2px 8px rgba(129, 140, 248, 0.4);
    }

    .value-display {
      font-size: 13px;
      color: #C0C0D0;
      min-width: 40px;
      text-align: center;
    }

    @media (max-width: 800px) {
      canvas {
        width: 100%;
        max-width: 90vw;
        height: auto;
      }

      .controls {
        flex-direction: column;
        width: 100%;
        max-width: 90vw;
      }

      .control-group {
        width: 100%;
      }

      input[type="range"] {
        width: 100%;
      }
    }
  </style>
</head>
<body>
  <h1>🎹 微型钢琴卷帘编辑器</h1>
  <div class="canvas-wrapper">
    <canvas id="pianoCanvas" width="900" height="500"></canvas>
  </div>
  <div class="controls">
    <div class="control-group">
      <span class="control-label">播放控制</span>
      <button id="playBtn" class="play-btn">▶</button>
    </div>
    <div class="control-group">
      <span class="control-label">速度</span>
      <div style="display: flex; align-items: center; gap: 10px;">
        <input type="range" id="speedSlider" min="0.5" max="2" step="0.1" value="1" />
        <span class="value-display" id="speedValue">1.0x</span>
      </div>
    </div>
    <div class="control-group">
      <span class="control-label">音量</span>
      <div style="display: flex; align-items: center; gap: 10px;">
        <input type="range" id="volumeSlider" min="0" max="100" step="1" value="70" />
        <span class="value-display" id="volumeValue">70</span>
      </div>
    </div>
    <div class="control-group">
      <span class="control-label">音符操作</span>
      <button id="clearBtn" class="clear-btn">清除全部</button>
    </div>
  </div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
