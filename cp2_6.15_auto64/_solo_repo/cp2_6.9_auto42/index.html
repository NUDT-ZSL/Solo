<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>宇宙之音 - 粒子音乐可视化</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: radial-gradient(circle at center, #0a0a2e 0%, #000011 100%);
    }
    canvas {
      display: block;
      width: 100vw;
      height: 100vh;
    }
    #info {
      position: fixed;
      top: 16px;
      right: 20px;
      color: #a0a0ff;
      font-family: 'Courier New', monospace;
      font-size: 14px;
      text-shadow: 0 0 10px #6060ff;
      z-index: 10;
      pointer-events: none;
      line-height: 1.8;
    }
    #info span {
      color: #00ffff;
    }
  </style>
</head>
<body>
  <div id="info">
    <div>粒子总数: <span id="count">0</span></div>
    <div>最大半径: <span id="maxR">0</span> px</div>
  </div>
  <canvas id="canvas"></canvas>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
