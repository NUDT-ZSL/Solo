<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>幻境迷踪 - Phantom Maze</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #0a0a2e;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      user-select: none;
    }
    #app {
      width: 100vw;
      height: 100vh;
      position: relative;
      cursor: none;
    }
    #hud {
      position: absolute;
      top: 20px;
      left: 20px;
      z-index: 100;
      background: rgba(10, 10, 46, 0.7);
      backdrop-filter: blur(8px);
      border: 1px solid rgba(168, 85, 247, 0.3);
      border-radius: 12px;
      padding: 16px 24px;
      color: #fff;
      pointer-events: none;
    }
    .hud-item {
      display: flex;
      align-items: center;
      gap: 12px;
      margin: 6px 0;
      font-size: 18px;
      font-weight: 600;
    }
    .hud-label {
      color: #22d3ee;
      text-shadow: 0 0 10px rgba(34, 211, 238, 0.5);
      letter-spacing: 1px;
    }
    .hud-value {
      color: #a855f7;
      text-shadow: 0 0 15px rgba(168, 85, 247, 0.8);
      font-family: 'Courier New', monospace;
      min-width: 80px;
    }
    #damage-overlay {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 90;
      box-shadow: inset 0 0 0 0 transparent;
      transition: box-shadow 0.1s ease-out;
    }
    #damage-overlay.active {
      box-shadow: inset 0 0 120px 40px rgba(255, 0, 64, 0.6);
    }
    #pause-menu {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%) scale(0.9);
      z-index: 200;
      background: rgba(10, 10, 46, 0.92);
      backdrop-filter: blur(16px);
      border: 2px solid rgba(168, 85, 247, 0.5);
      border-radius: 20px;
      padding: 40px 60px;
      text-align: center;
      opacity: 0;
      pointer-events: none;
      transition: all 0.25s ease;
    }
    #pause-menu.show {
      opacity: 1;
      pointer-events: auto;
      transform: translate(-50%, -50%) scale(1);
    }
    #pause-menu h2 {
      color: #a855f7;
      font-size: 36px;
      text-shadow: 0 0 20px rgba(168, 85, 247, 0.6);
      margin-bottom: 30px;
      letter-spacing: 3px;
    }
    #pause-menu p {
      color: #22d3ee;
      font-size: 16px;
      line-height: 2;
      margin-bottom: 30px;
    }
    .menu-btn {
      background: linear-gradient(135deg, #a855f7, #7c3aed);
      border: none;
      color: #fff;
      padding: 14px 48px;
      font-size: 18px;
      font-weight: 600;
      border-radius: 10px;
      cursor: pointer;
      letter-spacing: 2px;
      box-shadow: 0 0 20px rgba(168, 85, 247, 0.4);
      transition: all 0.2s ease;
    }
    .menu-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 0 30px rgba(168, 85, 247, 0.7);
    }
    #victory-screen {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 300;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: rgba(10, 10, 46, 0.85);
      backdrop-filter: blur(8px);
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.5s ease;
    }
    #victory-screen.show {
      opacity: 1;
      pointer-events: auto;
    }
    #victory-screen h1 {
      font-size: 64px;
      background: linear-gradient(135deg, #22d3ee, #a855f7, #f472b6);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      text-shadow: 0 0 40px rgba(168, 85, 247, 0.5);
      margin-bottom: 30px;
      letter-spacing: 8px;
      animation: victoryPulse 2s ease-in-out infinite;
    }
    @keyframes victoryPulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.05); }
    }
    .victory-info {
      background: rgba(168, 85, 247, 0.1);
      border: 1px solid rgba(168, 85, 247, 0.3);
      border-radius: 16px;
      padding: 30px 50px;
      margin-bottom: 30px;
      text-align: center;
    }
    .victory-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 60px;
      margin: 12px 0;
    }
    .victory-label {
      color: #22d3ee;
      font-size: 20px;
      letter-spacing: 2px;
    }
    .victory-value {
      color: #fff;
      font-size: 28px;
      font-weight: bold;
      font-family: 'Courier New', monospace;
    }
    #rating {
      font-size: 80px;
      font-weight: 900;
      margin: 20px 0;
      text-shadow: 0 0 30px currentColor;
    }
    .rating-S { color: #fbbf24; }
    .rating-A { color: #a855f7; }
    .rating-B { color: #22d3ee; }
    .rating-C { color: #6b7280; }
    #comment {
      color: #fff;
      font-size: 20px;
      margin-bottom: 30px;
      letter-spacing: 2px;
    }
    #crosshair {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 20px;
      height: 20px;
      pointer-events: none;
      z-index: 50;
      opacity: 0.6;
    }
    #crosshair::before, #crosshair::after {
      content: '';
      position: absolute;
      background: #22d3ee;
      box-shadow: 0 0 8px rgba(34, 211, 238, 0.8);
    }
    #crosshair::before {
      left: 50%;
      top: 0;
      width: 2px;
      height: 100%;
      transform: translateX(-50%);
    }
    #crosshair::after {
      top: 50%;
      left: 0;
      height: 2px;
      width: 100%;
      transform: translateY(-50%);
    }
  </style>
</head>
<body>
  <div id="app">
    <div id="hud">
      <div class="hud-item">
        <span class="hud-label">光球</span>
        <span class="hud-value"><span id="orb-count">0</span> / 10</span>
      </div>
      <div class="hud-item">
        <span class="hud-label">时间</span>
        <span class="hud-value" id="timer">00:00</span>
      </div>
    </div>
    <div id="damage-overlay"></div>
    <div id="crosshair"></div>
    <div id="pause-menu">
      <h2>游戏暂停</h2>
      <p>
        WASD - 移动<br>
        鼠标拖拽 - 视角<br>
        空格 - 投掷光球<br>
        ESC - 暂停/继续
      </p>
      <button class="menu-btn" id="resume-btn">继续游戏</button>
    </div>
    <div id="victory-screen">
      <h1>通关成功！</h1>
      <div class="victory-info">
        <div class="victory-row">
          <span class="victory-label">用时</span>
          <span class="victory-value" id="final-time">00:00</span>
        </div>
        <div class="victory-row">
          <span class="victory-label">评级</span>
          <span class="victory-value" id="rating">S</span>
        </div>
      </div>
      <p id="comment"></p>
      <button class="menu-btn" id="restart-btn">再来一局</button>
    </div>
  </div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
