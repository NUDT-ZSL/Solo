<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
    <title>粒子雨幕 · 3D 交互可视化</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      html, body {
        width: 100%;
        height: 100vh;
        overflow: hidden;
        background: linear-gradient(180deg, #000000 0%, #0D1B2A 100%);
        font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      }
      #app {
        width: 100%;
        height: 100%;
        position: relative;
      }
      .border-top, .border-bottom {
        position: absolute;
        left: 0;
        right: 0;
        height: 2px;
        background: #4FC3F7;
        opacity: 0.3;
        z-index: 10;
        pointer-events: none;
        box-shadow: 0 0 12px #4FC3F7, 0 0 24px rgba(79, 195, 247, 0.4);
      }
      .border-top {
        top: 0;
      }
      .border-bottom {
        bottom: 0;
      }
      .control-panel {
        position: absolute;
        left: 24px;
        bottom: 24px;
        background: rgba(0, 0, 0, 0.6);
        border-radius: 12px;
        padding: 16px;
        z-index: 20;
        backdrop-filter: blur(8px);
        border: 1px solid rgba(79, 195, 247, 0.15);
      }
      .panel-label {
        font-size: 14px;
        color: #A8D8EA;
        font-family: 'Consolas', 'Monaco', 'Courier New', monospace;
        margin-bottom: 12px;
        letter-spacing: 0.5px;
        display: flex;
        justify-content: space-between;
        align-items: center;
      }
      .wind-value {
        color: #4FC3F7;
        font-weight: 600;
      }
      .slider-wrapper {
        position: relative;
        width: 200px;
        height: 8px;
      }
      .slider-track {
        position: absolute;
        width: 100%;
        height: 8px;
        background: #1B2838;
        border-radius: 4px;
        cursor: pointer;
      }
      .slider-fill {
        position: absolute;
        height: 8px;
        background: linear-gradient(90deg, #A8D8EA 0%, #4FC3F7 100%);
        border-radius: 4px;
        pointer-events: none;
        left: 50%;
        width: 0%;
        transform-origin: left center;
      }
      .slider-thumb {
        position: absolute;
        width: 16px;
        height: 16px;
        background: #4FC3F7;
        border-radius: 50%;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        cursor: grab;
        box-shadow: 0 0 8px #4FC3F7, 0 0 16px rgba(79, 195, 247, 0.6);
        transition: transform 0.15s ease, box-shadow 0.15s ease;
      }
      .slider-thumb:hover {
        transform: translate(-50%, -50%) scale(1.15);
        box-shadow: 0 0 12px #4FC3F7, 0 0 24px rgba(79, 195, 247, 0.8);
      }
      .slider-thumb:active {
        cursor: grabbing;
        transform: translate(-50%, -50%) scale(1.1);
      }
      .slider-ticks {
        display: flex;
        justify-content: space-between;
        margin-top: 8px;
        font-size: 10px;
        color: rgba(168, 216, 234, 0.5);
        font-family: monospace;
      }
      .hints {
        position: absolute;
        top: 24px;
        right: 24px;
        background: rgba(0, 0, 0, 0.6);
        border-radius: 12px;
        padding: 14px 18px;
        z-index: 20;
        backdrop-filter: blur(8px);
        border: 1px solid rgba(79, 195, 247, 0.15);
        color: #A8D8EA;
        font-size: 12px;
        font-family: 'Consolas', 'Monaco', monospace;
        line-height: 1.8;
      }
      .hints-title {
        color: #4FC3F7;
        font-weight: 600;
        margin-bottom: 6px;
        font-size: 13px;
      }
      canvas {
        display: block;
      }
    </style>
  </head>
  <body>
    <div id="app">
      <div class="border-top"></div>
      <div class="border-bottom"></div>
      <div class="hints">
        <div class="hints-title">◆ 操作指南</div>
        <div>鼠标拖拽 · 旋转视角</div>
        <div>滚轮 · 缩放距离</div>
        <div>方向键 · 场景漫步</div>
      </div>
      <div class="control-panel">
        <div class="panel-label">
          <span>WIND · 风场强度</span>
          <span class="wind-value" id="windValue">0.30</span>
        </div>
        <div class="slider-wrapper" id="sliderWrapper">
          <div class="slider-track" id="sliderTrack"></div>
          <div class="slider-fill" id="sliderFill"></div>
          <div class="slider-thumb" id="sliderThumb"></div>
        </div>
        <div class="slider-ticks">
          <span>← 左</span>
          <span>0</span>
          <span>右 →</span>
        </div>
      </div>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
