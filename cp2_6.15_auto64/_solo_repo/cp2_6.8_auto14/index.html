<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>音频可视化</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #0a0a2e;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      color: #e0e0ff;
    }

    body {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 20px;
      gap: 24px;
    }

    .upload-zone {
      width: 90%;
      max-width: 900px;
      padding: 28px 40px;
      border: 2px dashed rgba(100, 180, 255, 0.4);
      border-radius: 16px;
      text-align: center;
      cursor: pointer;
      transition: all 0.3s ease;
      background: rgba(30, 40, 80, 0.2);
      user-select: none;
    }

    .upload-zone:hover,
    .upload-zone.dragover {
      border-color: #4fc3ff;
      background: rgba(79, 195, 255, 0.08);
      box-shadow: 0 0 30px rgba(79, 195, 255, 0.15);
    }

    .upload-zone p {
      font-size: 16px;
      color: #a0b0d0;
      letter-spacing: 0.5px;
    }

    .upload-zone.dragover p {
      color: #4fc3ff;
    }

    .upload-zone .filename {
      margin-top: 8px;
      font-size: 14px;
      color: #4fc3ff;
      word-break: break-all;
    }

    #fileInput {
      display: none;
    }

    .canvas-wrap {
      width: 90%;
      max-width: 900px;
      height: 400px;
      border-radius: 16px;
      overflow: hidden;
      background: rgba(10, 15, 40, 0.8);
      box-shadow: 0 0 40px rgba(79, 195, 255, 0.08),
                  inset 0 0 60px rgba(0, 0, 30, 0.6);
    }

    #visualizer {
      display: block;
      width: 100%;
      height: 100%;
    }

    .controls {
      width: 90%;
      max-width: 900px;
      display: flex;
      flex-direction: column;
      gap: 16px;
      padding: 20px 28px;
      background: rgba(20, 25, 60, 0.6);
      border-radius: 16px;
      border: 1px solid rgba(100, 150, 255, 0.1);
    }

    .controls-row {
      display: flex;
      align-items: center;
      gap: 16px;
      flex-wrap: wrap;
    }

    .mode-switch {
      display: flex;
      background: rgba(10, 15, 40, 0.8);
      border-radius: 10px;
      overflow: hidden;
      border: 1px solid rgba(100, 150, 255, 0.15);
    }

    .mode-btn {
      padding: 10px 22px;
      background: transparent;
      border: none;
      color: #8090b0;
      font-size: 14px;
      cursor: pointer;
      transition: all 0.25s ease;
      letter-spacing: 0.5px;
    }

    .mode-btn:hover {
      color: #4fc3ff;
    }

    .mode-btn.active {
      background: linear-gradient(135deg, #2a6fff, #4fc3ff);
      color: #fff;
      box-shadow: 0 0 18px rgba(79, 195, 255, 0.4);
    }

    .play-btn {
      width: 46px;
      height: 46px;
      border-radius: 50%;
      border: none;
      background: linear-gradient(135deg, #2a6fff, #4fc3ff);
      color: #fff;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.25s ease;
      flex-shrink: 0;
    }

    .play-btn:hover {
      transform: scale(1.08);
      box-shadow: 0 0 22px rgba(79, 195, 255, 0.55);
    }

    .play-btn:disabled {
      background: #2a3050;
      color: #606880;
      cursor: not-allowed;
      transform: none;
      box-shadow: none;
    }

    .play-btn svg {
      width: 20px;
      height: 20px;
      fill: currentColor;
    }

    .progress-wrap {
      flex: 1;
      min-width: 200px;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .time-label {
      font-size: 12px;
      color: #8090b0;
      font-variant-numeric: tabular-nums;
      min-width: 44px;
      text-align: center;
    }

    .slider {
      -webkit-appearance: none;
      appearance: none;
      flex: 1;
      height: 6px;
      border-radius: 3px;
      background: rgba(40, 50, 90, 0.8);
      outline: none;
      cursor: pointer;
    }

    .slider::-webkit-slider-thumb {
      -webkit-appearance: none;
      appearance: none;
      width: 16px;
      height: 16px;
      border-radius: 50%;
      background: linear-gradient(135deg, #2a6fff, #4fc3ff);
      cursor: pointer;
      box-shadow: 0 0 10px rgba(79, 195, 255, 0.6);
      transition: transform 0.2s ease;
    }

    .slider::-webkit-slider-thumb:hover {
      transform: scale(1.2);
    }

    .slider::-moz-range-thumb {
      width: 16px;
      height: 16px;
      border-radius: 50%;
      background: linear-gradient(135deg, #2a6fff, #4fc3ff);
      cursor: pointer;
      border: none;
      box-shadow: 0 0 10px rgba(79, 195, 255, 0.6);
    }

    .volume-wrap {
      display: flex;
      align-items: center;
      gap: 10px;
      min-width: 140px;
    }

    .volume-icon {
      color: #8090b0;
      display: flex;
      align-items: center;
      transition: color 0.2s ease;
    }

    .volume-wrap:hover .volume-icon {
      color: #4fc3ff;
    }

    .volume-icon svg {
      width: 20px;
      height: 20px;
      fill: currentColor;
    }

    #volumeSlider {
      flex: 1;
    }
  </style>
</head>
<body>
  <div class="upload-zone" id="uploadZone">
    <p id="uploadHint">点击或拖拽音频文件到此</p>
    <p class="filename" id="fileName"></p>
    <input type="file" id="fileInput" accept="audio/mpeg,audio/wav,audio/x-wav,audio/mp3,.mp3,.wav" />
  </div>

  <div class="canvas-wrap">
    <canvas id="visualizer"></canvas>
  </div>

  <div class="controls">
    <div class="controls-row">
      <div class="mode-switch">
        <button class="mode-btn active" data-mode="waveform">波形图</button>
        <button class="mode-btn" data-mode="spectrum">频谱图</button>
      </div>

      <button class="play-btn" id="playBtn" disabled>
        <svg id="playIcon" viewBox="0 0 24 24">
          <path d="M8 5v14l11-7z" />
        </svg>
        <svg id="pauseIcon" viewBox="0 0 24 24" style="display:none">
          <path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z" />
        </svg>
      </button>

      <div class="progress-wrap">
        <span class="time-label" id="currentTime">0:00</span>
        <input type="range" class="slider" id="progressSlider" min="0" max="100" value="0" step="0.1" />
        <span class="time-label" id="totalTime">0:00</span>
      </div>
    </div>

    <div class="controls-row">
      <div class="volume-wrap">
        <span class="volume-icon">
          <svg viewBox="0 0 24 24">
            <path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3A4.5 4.5 0 0014 7.97v8.05c1.48-.73 2.5-2.25 2.5-4.02zM14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77z" />
          </svg>
        </span>
        <input type="range" class="slider" id="volumeSlider" min="0" max="1" value="0.8" step="0.01" />
      </div>
    </div>
  </div>

  <script type="module" src="/src/main.ts"></script>
</body>
</html>
