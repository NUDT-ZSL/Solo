<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>西周青铜觚 - 虚拟三维鉴赏</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: radial-gradient(circle at center, #0f0f1f 0%, #000010 100%);
      font-family: 'Microsoft YaHei', 'PingFang SC', sans-serif;
    }

    #app {
      width: 100%;
      height: 100%;
      position: relative;
    }

    #canvas-container {
      width: 100%;
      height: 100%;
    }

    #loading-container {
      position: absolute;
      top: 20px;
      left: 50%;
      transform: translateX(-50%);
      width: 300px;
      z-index: 100;
    }

    #loading-bar {
      width: 100%;
      height: 4px;
      background: #1a1a2e;
      border-radius: 2px;
      overflow: hidden;
    }

    #loading-progress {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, #ff6b6b 0%, #4ecdc4 100%);
      transition: width 0.5s ease;
      border-radius: 2px;
    }

    #loading-text {
      text-align: center;
      color: #8888aa;
      font-size: 12px;
      margin-top: 8px;
      letter-spacing: 1px;
    }

    #hint-panel {
      position: absolute;
      bottom: 20px;
      left: 20px;
      background: rgba(26, 26, 46, 0.7);
      backdrop-filter: blur(10px);
      padding: 16px 20px;
      border-radius: 8px;
      color: #e0e0e0;
      font-size: 13px;
      line-height: 1.8;
      z-index: 50;
      border: 1px solid rgba(255, 170, 0, 0.3);
    }

    #hint-panel h3 {
      color: #ffaa00;
      font-size: 14px;
      margin-bottom: 8px;
      font-weight: 600;
    }

    #hint-panel .hint-item {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    #hint-panel .hint-icon {
      color: #ffaa00;
      font-weight: bold;
    }

    #control-panel {
      position: absolute;
      top: 50%;
      right: 20px;
      transform: translateY(-50%);
      width: 260px;
      background: rgba(26, 26, 46, 0.8);
      backdrop-filter: blur(10px);
      padding: 20px;
      border-radius: 12px;
      z-index: 50;
      border: 1px solid rgba(255, 170, 0, 0.2);
    }

    #control-panel h2 {
      color: #ffaa00;
      font-size: 16px;
      margin-bottom: 20px;
      font-weight: 600;
      text-align: center;
      letter-spacing: 2px;
      padding-bottom: 12px;
      border-bottom: 1px solid rgba(255, 170, 0, 0.3);
    }

    .control-item {
      margin-bottom: 18px;
    }

    .control-item label {
      display: flex;
      justify-content: space-between;
      align-items: center;
      color: #ffaa00;
      font-size: 13px;
      margin-bottom: 8px;
      font-weight: 500;
    }

    .control-item label .value {
      color: #e0e0e0;
      font-size: 12px;
      font-family: monospace;
    }

    .control-item input[type="range"] {
      width: 100%;
      height: 4px;
      background: #3a3a5a;
      border-radius: 2px;
      outline: none;
      -webkit-appearance: none;
      appearance: none;
      cursor: pointer;
    }

    .control-item input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none;
      appearance: none;
      width: 14px;
      height: 14px;
      background: #ffaa00;
      border-radius: 50%;
      cursor: pointer;
      transition: filter 0.2s;
    }

    .control-item input[type="range"]::-webkit-slider-thumb:hover {
      filter: brightness(1.15);
    }

    .control-item input[type="range"]::-moz-range-thumb {
      width: 14px;
      height: 14px;
      background: #ffaa00;
      border-radius: 50%;
      cursor: pointer;
      border: none;
      transition: filter 0.2s;
    }

    .control-item input[type="range"]::-moz-range-thumb:hover {
      filter: brightness(1.15);
    }

    .toggle-btn {
      width: 100%;
      padding: 10px;
      background: #3a3a5a;
      border: 1px solid rgba(255, 170, 0, 0.4);
      color: #ffaa00;
      font-size: 13px;
      border-radius: 6px;
      cursor: pointer;
      transition: all 0.2s;
      font-weight: 500;
      letter-spacing: 1px;
    }

    .toggle-btn:hover {
      background: rgba(255, 170, 0, 0.15);
      filter: brightness(1.15);
    }

    .toggle-btn.active {
      background: rgba(255, 170, 0, 0.25);
      border-color: #ffaa00;
    }

    .annotation-card {
      position: absolute;
      background: rgba(26, 26, 46, 0.9);
      border: 2px solid rgba(255, 170, 0, 0.6);
      border-radius: 8px;
      padding: 14px 16px;
      color: #e0e0e0;
      font-size: 14px;
      width: 240px;
      z-index: 80;
      pointer-events: auto;
      cursor: pointer;
      transform-origin: bottom center;
      animation: slideUp 0.3s ease-out;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.5);
    }

    @keyframes slideUp {
      from {
        opacity: 0;
        transform: translateY(10px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .annotation-card .icon {
      font-size: 20px;
      color: #ffaa00;
      margin-right: 8px;
    }

    .annotation-card .title {
      color: #ffaa00;
      font-size: 15px;
      font-weight: 600;
      margin-bottom: 6px;
      display: flex;
      align-items: center;
    }

    .annotation-card .desc {
      color: #c0c0d0;
      font-size: 13px;
      line-height: 1.6;
    }

    .annotation-card.pinned {
      border-color: #ffaa00;
      box-shadow: 0 0 15px rgba(255, 170, 0, 0.3);
    }

    .annotation-card .pin-indicator {
      position: absolute;
      top: 6px;
      right: 10px;
      font-size: 10px;
      color: #ffaa00;
      opacity: 0.7;
    }
  </style>
</head>
<body>
  <div id="app">
    <div id="canvas-container"></div>
    
    <div id="loading-container">
      <div id="loading-bar">
        <div id="loading-progress"></div>
      </div>
      <div id="loading-text">正在初始化...</div>
    </div>

    <div id="hint-panel">
      <h3>操作提示</h3>
      <div class="hint-item"><span class="hint-icon">🖱</span> 左键拖拽：旋转视角</div>
      <div class="hint-item"><span class="hint-icon">🖱</span> 滚轮：缩放</div>
      <div class="hint-item"><span class="hint-icon">🖱</span> 右键拖拽：平移</div>
      <div class="hint-item"><span class="hint-icon">✨</span> 悬停浮标：查看纹饰注释</div>
    </div>

    <div id="control-panel">
      <h2>鉴赏控制台</h2>
      
      <div class="control-item">
        <label>环境光强度 <span class="value" id="ambient-value">0.30</span></label>
        <input type="range" id="ambient-slider" min="0" max="1" step="0.01" value="0.3">
      </div>

      <div class="control-item">
        <label>旋转速度 <span class="value" id="rotation-value">0.001</span></label>
        <input type="range" id="rotation-slider" min="0" max="0.01" step="0.0001" value="0.001">
      </div>

      <div class="control-item">
        <label>纹理强度 <span class="value" id="texture-value">0.70</span></label>
        <input type="range" id="texture-slider" min="0" max="1" step="0.01" value="0.7">
      </div>

      <div class="control-item">
        <button class="toggle-btn active" id="rotation-toggle">自转：开启</button>
      </div>
    </div>
  </div>

  <script type="module" src="/src/main.ts"></script>
</body>
</html>
