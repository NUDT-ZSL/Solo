<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sketch to Particle Cloud</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      html, body {
        width: 100%;
        height: 100%;
        overflow: hidden;
        font-family: 'IBM Plex Mono', monospace;
        background: linear-gradient(180deg, #0B0B1A 0%, #1A1A2E 100%);
        color: #E0E0E0;
        font-size: 14px;
      }
      #loading {
        position: fixed;
        inset: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        background: linear-gradient(180deg, #0B0B1A 0%, #1A1A2E 100%);
        z-index: 9999;
        font-size: 16px;
        letter-spacing: 2px;
      }
      #app {
        width: 100%;
        height: 100%;
        display: flex;
        position: relative;
      }
      .sidebar {
        width: 220px;
        background: rgba(255, 255, 255, 0.05);
        border: 1px solid rgba(255, 255, 255, 0.1);
        backdrop-filter: blur(10px);
        padding: 20px 16px;
        display: flex;
        flex-direction: column;
        gap: 12px;
        z-index: 10;
      }
      .sidebar h3 {
        font-size: 13px;
        font-weight: 500;
        letter-spacing: 1px;
        opacity: 0.7;
        text-transform: uppercase;
      }
      .color-palette {
        display: grid;
        grid-template-columns: repeat(4, 1fr);
        gap: 10px;
      }
      .color-swatch {
        width: 24px;
        height: 24px;
        border-radius: 50%;
        cursor: pointer;
        transition: transform 0.2s ease, box-shadow 0.2s ease;
        border: none;
        padding: 0;
      }
      .color-swatch:hover {
        transform: translateY(-2px);
      }
      .color-swatch.active {
        box-shadow: 0 0 0 3px var(--swatch-color), 0 0 12px 2px var(--swatch-color);
      }
      .slider-wrapper {
        display: flex;
        flex-direction: column;
        gap: 8px;
      }
      .slider-wrapper label {
        display: flex;
        justify-content: space-between;
        font-size: 12px;
        opacity: 0.8;
      }
      input[type="range"] {
        -webkit-appearance: none;
        appearance: none;
        width: 100%;
        height: 4px;
        border-radius: 2px;
        background: rgba(255, 255, 255, 0.1);
        outline: none;
      }
      input[type="range"]::-webkit-slider-thumb {
        -webkit-appearance: none;
        appearance: none;
        width: 14px;
        height: 14px;
        border-radius: 50%;
        background: var(--brush-color, #FFFFFF);
        cursor: pointer;
        box-shadow: 0 0 8px var(--brush-color, #FFFFFF);
        transition: transform 0.2s ease;
      }
      input[type="range"]::-webkit-slider-thumb:hover {
        transform: translateY(-2px);
      }
      input[type="range"]::-moz-range-thumb {
        width: 14px;
        height: 14px;
        border-radius: 50%;
        background: var(--brush-color, #FFFFFF);
        cursor: pointer;
        border: none;
        box-shadow: 0 0 8px var(--brush-color, #FFFFFF);
      }
      .canvas-container {
        flex: 1;
        display: flex;
        align-items: center;
        justify-content: center;
        position: relative;
      }
      #drawCanvas, #threeCanvas {
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
      }
      #drawCanvas {
        background: #0B0B1A;
        z-index: 2;
      }
      #threeCanvas {
        z-index: 1;
      }
      .reset-btn {
        position: absolute;
        top: 20px;
        right: 20px;
        width: 36px;
        height: 36px;
        border-radius: 50%;
        background: rgba(255, 255, 255, 0.08);
        border: 1px solid rgba(255, 255, 255, 0.1);
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        z-index: 20;
        transition: transform 0.2s ease, background 0.2s ease;
      }
      .reset-btn:hover {
        transform: translateY(-2px);
      }
      .reset-btn:hover svg {
        stroke: #FF6666;
      }
      .reset-btn svg {
        stroke: #FF4444;
        transition: stroke 0.2s ease;
      }
      #tooltip {
        position: fixed;
        padding: 8px 12px;
        background: rgba(0, 0, 0, 0.7);
        color: #FFFFFF;
        border-radius: 8px;
        font-size: 12px;
        pointer-events: none;
        opacity: 0;
        transition: opacity 0.15s ease;
        z-index: 100;
        white-space: nowrap;
      }
      #tooltip.visible {
        opacity: 1;
      }
    </style>
  </head>
  <body>
    <div id="loading">正在初始化粒子引擎...</div>
    <div id="app" style="display:none;">
      <div class="sidebar">
        <h3>画笔颜色</h3>
        <div class="color-palette" id="colorPalette"></div>
        <h3>画笔宽度</h3>
        <div class="slider-wrapper">
          <label>
            <span>笔宽</span>
            <span id="brushSizeLabel">3px</span>
          </label>
          <input type="range" id="brushSize" min="1" max="10" value="3" />
        </div>
      </div>
      <div class="canvas-container" id="canvasContainer">
        <canvas id="drawCanvas"></canvas>
        <canvas id="threeCanvas"></canvas>
      </div>
      <button class="reset-btn" id="resetBtn" title="重置画布">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="23 4 23 10 17 10"></polyline>
          <polyline points="1 20 1 14 7 14"></polyline>
          <path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"></path>
        </svg>
      </button>
      <div id="tooltip"></div>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
