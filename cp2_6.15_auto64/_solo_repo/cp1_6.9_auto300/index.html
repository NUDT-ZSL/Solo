<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>光舞竹影</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #1a1a2e;
      cursor: none;
    }
    #canvas-container {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
    }
    #custom-cursor {
      position: fixed;
      top: 0;
      left: 0;
      width: 16px;
      height: 16px;
      pointer-events: none;
      z-index: 9999;
      transform: translate(-50%, -50%);
      display: none;
    }
    #custom-cursor::before,
    #custom-cursor::after {
      content: '';
      position: absolute;
      background: rgba(144, 238, 144, 0.6);
    }
    #custom-cursor::before {
      width: 1px;
      height: 100%;
      left: 50%;
      transform: translateX(-50%);
    }
    #custom-cursor::after {
      width: 100%;
      height: 1px;
      top: 50%;
      transform: translateY(-50%);
    }
    #shockwave {
      position: fixed;
      top: 0;
      left: 0;
      width: 0;
      height: 0;
      border: 2px solid rgba(255, 215, 0, 0.9);
      border-radius: 50%;
      pointer-events: none;
      z-index: 9998;
      transform: translate(-50%, -50%);
      opacity: 0;
    }
  </style>
</head>
<body>
  <div id="canvas-container"></div>
  <div id="custom-cursor"></div>
  <div id="shockwave"></div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
