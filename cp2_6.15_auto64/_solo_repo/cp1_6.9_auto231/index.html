<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>光痕织网</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@100;200;300;400&display=swap" rel="stylesheet" />
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: linear-gradient(135deg, #0a0a1a 0%, #1a1a2e 100%);
      font-family: 'JetBrains Mono', monospace;
    }
    #app {
      width: 100%;
      height: 100%;
      position: relative;
    }
    canvas {
      display: block;
      cursor: crosshair;
    }
    .header {
      position: absolute;
      top: 32px;
      left: 50%;
      transform: translateX(-50%);
      text-align: center;
      pointer-events: none;
      z-index: 10;
    }
    .header h1 {
      font-size: 42px;
      font-weight: 200;
      letter-spacing: 8px;
      background: linear-gradient(90deg, #87ceeb 0%, #dda0dd 100%);
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 12px;
    }
    .header p {
      font-size: 14px;
      font-weight: 300;
      letter-spacing: 2px;
      background: linear-gradient(90deg, #a8d8ea 0%, #d8b5e8 100%);
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
      opacity: 0.9;
    }
  </style>
</head>
<body>
  <div id="app">
    <canvas id="canvas"></canvas>
    <div class="header">
      <h1>光痕织网</h1>
      <p>拖拽绘制 · 悬停触发涟漪</p>
    </div>
  </div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
