<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>熔岩管粒子特效</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #000000;
    }
    #canvas {
      display: block;
      width: 100vw;
      height: 100vh;
      border: none;
    }
    #infoPanel {
      position: fixed;
      top: 20px;
      left: 20px;
      background: rgba(255, 255, 255, 0.1);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      border-radius: 12px;
      padding: 16px;
      color: #FFD700;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      font-size: 14px;
      z-index: 10;
      border: 1px solid rgba(255, 215, 0, 0.2);
      transition: box-shadow 0.3s ease, background 0.3s ease;
      user-select: none;
    }
    #infoPanel.flash {
      box-shadow: 0 0 30px rgba(255, 255, 255, 0.8);
      background: rgba(255, 255, 255, 0.3);
    }
    #infoPanel h3 {
      margin-bottom: 8px;
      font-size: 16px;
      color: #FFA500;
      border-bottom: 1px solid rgba(255, 165, 0, 0.3);
      padding-bottom: 4px;
    }
    #infoPanel .stat {
      margin: 4px 0;
      display: flex;
      justify-content: space-between;
      gap: 20px;
    }
    #infoPanel .stat span:last-child {
      color: #FFF0A0;
      font-weight: bold;
    }
    #statsPanel {
      position: fixed;
      bottom: 20px;
      right: 20px;
      background: rgba(26, 10, 0, 0.7);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      border-radius: 12px;
      padding: 16px;
      color: #FFD700;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      font-size: 13px;
      z-index: 10;
      border: 1px solid rgba(255, 69, 0, 0.3);
      user-select: none;
    }
    #statsPanel h3 {
      margin-bottom: 8px;
      font-size: 14px;
      color: #FF6600;
      border-bottom: 1px solid rgba(255, 69, 0, 0.3);
      padding-bottom: 4px;
    }
    #statsPanel .stat {
      margin: 3px 0;
      display: flex;
      justify-content: space-between;
      gap: 16px;
    }
    #statsPanel .stat span:last-child {
      color: #FFF0A0;
      font-weight: bold;
    }
    .temp-bar {
      width: 100%;
      height: 6px;
      background: linear-gradient(90deg, #2A1000, #FF4500, #FFFF00);
      border-radius: 3px;
      margin-top: 4px;
      position: relative;
      overflow: hidden;
    }
    .temp-indicator {
      position: absolute;
      top: -2px;
      width: 2px;
      height: 10px;
      background: #FFFFFF;
      box-shadow: 0 0 4px rgba(255, 255, 255, 0.8);
      transition: left 0.1s ease;
    }
    #controls {
      position: fixed;
      bottom: 20px;
      left: 20px;
      background: rgba(26, 10, 0, 0.5);
      border-radius: 8px;
      padding: 10px 14px;
      color: rgba(255, 215, 0, 0.7);
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      font-size: 12px;
      z-index: 10;
      user-select: none;
    }
    #controls kbd {
      background: rgba(255, 69, 0, 0.3);
      border: 1px solid rgba(255, 69, 0, 0.5);
      border-radius: 3px;
      padding: 1px 6px;
      color: #FFD700;
      font-family: monospace;
    }
  </style>
</head>
<body>
  <canvas id="canvas"></canvas>
  <div id="infoPanel">
    <h3>熔岩管监控</h3>
    <div class="stat"><span>帧率 FPS</span><span id="fps">0</span></div>
    <div class="stat"><span>粒子总数</span><span id="totalCount">0</span></div>
  </div>
  <div id="statsPanel">
    <h3>实时统计</h3>
    <div class="stat"><span>流动粒子</span><span id="flowingCount">0</span></div>
    <div class="stat"><span>冷却粒子</span><span id="cooledCount">0</span></div>
    <div class="stat"><span>飞溅粒子</span><span id="splashCount">0</span></div>
    <div class="stat"><span>喷发粒子</span><span id="eruptionCount">0</span></div>
    <div class="stat"><span>平均温度</span><span id="avgTemp">0</span></div>
    <div class="temp-bar"><div class="temp-indicator" id="tempIndicator" style="left: 50%;"></div></div>
  </div>
  <div id="controls">
    <kbd>F</kbd> 触发喷发 &nbsp;|&nbsp; 鼠标悬停管道加热飞溅
  </div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
