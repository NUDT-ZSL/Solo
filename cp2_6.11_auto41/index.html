<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>星轨舞者</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: linear-gradient(135deg, #0B0B2A 0%, #1B1B4A 100%);
      font-family: 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
      color: #E0E0E0;
      user-select: none;
      -webkit-user-select: none;
    }

    #loading {
      position: fixed;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #0B0B2A 0%, #1B1B4A 100%);
      z-index: 1000;
      transition: opacity 0.6s ease;
    }

    #loading.fade-out {
      opacity: 0;
      pointer-events: none;
    }

    #loading h1 {
      font-size: 48px;
      font-weight: 300;
      letter-spacing: 12px;
      color: #E0E0E0;
      text-transform: uppercase;
      margin-bottom: 32px;
    }

    .loader-ring {
      width: 48px;
      height: 48px;
      border: 3px solid rgba(135, 206, 235, 0.15);
      border-top-color: #87CEEB;
      border-radius: 50%;
      animation: spin 0.9s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    canvas#game {
      display: block;
      width: 100%;
      height: 100%;
      cursor: crosshair;
    }
  </style>
</head>
<body>
  <div id="loading">
    <h1>星轨舞者</h1>
    <div class="loader-ring"></div>
  </div>
  <canvas id="game"></canvas>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
