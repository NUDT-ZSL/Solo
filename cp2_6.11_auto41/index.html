<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>残章卷轴</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      font-family: 'Noto Serif SC', serif;
    }

    body {
      background: linear-gradient(180deg, #F5E6C8 0%, #E8D5B7 100%);
    }

    .app {
      width: 100vw;
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .title-area {
      height: 10vh;
      display: flex;
      align-items: center;
      justify-content: center;
      user-select: none;
    }

    .title {
      font-size: 24px;
      color: #3D2910;
      text-shadow: 1px 1px 3px rgba(212, 175, 55, 0.4);
      letter-spacing: 8px;
      font-weight: 700;
    }

    .scroll-container {
      flex: 1;
      max-height: 70vh;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      width: 100%;
    }

    .scroll-wrapper {
      position: relative;
      display: flex;
      align-items: center;
      height: 100%;
      width: 80%;
      max-width: 80vw;
    }

    .scroll-rod {
      width: 28px;
      height: 110%;
      border-radius: 14px;
      background: linear-gradient(90deg, #8B6E4E 0%, #6B4F30 50%, #8B6E4E 100%);
      box-shadow: 
        inset 2px 0 4px rgba(0,0,0,0.3),
        inset -2px 0 4px rgba(255,255,255,0.1),
        0 4px 12px rgba(0,0,0,0.25);
      flex-shrink: 0;
      position: relative;
      z-index: 3;
    }

    .scroll-rod::before,
    .scroll-rod::after {
      content: '';
      position: absolute;
      left: -4px;
      right: -4px;
      height: 20px;
      background: linear-gradient(90deg, #5C4020 0%, #8B6E4E 50%, #5C4020 100%);
      border-radius: 10px;
      box-shadow: 0 2px 6px rgba(0,0,0,0.35);
    }

    .scroll-rod::before { top: -10px; }
    .scroll-rod::after { bottom: -10px; }

    .scroll-canvas-wrapper {
      position: relative;
      flex: 1;
      height: 100%;
      overflow: hidden;
    }

    #scrollCanvas {
      display: block;
      width: 100%;
      height: 100%;
      cursor: pointer;
    }

    .navigation-area {
      width: 100%;
      padding: 16px 0 24px;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .chapter-nav {
      position: relative;
      width: 60%;
      max-width: 600px;
      height: 14px;
      border-radius: 7px;
      background: linear-gradient(90deg, #8B6E4E 0%, #A68358 50%, #8B6E4E 100%);
      box-shadow: 
        inset 0 1px 2px rgba(255,255,255,0.15),
        inset 0 -1px 2px rgba(0,0,0,0.3),
        0 2px 8px rgba(0,0,0,0.2);
      display: flex;
      align-items: center;
      justify-content: space-around;
      padding: 0 20px;
      opacity: 0.85;
      transition: opacity 0.3s ease;
    }

    .chapter-nav:hover {
      opacity: 1;
    }

    .chapter-dot {
      width: 18px;
      height: 18px;
      border-radius: 50%;
      background: linear-gradient(135deg, #5C4020, #3D2910);
      border: 2px solid #C58B3C;
      cursor: pointer;
      position: relative;
      z-index: 2;
      opacity: 0.7;
      transition: all 0.3s ease;
      transform: scale(0.85);
    }

    .chapter-dot:hover {
      opacity: 1;
      transform: scale(1);
      box-shadow: 0 0 10px rgba(212, 175, 55, 0.6);
    }

    .chapter-dot.active {
      background: linear-gradient(135deg, #D4AF37, #C58B3C);
      border-color: #F5E6C8;
      opacity: 1;
      transform: scale(1.1);
      box-shadow: 0 0 14px rgba(212, 175, 55, 0.8);
    }

    @media (max-width: 768px) {
      .title {
        font-size: 18px;
        letter-spacing: 4px;
      }

      .scroll-wrapper {
        width: 95%;
        max-width: 95vw;
      }

      .scroll-rod {
        width: 18px;
        border-radius: 9px;
      }

      .navigation-area {
        overflow-x: auto;
        justify-content: flex-start;
        padding: 12px 16px 20px;
        -webkit-overflow-scrolling: touch;
      }

      .chapter-nav {
        width: auto;
        min-width: 100%;
        padding: 0 16px;
        gap: 24px;
      }
    }
  </style>
</head>
<body>
  <div class="app">
    <div class="title-area">
      <h1 class="title">残 章 卷 轴</h1>
    </div>
    <div class="scroll-container">
      <div class="scroll-wrapper" id="scrollWrapper">
        <div class="scroll-rod" id="leftRod"></div>
        <div class="scroll-canvas-wrapper">
          <canvas id="scrollCanvas"></canvas>
        </div>
        <div class="scroll-rod" id="rightRod"></div>
      </div>
    </div>
    <div class="navigation-area">
      <div class="chapter-nav" id="chapterNav"></div>
    </div>
  </div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
