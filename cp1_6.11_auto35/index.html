<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pixel Icon Generator</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      height: 100%;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #1E1E2E;
      color: #ffffff;
      overflow: hidden;
    }

    #app {
      width: 100%;
      max-width: 800px;
      height: 100vh;
      margin: 0 auto;
      display: flex;
      flex-direction: column;
      position: relative;
    }

    .controls {
      flex: 0 0 30%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px;
      position: sticky;
      top: 0;
      background: #1E1E2E;
      z-index: 10;
      gap: 20px;
    }

    .input-wrapper {
      width: 100%;
      max-width: 400px;
      position: relative;
    }

    #wordInput {
      width: 100%;
      padding: 12px 16px;
      font-size: 18px;
      background: #0D0D1A;
      border: none;
      border-radius: 8px;
      color: #ffffff;
      outline: none;
      font-family: inherit;
      transition: box-shadow 0.3s ease;
    }

    #wordInput::placeholder {
      color: #A0A0A0;
    }

    .input-underline {
      position: absolute;
      bottom: 0;
      left: 50%;
      width: 0;
      height: 2px;
      background: #00FFFF;
      transform: translateX(-50%);
      transition: width 0.3s ease;
      border-radius: 2px;
    }

    #wordInput:focus + .input-underline {
      width: 100%;
    }

    .generate-btn {
      padding: 10px 32px;
      font-size: 14px;
      background: #00FFFF;
      color: #0D0D1A;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-weight: 600;
      transition: transform 0.2s, box-shadow 0.2s;
    }

    .generate-btn:hover {
      transform: translateY(-1px);
      box-shadow: 0 4px 12px rgba(0, 255, 255, 0.3);
    }

    .generate-btn:active {
      transform: translateY(0);
    }

    .mood-buttons {
      display: flex;
      gap: 16px;
      flex-wrap: wrap;
      justify-content: center;
    }

    .mood-btn {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      border: 2px solid transparent;
      cursor: pointer;
      font-size: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.3s ease;
      position: relative;
    }

    .mood-btn.happy { background: #FFD700; }
    .mood-btn.sad { background: #00BFFF; }
    .mood-btn.angry { background: #DC143C; }
    .mood-btn.calm { background: #98FF98; }

    .mood-btn.selected {
      border-color: #00FFFF;
      animation: pulse-glow 1s infinite;
    }

    @keyframes pulse-glow {
      0%, 100% {
        box-shadow: 0 0 6px rgba(0, 255, 255, 0.6);
      }
      50% {
        box-shadow: 0 0 12px rgba(0, 255, 255, 0.9);
      }
    }

    .canvas-container {
      flex: 1 1 70%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: #0D0D1A;
      position: relative;
      overflow: hidden;
    }

    #pixelCanvas {
      max-width: 400px;
      max-height: 400px;
      image-rendering: pixelated;
      image-rendering: crisp-edges;
    }

    .info-text {
      margin-top: 16px;
      font-size: 12px;
      color: #A0A0A0;
    }

    .loading {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      color: #A0A0A0;
      font-size: 14px;
    }

    @media (max-width: 900px) {
      #app {
        width: 100%;
      }

      .controls {
        flex: 0 0 40%;
        padding: 16px;
        gap: 16px;
      }

      .canvas-container {
        flex: 1 1 60%;
      }

      #wordInput {
        font-size: 16px;
        padding: 10px 14px;
      }

      .generate-btn {
        padding: 8px 24px;
        font-size: 13px;
      }

      .mood-btn {
        width: 36px;
        height: 36px;
        font-size: 18px;
      }

      .mood-buttons {
        gap: 12px;
      }

      .info-text {
        font-size: 11px;
      }
    }

    @media (max-width: 480px) {
      .controls {
        padding: 12px;
        gap: 12px;
      }

      #wordInput {
        font-size: 15px;
      }

      .mood-btn {
        width: 32px;
        height: 32px;
        font-size: 16px;
      }

      #pixelCanvas {
        max-width: 300px;
        max-height: 300px;
      }
    }
  </style>
</head>
<body>
  <div id="app">
    <div class="controls">
      <div class="input-wrapper">
        <input
          type="text"
          id="wordInput"
          placeholder="Enter a word (max 16 chars)"
          maxlength="16"
          autocomplete="off"
        />
        <div class="input-underline"></div>
      </div>
      <button class="generate-btn" id="generateBtn">Generate</button>
      <div class="mood-buttons">
        <button class="mood-btn happy selected" data-mood="happy" title="Happy">😊</button>
        <button class="mood-btn sad" data-mood="sad" title="Sad">😢</button>
        <button class="mood-btn angry" data-mood="angry" title="Angry">😡</button>
        <button class="mood-btn calm" data-mood="calm" title="Calm">😌</button>
      </div>
    </div>
    <div class="canvas-container">
      <canvas id="pixelCanvas" width="400" height="400"></canvas>
      <div class="info-text" id="infoText">0 characters · Happy</div>
    </div>
  </div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
