<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>城市建筑阴影动态模拟</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0a0a0a;
    }

    #canvas-container {
      width: 100%;
      height: 100%;
      position: relative;
    }

    #canvas-container canvas {
      display: block;
      width: 100%;
      height: 100%;
    }

    .info-panel {
      position: absolute;
      top: 20px;
      left: 20px;
      width: 240px;
      padding: 12px;
      background: rgba(0, 0, 0, 0.6);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      border-radius: 12px 12px 12px 4px;
      color: #ffffff;
      z-index: 100;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
    }

    .info-panel .time {
      font-size: 16px;
      font-weight: 600;
      margin-bottom: 8px;
      letter-spacing: 1px;
    }

    .info-panel .weather {
      font-size: 14px;
      margin-bottom: 6px;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .info-panel .weather-icon {
      font-size: 18px;
    }

    .info-panel .shadow-area {
      font-size: 13px;
      color: #aaaaaa;
      margin-top: 8px;
      padding-top: 8px;
      border-top: 1px solid rgba(255, 255, 255, 0.1);
    }

    .info-panel .shadow-area .value {
      color: #4fc3f7;
      font-weight: 600;
    }
  </style>
</head>
<body>
  <div id="canvas-container">
    <div class="info-panel">
      <div class="time" id="time-display">--:--</div>
      <div class="weather">
        <span class="weather-icon" id="weather-icon">☀️</span>
        <span id="weather-text">晴天</span>
      </div>
      <div class="shadow-area">
        阴影面积：<span class="value" id="shadow-area">0</span> m²
      </div>
    </div>
  </div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
