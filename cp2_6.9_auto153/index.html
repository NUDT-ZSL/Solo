<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>像素精灵 · 音符冒险</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #0B0C10; }
    canvas { display: block; image-rendering: pixelated; image-rendering: crisp-edges; }
    #hud {
      position: absolute;
      top: 16px;
      left: 16px;
      font-family: 'Courier New', monospace;
      font-size: 16px;
      color: #ffffff;
      text-shadow: 2px 2px 0 #000000, -1px -1px 0 #000000;
      letter-spacing: 1px;
      line-height: 1.6;
      user-select: none;
      pointer-events: none;
    }
    #hud .row { display: flex; align-items: center; gap: 8px; }
    #hud .hearts { display: inline-flex; gap: 4px; }
    #hud .heart { width: 14px; height: 14px; background: #ff4757; clip-path: polygon(50% 100%, 0 35%, 20% 10%, 50% 30%, 80% 10%, 100% 35%); }
    #hud .heart.empty { background: #555; }
    #tip {
      position: absolute;
      bottom: 16px;
      left: 50%;
      transform: translateX(-50%);
      font-family: 'Courier New', monospace;
      font-size: 12px;
      color: #aaa;
      text-shadow: 1px 1px 0 #000;
      user-select: none;
      pointer-events: none;
    }
  </style>
</head>
<body>
  <canvas id="game"></canvas>
  <div id="hud">
    <div class="row">得分: <span id="score">0</span></div>
    <div class="row">生命: <span class="hearts" id="hearts"></span></div>
  </div>
  <div id="tip">← → 移动 · 空格 跳跃 · Shift 冲刺 · R 重置</div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
