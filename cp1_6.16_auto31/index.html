<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>三维城市天际线 | 3D City Skyline</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-deep: #0f0f23;
      --bg-panel: rgba(26, 26, 46, 0.8);
      --accent-cyan: #00D2D3;
      --accent-red: #FF6B6B;
      --accent-orange: #FF9F43;
      --text-primary: #ffffff;
      --text-secondary: #a0a0c0;
      --border-radius: 6px;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background-color: var(--bg-deep);
      font-family: 'Inter', sans-serif;
      color: var(--text-primary);
    }

    #app {
      width: 100%;
      height: 100%;
      position: relative;
    }

    #canvas-container {
      width: 100%;
      height: 100%;
      position: absolute;
      top: 0;
      left: 0;
    }

    canvas {
      display: block;
      cursor: grab;
    }

    canvas:active {
      cursor: grabbing;
    }

    .control-panel {
      position: fixed;
      top: 24px;
      left: 24px;
      background: var(--bg-panel);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: var(--border-radius);
      padding: 20px;
      min-width: 280px;
      z-index: 100;
      transition: all 0.2s ease;
    }

    .panel-title {
      font-family: 'Orbitron', sans-serif;
      font-size: 16px;
      font-weight: 700;
      letter-spacing: 2px;
      margin-bottom: 16px;
      color: var(--accent-cyan);
      text-transform: uppercase;
    }

    .control-group {
      margin-bottom: 20px;
    }

    .control-group:last-child {
      margin-bottom: 0;
    }

    .control-label {
      display: block;
      font-size: 12px;
      color: var(--text-secondary);
      margin-bottom: 8px;
      font-weight: 500;
      letter-spacing: 0.5px;
    }

    .slider-wrapper {
      position: relative;
      width: 100%;
      height: 24px;
      display: flex;
      align-items: center;
    }

    input[type="range"] {
      -webkit-appearance: none;
      appearance: none;
      width: 100%;
      height: 4px;
      background: linear-gradient(to right, var(--accent-orange), var(--accent-cyan));
      border-radius: 2px;
      outline: none;
      cursor: pointer;
      position: relative;
      z-index: 2;
    }

    input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none;
      appearance: none;
      width: 16px;
      height: 16px;
      background: var(--text-primary);
      border-radius: 50%;
      cursor: pointer;
      box-shadow: 0 0 10px var(--accent-cyan);
      transition: transform 0.1s ease, box-shadow 0.2s ease;
    }

    input[type="range"]::-webkit-slider-thumb:hover {
      transform: scale(1.2);
      box-shadow: 0 0 15px var(--accent-cyan);
    }

    input[type="range"]::-moz-range-thumb {
      width: 16px;
      height: 16px;
      background: var(--text-primary);
      border-radius: 50%;
      cursor: pointer;
      border: none;
      box-shadow: 0 0 10px var(--accent-cyan);
    }

    .slider-follow-line {
      position: absolute;
      left: 0;
      top: 50%;
      transform: translateY(-50%);
      height: 4px;
      background: var(--accent-cyan);
      border-radius: 2px;
      opacity: 0.8;
      pointer-events: none;
      z-index: 1;
      transition: width 0.05s linear;
    }

    .btn {
      width: 100%;
      padding: 12px 20px;
      background: rgba(0, 210, 211, 0.15);
      border: 1px solid var(--accent-cyan);
      border-radius: var(--border-radius);
      color: var(--text-primary);
      font-family: 'Inter', sans-serif;
      font-size: 13px;
      font-weight: 600;
      letter-spacing: 1px;
      cursor: pointer;
      transition: all 0.15s ease;
      text-transform: uppercase;
    }

    .btn:hover {
      background: rgba(0, 210, 211, 0.3);
      border-color: var(--accent-cyan);
    }

    .btn:active {
      transform: scale(0.95);
      transition: transform 0.1s ease;
    }

    .btn.active {
      background: var(--accent-cyan);
      color: var(--bg-deep);
    }

    .info-panel {
      position: fixed;
      top: 50%;
      right: -360px;
      transform: translateY(-50%);
      width: 320px;
      background: var(--bg-panel);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: var(--border-radius);
      padding: 24px;
      z-index: 100;
      transition: right 0.3s cubic-bezier(0.16, 1, 0.3, 1);
    }

    .info-panel.visible {
      right: 24px;
    }

    .info-panel-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 20px;
      padding-bottom: 16px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.1);
    }

    .info-panel-title {
      font-family: 'Orbitron', sans-serif;
      font-size: 14px;
      font-weight: 700;
      letter-spacing: 2px;
      color: var(--accent-cyan);
      text-transform: uppercase;
    }

    .close-btn {
      width: 28px;
      height: 28px;
      background: transparent;
      border: 1px solid rgba(255, 255, 255, 0.2);
      border-radius: 4px;
      color: var(--text-secondary);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
      transition: all 0.15
