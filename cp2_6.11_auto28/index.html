<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>动态几何徽章生成器</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      min-height: 100vh;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: radial-gradient(ellipse at center, #1E1E2E 0%, #0D0D1A 100%);
      color: white;
      overflow-x: hidden;
    }

    .container {
      display: flex;
      flex-direction: column;
      align-items: center;
      padding-top: 40px;
      padding-bottom: 40px;
      min-height: 100vh;
    }

    .loading {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: #0D0D1A;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 9999;
      transition: opacity 0.5s ease;
    }

    .loading.hidden {
      opacity: 0;
      pointer-events: none;
    }

    .loading-spinner {
      width: 48px;
      height: 48px;
      border: 4px solid rgba(255, 255, 255, 0.1);
      border-top-color: #FF6B6B;
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .input-wrapper {
      width: 300px;
      margin-bottom: 20px;
    }

    #textInput {
      width: 100%;
      height: 44px;
      padding: 0 16px;
      border: none;
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.1);
      color: white;
      font-size: 16px;
      outline: none;
      transition: opacity 0.2s ease, transform 0.2s ease;
      opacity: 0.7;
    }

    #textInput::placeholder {
      color: rgba(255, 255, 255, 0.4);
    }

    #textInput:hover,
    #textInput:focus {
      opacity: 1;
      transform: translateY(-2px);
    }

    .style-buttons {
      display: flex;
      gap: 12px;
      margin-bottom: 30px;
    }

    .style-btn {
      width: 90px;
      height: 36px;
      border: none;
      border-radius: 18px;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      background: rgba(255, 255, 255, 0.15);
      color: white;
      transition: all 0.2s ease;
      opacity: 0.7;
    }

    .style-btn:hover {
      opacity: 1;
      transform: translateY(-2px);
    }

    .style-btn.active-minimal {
      background: #FFFFFF;
      color: #1E1E2E;
      opacity: 1;
    }

    .style-btn.active-cyber {
      background: #FF00FF;
      color: white;
      opacity: 1;
      box-shadow: 0 0 20px rgba(255, 0, 255, 0.5);
    }

    .style-btn.active-nature {
      background: #228B22;
      color: white;
      opacity: 1;
    }

    .badge-container {
      width: 400px;
      height: 400px;
      background: #000000;
      border-radius: 16px;
      box-shadow: 0 0 40px rgba(138, 43, 226, 0.3), 0 0 80px rgba(138, 43, 226, 0.1);
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      overflow: hidden;
      margin-bottom: 30px;
    }

    #badgeCanvas {
      display: block;
    }

    .export-btn {
      width: 120px;
      height: 40px;
      border: none;
      border-radius: 20px;
      background: linear-gradient(135deg, #FF6B6B 0%, #FF8E53 100%);
      color: white;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s ease;
      opacity: 0.7;
    }

    .export-btn:hover {
      opacity: 1;
      transform: translateY(-2px);
    }

    .export-btn:active {
      animation: buttonPress 0.2s ease;
    }

    @keyframes buttonPress {
      0% { transform: scale(1); }
      50% { transform: scale(0.95); }
      100% { transform: scale(1); }
    }

    @media (max-width: 600px) {
      .input-wrapper {
        width: 85%;
      }

      .style-btn {
        width: auto;
        padding: 0 16px;
        flex: 1;
      }

      .style-buttons {
        width: 85%;
      }

      .badge-container {
        width: 90vw;
        height: 90vw;
      }
    }
  </style>
</head>
<body>
  <div class="loading" id="loading">
    <div class="loading-spinner"></div>
  </div>

  <div class="container">
    <div class="input-wrapper">
      <input
        type="text"
        id="textInput"
        placeholder="输入英文单词或短语（最多20字符）"
        maxlength="20"
        autocomplete="off"
      />
    </div>

    <div class="style-buttons">
      <button class="style-btn active-minimal" data-style="minimal">极简</button>
      <button class="style-btn" data-style="cyber">赛博</button>
      <button class="style-btn" data-style="nature">自然</button>
    </div>

    <div class="badge-container">
      <canvas id="badgeCanvas" width="400" height="400"></canvas>
    </div>

    <button class="export-btn" id="exportBtn">导出 PNG</button>
  </div>

  <script type="module" src="/src/main.ts"></script>
</body>
</html>
