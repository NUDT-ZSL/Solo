<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>流光探针 - 交互式颜色提取工具</title>
  <link rel="stylesheet" href="/src/styles.css">
</head>
<body>
  <div id="app">
    <header class="app-header">
      <h1 class="app-title">流光探针</h1>
      <p class="app-subtitle">交互式颜色提取与渐变色生成工具</p>
    </header>

    <main class="app-main">
      <section class="canvas-section" id="canvasSection">
        <div class="upload-zone" id="uploadZone">
          <div class="upload-hint">
            <svg class="upload-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor">
              <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
              <polyline points="17 8 12 3 7 8"></polyline>
              <line x1="12" y1="3" x2="12" y2="15"></line>
            </svg>
            <p>拖入图片或点击上传</p>
            <span class="upload-formats">支持 PNG / JPG / WebP</span>
          </div>
          <input type="file" id="fileInput" accept="image/png,image/jpeg,image/webp" hidden>
        </div>
        <canvas id="mainCanvas" class="main-canvas"></canvas>
        <div class="color-tooltip" id="colorTooltip">
          <div class="tooltip-color" id="tooltipColor"></div>
          <div class="tooltip-values">
            <div class="tooltip-row"><span class="label">HEX</span><span class="value" id="tooltipHex">#000000</span></div>
            <div class="tooltip-row"><span class="label">RGB</span><span class="value" id="tooltipRgb">0, 0, 0</span></div>
            <div class="tooltip-row"><span class="label">HSL</span><span class="value" id="tooltipHsl">0, 0%, 0%</span></div>
          </div>
        </div>
      </section>

      <aside class="side-panel" id="sidePanel">
        <button class="panel-toggle" id="panelToggle" title="折叠/展开面板">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor">
            <polyline points="9 18 15 12 9 6"></polyline>
          </svg>
        </button>

        <div class="panel-content">
          <div class="gradient-preview-section">
            <h3 class="section-title">渐变预览</h3>
            <div class="gradient-bar-container">
              <canvas id="gradientCanvas" class="gradient-canvas"></canvas>
            </div>
            <div class="gradient-controls">
              <button class="mode-btn active" id="linearModeBtn" data-mode="linear">线性渐变</button>
              <button class="mode-btn" id="radialModeBtn" data-mode="radial">径向渐变</button>
            </div>
            <div class="selected-colors">
              <div class="selected-color-item" id="startColorSlot">
                <div class="color-swatch" id="startColorSwatch"></div>
                <span class="color-label">起始色</span>
              </div>
              <div class="selected-color-item" id="endColorSlot">
                <div class="color-swatch" id="endColorSwatch"></div>
                <span class="color-label">结束色</span>
              </div>
            </div>
            <button class="export-btn" id="exportBtn">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor">
                <rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect>
                <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path>
              </svg>
              导出CSS渐变
            </button>
            <div class="copy-feedback" id="copyFeedback">已复制!</div>
          </div>

          <div class="fine-tune-section" id="fineTuneSection" style="display:none;">
            <h3 class="section-title">颜色微调</h3>
            <div class="fine-tune-color">
              <div class="color-preview-large" id="fineTunePreview"></div>
              <div class="lock-btn" id="lockBtn" title="锁定颜色">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor">
                  <rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect>
                  <path d="M7 11V7a5 5 0 0 1 10 0v4"></path>
                </svg>
              </div>
            </div>
            
            <div class="slider-group">
              <div class="slider-label"><span>R</span><input type="number" id="rInput" min="0" max="255" step="1"></div>
              <input type="range" id="rSlider" min="0" max="255" step="1" class="slider slider-r">
            </div>
            <div class="slider-group">
              <div class="slider-label"><span>G</span><input type="number" id="gInput" min="0" max="255" step="1"></div>
              <input type="range" id="gSlider" min="0" max="255" step="1" class="slider slider-g">
            </div>
            <div class="slider-group">
              <div class="slider-label"><span>B</span><input type="number" id="bInput" min="0" max="255" step="1"></div>
              <input type="range" id="bSlider" min="0" max="255" step="1" class="slider slider-b">
            </div>
            
            <div class="slider-divider"></div>
            
            <div class="slider-group">
              <div class="slider-label"><span>H</span><input type="number" id="hInput" min="0" max="360" step="1">°</div>
              <input type="range" id="hSlider" min="0" max="360" step="1" class="slider slider-h">
            </div>
            <div class="slider-group">
              <div class="slider-label"><span>S</span><input type="number" id="sInput" min="0" max="100" step="1">%</div>
              <input type="range" id="sSlider" min="0" max="100" step="1" class="slider slider-s">
            </div>
            <div class="slider-group">
              <div class="slider-label"><span>L</span><input type="number" id="lInput" min="0" max="100" step="1">%</div>
              <input type="range" id="lSlider" min="0" max="100" step="1" class="slider slider-l">
            </div>
          </div>
        </div>
      </aside>
    </main>

    <footer class="app-footer">
      <div class="history-section">
        <div class="history-header">
          <h3 class="section-title">取色历史</h3>
          <button class="clear-btn" id="clearBtn">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor">
              <polyline points="3 6 5 6 21 6"></polyline>
              <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path>
            </svg>
            清空
          </button>
        </div>
        <div class="color-history" id="colorHistory"></div>
      </div>
    </footer>

    <div class="modal-overlay" id="confirmModal" style="display:none;">
      <div class="modal-card">
        <h3 class="modal-title">确认清空</h3>
        <p class="modal-message">确定要清空所有取色历史吗？锁定的颜色也会被移除。</p>
        <div class="modal-actions">
          <button class="modal-btn modal-cancel" id="modalCancel">取消</button>
          <button class="modal-btn modal-confirm" id="modalConfirm">确认清空</button>
        </div>
      </div>
    </div>

    <div class="loading-overlay" id="loadingOverlay">
      <div class="loading-spinner"></div>
      <p>加载中...</p>
    </div>
  </div>

  <script type="module" src="/src/main.ts"></script>
</body>
</html>
