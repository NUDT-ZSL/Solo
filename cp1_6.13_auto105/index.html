<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>太空飞行 - 小行星带冒险</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background-color: #0f172a;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    }

    #game-container {
      width: 100vw;
      height: 100vh;
      position: relative;
    }

    #canvas-container {
      width: 100%;
      height: 100%;
    }

    canvas {
      display: block;
    }

    #hud {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 10;
    }

    #score-display {
      position: absolute;
      top: 20px;
      left: 20px;
      background-color: rgba(0, 0, 0, 0.4);
      color: #ffffff;
      font-size: 24px;
      padding: 8px 16px;
      border-radius: 6px;
      font-weight: 500;
    }

    #health-display {
      position: absolute;
      top: 20px;
      right: 20px;
      display: flex;
      gap: 4px;
    }

    .heart {
      width: 16px;
      height: 16px;
      position: relative;
    }

    .heart::before,
    .heart::after {
      content: '';
      position: absolute;
      width: 8px;
      height: 12px;
      background-color: #ef4444;
      border-radius: 8px 8px 0 0;
    }

    .heart::before {
      left: 8px;
      transform: rotate(45deg);
      transform-origin: 0 100%;
    }

    .heart::after {
      left: 0;
      transform: rotate(-45deg);
      transform-origin: 100% 100%;
    }

    .heart.lost::before,
    .heart.lost::after {
      background-color: #6b7280;
    }

    #pause-overlay {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-color: rgba(0, 0, 0, 0.53);
      display: none;
      align-items: center;
      justify-content: center;
      pointer-events: auto;
    }

    #pause-overlay.active {
      display: flex;
    }

    #pause-text {
      color: #ffffff;
      font-size: 48px;
      font-weight: bold;
    }

    #menu-overlay, #game-over-overlay {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-color: rgba(15, 23, 42, 0.95);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      pointer-events: auto;
      z-index: 20;
    }

    #menu-overlay.hidden, #game-over-overlay.hidden {
      display: none;
    }

    .game-title {
      color: #ffffff;
      font-size: 56px;
      font-weight: bold;
      margin-bottom: 20px;
      text-shadow: 0 0 20px rgba(99, 102, 241, 0.5);
    }

    .game-subtitle {
      color: #94a3b8;
      font-size: 20px;
      margin-bottom: 40px;
    }

    .game-btn {
      background-color: #6366f1;
      color: #ffffff;
      border: none;
      padding: 16px 48px;
      font-size: 20px;
      border-radius: 8px;
      cursor: pointer;
      transition: all 0.2s ease;
      font-weight: 500;
      margin: 10px;
    }

    .game-btn:hover {
      background-color: #818cf8;
      transform: scale(0.95);
    }

    #final-score {
      color: #ffffff;
      font-size: 32px;
      margin-bottom: 10px;
    }

    #high-score {
      color: #fbbf24;
      font-size: 24px;
      margin-bottom: 30px;
    }

    .controls-info {
      color: #64748b;
      font-size: 14px;
      margin-top: 40px;
      text-align: center;
      line-height: 1.8;
    }

    @media (max-width: 1366px) {
      .game-title {
        font-size: 42px;
      }

      .game-subtitle {
        font-size: 16px;
      }

      .game-btn {
        padding: 12px 36px;
        font-size: 16px;
      }

      #score-display {
        font-size: 20px;
        padding: 6px 12px;
      }

      #pause-text {
        font-size: 36px;
      }
    }
  </style>
</head>
<body>
  <div id="game-container">
    <div id="canvas-container"></div>
    
    <div id="hud">
      <div id="score-display">分数: 0</div>
      <div id="health-display">
        <div class="heart"></div>
        <div class="heart"></div>
        <div class="heart"></div>
      </div>
    </div>

    <div id="pause-overlay">
      <div id="pause-text">暂停</div>
    </div>

    <div id="menu-overlay">
      <h1 class="game-title">太空飞行</h1>
      <p class="game-subtitle">小行星带冒险</p>
      <button class="game-btn" id="start-btn">开始游戏</button>
      <div class="controls-info">
        WASD - 移动飞船<br>
        鼠标 - 控制视角<br>
        Shift - 加速 | Ctrl - 减速<br>
        P - 暂停/继续
      </div>
    </div>

    <div id="game-over-overlay" class="hidden">
      <h1 class="game-title">游戏结束</h1>
      <p id="final-score">最终得分: 0</p>
      <p id="high-score">最高分: 0</p>
      <button class="game-btn" id="restart-btn">重新开始</button>
    </div>
  </div>

  <script type="module" src="/src/main.ts"></script>
</body>
</html>
