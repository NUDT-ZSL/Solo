<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>3D 分形树 | Fractal Tree</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      font-family: 'Segoe UI', 'Microsoft YaHei', sans-serif;
    }

    body {
      background: linear-gradient(to bottom, #0a0a2e 0%, #1a0520 100%);
    }

    #app {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
    }

    #control-panel {
      position: fixed;
      top: 20px;
      left: 20px;
      width: 240px;
      height: 320px;
      padding: 20px;
      background: rgba(20, 15, 40, 0.55);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid rgba(150, 120, 255, 0.25);
      border-radius: 8px;
      color: #e0d8ff;
      user-select: none;
      z-index: 100;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
    }

    #panel-header {
      cursor: move;
      padding-bottom: 12px;
      margin-bottom: 16px;
      border-bottom: 1px solid rgba(150, 120, 255, 0.2);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    #panel-header h2 {
      font-size: 15px;
      font-weight: 600;
      letter-spacing: 1px;
      color: #b8a8ff;
      text-shadow: 0 0 10px rgba(150, 120, 255, 0.5);
    }

    .control-group {
      margin-bottom: 16px;
    }

    .control-label {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 6px;
      font-size: 12px;
      color: #c8c0e0;
    }

    .control-value {
      font-weight: 600;
      color: #7cf0c0;
      font-family: 'Consolas', monospace;
    }

    .slider-row {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    input[type="range"] {
      flex: 1;
      -webkit-appearance: none;
      appearance: none;
      height: 4px;
      background: linear-gradient(to right, #4a3a8a, #7cf0c0);
      border-radius: 2px;
      outline: none;
      cursor: pointer;
    }

    input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none;
      appearance: none;
      width: 14px;
      height: 14px;
      background: #fff;
      border-radius: 50%;
      cursor: pointer;
      box-shadow: 0 0 10px rgba(124, 240, 192, 0.8);
      transition: transform 0.15s;
    }

    input[type="range"]::-webkit-slider-thumb:hover {
      transform: scale(1.2);
    }

    input[type="range"]::-moz-range-thumb {
      width: 14px;
      height: 14px;
      background: #fff;
      border: none;
      border-radius: 50%;
      cursor: pointer;
      box-shadow: 0 0 10px rgba(124, 240, 192, 0.8);
    }

    .reset-btn {
      flex-shrink: 0;
      width: 26px;
      height: 26px;
      border: 1px solid rgba(150, 120, 255, 0.35);
      background: rgba(80, 60, 150, 0.3);
      color: #b8a8ff;
      border-radius: 4px;
      cursor: pointer;
      font-size: 11px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s;
    }

    .reset-btn:hover {
      background: rgba(124, 240, 192, 0.2);
      border-color: #7cf0c0;
      color: #7cf0c0;
    }

    .hue-preview {
      display: inline-block;
      width: 16px;
      height: 16px;
      border-radius: 50%;
      margin-left: 6px;
      vertical-align: middle;
      box-shadow: 0 0 8px currentColor;
    }

    #fps-counter {
      position: fixed;
      bottom: 12px;
      right: 16px;
      font-size: 12px;
      color: rgba(255, 255, 255, 0.5);
      font-family: 'Consolas', monospace;
      z-index: 50;
    }
  </style>
</head>
<body>
  <div id="app"></div>

  <div id="control-panel">
    <div id="panel-header">
      <h2>✦ 分形树控制</h2>
    </div>

    <div class="control-group">
      <div class="control-label">
        <span>分形深度</span>
        <span class="control-value" id="depth-value">6</span>
      </div>
      <div class="slider-row">
        <input type="range" id="depth-slider" min="3" max="8" step="1" value="6" />
        <button class="reset-btn" id="depth-reset" title="重置">↺</button>
      </div>
    </div>

    <div class="control-group">
      <div class="control-label">
        <span>长度比例</span>
        <span class="control-value" id="ratio-value">0.65</span>
      </div>
      <div class="slider-row">
        <input type="range" id="ratio-slider" min="0.5" max="0.8" step="0.01" value="0.65" />
        <button class="reset-btn" id="ratio-reset" title="重置">↺</button>
      </div>
    </div>

    <div class="control-group">
      <div class="control-label">
        <span>旋转角度</span>
        <span class="control-value" id="angle-value">30°</span>
      </div>
      <div class="slider-row">
        <input type="range" id="angle-slider" min="10" max="60" step="1" value="30" />
        <button class="reset-btn" id="angle-reset" title="重置">↺</button>
      </div>
    </div>

    <div class="control-group">
      <div class="control-label">
        <span>起始色相
          <span class="hue-preview" id="hue-preview"></span>
        </span>
        <span class="control-value" id="hue-value">30</span>
      </div>
      <div class="slider-row">
        <input type="range" id="hue-slider" min="0" max="360" step="1" value="30" />
        <button class="reset-btn" id="hue-reset" title="重置">↺</button>
      </div>
    </div>
  </div>

  <div id="fps-counter">FPS: --</div>

  <script type="module" src="/src/main.ts"></script>
</body>
</html>
