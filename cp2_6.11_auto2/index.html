<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>熵变棋局</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Ma+Shan+Zheng&family=Noto+Sans+SC:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      font-family: 'Noto Sans SC', sans-serif;
      background: radial-gradient(ellipse at center, #4A3B1A 0%, #0D0D0D 100%);
    }

    #app {
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .game-container {
      width: 100%;
      max-width: 500px;
      padding: 20px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 20px;
    }

    .game-title {
      font-family: 'Ma Shan Zheng', cursive;
      font-size: 42px;
      color: #D4AF37;
      text-shadow: 0 0 20px rgba(212, 175, 55, 0.5);
      letter-spacing: 8px;
    }

    .game-header {
      width: 100%;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 0 10px;
    }

    .turn-indicator {
      display: flex;
      align-items: center;
      gap: 12px;
      color: #D4AF37;
      font-size: 16px;
      font-weight: 500;
    }

    .turn-dot {
      width: 14px;
      height: 14px;
      border-radius: 50%;
      animation: pulse 1.5s ease-in-out infinite;
    }

    .turn-dot.player1 {
      background: #4FC3F7;
      box-shadow: 0 0 10px #4FC3F7;
    }

    .turn-dot.player2 {
      background: #FF7043;
      box-shadow: 0 0 10px #FF7043;
    }

    @keyframes pulse {
      0%, 100% { transform: scale(1); opacity: 1; }
      50% { transform: scale(1.3); opacity: 0.7; }
    }

    .score-board {
      display: flex;
      align-items: center;
      gap: 12px;
      color: #D4AF37;
      font-size: 18px;
      font-weight: 700;
    }

    .score-item {
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .score-dot {
      width: 12px;
      height: 12px;
      border-radius: 50%;
    }

    .score-dot.player1 {
      background: #4FC3F7;
    }

    .score-dot.player2 {
      background: #FF7043;
    }

    .mode-toggle {
      background: rgba(212, 175, 55, 0.2);
      border: 1px solid #D4AF37;
      color: #D4AF37;
      padding: 6px 16px;
      border-radius: 20px;
      font-size: 13px;
      cursor: pointer;
      transition: all 0.2s ease;
      font-family: 'Noto Sans SC', sans-serif;
    }

    .mode-toggle:hover {
      background: rgba(212, 175, 55, 0.4);
      transform: scale(1.05);
    }

    .canvas-wrapper {
      position: relative;
      width: 100%;
      aspect-ratio: 1 / 1;
    }

    #gameCanvas {
      width: 100%;
      height: 100%;
      display: block;
      cursor: pointer;
    }

    .game-footer {
      width: 100%;
      display: flex;
      justify-content: flex-end;
      padding-right: 10px;
    }

    .reset-btn {
      background: #D4AF37;
      color: #0D0D0D;
      border: none;
      padding: 10px 24px;
      border-radius: 8px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s ease;
      font-family: 'Noto Sans SC', sans-serif;
      box-shadow: 0 0 15px rgba(212, 175, 55, 0.3);
    }

    .reset-btn:hover {
      transform: scale(1.05);
      box-shadow: 0 0 25px rgba(212, 175, 55, 0.5);
    }

    .game-result {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      background: rgba(13, 13, 13, 0.9);
      border: 2px solid #D4AF37;
      border-radius: 16px;
      padding: 30px 50px;
      text-align: center;
      z-index: 10;
      box-shadow: 0 0 30px rgba(212, 175, 55, 0.4);
    }

    .result-text {
      font-family: 'Ma Shan Zheng', cursive;
      font-size: 36px;
      color: #D4AF37;
      margin-bottom: 16px;
    }

    .result-subtext {
      color: #D4AF37;
      font-size: 16px;
      opacity: 0.8;
    }

    .hidden {
      display: none !important;
    }
  </style>
</head>
<body>
  <div id="app">
    <div class="game-container">
      <h1 class="game-title">熵变棋局</h1>
      
      <div class="game-header">
        <div class="turn-indicator">
          <span class="turn-dot player1" id="turnDot"></span>
          <span id="turnText">玩家1 回合</span>
        </div>
        <button class="mode-toggle" id="modeToggle">双人对战</button>
        <div class="score-board">
          <div class="score-item">
            <span class="score-dot player1"></span>
            <span id="player1Score">0</span>
          </div>
          <span>:</span>
          <div class="score-item">
            <span id="player2Score">0</span>
            <span class="score-dot player2"></span>
          </div>
        </div>
      </div>

      <div class="canvas-wrapper">
        <canvas id="gameCanvas" width="460" height="460"></canvas>
        <div class="game-result hidden" id="gameResult">
          <div class="result-text" id="resultText"></div>
          <div class="result-subtext">点击重置开始新一局</div>
        </div>
      </div>

      <div class="game-footer">
        <button class="reset-btn" id="resetBtn">重置游戏</button>
      </div>
    </div>
  </div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
