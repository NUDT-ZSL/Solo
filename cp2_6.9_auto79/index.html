<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>园林景观四季模拟</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #1a1a2e;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    }
    #app {
      width: 100%;
      height: 100%;
      position: relative;
    }
    canvas {
      display: block;
      width: 100%;
      height: 100%;
    }
    #stats-panel {
      position: absolute;
      top: 20px;
      right: 20px;
      background: rgba(0, 0, 0, 0.6);
      color: #ffffff;
      padding: 12px 16px;
      border-radius: 8px;
      font-size: 14px;
      line-height: 1.8;
      pointer-events: none;
      min-width: 220px;
      backdrop-filter: blur(4px);
    }
    #stats-panel div {
      margin: 2px 0;
    }
    #control-container {
      position: absolute;
      bottom: 40px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      flex-direction: column;
      align-items: center;
      opacity: 0.8;
      transition: opacity 0.2s ease;
    }
    #control-container:hover {
      opacity: 1.0;
    }
    #season-label {
      color: #ffffff;
      font-size: 18px;
      margin-top: 12px;
      text-shadow: 0 2px 4px rgba(0, 0, 0, 0.5);
    }
    #season-slider {
      -webkit-appearance: none;
      appearance: none;
      width: 300px;
      height: 8px;
      border-radius: 4px;
      background: linear-gradient(to right, #32cd32, #006400, #ffa500, #ffffff);
      outline: none;
      cursor: pointer;
      opacity: 0.8;
      transition: opacity 0.2s ease;
    }
    #season-slider:hover {
      opacity: 1.0;
    }
    #season-slider::-webkit-slider-thumb {
      -webkit-appearance: none;
      appearance: none;
      width: 20px;
      height: 20px;
      border-radius: 50%;
      background: var(--thumb-color, #32cd32);
      cursor: pointer;
      border: 2px solid #ffffff;
      box-shadow: 0 2px 6px rgba(0, 0, 0, 0.4);
      transition: transform 0.15s ease, background 0.3s ease;
    }
    #season-slider::-webkit-slider-thumb:hover {
      transform: scale(1.15);
    }
    #season-slider::-moz-range-thumb {
      width: 20px;
      height: 20px;
      border-radius: 50%;
      background: var(--thumb-color, #32cd32);
      cursor: pointer;
      border: 2px solid #ffffff;
      box-shadow: 0 2px 6px rgba(0, 0, 0, 0.4);
      transition: transform 0.15s ease, background 0.3s ease;
    }
    #season-slider::-moz-range-thumb:hover {
      transform: scale(1.15);
    }
    @media (max-width: 1366px) {
      #season-slider {
        width: 240px;
      }
      #stats-panel {
        font-size: 12px;
        min-width: 180px;
        padding: 10px 12px;
      }
      #season-label {
        font-size: 16px;
      }
    }
  </style>
</head>
<body>
  <div id="app">
    <div id="stats-panel">
      <div id="stat-season">季节：春</div>
      <div id="stat-canopy">树冠：rgb(50,205,50)</div>
      <div id="stat-grass">草地：rgb(124,252,0)</div>
      <div id="stat-sky">天空：rgb(135,206,235)</div>
      <div id="stat-particles">粒子：0</div>
    </div>
    <div id="control-container">
      <input type="range" id="season-slider" min="0" max="3" step="0.001" value="0" />
      <div id="season-label">春 · 2024-2025</div>
    </div>
  </div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
