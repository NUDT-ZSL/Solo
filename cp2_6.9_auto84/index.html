<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>重力弹球闯关</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      user-select: none;
      -webkit-user-select: none;
      -webkit-tap-highlight-color: transparent;
    }
    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: linear-gradient(135deg, #0a0a2e 0%, #1a1a3e 100%);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      color: #fff;
    }
    #game-container {
      position: relative;
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    #game-canvas {
      display: block;
      touch-action: none;
    }
    #restart-btn {
      position: absolute;
      top: 20px;
      right: 20px;
      padding: 10px 24px;
      background: linear-gradient(135deg, #4a00e0, #8e2de2);
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: transform 0.2s ease, box-shadow 0.2s ease;
      box-shadow: 0 4px 15px rgba(74, 0, 224, 0.4);
      z-index: 100;
      overflow: hidden;
    }
    #restart-btn:hover {
      transform: scale(1.05);
      box-shadow: 0 6px 20px rgba(74, 0, 224, 0.6);
    }
    #restart-btn:active {
      transform: scale(0.98);
    }
    #restart-btn .ripple {
      position: absolute;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.4);
      transform: scale(0);
      animation: ripple-animation 0.3s ease-out forwards;
      pointer-events: none;
    }
    @keyframes ripple-animation {
      to {
        transform: scale(1);
        opacity: 0;
      }
    }
    @media (max-width: 768px) {
      #game-container {
        flex-direction: column;
      }
      #restart-btn {
        top: 10px;
        right: 10px;
        padding: 8px 18px;
        font-size: 12px;
      }
    }
  </style>
</head>
<body>
  <div id="game-container">
    <canvas id="game-canvas"></canvas>
    <button id="restart-btn">重新开始</button>
  </div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
