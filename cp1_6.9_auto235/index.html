<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>微光回响</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
      background: radial-gradient(ellipse at center, #0a1628 0%, #050a14 50%, #000000 100%);
    }
    #app {
      position: relative;
      width: 100vw;
      height: 100vh;
    }
    canvas {
      display: block;
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      touch-action: none;
      cursor: crosshair;
    }
    .control-panel {
      position: absolute;
      top: 20px;
      left: 20px;
      z-index: 10;
      padding: 16px 20px;
      min-width: 180px;
      background: rgba(10, 20, 40, 0.55);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 12px;
      color: rgba(200, 220, 255, 0.85);
      user-select: none;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
    }
    .panel-title {
      font-size: 13px;
      font-weight: 500;
      letter-spacing: 0.5px;
      margin-bottom: 12px;
      opacity: 0.7;
      text-transform: uppercase;
    }
    .count-wrapper {
      display: flex;
      align-items: baseline;
      gap: 8px;
      margin-bottom: 14px;
    }
    .count-label {
      font-size: 12px;
      opacity: 0.6;
    }
    .count-value {
      font-size: 22px;
      font-weight: 600;
      color: #7fb8ff;
      min-width: 40px;
      transition: color 0.2s;
    }
    .reset-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 100%;
      padding: 9px 14px;
      font-size: 13px;
      font-weight: 500;
      color: rgba(220, 235, 255, 0.9);
      background: rgba(80, 140, 220, 0.25);
      border: 1px solid rgba(120, 180, 255, 0.2);
      border-radius: 8px;
      cursor: pointer;
      transition: all 0.2s ease;
      letter-spacing: 0.3px;
    }
    .reset-btn:hover {
      background: rgba(100, 170, 255, 0.4);
      border-color: rgba(140, 200, 255, 0.4);
      transform: translateY(-1px);
      box-shadow: 0 4px 12px rgba(80, 150, 255, 0.25);
    }
    .reset-btn:active {
      transform: translateY(0);
      background: rgba(80, 140, 220, 0.35);
    }
    .hint {
      position: absolute;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 10;
      font-size: 12px;
      color: rgba(160, 190, 230, 0.35);
      letter-spacing: 0.8px;
      pointer-events: none;
      animation: floatHint 4s ease-in-out infinite;
    }
    @keyframes floatHint {
      0%, 100% { opacity: 0.35; transform: translateX(-50%) translateY(0); }
      50% { opacity: 0.55; transform: translateX(-50%) translateY(-4px); }
    }
    @media (max-width: 640px) {
      .control-panel {
        top: 12px;
        left: 12px;
        padding: 12px 14px;
        min-width: 150px;
      }
      .count-value { font-size: 18px; }
    }
  </style>
</head>
<body>
  <div id="app">
    <canvas id="stage"></canvas>
    <div class="control-panel">
      <div class="panel-title">微光回响</div>
      <div class="count-wrapper">
        <span class="count-label">水泡</span>
        <span class="count-value" id="bubbleCount">0</span>
      </div>
      <button class="reset-btn" id="resetBtn">重置画布</button>
    </div>
    <div class="hint">点击播撒 · 拖拽吸引</div>
  </div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
