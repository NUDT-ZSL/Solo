<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>3D 折纸艺术模拟器</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: linear-gradient(135deg, #3B2E22 0%, #1A1410 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    }

    .app-container {
      width: 1200px;
      height: 700px;
      position: relative;
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
    }

    #canvas-container {
      position: absolute;
      top: 0;
      left: 0;
      width: calc(100% - 220px);
      height: 100%;
    }

    canvas {
      display: block;
      width: 100%;
      height: 100%;
    }

    .control-panel {
      position: absolute;
      top: 0;
      right: 0;
      width: 220px;
      height: 100%;
      background: rgba(59, 46, 34, 0.85);
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 24px;
      backdrop-filter: blur(10px);
    }

    .panel-title {
      color: #E0D4C0;
      font-size: 18px;
      font-weight: 600;
      text-align: center;
      letter-spacing: 2px;
      padding-bottom: 12px;
      border-bottom: 1px solid rgba(224, 212, 192, 0.2);
    }

    .section {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .section-label {
      color: #E0D4C0;
      font-size: 14px;
      font-weight: 500;
    }

    .model-buttons {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .model-btn {
      width: 100%;
      height: 36px;
      border: none;
      border-radius: 8px;
      background: #8B7D6B;
      color: #E0D4C0;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.25s ease;
      letter-spacing: 1px;
    }

    .model-btn:hover {
      background: #9D8F7D;
      transform: translateY(-1px);
    }

    .model-btn.active {
      background: #3B6B8A;
      box-shadow: 3px 3px 8px rgba(0, 0, 0, 0.4);
      color: #FFFFFF;
    }

    .slider-section {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 16px;
    }

    .progress-display {
      color: #5A4A3A;
      font-size: 28px;
      font-weight: 700;
      text-align: center;
      min-width: 80px;
      background: rgba(224, 212, 192, 0.15);
      padding: 8px 16px;
      border-radius: 8px;
    }

    .progress-display span {
      font-size: 18px;
      color: #8B7D6B;
    }

    .slider-wrapper {
      height: 320px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    input[type="range"].vertical-slider {
      -webkit-appearance: none;
      appearance: none;
      width: 320px;
      height: 6px;
      background: #5A4A3A;
      border-radius: 3px;
      outline: none;
      transform: rotate(-90deg);
      transform-origin: center;
      cursor: pointer;
    }

    input[type="range"].vertical-slider::-webkit-slider-thumb {
      -webkit-appearance: none;
      appearance: none;
      width: 16px;
      height: 16px;
      background: #C8B090;
      border-radius: 50%;
      cursor: pointer;
      box-shadow: 0 2px 6px rgba(0, 0, 0, 0.3);
      transition: transform 0.15s ease;
    }

    input[type="range"].vertical-slider::-webkit-slider-thumb:hover {
      transform: scale(1.15);
    }

    input[type="range"].vertical-slider::-moz-range-thumb {
      width: 16px;
      height: 16px;
      background: #C8B090;
      border-radius: 50%;
      cursor: pointer;
      border: none;
      box-shadow: 0 2px 6px rgba(0, 0, 0, 0.3);
    }

    .instructions {
      margin-top: auto;
      padding-top: 16px;
      border-top: 1px solid rgba(224, 212, 192, 0.15);
    }

    .instructions p {
      color: #8B7D6B;
      font-size: 12px;
      line-height: 1.8;
      margin-bottom: 4px;
    }
  </style>
</head>
<body>
  <div class="app-container">
    <div id="canvas-container"></div>
    <div class="control-panel">
      <div class="panel-title">折 纸 艺 术</div>

      <div class="section">
        <div class="section-label">选择模型</div>
        <div class="model-buttons">
          <button class="model-btn active" data-model="crane">纸 鹤</button>
          <button class="model-btn" data-model="boat">纸 船</button>
          <button class="model-btn" data-model="flower">纸 花</button>
        </div>
      </div>

      <div class="section slider-section">
        <div class="section-label">折叠进度</div>
        <div class="progress-display">
          <span id="progress-value">0</span><span>%</span>
        </div>
        <div class="slider-wrapper">
          <input type="range" 
                 class="vertical-slider" 
                 id="fold-slider" 
                 min="0" 
                 max="100" 
                 value="0"
                 step="1">
        </div>
      </div>

      <div class="instructions">
        <p>🖱 拖拽：旋转视角</p>
        <p>🔍 滚轮：缩放</p>
        <p>📐 滑块：控制折叠</p>
      </div>
    </div>
  </div>

  <script type="module" src="/src/main.ts"></script>
</body>
</html>
