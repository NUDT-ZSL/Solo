<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>地下城探险 - 光线追踪</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #0a0a0a;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      font-family: 'Courier New', monospace;
      color: #fff;
      overflow: hidden;
    }

    #game-container {
      position: relative;
      width: 600px;
      height: 600px;
      border: 4px solid #222;
      background: #000;
    }

    #game-canvas {
      display: block;
      width: 600px;
      height: 600px;
      image-rendering: pixelated;
      image-rendering: crisp-edges;
    }

    #hud {
      position: absolute;
      top: 10px;
      left: 10px;
      background: rgba(0, 0, 0, 0.6);
      padding: 12px 16px;
      border: 2px solid #444;
      min-width: 180px;
      font-size: 14px;
      line-height: 1.8;
    }

    .hud-label {
      color: #aaa;
      font-size: 12px;
      letter-spacing: 1px;
    }

    .hud-value {
      color: #fff;
      font-weight: bold;
    }

    #fuel-bar-container {
      width: 160px;
      height: 14px;
      background: #222;
      border: 1px solid #555;
      margin-top: 4px;
      position: relative;
      overflow: hidden;
    }

    #fuel-bar {
      height: 100%;
      width: 100%;
      background: linear-gradient(to right, #ff4444 0%, #ffaa00 50%, #44ff44 100%);
      transition: width 0.1s linear;
    }

    #minimap-container {
      position: absolute;
      top: 10px;
      right: 10px;
      width: 120px;
      height: 120px;
      background: rgba(0, 0, 0, 0.7);
      border: 2px solid #444;
    }

    #minimap {
      display: block;
      width: 120px;
      height: 120px;
    }

    #reset-btn {
      position: absolute;
      bottom: 15px;
      right: 15px;
      background: #555;
      color: #fff;
      border: 2px solid #888;
      padding: 10px 20px;
      font-family: 'Courier New', monospace;
      font-size: 14px;
      cursor: pointer;
      letter-spacing: 2px;
      transition: all 0.15s;
    }

    #reset-btn:hover {
      background: #666;
      border-color: #aaa;
      transform: translateY(-1px);
    }

    #reset-btn:active {
      transform: translateY(1px);
    }

    #victory-overlay {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.85);
      display: none;
      justify-content: center;
      align-items: center;
      flex-direction: column;
      text-align: center;
    }

    #victory-overlay.active {
      display: flex;
    }

    #victory-title {
      font-size: 48px;
      color: #FFD700;
      letter-spacing: 8px;
      margin-bottom: 30px;
      text-shadow: 0 0 20px #FFD700;
      animation: pulse 1.5s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.7; }
    }

    #victory-stats {
      font-size: 18px;
      line-height: 2.5;
      color: #ccc;
    }

    #victory-stats span {
      color: #FFD700;
      font-weight: bold;
    }
  </style>
</head>
<body>
  <div id="game-container">
    <canvas id="game-canvas" width="600" height="600"></canvas>
    
    <div id="hud">
      <div class="hud-label">火把燃料</div>
      <div id="fuel-bar-container">
        <div id="fuel-bar"></div>
      </div>
      <div style="margin-top: 8px;">
        <span class="hud-label">宝石：</span>
        <span class="hud-value" id="gem-count">0</span>
      </div>
      <div>
        <span class="hud-label">步数：</span>
        <span class="hud-value" id="step-count">0</span>
      </div>
    </div>

    <div id="minimap-container">
      <canvas id="minimap" width="120" height="120"></canvas>
    </div>

    <button id="reset-btn">重 置</button>

    <div id="victory-overlay">
      <div id="victory-title">胜 利</div>
      <div id="victory-stats">
        <div>总步数：<span id="final-steps">0</span></div>
        <div>宝石收集：<span id="final-gems">0</span></div>
      </div>
    </div>
  </div>

  <script type="module" src="/src/main.ts"></script>
</body>
</html>
