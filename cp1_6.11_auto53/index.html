<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>算法赛跑 - 代码性能可视化对比</title>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      body {
        background: #0B0C10;
        color: #66FCF1;
        font-family: 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
        min-width: 1024px;
        overflow-x: hidden;
      }
      #root {
        width: 100%;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      .loading-screen {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 20px;
        animation: pulse 1.5s ease-in-out infinite;
      }
      .loading-screen h1 {
        font-size: 2rem;
        letter-spacing: 4px;
        background: linear-gradient(90deg, #66FCF1, #45A29E);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
      }
      .loading-screen p {
        color: #45A29E;
        font-size: 0.9rem;
      }
      @keyframes pulse {
        0%, 100% { opacity: 1; }
        50% { opacity: 0.5; }
      }
    </style>
  </head>
  <body>
    <div id="root">
      <div class="loading-screen">
        <h1>⚡ 算法赛跑</h1>
        <p>正在加载可视化引擎...</p>
      </div>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
