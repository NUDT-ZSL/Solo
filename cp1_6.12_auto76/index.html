<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>音频3D波形景观</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      html, body {
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: #0A0A1A;
        font-family: 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
      }
      #app {
        width: 100%;
        height: 100%;
        position: relative;
      }
      #canvas-container {
        width: 100%;
        height: 100%;
      }
      #debug-fps {
        position: fixed;
        right: 16px;
        bottom: 16px;
        color: #ffffff;
        font-size: 13px;
        font-family: 'Consolas', 'Monaco', monospace;
        text-shadow: 0 0 4px rgba(0, 0, 0, 0.8);
        z-index: 100;
        pointer-events: none;
      }
    </style>
  </head>
  <body>
    <div id="app">
      <div id="canvas-container"></div>
      <div id="debug-fps">FPS: --</div>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
