<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>光轨迷宫</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: radial-gradient(ellipse at center, #0A1128 0%, #1B0A2E 100%);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
    }
    #app {
      width: 100vw;
      height: 100vh;
      display: block;
    }
    #counter {
      position: fixed;
      top: 24px;
      left: 24px;
      font-size: 24px;
      font-weight: 700;
      color: #ffffff;
      z-index: 100;
      -webkit-text-stroke: 1px #FFD700;
      text-stroke: 1px #FFD700;
      text-shadow: 0 0 8px rgba(255, 215, 0, 0.5);
      user-select: none;
      pointer-events: none;
      letter-spacing: 1px;
    }
    #counter.blink {
      animation: blinkAnim 0.5s ease-in-out infinite;
    }
    @keyframes blinkAnim {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.3; }
    }
    #winText {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%) scale(0);
      font-size: 120px;
      font-weight: 900;
      color: #FFD700;
      -webkit-text-stroke: 3px #FF4500;
      text-stroke: 3px #FF4500;
      text-shadow: 0 0 40px rgba(255, 215, 0, 0.8), 0 0 80px rgba(255, 69, 0, 0.6);
      z-index: 200;
      opacity: 0;
      pointer-events: none;
      user-select: none;
      letter-spacing: 8px;
    }
    #winText.show {
      animation: winAnim 2s ease-out forwards;
    }
    @keyframes winAnim {
      0% {
        transform: translate(-50%, -50%) scale(0);
        opacity: 0;
      }
      40% {
        transform: translate(-50%, -50%) scale(1.1);
        opacity: 1;
      }
      70% {
        transform: translate(-50%, -50%) scale(1);
        opacity: 1;
      }
      100% {
        transform: translate(-50%, -50%) scale(1);
        opacity: 0;
      }
    }
    #touchHint {
      position: fixed;
      bottom: 32px;
      left: 50%;
      transform: translateX(-50%);
      color: rgba(255, 255, 255, 0.5);
      font-size: 14px;
      z-index: 50;
      user-select: none;
      pointer-events: none;
    }
    @media (min-width: 768px) {
      #touchHint { display: none; }
    }
  </style>
</head>
<body>
  <canvas id="app"></canvas>
  <div id="counter">光球: 0 / 20</div>
  <div id="winText">通关</div>
  <div id="touchHint">滑动屏幕控制方向</div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
