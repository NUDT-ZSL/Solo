<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>镜影战场</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: linear-gradient(135deg, #1B0A2E 0%, #2A2D34 100%);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
      color: #ffffff;
      user-select: none;
      -webkit-user-select: none;
    }
    #gameContainer {
      position: relative;
      width: 100vw;
      height: 100vh;
      overflow: hidden;
    }
    #gameCanvas {
      display: block;
      width: 100%;
      height: 100%;
    }
    .title-glow {
      position: absolute;
      top: 20px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 28px;
      font-weight: 700;
      letter-spacing: 8px;
      color: #ffffff;
      text-shadow: 0 0 20px #4A90D9, 0 0 40px #4A90D980, 0 0 60px #4A90D940;
      pointer-events: none;
      z-index: 10;
    }
    @media (max-width: 768px) {
      .title-glow {
        font-size: 20px;
        letter-spacing: 4px;
        top: 10px;
      }
    }
  </style>
</head>
<body>
  <div id="gameContainer">
    <div class="title-glow">镜 影 战 场</div>
    <canvas id="gameCanvas"></canvas>
  </div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
