<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>三维声纹雕塑</title>
  <link rel="stylesheet" href="/src/styles.css" />
</head>
<body>
  <div id="app">
    <div id="viewport-container">
      <canvas id="main-canvas"></canvas>
      <canvas id="spectrum-canvas"></canvas>
    </div>
    <div id="control-panel">
      <h2 class="panel-title">声纹控制</h2>

      <div class="control-group">
        <label for="particle-count">粒子密度</label>
        <div class="slider-row">
          <input type="range" id="particle-count" min="50" max="500" step="10" value="150" />
          <span id="particle-count-val" class="slider-val">150</span>
        </div>
      </div>

      <div class="control-group">
        <label for="ring-count">环数</label>
        <div class="slider-row">
          <input type="range" id="ring-count" min="3" max="8" step="1" value="5" />
          <span id="ring-count-val" class="slider-val">5</span>
        </div>
      </div>

      <div class="control-group">
        <button id="record-btn" class="btn-record" data-state="idle" title="开始录制">
          <svg id="icon-idle" class="btn-icon" viewBox="0 0 24 24" width="24" height="24">
            <circle cx="12" cy="12" r="8" fill="#999" />
          </svg>
          <svg id="icon-recording" class="btn-icon hidden" viewBox="0 0 24 24" width="24" height="24">
            <rect x="6" y="6" width="12" height="12" rx="2" fill="#E53935" />
          </svg>
          <svg id="icon-done" class="btn-icon hidden" viewBox="0 0 24 24" width="24" height="24">
            <path d="M12 4V1L8 5l4 4V6a6 6 0 016 6 6 6 0 01-6 6 6 6 0 01-6-6H4a8 8 0 008 8 8 8 0 008-8 8 8 0 00-8-8z" fill="#43A047" />
          </svg>
          <span id="record-label" class="btn-label">录制</span>
        </button>
      </div>

      <div class="control-group">
        <button id="reset-view-btn" class="btn-reset" title="重置视角">
          <svg viewBox="0 0 24 24" width="20" height="20">
            <path d="M12 5V1L7 6l5 5V7c3.31 0 6 2.69 6 6s-2.69 6-6 6-6-2.69-6-6H4c0 4.42 3.58 8 8 8s8-3.58 8-8-3.58-8-8-8z" fill="#FFF" />
          </svg>
          <span>重置视角</span>
        </button>
      </div>

      <div id="status-bar" class="status-bar hidden">
        <span id="status-text"></span>
      </div>
    </div>
  </div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
