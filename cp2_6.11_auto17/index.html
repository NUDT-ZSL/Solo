<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>星语石碑 · Stellar Stele</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      font-family: 'Segoe UI', 'Microsoft YaHei', sans-serif;
    }

    body {
      background: linear-gradient(180deg, #0A1128 0%, #1B0A2E 100%);
      position: relative;
    }

    #app {
      width: 100vw;
      height: 100vh;
      display: block;
    }

    #loading {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: linear-gradient(180deg, #0A1128 0%, #1B0A2E 100%);
      z-index: 100;
      transition: opacity 0.8s ease-out;
    }

    #loading.hidden {
      opacity: 0;
      pointer-events: none;
    }

    .loader {
      width: 60px;
      height: 60px;
      border: 3px solid rgba(212, 175, 55, 0.2);
      border-top-color: #D4AF37;
      border-radius: 50%;
      animation: spin 1.2s linear infinite;
    }

    .loader-text {
      margin-top: 24px;
      color: rgba(255, 255, 255, 0.7);
      font-size: 14px;
      letter-spacing: 4px;
      animation: pulse 2s ease-in-out infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    @keyframes pulse {
      0%, 100% { opacity: 0.5; }
      50% { opacity: 1; }
    }

    #info-panel {
      position: fixed;
      top: 20px;
      right: 20px;
      width: 240px;
      padding: 20px;
      background: rgba(255, 255, 255, 0.2);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border-radius: 16px;
      border: 2px solid #6FA3D9;
      transition: border-color 0.5s ease;
      z-index: 10;
      user-select: none;
    }

    #info-panel.resonance {
      border-color: #D4AF37;
      box-shadow: 0 0 30px rgba(212, 175, 55, 0.3);
    }

    .panel-title {
      color: rgba(255, 255, 255, 0.9);
      font-size: 12px;
      letter-spacing: 2px;
      margin-bottom: 16px;
      text-transform: uppercase;
    }

    .panel-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 8px 0;
      border-bottom: 1px solid rgba(255, 255, 255, 0.1);
    }

    .panel-row:last-child {
      border-bottom: none;
    }

    .panel-label {
      color: rgba(255, 255, 255, 0.6);
      font-size: 11px;
      letter-spacing: 1px;
    }

    .panel-value {
      color: rgba(255, 255, 255, 0.95);
      font-size: 14px;
      font-weight: 600;
    }

    .status-dot {
      display: inline-block;
      width: 8px;
      height: 8px;
      border-radius: 50%;
      margin-right: 6px;
      vertical-align: middle;
    }

    .status-prelude {
      background: #6FA3D9;
      box-shadow: 0 0 8px #6FA3D9;
    }

    .status-resonance {
      background: #D4AF37;
      box-shadow: 0 0 8px #D4AF37;
    }

    #hint {
      position: fixed;
      bottom: 30px;
      left: 50%;
      transform: translateX(-50%);
      color: rgba(255, 255, 255, 0.4);
      font-size: 12px;
      letter-spacing: 2px;
      z-index: 10;
      user-select: none;
      pointer-events: none;
    }
  </style>
</head>
<body>
  <div id="loading">
    <div class="loader"></div>
    <div class="loader-text">召唤星语石碑</div>
  </div>

  <canvas id="app"></canvas>

  <div id="info-panel">
    <div class="panel-title">星语共鸣 · Console</div>
    <div class="panel-row">
      <span class="panel-label">激活符号</span>
      <span class="panel-value" id="activated-count">0 / 12</span>
    </div>
    <div class="panel-row">
      <span class="panel-label">当前状态</span>
      <span class="panel-value" id="current-status">
        <span class="status-dot status-prelude"></span>序曲
      </span>
    </div>
    <div class="panel-row">
      <span class="panel-label">最近共振</span>
      <span class="panel-value" id="last-resonance">--:--</span>
    </div>
  </div>

  <div id="hint">点击符号激活 · 按正确顺序可触发共鸣 · 拖拽旋转 · 滚轮缩放</div>

  <script type="module" src="/src/main.ts"></script>
</body>
</html>
