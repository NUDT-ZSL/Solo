<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>键盘烟花作曲家</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0a0a1a;
    }

    #app {
      position: relative;
      width: 100vw;
      height: 100vh;
    }

    canvas {
      display: block;
      width: 100%;
      height: 100%;
    }

    .hud {
      position: absolute;
      top: 20px;
      left: 20px;
      z-index: 10;
      color: #fff;
      user-select: none;
      pointer-events: none;
    }

    .key-sequence {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 22px;
      font-weight: 600;
      letter-spacing: 2px;
      text-shadow: 0 0 10px rgba(255, 255, 255, 0.3);
    }

    .key-badge {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 36px;
      height: 36px;
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.08);
      border: 1px solid rgba(255, 255, 255, 0.15);
      font-weight: 700;
    }

    .key-arrow {
      opacity: 0.5;
    }

    .score {
      margin-top: 12px;
      font-size: 18px;
      opacity: 0.9;
    }

    .score-value {
      font-size: 32px;
      font-weight: 700;
      text-shadow: 0 0 20px rgba(102, 153, 255, 0.5);
    }

    .miss-flash {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      font-size: 64px;
      font-weight: 800;
      color: #ff3366;
      text-shadow: 0 0 30px #ff3366;
      opacity: 0;
      pointer-events: none;
      animation: none;
      z-index: 20;
    }

    .miss-flash.active {
      animation: missAnim 0.5s ease-out forwards;
    }

    @keyframes missAnim {
      0% { opacity: 0; transform: translate(-50%, -50%) scale(0.5); }
      20% { opacity: 1; transform: translate(-50%, -50%) scale(1.2); }
      100% { opacity: 0; transform: translate(-50%, -50%) scale(1.5); }
    }

    .control-panel {
      position: absolute;
      top: 20px;
      right: 20px;
      width: 280px;
      padding: 20px;
      border-radius: 16px;
      background: rgba(26, 26, 46, 0.88);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      border: 1px solid rgba(255, 255, 255, 0.1);
      color: #fff;
      z-index: 10;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
      cursor: move;
      user-select: none;
    }

    .panel-title {
      font-size: 16px;
      font-weight: 700;
      margin-bottom: 16px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .panel-title::before {
      content: '';
      display: inline-block;
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: linear-gradient(135deg, #3366ff, #ff3366);
    }

    .control-group {
      margin-bottom: 18px;
    }

    .control-label {
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 13px;
      opacity: 0.85;
      margin-bottom: 8px;
    }

    .control-value {
      font-weight: 600;
      color: #6699ff;
    }

    input[type="range"] {
      width: 100%;
      height: 6px;
      border-radius: 3px;
      background: rgba(255, 255, 255, 0.1);
      outline: none;
      -webkit-appearance: none;
      appearance: none;
      cursor: pointer;
    }

    input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 18px;
      height: 18px;
      border-radius: 50%;
      background: linear-gradient(135deg, #3366ff, #9933ff);
      border: 2px solid rgba(255, 255, 255, 0.3);
      cursor: pointer;
      transition: transform 0.15s ease-out;
    }

    input[type="range"]::-webkit-slider-thumb:hover {
      transform: scale(1.1);
    }

    input[type="range"]::-webkit-slider-thumb:active {
      transform: scale(0.95);
    }

    input[type="range"]::-moz-range-thumb {
      width: 18px;
      height: 18px;
      border-radius: 50%;
      background: linear-gradient(135deg, #3366ff, #9933ff);
      border: 2px solid rgba(255, 255, 255, 0.3);
      cursor: pointer;
    }

    .theme-buttons {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .theme-btn,
    .reset-btn {
      flex: 1;
      min-width: 60px;
      padding: 8px 12px;
      border: none;
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.08);
      color: #fff;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: transform 0.15s ease-out, background 0.15s ease-out;
    }

    .theme-btn:hover,
    .reset-btn:hover {
      transform: scale(1.1);
      background: rgba(255, 255, 255, 0.15);
    }

    .theme-btn:active,
    .reset-btn:active {
      transform: scale(0.95);
    }

    .theme-btn.active {
      background: linear-gradient(135deg, #3366ff, #9933ff);
    }

    .reset-btn {
      width: 100%;
      margin-top: 4px;
      background: rgba(255, 51, 102, 0.2);
      border: 1px solid rgba(255, 51, 102, 0.3);
    }

    .reset-btn:hover {
      background: rgba(255, 51, 102, 0.3);
    }

    .panel-toggle {
      display: none;
      position: absolute;
      bottom: 20px;
      right: 20px;
      width: 56px;
      height: 56px;
      border-radius: 50%;
      background: rgba(26, 26, 46, 0.88);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      border: 1px solid rgba(255, 255, 255, 0.15);
      color: #fff;
      font-size: 24px;
      cursor: pointer;
      z-index: 10;
      align-items: center;
      justify-content: center;
      transition: transform 0.15s ease-out;
    }

    .panel-toggle:hover {
      transform: scale(1.1);
    }

    .panel-toggle:active {
      transform: scale(0.95);
    }

    @media (max-width: 768px) {
      .control-panel {
        display: none;
        top: auto;
        bottom: 90px;
        right: 20px;
        left: 20px;
        width: auto;
      }

      .control-panel.open {
        display: block;
      }

      .panel-toggle {
        display: flex;
      }
    }
  </style>
</head>
<body>
  <div id="app">
    <canvas id="fireworksCanvas"></canvas>
    <div class="hud">
      <div class="key-sequence" id="keySequence"></div>
      <div class="score">得分: <span class="score-value" id="scoreValue">0</span></div>
    </div>
    <div class="miss-flash" id="missFlash">MISS!</div>
    <div class="panel-toggle" id="panelToggle">⚙</div>
    <div class="control-panel" id="controlPanel">
      <div class="panel-title">控制面板</div>
      <div class="control-group">
        <div class="control-label">
          <span>粒子数量</span>
          <span class="control-value" id="particleCountValue">30</span>
        </div>
        <input type="range" id="particleCount" min="20" max="80" step="5" value="30" />
      </div>
      <div class="control-group">
        <div class="control-label">
          <span>粒子速度</span>
          <span class="control-value" id="particleSpeedValue">1.0x</span>
        </div>
        <input type="range" id="particleSpeed" min="1" max="5" step="0.5" value="1" />
      </div>
      <div class="control-group">
        <div class="control-label"><span>颜色主题</span></div>
        <div class="theme-buttons">
          <button class="theme-btn active" data-theme="0">霓虹</button>
          <button class="theme-btn" data-theme="1">糖果</button>
          <button class="theme-btn" data-theme="2">极光</button>
        </div>
      </div>
      <button class="reset-btn" id="resetBtn">重置</button>
    </div>
  </div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
