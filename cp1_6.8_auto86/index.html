<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>深空回响 - Deep Space Echo</title>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      html, body, #root { width: 100%; height: 100%; overflow: hidden; background: #000; }
      #cosmos-canvas { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 0; }
      #ui-root { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 10; pointer-events: none; }
      #ui-root > * { pointer-events: auto; }
    </style>
  </head>
  <body>
    <canvas id="cosmos-canvas"></canvas>
    <div id="ui-root"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
