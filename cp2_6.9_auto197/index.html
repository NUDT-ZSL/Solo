<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>量子纠缠粒子对可视化</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: linear-gradient(180deg, #0B0B2A 0%, #1A1A4E 100%);
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    }
    #canvas-container {
      width: 100vw;
      height: 100vh;
      position: relative;
    }
    #hud {
      position: absolute;
      top: 12px;
      left: 12px;
      background: rgba(0, 0, 0, 0.5);
      border-radius: 8px;
      padding: 12px 16px;
      color: #FFFFFF;
      font-size: 14px;
      line-height: 1.8;
      backdrop-filter: blur(4px);
      min-width: 220px;
      z-index: 10;
    }
    #hud .title {
      font-size: 16px;
      font-weight: bold;
      margin-bottom: 8px;
      color: #00F5D4;
      border-bottom: 1px solid rgba(255, 255, 255, 0.1);
      padding-bottom: 6px;
    }
    #hud .label {
      opacity: 0.8;
      display: inline-block;
      width: 110px;
    }
    #hud .value {
      font-family: 'Courier New', monospace;
      font-weight: bold;
    }
    #hud .warning {
      color: #FF006E;
    }
    #hud #burst-count {
      display: inline-block;
      transition: transform 0.3s ease;
    }
    #hud #burst-count.pulse {
      transform: scale(1.2);
    }
    .hint {
      margin-top: 10px;
      padding-top: 8px;
      border-top: 1px solid rgba(255, 255, 255, 0.1);
      font-size: 12px;
      opacity: 0.7;
    }
    .hint .key {
      display: inline-block;
      background: rgba(255, 255, 255, 0.15);
      padding: 1px 6px;
      border-radius: 3px;
      margin: 0 2px;
      font-family: 'Courier New', monospace;
    }
  </style>
</head>
<body>
  <div id="canvas-container">
    <div id="hud">
      <div class="title">量子纠缠粒子对</div>
      <div><span class="label">帧率:</span> <span id="fps" class="value">60 FPS</span></div>
      <div><span class="label">粒子距离:</span> <span id="distance" class="value">0.00</span></div>
      <div><span class="label">爆发次数:</span> <span id="burst-count" class="value">0</span></div>
      <div><span class="label">相机距离:</span> <span id="camera-dist" class="value">8.00</span></div>
      <div><span class="label">相机高度:</span> <span id="camera-height" class="value">3.00</span></div>
      <div class="hint">
        操作提示:<br>
        <span class="key">鼠标拖拽</span> 旋转视角<br>
        <span class="key">滚轮</span> 缩放<br>
        <span class="key">W/S</span> 升降视角
      </div>
    </div>
  </div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
