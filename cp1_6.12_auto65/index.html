<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NeonCortex - 3D神经元网络可视化</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: #0a0a1a;
    }

    #app {
      width: 100%;
      height: 100%;
      position: relative;
    }

    #canvas-container {
      width: 100%;
      height: 100%;
      position: absolute;
      top: 0;
      left: 0;
    }

    .title {
      position: absolute;
      top: 20px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 32px;
      font-weight: bold;
      background: linear-gradient(135deg, #00ffff 0%, #ff00ff 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      text-shadow: 0 0 30px rgba(138, 43, 226, 0.5);
      z-index: 10;
      letter-spacing: 3px;
    }

    .controls-top {
      position: absolute;
      top: 80px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 10;
    }

    .btn {
      padding: 12px 30px;
      font-size: 16px;
      font-weight: 600;
      color: #fff;
      background: rgba(138, 43, 226, 0.3);
      border: 2px solid rgba(138, 43, 226, 0.5);
      border-radius: 8px;
      cursor: pointer;
      transition: all 0.3s ease;
      backdrop-filter: blur(10px);
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .btn:hover {
      background: rgba(138, 43, 226, 0.5);
      border-color: #8a2be2;
      box-shadow: 0 0 20px rgba(138, 43, 226, 0.8);
      transform: scale(1.05);
    }

    .btn:active {
      transform: scale(0.98);
    }

    .btn.cancel {
      background: rgba(255, 68, 68, 0.3);
      border-color: rgba(255, 68, 68, 0.5);
      margin-left: 10px;
    }

    .btn.cancel:hover {
      background: rgba(255, 68, 68, 0.5);
      border-color: #ff4444;
      box-shadow: 0 0 20px rgba(255, 68, 68, 0.8);
    }

    .panel {
      position: absolute;
      top: 50%;
      left: 20px;
      transform: translateY(-50%);
      width: 280px;
      padding: 25px;
      background: rgba(255, 255, 255, 0.1);
      backdrop-filter: blur(10px);
      border-radius: 16px;
      border: 1px solid rgba(255, 255, 255, 0.2);
      z-index: 10;
    }

    .panel-title {
      color: #fff;
      font-size: 18px;
      font-weight: 600;
      margin-bottom: 20px;
      text-align: center;
      text-shadow: 0 0 10px rgba(138, 43, 226, 0.5);
    }

    .control-group {
      margin-bottom: 20px;
    }

    .control-label {
      display: flex;
      justify-content: space-between;
      color: #aaa;
      font-size: 14px;
      margin-bottom: 8px;
    }

    .control-label .value {
      color: #00ffff;
      font-weight: 600;
    }

    input[type="range"] {
      width: 100%;
      height: 6px;
      border-radius: 3px;
      background: rgba(255, 255, 255, 0.2);
      outline: none;
      -webkit-appearance: none;
      cursor: pointer;
    }

    input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 18px;
      height: 18px;
      border-radius: 50%;
      background: linear-gradient(135deg, #8a2be2, #ff00ff);
      border: 2px solid #fff;
      box-shadow: 0 0 10px rgba(138, 43, 226, 0.8);
      transition: all 0.2s ease;
    }

    input[type="range"]::-webkit-slider-thumb:hover {
      transform: scale(1.2);
      box-shadow: 0 0 20px rgba(138, 43, 226, 1);
    }

    .density-buttons {
      display: flex;
      gap: 8px;
    }

    .density-btn {
      flex: 1;
      padding: 8px;
      font-size: 13px;
      color: #aaa;
      background: rgba(255, 255, 255, 0.1);
      border: 1px solid rgba(255, 255, 255, 0.2);
      border-radius: 6px;
      cursor: pointer;
      transition: all 0.3s ease;
    }

    .density-btn:hover {
      border-color: rgba(138, 43, 226, 0.5);
      color: #fff;
    }

    .density-btn.active {
      background: rgba(138, 43, 226, 0.4);
      border-color: #8a2be2;
      color: #fff;
      box-shadow: 0 0 15px rgba(138, 43, 226, 0.5);
    }

    .tooltip {
      position: fixed;
      padding: 8px 12px;
      background: rgba(0, 0, 0, 0.9);
      color: #00ffff;
      font-size: 14px;
      border-radius: 6px;
      border: 1px solid #00ffff;
      pointer-events: none;
      z-index: 100;
      opacity: 0;
      transition: opacity 0.2s ease;
      white-space: nowrap;
      box-shadow: 0 0 15px rgba(0, 255, 255, 0.3);
    }

    .tooltip.visible {
      opacity: 1;
    }

    .stats {
      position: absolute;
      bottom: 20px;
      right: 20px;
      color: rgba(255, 255, 255, 0.6);
      font-size: 12px;
      text-align: right;
      z-index: 10;
    }

    .stats .fps {
      color: #00ff00;
      font-weight: bold;
    }

    .hint {
      position: absolute;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      color: rgba(255, 255, 255, 0.4);
      font-size: 13px;
      z-index: 10;
      text-align: center;
    }

    .hint span {
      color: #00ffff;
      font-weight: 600;
    }
  </style>
</head>
<body>
  <div id="app">
    <div id="canvas-container"></div>
    <h1 class="title">NeonCortex</h1>
    
    <div class="controls-top">
      <button class="btn" id="fire-btn">发射脉冲 (空格)</button>
      <button class="btn cancel" id="cancel-btn">取消脉冲</button>
    </div>

    <div class="panel">
      <h2 class="panel-title">控制面板</h2>
      
      <div class="control-group">
        <div class="control-label">
          <span>脉冲传播速度</span>
          <span class="value" id="speed-value">1.0x</span>
        </div>
        <input type="range" id="speed-slider" min="0.5" max="2" step="0.1" value="1">
      </div>

      <div class="control-group">
        <div class="control-label">
          <span>节点数量</span>
          <span class="value" id="nodes-value">80</span>
        </div>
        <input type="range" id="nodes-slider" min="50" max="120" step="5" value="80">
      </div>

      <div class="control-group">
        <div class="control-label">
          <span>连接密度</span>
        </div>
        <div class="density-buttons">
          <button class="density-btn" data-density="low">低</button>
          <button class="density-btn active" data-density="medium">中</button>
          <button class="density-btn" data-density="high">高</button>
        </div>
      </div>
    </div>

    <div class="tooltip" id="tooltip"></div>

    <div class="stats">
      <div>FPS: <span class="fps" id="fps-display">60</span></div>
      <div>节点: <span id="node-count">80</span></div>
      <div>连接: <span id="connection-count">0</span></div>
    </div>

    <div class="hint">
      <span>点击节点</span> 设置脉冲源 | <span>拖拽</span> 旋转视角 | <span>滚轮</span> 缩放 | <span>空格</span> 发射脉冲
    </div>
  </div>

  <script type="module" src="/src/main.ts"></script>
</body>
</html>
