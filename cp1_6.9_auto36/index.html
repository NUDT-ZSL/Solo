  <head>

    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>极速彩虹 - Rainbow Racing</title>
    <style>
      html, body, #root {
        margin: 0;
        padding: 0;

        align-items: center;

        border: 2px solid rgba(100, 150, 255, 0.3);

        border-radius: 8px;
        image-rendering: pixelated;
      }

    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
