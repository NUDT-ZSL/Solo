<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>星尘织机</title>
  <style>
    @property --reset-c1 {
      syntax: '<color>';
      inherits: false;
      initial-value: #2A2A2A;
    }
    @property --reset-c2 {
      syntax: '<color>';
      inherits: false;
      initial-value: #5C1A1A;
    }
    @property --save-c1 {
      syntax: '<color>';
      inherits: false;
      initial-value: #1A1A4A;
    }
    @property --save-c2 {
      syntax: '<color>';
      inherits: false;
      initial-value: #2C2C6A;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; }
    body {
      background: linear-gradient(160deg, #1A1A1A 0%, #0B132B 100%);
      font-family: "Microsoft YaHei", "微软雅黑", sans-serif;
      color: #E0E0E0;
    }
    #app { width: 100%; height: 100%; position: relative; }
    #mainCanvas {
      display: block;
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 100%;
    }
    #uiPanel {
      position: absolute;
      top: 0; right: 0;
      width: 280px; height: 100%;
      background: rgba(20, 20, 35, 0.55);
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
      border-left: 1px solid rgba(255, 255, 255, 0.08);
      box-shadow: -4px 0 24px rgba(108, 92, 231, 0.15),
                  inset 0 0 30px rgba(78, 205, 196, 0.04);
      padding: 24px 20px;
      display: flex;
      flex-direction: column;
      gap: 18px;
      z-index: 10;
    }
    .panel-title {
      font-size: 18px;
      font-weight: 600;
      letter-spacing: 2px;
      color: #FFD700;
      text-shadow: 0 0 12px rgba(255, 215, 0, 0.4);
      margin-bottom: 6px;
    }
    .slider-group { display: flex; flex-direction: column; gap: 8px; }
    .slider-label {
      font-size: 13px;
      color: #B0B8C8;
      display: flex; justify-content: space-between;
    }
    .slider-value {
      color: #4ECDC4;
      font-weight: 600;
      text-shadow: 0 0 6px rgba(78, 205, 196, 0.5);
    }
    input[type="range"] {
      -webkit-appearance: none;
      appearance: none;
      width: 100%; height: 4px;
      background: linear-gradient(90deg, #6C5CE7 0%, #4ECDC4 100%);
      border-radius: 2px;
      outline: none;
      cursor: pointer;
    }
    input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none;
      appearance: none;
      width: 16px; height: 16px;
      background: #FFD700;
      border-radius: 50%;
      cursor: pointer;
      box-shadow: 0 0 10px rgba(255, 215, 0, 0.6);
      transform: scale(1);
      transition: transform 150ms ease-out;
    }
    input[type="range"]::-webkit-slider-thumb:active {
      transform: scale(1.1);
    }
    input[type="range"]::-moz-range-thumb {
      width: 16px; height: 16px;
      background: #FFD700;
      border: none;
      border-radius: 50%;
      cursor: pointer;
      box-shadow: 0 0 10px rgba(255, 215, 0, 0.6);
      transform: scale(1);
      transition: transform 150ms ease-out;
    }
    input[type="range"]::-moz-range-thumb:active {
      transform: scale(1.1);
    }
    .values-row {
      display: flex;
      justify-content: space-around;
      font-size: 12px;
      color: #8A94A8;
      padding: 8px 4px;
      background: rgba(255, 255, 255, 0.03);
      border-radius: 6px;
    }
    .values-row span b {
      color: #FFD700;
      font-weight: 600;
    }
    #previewCanvas {
      width: 200px; height: 100px;
      align-self: center;
      background: #0B132B;
      border: 1px solid rgba(78, 205, 196, 0.2);
      border-radius: 6px;
      box-shadow: 0 0 16px rgba(108, 92, 231, 0.15);
    }
    .btn-group {
      display: flex;
      flex-direction: column;
      gap: 12px;
      margin-top: auto;
      align-items: center;
    }
    .btn {
      width: 120px; height: 40px;
      border: none;
      border-radius: 6px;
      color: #FFFFFF;
      font-family: "Microsoft YaHei", "微软雅黑", sans-serif;
      font-size: 14px;
      cursor: pointer;
      letter-spacing: 1px;
      box-shadow: 0 0 12px rgba(0, 0, 0, 0.4);
      transition: transform 150ms ease, box-shadow 300ms ease;
    }
    .btn:hover { transform: translateY(-1px); }
    .btn:active { transform: translateY(0); }
    .btn-reset {
      background: linear-gradient(to right, var(--reset-c1), var(--reset-c2));
      transition: --reset-c1 300ms ease, --reset-c2 300ms ease, transform 150ms ease, box-shadow 300ms ease;
    }
    .btn-reset:hover {
      --reset-c1: #8B6914;
      --reset-c2: #D35400;
      box-shadow: 0 0 16px rgba(211, 84, 0, 0.5);
    }
    .btn-save {
      background: linear-gradient(to right, var(--save-c1), var(--save-c2));
      transition: --save-c1 300ms ease, --save-c2 300ms ease, transform 150ms ease, box-shadow 300ms ease;
    }
    .btn-save:hover {
      --save-c1: #4ECDC4;
      --save-c2: #6C5CE7;
      box-shadow: 0 0 16px rgba(108, 92, 231, 0.5);
    }
    @media (max-width: 767px) {
      #uiPanel {
        top: auto; bottom: 0; right: 0; left: 0;
        width: 100%; height: 100px;
        flex-direction: row;
        align-items: center;
        padding: 10px 14px;
        gap: 10px;
        border-left: none;
        border-top: 1px solid rgba(255, 255, 255, 0.08);
      }
      .panel-title { display: none; }
      .slider-group { flex: 1; min-width: 0; }
      .slider-label { font-size: 11px; }
      .values-row { display: none; }
      #previewCanvas { width: 80px; height: 50px; }
      .btn-group { flex-direction: row; margin-top: 0; gap: 8px; }
      .btn { width: 70px; height: 36px; font-size: 12px; }
    }
  </style>
</head>
<body>
  <div id="app">
    <canvas id="mainCanvas"></canvas>
  </div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
