<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>极光栖羽 | Aurora Feather</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><polygon points='50,10 90,90 50,70 10,90' fill='%2300e5ff' stroke='%239c27b0' stroke-width='3'/></svg>" />
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet" />
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: linear-gradient(180deg, #0d1b2a 0%, #1a0a2e 100%);
      font-family: 'Press Start 2P', cursive;
    }
    #game-container {
      width: 100vw;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: radial-gradient(ellipse at center, #1a1a3e 0%, #0d0d1a 70%, #050510 100%);
    }
    canvas {
      box-shadow: 0 0 60px rgba(156, 39, 176, 0.3), 0 0 120px rgba(0, 229, 255, 0.15);
      border-radius: 4px;
      max-width: 100%;
      max-height: 100%;
    }
    @media (max-width: 850px) {
      canvas {
        width: 100vw !important;
        height: auto !important;
        aspect-ratio: 800 / 600;
      }
    }
  </style>
</head>
<body>
  <div id="game-container"></div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
