<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>森语棋局</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Ma+Shan+Zheng&family=Noto+Serif+SC:wght@400;700&display=swap');

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: linear-gradient(135deg, #0B1A10 0%, #0D2B20 100%);
    }

    canvas {
      display: block;
      cursor: default;
    }

    #game-title {
      position: fixed;
      top: 18px;
      left: 50%;
      transform: translateX(-50%);
      font-family: 'Ma Shan Zheng', 'Noto Serif SC', serif;
      font-size: 32px;
      color: #A8E6CF;
      letter-spacing: 12px;
      text-shadow:
        0 0 10px rgba(168, 230, 207, 0.4),
        0 0 30px rgba(168, 230, 207, 0.15);
      pointer-events: none;
      z-index: 10;
      user-select: none;
    }
  </style>
</head>
<body>
  <div id="game-title">森 语 棋 局</div>
  <canvas id="gameCanvas"></canvas>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
