<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>迷宫竞速 - Maze Race</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background-color: #0a0a23;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    }
    
    #game-container {
      width: 100%;
      height: 100%;
      display: flex;
      justify-content: center;
      align-items: center;
      position: relative;
    }
    
    #game-canvas {
      display: block;
      background-color: #0a0a23;
    }
    
    #menu-overlay {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-color: rgba(10, 10, 35, 0.95);
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      z-index: 100;
    }
    
    #menu-overlay h1 {
      font-size: 48px;
      color: #ffd700;
      text-shadow: 0 0 20px #ffd700;
      margin-bottom: 40px;
    }
    
    .player-select {
      display: flex;
      gap: 20px;
      margin-bottom: 30px;
    }
    
    .player-btn {
      padding: 15px 30px;
      font-size: 20px;
      background: linear-gradient(135deg, #2a2a4a, #4a4a8a);
      color: white;
      border: 2px solid #4a4a8a;
      border-radius: 8px;
      cursor: pointer;
      transition: all 0.3s ease;
    }
    
    .player-btn:hover {
      background: linear-gradient(135deg, #4a4a8a, #6a6aaa);
      border-color: #ffd700;
      box-shadow: 0 0 15px rgba(255, 215, 0, 0.5);
    }
    
    .player-btn.selected {
      background: linear-gradient(135deg, #ffd700, #ffaa00);
      color: #0a0a23;
      border-color: #ffd700;
      box-shadow: 0 0 20px rgba(255, 215, 0, 0.7);
    }
    
    #start-btn {
      padding: 20px 60px;
      font-size: 24px;
      background: linear-gradient(135deg, #ffd700, #ffaa00);
      color: #0a0a23;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      font-weight: bold;
      transition: all 0.3s ease;
      text-transform: uppercase;
      letter-spacing: 2px;
    }
    
    #start-btn:hover {
      transform: scale(1.05);
      box-shadow: 0 0 30px rgba(255, 215, 0, 0.8);
    }
    
    .controls-info {
      margin-top: 40px;
      color: #888;
      font-size: 14px;
      text-align: center;
      line-height: 1.8;
    }
    
    .controls-info span {
      color: #ffd700;
      font-weight: bold;
    }
    
    #mobile-menu-btn {
      position: absolute;
      top: 15px;
      left: 15px;
      width: 40px;
      height: 40px;
      background-color: rgba(26, 26, 46, 0.9);
      border: 1px solid #4a4a8a;
      border-radius: 6px;
      cursor: pointer;
      display: none;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      gap: 5px;
      z-index: 50;
    }
    
    #mobile-menu-btn span {
      width: 25px;
      height: 3px;
      background-color: #ffd700;
      border-radius: 2px;
      transition: all 0.3s ease;
    }
    
    #mobile-menu-btn.active span:nth-child(1) {
      transform: rotate(45deg) translate(5px, 5px);
    }
    
    #mobile-menu-btn.active span:nth-child(2) {
      opacity: 0;
    }
    
    #mobile-menu-btn.active span:nth-child(3) {
      transform: rotate(-45deg) translate(6px, -6px);
    }
    
    @media (max-width: 800px) {
      #mobile-menu-btn {
        display: flex;
      }
    }
  </style>
</head>
<body>
  <div id="game-container">
    <button id="mobile-menu-btn">
      <span></span>
      <span></span>
      <span></span>
    </button>
    
    <canvas id="game-canvas"></canvas>
    
    <div id="menu-overlay">
      <h1>🏆 迷宫竞速 🏆</h1>
      <p style="color: #aaa; margin-bottom: 20px; font-size: 18px;">选择玩家数量</p>
      <div class="player-select">
        <button class="player-btn" data-players="2">2 人</button>
        <button class="player-btn selected" data-players="3">3 人</button>
        <button class="player-btn" data-players="4">4 人</button>
      </div>
      <button id="start-btn">开始游戏</button>
      <div class="controls-info">
        <p><span>玩家1 (红):</span> W A S D</p>
        <p><span>玩家2 (蓝):</span> ↑ ↓ ← →</p>
        <p><span>玩家3 (绿):</span> I J K L</p>
        <p><span>玩家4 (橙):</span> 8 4 5 6 (小键盘)</p>
        <p style="margin-top: 15px; color: #ffd700;">收集3把钥匙，找到出口获胜！</p>
      </div>
    </div>
  </div>
  
  <script type="module" src="/src/Game.ts"></script>
</body>
</html>
