<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Audio Particle Galaxy</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      font-family: 'Segoe UI', 'Consolas', monospace, sans-serif;
      background: linear-gradient(to bottom, #0B0B2B 0%, #000000 100%);
      color: #00D4FF;
      user-select: none;
    }

    #app {
      position: relative;
      width: 100%;
      height: 100%;
    }

    #canvas-container {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
    }

    .upload-container {
      position: absolute;
      top: 20px;
      left: 20px;
      z-index: 10;
    }

    .upload-btn {
      background: rgba(0, 212, 255, 0.15);
      border: 1px solid #00D4FF;
      color: #00D4FF;
      padding: 10px 20px;
      border-radius: 6px;
      cursor: pointer;
      font-family: 'Consolas', monospace;
      font-size: 14px;
      transition: all 0.3s ease;
      backdrop-filter: blur(5px);
    }

    .upload-btn:hover {
      background: rgba(0, 212, 255, 0.3);
      box-shadow: 0 0 20px rgba(0, 212, 255, 0.4);
    }

    #file-input {
      display: none;
    }

    .spectrum-panel {
      position: absolute;
      bottom: 20px;
      right: 20px;
      width: 280px;
      background: rgba(0, 0, 0, 0.6);
      border-radius: 8px;
      padding: 15px;
      z-index: 10;
      backdrop-filter: blur(5px);
      border: 1px solid rgba(0, 212, 255, 0.2);
    }

    .spectrum-bars {
      display: flex;
      align-items: flex-end;
      height: 80px;
      gap: 2px;
      margin-bottom: 15px;
    }

    .spectrum-bar {
      flex: 1;
      min-width: 4px;
      max-width: 8px;
      background: linear-gradient(to top, #001a66, #0066ff, #ff6600, #ff0000);
      border-radius: 2px;
      transition: height 0.05s ease-out;
      height: 2px;
    }

    .progress-container {
      margin-bottom: 10px;
    }

    .progress-bar {
      width: 100%;
      height: 6px;
      background: rgba(0, 212, 255, 0.2);
      border-radius: 3px;
      cursor: pointer;
      position: relative;
      overflow: hidden;
    }

    .progress-fill {
      height: 100%;
      background: linear-gradient(90deg, #00D4FF, #0080FF);
      border-radius: 3px;
      width: 0%;
      transition: width 0.1s linear;
    }

    .time-display {
      display: flex;
      justify-content: space-between;
      font-size: 11px;
      color: rgba(0, 212, 255, 0.8);
      font-family: 'Consolas', monospace;
      margin-top: 6px;
    }

    .hint {
      position: absolute;
      bottom: 20px;
      left: 20px;
      font-size: 12px;
      color: rgba(0, 212, 255, 0.6);
      line-height: 1.8;
      z-index: 10;
      font-family: 'Consolas', monospace;
    }

    .hint span {
      color: #00D4FF;
      background: rgba(0, 212, 255, 0.1);
      padding: 1px 6px;
      border-radius: 3px;
      border: 1px solid rgba(0, 212, 255, 0.3);
      margin: 0 2px;
    }

    .status {
      position: absolute;
      top: 20px;
      right: 20px;
      font-size: 12px;
      color: rgba(0, 212, 255, 0.8);
      z-index: 10;
      font-family: 'Consolas', monospace;
      background: rgba(0, 0, 0, 0.4);
      padding: 8px 14px;
      border-radius: 6px;
      border: 1px solid rgba(0, 212, 255, 0.2);
    }
  </style>
</head>
<body>
  <div id="app">
    <div id="canvas-container"></div>

    <div class="upload-container">
      <button class="upload-btn" id="upload-btn">
        🎵 上传音频文件
      </button>
      <input type="file" id="file-input" accept="audio/mp3,audio/wav,audio/mpeg,audio/*" />
    </div>

    <div class="status" id="status">
      等待上传音频文件...
    </div>

    <div class="spectrum-panel">
      <div class="spectrum-bars" id="spectrum-bars"></div>
      <div class="progress-container">
        <div class="progress-bar" id="progress-bar">
          <div class="progress-fill" id="progress-fill"></div>
        </div>
        <div class="time-display">
          <span id="current-time">00:00</span>
          <span id="duration">00:00</span>
        </div>
      </div>
    </div>

    <div class="hint">
      <div><span>鼠标拖拽</span> 旋转视角</div>
      <div><span>滚轮</span> 缩放</div>
      <div><span>空格</span> 暂停/恢复粒子</div>
      <div><span>R</span> 重置视角</div>
      <div><span>↑/↓</span> 调整粒子透明度</div>
    </div>
  </div>

  <script type="module" src="/src/main.ts"></script>
</body>
</html>
