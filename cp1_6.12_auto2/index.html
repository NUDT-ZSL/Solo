<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cyber Snake Battle - 赛博贪吃蛇对战</title>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #0a0a0f;
      font-family: 'Rajdhani', sans-serif;
      color: #e0e0e0;
    }

    #app {
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
    }

    .header {
      height: 60px;
      background: linear-gradient(90deg, #0a0a0f 0%, #1a0a2e 25%, #0a1a2e 50%, #1a0a2e 75%, #0a0a0f 100%);
      border-bottom: 2px solid transparent;
      border-image: linear-gradient(90deg, #a855f7, #06b6d4, #a855f7) 1;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      overflow: hidden;
      flex-shrink: 0;
    }

    .header::before {
      content: '';
      position: absolute;
      top: 0;
      left: -100%;
      width: 100%;
      height: 100%;
      background: linear-gradient(90deg, transparent, rgba(168, 85, 247, 0.3), rgba(6, 182, 212, 0.3), transparent);
      animation: flowLight 3s linear infinite;
    }

    @keyframes flowLight {
      0% { left: -100%; }
      100% { left: 100%; }
    }

    .header h1 {
      font-family: 'Orbitron', sans-serif;
      font-size: 24px;
      font-weight: 900;
      background: linear-gradient(90deg, #a855f7, #06b6d4, #a855f7);
      background-size: 200% 100%;
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      animation: gradientShift 2s ease infinite;
      letter-spacing: 4px;
      text-shadow: 0 0 30px rgba(168, 85, 247, 0.5);
    }

    @keyframes gradientShift {
      0%, 100% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
    }

    .main-container {
      flex: 1;
      display: flex;
      padding: 16px;
      gap: 16px;
      overflow: hidden;
    }

    .game-area {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      overflow: hidden;
      padding: 16px;
    }

    .game-canvas-wrapper {
      position: relative;
      width: 100%;
      max-width: 100%;
      max-height: 100%;
      aspect-ratio: 16 / 9;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    @supports not (aspect-ratio: 16 / 9) {
      .game-canvas-wrapper::before {
        content: '';
        display: block;
        padding-top: 56.25%;
      }
      .game-canvas-wrapper > * {
        position: absolute;
        top: 0;
        left: 0;
      }
    }

    #game-canvas {
      width: 100% !important;
      height: 100% !important;
      border: 2px solid transparent;
      border-image: linear-gradient(135deg, #a855f7, #06b6d4) 1;
      border-radius: 8px;
      box-shadow: 0 0 40px rgba(168, 85, 247, 0.3),
                  0 0 80px rgba(6, 182, 212, 0.2),
                  inset 0 0 60px rgba(168, 85, 247, 0.1);
      display: block;
    }

    .side-panel {
      width: 360px;
      display: flex;
      flex-direction: column;
      gap: 16px;
      flex-shrink: 0;
    }

    .glass-card {
      background: rgba(20, 20, 35, 0.6);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid rgba(168, 85, 247, 0.3);
      border-radius: 12px;
      padding: 16px;
      position: relative;
      overflow: hidden;
    }

    .glass-card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 2px;
      background: linear-gradient(90deg, #a855f7, #06b6d4);
    }

    .card-title {
      font-family: 'Orbitron', sans-serif;
      font-size: 14px;
      font-weight: 700;
      color: #a855f7;
      margin-bottom: 12px;
      letter-spacing: 2px;
      text-transform: uppercase;
    }

    .nickname-input {
      width: 100%;
      padding: 10px 14px;
      background: rgba(0, 0, 0, 0.4);
      border: 1px solid rgba(168, 85, 247, 0.4);
      border-radius: 6px;
      color: #e0e0e0;
      font-family: 'Rajdhani', sans-serif;
      font-size: 14px;
      margin-bottom: 12px;
      transition: all 0.3s ease;
    }

    .nickname-input:focus {
      outline: none;
      border-color: #06b6d4;
      box-shadow: 0 0 15px rgba(6, 182, 212, 0.3);
    }

    .btn {
      padding: 10px 20px;
      background: linear-gradient(135deg, rgba(168, 85, 247, 0.2), rgba(6, 182, 212, 0.2));
      border: 1px solid #a855f7;
      border-radius: 6px;
      color: #fff;
      font-family: 'Orbitron', sans-serif;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s ease;
      letter-spacing: 1px;
      text-transform: uppercase;
      position: relative;
      overflow: hidden;
    }

    .btn::before {
      content: '';
      position: absolute;
      top: 0;
      left: -100%;
      width: 100%;
      height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.2), transparent);
      transition: left 0.5s ease;
    }

    .btn:hover::before {
      left: 100%;
    }

    .btn:hover {
      background: linear-gradient(135deg, rgba(168, 85, 247, 0.4), rgba(6, 182, 212, 0.4));
      box-shadow: 0 0 20px rgba(168, 85, 247, 0.5),
                  0 0 40px rgba(6, 182, 212, 0.3);
      transform: translateY(-2px);
    }

    .btn:active {
      transform: translateY(0);
    }

    .btn-primary {
      background: linear-gradient(135deg, #a855f7, #06b6d4);
      border: none;
    }

    .btn-primary:hover {
      background: linear-gradient(135deg, #9333ea, #0891b2);
      box-shadow: 0 0 30px rgba(168, 85, 247, 0.6),
                  0 0 60px rgba(6, 182, 212, 0.4);
    }

    .btn-group {
      display: flex;
      gap: 8px;
      margin-bottom: 12px;
    }

    .btn-group .btn {
      flex: 1;
    }

    .room-list {
      max-height: 200px;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .room-list::-webkit-scrollbar {
      width: 6px;
    }

    .room-list::-webkit-scrollbar-track {
      background: rgba(0, 0, 0, 0.3);
      border-radius: 3px;
    }

    .room-list::-webkit-scrollbar-thumb {
      background: linear-gradient(180deg, #a855f7, #06b6d4);
      border-radius: 3px;
    }

    .room-item {
      padding: 10px 12px;
      background: rgba(0, 0, 0, 0.3);
      border: 1px solid rgba(168, 85, 247, 0.3);
      border-radius: 6px;
      cursor: pointer;
      transition: all 0.3s ease;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .room-item:hover {
      border-color: #06b6d4;
      background: rgba(6, 182, 212, 0.1);
      box-shadow: 0 0 15px rgba(6, 182, 212, 0.2);
    }

    .room-item.selected {
      border-color: #06b6d4;
      background: rgba(6, 182, 212, 0.15);
    }

    .room-name {
      font-weight: 600;
      color: #e0e0e0;
    }

    .room-info {
      font-size: 12px;
      color: #888;
    }

    .player-list {
      display: flex;
      flex-direction: column;
      gap: 6px;
      margin-bottom: 12px;
    }

    .player-item {
      padding: 8px 10px;
      background: rgba(0, 0, 0, 0.2);
      border-radius: 4px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 13px;
    }

    .player-name {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .player-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
    }

    .player-status {
      font-size: 11px;
      color: #06b6d4;
    }

    .chat-messages {
      height: 150px;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 6px;
      margin-bottom: 10px;
      padding: 8px;
      background: rgba(0, 0, 0, 0.3);
      border-radius: 6px;
    }

    .chat-messages::-webkit-scrollbar {
      width: 4px;
    }

    .chat-messages::-webkit-scrollbar-track {
      background: rgba(0, 0, 0, 0.3);
    }

    .chat-messages::-webkit-scrollbar-thumb {
      background: #a855f7;
      border-radius: 2px;
    }

    .chat-message {
      font-size: 13px;
      line-height: 1.4;
    }

    .chat-sender {
      color: #a855f7;
      font-weight: 600;
    }

    .chat-content {
      color: #ccc;
    }

    .chat-input-container {
      display: flex;
      gap: 8px;
    }

    .chat-input {
      flex: 1;
      padding: 8px 12px;
      background: rgba(0, 0, 0, 0.4);
      border: 1px solid rgba(168, 85, 247, 0.4);
      border-radius: 4px;
      color: #e0e0e0;
      font-family: 'Rajdhani', sans-serif;
      font-size: 13px;
      transition: all 0.3s ease;
    }

    .chat-input:focus {
      outline: none;
      border-color: #06b6d4;
    }

    .send-btn {
      padding: 8px 16px;
      font-size: 11px;
    }

    .overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.85);
      backdrop-filter: blur(10px);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 1000;
    }

    .overlay.active {
      display: flex;
    }

    .stats-panel {
      background: rgba(20, 20, 35, 0.95);
      border: 2px solid transparent;
      border-image: linear-gradient(135deg, #a855f7, #06b6d4) 1;
      border-radius: 16px;
      padding: 32px;
      min-width: 500px;
      max-width: 90%;
      box-shadow: 0 0 60px rgba(168, 85, 247, 0.4),
                  0 0 120px rgba(6, 182, 212, 0.2);
    }

    .stats-title {
      font-family: 'Orbitron', sans-serif;
      font-size: 28px;
      font-weight: 900;
      text-align: center;
      background: linear-gradient(90deg, #a855f7, #06b6d4);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 24px;
      letter-spacing: 3px;
    }

    .stats-table {
      width: 100%;
      border-collapse: collapse;
      margin-bottom: 24px;
    }

    .stats-table th {
      font-family: 'Orbitron', sans-serif;
      font-size: 11px;
      font-weight: 700;
      color: #a855f7;
      text-transform: uppercase;
      letter-spacing: 1px;
      padding: 12px;
      text-align: left;
      border-bottom: 1px solid rgba(168, 85, 247, 0.3);
    }

    .stats-table td {
      padding: 12px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.05);
      font-size: 14px;
    }

    .stats-row.winner {
      background: linear-gradient(90deg, rgba(168, 85, 247, 0.2), transparent);
    }

    .rank-1 { color: #ffd700; font-weight: 700; }
    .rank-2 { color: #c0c0c0; font-weight: 700; }
    .rank-3 { color: #cd7f32; font-weight: 700; }

    .stats-actions {
      display: flex;
      justify-content: center;
      gap: 16px;
    }

    .game-status {
      position: absolute;
      top: 20px;
      left: 50%;
      transform: translateX(-50%);
      font-family: 'Orbitron', sans-serif;
      font-size: 18px;
      font-weight: 700;
      color: #06b6d4;
      text-shadow: 0 0 20px rgba(6, 182, 212, 0.8);
      letter-spacing: 2px;
      z-index: 10;
    }

    @media (max-width: 1024px) {
      .side-panel {
        width: 300px;
      }
    }

    @media (max-width: 768px) {
      .main-container {
        flex-direction: column;
        padding: 8px;
        gap: 8px;
      }

      .side-panel {
        width: 100%;
        max-height: 40vh;
      }

      .header h1 {
        font-size: 16px;
      }

      .stats-panel {
        min-width: 90%;
        padding: 20px;
      }

      .stats-title {
        font-size: 20px;
      }
    }
  </style>
</head>
<body>
  <div id="app">
    <header class="header">
      <h1>CYBER SNAKE BATTLE</h1>
    </header>

    <div class="main-container">
      <div class="game-area">
        <div class="game-canvas-wrapper">
          <div class="game-status" id="game-status">等待加入房间...</div>
          <canvas id="game-canvas"></canvas>
        </div>
      </div>

      <aside class="side-panel">
        <div class="glass-card" id="room-panel">
          <h2 class="card-title">房间系统</h2>
          <input type="text" class="nickname-input" id="nickname-input" placeholder="输入你的昵称..." maxlength="12" />
          <div class="btn-group">
            <button class="btn btn-primary" id="create-room-btn">创建房间</button>
            <button class="btn" id="refresh-rooms-btn">刷新列表</button>
          </div>
          <div class="room-list" id="room-list"></div>
          <div class="player-list" id="player-list" style="display: none;"></div>
          <div class="btn-group" id="room-actions" style="display: none;">
            <button class="btn btn-primary" id="start-game-btn">开始游戏</button>
            <button class="btn" id="leave-room-btn">离开房间</button>
          </div>
        </div>

        <div class="glass-card" id="chat-panel" style="display: none;">
          <h2 class="card-title">聊天频道</h2>
          <div class="chat-messages" id="chat-messages"></div>
          <div class="chat-input-container">
            <input type="text" class="chat-input" id="chat-input" placeholder="发送消息..." maxlength="100" />
            <button class="btn send-btn" id="send-chat-btn">发送</button>
          </div>
        </div>
      </aside>
    </div>

    <div class="overlay" id="stats-overlay">
      <div class="stats-panel">
        <h2 class="stats-title">游戏结束</h2>
        <table class="stats-table">
          <thead>
            <tr>
              <th>排名</th>
              <th>玩家</th>
              <th>得分</th>
              <th>存活时间</th>
              <th>击杀数</th>
            </tr>
          </thead>
          <tbody id="stats-body"></tbody>
        </table>
        <div class="stats-actions">
          <button class="btn btn-primary" id="play-again-btn">再来一局</button>
          <button class="btn" id="back-lobby-btn">返回大厅</button>
        </div>
      </div>
    </div>
  </div>

  <script type="module" src="/src/main.ts"></script>
</body>
</html>
