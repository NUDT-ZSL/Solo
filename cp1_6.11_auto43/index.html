<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>墨韵日记 - 情绪水墨插画</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Ma+Shan+Zheng&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Ma Shan Zheng', cursive;
      background-color: #F5F0E8;
      min-height: 100vh;
      overflow-x: hidden;
    }

    .app-container {
      display: flex;
      width: 100%;
      min-height: 100vh;
      padding: 24px;
      gap: 24px;
    }

    .input-section {
      width: 40%;
      display: flex;
      flex-direction: column;
      gap: 16px;
      opacity: 0;
      transform: translateY(30px);
      animation: fadeInUp 0.5s ease forwards;
    }

    .canvas-section {
      width: 60%;
      opacity: 0;
      transform: translateY(30px);
      animation: fadeInUp 0.5s ease 0.1s forwards;
    }

    @keyframes fadeInUp {
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .glass-card {
      background: rgba(255, 255, 255, 0.55);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid #D4C9B8;
      border-radius: 12px;
      padding: 20px;
    }

    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 8px;
    }

    .title {
      font-size: 28px;
      color: #3B3228;
      letter-spacing: 2px;
    }

    .word-count {
      font-size: 14px;
      color: #8B7B6B;
      font-family: system-ui, -apple-system, sans-serif;
    }

    .textarea-wrapper {
      position: relative;
    }

    textarea {
      width: 100%;
      min-height: 320px;
      background: transparent;
      border: none;
      outline: none;
      resize: vertical;
      font-family: 'Ma Shan Zheng', cursive;
      font-size: 20px;
      line-height: 1.8;
      color: #3B3228;
      caret-color: #3B3228;
    }

    textarea::placeholder {
      color: #B8A898;
    }

    .keywords-panel {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      padding-top: 12px;
      border-top: 1px dashed #D4C9B8;
    }

    .keyword-tag {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 4px 10px;
      border-radius: 999px;
      font-size: 14px;
      color: #3B3228;
      background: rgba(255, 255, 255, 0.7);
      font-family: 'Ma Shan Zheng', cursive;
    }

    .keyword-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
    }

    .legend {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      padding: 10px 0;
    }

    .legend-item {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 14px;
      color: #5A4A3A;
      font-family: system-ui, -apple-system, sans-serif;
    }

    .legend-color {
      width: 14px;
      height: 14px;
      border-radius: 3px;
    }

    .button-group {
      display: flex;
      gap: 12px;
      margin-top: auto;
    }

    .btn {
      flex: 1;
      padding: 12px 20px;
      border: none;
      border-radius: 8px;
      background: #3B3228;
      color: #F5F0E8;
      font-family: 'Ma Shan Zheng', cursive;
      font-size: 18px;
      cursor: pointer;
      transition: all 0.2s ease;
      letter-spacing: 1px;
    }

    .btn:hover {
      background: #5A4A3A;
    }

    .btn:active {
      transform: scale(0.95);
    }

    .btn-secondary {
      background: transparent;
      border: 1.5px solid #3B3228;
      color: #3B3228;
    }

    .btn-secondary:hover {
      background: rgba(59, 50, 40, 0.08);
    }

    .canvas-wrapper {
      position: relative;
      width: 100%;
      height: 100%;
      min-height: 500px;
      border-radius: 12px;
      overflow: hidden;
      background-image: 
        radial-gradient(circle at 20% 30%, rgba(180, 160, 140, 0.08) 0%, transparent 40%),
        radial-gradient(circle at 80% 70%, rgba(180, 160, 140, 0.06) 0%, transparent 40%),
        repeating-linear-gradient(
          0deg,
          transparent,
          transparent 2px,
          rgba(180, 160, 140, 0.03) 2px,
          rgba(180, 160, 140, 0.03) 4px
        ),
        repeating-linear-gradient(
          90deg,
          transparent,
          transparent 2px,
          rgba(180, 160, 140, 0.02) 2px,
          rgba(180, 160, 140, 0.02) 4px
        );
      background-color: #F9F5EE;
      border: 1px solid #D4C9B8;
    }

    canvas {
      display: block;
      width: 100%;
      height: 100%;
    }

    .canvas-hint {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      color: #B8A898;
      font-size: 22px;
      pointer-events: none;
      text-align: center;
    }

    .canvas-hint.hidden {
      display: none;
    }

    @media (max-width: 768px) {
      .app-container {
        flex-direction: column;
        padding: 16px;
      }

      .input-section,
      .canvas-section {
        width: 100%;
      }

      .canvas-wrapper {
        min-height: 350px;
      }

      textarea {
        min-height: 200px;
        font-size: 18px;
      }

      .title {
        font-size: 24px;
      }
    }
  </style>
</head>
<body>
  <div class="app-container">
    <div class="input-section">
      <div class="glass-card">
        <div class="header">
          <h1 class="title">墨韵日记</h1>
          <span class="word-count"><span id="wordCount">0</span> / 500 字</span>
        </div>
        <div class="textarea-wrapper">
          <textarea 
            id="diaryInput" 
            placeholder="写下今天的心情...&#10;让文字化为水墨，&#10;让情绪流淌成画。"
            maxlength="500"
          ></textarea>
        </div>
        <div class="legend">
          <div class="legend-item">
            <span class="legend-color" style="background: #FFD700;"></span>
            <span>高兴</span>
          </div>
          <div class="legend-item">
            <span class="legend-color" style="background: #00BFFF;"></span>
            <span>悲伤</span>
          </div>
          <div class="legend-item">
            <span class="legend-color" style="background: #DC143C;"></span>
            <span>愤怒</span>
          </div>
          <div class="legend-item">
            <span class="legend-color" style="background: #98FF98;"></span>
            <span>平静</span>
          </div>
          <div class="legend-item">
            <span class="legend-color" style="background: #8B7B8B;"></span>
            <span>焦虑</span>
          </div>
        </div>
        <div class="keywords-panel" id="keywordsPanel">
        </div>
      </div>
      <div class="button-group">
        <button class="btn btn-secondary" id="resetBtn">重置</button>
        <button class="btn" id="exportBtn">导出插画</button>
      </div>
    </div>

    <div class="canvas-section">
      <div class="canvas-wrapper" id="canvasWrapper">
        <canvas id="inkCanvas"></canvas>
        <div class="canvas-hint" id="canvasHint">开始书写，画面将随文字流淌...</div>
      </div>
    </div>
  </div>

  <script type="module" src="/src/main.ts"></script>
</body>
</html>
