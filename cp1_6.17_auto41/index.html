<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>分子工坊</title>
    <style>
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      html, body {
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: #263238;
        color: #ECEFF1;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
        -webkit-font-smoothing: antialiased;
      }

      #app {
        width: 100vw;
        height: 100vh;
        position: relative;
      }

      .toolbar {
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        height: 50px;
        background: #37474F;
        display: flex;
        align-items: center;
        padding: 0 16px;
        gap: 8px;
        z-index: 100;
        box-shadow: 0 2px 8px rgba(0,0,0,0.3);
      }

      .toolbar-title {
        font-size: 16px;
        font-weight: 600;
        margin-right: 16px;
        color: #ECEFF1;
        letter-spacing: 1px;
      }

      .molecule-btn {
        position: relative;
        background: #455A64;
        color: #ECEFF1;
        border: none;
        padding: 8px 18px;
        font-size: 14px;
        border-radius: 4px;
        cursor: pointer;
        transition: all 0.2s ease;
        font-family: inherit;
        overflow: hidden;
      }

      .molecule-btn:hover {
        background: #546E7A;
      }

      .molecule-btn.active {
        background: #1E88E5;
      }

      .molecule-btn.active::after {
        content: '';
        position: absolute;
        bottom: 0;
        left: 0;
        right: 0;
        height: 3px;
        background: #64B5F6;
        animation: slideIn 0.2s ease-out;
      }

      @keyframes slideIn {
        from { transform: scaleX(0); }
        to { transform: scaleX(1); }
      }

      .tool-separator {
        width: 1px;
        height: 24px;
        background: #546E7A;
        margin: 0 8px;
      }

      .clipper-btn {
        display: flex;
        align-items: center;
        gap: 6px;
        background: #455A64;
        color: #ECEFF1;
        border: 1px solid #607D8B;
        padding: 7px 14px;
        font-size: 13px;
        border-radius: 4px;
        cursor: pointer;
        transition: all 0.2s ease;
        font-family: inherit;
      }

      .clipper-btn:hover {
        background: #546E7A;
        border-color: #78909C;
      }

      .clipper-btn.active {
        background: #E53935;
        border-color: #EF5350;
        color: #fff;
      }

      .clipper-btn svg {
        width: 16px;
        height: 16px;
      }

      #scene-container {
        position: fixed;
        top: 50px;
        left: 0;
        right: 280px;
        bottom: 0;
      }

      .info-panel {
        position: fixed;
        top: 50px;
        right: 0;
        bottom: 0;
        background: rgba(30, 30, 30, 0.85);
        backdrop-filter: blur(10px);
        overflow-y: auto;
        padding: 20px;
        color: #ECEFF1;
        z-index: 90;
        transition: transform 0.3s ease;
      }

      .panel-wide {
        width: 280px;
      }

      .panel-medium {
        width: 220px;
      }

      .panel-drawer {
        width: 100%;
        right: 0;
        top: 50px;
        bottom: auto;
        max-height: 0;
        overflow: hidden;
        padding: 0 20px;
        transform-origin: top;
        transform: scaleY(0);
        opacity: 0;
        transition: max-height 0.35s cubic-bezier(0.4, 0, 0.2, 1),
                    padding 0.35s cubic-bezier(0.4, 0, 0.2, 1),
                    transform 0.35s cubic-bezier(0.4, 0, 0.2, 1),
                    opacity 0.3s ease-out;
      }

      .panel-drawer.drawer-open {
        max-height: 70vh;
        padding: 20px;
        overflow-y: auto;
        border-bottom: 1px solid #455A64;
        transform: scaleY(1);
        opacity: 1;
      }

      .drawer-toggle {
        display: none;
        position: fixed;
        top: 60px;
        right: 12px;
        background: #455A64;
        color: #ECEFF1;
        border: none;
        padding: 8px 14px;
        border-radius: 4px;
        cursor: pointer;
        z-index: 95;
        font-family: inherit;
        font-size: 13px;
      }

      .drawer-toggle:hover {
        background: #546E7A;
      }

      .panel-header {
        margin-bottom: 20px;
        padding-bottom: 12px;
        border-bottom: 1px solid #455A64;
      }

      .panel-header h2 {
        font-size: 20px;
        font-weight: 600;
        color: #ECEFF1;
      }

      .formula {
        font-size: 13px;
        color: #90A4AE;
        margin-top: 4px;
        font-family: monospace;
      }

      .panel-section {
        margin-bottom: 20px;
      }

      .section-title {
        font-size: 12px;
        text-transform: uppercase;
        letter-spacing: 1px;
        color: #78909C;
        margin-bottom: 10px;
        font-weight: 600;
      }

      .atom-list {
        display: flex;
        flex-direction: column;
        gap: 8px;
      }

      .atom-item {
        display: flex;
        align-items: center;
        gap: 10px;
        padding: 6px 8px;
        background: rgba(69, 90, 100, 0.3);
        border-radius: 4px;
        font-size: 13px;
      }

      .atom-icon {
        width: 16px;
        height: 16px;
        border-radius: 50%;
        flex-shrink: 0;
        border: 1px solid rgba(255,255,255,0.2);
      }

      .atom-symbol {
        font-weight: 700;
        font-family: monospace;
        min-width: 16px;
      }

      .atom-name {
        flex: 1;
        color: #90A4AE;
      }

      .atom-count {
        color: #ECEFF1;
        font-weight: 600;
      }

      .bond-stats {
        display: flex;
        flex-direction: column;
        gap: 8px;
      }

      .bond-row {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 8px 10px;
        background: rgba(69, 90, 100, 0.3);
        border-radius: 4px;
        font-size: 13px;
      }

      .bond-count {
        font-family: monospace;
        font-weight: 700;
        font-size: 16px;
        color: #EF5350;
      }

      .panel-footer {
        border-top: 1px solid #455A64;
        padding-top: 16px;
        margin-top: 20px;
      }

      .tips-title {
        font-size: 12px;
        color: #78909C;
        margin-bottom: 8px;
        font-weight: 600;
      }

      .tips-list {
        list-style: none;
        display: flex;
        flex-direction: column;
        gap: 5px;
      }

      .tips-list li {
        font-size: 12px;
        color: #90A4AE;
        padding-left: 14px;
        position: relative;
      }

      .tips-list li::before {
        content: '▸';
        position: absolute;
        left: 0;
        color: #1E88E5;
      }

      @media (max-width: 1280px) {
        #scene-container {
          right: 220px;
        }
      }

      @media (max-width: 768px) {
        #scene-container {
          right: 0;
        }
        .toolbar-title {
          font-size: 13px;
          margin-right: 8px;
        }
        .molecule-btn {
          padding: 6px 10px;
          font-size: 12px;
        }
        .clipper-btn {
          padding: 6px 10px;
          font-size: 12px;
        }
        .clipper-btn svg {
          width: 14px;
          height: 14px;
        }
      }
    </style>
  </head>
  <body>
    <div id="app">
      <div class="toolbar">
        <span class="toolbar-title">🧪 分子工坊</span>
        <button class="molecule-btn active" data-mol="caffeine">咖啡因</button>
        <button class="molecule-btn" data-mol="glucose">葡萄糖</button>
        <button class="molecule-btn" data-mol="aspirin">阿司匹林</button>
        <div class="tool-separator"></div>
        <button class="clipper-btn" id="clipper-btn">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="6" cy="6" r="3"/>
            <circle cx="18" cy="6" r="3"/>
            <line x1="8.5" y1="8.5" x2="12" y2="12"/>
            <line x1="15.5" y1="8.5" x2="12" y2="12"/>
            <line x1="12" y1="12" x2="12" y2="21"/>
          </svg>
          钳子工具
        </button>
      </div>

      <div id="scene-container"></div>
    </div>

    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
