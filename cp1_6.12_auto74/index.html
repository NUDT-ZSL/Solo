<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>StellarOrrery - 交互式3D太阳系模拟器</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: linear-gradient(135deg, #000011 0%, #0a0a3a 50%, #050520 100%);
      font-family: 'Segoe UI', 'Helvetica Neue', sans-serif;
      color: #ffffff;
    }

    #canvas-container {
      width: 100%;
      height: 100%;
      position: absolute;
      top: 0;
      left: 0;
    }

    canvas {
      display: block;
    }

    .control-panel {
      position: fixed;
      top: 20px;
      left: 20px;
      z-index: 100;
      background: rgba(10, 10, 40, 0.65);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 16px;
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      min-width: 180px;
    }

    .control-panel h3 {
      font-size: 14px;
      font-weight: 600;
      color: rgba(255, 255, 255, 0.7);
      letter-spacing: 1px;
      text-transform: uppercase;
      margin-bottom: 4px;
    }

    .control-btn {
      display: flex;
      align-items: center;
      gap: 8px;
      background: rgba(255, 255, 255, 0.06);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 10px;
      color: #fff;
      padding: 8px 14px;
      font-size: 13px;
      cursor: pointer;
      transition: all 0.15s ease;
      outline: none;
    }

    .control-btn:hover {
      background: rgba(255, 255, 255, 0.12);
      border-color: rgba(255, 255, 255, 0.2);
    }

    .control-btn:active {
      transform: scale(0.95);
    }

    .control-btn.active {
      background: rgba(100, 140, 255, 0.25);
      border-color: rgba(100, 140, 255, 0.4);
    }

    .speed-control {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .speed-control label {
      font-size: 12px;
      color: rgba(255, 255, 255, 0.5);
    }

    .speed-slider {
      -webkit-appearance: none;
      appearance: none;
      width: 100%;
      height: 4px;
      border-radius: 2px;
      background: rgba(255, 255, 255, 0.15);
      outline: none;
    }

    .speed-slider::-webkit-slider-thumb {
      -webkit-appearance: none;
      appearance: none;
      width: 14px;
      height: 14px;
      border-radius: 50%;
      background: #6488ff;
      cursor: pointer;
      border: 2px solid rgba(255, 255, 255, 0.3);
    }

    .speed-labels {
      display: flex;
      justify-content: space-between;
      font-size: 10px;
      color: rgba(255, 255, 255, 0.35);
    }

    .speed-value {
      font-size: 12px;
      color: #6488ff;
      font-weight: 600;
      text-align: center;
    }

    .info-panel {
      position: fixed;
      bottom: 24px;
      right: 24px;
      z-index: 100;
      background: rgba(10, 10, 50, 0.7);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 16px;
      padding: 24px;
      min-width: 280px;
      max-width: 320px;
      transform: translateY(20px);
      opacity: 0;
      transition: opacity 0.3s ease, transform 0.3s ease;
      pointer-events: none;
      background-image: linear-gradient(135deg, rgba(30, 30, 80, 0.6) 0%, rgba(10, 10, 40, 0.7) 100%);
    }

    .info-panel.visible {
      opacity: 1;
      transform: translateY(0);
      pointer-events: auto;
    }

    .info-panel .planet-name {
      font-size: 18px;
      font-weight: 700;
      margin-bottom: 4px;
    }

    .info-panel .planet-name-en {
      font-size: 12px;
      color: rgba(255, 255, 255, 0.4);
      margin-bottom: 16px;
    }

    .info-panel .info-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 8px 0;
      border-bottom: 1px solid rgba(255, 255, 255, 0.06);
    }

    .info-panel .info-row:last-child {
      border-bottom: none;
    }

    .info-panel .info-label {
      font-size: 12px;
      color: rgba(255, 255, 255, 0.45);
    }

    .info-panel .info-value {
      font-size: 14px;
      font-weight: 500;
      color: #fff;
    }

    .info-panel .info-desc {
      font-size: 13px;
      color: rgba(255, 255, 255, 0.6);
      line-height: 1.6;
      margin-top: 14px;
      padding-top: 14px;
      border-top: 1px solid rgba(255, 255, 255, 0.08);
    }

    .info-close {
      position: absolute;
      top: 12px;
      right: 14px;
      background: none;
      border: none;
      color: rgba(255, 255, 255, 0.4);
      font-size: 18px;
      cursor: pointer;
      padding: 4px;
      line-height: 1;
      transition: color 0.15s ease;
    }

    .info-close:hover {
      color: rgba(255, 255, 255, 0.8);
    }

    .hint-text {
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 12px;
      color: rgba(255, 255, 255, 0.25);
      z-index: 50;
      pointer-events: none;
      transition: opacity 0.5s ease;
    }
  </style>
</head>
<body>
  <div id="canvas-container"></div>

  <div class="control-panel">
    <h3>StellarOrrery</h3>
    <button class="control-btn" id="btn-play-pause">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor" id="play-pause-icon">
        <rect x="6" y="4" width="4" height="16" rx="1"/>
        <rect x="14" y="4" width="4" height="16" rx="1"/>
      </svg>
      <span id="play-pause-text">暂停</span>
    </button>
    <div class="speed-control">
      <label>动画速度</label>
      <input type="range" class="speed-slider" id="speed-slider" min="0" max="3" step="1" value="1" />
      <div class="speed-labels">
        <span>0.5x</span><span>1x</span><span>2x</span><span>5x</span>
      </div>
      <div class="speed-value" id="speed-value">1x</div>
    </div>
    <button class="control-btn" id="btn-reset">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="1 4 1 10 7 10"/>
        <path d="M3.51 15a9 9 0 1 0 2.13-9.36L1 10"/>
      </svg>
      重置视角
    </button>
  </div>

  <div class="info-panel" id="info-panel">
    <button class="info-close" id="info-close">&times;</button>
    <div class="planet-name" id="planet-name"></div>
    <div class="planet-name-en" id="planet-name-en"></div>
    <div class="info-row">
      <span class="info-label">半径</span>
      <span class="info-value" id="planet-radius"></span>
    </div>
    <div class="info-row">
      <span class="info-label">公转周期</span>
      <span class="info-value" id="planet-period"></span>
    </div>
    <div class="info-row">
      <span class="info-label">卫星数量</span>
      <span class="info-value" id="planet-moons"></span>
    </div>
    <div class="info-desc" id="planet-desc"></div>
  </div>

  <div class="hint-text" id="hint-text">双击行星查看详细信息 · 拖拽旋转视角 · 滚轮缩放</div>

  <script type="module" src="/src/main.ts"></script>
</body>
</html>
